<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gestão de Pedidos | Super Cestas Dona Antônia</title>
<style>
:root{
  --bg:#f6f7f9;--card:#fff;--txt:#17202a;--muted:#687385;--line:#e8edf3;--brand:#128c4a;--brand2:#0b6b38;--warn:#f59e0b;--danger:#dc2626;--ok:#16a34a;--blue:#2563eb;
  --radius:18px;--shadow:0 8px 30px rgba(15,23,42,.08)
}
*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt)}
.app{max-width:1240px;margin:0 auto;padding:18px}.top{position:sticky;top:0;z-index:10;background:rgba(246,247,249,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topin{max-width:1240px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;gap:12px;justify-content:space-between}.brand{display:flex;align-items:center;gap:12px}.logo{width:46px;height:46px;border-radius:14px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:900}.brand h1{font-size:18px;margin:0}.brand p{margin:2px 0 0;color:var(--muted);font-size:12px}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{border:1px solid var(--line);background:#fff;padding:11px 14px;border-radius:999px;font-weight:800;cursor:pointer}.tab.active{background:var(--brand);border-color:var(--brand);color:#fff}.toolbar{display:grid;grid-template-columns:1fr 170px 170px auto;gap:10px;margin:18px 0}.input,.select{height:46px;border:1px solid var(--line);border-radius:14px;padding:0 14px;background:#fff;font-size:15px}.btn{border:0;border-radius:14px;padding:12px 15px;background:var(--brand);color:#fff;font-weight:900;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px}.btn:hover{background:var(--brand2)}.btn.secondary{background:#fff;color:var(--txt);border:1px solid var(--line)}.btn.warn{background:var(--warn)}.btn.danger{background:var(--danger)}.btn.blue{background:var(--blue)}.btn.ok{background:var(--ok)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:12px 0}.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:15px;box-shadow:var(--shadow)}.stat b{font-size:26px;display:block}.stat span{color:var(--muted);font-size:13px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}.cardHead{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:12px}.orderNo{font-size:32px;line-height:1;font-weight:1000;color:var(--brand)}.status{font-size:12px;font-weight:1000;padding:7px 10px;border-radius:999px;background:#eef2ff;color:#3730a3;text-transform:uppercase}.status.aberto{background:#fff7ed;color:#c2410c}.status.andamento{background:#ecfdf5;color:#047857}.status.cancelado{background:#fef2f2;color:#b91c1c}.status.entregue{background:#ecfdf5;color:#15803d}.meta{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;margin:10px 0}.meta div{color:var(--muted);font-size:13px}.meta strong{display:block;color:var(--txt);font-size:15px;margin-top:2px}.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.routeLine{display:flex;gap:8px;align-items:center;margin-top:12px}.routeLine select{flex:1}.items{margin-top:10px;padding:10px;border-radius:14px;background:#f8fafc;color:#475569;font-size:13px}.hidden{display:none!important}.empty{text-align:center;padding:40px;background:#fff;border-radius:18px;border:1px dashed var(--line);color:var(--muted)}
.routeTop{display:flex;gap:10px;margin:18px 0}.routeList{display:grid;gap:12px}.routeCard{display:grid;grid-template-columns:70px 1fr auto;gap:12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:var(--shadow)}.pos{font-size:26px;font-weight:1000;color:var(--brand);text-align:center}.routeBtns{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}.mini{padding:9px 10px;border-radius:12px;font-size:13px}.move{display:flex;gap:6px;justify-content:center;margin-top:5px}.move button{border:1px solid var(--line);background:#fff;border-radius:10px;padding:5px 8px;cursor:pointer}.modal{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;z-index:99;padding:18px}.modal.open{display:flex}.modalBox{width:min(720px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:22px;padding:18px}.form{display:grid;grid-template-columns:1fr 1fr;gap:10px}.form label{font-size:12px;color:var(--muted);font-weight:800}.form input,.form textarea,.form select{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;font-size:15px}.form textarea{min-height:90px;grid-column:1/-1}.modalActions{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}.toast{position:fixed;right:18px;bottom:18px;background:#111827;color:#fff;padding:14px 16px;border-radius:14px;z-index:120;display:none}.toast.show{display:block}
@media(max-width:850px){.topin{align-items:flex-start;flex-direction:column}.toolbar{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.actions{grid-template-columns:1fr 1fr}.routeCard{grid-template-columns:48px 1fr}.routeBtns{grid-column:1/-1;justify-content:stretch}.routeBtns .btn{flex:1}.form{grid-template-columns:1fr}.orderNo{font-size:28px}}
@media print{body{background:#fff}.top,.app,.toast,.modal{display:none!important}.printLabel{display:block!important}.labelPage{width:100mm;height:150mm;padding:8mm;font-family:Arial,sans-serif}.labelNo{font-size:34pt;font-weight:900;text-align:center;border:3px solid #000;padding:5mm;margin-bottom:5mm}.labelRow{font-size:13pt;margin:3mm 0}.labelClient{font-size:17pt;font-weight:900}.labelFooter{position:absolute;bottom:8mm;left:8mm;right:8mm;text-align:center;font-size:11pt;border-top:1px solid #000;padding-top:3mm}}
.printLabel{display:none}
</style>
</head>
<body>
<div class="top"><div class="topin"><div class="brand"><div class="logo">DA</div><div><h1>Gestão de Pedidos</h1><p>Super Cestas Dona Antônia • Bling + Make</p></div></div><div class="tabs"><button class="tab active" data-screen="orders">Pedidos</button><button class="tab" data-screen="routes">Rota de entrega</button><button class="tab" data-screen="invoices">Notas fiscais</button><button class="tab" data-screen="config">Config</button></div></div></div>
<main class="app">
<section id="ordersScreen"><div class="toolbar"><input id="search" class="input" placeholder="Buscar por pedido, cliente ou telefone"><select id="statusFilter" class="select"><option value="">Todos status</option><option>Em Aberto</option><option>Em Andamento</option><option>Cancelado</option><option>Entregue</option></select><select id="routeFilter" class="select"><option value="">Todas rotas</option><option>Coxipó</option><option>VG</option><option>Cuiabá</option><option>CPA</option></select><button class="btn" onclick="syncAll()">Atualizar</button></div><div class="stats"><div class="stat"><b id="stOpen">0</b><span>Em aberto</span></div><div class="stat"><b id="stProg">0</b><span>Em andamento</span></div><div class="stat"><b id="stNf">0</b><span>Notas fiscais</span></div><div class="stat"><b id="stRoute">0</b><span>Na rota</span></div></div><div id="ordersGrid" class="grid"></div></section>
<section id="routesScreen" class="hidden"><div class="routeTop"><select id="routeSelect" class="select"><option>Coxipó</option><option>VG</option><option>Cuiabá</option><option>CPA</option></select><button class="btn" onclick="renderRoutes()">Ver rota</button></div><div id="routeList" class="routeList"></div></section>
<section id="invoicesScreen" class="hidden"><div class="toolbar" style="grid-template-columns:1fr auto"><input id="nfSearch" class="input" placeholder="Buscar nota, pedido ou cliente"><button class="btn" onclick="loadInvoices()">Atualizar notas</button></div><div id="invoiceGrid" class="grid"></div></section>
<section id="configScreen" class="hidden"><div class="card"><h2>Webhooks do Make</h2><p style="color:var(--muted)">Cole aqui os links dos cenários do Make. O sistema salva no navegador deste computador.</p><div class="form"><label>Listar pedidos<input id="cfgListOrders"></label><label>Atualizar status<input id="cfgUpdateStatus"></label><label>Listar notas fiscais<input id="cfgListInvoices"></label><label>Atualizar cliente<input id="cfgUpdateClient"></label></div><div class="modalActions"><button class="btn secondary" onclick="loadDemo()">Carregar exemplo</button><button class="btn" onclick="saveConfig()">Salvar configuração</button></div></div></section>
</main>
<div id="clientModal" class="modal"><div class="modalBox"><h2>Editar cliente no Bling</h2><div class="form"><input type="hidden" id="editOrderId"><input type="hidden" id="editClientId"><label>Nome<input id="editName"></label><label>Telefone<input id="editPhone"></label><label>WhatsApp<input id="editWhats"></label><label>Foto do cliente/endereço<input id="editPhoto" type="file" accept="image/*"></label><textarea id="editInfo" placeholder="Informações de contato / código do Maps"></textarea><textarea id="editAddress" placeholder="Endereço completo"></textarea></div><div class="modalActions"><button class="btn secondary" onclick="closeClientModal()">Cancelar</button><button class="btn" onclick="saveClient()">Salvar no Bling</button></div></div></div>
<div id="toast" class="toast"></div><div id="printArea" class="printLabel"></div>
<script>
const ROUTES=['Coxipó','VG','Cuiabá','CPA'];
const STATUS={OPEN:'Em Aberto',PROG:'Em Andamento',CANC:'Cancelado',DONE:'Entregue'};
let orders=[], invoices=[];
const $=id=>document.getElementById(id);
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}
function cfg(){return JSON.parse(localStorage.getItem('sc_config')||'{}')}function setCfg(c){localStorage.setItem('sc_config',JSON.stringify(c))}
async function api(url,payload){if(!url) throw new Error('Webhook do Make não configurado');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload||{})});if(!r.ok)throw new Error('Erro Make '+r.status);return await r.json()}
function saveConfig(){setCfg({listOrders:$('cfgListOrders').value.trim(),updateStatus:$('cfgUpdateStatus').value.trim(),listInvoices:$('cfgListInvoices').value.trim(),updateClient:$('cfgUpdateClient').value.trim()});toast('Configuração salva')}
function fillConfig(){const c=cfg();$('cfgListOrders').value=c.listOrders||'';$('cfgUpdateStatus').value=c.updateStatus||'';$('cfgListInvoices').value=c.listInvoices||'';$('cfgUpdateClient').value=c.updateClient||''}
function loadDemo(){orders=[{id:'105574',numero:'105574',createdAt:new Date().toISOString(),status:'Em Aberto',cliente:{id:'c1',nome:'Antonia Guedes',telefone:'65999990000',whatsapp:'65999990000',endereco:'Rua Exemplo, Cuiabá - MT',infoContato:'9WCH+CR Jardim California, Cuiabá - MT'},total:79.25,route:'Coxipó',items:[{nome:'Cesta Básica Mini Bonini',qtd:1},{nome:'Arroz 5kg',qtd:2}]},{id:'105573',numero:'105573',createdAt:new Date(Date.now()-3600000).toISOString(),status:'Em Andamento',cliente:{id:'c2',nome:'Osvaldo Sereia Junior',telefone:'65988880000',whatsapp:'65988880000',endereco:'Várzea Grande - MT',infoContato:'Várzea Grande MT'},total:89.24,route:'VG',nf:{numero:'1234',urlDanfe:'#'}}];invoices=[{id:'n1',numero:'1234',pedido:'105573',cliente:'Osvaldo Sereia Junior',emissao:new Date().toISOString(),urlDanfe:'#'}];persist();renderAll();toast('Exemplo carregado')}
function persist(){localStorage.setItem('sc_orders',JSON.stringify(orders));localStorage.setItem('sc_invoices',JSON.stringify(invoices))}
function restore(){orders=JSON.parse(localStorage.getItem('sc_orders')||'[]');invoices=JSON.parse(localStorage.getItem('sc_invoices')||'[]')}
async function syncAll(){try{const c=cfg();if(c.listOrders){const data=await api(c.listOrders,{acao:'listar_pedidos',status:['Em Aberto','Em Andamento','Cancelado'],origem:'gestao_pedidos'});orders=normalOrders(data.pedidos||data.orders||data.data||[])} if(c.listInvoices){await loadInvoices(false)} persist();renderAll();toast('Atualizado')}catch(e){toast(e.message)}}
function normalOrders(arr){return arr.map(o=>({id:String(o.id||o.idPedido||o.numero),numero:String(o.numero||o.numeroPedido||o.id),createdAt:o.createdAt||o.dataHora||o.data||new Date().toISOString(),status:o.status||o.situacao?.nome||'Em Aberto',cliente:{id:o.cliente?.id||o.contato?.id||'',nome:o.cliente?.nome||o.contato?.nome||o.nomeCliente||'',telefone:o.cliente?.telefone||o.contato?.telefone||'',whatsapp:o.cliente?.whatsapp||o.contato?.celular||o.cliente?.telefone||'',endereco:o.cliente?.endereco||o.endereco||'',infoContato:o.cliente?.infoContato||o.contato?.informacoesContato||o.informacoesContato||''},total:Number(o.total||0),route:o.route||o.rota||'',items:o.items||o.itens||[],nf:o.nf||o.notaFiscal||null,routePos:o.routePos||999}))}
async function loadInvoices(show=true){try{const c=cfg();if(c.listInvoices){const data=await api(c.listInvoices,{acao:'listar_notas',origem:'gestao_pedidos'});invoices=(data.notas||data.invoices||data.data||[]).map(n=>({id:String(n.id||n.idNotaFiscal||n.numero),numero:String(n.numero||n.numeroNota||n.id),pedido:String(n.pedido||n.numeroPedido||n.idPedido||''),cliente:n.cliente||n.contato?.nome||'',emissao:n.emissao||n.dataEmissao||new Date().toISOString(),urlDanfe:n.urlDanfe||n.linkDanfe||n.pdf||'#'}));persist()}renderInvoices();renderStats();if(show)toast('Notas atualizadas')}catch(e){toast(e.message)}}
function renderAll(){renderOrders();renderRoutes();renderInvoices();renderStats()}
function renderStats(){$('stOpen').textContent=orders.filter(o=>o.status===STATUS.OPEN).length;$('stProg').textContent=orders.filter(o=>o.status===STATUS.PROG).length;$('stNf').textContent=invoices.length;$('stRoute').textContent=orders.filter(o=>o.route).length}
function statusClass(s){return s==='Em Aberto'?'aberto':s==='Em Andamento'?'andamento':s==='Cancelado'?'cancelado':s==='Entregue'?'entregue':''}
function fmtDate(d){return new Date(d).toLocaleString('pt-BR',{dateStyle:'short',timeStyle:'short'})}function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function filteredOrders(){const q=$('search').value.toLowerCase(),sf=$('statusFilter').value,rf=$('routeFilter').value;return orders.filter(o=>(!q||[o.numero,o.cliente.nome,o.cliente.telefone,o.cliente.whatsapp].join(' ').toLowerCase().includes(q))&&(!sf||o.status===sf)&&(!rf||o.route===rf))}
function renderOrders(){const g=$('ordersGrid'), arr=filteredOrders();g.innerHTML=arr.length?'':'<div class="empty">Nenhum pedido encontrado.</div>';arr.forEach(o=>g.insertAdjacentHTML('beforeend',orderCard(o)))}
function orderCard(o){const items=(o.items||[]).slice(0,4).map(i=>`${i.qtd||i.quantidade||1}x ${i.nome||i.descricao}`).join(' • ');return `<article class="card"><div class="cardHead"><div><div class="orderNo">#${o.numero}</div><div style="color:var(--muted);font-weight:800">${fmtDate(o.createdAt)}</div></div><span class="status ${statusClass(o.status)}">${o.status}</span></div><div class="meta"><div>Cliente<strong>${o.cliente.nome||'-'}</strong></div><div>Total<strong>${money(o.total)}</strong></div><div>Telefone<strong>${o.cliente.telefone||'-'}</strong></div><div>Rota<strong>${o.route||'Sem rota'}</strong></div></div><div class="routeLine"><select class="select" onchange="setRoute('${o.id}',this.value)"><option value="">Escolher rota</option>${ROUTES.map(r=>`<option ${o.route===r?'selected':''}>${r}</option>`).join('')}</select><button class="btn secondary" onclick="openClientModal('${o.id}')">Cliente</button></div>${items?`<div class="items">${items}</div>`:''}<div class="actions"><button class="btn secondary" onclick="printLabel('${o.id}')">Etiqueta 10x15</button><button class="btn warn" onclick="changeStatus('${o.id}')">Status</button><button class="btn blue" onclick="printDanfe('${o.id}')">Nota fiscal</button></div></article>`}
function setRoute(id,route){const o=orders.find(x=>x.id===id);if(o){o.route=route;o.routePos=orders.filter(x=>x.route===route).length+1;persist();renderAll();toast('Rota definida')}}
async function changeStatus(id){const o=orders.find(x=>x.id===id);if(!o)return;const next=o.status===STATUS.OPEN?STATUS.PROG:o.status===STATUS.PROG?STATUS.DONE:STATUS.OPEN;try{const c=cfg();if(c.updateStatus)await api(c.updateStatus,{acao:'alterar_status',idPedido:o.id,numero:o.numero,statusAtual:o.status,novoStatus:next});o.status=next;persist();renderAll();toast('Status alterado para '+next)}catch(e){toast(e.message)}}
function printDanfe(id){const o=orders.find(x=>x.id===id);const nf=o?.nf||invoices.find(n=>n.pedido===o?.numero||n.pedido===o?.id);if(nf?.urlDanfe&&nf.urlDanfe!=='#') window.open(nf.urlDanfe,'_blank'); else toast('Nota fiscal ainda não encontrada para este pedido')}
function printLabel(id){const o=orders.find(x=>x.id===id);if(!o)return;const maps=o.cliente.infoContato||o.cliente.endereco||'';$('printArea').innerHTML=`<div class="labelPage"><div class="labelNo">PEDIDO #${o.numero}</div><div class="labelRow labelClient">${o.cliente.nome||''}</div><div class="labelRow"><b>Telefone:</b> ${o.cliente.telefone||''}</div><div class="labelRow"><b>Rota:</b> ${o.route||'Sem rota'}</div><div class="labelRow"><b>Endereço:</b> ${o.cliente.endereco||''}</div><div class="labelRow"><b>Maps:</b> ${maps}</div><div class="labelRow"><b>Data:</b> ${fmtDate(o.createdAt)}</div><div class="labelFooter">Super Cestas Dona Antônia • Entrega</div></div>`;window.print()}
function renderRoutes(){const route=$('routeSelect').value, list=$('routeList');const arr=orders.filter(o=>o.route===route&&o.status!==STATUS.DONE&&o.status!==STATUS.CANC).sort((a,b)=>(a.routePos||999)-(b.routePos||999));list.innerHTML=arr.length?'':'<div class="empty">Nenhum pedido nesta rota.</div>';arr.forEach((o,i)=>list.insertAdjacentHTML('beforeend',`<div class="routeCard"><div><div class="pos">${i+1}</div><div class="move"><button onclick="moveRoute('${o.id}',-1)">↑</button><button onclick="moveRoute('${o.id}',1)">↓</button></div></div><div><b style="font-size:22px">#${o.numero}</b> — ${o.cliente.nome}<div style="color:var(--muted)">${o.cliente.endereco||o.cliente.infoContato||''}</div><div style="font-weight:800;margin-top:4px">${money(o.total)}</div></div><div class="routeBtns"><button class="btn ok mini" onclick="markDelivered('${o.id}')">Entregue</button><a class="btn secondary mini" href="tel:${onlyNum(o.cliente.telefone)}">Ligar</a><a class="btn secondary mini" target="_blank" href="https://wa.me/55${onlyNum(o.cliente.whatsapp||o.cliente.telefone)}">Zap</a><a class="btn blue mini" target="_blank" href="https://wa.me/55${onlyNum(o.cliente.whatsapp||o.cliente.telefone)}?text=${encodeURIComponent('Olá aqui é o entregador da Super Cestas Dona Antônia, seu pedido está chegando')}">Mensagem</a><a class="btn warn mini" target="_blank" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(o.cliente.infoContato||o.cliente.endereco||'')}">Maps</a></div></div>`))}
function onlyNum(s){return String(s||'').replace(/\D/g,'')}function moveRoute(id,dir){const route=$('routeSelect').value;let arr=orders.filter(o=>o.route===route).sort((a,b)=>(a.routePos||999)-(b.routePos||999));const i=arr.findIndex(o=>o.id===id),j=i+dir;if(j<0||j>=arr.length)return;[arr[i],arr[j]]=[arr[j],arr[i]];arr.forEach((o,k)=>o.routePos=k+1);persist();renderRoutes()}
function markDelivered(id){const o=orders.find(x=>x.id===id);if(o){o.status=STATUS.DONE;persist();renderAll();toast('Pedido marcado como entregue')}}
function renderInvoices(){const g=$('invoiceGrid'),q=($('nfSearch')?.value||'').toLowerCase();const arr=invoices.filter(n=>!q||[n.numero,n.pedido,n.cliente].join(' ').toLowerCase().includes(q));g.innerHTML=arr.length?'':'<div class="empty">Nenhuma nota fiscal encontrada.</div>';arr.forEach(n=>g.insertAdjacentHTML('beforeend',`<article class="card"><div class="cardHead"><div><div class="orderNo">NF ${n.numero}</div><div style="color:var(--muted);font-weight:800">${fmtDate(n.emissao)}</div></div><span class="status andamento">Gerada</span></div><div class="meta"><div>Pedido<strong>#${n.pedido}</strong></div><div>Cliente<strong>${n.cliente}</strong></div></div><button class="btn blue" onclick="window.open('${n.urlDanfe||'#'}','_blank')">Imprimir DANFE</button></article>`))}
function openClientModal(id){const o=orders.find(x=>x.id===id);if(!o)return;$('editOrderId').value=o.id;$('editClientId').value=o.cliente.id||'';$('editName').value=o.cliente.nome||'';$('editPhone').value=o.cliente.telefone||'';$('editWhats').value=o.cliente.whatsapp||'';$('editInfo').value=o.cliente.infoContato||'';$('editAddress').value=o.cliente.endereco||'';$('clientModal').classList.add('open')}
function closeClientModal(){$('clientModal').classList.remove('open')}
function fileToBase64(file){return new Promise(res=>{if(!file)return res('');const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(file)})}
async function saveClient(){const o=orders.find(x=>x.id===$('editOrderId').value);if(!o)return;const foto=await fileToBase64($('editPhoto').files[0]);const payload={acao:'atualizar_cliente',idCliente:$('editClientId').value,nome:$('editName').value,telefone:$('editPhone').value,whatsapp:$('editWhats').value,informacoesContato:$('editInfo').value,endereco:$('editAddress').value,fotoBase64:foto};try{const c=cfg();if(c.updateClient)await api(c.updateClient,payload);Object.assign(o.cliente,{id:payload.idCliente,nome:payload.nome,telefone:payload.telefone,whatsapp:payload.whatsapp,infoContato:payload.informacoesContato,endereco:payload.endereco});persist();closeClientModal();renderAll();toast('Cliente atualizado')}catch(e){toast(e.message)}}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');['orders','routes','invoices','config'].forEach(s=>$(s+'Screen').classList.toggle('hidden',s!==b.dataset.screen));if(b.dataset.screen==='routes')renderRoutes();if(b.dataset.screen==='invoices')renderInvoices()});['search','statusFilter','routeFilter'].forEach(id=>$(id).addEventListener('input',renderOrders));$('nfSearch').addEventListener('input',renderInvoices);restore();fillConfig();renderAll();if(!orders.length)toast('Configure os webhooks ou carregue o exemplo');
</script>
</body>
</html>
