<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Expedição Dona Antônia</title>
<style>
:root{--bg:#f3f4f6;--card:#fff;--txt:#111827;--muted:#6b7280;--line:#e5e7eb;--dark:#111827;--ok:#16a34a;--warn:#f59e0b;--blue:#2563eb;--red:#dc2626;--radius:14px}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--txt)}button,input,select,textarea{font-family:inherit}button{cursor:pointer;border:0}.app{min-height:100vh;display:flex;flex-direction:column}.top{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);padding:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}.brand{font-weight:900;font-size:16px;margin-right:auto}.btn{height:42px;padding:0 12px;border-radius:10px;font-weight:900;background:#fff;border:1px solid var(--line);color:var(--txt)}.btn.primary{background:var(--dark);color:#fff;border-color:var(--dark)}.btn.blue{background:var(--blue);color:#fff;border-color:var(--blue)}.btn.ok{background:var(--ok);color:#fff;border-color:var(--ok)}.btn.warn{background:var(--warn);color:#111827;border-color:var(--warn)}.btn.red{background:var(--red);color:#fff;border-color:var(--red)}.btn:disabled{opacity:.55;cursor:not-allowed}.main{padding:12px;max-width:1180px;width:100%;margin:0 auto}.grid{display:grid;grid-template-columns:360px 1fr;gap:12px}.panel,.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 2px 10px rgba(0,0,0,.03)}.panel{padding:14px}.section-title{font-size:12px;text-transform:uppercase;color:var(--muted);font-weight:900;margin:0 0 10px}.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}.field label{font-size:12px;font-weight:900}.input{width:100%;height:42px;border:1px solid var(--line);border-radius:10px;padding:0 10px;font-size:14px;background:#fff}.textarea{height:80px;padding:10px;resize:vertical}.hint{font-size:12px;color:var(--muted);line-height:1.35}.status-tabs{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}.tab{height:38px;border-radius:999px;padding:0 12px;background:#fff;border:1px solid var(--line);font-weight:900;font-size:12px}.tab.active{background:#111827;color:#fff}.orders{display:flex;flex-direction:column;gap:10px}.order-card{padding:12px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}.order-title{font-weight:900;font-size:18px}.order-meta{font-size:13px;color:var(--muted);font-weight:700;line-height:1.45}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:5px 8px;font-size:12px;font-weight:900;border:1px solid var(--line);background:#f9fafb}.badge.open{background:#fff7ed;color:#9a3412;border-color:#fed7aa}.badge.progress{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}.badge.done{background:#ecfdf5;color:#047857;border-color:#bbf7d0}.actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.toast{position:fixed;left:50%;top:14px;transform:translateX(-50%) translateY(-120%);z-index:9999;background:#111827;color:#fff;padding:12px 16px;border-radius:999px;font-weight:900;transition:.25s;max-width:92%;text-align:center}.toast.show{transform:translateX(-50%) translateY(0)}.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:none;align-items:stretch;justify-content:center}.modal.show{display:flex}.drawer{background:#fff;width:100%;max-width:760px;min-height:100%;display:flex;flex-direction:column}.drawer-head{padding:12px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}.drawer-title{font-weight:900;font-size:18px;margin-right:auto}.drawer-body{padding:12px;overflow:auto;flex:1}.separator-screen{background:#fff;min-height:100vh;display:flex;flex-direction:column}.sep-head{position:sticky;top:0;z-index:10;background:#111827;color:#fff;padding:10px;display:flex;align-items:center;gap:8px}.sep-title{font-size:15px;font-weight:900;margin-right:auto}.progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progress div{height:100%;background:#16a34a;width:0}.sep-card{padding:10px;display:flex;flex-direction:column;gap:10px}.prod-img{width:100%;height:235px;object-fit:contain;background:#f9fafb;border:1px solid var(--line);border-radius:14px}.prod-name{font-size:22px;line-height:1.15;font-weight:900}.qty-box{background:#111827;color:#fff;border-radius:16px;padding:14px;text-align:center}.qty-box small{display:block;font-size:12px;text-transform:uppercase;opacity:.8;font-weight:900}.qty-box strong{font-size:46px;line-height:1}.loc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.loc{background:#f3f4f6;border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}.loc small{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;font-weight:900}.loc strong{font-size:28px}.codes{font-size:13px;color:#374151;font-weight:800;background:#f9fafb;border:1px solid var(--line);border-radius:12px;padding:10px;word-break:break-word}.sep-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px;margin-top:auto}.sep-actions .btn{height:54px;font-size:15px}.checkline{display:flex;gap:8px;align-items:center}.checkline input{width:26px;height:26px}.checkline span{font-weight:900;font-size:16px}.label-sheet{display:none}.empty{text-align:center;padding:30px;color:var(--muted);font-weight:800}.small{font-size:12px}.split{display:grid;grid-template-columns:1fr 1fr;gap:8px}.hr{height:1px;background:var(--line);margin:12px 0}
@media(max-width:850px){.grid{grid-template-columns:1fr}.brand{width:100%;font-size:15px}.top .btn{flex:1}.order-card{grid-template-columns:1fr}.actions{justify-content:stretch}.actions .btn{flex:1}.panel.config{display:none}.panel.config.open{display:block}.main{padding:8px}.prod-img{height:210px}.prod-name{font-size:20px}.qty-box strong{font-size:42px}}
@media print{body *{visibility:hidden!important}.label-sheet,.label-sheet *{visibility:visible!important}.label-sheet{display:block!important;position:fixed;left:0;top:0;width:10cm;height:15cm;background:#fff;color:#000;padding:.5cm;font-family:Arial,Helvetica,sans-serif}.label-box{border:2px solid #000;width:100%;height:100%;padding:.35cm;display:flex;flex-direction:column;gap:.18cm}.lbl-title{text-align:center;font-weight:900;font-size:18pt;border-bottom:2px solid #000;padding-bottom:.15cm}.lbl-client{font-size:20pt;font-weight:900;line-height:1.05;text-transform:uppercase}.lbl-address{font-size:16pt;font-weight:900;line-height:1.12}.lbl-info{font-size:12pt;font-weight:800}.lbl-obs{font-size:11pt;border-top:1px solid #000;padding-top:.15cm;margin-top:auto}.no-print{display:none!important}@page{size:10cm 15cm;margin:0}}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="app" class="app">
  <div class="top no-print">
    <div class="brand">EXPEDIÇÃO DONA ANTÔNIA</div>
    <button class="btn primary" onclick="carregarPedidos()">BUSCAR PEDIDOS</button>
    <button class="btn" onclick="toggleConfig()">CONFIGURAÇÃO</button>
    <button class="btn" onclick="abrirSeparacaoSelecionada()">SEPARAÇÃO</button>
  </div>
  <div class="main no-print">
    <div class="grid">
      <div class="panel config" id="configPanel">
        <div class="section-title">Conexões</div>
        <div class="field"><label>Webhook/Proxy Make obrigatório para Bling</label><input id="proxyUrl" class="input" placeholder="https://hook.eu1.make.com/..." oninput="salvarConfig()"></div>
        <div class="field"><label>Access token Bling</label><input id="blingToken" class="input" type="password" placeholder="Salvo só neste navegador" oninput="salvarConfig()"></div>
        <div class="hr"></div>
        <div class="section-title">GitHub</div>
        <div class="field"><label>Token GitHub</label><input id="githubToken" class="input" type="password" oninput="salvarConfig()"></div>
        <div class="split"><div class="field"><label>Owner</label><input id="ghOwner" class="input" placeholder="usuario" oninput="salvarConfig()"></div><div class="field"><label>Repo</label><input id="ghRepo" class="input" placeholder="repositorio" oninput="salvarConfig()"></div></div>
        <div class="split"><div class="field"><label>Branch</label><input id="ghBranch" class="input" value="main" oninput="salvarConfig()"></div><div class="field"><label>Usar proxy p/ GitHub?</label><select id="githubProxy" class="input" onchange="salvarConfig()"><option value="nao">Não</option><option value="sim">Sim</option></select></div></div>
        <div class="field"><label>URL produtos.json com fotos/localização</label><input id="produtosJsonUrl" class="input" placeholder="https://raw.githubusercontent.com/.../site/produtos.json" oninput="salvarConfig()"></div>
        <div class="hint">Os tokens ficam no localStorage, não ficam gravados no HTML. Para Bling, use sempre Make/proxy para evitar erro Failed to fetch/CORS.</div>
        <div class="hr"></div>
        <div class="section-title">Status reais do Bling</div>
        <div class="hint"><b>Em aberto = 6</b><br><b>Em andamento = 15</b><br><b>Atendido = 9</b></div>
      </div>
      <div>
        <div class="panel">
          <div class="section-title">Pedidos de venda</div>
          <div class="status-tabs" id="tabs"></div>
          <div class="split">
            <input id="q" class="input" placeholder="Buscar por número ou cliente" oninput="renderPedidos()">
            <select id="periodo" class="input" onchange="salvarConfig();carregarPedidos()"><option value="7">Últimos 7 dias</option><option value="15">Últimos 15 dias</option><option value="30">Últimos 30 dias</option></select>
          </div>
        </div>
        <div style="height:10px"></div>
        <div class="orders" id="orders"></div>
      </div>
    </div>
  </div>
</div>

<div id="sepModal" class="modal no-print"><div class="drawer"><div class="drawer-head"><div class="drawer-title">Separação</div><button class="btn" onclick="fecharSeparacao()">FECHAR</button></div><div id="sepBody" class="drawer-body"></div></div></div>
<div id="labelSheet" class="label-sheet"><div class="label-box" id="labelBox"></div></div>

<script>
'use strict';
const STATUS = {
  ABERTO:{id:6,nome:'Em aberto',classe:'open'},
  ANDAMENTO:{id:15,nome:'Em andamento',classe:'progress'},
  ATENDIDO:{id:9,nome:'Atendido',classe:'done'}
};
const CFG_KEY='da_expedicao_cfg_v3';
const CACHE_KEY='da_expedicao_cache_v3';
let cfg={proxyUrl:'',blingToken:'',githubToken:'',ghOwner:'',ghRepo:'',ghBranch:'main',githubProxy:'nao',produtosJsonUrl:'',periodo:'7'};
let pedidos=[];let filtro='todos';let pedidoSelecionado=null;let produtosIndex={};let sep={pedido:null,itens:[],idx:0,checked:{}};
function $(id){return document.getElementById(id)}
function toast(msg,ms=2800){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._tm);t._tm=setTimeout(()=>t.classList.remove('show'),ms)}
function money(v){let n=Number(v||0);return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function only(v){return String(v??'').trim()}
function todayMinus(days){const d=new Date();d.setDate(d.getDate()-Number(days||7));return d.toISOString().slice(0,10)}
function normalize(s){return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase()}
function loadConfig(){try{cfg={...cfg,...JSON.parse(localStorage.getItem(CFG_KEY)||'{}')}}catch(e){};['proxyUrl','blingToken','githubToken','ghOwner','ghRepo','ghBranch','githubProxy','produtosJsonUrl','periodo'].forEach(k=>{if($(k))$(k).value=cfg[k]||''});if(!cfg.ghBranch){cfg.ghBranch='main';$('ghBranch').value='main'};try{const c=JSON.parse(localStorage.getItem(CACHE_KEY)||'{}');pedidos=c.pedidos||[]}catch(e){};renderTabs();renderPedidos()}
function salvarConfig(){['proxyUrl','blingToken','githubToken','ghOwner','ghRepo','ghBranch','githubProxy','produtosJsonUrl','periodo'].forEach(k=>{if($(k))cfg[k]=$(k).value.trim()});localStorage.setItem(CFG_KEY,JSON.stringify(cfg))}
function salvarCache(){localStorage.setItem(CACHE_KEY,JSON.stringify({at:Date.now(),pedidos}))}
function toggleConfig(){const p=$('configPanel');p.classList.toggle('open')}
function statusById(id){id=Number(id);return Object.values(STATUS).find(s=>Number(s.id)===id)||{id:id||0,nome:'Sem status',classe:''}}
function statusFromPedido(p){const s=p.situacao||p.status||{};const id=Number(s.id||s.codigo||s.situacao_id||p.situacao_id||p.idSituacao||0);if(id)return statusById(id);const nome=only(s.nome||s.descricao||s.valor||p.situacao_nome||p.status);const n=normalize(nome);if(n.includes('aberto'))return STATUS.ABERTO;if(n.includes('andamento'))return STATUS.ANDAMENTO;if(n.includes('atendido'))return STATUS.ATENDIDO;return {id:0,nome:nome||'Sem status',classe:''}}
function renderTabs(){const arr=[['todos','Todos'],['6','Em aberto'],['15','Em andamento'],['9','Atendido']];$('tabs').innerHTML=arr.map(a=>`<button class="tab ${filtro===a[0]?'active':''}" onclick="filtro='${a[0]}';renderTabs();renderPedidos()">${a[1]}</button>`).join('')}
function renderPedidos(){const q=normalize($('q')?.value||'');let list=pedidos.slice();if(filtro!=='todos')list=list.filter(p=>String(statusFromPedido(p).id)===filtro);if(q)list=list.filter(p=>normalize((p.numero||p.numeroLoja||p.id||'')+' '+(p.contato?.nome||p.cliente?.nome||p.nome||'')).includes(q));list.sort((a,b)=>Number(b.id||0)-Number(a.id||0));$('orders').innerHTML=list.length?list.map(cardPedido).join(''):'<div class="card empty">Nenhum pedido encontrado.</div>'}
function cardPedido(p){const st=statusFromPedido(p);const id=only(p.id);const num=only(p.numero||p.numeroLoja||p.id);const cli=only(p.contato?.nome||p.cliente?.nome||p.nomeCliente||'Cliente não informado');const total=money(p.total||p.valorTotal||p.totalPedido);const tel=only(p.contato?.telefone||p.contato?.celular||p.cliente?.telefone||'');return `<div class="card order-card"><div><div class="order-title">Pedido ${num}</div><div class="order-meta">${cli}<br>${tel?tel+'<br>':''}${total}</div><div style="margin-top:8px"><span class="badge ${st.classe}">${st.nome} - id ${st.id||'-'}</span></div></div><div class="actions"><button class="btn" onclick="selecionarPedido('${id}')">ABRIR</button><button class="btn blue" onclick="mudarStatus('${id}',15)">SEPARAR</button><button class="btn ok" onclick="mudarStatus('${id}',9)">ATENDIDO</button><button class="btn warn" onclick="imprimirEtiqueta('${id}')">ETIQUETA</button></div></div>`}
async function proxyCall(service,path,method='GET',body=null){salvarConfig();if(!cfg.proxyUrl)throw new Error('Configure o Webhook/Proxy Make.');const res=await fetch(cfg.proxyUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({service,path,method,body,config:{blingToken:cfg.blingToken,githubToken:cfg.githubToken,ghOwner:cfg.ghOwner,ghRepo:cfg.ghRepo,ghBranch:cfg.ghBranch}})});if(!res.ok)throw new Error('Proxy retornou erro '+res.status);const text=await res.text();try{return JSON.parse(text)}catch(e){return {raw:text}}}
async function bling(path,method='GET',body=null){return proxyCall('bling',path,method,body)}
async function carregarPedidos(){try{salvarConfig();toast('Buscando pedidos...');await carregarProdutosIndex();const dataInicial=todayMinus(cfg.periodo||7);let r=await bling(`/pedidos/vendas?limite=100&dataInicial=${dataInicial}`,'GET');let arr=Array.isArray(r?.data)?r.data:(Array.isArray(r)?r:[]);pedidos=arr;salvarCache();renderPedidos();toast('Pedidos carregados: '+pedidos.length)}catch(e){toast('Erro ao buscar pedidos: '+e.message,5000)}}
async function detalhePedido(id){let local=pedidos.find(p=>String(p.id)===String(id));try{const r=await bling(`/pedidos/vendas/${id}`,'GET');const p=r?.data||r||local;if(p&&p.id){const i=pedidos.findIndex(x=>String(x.id)===String(id));if(i>=0)pedidos[i]={...pedidos[i],...p};else pedidos.push(p);salvarCache();return pedidos.find(x=>String(x.id)===String(id))}}catch(e){if(local)return local;throw e}return local}
async function selecionarPedido(id){try{const p=await detalhePedido(id);pedidoSelecionado=p;abrirDetalhes(p)}catch(e){toast('Erro ao abrir pedido: '+e.message,4500)}}
function abrirDetalhes(p){const st=statusFromPedido(p);const itens=normalizarItens(p);$('sepBody').innerHTML=`<div class="panel"><div class="order-title">Pedido ${only(p.numero||p.id)}</div><div class="order-meta">${only(p.contato?.nome||p.cliente?.nome||'Cliente')}<br>${money(p.total||p.valorTotal)}</div><div style="margin:10px 0"><span class="badge ${st.classe}">${st.nome} - id ${st.id}</span></div><div class="actions" style="justify-content:flex-start"><button class="btn blue" onclick="mudarStatus('${p.id}',15)">MUDAR PARA EM ANDAMENTO</button><button class="btn ok" onclick="mudarStatus('${p.id}',9)">MUDAR PARA ATENDIDO</button><button class="btn warn" onclick="imprimirEtiqueta('${p.id}')">IMPRIMIR ETIQUETA</button><button class="btn primary" onclick="iniciarSeparacao('${p.id}')">ABRIR TELA DE SEPARAÇÃO</button></div></div><div style="height:10px"></div><div class="panel"><div class="section-title">Itens</div>${itens.map(i=>`<div style="display:flex;gap:8px;border-bottom:1px solid #eee;padding:8px 0"><img src="${i.foto||''}" onerror="this.style.display='none'" style="width:54px;height:54px;object-fit:contain"><div><b>${i.nome}</b><br><span class="small">Qtd: ${i.qtd} | Cód: ${i.codigo||'-'} | EAN: ${i.ean||'-'} | Gôndola: ${i.gondola||'-'} | Prat.: ${i.prateleira||'-'}</span></div></div>`).join('')}</div>`;$('sepModal').classList.add('show')}
function fecharSeparacao(){$('sepModal').classList.remove('show')}
function normalizarItens(p){const raw=p.itens||p.items||p.produtos||[];return raw.map((it,idx)=>{const prod=it.produto||it;const cod=only(prod.codigo||it.codigo||prod.sku||it.sku);const ean=only(prod.gtin||prod.ean||prod.codigoBarras||it.gtin||it.ean);const found=produtosIndex[cod]||produtosIndex[ean]||{};return {idx,nome:only(prod.nome||it.descricao||it.nome||found.nome||'Produto'),codigo:cod||found.codigo||'',ean:ean||found.gtin||'',qtd:Number(it.quantidade||it.qtd||prod.quantidade||1),gondola:only(found.gondola||prod.gondola||it.gondola||''),prateleira:only(found.prateleira||prod.prateleira||it.prateleira||''),foto:only(found.url_imagem||found.foto||found.imagem||prod.url_imagem||prod.imagem||'')};}).sort((a,b)=>String(a.gondola).localeCompare(String(b.gondola),'pt-BR',{numeric:true})||String(a.prateleira).localeCompare(String(b.prateleira),'pt-BR',{numeric:true})||a.nome.localeCompare(b.nome))}
async function carregarProdutosIndex(){if(!cfg.produtosJsonUrl)return;try{const res=await fetch(cfg.produtosJsonUrl+(cfg.produtosJsonUrl.includes('?')?'&':'?')+'_='+Date.now(),{cache:'no-store'});const json=await res.json();const arr=Array.isArray(json)?json:Object.values(json||{});produtosIndex={};arr.forEach(p=>{if(p.codigo)produtosIndex[String(p.codigo)]=p;if(p.gtin)produtosIndex[String(p.gtin)]=p;if(p.ean)produtosIndex[String(p.ean)]=p})}catch(e){console.warn('produtos.json não carregou',e)}}
async function mudarStatus(id,statusId){try{const p=await detalhePedido(id);if(Number(statusId)===15){await salvarSeparacaoGithub(p,'Em andamento')}toast('Atualizando status no Bling...');await bling(`/pedidos/vendas/${id}/situacoes/${statusId}`,'PATCH',{});p.situacao={...(p.situacao||{}),id:statusId,nome:statusById(statusId).nome};salvarCache();renderPedidos();if(Number(statusId)===15)toast('Pedido em andamento e separacao.json atualizado.');else toast('Status alterado para '+statusById(statusId).nome)}catch(e){toast('Erro ao mudar status: '+e.message,5500)}}
function montarRegistroSeparacao(p,statusNome){const itens=normalizarItens(p);return {updated_at:new Date().toISOString(),pedido:{...p,status_separacao:statusNome,status_bling:statusFromPedido(p)},itens,total_itens:itens.length}}
async function salvarSeparacaoGithub(p,statusNome){const reg=montarRegistroSeparacao(p,statusNome);let arquivo={updated_at:new Date().toISOString(),pedidos:{}};try{arquivo=await githubGetJson('expedicao/separacao.json')||arquivo}catch(e){};arquivo.pedidos=arquivo.pedidos||{};arquivo.pedidos[String(p.id)]=reg;await githubPutJson('expedicao/separacao.json',arquivo,'Atualiza separacao pedido '+(p.numero||p.id))}
async function githubGetJson(path){if(cfg.githubProxy==='sim')return await proxyCall('github','/repos/contents/'+path,'GET');const url=`https://api.github.com/repos/${cfg.ghOwner}/${cfg.ghRepo}/contents/${path}?ref=${cfg.ghBranch||'main'}&_=${Date.now()}`;const res=await fetch(url,{headers:{Authorization:'Bearer '+cfg.githubToken,Accept:'application/vnd.github+json'},cache:'no-store'});if(res.status===404)return null;if(!res.ok)throw new Error('GitHub GET '+res.status);const j=await res.json();return JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g,'')))))}
async function githubPutJson(path,obj,msg){if(!cfg.ghOwner||!cfg.ghRepo||!cfg.githubToken)throw new Error('Configure GitHub para salvar separação.');if(cfg.githubProxy==='sim')return await proxyCall('github','/repos/contents/'+path,'PUT',{content:obj,message:msg});let sha=null;try{const urlGet=`https://api.github.com/repos/${cfg.ghOwner}/${cfg.ghRepo}/contents/${path}?ref=${cfg.ghBranch||'main'}&_=${Date.now()}`;const gr=await fetch(urlGet,{headers:{Authorization:'Bearer '+cfg.githubToken,Accept:'application/vnd.github+json'},cache:'no-store'});if(gr.ok){sha=(await gr.json()).sha}}catch(e){}const content=btoa(unescape(encodeURIComponent(JSON.stringify(obj,null,2))));const url=`https://api.github.com/repos/${cfg.ghOwner}/${cfg.ghRepo}/contents/${path}`;const body={message:msg,content,branch:cfg.ghBranch||'main'};if(sha)body.sha=sha;const res=await fetch(url,{method:'PUT',headers:{Authorization:'Bearer '+cfg.githubToken,Accept:'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify(body)});if(!res.ok)throw new Error('GitHub PUT '+res.status+': '+await res.text());return res.json()}
async function iniciarSeparacao(id){try{const p=await detalhePedido(id);sep={pedido:p,itens:normalizarItens(p),idx:0,checked:{}};if(!sep.itens.length){toast('Pedido sem itens.');return}renderSeparador();$('sepModal').classList.add('show')}catch(e){toast('Erro ao iniciar separação: '+e.message,4500)}}
function abrirSeparacaoSelecionada(){if(pedidoSelecionado?.id)return iniciarSeparacao(pedidoSelecionado.id);toast('Abra um pedido primeiro.')}
function renderSeparador(){const it=sep.itens[sep.idx];const done=Object.keys(sep.checked).length;const pct=Math.round((done/sep.itens.length)*100);$('sepBody').innerHTML=`<div class="separator-screen"><div class="sep-head"><div class="sep-title">Pedido ${only(sep.pedido.numero||sep.pedido.id)} - ${sep.idx+1}/${sep.itens.length}</div><button class="btn" onclick="abrirDetalhes(sep.pedido)">LISTA</button></div><div class="progress"><div style="width:${pct}%"></div></div><div class="sep-card"><img class="prod-img" src="${it.foto||''}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22500%22 height=%22300%22%3E%3Crect width=%22100%25%22 height=%22100%25%22 fill=%22%23f3f4f6%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 fill=%22%236b7280%22 font-size=%2224%22 font-family=%22Arial%22%3ESem foto%3C/text%3E%3C/svg%3E'"><div class="prod-name">${it.nome}</div><div class="qty-box"><small>Quantidade para separar</small><strong>${it.qtd}</strong></div><div class="loc-grid"><div class="loc"><small>Gôndola</small><strong>${it.gondola||'-'}</strong></div><div class="loc"><small>Prateleira</small><strong>${it.prateleira||'-'}</strong></div></div><div class="codes">Código: ${it.codigo||'-'}<br>EAN: ${it.ean||'-'}</div><label class="checkline"><input type="checkbox" ${sep.checked[it.idx]?'checked':''} onchange="toggleItem(${it.idx},this.checked)"><span>Produto separado</span></label></div><div class="sep-actions"><button class="btn" onclick="sep.idx=Math.max(0,sep.idx-1);renderSeparador()">ANTERIOR</button><button class="btn blue" onclick="sep.idx=Math.min(sep.itens.length-1,sep.idx+1);renderSeparador()">PRÓXIMO</button><button class="btn ok" onclick="toggleItem(${it.idx},true);sep.idx=Math.min(sep.itens.length-1,sep.idx+1);renderSeparador()">MARCAR E AVANÇAR</button><button class="btn primary" onclick="concluirSeparacao()">CONCLUIR</button></div></div>`}
function toggleItem(idx,val){if(val)sep.checked[idx]=true;else delete sep.checked[idx]}
async function concluirSeparacao(){const faltam=sep.itens.length-Object.keys(sep.checked).length;if(faltam>0&&!confirm(`Ainda faltam ${faltam} item(ns). Concluir mesmo assim?`))return;await mudarStatus(sep.pedido.id,9);toast('Separação concluída. Pedido Atendido. Agora pode imprimir a etiqueta.');abrirDetalhes(sep.pedido)}
async function imprimirEtiqueta(id){try{const p=await detalhePedido(id);const c=p.contato||p.cliente||{};const end=c.endereco||p.endereco||{};const nome=only(c.nome||p.nomeCliente||'CLIENTE');const rua=only(end.endereco||end.rua||c.rua||'');const num=only(end.numero||c.numero||'');const comp=only(end.complemento||c.complemento||'');const bairro=only(end.bairro||c.bairro||'');const cidade=only(end.municipio||end.cidade||c.cidade||'');const uf=only(end.uf||c.uf||'');const cep=only(end.cep||c.cep||'');const tel=only(c.telefone||c.celular||p.telefone||'');const obs=only(p.observacoes||p.observacao||p.observacoesInternas||'');$('labelBox').innerHTML=`<div class="lbl-title">DONA ANTÔNIA<br>PEDIDO ${only(p.numero||p.id)}</div><div class="lbl-client">${nome}</div><div class="lbl-address">${rua}${num?', Nº '+num:''}<br>${comp?comp+'<br>':''}${bairro}<br>${cidade}${uf?' - '+uf:''}<br>CEP ${cep||'-'}</div><div class="lbl-info">Telefone: ${tel||'-'}<br>Total: ${money(p.total||p.valorTotal)}</div><div class="lbl-obs">Obs: ${obs||'Sem observação'}</div>`;window.print();toast('Etiqueta enviada para impressão.');}catch(e){toast('Erro ao imprimir: '+e.message,4500)}}
loadConfig();
</script>
