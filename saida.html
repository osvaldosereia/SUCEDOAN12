<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Expedição Dona Antônia</title>
<style>
:root{--bg:#f3f4f6;--card:#fff;--txt:#111827;--mut:#6b7280;--bd:#e5e7eb;--pri:#111827;--ok:#059669;--warn:#d97706;--bad:#dc2626;--blue:#2563eb;--r:14px}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--txt);font-size:15px}.hidden{display:none!important}header{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--bd);padding:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}.brand{font-weight:900;font-size:17px;margin-right:auto}.btn{border:1px solid var(--bd);background:#fff;border-radius:12px;padding:11px 12px;font-weight:900;cursor:pointer;min-height:44px}.btn:active{transform:scale(.98)}.btn.primary{background:var(--pri);border-color:var(--pri);color:#fff}.btn.ok{background:var(--ok);border-color:var(--ok);color:#fff}.btn.warn{background:#fff7ed;border-color:#fed7aa;color:#9a3412}.btn.bad{background:#fef2f2;border-color:#fecaca;color:#991b1b}.btn.blue{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}.btn:disabled{opacity:.55;cursor:not-allowed}main{padding:12px;max-width:1200px;margin:auto}.grid{display:grid;grid-template-columns:1fr;gap:10px}.card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:12px;box-shadow:0 2px 10px rgba(0,0,0,.03)}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.row.nowrap{flex-wrap:nowrap}.grow{flex:1}.muted{color:var(--mut)}input,select,textarea{width:100%;border:1px solid var(--bd);border-radius:12px;padding:12px;background:#fff;font-size:15px;min-height:44px}label{font-size:12px;font-weight:900;color:var(--mut);text-transform:uppercase}.field{display:flex;flex-direction:column;gap:4px}.kpi{font-size:12px;font-weight:900;border:1px solid var(--bd);border-radius:999px;padding:7px 10px;background:#f9fafb}.tag{font-size:12px;font-weight:900;border-radius:999px;padding:6px 9px}.s-Aberto{background:#f3f4f6;color:#111827}.s-Separação{background:#fef3c7;color:#92400e}.s-Separado{background:#dbeafe;color:#1e40af}.s-Finalizado{background:#dcfce7;color:#166534}.s-Nota{background:#ede9fe;color:#5b21b6}.order-title{font-size:18px;font-weight:900}.order-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.section-title{font-weight:900;margin:14px 0 8px}.tabs{display:flex;gap:8px;overflow:auto;padding-bottom:8px}.tab{white-space:nowrap}.tab.active{background:#111827;color:white}.toast{position:fixed;left:50%;top:14px;transform:translateX(-50%) translateY(-150%);z-index:9999;max-width:92%;background:#111827;color:#fff;border-radius:999px;padding:12px 18px;font-weight:900;text-align:center;transition:.25s}.toast.show{transform:translateX(-50%) translateY(0)}.drawer{position:fixed;inset:0;background:rgba(17,24,39,.45);z-index:50;display:none;align-items:flex-end}.drawer.open{display:flex}.panel{background:#fff;width:100%;max-height:92vh;overflow:auto;border-radius:22px 22px 0 0;padding:14px}.settings-grid{display:grid;grid-template-columns:1fr;gap:10px}.sep-screen{position:fixed;inset:0;background:#fff;z-index:60;display:none;flex-direction:column}.sep-screen.open{display:flex}.sep-head{padding:10px;border-bottom:1px solid var(--bd);display:flex;gap:8px;align-items:center}.sep-body{flex:1;overflow:auto;padding:10px}.prod-img-box{height:34vh;min-height:190px;background:#f9fafb;border:1px solid var(--bd);border-radius:16px;display:flex;align-items:center;justify-content:center;overflow:hidden}.prod-img-box img{max-width:100%;max-height:100%;object-fit:contain}.prod-name{font-size:22px;font-weight:900;line-height:1.15;margin:12px 0}.big-number{font-size:34px;font-weight:900}.sep-footer{border-top:1px solid var(--bd);padding:8px;display:grid;grid-template-columns:1fr 1fr;gap:8px}.checkline{padding:10px;border:1px solid var(--bd);border-radius:12px;margin-top:8px}.checked{background:#ecfdf5;border-color:#a7f3d0}.label-page{display:none}.label{width:10cm;height:15cm;background:white;color:#000;padding:.55cm;font-family:Arial,Helvetica,sans-serif;display:flex;flex-direction:column;gap:.22cm}.label h1{font-size:22pt;margin:0;text-align:center;border-bottom:2px solid #000;padding-bottom:.2cm}.label .name{font-size:24pt;font-weight:900;text-transform:uppercase;line-height:1.05}.label .addr{font-size:18pt;font-weight:900;line-height:1.18}.label .info{font-size:14pt;font-weight:700}.label .pedido{font-size:20pt;font-weight:900;border:2px solid #000;padding:.15cm;text-align:center}.label .obs{font-size:13pt;border:1px solid #000;padding:.18cm;min-height:1.4cm}.label .total{margin-top:auto;font-size:16pt;font-weight:900;display:flex;justify-content:space-between;border-top:2px solid #000;padding-top:.2cm}@media(min-width:760px){.grid{grid-template-columns:repeat(2,1fr)}.settings-grid{grid-template-columns:repeat(2,1fr)}.order-actions{grid-template-columns:repeat(4,1fr)}header{padding:12px 18px}main{padding:18px}}@media(max-width:420px){body{font-size:14px}.btn{padding:10px 9px;font-size:13px}.brand{font-size:15px}.prod-name{font-size:20px}.big-number{font-size:30px}.sep-footer{grid-template-columns:1fr 1fr}.order-actions{grid-template-columns:1fr}}@media print{body>*{display:none!important}.label-page{display:block!important}.label{display:flex!important;margin:0;box-shadow:none}@page{size:10cm 15cm;margin:0}}
</style>
</head>
<body>
<header>
  <div class="brand">📦 Expedição</div>
  <button class="btn blue" id="btnRefresh">Atualizar</button>
  <button class="btn warn" id="btnSettings">Config</button>
  <button class="btn primary" id="btnPrintLast">Etiqueta</button>
</header>
<main>
  <div class="card">
    <div class="row">
      <div class="field grow"><label>Buscar pedido, cliente, telefone ou cidade</label><input id="q" placeholder="Digite para filtrar..."></div>
      <div class="field" style="min-width:160px"><label>Status</label><select id="statusFilter"><option value="">Todos</option><option>Aberto</option><option>Separação</option><option>Separado</option><option>Finalizado</option><option>Nota Emitida</option></select></div>
    </div>
    <div class="tabs" id="statusTabs" style="margin-top:10px"></div>
  </div>
  <div class="row" style="margin:12px 0"><span class="kpi" id="kpiOrders">0 pedidos</span><span class="kpi" id="kpiSync">offline/local</span><span class="kpi" id="kpiProducts">produtos: 0</span></div>
  <div class="grid" id="ordersGrid"></div>
</main>
<div id="toast" class="toast"></div>
<div id="settingsDrawer" class="drawer"><div class="panel"><div class="row"><h2 class="grow" style="margin:0">Configuração</h2><button class="btn bad" id="closeSettings">Fechar</button></div><p class="muted">Os tokens ficam salvos somente neste navegador. Para produção profissional, use um proxy/Make/Cloudflare Worker para proteger os tokens.</p><div class="settings-grid" id="settingsForm"></div><div class="row" style="margin-top:12px"><button class="btn ok grow" id="saveSettings">Salvar configuração</button><button class="btn blue grow" id="testConnections">Testar conexões</button></div></div></div>
<section id="sepScreen" class="sep-screen"><div class="sep-head"><button class="btn bad" id="closeSep">Sair</button><div class="grow"><b id="sepOrderTitle">Separação</b><br><small id="sepProgress" class="muted"></small></div><button class="btn ok" id="finishSepTop">Concluir</button></div><div class="sep-body"><div class="prod-img-box"><img id="sepImg" alt="produto"></div><div class="prod-name" id="sepName"></div><div class="card"><div class="row"><div class="grow"><label>Quantidade</label><div class="big-number" id="sepQty"></div></div><div><label>Gôndola</label><div class="big-number" id="sepGondola"></div></div><div><label>Prateleira</label><div class="big-number" id="sepShelf"></div></div></div><div class="row" style="margin-top:10px"><span class="kpi" id="sepCode"></span><span class="kpi" id="sepEan"></span></div></div><div id="sepCheckList"></div></div><div class="sep-footer"><button class="btn blue" id="prevItem">◀ Anterior</button><button class="btn blue" id="nextItem">Próximo ▶</button><button class="btn ok" id="markItem">✓ Marcar separado</button><button class="btn primary" id="finishSep">Concluir separação</button></div></section>
<div class="label-page"><div class="label" id="printLabel"></div></div>
<script>
(function(){
'use strict';
const LS_CFG='da_expedicao_cfg_v1', LS_STATE='da_expedicao_state_v1';
const STATUS=['Aberto','Separação','Separado','Finalizado','Nota Emitida'];
let cfg=load(LS_CFG,{blingBase:'https://api.bling.com.br/Api/v3',blingToken:'',proxyUrl:'',githubToken:'',githubOwner:'',githubRepo:'',githubBranch:'main',separacaoPath:'expedicao/separacao.json',produtosJsonUrl:'',siteBaseUrl:'',diasBusca:7,statusIds:{Aberto:'',Separação:'',Separado:'',Finalizado:'',NotaEmitida:''}});
let state=load(LS_STATE,{orders:[],statusLocal:{},separacao:{},products:[],lastLabel:null,updatedAt:0});
let sep={order:null,items:[],idx:0};
const $=s=>document.querySelector(s);
const els={grid:$('#ordersGrid'),q:$('#q'),statusFilter:$('#statusFilter'),tabs:$('#statusTabs'),toast:$('#toast')};
function load(k,d){try{return Object.assign(d,JSON.parse(localStorage.getItem(k)||'{}'))}catch(e){return d}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
function toast(msg,bad){els.toast.textContent=msg;els.toast.style.background=bad?'#dc2626':'#111827';els.toast.classList.add('show');setTimeout(()=>els.toast.classList.remove('show'),2600)}
function esc(v){return String(v??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function norm(s){return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim()}
function keyStatus(s){return String(s||'').replace(/\s+/g,'')}
async function apiBling(path,opts={}){ if(cfg.proxyUrl){return apiProxy('bling',path,opts)} if(!cfg.blingToken)throw new Error('Token do Bling não configurado'); const r=await fetch(cfg.blingBase+path,{...opts,headers:{'Authorization':'Bearer '+cfg.blingToken,'Accept':'application/json','Content-Type':'application/json',...(opts.headers||{})}}); const tx=await r.text(); if(!r.ok)throw new Error('Bling '+r.status+': '+tx.slice(0,250)); return tx?JSON.parse(tx):{} }
async function apiProxy(service,path,opts={}){ const r=await fetch(cfg.proxyUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({service,path,method:opts.method||'GET',body:opts.body?JSON.parse(opts.body):null,config:cfg})}); const tx=await r.text(); if(!r.ok)throw new Error('Proxy '+r.status+': '+tx.slice(0,250)); return tx?JSON.parse(tx):{} }
async function gh(path,method='GET',body){ if(cfg.proxyUrl)return apiProxy('github','/repos/'+cfg.githubOwner+'/'+cfg.githubRepo+'/contents/'+encodeURIComponent(path),{method,body:body?JSON.stringify(body):null}); if(!cfg.githubToken)throw new Error('Token do GitHub não configurado'); const url='https://api.github.com/repos/'+cfg.githubOwner+'/'+cfg.githubRepo+'/contents/'+path.split('/').map(encodeURIComponent).join('/'); const r=await fetch(url,{method,headers:{'Authorization':'Bearer '+cfg.githubToken,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},body:body?JSON.stringify(body):undefined}); const tx=await r.text(); if(!r.ok){ if(r.status===404) return null; throw new Error('GitHub '+r.status+': '+tx.slice(0,250)); } return tx?JSON.parse(tx):{} }
function b64enc(str){return btoa(unescape(encodeURIComponent(str)))}
function b64dec(str){return decodeURIComponent(escape(atob(String(str||'').replace(/\n/g,''))))}
async function readJsonFromGithub(path,def){ const f=await gh(path,'GET'); if(!f||!f.content)return {data:def,sha:null}; return {data:JSON.parse(b64dec(f.content)),sha:f.sha}; }
async function writeJsonToGithub(path,data,msg){ const cur=await gh(path,'GET'); const body={message:msg||('Atualiza '+path),content:b64enc(JSON.stringify(data,null,2)),branch:cfg.githubBranch}; if(cur&&cur.sha)body.sha=cur.sha; return gh(path,'PUT',body); }
async function loadProducts(){ try{ if(!cfg.produtosJsonUrl){state.products=[];return} const url=cfg.produtosJsonUrl+(cfg.produtosJsonUrl.includes('?')?'&':'?')+'_='+Date.now(); const r=await fetch(url,{cache:'no-store'}); const data=await r.json(); state.products=Array.isArray(data)?data:Object.values(data||{}); save(LS_STATE,state); }catch(e){toast('Não carregou produtos.json: '+e.message,true)} updateKpis(); }
function productInfo(item){ const p=item.produto||item; const codigo=String(p.codigo||item.codigo||''); const gtin=String(p.gtin||p.ean||item.gtin||''); const id=String(p.id||item.idProduto||''); const found=state.products.find(x=>String(x.codigo||'')===codigo||String(x.gtin||'')===gtin||String(x.id||'')===id) || {}; let img=found.url_imagem||p.imagemURL||p.image||''; if(img&&img.startsWith('../')&&cfg.siteBaseUrl)img=cfg.siteBaseUrl.replace(/\/$/,'/')+img.replace(/^\.\.\//,''); if(img&&img.startsWith('/')&&cfg.siteBaseUrl)img=cfg.siteBaseUrl.replace(/\/$/,'')+img; return {nome:p.nome||item.descricao||found.nome||'Produto',codigo:codigo||found.codigo||'',gtin:gtin||found.gtin||'',qtde:Number(item.quantidade||item.qtde||1),gondola:found.gondola||found.gôndola||'-',prateleira:found.prateleira||'-',img:img||found.imagem||'',raw:item,produto:found}; }
async function refreshOrders(){ try{ $('#kpiSync').textContent='carregando Bling...'; await loadProducts(); const end=new Date(); const start=new Date(Date.now()-Number(cfg.diasBusca||7)*864e5); const qs='?pagina=1&limite=100&dataInicial='+start.toISOString().slice(0,10)+'&dataFinal='+end.toISOString().slice(0,10); const res=await apiBling('/pedidos/vendas'+qs); const arr=res.data||res.retorno?.pedidos||res.pedidos||[]; state.orders=arr.map(o=>o.pedido||o); state.updatedAt=Date.now(); save(LS_STATE,state); render(); toast('Pedidos atualizados'); }catch(e){$('#kpiSync').textContent='erro/conferir config'; toast(e.message,true); render()} }
async function getOrderDetails(id){ const res=await apiBling('/pedidos/vendas/'+id); return res.data||res.pedido||res; }
function orderStatus(o){ const id=String(o.situacao?.id||o.situacaoId||''); const local=state.statusLocal[o.id]; if(local)return local; for(const s of STATUS){ if(String(cfg.statusIds[keyStatus(s)]||'')===id) return s; } const txt=String(o.situacao?.valor||o.situacao?.nome||''); if(/aberto/i.test(txt))return 'Aberto'; if(/separa/i.test(txt))return 'Separação'; if(/separado/i.test(txt))return 'Separado'; if(/final/i.test(txt))return 'Finalizado'; if(/nota/i.test(txt)||/atendido/i.test(txt))return 'Nota Emitida'; return 'Aberto'; }
async function changeStatus(id,status){ const order=state.orders.find(o=>String(o.id)===String(id))||{}; const sid=cfg.statusIds[keyStatus(status)]; try{ if(sid) await apiBling('/pedidos/vendas/'+id+'/situacoes/'+sid,{method:'PATCH'}); state.statusLocal[id]=status; save(LS_STATE,state); if(status==='Separação') await sendToSeparation(id); if(status==='Finalizado') askInvoice(id); render(); toast('Status alterado para '+status); }catch(e){toast('Falha ao mudar status: '+e.message,true)} }
async function sendToSeparation(id){ const full=await getOrderDetails(id); const itens=(full.itens||full.items||[]).map(productInfo).sort((a,b)=>String(a.gondola).localeCompare(String(b.gondola),'pt-BR',{numeric:true})||String(a.prateleira).localeCompare(String(b.prateleira),'pt-BR',{numeric:true})); const rec={id:String(id),numero:full.numero||full.numeroPedidoLoja||id,status:'Separação',updatedAt:new Date().toISOString(),pedido:full,itens,checks:{}}; let base={pedidos:{},updatedAt:null}; try{base=(await readJsonFromGithub(cfg.separacaoPath,{pedidos:{}})).data||base}catch(e){} if(!base.pedidos)base.pedidos={}; base.pedidos[id]=rec; base.updatedAt=new Date().toISOString(); await writeJsonToGithub(cfg.separacaoPath,base,'Envia pedido '+(rec.numero||id)+' para separação'); state.separacao[id]=rec; save(LS_STATE,state); }
async function openSeparation(id){ try{ let rec=state.separacao[id]; if(!rec){try{const base=(await readJsonFromGithub(cfg.separacaoPath,{pedidos:{}})).data; rec=base?.pedidos?.[id]}catch(e){}} if(!rec){await sendToSeparation(id); rec=state.separacao[id];} sep.order=rec; sep.items=(rec.itens||[]).sort((a,b)=>String(a.gondola).localeCompare(String(b.gondola),'pt-BR',{numeric:true})||String(a.prateleira).localeCompare(String(b.prateleira),'pt-BR',{numeric:true})); sep.idx=0; $('#sepScreen').classList.add('open'); renderSep(); }catch(e){toast('Erro ao abrir separação: '+e.message,true)} }
function renderSep(){ const it=sep.items[sep.idx]||{}; $('#sepOrderTitle').textContent='Pedido '+(sep.order?.numero||sep.order?.id||''); $('#sepProgress').textContent=(sep.idx+1)+' de '+sep.items.length+' produtos'; $('#sepImg').src=it.img||''; $('#sepName').textContent=it.nome||''; $('#sepQty').textContent=it.qtde||1; $('#sepGondola').textContent=it.gondola||'-'; $('#sepShelf').textContent=it.prateleira||'-'; $('#sepCode').textContent='Código: '+(it.codigo||'-'); $('#sepEan').textContent='EAN: '+(it.gtin||'-'); const checks=sep.order.checks||{}; $('#sepCheckList').innerHTML=sep.items.map((x,i)=>`<div class="checkline ${checks[i]?'checked':''}" onclick="window.__setSepIdx(${i})"><b>${checks[i]?'✓ ':'□ '}${esc(x.nome)}</b><br><span class="muted">Qtd ${x.qtde} • Gôndola ${esc(x.gondola)} • Prat. ${esc(x.prateleira)}</span></div>`).join(''); }
window.__setSepIdx=i=>{sep.idx=i;renderSep()};
function markCurrent(){ if(!sep.order)return; sep.order.checks=sep.order.checks||{}; sep.order.checks[sep.idx]=true; state.separacao[sep.order.id]=sep.order; save(LS_STATE,state); if(sep.idx<sep.items.length-1)sep.idx++; renderSep(); }
async function finishSeparation(){ if(!sep.order)return; const total=sep.items.length; const done=Object.values(sep.order.checks||{}).filter(Boolean).length; if(done<total&&!confirm('Ainda faltam produtos marcados. Concluir mesmo assim?'))return; try{sep.order.status='Separado'; sep.order.updatedAt=new Date().toISOString(); let base={pedidos:{}}; try{base=(await readJsonFromGithub(cfg.separacaoPath,{pedidos:{}})).data||base}catch(e){} base.pedidos=base.pedidos||{}; base.pedidos[sep.order.id]=sep.order; base.updatedAt=new Date().toISOString(); await writeJsonToGithub(cfg.separacaoPath,base,'Conclui separação pedido '+sep.order.numero); await changeStatus(sep.order.id,'Separado'); $('#sepScreen').classList.remove('open'); toast('Separação concluída'); }catch(e){toast('Erro ao concluir: '+e.message,true)} }
function askInvoice(id){ setTimeout(()=>{ if(confirm('Etiqueta/finalização feita. Quer emitir a nota fiscal agora?')) emitInvoice(id); },200); }
async function emitInvoice(id){ toast('Emissão de nota precisa do endpoint/configuração fiscal do Bling. Botão reservado.'); }
function extractAddress(o){ const c=o.contato||o.cliente||{}; const e=c.endereco?.geral||c.endereco||o.transporte?.enderecoEntrega||{}; return {nome:c.nome||o.nomeContato||'CLIENTE',fone:c.celular||c.telefone||'',rua:e.endereco||e.logradouro||'',num:e.numero||'',compl:e.complemento||'',bairro:e.bairro||'',cidade:e.municipio||e.cidade||'',uf:e.uf||'',cep:e.cep||'',obs:o.observacoes||o.observacao||o.obs||'',total:o.total||o.totalPedido||0,numero:o.numero||o.numeroPedidoLoja||o.id}; }
async function printLabel(id){ try{ let o=state.orders.find(x=>String(x.id)===String(id)); try{o=await getOrderDetails(id)}catch(e){} const a=extractAddress(o||{}); $('#printLabel').innerHTML=`<h1>DONA ANTÔNIA</h1><div class="pedido">PEDIDO ${esc(a.numero)}</div><div class="name">${esc(a.nome)}</div><div class="addr">${esc(a.rua)}, ${esc(a.num)}<br>${esc(a.compl)}<br>${esc(a.bairro)}<br>${esc(a.cidade)} - ${esc(a.uf)}<br>CEP ${esc(a.cep)}</div><div class="info">Telefone: ${esc(a.fone)}</div><div class="obs"><b>OBS:</b> ${esc(a.obs||'')}</div><div class="total"><span>Total</span><span>${money(a.total)}</span></div>`; state.lastLabel=id; save(LS_STATE,state); await changeStatus(id,'Finalizado'); setTimeout(()=>window.print(),350); }catch(e){toast('Erro etiqueta: '+e.message,true)} }
function renderTabs(){ const counts={}; STATUS.forEach(s=>counts[s]=0); state.orders.forEach(o=>counts[orderStatus(o)]++); els.tabs.innerHTML=[''].concat(STATUS).map(s=>`<button class="btn tab ${els.statusFilter.value===s?'active':''}" data-s="${s}">${s||'Todos'} ${s?counts[s]:state.orders.length}</button>`).join(''); els.tabs.querySelectorAll('button').forEach(b=>b.onclick=()=>{els.statusFilter.value=b.dataset.s;render()}); }
function render(){ renderTabs(); const q=norm(els.q.value), sf=els.statusFilter.value; let list=state.orders.filter(o=>{const st=orderStatus(o); if(sf&&st!==sf)return false; const c=o.contato||{}; const blob=norm([o.id,o.numero,o.numeroPedidoLoja,c.nome,c.celular,c.telefone,c.endereco?.geral?.municipio].join(' ')); return !q||blob.includes(q);}); $('#kpiOrders').textContent=list.length+' pedidos'; $('#kpiSync').textContent=state.updatedAt?'atualizado '+new Date(state.updatedAt).toLocaleString('pt-BR'):'local'; updateKpis(); if(!list.length){els.grid.innerHTML='<div class="card"><b>Nenhum pedido encontrado.</b><p class="muted">Atualize do Bling ou limpe os filtros.</p></div>';return} els.grid.innerHTML=list.map(o=>{const c=o.contato||{}; const st=orderStatus(o); return `<div class="card"><div class="row"><div class="grow"><div class="order-title">Pedido ${esc(o.numero||o.numeroPedidoLoja||o.id)}</div><div class="muted">${esc(c.nome||'Cliente')} • ${esc(c.celular||c.telefone||'')}</div></div><span class="tag s-${st.split(' ')[0]}">${esc(st)}</span></div><div class="row" style="margin-top:8px"><span class="kpi">${money(o.total||o.totalPedido)}</span><span class="kpi">${esc(o.data||'')}</span></div><div class="field" style="margin-top:10px"><label>Trocar status</label><select data-status="${esc(o.id)}">${STATUS.map(s=>`<option ${s===st?'selected':''}>${s}</option>`).join('')}</select></div><div class="order-actions"><button class="btn warn" data-sep="${esc(o.id)}">Separar</button><button class="btn primary" data-label="${esc(o.id)}">Etiqueta 10x15</button><button class="btn blue" data-nf="${esc(o.id)}">Emitir nota</button><button class="btn" data-json="${esc(o.id)}">Enviar separação</button></div></div>`}).join(''); els.grid.querySelectorAll('[data-status]').forEach(s=>s.onchange=()=>changeStatus(s.dataset.status,s.value)); els.grid.querySelectorAll('[data-sep]').forEach(b=>b.onclick=()=>openSeparation(b.dataset.sep)); els.grid.querySelectorAll('[data-label]').forEach(b=>b.onclick=()=>printLabel(b.dataset.label)); els.grid.querySelectorAll('[data-nf]').forEach(b=>b.onclick=()=>emitInvoice(b.dataset.nf)); els.grid.querySelectorAll('[data-json]').forEach(b=>b.onclick=()=>sendToSeparation(b.dataset.json).then(()=>toast('Pedido enviado para separação'))); }
function updateKpis(){ $('#kpiProducts').textContent='produtos: '+(state.products?.length||0); }
function buildSettings(){ const f=$('#settingsForm'); const fields=[['blingToken','Token Bling','password'],['proxyUrl','Proxy opcional / webhook','text'],['githubToken','Token GitHub','password'],['githubOwner','Dono GitHub','text'],['githubRepo','Repositório GitHub','text'],['githubBranch','Branch','text'],['separacaoPath','Arquivo separação','text'],['produtosJsonUrl','URL pública produtos.json','text'],['siteBaseUrl','Base imagens do site','text'],['diasBusca','Dias para buscar pedidos','number'],['statusIds.Aberto','ID status Aberto no Bling','text'],['statusIds.Separação','ID status Separação no Bling','text'],['statusIds.Separado','ID status Separado no Bling','text'],['statusIds.Finalizado','ID status Finalizado no Bling','text'],['statusIds.NotaEmitida','ID status Nota Emitida no Bling','text']]; f.innerHTML=fields.map(([k,l,t])=>`<div class="field"><label>${l}</label><input type="${t}" data-cfg="${k}" value="${esc(getCfg(k)||'')}"></div>`).join(''); }
function getCfg(k){return k.includes('.')?k.split('.').reduce((a,p)=>a&&a[p],cfg):cfg[k]}
function setCfg(k,v){ if(k.includes('.')){const [a,b]=k.split('.'); cfg[a]=cfg[a]||{}; cfg[a][b]=v}else cfg[k]=v }
async function testConnections(){ try{ await apiBling('/pedidos/vendas?pagina=1&limite=1'); toast('Bling OK'); }catch(e){toast('Bling: '+e.message,true)} try{ if(cfg.githubOwner&&cfg.githubRepo) await gh(cfg.separacaoPath,'GET'); toast('GitHub OK ou arquivo ainda não existe'); }catch(e){toast('GitHub: '+e.message,true)} }
$('#btnSettings').onclick=()=>{$('#settingsDrawer').classList.add('open');buildSettings()}; $('#closeSettings').onclick=()=>$('#settingsDrawer').classList.remove('open'); $('#saveSettings').onclick=()=>{$$('#settingsForm [data-cfg]').forEach(i=>setCfg(i.dataset.cfg,i.value.trim()));save(LS_CFG,cfg);toast('Configuração salva')}; function $$(s){return Array.from(document.querySelectorAll(s))}
$('#testConnections').onclick=testConnections; $('#btnRefresh').onclick=refreshOrders; els.q.oninput=render; els.statusFilter.onchange=render; $('#closeSep').onclick=()=>$('#sepScreen').classList.remove('open'); $('#prevItem').onclick=()=>{sep.idx=Math.max(0,sep.idx-1);renderSep()}; $('#nextItem').onclick=()=>{sep.idx=Math.min(sep.items.length-1,sep.idx+1);renderSep()}; $('#markItem').onclick=markCurrent; $('#finishSep').onclick=finishSeparation; $('#finishSepTop').onclick=finishSeparation; $('#btnPrintLast').onclick=()=>state.lastLabel?printLabel(state.lastLabel):toast('Abra um pedido e gere uma etiqueta primeiro',true);
render(); if(state.orders.length) loadProducts();
})();
</script>
