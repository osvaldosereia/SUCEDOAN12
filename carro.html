<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Leitor de Prompts de Vídeo</title>
  <style>
    :root {
      --bg: #f7f3ed;
      --card: #fffaf4;
      --text: #211b16;
      --muted: #776b61;
      --line: #eadfd3;
      --brand: #7b3f19;
      --brand-dark: #321d12;
      --soft: #efe4d8;
      --ok: #267547;
      --danger: #a53b2b;
      --shadow: 0 16px 44px rgba(48, 31, 17, .09);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: min(100%, 920px);
      margin: 0 auto;
      padding: 12px 12px 40px;
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: 0 -12px 12px;
      padding: 12px;
      background: rgba(247, 243, 237, .94);
      border-bottom: 1px solid rgba(234, 223, 211, .9);
      backdrop-filter: blur(14px);
    }

    .top-inner {
      width: min(100%, 920px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
      letter-spacing: -.02em;
    }

    .sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .pill {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--muted);
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
    }

    .status {
      margin: 0 0 12px;
      padding: 12px 14px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .status.ok { border-color: rgba(38, 117, 71, .24); }
    .status.err { border-color: rgba(165, 59, 43, .28); color: var(--danger); }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 8px;
      margin-bottom: 12px;
    }

    .field {
      width: 100%;
      min-height: 46px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 0 14px;
      font: inherit;
      color: var(--text);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 26px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .content { padding: 16px; }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .tag {
      background: var(--soft);
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 12px;
      line-height: 1;
    }

    .title {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: -.03em;
    }

    .desc {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .prompt-box {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      min-height: 280px;
    }

    .prompt-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 760;
    }

    .prompt {
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      font-size: 14px;
      line-height: 1.58;
      max-height: 65vh;
      overflow: auto;
      padding-right: 4px;
    }

    .actions,
    .nav {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .actions { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    button {
      border: 0;
      border-radius: 15px;
      min-height: 46px;
      padding: 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 760;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform .08s ease, opacity .14s ease;
    }
    button:active { transform: scale(.985); }
    button:disabled { opacity: .45; cursor: not-allowed; }

    .btn-soft { background: var(--soft); color: var(--brand-dark); }
    .btn-main { background: var(--brand); color: #fff; }
    .btn-dark { background: var(--brand-dark); color: #fff; }

    .empty {
      background: var(--card);
      border: 1px dashed var(--line);
      border-radius: 20px;
      padding: 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    code {
      background: rgba(0, 0, 0, .05);
      border-radius: 6px;
      padding: 2px 5px;
    }

    @media (max-width: 720px) {
      .toolbar,
      .actions,
      .nav,
      .top-inner {
        grid-template-columns: 1fr;
      }
      .pill { justify-self: start; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="top-inner">
        <div>
          <h1>Leitor de Prompts de Vídeo</h1>
          <p class="sub">Lê apenas o <strong>videododia.json</strong> dentro da pasta <strong>video/</strong> e mostra só o prompt pronto para copiar.</p>
        </div>
        <div class="pill" id="repoPill">GitHub</div>
      </div>
    </header>

    <section class="status" id="status">Carregando...</section>

    <section class="toolbar">
      <input id="manualPath" class="field" type="text" placeholder="Abrir pasta específica. Ex.: video/20260619-174524-video-institucional-dona-antonia" />
      <button class="btn-soft" id="openManual">Abrir pasta</button>
      <button class="btn-soft" id="refreshBtn">Atualizar</button>
      <button class="btn-soft" id="copyPromptTop">Copiar prompt</button>
    </section>

    <section id="viewer"></section>
  </main>

  <script>
    const CONFIG = {
      owner: 'osvaldosereia',
      repo: 'SUCEDOAN12',
      branch: 'main',
      rootPath: 'video',
      dataFileNames: ['videododia.json', 'video-do-dia.json', 'video_do_dia.json', 'dados.json', 'prompt.json']
    };

    const state = {
      folders: [],
      index: 0,
      loading: false,
      currentData: null,
      currentFolder: null
    };

    const $status = document.getElementById('status');
    const $viewer = document.getElementById('viewer');
    const $repoPill = document.getElementById('repoPill');
    const $manualPath = document.getElementById('manualPath');
    const $copyPromptTop = document.getElementById('copyPromptTop');

    $repoPill.textContent = `${CONFIG.owner}/${CONFIG.repo}`;

    document.getElementById('openManual').addEventListener('click', openManualPath);
    document.getElementById('refreshBtn').addEventListener('click', () => init(true));
    $copyPromptTop.addEventListener('click', async (event) => {
      if (!state.currentData?.prompt) return;
      await copyText(state.currentData.prompt);
      flashButton(event.currentTarget, 'Prompt copiado');
    });

    $manualPath.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') openManualPath();
    });

    init();

    async function init(force = false) {
      try {
        setStatus('Procurando pastas de vídeo no GitHub...', '');
        if (force) {
          state.folders = [];
          state.index = 0;
          state.currentData = null;
          state.currentFolder = null;
        }

        const folders = await fetchVideoFolders();
        state.folders = folders;

        if (!folders.length) {
          renderEmpty('Nenhuma pasta encontrada dentro de video/.');
          setStatus('Nenhuma pasta encontrada.', 'err');
          return;
        }

        await loadAndRender(0);
      } catch (error) {
        console.error(error);
        setStatus(`Erro: ${error.message}`, 'err');
        renderEmpty(error.message);
      }
    }

    async function fetchVideoFolders() {
      const items = await fetchGithubContents(CONFIG.rootPath);
      return items
        .filter(item => item && item.type === 'dir')
        .map(item => ({
          id: item.name,
          path: cleanPath(item.path || `${CONFIG.rootPath}/${item.name}`),
          htmlUrl: item.html_url || ''
        }))
        .sort((a, b) => {
          const tb = parseIdDate(b.id);
          const ta = parseIdDate(a.id);
          if (tb !== ta) return tb - ta;
          return b.id.localeCompare(a.id);
        });
    }

    async function loadAndRender(index) {
      if (state.loading) return;
      const folder = state.folders[index];
      if (!folder) return;

      state.loading = true;
      state.index = index;
      state.currentFolder = folder;

      try {
        setStatus(`Lendo ${folder.id}...`, 'ok');
        const data = await fetchPromptData(folder.path);
        state.currentData = data;
        renderPrompt(folder, data);
        setStatus(`Mostrando ${state.index + 1} de ${state.folders.length}: ${folder.id}`, 'ok');
      } catch (error) {
        console.error(error);
        setStatus(`Erro ao ler ${folder.id}: ${error.message}`, 'err');
        renderEmpty(error.message, folder.path);
      } finally {
        state.loading = false;
      }
    }

    async function openManualPath() {
      const raw = String($manualPath.value || '').trim();
      if (!raw) return;

      const path = cleanPath(raw);
      const normalized = path.startsWith('video/') ? path : `video/${path}`;

      try {
        setStatus(`Abrindo ${normalized}...`, 'ok');
        const folderId = normalized.split('/').pop();
        const folder = { id: folderId, path: normalized, htmlUrl: '' };
        state.currentFolder = folder;
        const data = await fetchPromptData(normalized);
        state.currentData = data;
        renderPrompt(folder, data, true);
        setStatus(`Pasta aberta manualmente: ${normalized}`, 'ok');
      } catch (error) {
        console.error(error);
        setStatus(`Erro ao abrir pasta manual: ${error.message}`, 'err');
      }
    }

    async function fetchPromptData(folderPath) {
      let folderItems = [];
      try {
        folderItems = await fetchGithubContents(folderPath);
      } catch (error) {
        throw new Error(`não consegui listar a pasta ${folderPath}`);
      }

      const jsonFile = resolveJsonFile(folderItems, folderPath);
      const raw = await fetchRawText(jsonFile.rawUrl);
      const json = safeJsonParse(raw);
      const prompt = extractPrompt(json);

      return {
        json,
        prompt: prompt || '',
        jsonFileName: jsonFile.name,
        folderPath,
        folderItems
      };
    }

    function resolveJsonFile(folderItems, folderPath) {
      for (const fileName of CONFIG.dataFileNames) {
        const found = folderItems.find(item => item.type === 'file' && item.name.toLowerCase() === fileName.toLowerCase());
        if (found) {
          return {
            name: found.name,
            rawUrl: found.download_url || rawUrl(found.path)
          };
        }
      }

      const anyJson = folderItems.find(item => item.type === 'file' && /\.json$/i.test(item.name || ''));
      if (anyJson) {
        return {
          name: anyJson.name,
          rawUrl: anyJson.download_url || rawUrl(anyJson.path)
        };
      }

      throw new Error(`nenhum arquivo JSON encontrado em ${folderPath}`);
    }

    function extractPrompt(json) {
      const directFields = [
        'prompt_gemini', 'prompt', 'prompt_final', 'prompt_principal', 'texto_prompt', 'gemini_prompt'
      ];

      for (const field of directFields) {
        const value = deepFind(json, field);
        if (isGoodPrompt(value)) return cleanText(value);
      }

      const nestedCandidates = [
        deepFind(json, 'result'),
        deepFind(json, 'content'),
        deepFind(json, 'mensagem'),
        deepFind(json, 'texto')
      ];

      for (const value of nestedCandidates) {
        const candidate = stringifyAny(value);
        if (isGoodPrompt(candidate)) return cleanText(candidate);
      }

      const recursive = findPromptRecursively(json);
      if (recursive) return cleanText(recursive);

      return '';
    }

    function findPromptRecursively(node) {
      if (!node) return '';
      if (typeof node === 'string') {
        return isGoodPrompt(node) ? node : '';
      }
      if (Array.isArray(node)) {
        for (const item of node) {
          const found = findPromptRecursively(item);
          if (found) return found;
        }
        return '';
      }
      if (typeof node === 'object') {
        for (const [key, value] of Object.entries(node)) {
          if (/prompt/i.test(key) && isGoodPrompt(value)) return stringifyAny(value);
        }
        for (const value of Object.values(node)) {
          const found = findPromptRecursively(value);
          if (found) return found;
        }
      }
      return '';
    }

    function isGoodPrompt(value) {
      const text = cleanText(stringifyAny(value));
      if (!text) return false;
      if (text === '[object Object]' || text === '{object}') return false;
      return text.length > 80;
    }

    function renderPrompt(folder, data, manual = false) {
      const prompt = cleanText(data.prompt || '');
      const canNewer = !manual && state.index > 0;
      const canOlder = !manual && state.index < state.folders.length - 1;

      $viewer.innerHTML = `
        <article class="card">
          <div class="content">
            <div class="meta">
              <span class="tag">${escapeHtml(folder.id)}</span>
              <span class="tag">${escapeHtml(data.folderPath)}</span>
              <span class="tag">${escapeHtml(data.jsonFileName)}</span>
              ${manual ? '<span class="tag">abertura manual</span>' : `<span class="tag">${escapeHtml(String(state.index + 1))} de ${escapeHtml(String(state.folders.length))}</span>`}
            </div>

            <h2 class="title">Prompt pronto para copiar</h2>
            <p class="desc">Este leitor mostra apenas o texto do prompt salvo no JSON. Se o cenário estiver salvando corretamente o campo <code>prompt_gemini</code>, ele aparece automaticamente aqui.</p>

            <div class="prompt-box">
              <div class="prompt-head">
                <span>Conteúdo do prompt</span>
                <span>${escapeHtml(String(prompt.length))} caracteres</span>
              </div>
              <div class="prompt" id="promptText">${escapeHtml(prompt || 'Não encontrei um prompt válido dentro do JSON.')}</div>
            </div>

            <div class="actions">
              <button class="btn-dark" id="copyPromptBtn" ${!prompt ? 'disabled' : ''}>Copiar prompt</button>
              <button class="btn-main" id="openGithubBtn">Abrir pasta no GitHub</button>
            </div>

            ${manual ? '' : `
              <div class="nav">
                <button class="btn-soft" id="newerBtn" ${!canNewer ? 'disabled' : ''}>Vídeo mais novo</button>
                <button class="btn-soft" id="olderBtn" ${!canOlder ? 'disabled' : ''}>Vídeo anterior</button>
              </div>
            `}
          </div>
        </article>
      `;

      document.getElementById('copyPromptBtn')?.addEventListener('click', async (event) => {
        await copyText(prompt);
        flashButton(event.currentTarget, 'Prompt copiado');
      });

      document.getElementById('openGithubBtn')?.addEventListener('click', () => {
        const url = folder.htmlUrl || `https://github.com/${CONFIG.owner}/${CONFIG.repo}/tree/${encodeURIComponent(CONFIG.branch)}/${encodePath(folder.path)}`;
        window.open(url, '_blank', 'noopener');
      });

      document.getElementById('newerBtn')?.addEventListener('click', async () => {
        if (state.index <= 0) return;
        await loadAndRender(state.index - 1);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      document.getElementById('olderBtn')?.addEventListener('click', async () => {
        if (state.index >= state.folders.length - 1) return;
        await loadAndRender(state.index + 1);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }

    function renderEmpty(extra = '', path = '') {
      $viewer.innerHTML = `
        <div class="empty">
          <strong>Nada encontrado para mostrar.</strong><br><br>
          O site procura pastas dentro de <code>video/</code> e arquivos como:<br><br>
          ${CONFIG.dataFileNames.map(name => `<code>${escapeHtml(name)}</code>`).join('<br>')}<br><br>
          ${path ? `Pasta analisada: <code>${escapeHtml(path)}</code><br><br>` : ''}
          ${extra ? `Detalhe: ${escapeHtml(extra)}` : ''}
        </div>
      `;
    }

    async function fetchGithubContents(path) {
      const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${encodePath(path)}?ref=${encodeURIComponent(CONFIG.branch)}`;
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`GitHub retornou ${res.status}`);
      const json = await res.json();
      return Array.isArray(json) ? json : [];
    }

    async function fetchRawText(url) {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`JSON retornou ${res.status}`);
      return await res.text();
    }

    function safeJsonParse(text) {
      const base = String(text || '').replace(/^\uFEFF/, '').trim();
      const attempts = [
        base,
        base.replace(/^```(?:json)?\s*/i, '').replace(/```$/i, '').trim(),
        base.replace(/,\s*([}\]])/g, '$1')
      ];

      for (const attempt of attempts) {
        try {
          const parsed = JSON.parse(attempt);
          return parsed;
        } catch (_) {}
      }

      throw new Error('não consegui interpretar o JSON');
    }

    function deepFind(obj, targetField) {
      if (!obj || typeof obj !== 'object') return undefined;
      const target = String(targetField).toLowerCase();
      const stack = [obj];
      const seen = new Set();

      while (stack.length) {
        const current = stack.shift();
        if (!current || typeof current !== 'object' || seen.has(current)) continue;
        seen.add(current);

        for (const [key, value] of Object.entries(current)) {
          if (String(key).toLowerCase() === target) return value;
          if (value && typeof value === 'object') stack.push(value);
        }
      }
      return undefined;
    }

    function stringifyAny(value) {
      if (value == null) return '';
      if (typeof value === 'string') return value;
      if (Array.isArray(value)) return value.map(stringifyAny).filter(Boolean).join('\n');
      if (typeof value === 'object') {
        const directText = value.text || value.prompt || value.prompt_gemini || value.result || value.content;
        if (typeof directText === 'string') return directText;
        try { return JSON.stringify(value, null, 2); } catch (_) { return String(value); }
      }
      return String(value);
    }

    function cleanText(value) {
      return String(value || '')
        .replace(/^\uFEFF/, '')
        .replace(/^```(?:json|text|txt|markdown|md)?\s*/i, '')
        .replace(/```$/i, '')
        .replace(/```/g, '')
        .replace(/\\n/g, '\n')
        .replace(/\\r/g, '')
        .replace(/\r\n/g, '\n')
        .replace(/\r/g, '\n')
        .trim();
    }

    async function copyText(text) {
      if (!text) return;
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      textarea.style.top = '0';
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      document.execCommand('copy');
      textarea.remove();
    }

    function flashButton(button, message) {
      const original = button.textContent;
      button.textContent = message;
      button.disabled = true;
      setTimeout(() => {
        button.textContent = original;
        button.disabled = false;
      }, 1200);
    }

    function setStatus(message, type = '') {
      $status.className = `status${type ? ` ${type}` : ''}`;
      $status.innerHTML = escapeHtml(message);
    }

    function parseIdDate(id) {
      const text = String(id || '');
      const match = text.match(/(\d{4})(\d{2})(\d{2})[-_ ]?(\d{2})?(\d{2})?(\d{2})?/);
      if (!match) return 0;
      const year = Number(match[1]);
      const month = Number(match[2]) - 1;
      const day = Number(match[3]);
      const hour = Number(match[4] || 0);
      const minute = Number(match[5] || 0);
      const second = Number(match[6] || 0);
      return Date.UTC(year, month, day, hour, minute, second) || 0;
    }

    function rawUrl(path) {
      return `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${encodeURIComponent(CONFIG.branch)}/${encodePath(path)}`;
    }

    function encodePath(path) {
      return cleanPath(path).split('/').map(encodeURIComponent).join('/');
    }

    function cleanPath(path) {
      return String(path || '').replace(/^\/+|\/+$/g, '').replace(/\/+/g, '/');
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
