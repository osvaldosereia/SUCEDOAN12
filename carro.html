<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <link rel="preconnect" href="https://api.github.com" />
  <link rel="preconnect" href="https://raw.githubusercontent.com" />
  <link rel="dns-prefetch" href="https://api.github.com" />
  <link rel="dns-prefetch" href="https://raw.githubusercontent.com" />
  <title>Leitor de Vídeos Dona Antônia</title>
  <style>
    :root {
      --bg: #f7f3ed;
      --card: #fffaf4;
      --text: #211b16;
      --muted: #776b61;
      --line: #eadfd3;
      --brand: #7b3f19;
      --brand-dark: #321d12;
      --soft: #efe4d8;
      --danger: #a53b2b;
      --ok: #267547;
      --shadow: 0 16px 44px rgba(48, 31, 17, .09);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: min(100%, 720px);
      margin: 0 auto;
      padding: 12px 12px 34px;
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: 0 -12px 12px;
      padding: 12px;
      background: rgba(247, 243, 237, .94);
      border-bottom: 1px solid rgba(234, 223, 211, .9);
      backdrop-filter: blur(14px);
    }

    .top-inner {
      width: min(100%, 720px);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: -.02em;
    }

    .sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .pill {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--muted);
      padding: 7px 9px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
    }

    .status {
      margin: 0 0 12px;
      padding: 12px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .status.ok { border-color: rgba(38, 117, 71, .24); color: var(--ok); }
    .status.err { border-color: rgba(165, 59, 43, .28); color: var(--danger); }

    .tools {
      display: grid;
      gap: 8px;
      margin: 0 0 12px;
      padding: 12px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .tools label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .manual-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
    }

    input {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 12px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 13px;
      outline: none;
    }

    input:focus { border-color: rgba(123, 63, 25, .45); }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 26px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .media {
      position: relative;
      min-height: 340px;
      background: #eadfd3;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .media img {
      width: 100%;
      height: auto;
      display: block;
      background: #eadfd3;
      opacity: 0;
      transition: opacity .18s ease;
    }

    .media img.ready { opacity: 1; }

    .media-empty {
      min-height: 340px;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .skeleton {
      width: 100%;
      min-height: 340px;
      background: linear-gradient(90deg, #eadfd3 0%, #f4eadf 45%, #eadfd3 85%);
      background-size: 220% 100%;
      animation: shine 1.1s linear infinite;
    }

    @keyframes shine {
      from { background-position: 200% 0; }
      to { background-position: -20% 0; }
    }

    .badge {
      position: absolute;
      top: 12px;
      z-index: 4;
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 12px;
      backdrop-filter: blur(10px);
    }

    .counter {
      left: 12px;
      background: rgba(33, 27, 22, .75);
      color: #fff;
    }

    .loader {
      right: 12px;
      background: rgba(255, 250, 244, .9);
      border: 1px solid rgba(255, 255, 255, .5);
      color: var(--text);
    }

    .content { padding: 14px; }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 12px;
    }

    .tag {
      background: var(--soft);
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 8px;
      font-size: 12px;
      line-height: 1;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .title {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.14;
      letter-spacing: -.03em;
    }

    .theme {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.42;
    }

    .prompt-box, .json-box {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      margin: 12px 0;
    }

    .box-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .prompt {
      white-space: pre-wrap;
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      max-height: none;
      overflow: visible;
      padding-right: 2px;
    }

    .prompt.collapsed {
      max-height: 440px;
      overflow: auto;
    }

    details summary {
      cursor: pointer;
      color: var(--muted);
      font-weight: 750;
      font-size: 13px;
    }

    pre {
      white-space: pre-wrap;
      overflow: auto;
      max-height: 260px;
      margin: 10px 0 0;
      font-size: 12px;
      line-height: 1.45;
      color: var(--text);
    }

    .actions, .nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 12px;
    }

    .actions.three { grid-template-columns: 1fr 1fr 1fr; }

    button, a.btn {
      border: 0;
      border-radius: 15px;
      min-height: 46px;
      padding: 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 760;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform .08s ease, opacity .14s ease;
      text-align: center;
      text-decoration: none;
      display: inline-grid;
      place-items: center;
    }

    button:active, a.btn:active { transform: scale(.985); }
    button:disabled { opacity: .45; cursor: not-allowed; }

    .btn-soft { background: var(--soft); color: var(--brand-dark); }
    .btn-main { background: var(--brand); color: white; }
    .btn-dark { background: var(--brand-dark); color: white; }

    .empty {
      background: var(--card);
      border: 1px dashed var(--line);
      border-radius: 20px;
      padding: 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    code {
      background: rgba(0, 0, 0, .05);
      border-radius: 6px;
      padding: 2px 5px;
    }

    .note {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    @media (min-width: 560px) {
      .media, .skeleton { min-height: 520px; }
    }

    @media (max-width: 520px) {
      .manual-row, .actions, .actions.three, .nav { grid-template-columns: 1fr; }
      .top-inner { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="top-inner">
        <div>
          <h1>Leitor de Vídeos Dona Antônia</h1>
          <p class="sub">Carrega automaticamente a imagem e o prompt da pasta video/.</p>
        </div>
        <div class="pill" id="repoPill">GitHub</div>
      </div>
    </header>

    <section class="status" id="status">Carregando...</section>

    <section class="tools">
      <label for="manualPath">Caminho manual, se quiser abrir uma pasta específica</label>
      <div class="manual-row">
        <input id="manualPath" placeholder="Ex: video/20260619-174524-video-nivea ou video/20260619-174524-video-nivea/videododia.json" />
        <button class="btn-soft" id="manualBtn">Abrir</button>
        <button class="btn-dark" id="refreshBtn">Atualizar</button>
      </div>
      <p class="note">Agora o leitor primeiro abre rapidamente a pasta mais recente de <code>video/</code>. A busca pesada pela árvore completa só roda como reserva.</p>
    </section>

    <section id="viewer"></section>
  </main>

  <script>
    const CONFIG = {
      owner: 'osvaldosereia',
      repo: 'SUCEDOAN12',
      branch: 'main',
      rootPaths: ['video', 'videos'],
      jsonNames: [
        'videododia.json',
        'video-do-dia.json',
        'video_do_dia.json',
        'videodiatal.json',
        'video-diatal.json',
        'dados.json',
        'data.json',
        'prompt.json'
      ],
      imagePriority: [
        'produto.webp', 'produto.jpg', 'produto.jpeg', 'produto.png',
        'imagem.webp', 'imagem.jpg', 'imagem.jpeg', 'imagem.png',
        'produto-1.webp', 'produto-1.jpg', 'produto-1.png'
      ],
      promptFields: [
        'prompt_gemini', 'promptGemini', 'gemini_prompt', 'prompt_video', 'prompt',
        'video.prompt_gemini', 'video.prompt', 'conteudo.prompt_gemini', 'dados.prompt_gemini',
        'result.prompt_gemini', 'result.prompt', 'output.prompt_gemini'
      ],
      imageFields: [
        'produto.imagem_github', 'produto.imagem_original', 'produto.image_link', 'produto.imagem',
        'arquivos.imagem_produto', 'arquivos.produto', 'imagem_github', 'imagem_produto_github',
        'produto_imagem_github', 'imagem_produto', 'image_link', 'imagem', 'image', 'url_imagem'
      ],
      autoLoadLatest: true
    };

    const state = {
      entries: [],
      index: 0,
      rootItemsCache: new Map(),
      folderItemsCache: new Map(),
      dataCache: new Map(),
      imageCache: new Map(),
      tree: [],
      loading: false,
      forceFresh: false
    };

    const $status = document.getElementById('status');
    const $viewer = document.getElementById('viewer');
    const $repoPill = document.getElementById('repoPill');
    const $manualPath = document.getElementById('manualPath');
    const $manualBtn = document.getElementById('manualBtn');
    const $refreshBtn = document.getElementById('refreshBtn');

    $repoPill.textContent = `${CONFIG.owner}/${CONFIG.repo}`;
    $manualBtn.addEventListener('click', () => loadManualPath(false));
    $refreshBtn.addEventListener('click', refreshAll);
    $manualPath.addEventListener('keydown', event => {
      if (event.key === 'Enter') loadManualPath(false);
    });

    init();

    async function init() {
      renderLoadingCard('Procurando a pasta mais recente em video/...');

      try {
        setStatus('Abrindo video/ do GitHub...', 'ok');
        state.entries = await fastFindEntriesFromRoot();

        if (!state.entries.length) {
          setStatus('Não encontrei pelo modo rápido. Tentando busca completa no repositório...', 'ok');
          state.entries = await fallbackFindEntriesFromTree();
        }

        if (!state.entries.length) {
          renderEmpty();
          setStatus('Não encontrei videododia.json dentro de video/.', 'err');
          return;
        }

        state.entries.sort(sortEntriesNewestFirst);
        state.index = 0;

        setStatus(`Encontrei ${state.entries.length} conteúdo(s). Carregando automaticamente o mais recente...`, 'ok');
        await loadAndRender(0, false);
        preloadNeighborEntries();
      } catch (error) {
        console.error(error);
        renderEmpty(error.message);
        setStatus(`Erro ao carregar: ${error.message}`, 'err');
      }
    }

    async function refreshAll() {
      state.forceFresh = true;
      state.rootItemsCache.clear();
      state.folderItemsCache.clear();
      state.dataCache.clear();
      state.imageCache.clear();
      state.entries = [];
      state.index = 0;
      await init();
      state.forceFresh = false;
    }

    async function fastFindEntriesFromRoot() {
      const entries = [];

      for (const root of CONFIG.rootPaths) {
        try {
          const rootItems = await fetchGithubContents(root);

          const directJsons = rootItems
            .filter(item => item.type === 'file' && isJsonCandidate(item.name))
            .map(item => ({
              id: root,
              folderPath: root,
              jsonPath: cleanPath(item.path),
              jsonName: item.name,
              imagePath: '',
              mode: 'direct-json'
            }));
          entries.push(...directJsons);

          const dirs = rootItems
            .filter(item => item.type === 'dir')
            .map(item => ({ id: item.name, folderPath: cleanPath(item.path) }))
            .sort(sortEntriesNewestFirst);

          for (const dir of dirs) {
            const entry = await entryFromFolder(dir.folderPath, dir.id).catch(() => null);
            if (entry) entries.push(entry);
          }
        } catch (error) {
          console.warn(`Falha lendo ${root}/`, error);
        }
      }

      return dedupeEntries(entries);
    }

    async function entryFromFolder(folderPath, folderId = '') {
      const items = await fetchGithubContents(folderPath);
      const jsonItem = chooseBestJsonItem(items);
      if (!jsonItem) return null;

      const imageItem = chooseBestImageItem(items);
      return {
        id: folderId || basename(folderPath),
        folderPath: cleanPath(folderPath),
        jsonPath: cleanPath(jsonItem.path),
        jsonName: jsonItem.name,
        imagePath: imageItem ? cleanPath(imageItem.path) : '',
        imageDownloadUrl: imageItem ? imageItem.download_url : '',
        mode: 'folder-fast'
      };
    }

    async function fallbackFindEntriesFromTree() {
      const tree = await fetchRepoTree();
      state.tree = tree;
      const entries = [];

      for (const item of tree) {
        if (item.type !== 'blob') continue;
        const path = cleanPath(item.path);
        const parts = path.split('/');
        if (!CONFIG.rootPaths.includes(parts[0])) continue;
        if (!isJsonCandidate(basename(path))) continue;

        const folderPath = dirname(path) || parts[0];
        const imagePath = findBestImagePathInTree(folderPath);
        entries.push({
          id: basename(folderPath) || parts[0],
          folderPath,
          jsonPath: path,
          jsonName: basename(path),
          imagePath,
          imageDownloadUrl: imagePath ? rawUrl(imagePath) : '',
          mode: 'tree-fallback'
        });
      }

      return dedupeEntries(entries);
    }

    async function fetchRepoTree() {
      const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/git/trees/${encodeURIComponent(CONFIG.branch)}?recursive=1`;
      const res = await fetch(url, fetchOptions());
      if (!res.ok) throw new Error(`GitHub tree retornou ${res.status}`);
      const json = await res.json();
      if (!json || !Array.isArray(json.tree)) throw new Error('A árvore do GitHub não veio no formato esperado.');
      return json.tree.filter(item => item && item.path).map(item => ({ ...item, path: cleanPath(item.path) }));
    }

    async function fetchGithubContents(path) {
      const clean = cleanPath(path);
      const key = `${clean}::${state.forceFresh ? Date.now() : 'cache'}`;
      if (!state.forceFresh && state.rootItemsCache.has(clean)) return state.rootItemsCache.get(clean);

      const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${encodePath(clean)}?ref=${encodeURIComponent(CONFIG.branch)}`;
      const res = await fetch(url, fetchOptions());
      if (!res.ok) throw new Error(`GitHub contents retornou ${res.status} em ${clean}`);
      const json = await res.json();
      const items = Array.isArray(json) ? json : [json];
      if (!state.forceFresh) state.rootItemsCache.set(clean, items);
      return items;
    }

    function fetchOptions() {
      return state.forceFresh
        ? { cache: 'no-store' }
        : { cache: 'default' };
    }

    function isJsonCandidate(name) {
      const lower = String(name || '').toLowerCase();
      return lower.endsWith('.json') && (
        CONFIG.jsonNames.includes(lower) ||
        /video.*dia.*\.json$/i.test(lower) ||
        /prompt.*\.json$/i.test(lower)
      );
    }

    function chooseBestJsonItem(items) {
      return (items || [])
        .filter(item => item.type === 'file' && isJsonCandidate(item.name))
        .sort((a, b) => jsonNamePriority(a.name) - jsonNamePriority(b.name) || String(a.name).localeCompare(String(b.name)))[0] || null;
    }

    function chooseBestImageItem(items) {
      return (items || [])
        .filter(item => item.type === 'file' && /\.(jpe?g|png|webp)$/i.test(item.name || ''))
        .sort((a, b) => imagePriority(a.name) - imagePriority(b.name) || String(a.name).localeCompare(String(b.name)))[0] || null;
    }

    function jsonNamePriority(name) {
      const lower = String(name || '').toLowerCase();
      const exact = CONFIG.jsonNames.findIndex(item => item === lower);
      if (exact >= 0) return exact;
      if (/video.*dia.*\.json$/i.test(lower)) return CONFIG.jsonNames.length + 1;
      if (/prompt.*\.json$/i.test(lower)) return CONFIG.jsonNames.length + 2;
      return CONFIG.jsonNames.length + 10;
    }

    function imagePriority(pathOrName) {
      const name = basename(pathOrName).toLowerCase();
      const exact = CONFIG.imagePriority.findIndex(item => item === name);
      if (exact >= 0) return exact;
      if (/produto/i.test(name)) return CONFIG.imagePriority.length + 1;
      if (/imagem|image/i.test(name)) return CONFIG.imagePriority.length + 2;
      return CONFIG.imagePriority.length + 20;
    }

    function findBestImagePathInTree(folderPath) {
      const folder = cleanPath(folderPath);
      const images = state.tree
        .filter(item => item.type === 'blob')
        .map(item => item.path)
        .filter(path => dirname(path) === folder && /\.(jpe?g|png|webp)$/i.test(path))
        .sort((a, b) => imagePriority(a) - imagePriority(b) || a.localeCompare(b));
      return images[0] || '';
    }

    function dedupeEntries(entries) {
      const seen = new Set();
      return entries.filter(entry => {
        const key = entry.jsonPath;
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function sortEntriesNewestFirst(a, b) {
      const ta = parseDateScore(`${a.id || ''} ${a.folderPath || ''} ${a.jsonPath || ''}`);
      const tb = parseDateScore(`${b.id || ''} ${b.folderPath || ''} ${b.jsonPath || ''}`);
      if (tb !== ta) return tb - ta;
      return String(b.folderPath || b.jsonPath).localeCompare(String(a.folderPath || a.jsonPath));
    }

    async function loadManualPath(force = true) {
      const value = cleanPath($manualPath.value || '');
      if (!value) return;

      let folderPath = value;
      let jsonPath = value;
      let imagePath = '';

      if (/\.json$/i.test(value)) {
        folderPath = dirname(value);
      } else {
        const entry = await entryFromFolder(value, basename(value)).catch(() => null);
        if (entry) {
          prependAndOpenEntry(entry, true);
          return;
        }
        jsonPath = `${value}/videododia.json`;
      }

      imagePath = await findImagePathFast(folderPath);
      const entry = {
        id: basename(folderPath) || 'video',
        folderPath,
        jsonPath,
        jsonName: basename(jsonPath),
        imagePath,
        imageDownloadUrl: imagePath ? rawUrl(imagePath) : '',
        mode: 'manual'
      };

      prependAndOpenEntry(entry, force);
    }

    async function findImagePathFast(folderPath) {
      const entry = await entryFromFolder(folderPath, basename(folderPath)).catch(() => null);
      if (entry && entry.imagePath) return entry.imagePath;
      if (state.tree.length) return findBestImagePathInTree(folderPath);
      return '';
    }

    function prependAndOpenEntry(entry, force) {
      state.entries.unshift(entry);
      state.entries = dedupeEntries(state.entries);
      state.index = 0;
      loadAndRender(0, force);
    }

    async function loadAndRender(index, force = false) {
      if (state.loading && !force) return;
      const entry = state.entries[index];
      if (!entry) return;

      state.loading = true;
      state.index = index;
      renderLoadingCard(`Carregando ${entry.folderPath || entry.jsonPath}...`);

      try {
        const data = await getVideoData(entry, force);
        renderVideo(entry, data);
        setStatus(`Pronto: ${state.index + 1} de ${state.entries.length} — ${entry.folderPath}`, 'ok');
        preloadNeighborEntries();
      } catch (error) {
        console.error(error);
        renderError(entry, error.message);
        setStatus(`Erro ao carregar ${entry.jsonPath}: ${error.message}`, 'err');
      } finally {
        state.loading = false;
      }
    }

    async function getVideoData(entry, force = false) {
      if (!force && state.dataCache.has(entry.jsonPath)) return state.dataCache.get(entry.jsonPath);

      const imageUrlFromFolder = entry.imageDownloadUrl || (entry.imagePath ? rawUrl(entry.imagePath) : '');
      const rawJsonPromise = fetchRawText(entry.jsonPath, force);
      const initialImagePromise = imageUrlFromFolder ? preloadImage(imageUrlFromFolder).catch(() => null) : Promise.resolve(null);

      const rawJson = await rawJsonPromise;
      const json = safeJsonParse(rawJson);
      const prompt = extractPrompt(json);
      const product = extractProduct(json);
      let image = null;

      const loadedFolderImage = await initialImagePromise;
      if (loadedFolderImage) {
        image = {
          url: imageUrlFromFolder,
          name: basename(entry.imagePath || imageUrlFromFolder),
          source: 'arquivo da pasta',
          width: loadedFolderImage.naturalWidth || 0,
          height: loadedFolderImage.naturalHeight || 0
        };
      }

      if (!image) {
        const imageFromJson = await findImageFromJsonOrFolder(entry, json, force);
        if (imageFromJson && imageFromJson.url) {
          const loaded = await preloadImage(imageFromJson.url).catch(() => null);
          image = {
            ...imageFromJson,
            width: loaded ? loaded.naturalWidth || 0 : 0,
            height: loaded ? loaded.naturalHeight || 0 : 0
          };
        }
      }

      const data = {
        json,
        rawJson,
        prompt,
        image,
        product,
        title: buildTitle(entry, json, product),
        subtitle: buildSubtitle(json),
        tags: buildTags(entry, json, product)
      };

      if (!force) state.dataCache.set(entry.jsonPath, data);
      return data;
    }

    async function fetchRawText(path, force = false) {
      const url = rawUrl(path);
      const res = await fetch(url, force || state.forceFresh ? { cache: 'no-store' } : { cache: 'default' });
      if (!res.ok) throw new Error(`${path} retornou ${res.status}`);
      return await res.text();
    }

    function preloadImage(url) {
      if (!url) return Promise.resolve(null);
      if (state.imageCache.has(url)) return state.imageCache.get(url);

      const promise = new Promise((resolve, reject) => {
        const img = new Image();
        img.decoding = 'async';
        img.fetchPriority = 'high';
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('imagem não carregou'));
        img.src = url;
      });

      state.imageCache.set(url, promise);
      return promise;
    }

    function safeJsonParse(text) {
      const raw = String(text || '').trim();
      if (!raw || raw === '[object Object]' || raw === '{object}' || raw === 'object') {
        throw new Error('O JSON salvo no GitHub veio vazio ou como {object}. Corrija o módulo que salva o videododia.json no Make.');
      }

      const base = raw
        .replace(/^\uFEFF/, '')
        .trim()
        .replace(/^```(?:json)?\s*/i, '')
        .replace(/```$/i, '')
        .trim();

      const attempts = [base];
      const objStart = base.indexOf('{');
      const objEnd = base.lastIndexOf('}');
      if (objStart >= 0 && objEnd > objStart) attempts.push(base.slice(objStart, objEnd + 1));

      for (const candidate of attempts) {
        for (const variant of [candidate, candidate.replace(/,\s*([}\]])/g, '$1')]) {
          try {
            let parsed = JSON.parse(variant);
            if (typeof parsed === 'string') parsed = JSON.parse(parsed);
            if (parsed && typeof parsed === 'object') return parsed;
          } catch (_) {}
        }
      }

      throw new Error('não consegui interpretar o JSON');
    }

    function extractPrompt(json) {
      for (const field of CONFIG.promptFields) {
        const value = getByPath(json, field);
        if (isUsefulText(value)) return cleanPrompt(value);
      }

      const deep = findDeepText(json, /(prompt_gemini|promptGemini|gemini_prompt|prompt_video|prompt)/i, 80);
      if (deep) return cleanPrompt(deep);

      const textCandidate = firstText(json.text, json.output_text, json.result, json.content, json.message);
      if (textCandidate && textCandidate.length > 80) return cleanPrompt(textCandidate);

      return cleanPrompt(JSON.stringify(json, null, 2));
    }

    function cleanPrompt(value) {
      let text = stringifyText(value)
        .replace(/^```(?:text|txt|markdown|md|json)?\s*/i, '')
        .replace(/```$/i, '')
        .replace(/```/g, '')
        .replace(/\\n/g, '\n')
        .replace(/\\r/g, '')
        .replace(/\r\n/g, '\n')
        .replace(/\r/g, '\n')
        .trim();

      const embedded = extractEmbeddedPrompt(text);
      if (embedded) text = embedded;
      return text.trim();
    }

    function extractEmbeddedPrompt(text) {
      const value = String(text || '').trim();
      const match = value.match(/"prompt_gemini"\s*:\s*"([\s\S]*?)"\s*(?:,|})/i);
      if (!match || !match[1]) return '';
      return match[1].replace(/\\n/g, '\n').replace(/\\"/g, '"').trim();
    }

    async function findImageFromJsonOrFolder(entry, json, force = false) {
      for (const field of CONFIG.imageFields) {
        const value = getByPath(json, field);
        if (isUsefulText(value)) {
          const url = normalizePossibleImage(value, entry.folderPath);
          if (url) return { url, source: field, name: basename(url) || 'produto' };
        }
      }

      const deep = findDeepText(json, /(imagem|image|produto|arquivo|file)/i, 0, true);
      if (deep) {
        const url = normalizePossibleImage(deep, entry.folderPath);
        if (url) return { url, source: 'json profundo', name: basename(url) || 'produto' };
      }

      const folderEntry = await entryFromFolder(entry.folderPath, entry.id).catch(() => null);
      if (folderEntry && folderEntry.imagePath) {
        return {
          url: folderEntry.imageDownloadUrl || rawUrl(folderEntry.imagePath),
          source: 'pasta',
          name: basename(folderEntry.imagePath)
        };
      }

      return null;
    }

    function normalizePossibleImage(value, folderPath) {
      let text = stringifyText(value).trim().replace(/^['"]|['"]$/g, '');
      if (!text) return '';

      const foundUrl = text.match(/https?:\/\/[^\s"'<>]+?\.(?:jpe?g|png|webp)(?:\?[^\s"'<>]*)?/i);
      if (foundUrl) text = foundUrl[0];

      if (!/\.(jpe?g|png|webp)(\?|$)/i.test(text) && !/^https?:\/\//i.test(text)) return '';
      text = text.replace(/\\/g, '/');

      if (/^https?:\/\/github\.com\//i.test(text) && /\/blob\//i.test(text)) {
        return text.replace('https://github.com/', 'https://raw.githubusercontent.com/').replace('/blob/', '/');
      }

      if (/^https?:\/\//i.test(text)) return text;
      if (text.startsWith('/')) return rawUrl(text.replace(/^\/+/, ''));
      if (text.includes('/')) return rawUrl(text);
      return rawUrl(`${cleanPath(folderPath)}/${text}`);
    }

    function extractProduct(json) {
      const product = json && typeof json.produto === 'object' ? json.produto : {};
      return {
        nome: firstText(product.nome, product.title, product.name, json.nome_produto, json.produto_nome, json.nome, json.title),
        marca: firstText(product.marca, product.brand, json.marca, json.marca_filtrada),
        categoria: firstText(product.categoria, json.categoria),
        embalagem: firstText(product.embalagem, json.embalagem),
        link: firstText(product.link, json.link)
      };
    }

    function buildTitle(entry, json, product) {
      return firstText(product.nome, json.titulo, json.title, json.nome, json.id_video, entry.id, 'Vídeo do dia');
    }

    function buildSubtitle(json) {
      const video = json.video && typeof json.video === 'object' ? json.video : {};
      return firstText(video.micro_historia, json.micro_historia, video.objetivo, json.objetivo, 'Prompt pronto para Gemini.');
    }

    function buildTags(entry, json, product) {
      const video = json.video && typeof json.video === 'object' ? json.video : {};
      return [
        json.id_video || entry.id,
        json.dia_semana,
        json.status,
        json.tipo,
        product.marca,
        video.tipo_video_escolhido || json.tipo_video_escolhido,
        entry.jsonName
      ].filter(value => String(value || '').trim());
    }

    function renderLoadingCard(message) {
      $viewer.innerHTML = `
        <article class="card">
          <div class="media">
            <div class="skeleton"></div>
            <div class="badge loader">Carregando...</div>
          </div>
          <div class="content">
            <h2 class="title">Abrindo automaticamente</h2>
            <p class="theme">${escapeHtml(message)}</p>
            <div class="prompt-box">
              <div class="box-head"><span>Prompt</span><span>aguarde</span></div>
              <div class="prompt collapsed">Assim que o JSON carregar, o prompt aparece aqui automaticamente.</div>
            </div>
          </div>
        </article>
      `;
    }

    function renderVideo(entry, data) {
      const image = data.image;
      const prompt = data.prompt || '';
      const canNewer = state.index > 0;
      const canOlder = state.index < state.entries.length - 1;
      const promptClass = prompt.length > 5000 ? 'prompt collapsed' : 'prompt';

      $viewer.innerHTML = `
        <article class="card">
          <div class="media">
            ${image
              ? `<img id="productImg" src="${escapeAttr(image.url)}" alt="Imagem do produto" loading="eager" decoding="async" fetchpriority="high">`
              : `<div class="media-empty">Nenhuma imagem encontrada.<br>Confira se existe <code>produto.webp</code>, <code>produto.jpg</code> ou URL da imagem dentro do JSON.</div>`
            }
            <div class="badge counter">${escapeHtml(state.index + 1)} de ${escapeHtml(state.entries.length)}</div>
            ${image ? `<div class="badge loader" id="loader">Imagem pronta</div>` : ''}
          </div>

          <div class="content">
            <div class="meta">
              ${data.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
            </div>

            <h2 class="title">${escapeHtml(data.title)}</h2>
            <p class="theme">${escapeHtml(data.subtitle)}</p>

            <div class="actions three">
              <button class="btn-main" id="copyPrompt" ${prompt ? '' : 'disabled'}>Copiar prompt</button>
              <button class="btn-dark" id="downloadImage" ${image ? '' : 'disabled'}>Baixar imagem</button>
              <button class="btn-soft" id="reloadThis">Recarregar este</button>
            </div>

            <div class="prompt-box">
              <div class="box-head">
                <span>Prompt para Gemini</span>
                <span>${escapeHtml(prompt.length)} caracteres</span>
              </div>
              <div class="${promptClass}" id="promptText">${escapeHtml(prompt || 'Sem prompt encontrado no JSON.')}</div>
            </div>

            <div class="actions">
              <button class="btn-soft" id="copyJson">Copiar JSON</button>
              <a class="btn btn-soft" href="${escapeAttr(rawUrl(entry.jsonPath))}" target="_blank" rel="noopener">Abrir JSON</a>
            </div>

            <details class="json-box">
              <summary>Ver JSON completo</summary>
              <pre id="jsonText">${escapeHtml(JSON.stringify(data.json, null, 2))}</pre>
            </details>

            <div class="nav">
              <button class="btn-soft" id="newer" ${!canNewer ? 'disabled' : ''}>Mais novo</button>
              <button class="btn-soft" id="older" ${!canOlder ? 'disabled' : ''}>Anterior</button>
            </div>

            <p class="note">
              Caminho lido: <code>${escapeHtml(entry.jsonPath)}</code>${image ? `<br>Imagem: <code>${escapeHtml(image.name || image.source)}</code>` : ''}
            </p>
          </div>
        </article>
      `;

      const img = document.getElementById('productImg');
      const loader = document.getElementById('loader');
      if (img) {
        if (img.complete && img.naturalWidth) {
          img.classList.add('ready');
          if (loader) loader.textContent = 'Imagem carregada';
        } else {
          if (loader) loader.textContent = 'Carregando imagem...';
          img.addEventListener('load', () => {
            img.classList.add('ready');
            if (loader) loader.textContent = 'Imagem carregada';
          }, { once: true });
          img.addEventListener('error', () => {
            img.classList.add('ready');
            if (loader) loader.textContent = 'Erro na imagem';
          }, { once: true });
        }
      }

      document.getElementById('copyPrompt')?.addEventListener('click', async event => {
        await copyText(prompt);
        flashButton(event.currentTarget, 'Prompt copiado');
      });

      document.getElementById('copyJson')?.addEventListener('click', async event => {
        await copyText(JSON.stringify(data.json, null, 2));
        flashButton(event.currentTarget, 'JSON copiado');
      });

      document.getElementById('downloadImage')?.addEventListener('click', async event => {
        if (!image) return;
        event.currentTarget.disabled = true;
        await downloadFile(image.url, `${safeName(data.title || entry.id)}-${safeName(image.name || 'produto')}`);
        event.currentTarget.disabled = false;
      });

      document.getElementById('reloadThis')?.addEventListener('click', async event => {
        event.currentTarget.disabled = true;
        state.dataCache.delete(entry.jsonPath);
        await loadAndRender(state.index, true);
      });

      document.getElementById('newer')?.addEventListener('click', () => loadAndRender(state.index - 1));
      document.getElementById('older')?.addEventListener('click', () => loadAndRender(state.index + 1));
    }

    function renderError(entry, message) {
      $viewer.innerHTML = `
        <div class="empty">
          <strong>Não consegui abrir este conteúdo.</strong><br><br>
          Caminho tentado:<br>
          <code>${escapeHtml(entry.jsonPath)}</code><br><br>
          Erro:<br>
          <code>${escapeHtml(message)}</code><br><br>
          Teste no campo manual outro caminho, por exemplo:<br>
          <code>video/NOME-DA-PASTA/videododia.json</code>
        </div>
      `;
    }

    function renderEmpty(extra = '') {
      $viewer.innerHTML = `
        <div class="empty">
          <strong>Nenhum conteúdo de vídeo encontrado.</strong><br><br>
          O site procura automaticamente:<br><br>
          <code>video/20260619-174524-video-nivea/videododia.json</code><br>
          <code>video/20260619-174524-video-nivea/produto.webp</code><br><br>
          Também aceita nomes de JSON como <code>dados.json</code>, <code>prompt.json</code>, <code>video-do-dia.json</code> e <code>video_do_dia.json</code>.<br><br>
          ${extra ? `Detalhe: <code>${escapeHtml(extra)}</code>` : ''}
        </div>
      `;
    }

    async function preloadNeighborEntries() {
      const neighbors = [state.index + 1, state.index - 1].filter(i => i >= 0 && i < state.entries.length);
      for (const index of neighbors) {
        const entry = state.entries[index];
        if (!entry || state.dataCache.has(entry.jsonPath)) continue;
        getVideoData(entry, false).catch(() => {});
      }
    }

    async function downloadFile(url, filename) {
      try {
        const res = await fetch(url, { cache: 'default', mode: 'cors' });
        if (!res.ok) throw new Error(`download retornou ${res.status}`);
        const blob = await res.blob();
        const ext = extensionFromUrl(url) || extensionFromType(blob.type) || 'jpg';
        triggerDownload(blob, filename.endsWith(`.${ext}`) ? filename : `${filename}.${ext}`);
      } catch (error) {
        console.warn('Download via blob falhou. Abrindo link direto:', error);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename || 'produto';
        a.target = '_blank';
        a.rel = 'noopener';
        document.body.appendChild(a);
        a.click();
        a.remove();
      }
    }

    function triggerDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    }

    async function copyText(text) {
      const clean = String(text || '').trim();
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(clean);
        return;
      }

      const textarea = document.createElement('textarea');
      textarea.value = clean;
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      textarea.style.top = '0';
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      document.execCommand('copy');
      textarea.remove();
    }

    function getByPath(obj, path) {
      if (!obj || !path) return undefined;
      const parts = String(path).split('.');
      let current = obj;
      for (const part of parts) {
        if (!current || typeof current !== 'object' || !Object.prototype.hasOwnProperty.call(current, part)) return undefined;
        current = current[part];
      }
      return current;
    }

    function findDeepText(obj, keyRegex, minLength = 0, imageOnly = false) {
      const stack = [{ key: '', value: obj }];
      const seen = new Set();

      while (stack.length) {
        const { key, value } = stack.shift();
        if (!value) continue;

        if (typeof value === 'string') {
          const text = value.trim();
          if (keyRegex.test(key) && text.length >= minLength) {
            if (!imageOnly || /\.(jpe?g|png|webp)(\?|$)/i.test(text) || /^https?:\/\//i.test(text)) return text;
          }
          continue;
        }

        if (typeof value === 'object') {
          if (seen.has(value)) continue;
          seen.add(value);
          Object.entries(value).forEach(([childKey, childValue]) => stack.push({ key: childKey, value: childValue }));
        }
      }

      return '';
    }

    function isUsefulText(value) {
      return value !== undefined && value !== null && String(stringifyText(value)).trim() !== '';
    }

    function stringifyText(value) {
      if (value == null) return '';
      if (typeof value === 'string') return value;
      if (Array.isArray(value)) return value.map(stringifyText).filter(Boolean).join('\n');
      if (typeof value === 'object') {
        for (const key of ['text', 'texto', 'content', 'conteudo', 'value', 'prompt_gemini', 'prompt', 'result', 'output_text']) {
          if (value[key]) return stringifyText(value[key]);
        }
        return JSON.stringify(value, null, 2);
      }
      return String(value);
    }

    function firstText(...values) {
      for (const value of values) {
        const text = stringifyText(value).trim();
        if (text) return text;
      }
      return '';
    }

    function parseDateScore(text) {
      const value = String(text || '');
      const match = value.match(/(20\d{2})[-_ ]?(\d{2})[-_ ]?(\d{2})[-_ ]?(\d{2})?(\d{2})?(\d{2})?/);
      if (!match) return 0;
      const year = Number(match[1]);
      const month = Number(match[2]) - 1;
      const day = Number(match[3]);
      const hour = Number(match[4] || 0);
      const minute = Number(match[5] || 0);
      const second = Number(match[6] || 0);
      const time = Date.UTC(year, month, day, hour, minute, second);
      return Number.isFinite(time) ? time : 0;
    }

    function rawUrl(path) {
      return `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${encodeURIComponent(CONFIG.branch)}/${encodePath(path)}`;
    }

    function encodePath(path) {
      return cleanPath(path).split('/').map(encodeURIComponent).join('/');
    }

    function cleanPath(path) {
      return String(path || '').replace(/^\/+|\/+$/g, '').replace(/\/+/g, '/');
    }

    function dirname(path) {
      const clean = cleanPath(path);
      return clean.includes('/') ? clean.slice(0, clean.lastIndexOf('/')) : '';
    }

    function basename(path) {
      return String(path || '').split(/[?#]/)[0].split('/').pop() || '';
    }

    function extensionFromUrl(url) {
      const match = String(url || '').split(/[?#]/)[0].match(/\.([a-z0-9]+)$/i);
      return match ? match[1].toLowerCase().replace('jpeg', 'jpg') : '';
    }

    function extensionFromType(type) {
      if (/png/i.test(type)) return 'png';
      if (/webp/i.test(type)) return 'webp';
      if (/jpe?g/i.test(type)) return 'jpg';
      return '';
    }

    function safeName(value) {
      return String(value || 'arquivo')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9-_\.]+/gi, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '')
        .toLowerCase() || 'arquivo';
    }

    function flashButton(button, message) {
      const original = button.textContent;
      button.textContent = message;
      button.disabled = true;
      setTimeout(() => {
        button.textContent = original;
        button.disabled = false;
      }, 1200);
    }

    function setStatus(message, type) {
      $status.className = `status${type ? ` ${type}` : ''}`;
      $status.innerHTML = escapeHtml(message);
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#096;');
    }
  </script>
</body>
