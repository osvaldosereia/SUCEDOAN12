<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f1e8" />
  <title>Leitor de Carrosséis</title>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    :root {
      --bg: #f6f1e8;
      --card: #fffaf1;
      --text: #211d18;
      --muted: #766d62;
      --line: rgba(33, 29, 24, .11);
      --soft: rgba(33, 29, 24, .06);
      --brand: #2b2118;
      --brand-2: #f0dfc6;
      --danger: #a33c2f;
      --ok: #276738;
      --radius: 24px;
      --shadow: 0 14px 40px rgba(33, 29, 24, .08);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #fff6e7 0, var(--bg) 42%, #f4ead9 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    button, input, textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .app {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: 16px 14px 36px;
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: -16px -14px 16px;
      padding: calc(12px + env(safe-area-inset-top)) 14px 12px;
      background: rgba(246, 241, 232, .86);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }

    .top-inner {
      width: min(760px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand-title {
      display: grid;
      gap: 2px;
    }

    .brand-title h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
      letter-spacing: -.04em;
      font-weight: 650;
    }

    .brand-title p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .refresh-btn {
      min-width: 44px;
      height: 44px;
      border-radius: 999px;
      background: var(--brand);
      color: #fff;
      display: inline-grid;
      place-items: center;
      box-shadow: 0 10px 22px rgba(33, 29, 24, .18);
    }

    .summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 250, 241, .72);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .summary strong {
      color: var(--text);
      font-weight: 650;
    }

    .status {
      display: grid;
      gap: 8px;
      margin: 12px 0;
    }

    .notice {
      border: 1px solid var(--line);
      background: rgba(255, 250, 241, .82);
      border-radius: 18px;
      padding: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .notice.ok {
      border-color: rgba(39, 103, 56, .18);
      color: var(--ok);
    }

    .notice.error {
      border-color: rgba(163, 60, 47, .18);
      color: var(--danger);
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .card-head {
      padding: 16px 16px 12px;
      display: grid;
      gap: 10px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--soft);
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
      white-space: nowrap;
    }

    .pill.dark {
      background: var(--brand);
      color: #fff;
    }

    .card h2 {
      margin: 0;
      font-size: 21px;
      line-height: 1.14;
      letter-spacing: -.04em;
      font-weight: 680;
    }

    .card-sub {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.38;
    }

    .slider {
      padding: 0 12px 12px;
    }

    .slide-frame {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: 22px;
      background: #e7dccb;
      border: 1px solid var(--line);
      aspect-ratio: 4 / 5;
      display: grid;
      place-items: center;
    }

    .slide-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #efe4d3;
    }

    .slide-empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: rgba(33, 29, 24, .78);
      color: #fff;
      display: grid;
      place-items: center;
      z-index: 2;
      backdrop-filter: blur(10px);
    }

    .nav-btn:disabled {
      opacity: .32;
      cursor: default;
    }

    .nav-btn.prev { left: 10px; }
    .nav-btn.next { right: 10px; }

    .page-badge {
      position: absolute;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      min-height: 30px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(33, 29, 24, .78);
      color: #fff;
      font-size: 12px;
      line-height: 1;
      backdrop-filter: blur(10px);
      z-index: 2;
    }

    .thumbs {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding: 10px 2px 0;
      scrollbar-width: none;
    }

    .thumbs::-webkit-scrollbar { display: none; }

    .dot {
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--muted);
      font-size: 11px;
      display: grid;
      place-items: center;
      border: 1px solid transparent;
    }

    .dot.active {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }

    .legend-box {
      margin: 0 12px 12px;
      background: rgba(255, 255, 255, .44);
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
    }

    .legend-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 12px 0;
    }

    .legend-title strong {
      font-size: 13px;
      letter-spacing: -.01em;
    }

    .copy-mini {
      min-height: 32px;
      border-radius: 999px;
      padding: 8px 12px;
      background: var(--brand-2);
      color: var(--brand);
      font-size: 12px;
      font-weight: 620;
    }

    .legend-text {
      margin: 0;
      padding: 10px 12px 14px;
      color: #3e372f;
      font-size: 13px;
      line-height: 1.52;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .actions {
      display: grid;
      gap: 10px;
      padding: 0 12px 14px;
    }

    .primary-btn {
      width: 100%;
      min-height: 52px;
      border-radius: 18px;
      background: var(--brand);
      color: #fff;
      font-size: 14px;
      font-weight: 680;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 12px 24px rgba(33, 29, 24, .16);
    }

    .primary-btn:disabled {
      opacity: .58;
      cursor: wait;
    }

    .secondary-btn {
      width: 100%;
      min-height: 48px;
      border-radius: 18px;
      background: var(--brand-2);
      color: var(--brand);
      font-size: 14px;
      font-weight: 650;
    }

    .load-more-wrap {
      display: grid;
      gap: 10px;
      padding: 20px 0 0;
    }

    .load-more {
      min-height: 54px;
      border-radius: 20px;
      background: var(--brand);
      color: #fff;
      font-size: 14px;
      font-weight: 680;
      box-shadow: 0 12px 24px rgba(33, 29, 24, .14);
    }

    .load-more:disabled {
      opacity: .55;
      cursor: wait;
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      padding: 20px 12px 0;
    }

    .skeleton {
      background: linear-gradient(90deg, rgba(33,29,24,.05), rgba(33,29,24,.11), rgba(33,29,24,.05));
      background-size: 220% 100%;
      animation: pulse 1.2s infinite linear;
      border-radius: 18px;
    }

    .skeleton-card {
      height: 520px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background-color: var(--card);
      overflow: hidden;
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    @keyframes pulse {
      from { background-position: 220% 0; }
      to { background-position: -220% 0; }
    }

    @media (min-width: 680px) {
      .app {
        padding-top: 18px;
      }

      .card h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="top-inner">
        <div class="brand-row">
          <div class="brand-title">
            <h1>Carrosséis</h1>
            <p>Dona Antônia · leitura direta do GitHub</p>
          </div>
          <button class="refresh-btn" id="refreshBtn" type="button" aria-label="Atualizar">↻</button>
        </div>
        <div class="summary" id="summaryBox">
          <span>Buscando carrosséis...</span>
          <strong>0</strong>
        </div>
      </div>
    </header>

    <section class="status" id="statusBox"></section>
    <section class="grid" id="list"></section>

    <div class="load-more-wrap" id="loadMoreWrap" hidden>
      <button class="load-more" id="loadMoreBtn" type="button">Carregar mais 10</button>
    </div>

    <p class="footer-note">
      As imagens são convertidas para JPG compactado antes de entrar no ZIP. O processamento acontece no próprio celular.
    </p>
  </main>

  <script>
    const CONFIG = {
      owner: 'osvaldosereia',
      repo: 'SUCEDOAN12',
      branch: 'main',
      root: 'carrosseis',
      batchSize: 10,
      jpegQuality: 0.78,
      maxImageWidth: 1440
    };

    const state = {
      candidates: [],
      loaded: [],
      nextIndex: 0,
      loading: false,
      slideIndex: new Map(),
      cacheBust: Date.now(),
      imagePathsByFolder: new Map()
    };

    const els = {
      list: document.getElementById('list'),
      statusBox: document.getElementById('statusBox'),
      summaryBox: document.getElementById('summaryBox'),
      loadMoreWrap: document.getElementById('loadMoreWrap'),
      loadMoreBtn: document.getElementById('loadMoreBtn'),
      refreshBtn: document.getElementById('refreshBtn')
    };

    document.addEventListener('DOMContentLoaded', init);
    els.loadMoreBtn.addEventListener('click', () => loadNextBatch());
    els.refreshBtn.addEventListener('click', () => init(true));

    async function init(forceRefresh = false) {
      if (state.loading) return;

      state.cacheBust = Date.now();
      state.candidates = [];
      state.loaded = [];
      state.nextIndex = 0;
      state.slideIndex.clear();
      state.imagePathsByFolder.clear();

      els.list.innerHTML = renderSkeletons(3);
      setNotice('Buscando a lista de carrosséis no GitHub...', '');
      updateSummary('Carregando...', 0);
      els.loadMoreWrap.hidden = true;

      try {
        const candidates = await getCarouselCandidates();
        state.candidates = candidates;

        if (!state.candidates.length) {
          els.list.innerHTML = '';
          updateSummary('Nenhum carrossel encontrado', 0);
          setNotice('Não encontrei arquivos dados.json dentro da pasta carrosseis/. Confira se o caminho está assim: carrosseis/ID_DO_CARROSSEL/dados.json', 'error');
          return;
        }

        els.list.innerHTML = '';
        updateSummary('Encontrados no GitHub', state.candidates.length);
        setNotice(`Encontrei ${state.candidates.length} carrossel(is). Carregando de 10 em 10, começando pelos mais recentes.`, 'ok');
        await loadNextBatch();
      } catch (error) {
        els.list.innerHTML = '';
        updateSummary('Erro ao carregar', 0);
        setNotice(error.message || 'Não foi possível carregar os carrosséis.', 'error');
      }
    }

    async function getCarouselCandidates() {
      try {
        const fromTree = await getCandidatesFromGitTree();
        if (fromTree.length) return fromTree;
      } catch (error) {
        console.warn('Falha na árvore do GitHub. Tentando contents API.', error);
      }

      return await getCandidatesFromContentsApi();
    }

    async function getCandidatesFromGitTree() {
      const treeUrl = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/git/trees/${encodeURIComponent(CONFIG.branch)}?recursive=1`;
      const data = await fetchJson(treeUrl);

      if (!Array.isArray(data.tree)) return [];

      const dadosPaths = [];
      const root = escapeRegExp(CONFIG.root);
      const dadosRegex = new RegExp(`^${root}/([^/]+)/dados\\.json$`, 'i');
      const imageRegex = new RegExp(`^${root}/([^/]+)/(.+\\.(?:jpg|jpeg|png|webp))$`, 'i');

      for (const item of data.tree) {
        if (!item || item.type !== 'blob' || !item.path) continue;

        const dadosMatch = item.path.match(dadosRegex);
        if (dadosMatch) {
          dadosPaths.push({
            id: dadosMatch[1],
            dadosPath: item.path,
            dadosUrl: rawUrl(item.path),
            source: 'tree'
          });
          continue;
        }

        const imageMatch = item.path.match(imageRegex);
        if (imageMatch) {
          const folderId = imageMatch[1];
          if (!state.imagePathsByFolder.has(folderId)) state.imagePathsByFolder.set(folderId, []);
          state.imagePathsByFolder.get(folderId).push(item.path);
        }
      }

      return uniqueBy(dadosPaths, 'id').sort(sortCandidateDesc);
    }

    async function getCandidatesFromContentsApi() {
      const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${encodeURIComponent(CONFIG.root)}?ref=${encodeURIComponent(CONFIG.branch)}`;
      const data = await fetchJson(url);
      if (!Array.isArray(data)) return [];

      return data
        .filter(item => item && item.type === 'dir' && item.name)
        .map(item => ({
          id: item.name,
          dadosPath: `${CONFIG.root}/${item.name}/dados.json`,
          dadosUrl: rawUrl(`${CONFIG.root}/${item.name}/dados.json`),
          source: 'contents'
        }))
        .sort(sortCandidateDesc);
    }

    async function loadNextBatch() {
      if (state.loading) return;
      if (state.nextIndex >= state.candidates.length) return;

      state.loading = true;
      els.loadMoreBtn.disabled = true;
      els.loadMoreBtn.textContent = 'Carregando...';

      const start = state.nextIndex;
      const end = Math.min(start + CONFIG.batchSize, state.candidates.length);
      const batch = state.candidates.slice(start, end);
      state.nextIndex = end;

      if (!state.loaded.length) {
        els.list.innerHTML = renderSkeletons(Math.min(3, batch.length));
      }

      setNotice(`Carregando carrosséis ${start + 1} a ${end} de ${state.candidates.length}...`, '');

      const results = await poolMap(batch, 4, async (candidate) => {
        try {
          const dados = await fetchJson(addCache(candidate.dadosUrl));
          return normalizeCarousel(dados, candidate);
        } catch (error) {
          console.warn('Erro ao carregar dados.json', candidate, error);
          return null;
        }
      });

      const valid = results.filter(Boolean);
      state.loaded.push(...valid);
      state.loaded = uniqueBy(state.loaded, 'id').sort(sortCarouselDesc);

      renderCarousels();
      updateSummary(`Mostrando ${state.loaded.length} de ${state.candidates.length}`, state.loaded.length);

      if (state.nextIndex < state.candidates.length) {
        els.loadMoreWrap.hidden = false;
        els.loadMoreBtn.disabled = false;
        els.loadMoreBtn.textContent = 'Carregar mais 10';
        setNotice(`Carregados ${state.loaded.length}. Toque em “Carregar mais 10” para ver os próximos.`, 'ok');
      } else {
        els.loadMoreWrap.hidden = true;
        setNotice(`Todos os ${state.loaded.length} carrosséis foram carregados.`, 'ok');
      }

      state.loading = false;
    }

    function normalizeCarousel(dados, candidate) {
      const folderId = candidate.id;
      const id = cleanText(dados.id_carrossel) || folderId;
      const title = cleanText(dados.titulo_carrossel) || cleanText(dados.tema) || `Carrossel ${id}`;
      const legend = cleanText(dados.legenda_instagram);
      const createdAt = cleanText(dados.criado_em) || inferDateFromId(id) || inferDateFromId(folderId) || '';
      const total = Number.parseInt(dados.total_paginas, 10) || 0;

      let images = [];

      if (Array.isArray(dados.urls_imagens) && dados.urls_imagens.length) {
        images = dados.urls_imagens
          .map((item, index) => ({
            numero: Number.parseInt(item.numero, 10) || index + 1,
            url: cleanText(item.url)
          }))
          .filter(item => item.url)
          .sort((a, b) => a.numero - b.numero);
      }

      if (!images.length) {
        const imagePaths = state.imagePathsByFolder.get(folderId) || state.imagePathsByFolder.get(id) || [];
        images = imagePaths
          .map(path => ({
            numero: extractPageNumber(path),
            url: rawUrl(path)
          }))
          .filter(item => item.numero > 0 || item.url)
          .sort((a, b) => {
            if (a.numero !== b.numero) return a.numero - b.numero;
            return a.url.localeCompare(b.url);
          });
      }

      if (!images.length && total > 0) {
        images = Array.from({ length: total }, (_, index) => {
          const numero = index + 1;
          return {
            numero,
            url: rawUrl(`${CONFIG.root}/${folderId}/pagina-${numero}.jpg`)
          };
        });
      }

      images = uniqueBy(images, 'url').map((item, index) => ({
        numero: item.numero || index + 1,
        url: item.url
      }));

      return {
        id,
        folderId,
        status: cleanText(dados.status),
        tema: cleanText(dados.tema),
        categoria: cleanText(dados.categoria),
        intencao: cleanText(dados.intencao),
        title,
        legend,
        createdAt,
        total: total || images.length,
        images,
        raw: dados
      };
    }

    function renderCarousels() {
      els.list.innerHTML = state.loaded.map(renderCard).join('');
      bindCardEvents();
    }

    function renderCard(carousel) {
      const current = getSlideIndex(carousel.id);
      const image = carousel.images[current];
      const pageTotal = carousel.images.length;
      const dateLabel = formatDate(carousel.createdAt) || carousel.id;
      const legend = carousel.legend || 'Legenda não encontrada no dados.json.';

      return `
        <article class="card" data-id="${escapeHtml(carousel.id)}">
          <div class="card-head">
            <div class="meta-row">
              <span class="pill dark">${escapeHtml(dateLabel)}</span>
              ${carousel.status ? `<span class="pill">${escapeHtml(carousel.status)}</span>` : ''}
              ${carousel.categoria ? `<span class="pill">${escapeHtml(carousel.categoria)}</span>` : ''}
              ${carousel.intencao ? `<span class="pill">${escapeHtml(carousel.intencao)}</span>` : ''}
              <span class="pill">${pageTotal} página(s)</span>
            </div>
            <h2>${escapeHtml(carousel.title)}</h2>
            ${carousel.tema && carousel.tema !== carousel.title ? `<p class="card-sub">${escapeHtml(carousel.tema)}</p>` : ''}
          </div>

          <div class="slider">
            <div class="slide-frame">
              ${image ? `<img class="slide-img" src="${escapeAttr(image.url)}" alt="Página ${image.numero} do carrossel ${escapeAttr(carousel.title)}" loading="lazy" decoding="async" />` : `<div class="slide-empty">Nenhuma imagem encontrada para este carrossel.</div>`}
              <button class="nav-btn prev" type="button" data-action="prev" ${pageTotal <= 1 ? 'disabled' : ''}>‹</button>
              <button class="nav-btn next" type="button" data-action="next" ${pageTotal <= 1 ? 'disabled' : ''}>›</button>
              <div class="page-badge">Página ${pageTotal ? current + 1 : 0} de ${pageTotal}</div>
            </div>
            ${renderDots(carousel, current)}
          </div>

          <div class="legend-box">
            <div class="legend-title">
              <strong>Legenda</strong>
              <button class="copy-mini" type="button" data-action="copy">Copiar</button>
            </div>
            <p class="legend-text">${escapeHtml(legend)}</p>
          </div>

          <div class="actions">
            <button class="primary-btn" type="button" data-action="download">Baixar todas compactadas</button>
          </div>
        </article>
      `;
    }

    function renderDots(carousel, current) {
      if (!carousel.images.length) return '';

      return `
        <div class="thumbs" aria-label="Páginas do carrossel">
          ${carousel.images.map((image, index) => `
            <button class="dot ${index === current ? 'active' : ''}" type="button" data-action="goto" data-index="${index}" aria-label="Ver página ${image.numero}">${image.numero}</button>
          `).join('')}
        </div>
      `;
    }

    function bindCardEvents() {
      for (const card of document.querySelectorAll('.card')) {
        card.addEventListener('click', async (event) => {
          const button = event.target.closest('button[data-action]');
          if (!button) return;

          const id = card.dataset.id;
          const carousel = state.loaded.find(item => item.id === id);
          if (!carousel) return;

          const action = button.dataset.action;

          if (action === 'prev') {
            moveSlide(carousel, -1);
          }

          if (action === 'next') {
            moveSlide(carousel, 1);
          }

          if (action === 'goto') {
            setSlide(carousel, Number.parseInt(button.dataset.index, 10) || 0);
          }

          if (action === 'copy') {
            await copyLegend(carousel, button);
          }

          if (action === 'download') {
            await downloadCarouselZip(carousel, button);
          }
        });
      }
    }

    function moveSlide(carousel, direction) {
      const total = carousel.images.length;
      if (!total) return;
      const current = getSlideIndex(carousel.id);
      const next = (current + direction + total) % total;
      setSlide(carousel, next);
    }

    function setSlide(carousel, index) {
      state.slideIndex.set(carousel.id, index);
      renderCarousels();
      const card = document.querySelector(`.card[data-id="${cssEscape(carousel.id)}"]`);
      if (card) card.scrollIntoView({ block: 'nearest' });
    }

    function getSlideIndex(id) {
      return state.slideIndex.get(id) || 0;
    }

    async function copyLegend(carousel, button) {
      const text = carousel.legend || '';
      if (!text) {
        toast('Este carrossel não tem legenda.', 'error');
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        temporaryButtonText(button, 'Copiado!');
        toast('Legenda copiada.', 'ok');
      } catch (error) {
        fallbackCopy(text);
        temporaryButtonText(button, 'Copiado!');
        toast('Legenda copiada.', 'ok');
      }
    }

    async function downloadCarouselZip(carousel, button) {
      if (!window.JSZip) {
        toast('Não foi possível carregar o compactador ZIP. Verifique a internet e atualize a página.', 'error');
        return;
      }

      if (!carousel.images.length) {
        toast('Este carrossel não tem imagens para baixar.', 'error');
        return;
      }

      const originalText = button.textContent;
      button.disabled = true;

      try {
        const zip = new JSZip();
        const folder = zip.folder(safeFileName(carousel.id));

        folder.file('legenda.txt', carousel.legend || '');
        folder.file('dados.json', JSON.stringify(carousel.raw, null, 2));

        for (let i = 0; i < carousel.images.length; i++) {
          const image = carousel.images[i];
          button.textContent = `Compactando ${i + 1}/${carousel.images.length}...`;
          const jpgBlob = await convertImageToJpeg(image.url, CONFIG.maxImageWidth, CONFIG.jpegQuality);
          const pageName = `pagina-${String(image.numero || i + 1).padStart(2, '0')}.jpg`;
          folder.file(pageName, jpgBlob);
        }

        button.textContent = 'Gerando ZIP...';
        const zipBlob = await zip.generateAsync({
          type: 'blob',
          compression: 'DEFLATE',
          compressionOptions: { level: 7 }
        });

        downloadBlob(zipBlob, `${safeFileName(carousel.id)}-${safeFileName(carousel.title)}.zip`);
        button.textContent = 'Baixado!';
        toast('ZIP gerado com as imagens compactadas.', 'ok');
      } catch (error) {
        console.error(error);
        toast('Erro ao compactar. Confira se as imagens do GitHub estão públicas e tente novamente.', 'error');
        button.textContent = 'Erro ao baixar';
      } finally {
        setTimeout(() => {
          button.disabled = false;
          button.textContent = originalText;
        }, 1400);
      }
    }

    async function convertImageToJpeg(url, maxWidth, quality) {
      const response = await fetch(addCache(url), { mode: 'cors', cache: 'no-store' });
      if (!response.ok) throw new Error(`Erro ao baixar imagem: ${response.status}`);
      const sourceBlob = await response.blob();
      const image = await blobToImage(sourceBlob);

      const scale = Math.min(1, maxWidth / image.naturalWidth);
      const width = Math.max(1, Math.round(image.naturalWidth * scale));
      const height = Math.max(1, Math.round(image.naturalHeight * scale));

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext('2d', { alpha: false });
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(image, 0, 0, width, height);

      URL.revokeObjectURL(image.src);

      return await new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (blob) resolve(blob);
          else reject(new Error('Canvas não conseguiu gerar JPG.'));
        }, 'image/jpeg', quality);
      });
    }

    function blobToImage(blob) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(blob);
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error('Não foi possível ler a imagem.'));
        };
        image.src = url;
      });
    }

    async function fetchJson(url) {
      const response = await fetch(url, {
        headers: { Accept: 'application/vnd.github+json, application/json, text/plain' },
        cache: 'no-store'
      });

      if (!response.ok) {
        if (response.status === 403) {
          throw new Error('O GitHub bloqueou temporariamente por limite de acessos. Aguarde alguns minutos ou use um token no futuro.');
        }
        if (response.status === 404) {
          throw new Error('Caminho não encontrado no GitHub. Confira owner, repositório, branch e pasta carrosseis.');
        }
        throw new Error(`Erro ao consultar GitHub: ${response.status}`);
      }

      const text = await response.text();
      try {
        return JSON.parse(text);
      } catch (error) {
        throw new Error('O arquivo retornado não é um JSON válido.');
      }
    }

    async function poolMap(items, limit, mapper) {
      const results = new Array(items.length);
      let index = 0;

      async function worker() {
        while (index < items.length) {
          const current = index++;
          results[current] = await mapper(items[current], current);
        }
      }

      await Promise.all(Array.from({ length: Math.min(limit, items.length) }, worker));
      return results;
    }

    function updateSummary(text, count) {
      els.summaryBox.innerHTML = `<span>${escapeHtml(text)}</span><strong>${escapeHtml(String(count))}</strong>`;
    }

    function setNotice(message, type) {
      if (!message) {
        els.statusBox.innerHTML = '';
        return;
      }

      els.statusBox.innerHTML = `<div class="notice ${type || ''}">${escapeHtml(message)}</div>`;
    }

    function toast(message, type = '') {
      setNotice(message, type);
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => {
        if (state.loaded.length) setNotice(`Mostrando ${state.loaded.length} de ${state.candidates.length}.`, 'ok');
      }, 2200);
    }

    function temporaryButtonText(button, text) {
      const original = button.textContent;
      button.textContent = text;
      setTimeout(() => button.textContent = original, 1200);
    }

    function fallbackCopy(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      textarea.remove();
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function rawUrl(path) {
      const safePath = path.split('/').map(encodeURIComponent).join('/');
      return `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${encodeURIComponent(CONFIG.branch)}/${safePath}`;
    }

    function addCache(url) {
      if (!url) return url;
      const sep = url.includes('?') ? '&' : '?';
      return `${url}${sep}v=${state.cacheBust}`;
    }

    function sortCandidateDesc(a, b) {
      const ad = inferDateFromId(a.id) || '';
      const bd = inferDateFromId(b.id) || '';
      if (ad && bd && ad !== bd) return bd.localeCompare(ad);
      return String(b.id).localeCompare(String(a.id));
    }

    function sortCarouselDesc(a, b) {
      const ad = a.createdAt || inferDateFromId(a.id) || '';
      const bd = b.createdAt || inferDateFromId(b.id) || '';
      if (ad && bd && ad !== bd) return bd.localeCompare(ad);
      return String(b.id).localeCompare(String(a.id));
    }

    function inferDateFromId(id) {
      const match = String(id || '').match(/^(\d{4})(\d{2})(\d{2})-(\d{2})(\d{2})(\d{2})/);
      if (!match) return '';
      const [, y, m, d, h, min, s] = match;
      return `${y}-${m}-${d}T${h}:${min}:${s}`;
    }

    function formatDate(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat('pt-BR', {
        day: '2-digit',
        month: '2-digit',
        year: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      }).format(date);
    }

    function extractPageNumber(path) {
      const file = String(path || '').split('/').pop() || '';
      const pageMatch = file.match(/pagina[-_ ]?(\d+)/i);
      if (pageMatch) return Number.parseInt(pageMatch[1], 10) || 0;
      const anyNumber = file.match(/(\d+)/);
      return anyNumber ? Number.parseInt(anyNumber[1], 10) || 0 : 1;
    }

    function cleanText(value) {
      return String(value ?? '').trim();
    }

    function safeFileName(value) {
      return String(value || 'carrossel')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-zA-Z0-9-_]+/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '')
        .slice(0, 90) || 'carrossel';
    }

    function uniqueBy(items, key) {
      const seen = new Set();
      return items.filter(item => {
        const value = item[key];
        if (seen.has(value)) return false;
        seen.add(value);
        return true;
      });
    }

    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function cssEscape(value) {
      if (window.CSS && CSS.escape) return CSS.escape(value);
      return String(value).replace(/"/g, '\\"');
    }

    function renderSkeletons(count) {
      return Array.from({ length: count }, () => `
        <div class="skeleton-card">
          <div class="skeleton" style="height:26px;width:56%"></div>
          <div class="skeleton" style="height:30px;width:88%"></div>
          <div class="skeleton" style="height:330px;width:100%;border-radius:22px"></div>
          <div class="skeleton" style="height:78px;width:100%"></div>
        </div>
      `).join('');
    }
  </script>
</body>
