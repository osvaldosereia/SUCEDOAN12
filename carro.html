<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Leitor de Carrosséis</title>
  <style>
    :root {
      --bg: #f7f3ed;
      --card: #fffaf4;
      --text: #211b16;
      --muted: #776b61;
      --line: #eadfd3;
      --brand: #7b3f19;
      --brand-dark: #321d12;
      --soft: #efe4d8;
      --danger: #a53b2b;
      --ok: #267547;
      --shadow: 0 16px 44px rgba(48, 31, 17, .09);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: min(100%, 560px);
      margin: 0 auto;
      padding: 12px 12px 32px;
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: 0 -12px 12px;
      padding: 12px;
      background: rgba(247, 243, 237, .94);
      border-bottom: 1px solid rgba(234, 223, 211, .9);
      backdrop-filter: blur(14px);
    }

    .top-inner {
      width: min(100%, 560px);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: -.02em;
    }

    .sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .pill {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--muted);
      padding: 7px 9px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
    }

    .status {
      margin: 0 0 12px;
      padding: 12px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .status.ok { border-color: rgba(38, 117, 71, .24); }
    .status.err { border-color: rgba(165, 59, 43, .28); color: var(--danger); }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 26px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .media {
      position: relative;
      min-height: 400px;
      background: #eadfd3;
      display: grid;
      place-items: center;
      overflow: hidden;
      touch-action: pan-y;
    }

    .media img {
      width: 100%;
      height: auto;
      display: block;
      background: #eadfd3;
    }

    .media-empty {
      min-height: 420px;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .badge {
      position: absolute;
      top: 12px;
      z-index: 4;
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 12px;
      backdrop-filter: blur(10px);
    }

    .counter {
      left: 12px;
      background: rgba(33, 27, 22, .75);
      color: #fff;
    }

    .loader {
      right: 12px;
      background: rgba(255, 250, 244, .9);
      border: 1px solid rgba(255, 255, 255, .5);
      color: var(--text);
      display: none;
    }

    .loader.active { display: block; }

    .slide-nav,
    .carousel-nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px;
      background: rgba(255, 250, 244, .98);
      border-top: 1px solid var(--line);
    }

    .content { padding: 14px; }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 12px;
    }

    .tag {
      background: var(--soft);
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 8px;
      font-size: 12px;
      line-height: 1;
    }

    .title {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.14;
      letter-spacing: -.03em;
    }

    .theme {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.42;
    }

    .legend-box {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      margin: 12px 0;
    }

    .legend-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .legend {
      white-space: pre-wrap;
      color: var(--text);
      font-size: 14px;
      line-height: 1.48;
      max-height: 230px;
      overflow: auto;
      padding-right: 2px;
    }

    .actions {
      display: grid;
      gap: 9px;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 15px;
      min-height: 46px;
      padding: 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 760;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform .08s ease, opacity .14s ease;
    }

    button:active { transform: scale(.985); }
    button:disabled { opacity: .45; cursor: not-allowed; }

    .btn-soft { background: var(--soft); color: var(--brand-dark); }
    .btn-main { background: var(--brand); color: white; }
    .btn-dark { background: var(--brand-dark); color: white; }

    .download-progress {
      display: none;
      margin-top: 10px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .download-progress.active { display: block; }

    .bar {
      width: 100%;
      height: 8px;
      background: var(--soft);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: var(--brand);
      border-radius: 999px;
      transition: width .2s ease;
    }

    .note {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .empty {
      background: var(--card);
      border: 1px dashed var(--line);
      border-radius: 20px;
      padding: 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    code {
      background: rgba(0, 0, 0, .05);
      border-radius: 6px;
      padding: 2px 5px;
    }

    @media (min-width: 560px) {
      .media { min-height: 560px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="top-inner">
        <div>
          <h1>Leitor de Carrosséis</h1>
          <p class="sub">Cada pasta é um carrossel. As imagens só carregam quando usadas.</p>
        </div>
        <div class="pill" id="repoPill">GitHub</div>
      </div>
    </header>

    <section class="status" id="status">Carregando...</section>
    <section id="viewer"></section>
  </main>

  <script>
    const CONFIG = {
      owner: 'osvaldosereia',
      repo: 'SUCEDOAN12',
      branch: 'main',

      // Caminho informado: SUCEDOAN12/carrossel/
      // Mantive carrosseis/ como fallback caso exista alguma pasta antiga no plural.
      rootPaths: ['carrossel', 'carrosseis'],

      jpegQuality: 0.76,
      maxImageWidth: 1280,
      pauseBetweenDownloadsMs: 900
    };

    const state = {
      rootPath: '',
      folders: [],
      index: 0,
      pageIndex: 0,
      cache: new Map(),
      loadingCarousel: false,
      downloading: false
    };

    const $status = document.getElementById('status');
    const $viewer = document.getElementById('viewer');
    const $repoPill = document.getElementById('repoPill');
    $repoPill.textContent = `${CONFIG.owner}/${CONFIG.repo}`;

    init();

    async function init() {
      try {
        setStatus('Procurando pastas de carrosséis no GitHub...');

        const found = await findRootAndFolders();
        state.rootPath = found.rootPath;
        state.folders = found.folders;

        if (!state.folders.length) {
          renderEmpty();
          return;
        }

        state.index = 0;
        state.pageIndex = 0;

        setStatus(`Encontradas ${state.folders.length} pastas em ${state.rootPath}/. Carregando o carrossel mais recente...`, 'ok');

        await loadAndRender(0);

        // Pré-carrega somente os DADOS do próximo carrossel, sem baixar imagens pesadas.
        warmNextCarouselData();
      } catch (error) {
        console.error(error);
        setStatus(`Erro: ${error.message}`, 'err');
        renderEmpty(error.message);
      }
    }

    async function findRootAndFolders() {
      const errors = [];

      for (const root of CONFIG.rootPaths) {
        try {
          const items = await fetchGithubContents(root);
          const folders = items
            .filter(item => item && item.type === 'dir')
            .map(item => ({
              id: item.name,
              path: cleanPath(item.path || `${root}/${item.name}`),
              htmlUrl: item.html_url || ''
            }))
            .sort((a, b) => {
              const tb = parseCarouselDate(b.id);
              const ta = parseCarouselDate(a.id);
              if (tb !== ta) return tb - ta;
              return b.id.localeCompare(a.id);
            });

          if (folders.length) return { rootPath: cleanPath(root), folders };
        } catch (error) {
          errors.push(`${root}/: ${error.message}`);
        }
      }

      throw new Error(`Nenhuma pasta encontrada. Tentativas: ${errors.join(' | ')}`);
    }

    async function fetchGithubContents(path) {
      const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${encodePath(path)}?ref=${encodeURIComponent(CONFIG.branch)}`;
      const res = await fetch(url, { cache: 'no-store' });

      if (!res.ok) {
        throw new Error(`GitHub retornou ${res.status}`);
      }

      const json = await res.json();
      return Array.isArray(json) ? json : [];
    }

    async function loadAndRender(index) {
      if (state.loadingCarousel) return;
      const folder = state.folders[index];
      if (!folder) return;

      state.loadingCarousel = true;
      state.index = index;
      state.pageIndex = 0;

      try {
        setStatus(`Carregando carrossel ${folder.id}...`, 'ok');
        const data = await getCarousel(folder);
        renderCarousel(folder, data);
        setStatus(`Mostrando ${state.index + 1} de ${state.folders.length}: ${folder.id}`, 'ok');
      } catch (error) {
        console.error(error);
        setStatus(`Erro ao carregar ${folder.id}: ${error.message}`, 'err');
        renderCarousel(folder, emptyCarousel(folder, error.message));
      } finally {
        state.loadingCarousel = false;
      }
    }

    async function getCarousel(folder) {
      if (state.cache.has(folder.path)) {
        return state.cache.get(folder.path);
      }

      const data = await fetchCarouselData(folder);
      state.cache.set(folder.path, data);
      return data;
    }

    async function fetchCarouselData(folder) {
      const dadosPath = `${cleanPath(folder.path)}/dados.json`;
      let json = {};
      let jsonError = '';

      try {
        const res = await fetch(rawUrl(dadosPath), { cache: 'no-store' });
        if (!res.ok) throw new Error(`dados.json retornou ${res.status}`);
        json = await res.json();
      } catch (error) {
        jsonError = error.message;
      }

      // Lista apenas os nomes/links da pasta. Isso não baixa as imagens pesadas.
      const folderItems = await fetchGithubContents(folder.path);
      const imagesFromFolder = folderItems
        .filter(item => item && item.type === 'file')
        .filter(item => /\.(jpe?g|png|webp)$/i.test(item.name || ''))
        .filter(item => !/^dados\.json$/i.test(item.name || ''))
        .map(item => ({
          numero: imageNumber(item.name),
          url: item.download_url || rawUrl(item.path),
          path: cleanPath(item.path || ''),
          name: item.name || ''
        }))
        .sort((a, b) => a.numero - b.numero || a.name.localeCompare(b.name));

      const imagesFromJson = Array.isArray(json.urls_imagens) ? json.urls_imagens
        .map((item, i) => ({
          numero: Number(item.numero || i + 1),
          url: item.url,
          path: item.url || '',
          name: `pagina-${String(item.numero || i + 1).padStart(2, '0')}.jpg`
        }))
        .filter(item => item.url)
        .sort((a, b) => a.numero - b.numero) : [];

      return {
        ...json,
        id_carrossel: json.id_carrossel || folder.id,
        __folder: folder.path,
        __jsonError: jsonError,
        images: imagesFromFolder.length ? imagesFromFolder : imagesFromJson
      };
    }

    function emptyCarousel(folder, error) {
      return {
        id_carrossel: folder.id,
        titulo_carrossel: `Carrossel ${folder.id}`,
        tema: '',
        legenda_instagram: '',
        __folder: folder.path,
        __jsonError: error || '',
        images: []
      };
    }

    function warmNextCarouselData() {
      const nextIndex = state.index + 1;
      const folder = state.folders[nextIndex];
      if (!folder || state.cache.has(folder.path)) return;

      getCarousel(folder).catch(error => {
        console.warn('Não foi possível pré-carregar o próximo carrossel:', error);
      });
    }

    function renderCarousel(folder, data) {
      const images = Array.isArray(data.images) ? data.images : [];
      const page = images[state.pageIndex] || null;
      const total = images.length;
      const legenda = data.legenda_instagram || '';
      const title = data.titulo_carrossel || data.tema || `Carrossel ${folder.id}`;
      const theme = data.tema || '';
      const canNewer = state.index > 0;
      const canOlder = state.index < state.folders.length - 1;

      $viewer.innerHTML = `
        <article class="card">
          <div class="media" id="mediaBox">
            ${page
              ? `<img id="slideImg" src="${escapeAttr(page.url)}" alt="Página ${escapeAttr(page.numero || state.pageIndex + 1)}">`
              : `<div class="media-empty">Nenhuma imagem encontrada nesta pasta.<br>Confira se existem arquivos como <code>pagina-1.jpg</code>, <code>pagina-2.jpg</code>...</div>`
            }
            <div class="badge counter">Página ${escapeHtml(total ? state.pageIndex + 1 : 0)} de ${escapeHtml(total)}</div>
            <div class="badge loader" id="loader">Carregando imagem...</div>
          </div>

          <div class="slide-nav">
            <button class="btn-soft" id="prevPage" ${state.pageIndex <= 0 ? 'disabled' : ''}>Página anterior</button>
            <button class="btn-soft" id="nextPage" ${state.pageIndex >= total - 1 ? 'disabled' : ''}>Próxima página</button>
          </div>

          <div class="content">
            <div class="meta">
              <span class="tag">${escapeHtml(folder.id)}</span>
              <span class="tag">${escapeHtml(folder.path)}</span>
              ${data.status ? `<span class="tag">${escapeHtml(data.status)}</span>` : ''}
              ${data.categoria ? `<span class="tag">${escapeHtml(data.categoria)}</span>` : ''}
            </div>

            <h2 class="title">${escapeHtml(title)}</h2>
            ${theme && theme !== title ? `<p class="theme">${escapeHtml(theme)}</p>` : ''}
            ${data.__jsonError ? `<p class="theme">Aviso: não consegui ler o dados.json: ${escapeHtml(data.__jsonError)}</p>` : ''}

            <div class="legend-box">
              <div class="legend-head">
                <span>Legenda</span>
                <span>${escapeHtml(legenda.length)} caracteres</span>
              </div>
              <div class="legend" id="legendText">${escapeHtml(legenda || 'Sem legenda no dados.json.')}</div>
            </div>

            <div class="actions">
              <button class="btn-dark" id="copyLegend">Copiar legenda</button>
              <button class="btn-main" id="downloadAll" ${!total ? 'disabled' : ''}>Baixar páginas uma a uma</button>
            </div>

            <div class="download-progress" id="downloadProgress">
              <div id="downloadText">Preparando...</div>
              <div class="bar"><div class="fill" id="downloadFill"></div></div>
            </div>

            <div class="carousel-nav">
              <button class="btn-soft" id="newerCarousel" ${!canNewer ? 'disabled' : ''}>Carrossel mais novo</button>
              <button class="btn-soft" id="olderCarousel" ${!canOlder ? 'disabled' : ''}>Carrossel anterior</button>
            </div>

            <p class="note">O botão “Carrossel anterior” troca para a próxima pasta da lista, sempre do mais recente para o mais antigo. As imagens pesadas só baixam quando aparecem no slide ou no botão de download.</p>
          </div>
        </article>
      `;

      bindEvents(folder, data);
    }

    function bindEvents(folder, data) {
      const images = Array.isArray(data.images) ? data.images : [];
      const img = document.getElementById('slideImg');
      const loader = document.getElementById('loader');
      const mediaBox = document.getElementById('mediaBox');

      if (img && loader) {
        loader.classList.add('active');
        if (img.complete) loader.classList.remove('active');
        img.addEventListener('load', () => loader.classList.remove('active'), { once: true });
        img.addEventListener('error', () => {
          loader.textContent = 'Erro na imagem';
          loader.classList.add('active');
        }, { once: true });
      }

      document.getElementById('prevPage')?.addEventListener('click', () => {
        if (state.pageIndex <= 0) return;
        state.pageIndex -= 1;
        renderCarousel(folder, data);
      });

      document.getElementById('nextPage')?.addEventListener('click', () => {
        if (state.pageIndex >= images.length - 1) return;
        state.pageIndex += 1;
        renderCarousel(folder, data);
      });

      document.getElementById('copyLegend')?.addEventListener('click', async event => {
        await copyText(data.legenda_instagram || '');
        flashButton(event.currentTarget, 'Legenda copiada');
      });

      document.getElementById('downloadAll')?.addEventListener('click', async () => {
        await downloadImagesOneByOne(folder, data);
      });

      document.getElementById('olderCarousel')?.addEventListener('click', async event => {
        if (state.index >= state.folders.length - 1) return;
        event.currentTarget.disabled = true;
        await loadAndRender(state.index + 1);
        warmNextCarouselData();
        scrollToViewer();
      });

      document.getElementById('newerCarousel')?.addEventListener('click', async event => {
        if (state.index <= 0) return;
        event.currentTarget.disabled = true;
        await loadAndRender(state.index - 1);
        warmNextCarouselData();
        scrollToViewer();
      });

      let startX = 0;
      let startY = 0;
      mediaBox?.addEventListener('touchstart', event => {
        const t = event.changedTouches[0];
        startX = t.clientX;
        startY = t.clientY;
      }, { passive: true });

      mediaBox?.addEventListener('touchend', event => {
        const t = event.changedTouches[0];
        const dx = t.clientX - startX;
        const dy = t.clientY - startY;
        if (Math.abs(dx) < 45 || Math.abs(dx) < Math.abs(dy)) return;

        if (dx < 0 && state.pageIndex < images.length - 1) {
          state.pageIndex += 1;
          renderCarousel(folder, data);
        }

        if (dx > 0 && state.pageIndex > 0) {
          state.pageIndex -= 1;
          renderCarousel(folder, data);
        }
      }, { passive: true });
    }

    async function downloadImagesOneByOne(folder, data) {
      if (state.downloading) return;
      const images = Array.isArray(data.images) ? data.images : [];
      if (!images.length) return;

      const progress = document.getElementById('downloadProgress');
      const text = document.getElementById('downloadText');
      const fill = document.getElementById('downloadFill');
      const btn = document.getElementById('downloadAll');

      state.downloading = true;
      if (btn) btn.disabled = true;
      if (progress) progress.classList.add('active');

      try {
        for (let i = 0; i < images.length; i++) {
          const item = images[i];
          const pageNumber = item.numero || i + 1;

          if (text) text.textContent = `Baixando página ${i + 1} de ${images.length}...`;
          if (fill) fill.style.width = `${Math.round((i / images.length) * 100)}%`;

          const blob = await fetchAndCompressImage(item.url);
          const filename = `${safeName(folder.id)}-pagina-${String(pageNumber).padStart(2, '0')}.jpg`;
          triggerDownload(blob, filename);

          await sleep(CONFIG.pauseBetweenDownloadsMs);
        }

        if (text) text.textContent = `Concluído: ${images.length} imagens baixadas.`;
        if (fill) fill.style.width = '100%';
      } catch (error) {
        console.error(error);
        if (text) text.textContent = `Erro no download: ${error.message}`;
      } finally {
        state.downloading = false;
        if (btn) btn.disabled = false;
      }
    }

    async function fetchAndCompressImage(url) {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Imagem retornou ${res.status}`);

      const inputBlob = await res.blob();
      const img = await blobToImage(inputBlob);
      const originalWidth = img.naturalWidth || img.width;
      const originalHeight = img.naturalHeight || img.height;
      const scale = Math.min(1, CONFIG.maxImageWidth / originalWidth);
      const width = Math.max(1, Math.round(originalWidth * scale));
      const height = Math.max(1, Math.round(originalHeight * scale));

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext('2d', { alpha: false });
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(img, 0, 0, width, height);

      URL.revokeObjectURL(img.src);

      return await new Promise((resolve, reject) => {
        canvas.toBlob(blob => {
          if (blob) resolve(blob);
          else reject(new Error('Não foi possível compactar a imagem.'));
        }, 'image/jpeg', CONFIG.jpegQuality);
      });
    }

    function blobToImage(blob) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('Não foi possível abrir a imagem.'));
        img.src = URL.createObjectURL(blob);
      });
    }

    function triggerDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      textarea.style.top = '0';
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      document.execCommand('copy');
      textarea.remove();
    }

    function imageNumber(filename) {
      const name = String(filename || '');
      const explicit = name.match(/(?:pagina|página|page|img|imagem)[-_ ]?(\d+)/i);
      if (explicit) return Number(explicit[1]);

      const any = name.match(/(\d+)/);
      if (any) return Number(any[1]);

      return 9999;
    }

    function parseCarouselDate(id) {
      const text = String(id || '');
      const match = text.match(/(\d{4})(\d{2})(\d{2})[-_ ]?(\d{2})?(\d{2})?(\d{2})?/);
      if (!match) return 0;

      const year = Number(match[1]);
      const month = Number(match[2]) - 1;
      const day = Number(match[3]);
      const hour = Number(match[4] || 0);
      const minute = Number(match[5] || 0);
      const second = Number(match[6] || 0);
      const time = Date.UTC(year, month, day, hour, minute, second);

      return Number.isFinite(time) ? time : 0;
    }

    function rawUrl(path) {
      return `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${encodeURIComponent(CONFIG.branch)}/${encodePath(path)}`;
    }

    function encodePath(path) {
      return cleanPath(path).split('/').map(encodeURIComponent).join('/');
    }

    function cleanPath(path) {
      return String(path || '').replace(/^\/+|\/+$/g, '').replace(/\/+/g, '/');
    }

    function safeName(value) {
      return String(value || 'carrossel')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9-_]+/gi, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '')
        .toLowerCase();
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function scrollToViewer() {
      $viewer.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function flashButton(button, message) {
      const original = button.textContent;
      button.textContent = message;
      button.disabled = true;
      setTimeout(() => {
        button.textContent = original;
        button.disabled = false;
      }, 1200);
    }

    function setStatus(message, type) {
      $status.className = `status${type ? ` ${type}` : ''}`;
      $status.innerHTML = escapeHtml(message);
    }

    function renderEmpty(extra) {
      const paths = CONFIG.rootPaths.map(path => `<code>${escapeHtml(path)}/20260604-103104/dados.json</code>`).join('<br>');
      $viewer.innerHTML = `
        <div class="empty">
          <strong>Nenhum carrossel encontrado.</strong><br><br>
          O site procura pastas dentro de:<br><br>
          ${CONFIG.rootPaths.map(path => `<code>${escapeHtml(path)}/</code>`).join('<br>')}<br><br>
          E espera este padrão:<br><br>
          ${paths}<br><br>
          Confira se o branch é <code>${escapeHtml(CONFIG.branch)}</code>, se o repositório é público e se cada carrossel é uma pasta dentro de <code>carrossel/</code>.
          ${extra ? `<br><br>Detalhe: ${escapeHtml(extra)}` : ''}
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#096;');
    }
  </script>
</body>
</html>
