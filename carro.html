<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Leitor de Vídeos Dona Antônia</title>
  <style>
    :root {
      --bg: #f7f3ed;
      --card: #fffaf4;
      --text: #211b16;
      --muted: #776b61;
      --line: #eadfd3;
      --brand: #7b3f19;
      --brand-dark: #321d12;
      --soft: #efe4d8;
      --danger: #a53b2b;
      --ok: #267547;
      --shadow: 0 16px 44px rgba(48, 31, 17, .09);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: min(100%, 620px);
      margin: 0 auto;
      padding: 12px 12px 34px;
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: 0 -12px 12px;
      padding: 12px;
      background: rgba(247, 243, 237, .94);
      border-bottom: 1px solid rgba(234, 223, 211, .9);
      backdrop-filter: blur(14px);
    }

    .top-inner {
      width: min(100%, 620px);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: -.02em;
    }

    .sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .pill {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--muted);
      padding: 7px 9px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
      max-width: 210px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status {
      margin: 0 0 12px;
      padding: 12px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .status.ok { border-color: rgba(38, 117, 71, .24); }
    .status.err { border-color: rgba(165, 59, 43, .28); color: var(--danger); }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 26px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .media {
      position: relative;
      min-height: 360px;
      background: #eadfd3;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .media img {
      width: 100%;
      max-height: 620px;
      object-fit: contain;
      display: block;
      background: #eadfd3;
    }

    .media-empty {
      min-height: 360px;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .badge {
      position: absolute;
      top: 12px;
      z-index: 4;
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 12px;
      backdrop-filter: blur(10px);
      background: rgba(33, 27, 22, .75);
      color: #fff;
      left: 12px;
      max-width: calc(100% - 24px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .content { padding: 14px; }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 12px;
    }

    .tag {
      background: var(--soft);
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 8px;
      font-size: 12px;
      line-height: 1.1;
    }

    .title {
      margin: 0 0 8px;
      font-size: 21px;
      line-height: 1.14;
      letter-spacing: -.03em;
    }

    .theme {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.42;
    }

    .grid-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0;
    }

    .info-box {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px;
      min-width: 0;
    }

    .info-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 4px;
    }

    .info-value {
      color: var(--text);
      font-size: 13px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .prompt-box {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      margin: 12px 0;
    }

    .prompt-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .prompt {
      white-space: pre-wrap;
      color: var(--text);
      font-size: 13px;
      line-height: 1.48;
      max-height: 420px;
      overflow: auto;
      padding: 2px 4px 2px 0;
    }

    .actions,
    .video-nav {
      display: grid;
      gap: 9px;
      margin-top: 12px;
    }

    .actions { grid-template-columns: 1fr; }
    .video-nav { grid-template-columns: 1fr 1fr; }

    button {
      border: 0;
      border-radius: 15px;
      min-height: 46px;
      padding: 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 760;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform .08s ease, opacity .14s ease;
    }

    button:active { transform: scale(.985); }
    button:disabled { opacity: .45; cursor: not-allowed; }

    .btn-soft { background: var(--soft); color: var(--brand-dark); }
    .btn-main { background: var(--brand); color: white; }
    .btn-dark { background: var(--brand-dark); color: white; }

    .note {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .empty {
      background: var(--card);
      border: 1px dashed var(--line);
      border-radius: 20px;
      padding: 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    code {
      background: rgba(0, 0, 0, .05);
      border-radius: 6px;
      padding: 2px 5px;
    }

    @media (max-width: 420px) {
      .grid-info { grid-template-columns: 1fr; }
      .video-nav { grid-template-columns: 1fr; }
      .media { min-height: 320px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="top-inner">
        <div>
          <h1>Leitor de Vídeos</h1>
          <p class="sub">Lê as pastas dentro de <code>video/</code>, mostra a imagem e o prompt do Gemini.</p>
        </div>
        <div class="pill" id="repoPill">GitHub</div>
      </div>
    </header>

    <section class="status" id="status">Carregando...</section>
    <section id="viewer"></section>
  </main>

  <script>
    const CONFIG = {
      owner: 'osvaldosereia',
      repo: 'SUCEDOAN12',
      branch: 'main',
      rootPath: 'video',

      dataFilePriority: [
        'videododia.json',
        'video-do-dia.json',
        'video_do_dia.json',
        'dados.json',
        'data.json',
        'prompt.json'
      ],

      imageFilePriority: [
        'produto.webp',
        'produto.jpg',
        'produto.jpeg',
        'produto.png',
        'imagem.webp',
        'imagem.jpg',
        'imagem.jpeg',
        'imagem.png'
      ],

      promptFieldNames: [
        'prompt_gemini',
        'promptGemini',
        'prompt_video',
        'promptVideo',
        'prompt',
        'texto_prompt',
        'conteudo_prompt',
        'gemini_prompt',
        'video_prompt',
        'output_text',
        'response',
        'content'
      ],

      imageFieldNames: [
        'imagem_github',
        'url_imagem_github',
        'imagem_produto_github',
        'produto_imagem_github',
        'produto_imagem',
        'image_link',
        'imagem',
        'image',
        'url_imagem',
        'image_url',
        'produto.image',
        'produto.imagem',
        'produto.image_link'
      ]
    };

    const state = {
      folders: [],
      index: 0,
      cache: new Map(),
      loading: false
    };

    const $status = document.getElementById('status');
    const $viewer = document.getElementById('viewer');
    const $repoPill = document.getElementById('repoPill');
    $repoPill.textContent = `${CONFIG.owner}/${CONFIG.repo}`;

    init();

    async function init() {
      try {
        setStatus(`Procurando pastas dentro de ${CONFIG.rootPath}/...`);
        const items = await fetchGithubContents(CONFIG.rootPath);

        state.folders = items
          .filter(item => item && item.type === 'dir')
          .map(item => ({
            id: item.name,
            path: cleanPath(item.path || `${CONFIG.rootPath}/${item.name}`),
            htmlUrl: item.html_url || ''
          }))
          .sort((a, b) => {
            const tb = parseDateFromText(b.id);
            const ta = parseDateFromText(a.id);
            if (tb !== ta) return tb - ta;
            return b.id.localeCompare(a.id);
          });

        if (!state.folders.length) {
          renderEmpty('Nenhuma pasta encontrada dentro de video/.');
          setStatus('Nenhum vídeo encontrado.', 'err');
          return;
        }

        setStatus(`Encontradas ${state.folders.length} pastas em video/. Carregando a mais recente...`, 'ok');
        await loadAndRender(0);
      } catch (error) {
        console.error(error);
        setStatus(`Erro: ${error.message}`, 'err');
        renderEmpty(error.message);
      }
    }

    async function loadAndRender(index) {
      if (state.loading) return;
      const folder = state.folders[index];
      if (!folder) return;

      state.loading = true;
      state.index = index;

      try {
        setStatus(`Carregando vídeo ${folder.id}...`, 'ok');
        const data = await getVideoData(folder);
        renderVideo(folder, data);
        setStatus(`Mostrando ${state.index + 1} de ${state.folders.length}: ${folder.id}`, 'ok');
      } catch (error) {
        console.error(error);
        setStatus(`Erro ao carregar ${folder.id}: ${error.message}`, 'err');
        renderVideo(folder, emptyVideo(folder, error.message));
      } finally {
        state.loading = false;
      }
    }

    async function getVideoData(folder) {
      if (state.cache.has(folder.path)) return state.cache.get(folder.path);
      const data = await fetchVideoData(folder);
      state.cache.set(folder.path, data);
      return data;
    }

    async function fetchVideoData(folder) {
      const folderItems = await fetchGithubContents(folder.path);
      const jsonFile = chooseJsonFile(folderItems, folder);
      const json = await fetchJsonFile(jsonFile.path);
      const image = chooseImage(folderItems, json, folder);
      const prompt = extractPrompt(json);
      const product = extractProduct(json);

      return {
        ...json,
        __folder: folder.path,
        __jsonFile: jsonFile.name,
        __jsonPath: jsonFile.path,
        __image: image,
        __prompt: prompt,
        __product: product
      };
    }

    function chooseJsonFile(items, folder) {
      const jsonFiles = (Array.isArray(items) ? items : [])
        .filter(item => item && item.type === 'file' && /\.json$/i.test(item.name || ''))
        .sort((a, b) => jsonPriority(a.name) - jsonPriority(b.name) || String(a.name).localeCompare(String(b.name)));

      return jsonFiles[0] || {
        name: 'videododia.json',
        path: `${cleanPath(folder.path)}/videododia.json`
      };
    }

    function jsonPriority(name) {
      const lower = String(name || '').toLowerCase().trim();
      const exact = CONFIG.dataFilePriority.findIndex(item => item.toLowerCase() === lower);
      if (exact >= 0) return exact;
      if (/video.*dia.*\.json$/i.test(lower)) return CONFIG.dataFilePriority.length + 1;
      if (/prompt.*\.json$/i.test(lower)) return CONFIG.dataFilePriority.length + 2;
      return CONFIG.dataFilePriority.length + 10;
    }

    async function fetchJsonFile(path) {
      const res = await fetch(rawUrl(path), { cache: 'no-store' });
      if (!res.ok) throw new Error(`${basename(path)} retornou ${res.status}`);
      const text = await res.text();
      return safeJsonParse(text);
    }

    function chooseImage(folderItems, json, folder) {
      const imageFiles = (Array.isArray(folderItems) ? folderItems : [])
        .filter(item => item && item.type === 'file')
        .filter(item => /\.(jpe?g|png|webp)$/i.test(item.name || ''))
        .sort((a, b) => imagePriority(a.name) - imagePriority(b.name) || String(a.name).localeCompare(String(b.name)));

      if (imageFiles.length) {
        const file = imageFiles[0];
        return {
          name: file.name || basename(file.path),
          url: file.download_url || rawUrl(file.path),
          path: file.path || `${cleanPath(folder.path)}/${file.name}`
        };
      }

      for (const field of CONFIG.imageFieldNames) {
        const value = getPathValue(json, field) || getDeepValue(json, field);
        if (typeof value === 'string' && value.trim()) {
          const normalized = normalizeImageUrl(value, folder);
          if (normalized) {
            return {
              name: basename(normalized) || 'produto',
              url: normalized,
              path: normalized
            };
          }
        }
      }

      const deepUrl = findFirstImageUrl(json);
      if (deepUrl) {
        return {
          name: basename(deepUrl) || 'produto',
          url: normalizeImageUrl(deepUrl, folder),
          path: deepUrl
        };
      }

      return null;
    }

    function imagePriority(name) {
      const lower = String(name || '').toLowerCase().trim();
      const exact = CONFIG.imageFilePriority.findIndex(item => item.toLowerCase() === lower);
      if (exact >= 0) return exact;
      if (/produto/i.test(lower)) return CONFIG.imageFilePriority.length + 1;
      if (/imagem|image/i.test(lower)) return CONFIG.imageFilePriority.length + 2;
      return CONFIG.imageFilePriority.length + 10;
    }

    function extractPrompt(json) {
      for (const field of CONFIG.promptFieldNames) {
        const value = getPathValue(json, field) || getDeepValue(json, field);
        const text = stringifyPrompt(value);
        if (text) return cleanPrompt(text);
      }

      const deep = findTextByKey(json, /(prompt|gemini|roteiro|video)/i);
      if (deep) return cleanPrompt(deep);

      return JSON.stringify(json, null, 2);
    }

    function extractProduct(json) {
      const product = json.produto && typeof json.produto === 'object' ? json.produto : {};
      return {
        nome: firstText(product.nome, product.title, product.name, json.nome_produto, json.produto_nome, json.title, json.nome),
        marca: firstText(product.marca, product.brand, json.marca, json.brand),
        categoria: firstText(product.categoria, product.category, json.categoria, json.category),
        tipoVideo: firstText(json.tipo_video, json.tipoVideo, json.estilo_video, json.estilo, json.video_tipo),
        data: firstText(json.data, json.criado_em, json.created_at),
        idVideo: firstText(json.id_video, json.id, json.slug)
      };
    }

    function renderVideo(folder, data) {
      const image = data.__image;
      const prompt = data.__prompt || '';
      const product = data.__product || {};
      const canNewer = state.index > 0;
      const canOlder = state.index < state.folders.length - 1;
      const title = product.nome || data.titulo || data.title || `Vídeo ${folder.id}`;

      $viewer.innerHTML = `
        <article class="card">
          <div class="media">
            ${image
              ? `<img id="productImage" src="${escapeAttr(image.url)}" alt="${escapeAttr(title)}" loading="eager" decoding="async">`
              : `<div class="media-empty">Nenhuma imagem encontrada nesta pasta.<br>Confira se existe <code>produto.webp</code>, <code>produto.jpg</code> ou URL de imagem no JSON.</div>`
            }
            <div class="badge">${escapeHtml(folder.path)}</div>
          </div>

          <div class="content">
            <div class="meta">
              <span class="tag">${escapeHtml(folder.id)}</span>
              <span class="tag">${escapeHtml(data.__jsonFile || 'videododia.json')}</span>
              ${image ? `<span class="tag">${escapeHtml(image.name || 'imagem')}</span>` : ''}
              ${product.tipoVideo ? `<span class="tag">${escapeHtml(product.tipoVideo)}</span>` : ''}
            </div>

            <h2 class="title">${escapeHtml(title)}</h2>
            <p class="theme">Conteúdo gerado para copiar o prompt no Gemini e baixar a imagem de referência do produto.</p>

            <div class="grid-info">
              <div class="info-box">
                <div class="info-label">Marca</div>
                <div class="info-value">${escapeHtml(product.marca || '-')}</div>
              </div>
              <div class="info-box">
                <div class="info-label">Categoria</div>
                <div class="info-value">${escapeHtml(product.categoria || '-')}</div>
              </div>
              <div class="info-box">
                <div class="info-label">Tipo de vídeo</div>
                <div class="info-value">${escapeHtml(product.tipoVideo || '-')}</div>
              </div>
              <div class="info-box">
                <div class="info-label">ID</div>
                <div class="info-value">${escapeHtml(product.idVideo || folder.id)}</div>
              </div>
            </div>

            <div class="actions">
              <button class="btn-main" id="downloadImage" ${image ? '' : 'disabled'}>Baixar imagem do produto</button>
              <button class="btn-dark" id="copyPrompt" ${prompt ? '' : 'disabled'}>Copiar prompt para Gemini</button>
            </div>

            <div class="prompt-box">
              <div class="prompt-head">
                <span>Prompt pronto para copiar</span>
                <span>${escapeHtml(prompt.length)} caracteres</span>
              </div>
              <div class="prompt" id="promptText">${escapeHtml(prompt || 'Nenhum prompt encontrado no JSON.')}</div>
            </div>

            <div class="video-nav">
              <button class="btn-soft" id="newerVideo" ${!canNewer ? 'disabled' : ''}>Vídeo mais novo</button>
              <button class="btn-soft" id="olderVideo" ${!canOlder ? 'disabled' : ''}>Vídeo anterior</button>
            </div>

            <p class="note">O site procura automaticamente dentro de <code>video/</code>. Em cada pasta, ele lê primeiro <code>videododia.json</code> e usa a primeira imagem encontrada, priorizando <code>produto.webp</code>, <code>produto.jpg</code> ou <code>produto.png</code>.</p>
          </div>
        </article>
      `;

      bindEvents(folder, data);
    }

    function bindEvents(folder, data) {
      const image = data.__image;
      const prompt = data.__prompt || '';

      document.getElementById('downloadImage')?.addEventListener('click', async event => {
        if (!image) return;
        const fileBase = safeName(`${folder.id}-${data.__product?.nome || 'produto'}`);
        const ext = getImageExtension(image.name || image.url) || 'jpg';
        await downloadUrlAsFile(image.url, `${fileBase}.${ext}`);
        flashButton(event.currentTarget, 'Imagem baixada');
      });

      document.getElementById('copyPrompt')?.addEventListener('click', async event => {
        await copyText(prompt);
        flashButton(event.currentTarget, 'Prompt copiado');
      });

      document.getElementById('olderVideo')?.addEventListener('click', async event => {
        if (state.index >= state.folders.length - 1) return;
        event.currentTarget.disabled = true;
        await loadAndRender(state.index + 1);
        scrollToViewer();
      });

      document.getElementById('newerVideo')?.addEventListener('click', async event => {
        if (state.index <= 0) return;
        event.currentTarget.disabled = true;
        await loadAndRender(state.index - 1);
        scrollToViewer();
      });
    }

    async function fetchGithubContents(path) {
      const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${encodePath(path)}?ref=${encodeURIComponent(CONFIG.branch)}`;
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`${path}: GitHub retornou ${res.status}`);
      const json = await res.json();
      return Array.isArray(json) ? json : [];
    }

    function rawUrl(path) {
      return `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${encodeURIComponent(CONFIG.branch)}/${encodePath(path)}`;
    }

    function normalizeImageUrl(value, folder) {
      let url = String(value || '').trim().replace(/^['"]|['"]$/g, '').replace(/\\/g, '/');
      if (!url) return '';

      if (/^https?:\/\/github\.com\//i.test(url) && /\/blob\//i.test(url)) {
        return url.replace('https://github.com/', 'https://raw.githubusercontent.com/').replace('/blob/', '/');
      }

      if (/^https?:\/\//i.test(url)) return url;
      if (url.startsWith('/')) return rawUrl(url.replace(/^\/+/, ''));
      if (url.includes('/')) return rawUrl(url);
      return rawUrl(`${cleanPath(folder.path || '')}/${url}`);
    }

    async function downloadUrlAsFile(url, filename) {
      try {
        const res = await fetch(url, { cache: 'no-store', mode: 'cors' });
        if (!res.ok) throw new Error(`Imagem retornou ${res.status}`);
        const blob = await res.blob();
        triggerDownload(blob, filename);
      } catch (error) {
        console.warn('Download por fetch falhou. Tentando link direto:', error);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.rel = 'noopener';
        a.target = '_blank';
        document.body.appendChild(a);
        a.click();
        a.remove();
      }
    }

    function triggerDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    }

    async function copyText(text) {
      const clean = String(text || '').trim();
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(clean);
        return;
      }

      const textarea = document.createElement('textarea');
      textarea.value = clean;
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      textarea.style.top = '0';
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      document.execCommand('copy');
      textarea.remove();
    }

    function safeJsonParse(text) {
      const base = String(text || '')
        .replace(/^\uFEFF/, '')
        .trim()
        .replace(/^```(?:json)?\s*/i, '')
        .replace(/```$/i, '')
        .trim();

      const attempts = [base];
      const firstObj = base.indexOf('{');
      const lastObj = base.lastIndexOf('}');
      if (firstObj >= 0 && lastObj > firstObj) attempts.push(base.slice(firstObj, lastObj + 1));

      for (const candidate of attempts) {
        try {
          let parsed = JSON.parse(candidate.replace(/,\s*([}\]])/g, '$1'));
          if (typeof parsed === 'string') parsed = JSON.parse(parsed);
          if (parsed && typeof parsed === 'object') return parsed;
        } catch (_) {}
      }

      throw new Error('não consegui interpretar o JSON');
    }

    function stringifyPrompt(value) {
      if (value == null) return '';
      if (typeof value === 'string') return value;
      if (Array.isArray(value)) return value.map(stringifyPrompt).filter(Boolean).join('\n');
      if (typeof value === 'object') {
        const direct = firstText(value.text, value.content, value.value, value.prompt, value.output_text);
        if (direct) return direct;
        if (Array.isArray(value.choices) && value.choices[0]) {
          return stringifyPrompt(value.choices[0]?.message?.content || value.choices[0]?.text);
        }
      }
      return '';
    }

    function cleanPrompt(text) {
      return String(text || '')
        .replace(/^\uFEFF/, '')
        .replace(/^```(?:text|txt|markdown|md|json)?\s*/i, '')
        .replace(/```$/i, '')
        .replace(/```/g, '')
        .replace(/\\n/g, '\n')
        .replace(/\\r/g, '')
        .replace(/^['"]|['"]$/g, '')
        .trim();
    }

    function getDeepValue(obj, targetField) {
      if (!obj || typeof obj !== 'object') return undefined;
      if (Object.prototype.hasOwnProperty.call(obj, targetField)) return obj[targetField];

      const target = String(targetField).toLowerCase();
      const stack = [obj];
      const seen = new Set();

      while (stack.length) {
        const current = stack.shift();
        if (!current || typeof current !== 'object' || seen.has(current)) continue;
        seen.add(current);

        for (const [key, value] of Object.entries(current)) {
          if (String(key).toLowerCase() === target) return value;
          if (value && typeof value === 'object') stack.push(value);
        }
      }

      return undefined;
    }

    function getPathValue(obj, path) {
      if (!obj || !path || !String(path).includes('.')) return undefined;
      return String(path).split('.').reduce((acc, key) => {
        if (acc && typeof acc === 'object' && Object.prototype.hasOwnProperty.call(acc, key)) return acc[key];
        return undefined;
      }, obj);
    }

    function findTextByKey(obj, pattern) {
      let best = '';

      function walk(node, key = '') {
        if (!node || best) return;
        if (typeof node === 'string') {
          if (pattern.test(key) && node.length > 40) best = node;
          return;
        }
        if (Array.isArray(node)) return node.forEach((item, i) => walk(item, `${key}_${i}`));
        if (typeof node === 'object') Object.entries(node).forEach(([k, v]) => walk(v, k));
      }

      walk(obj);
      return best;
    }

    function findFirstImageUrl(obj) {
      let found = '';

      function walk(node) {
        if (!node || found) return;
        if (typeof node === 'string') {
          const match = node.match(/https?:\/\/[^\s'"<>]+?\.(?:jpe?g|png|webp)(?:\?[^\s'"<>]*)?/i);
          if (match) found = match[0];
          return;
        }
        if (Array.isArray(node)) return node.forEach(walk);
        if (typeof node === 'object') Object.values(node).forEach(walk);
      }

      walk(obj);
      return found;
    }

    function firstText(...values) {
      for (const value of values) {
        if (value !== undefined && value !== null && String(value).trim() !== '') return String(value).trim();
      }
      return '';
    }

    function parseDateFromText(id) {
      const text = String(id || '');
      const match = text.match(/(\d{4})(\d{2})(\d{2})[-_ ]?(\d{2})?(\d{2})?(\d{2})?/);
      if (!match) return 0;

      const year = Number(match[1]);
      const month = Number(match[2]) - 1;
      const day = Number(match[3]);
      const hour = Number(match[4] || 0);
      const minute = Number(match[5] || 0);
      const second = Number(match[6] || 0);
      const time = Date.UTC(year, month, day, hour, minute, second);
      return Number.isFinite(time) ? time : 0;
    }

    function getImageExtension(value) {
      const clean = String(value || '').split('?')[0].split('#')[0];
      const match = clean.match(/\.([a-z0-9]+)$/i);
      const ext = match ? match[1].toLowerCase() : '';
      return ['jpg', 'jpeg', 'png', 'webp'].includes(ext) ? ext : '';
    }

    function encodePath(path) {
      return cleanPath(path).split('/').map(encodeURIComponent).join('/');
    }

    function cleanPath(path) {
      return String(path || '').replace(/^\/+|\/+$/g, '').replace(/\/+/g, '/');
    }

    function basename(path) {
      return String(path || '').split(/[?#]/)[0].split('/').pop() || '';
    }

    function safeName(value) {
      return String(value || 'video')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9-_]+/gi, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '')
        .toLowerCase() || 'video';
    }

    function scrollToViewer() {
      $viewer.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function flashButton(button, message) {
      const original = button.textContent;
      button.textContent = message;
      button.disabled = true;
      setTimeout(() => {
        button.textContent = original;
        button.disabled = false;
      }, 1200);
    }

    function setStatus(message, type) {
      $status.className = `status${type ? ` ${type}` : ''}`;
      $status.innerHTML = escapeHtml(message);
    }

    function renderEmpty(extra) {
      $viewer.innerHTML = `
        <div class="empty">
          <strong>Nenhum conteúdo encontrado.</strong><br><br>
          Este leitor procura pastas dentro de:<br>
          <code>video/</code><br><br>
          Dentro de cada pasta, o esperado é ter pelo menos estes arquivos:<br><br>
          <code>videododia.json</code><br>
          <code>produto.webp</code>, <code>produto.jpg</code> ou <code>produto.png</code><br><br>
          Exemplo:<br>
          <code>video/20260619-nivea/videododia.json</code><br>
          <code>video/20260619-nivea/produto.webp</code>
          ${extra ? `<br><br>Detalhe: ${escapeHtml(extra)}` : ''}
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#096;');
    }
  </script>
</body>
</html>
