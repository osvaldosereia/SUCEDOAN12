<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Leitor de Carrosséis</title>
  <style>
    :root {
      --bg: #f6f3ee;
      --card: #fffaf4;
      --text: #211b16;
      --muted: #7a6f66;
      --line: #eadfd3;
      --brand: #7b3f19;
      --brand2: #3d2618;
      --soft: #efe5d9;
      --ok: #267547;
      --danger: #a33a2a;
      --shadow: 0 14px 40px rgba(55, 37, 20, .08);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body { min-height: 100vh; }

    .app {
      width: min(100%, 540px);
      margin: 0 auto;
      padding: 14px 12px 34px;
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(246, 243, 238, .92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(234, 223, 211, .8);
      margin: 0 -12px 14px;
      padding: 12px 12px 10px;
    }

    .top-inner {
      width: min(100%, 540px);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: -.02em;
      font-weight: 760;
    }

    .sub {
      margin: 4px 0 0;
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
    }

    .pill {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--muted);
      padding: 7px 9px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
    }

    .status {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 13px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .status strong { color: var(--text); }
    .status.ok { border-color: rgba(38, 117, 71, .24); }
    .status.err { border-color: rgba(163, 58, 42, .28); color: var(--danger); }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .media {
      background: #e9dfd4;
      position: relative;
      width: 100%;
      min-height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .media img {
      width: 100%;
      height: auto;
      display: block;
      background: #eadfd3;
    }

    .media-placeholder {
      width: 100%;
      min-height: 420px;
      display: grid;
      place-items: center;
      color: var(--muted);
      padding: 24px;
      text-align: center;
      font-size: 13px;
    }

    .counter {
      position: absolute;
      left: 12px;
      top: 12px;
      background: rgba(33, 27, 22, .75);
      color: white;
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 12px;
      backdrop-filter: blur(10px);
    }

    .image-loader {
      position: absolute;
      right: 12px;
      top: 12px;
      background: rgba(255, 250, 244, .88);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, .45);
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 12px;
      display: none;
    }

    .image-loader.active { display: block; }

    .slide-nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px;
      background: rgba(255, 250, 244, .98);
      border-bottom: 1px solid var(--line);
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 13px 12px;
      font-size: 14px;
      font-weight: 720;
      cursor: pointer;
      min-height: 46px;
      font-family: inherit;
      transition: transform .08s ease, opacity .12s ease;
      touch-action: manipulation;
    }

    button:active { transform: scale(.985); }
    button:disabled { opacity: .45; cursor: not-allowed; }

    .btn-soft {
      background: var(--soft);
      color: var(--brand2);
    }

    .btn-main {
      background: var(--brand);
      color: white;
    }

    .btn-dark {
      background: var(--brand2);
      color: white;
    }

    .content { padding: 14px; }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 12px;
    }

    .tag {
      background: var(--soft);
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 8px;
      font-size: 12px;
      line-height: 1;
    }

    .title {
      margin: 0 0 6px;
      font-size: 20px;
      line-height: 1.16;
      letter-spacing: -.03em;
      font-weight: 800;
    }

    .theme {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.38;
    }

    .legend-box {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      margin: 12px 0;
    }

    .legend-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    .legend {
      white-space: pre-wrap;
      color: var(--text);
      font-size: 14px;
      line-height: 1.46;
      max-height: 220px;
      overflow: auto;
      padding-right: 2px;
    }

    .actions {
      display: grid;
      gap: 9px;
      margin-top: 12px;
    }

    .download-progress {
      display: none;
      margin-top: 10px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .download-progress.active { display: block; }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--soft);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--brand);
      border-radius: 999px;
      transition: width .2s ease;
    }

    .carousel-nav {
      display: grid;
      grid-template-columns: 1fr;
      gap: 9px;
      margin: 12px 0 0;
    }

    .small-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      margin-top: 10px;
    }

    .empty {
      background: var(--card);
      border: 1px dashed var(--line);
      border-radius: 20px;
      padding: 18px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    code {
      background: rgba(0, 0, 0, .05);
      padding: 2px 5px;
      border-radius: 6px;
    }

    @media (min-width: 560px) {
      .carousel-nav { grid-template-columns: 1fr 1fr; }
      .media { min-height: 520px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="top-inner">
        <div>
          <h1>Leitor de Carrosséis</h1>
          <p class="sub">Carrega só o carrossel em uso para economizar dados.</p>
        </div>
        <div class="pill" id="repoPill">GitHub</div>
      </div>
    </header>

    <section id="status" class="status">Carregando lista de carrosséis...</section>
    <section id="viewer"></section>
  </main>

  <script>
    const CONFIG = {
      owner: 'osvaldosereia',
      repo: 'SUCEDOAN12',
      branch: 'main',

      // Caminho correto informado: carrossel/
      // Também mantive carrosseis/ como fallback, caso alguma pasta antiga esteja no plural.
      rootPaths: ['carrossel', 'carrosseis'],

      jpegQuality: 0.76,
      maxImageWidth: 1280,
      pauseBetweenDownloadsMs: 900
    };

    const state = {
      tree: [],
      records: [],
      currentRecordIndex: 0,
      currentPageIndex: 0,
      loadedData: new Map(),
      isDownloading: false
    };

    const $status = document.getElementById('status');
    const $viewer = document.getElementById('viewer');
    const $repoPill = document.getElementById('repoPill');

    $repoPill.textContent = `${CONFIG.owner}/${CONFIG.repo}`;

    init();

    async function init() {
      try {
        setStatus('Carregando lista de carrosséis no GitHub...');

        const tree = await fetchGithubTree();
        state.tree = Array.isArray(tree) ? tree : [];
        state.records = findCarouselRecords(state.tree);

        if (!state.records.length) {
          renderEmpty();
          return;
        }

        setStatus(`Encontrados ${state.records.length} carrosséis. Carregando o mais recente...`, 'ok');

        state.currentRecordIndex = 0;
        state.currentPageIndex = 0;
        await loadAndRenderCurrent();
      } catch (error) {
        console.error(error);
        setStatus(`Erro ao carregar: ${error.message}`, 'err');
        renderEmpty(error.message);
      }
    }

    async function fetchGithubTree() {
      const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/git/trees/${encodeURIComponent(CONFIG.branch)}?recursive=1`;
      const res = await fetch(url, { cache: 'no-store' });

      if (!res.ok) {
        throw new Error(`GitHub retornou ${res.status}. Confira repo, branch e se o repositório é público.`);
      }

      const data = await res.json();
      return data.tree || [];
    }

    function findCarouselRecords(tree) {
      const roots = CONFIG.rootPaths.map(cleanPath);
      const records = [];

      for (const item of tree) {
        if (!item || item.type !== 'blob') continue;
        const path = cleanPath(item.path || '');
        const isDados = path.toLowerCase().endsWith('/dados.json');
        if (!isDados) continue;

        const root = roots.find(rootPath => path === `${rootPath}/dados.json` || path.startsWith(`${rootPath}/`));
        if (!root) continue;

        const parts = path.split('/');
        const dadosIndex = parts.length - 1;
        const folderParts = parts.slice(0, dadosIndex);
        const id = folderParts[folderParts.length - 1] || '';
        const folder = folderParts.join('/');

        if (!id || !folder) continue;

        records.push({
          id,
          root,
          folder,
          dadosPath: path,
          sortTime: parseCarouselDate(id)
        });
      }

      records.sort((a, b) => {
        if (b.sortTime !== a.sortTime) return b.sortTime - a.sortTime;
        return b.id.localeCompare(a.id);
      });

      return records;
    }

    function parseCarouselDate(id) {
      const match = String(id).match(/(\d{4})(\d{2})(\d{2})[-_ ]?(\d{2})?(\d{2})?(\d{2})?/);
      if (!match) return 0;

      const y = Number(match[1]);
      const mo = Number(match[2]) - 1;
      const d = Number(match[3]);
      const h = Number(match[4] || 0);
      const mi = Number(match[5] || 0);
      const s = Number(match[6] || 0);

      const time = Date.UTC(y, mo, d, h, mi, s);
      return Number.isFinite(time) ? time : 0;
    }

    async function loadAndRenderCurrent() {
      const record = state.records[state.currentRecordIndex];
      if (!record) return;

      const data = await getCarouselData(record);
      renderCarousel(record, data);
    }

    async function getCarouselData(record) {
      if (state.loadedData.has(record.dadosPath)) {
        return state.loadedData.get(record.dadosPath);
      }

      setStatus(`Carregando dados do carrossel ${record.id}...`, 'ok');

      const url = rawUrl(record.dadosPath);
      const res = await fetch(url, { cache: 'no-store' });

      if (!res.ok) {
        throw new Error(`Não consegui abrir ${record.dadosPath}. Status ${res.status}.`);
      }

      const json = await res.json();
      const images = resolveImages(record, json);
      const data = { ...json, images };

      state.loadedData.set(record.dadosPath, data);
      return data;
    }

    function resolveImages(record, json) {
      const folderPrefix = `${cleanPath(record.folder)}/`;
      const fromTree = state.tree
        .filter(item => item && item.type === 'blob')
        .map(item => cleanPath(item.path || ''))
        .filter(path => path.startsWith(folderPrefix))
        .filter(path => /\.(jpe?g|png|webp)$/i.test(path))
        .filter(path => !/dados\.json$/i.test(path))
        .map(path => ({
          numero: imageNumber(path),
          url: rawUrl(path),
          path
        }))
        .sort((a, b) => a.numero - b.numero || a.path.localeCompare(b.path));

      if (fromTree.length) return fromTree;

      const fromJson = Array.isArray(json.urls_imagens) ? json.urls_imagens : [];
      return fromJson
        .map((item, index) => ({
          numero: Number(item.numero || index + 1),
          url: item.url,
          path: item.url || ''
        }))
        .filter(item => item.url)
        .sort((a, b) => a.numero - b.numero);
    }

    function imageNumber(path) {
      const name = String(path).split('/').pop() || '';
      const explicit = name.match(/(?:pagina|página|page|img|imagem)[-_ ]?(\d+)/i);
      if (explicit) return Number(explicit[1]);

      const any = name.match(/(\d+)/);
      if (any) return Number(any[1]);

      return 9999;
    }

    function renderCarousel(record, data) {
      const images = data.images || [];
      const total = images.length;
      const page = images[state.currentPageIndex] || images[0];
      const title = data.titulo_carrossel || data.tema || `Carrossel ${record.id}`;
      const theme = data.tema || '';
      const legenda = data.legenda_instagram || '';
      const currentNumber = page ? page.numero : state.currentPageIndex + 1;
      const hasPreviousCarousel = state.currentRecordIndex < state.records.length - 1;
      const hasNewerCarousel = state.currentRecordIndex > 0;

      setStatus(`Mostrando ${state.currentRecordIndex + 1} de ${state.records.length}: ${record.id}`, 'ok');

      $viewer.innerHTML = `
        <article class="card">
          <div class="media" id="mediaBox">
            ${page ? `<img id="slideImage" alt="Página ${escapeHtml(currentNumber)} do carrossel" src="${escapeAttr(page.url)}">` : `<div class="media-placeholder">Nenhuma imagem encontrada nessa pasta.</div>`}
            <div class="counter">Página <span id="pageNow">${escapeHtml(state.currentPageIndex + 1)}</span> de ${escapeHtml(total || 0)}</div>
            <div class="image-loader" id="imageLoader">Carregando...</div>
          </div>

          <div class="slide-nav">
            <button class="btn-soft" id="prevPageBtn" ${state.currentPageIndex <= 0 ? 'disabled' : ''}>Página anterior</button>
            <button class="btn-soft" id="nextPageBtn" ${state.currentPageIndex >= total - 1 ? 'disabled' : ''}>Próxima página</button>
          </div>

          <div class="content">
            <div class="meta">
              <span class="tag">${escapeHtml(record.id)}</span>
              <span class="tag">${escapeHtml(record.folder)}</span>
              ${data.status ? `<span class="tag">${escapeHtml(data.status)}</span>` : ''}
              ${data.categoria ? `<span class="tag">${escapeHtml(data.categoria)}</span>` : ''}
            </div>

            <h2 class="title">${escapeHtml(title)}</h2>
            ${theme && theme !== title ? `<p class="theme">${escapeHtml(theme)}</p>` : ''}

            <div class="legend-box">
              <div class="legend-title">
                <span>Legenda</span>
                <span>${escapeHtml((legenda || '').length)} caracteres</span>
              </div>
              <div class="legend" id="legendText">${escapeHtml(legenda || 'Sem legenda no dados.json.')}</div>
            </div>

            <div class="actions">
              <button class="btn-dark" id="copyLegendBtn">Copiar legenda</button>
              <button class="btn-main" id="downloadBtn" ${!total ? 'disabled' : ''}>Baixar todas as páginas uma a uma</button>
            </div>

            <div class="download-progress" id="downloadProgress">
              <div id="downloadText">Preparando...</div>
              <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            </div>

            <div class="carousel-nav">
              <button class="btn-soft" id="newerCarouselBtn" ${!hasNewerCarousel ? 'disabled' : ''}>Carrossel mais recente</button>
              <button class="btn-soft" id="olderCarouselBtn" ${!hasPreviousCarousel ? 'disabled' : ''}>Carrossel anterior</button>
            </div>

            <p class="small-note">Para economizar dados, o site carrega a lista do GitHub e mostra só o carrossel atual. O carrossel anterior só é buscado quando você toca no botão.</p>
          </div>
        </article>
      `;

      bindCarouselEvents(record, data);
    }

    function bindCarouselEvents(record, data) {
      const images = data.images || [];
      const $img = document.getElementById('slideImage');
      const $loader = document.getElementById('imageLoader');
      const $prev = document.getElementById('prevPageBtn');
      const $next = document.getElementById('nextPageBtn');
      const $copy = document.getElementById('copyLegendBtn');
      const $download = document.getElementById('downloadBtn');
      const $older = document.getElementById('olderCarouselBtn');
      const $newer = document.getElementById('newerCarouselBtn');

      if ($img && $loader) {
        $loader.classList.add('active');
        $img.addEventListener('load', () => $loader.classList.remove('active'), { once: true });
        $img.addEventListener('error', () => {
          $loader.textContent = 'Erro na imagem';
          $loader.classList.add('active');
        }, { once: true });
      }

      $prev?.addEventListener('click', () => {
        if (state.currentPageIndex <= 0) return;
        state.currentPageIndex -= 1;
        renderCarousel(record, data);
      });

      $next?.addEventListener('click', () => {
        if (state.currentPageIndex >= images.length - 1) return;
        state.currentPageIndex += 1;
        renderCarousel(record, data);
      });

      $copy?.addEventListener('click', async () => {
        await copyText(data.legenda_instagram || '');
        flashButton($copy, 'Legenda copiada');
      });

      $download?.addEventListener('click', async () => {
        if (state.isDownloading) return;
        await downloadAllImagesOneByOne(record, data);
      });

      $older?.addEventListener('click', async () => {
        if (state.currentRecordIndex >= state.records.length - 1) return;
        state.currentRecordIndex += 1;
        state.currentPageIndex = 0;
        $viewer.scrollIntoView({ behavior: 'smooth', block: 'start' });
        await loadAndRenderCurrent();
      });

      $newer?.addEventListener('click', async () => {
        if (state.currentRecordIndex <= 0) return;
        state.currentRecordIndex -= 1;
        state.currentPageIndex = 0;
        $viewer.scrollIntoView({ behavior: 'smooth', block: 'start' });
        await loadAndRenderCurrent();
      });
    }

    async function downloadAllImagesOneByOne(record, data) {
      const images = data.images || [];
      const $progress = document.getElementById('downloadProgress');
      const $text = document.getElementById('downloadText');
      const $fill = document.getElementById('progressFill');
      const $btn = document.getElementById('downloadBtn');

      if (!images.length) return;

      state.isDownloading = true;
      if ($btn) $btn.disabled = true;
      if ($progress) $progress.classList.add('active');

      try {
        for (let i = 0; i < images.length; i++) {
          const img = images[i];
          const pageNumber = img.numero || i + 1;
          const percent = Math.round((i / images.length) * 100);

          if ($text) $text.textContent = `Baixando página ${i + 1} de ${images.length}...`;
          if ($fill) $fill.style.width = `${percent}%`;

          const blob = await fetchAndCompressImage(img.url);
          const filename = `${safeName(record.id)}-pagina-${String(pageNumber).padStart(2, '0')}.jpg`;
          triggerDownload(blob, filename);

          await sleep(CONFIG.pauseBetweenDownloadsMs);
        }

        if ($text) $text.textContent = `Download concluído: ${images.length} imagens.`;
        if ($fill) $fill.style.width = '100%';
      } catch (error) {
        console.error(error);
        if ($text) $text.textContent = `Erro no download: ${error.message}`;
      } finally {
        state.isDownloading = false;
        if ($btn) $btn.disabled = false;
      }
    }

    async function fetchAndCompressImage(url) {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Imagem retornou ${res.status}`);

      const inputBlob = await res.blob();
      const bitmap = await blobToImage(inputBlob);

      const originalWidth = bitmap.naturalWidth || bitmap.width;
      const originalHeight = bitmap.naturalHeight || bitmap.height;
      const scale = Math.min(1, CONFIG.maxImageWidth / originalWidth);
      const width = Math.max(1, Math.round(originalWidth * scale));
      const height = Math.max(1, Math.round(originalHeight * scale));

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext('2d', { alpha: false });
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(bitmap, 0, 0, width, height);

      URL.revokeObjectURL(bitmap.src);

      return await new Promise((resolve, reject) => {
        canvas.toBlob(blob => {
          if (blob) resolve(blob);
          else reject(new Error('Não foi possível compactar a imagem.'));
        }, 'image/jpeg', CONFIG.jpegQuality);
      });
    }

    function blobToImage(blob) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('Não foi possível ler a imagem.'));
        img.src = URL.createObjectURL(blob);
      });
    }

    function triggerDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 4000);
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      textarea.style.top = '0';
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      document.execCommand('copy');
      textarea.remove();
    }

    function flashButton(button, text) {
      const original = button.textContent;
      button.textContent = text;
      button.disabled = true;
      setTimeout(() => {
        button.textContent = original;
        button.disabled = false;
      }, 1200);
    }

    function rawUrl(path) {
      const encodedPath = cleanPath(path).split('/').map(encodeURIComponent).join('/');
      return `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${encodeURIComponent(CONFIG.branch)}/${encodedPath}`;
    }

    function cleanPath(path) {
      return String(path || '').replace(/^\/+|\/+$/g, '').replace(/\/+/g, '/');
    }

    function safeName(value) {
      return String(value || 'carrossel')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9-_]+/gi, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '')
        .toLowerCase();
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function setStatus(message, type) {
      $status.className = `status${type ? ` ${type}` : ''}`;
      $status.innerHTML = escapeHtml(message);
    }

    function renderEmpty(extra) {
      const paths = CONFIG.rootPaths.map(path => `<code>${escapeHtml(path)}/20260604-103104/dados.json</code>`).join('<br>');
      $viewer.innerHTML = `
        <div class="empty">
          <strong>Nenhum carrossel encontrado.</strong><br><br>
          O site está procurando arquivos <code>dados.json</code> nestes caminhos:<br><br>
          ${paths}<br><br>
          Confira se o branch é <code>${escapeHtml(CONFIG.branch)}</code>, se o repositório é público e se o arquivo se chama exatamente <code>dados.json</code>.
          ${extra ? `<br><br>Detalhe: ${escapeHtml(extra)}` : ''}
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#096;');
    }
  </script>
</body>
</html>
