<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerador de Ofertas para Instagram</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
    :root {
        --c-p: #0f172a; --c-s: #334155; --c-t: #64748b;
        --c-a: #ea580c; --c-ok: #15803d; --c-err: #dc2626;
        --c-bg: #e2e8f0; --c-surf: #ffffff; --c-bd: #e2e8f0;
        --font: 'Inter', system-ui, sans-serif;
    }
    body { font-family: var(--font); background: #333; color: #fff; padding: 20px; text-align: center; }
    
    /* ÁREA FIXA PARA EVITAR CORTES DO HTML2CANVAS */
    #palco-invisivel {
        position: fixed;
        top: 0;
        left: -9999px; /* Esconde da vista principal, mas mantém na tela para capturar */
        z-index: -100;
    }

    /* ESTILO DO POST DO INSTAGRAM (1080 x 1350) */
    .ig-post {
        width: 1080px;
        height: 1350px;
        background: var(--c-bg);
        display: flex;
        flex-direction: column;
        padding: 60px;
        box-sizing: border-box;
        position: relative;
    }
    
    /* CABEÇALHO CAPA (1ª Imagem) */
    .ig-header-capa { text-align: center; margin-bottom: 40px; }
    .logo-grande { width: 220px; height: 220px; border-radius: 50%; object-fit: cover; border: 6px solid var(--c-bd); margin: 0 auto 20px auto; display: block; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .info-contato { font-size: 1.8rem; font-weight: 800; color: var(--c-s); margin-bottom: 15px; }
    .info-validade { font-size: 1.6rem; font-weight: 900; color: #fff; background: var(--c-ok); padding: 10px 25px; border-radius: 20px; display: inline-block; text-transform: uppercase; margin-bottom: 20px; }
    .ig-title-capa { font-size: 4.5rem; font-weight: 900; color: var(--c-p); margin: 0; text-transform: uppercase; line-height: 1; }
    .ig-subtitle-capa { font-size: 2.5rem; color: var(--c-a); font-weight: 800; }

    /* CABEÇALHO NORMAL (Outras Imagens) */
    .ig-header-normal { display: flex; align-items: center; gap: 30px; margin-bottom: 40px; border-bottom: 3px dashed var(--c-bd); padding-bottom: 30px; }
    .logo-pequena { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 4px solid var(--c-bd); }
    .info-normal-text { text-align: left; flex: 1; }
    .info-validade-small { font-size: 1.4rem; font-weight: 900; color: #fff; background: var(--c-ok); padding: 8px 20px; border-radius: 16px; display: inline-block; text-transform: uppercase; margin-bottom: 10px; }
    .info-site-small { font-size: 1.6rem; font-weight: 800; color: var(--c-p); }
    
    /* GRIDS */
    .ig-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; flex: 1; align-items: center; } /* Para os 2 produtos da capa */
    .ig-grid-4 { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 40px; flex: 1; } /* Para os 4 produtos normais */

    /* ESTILO DO CARD */
    .card-sq { background: #fff; border-radius: 24px; padding: 20px; display: flex; flex-direction: column; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.05); height: 100%; border: 2px solid #fff; }
    .card-sq-img-area { height: 320px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
    .card-sq-img { max-width: 100%; max-height: 100%; object-fit: contain; mix-blend-mode: multiply; }
    .tag-desconto { position: absolute; top: 20px; right: 20px; background: var(--c-err); color: #fff; font-size: 2rem; font-weight: 900; padding: 12px 24px; border-radius: 16px; }
    .card-info { margin-top: auto; display: flex; flex-direction: column; }
    .preco-antigo { font-size: 1.6rem; color: var(--c-t); text-decoration: line-through; font-weight: 700; }
    .preco-novo { font-size: 4rem; font-weight: 900; color: var(--c-p); line-height: 1; margin-bottom: 15px; letter-spacing: -2px; }
    .nome-produto { font-size: 1.8rem; color: var(--c-s); font-weight: 700; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* Galeria e Botões */
    #galeria { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 30px; }
    .preview-box { background: #fff; padding: 10px; border-radius: 12px; color: #000; }
    .preview-img { width: 250px; height: auto; border: 1px solid #ccc; border-radius: 8px; }
    .btn-download { display: block; background: var(--c-a); color: #fff; text-decoration: none; padding: 10px; border-radius: 8px; margin-top: 10px; font-weight: bold; }
    button { padding: 15px 30px; font-size: 1.2rem; background: var(--c-ok); color: #fff; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: transform 0.1s; }
    button:active { transform: scale(0.95); }
</style>
</head>
<body>

    <h1>Gerador de Posts - Dona Antônia</h1>
    <p>O sistema vai selecionar os 2 maiores descontos para a Capa, e agrupar o restante.</p>
    <button onclick="gerarImagens()" id="btn-gerar">GERAR IMAGENS PARA INSTAGRAM</button>

    <div id="palco-invisivel"></div>
    <div id="galeria"></div>

<script>
// Função para calcular a validade da semana atual (Segunda a Sábado)
function calcularValidade() {
    const hoje = new Date();
    const diaSemana = hoje.getDay(); // 0 = Dom, 1 = Seg, ..., 6 = Sab
    
    // Calcula quantos dias voltar ou avançar para chegar na Segunda-feira
    const diffSegunda = hoje.getDate() - diaSemana + (diaSemana === 0 ? -6 : 1); 
    const segunda = new Date(hoje.setDate(diffSegunda));
    
    // O sábado é 5 dias depois da segunda-feira
    const sabado = new Date(segunda);
    sabado.setDate(segunda.getDate() + 5);

    const meses = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
    
    return `Válido do dia ${segunda.getDate()} a ${sabado.getDate()} do mês de ${meses[sabado.getMonth()]}`;
}

async function gerarImagens() {
    const btn = document.getElementById('btn-gerar');
    btn.disabled = true;
    btn.innerText = "A PROCESSAR...";

    const validadeStr = calcularValidade();
    const logoUrl = "/site/img/produtos/logo-super-cesta-basica-dona-antonia-cuiaba-varzea-grande.avif";

    // 1. LER OS PRODUTOS
    const resposta = await fetch('/site/produtos.json');
    const texto = await resposta.text();
    const dados = JSON.parse(texto.startsWith('[') ? texto : '[' + texto + ']');
    
    // 2. FILTRAR AS OFERTAS E CALCULAR A PERCENTAGEM DE DESCONTO
    let ofertas = dados.filter(p => p.situacao === "A" && p.preco_antigo && parseFloat(p.preco_antigo) > parseFloat(p.preco));
    
    ofertas.forEach(p => {
        p.descontoPerc = Math.round(((parseFloat(p.preco_antigo) - parseFloat(p.preco)) / parseFloat(p.preco_antigo)) * 100);
    });

    // Ordenar do maior desconto para o menor
    ofertas.sort((a, b) => b.descontoPerc - a.descontoPerc);
    
    // 3. SEPARAR OS GRUPOS (Grupo 1 = Capa com 2 itens. Restante = Grupos de 4)
    const grupoCapa = ofertas.slice(0, 2);
    const restantes = ofertas.slice(2);
    
    const grupos = [grupoCapa];
    for (let i = 0; i < restantes.length; i += 4) {
        grupos.push(restantes.slice(i, i + 4));
    }

    const palco = document.getElementById('palco-invisivel');
    const galeria = document.getElementById('galeria');
    palco.innerHTML = ''; 
    galeria.innerHTML = '<p style="font-size:1.2rem;">A gerar imagens... Pode demorar alguns segundos, aguarda!</p>';

    // 4. CRIAR O HTML DE CADA IMAGEM E CAPTURAR
    for (let i = 0; i < grupos.length; i++) {
        const grupo = grupos[i];
        const igPost = document.createElement('div');
        igPost.className = 'ig-post';
        
        // Se for a primeira imagem (Capa)
        if (i === 0) {
            igPost.innerHTML = `
                <div class="ig-header-capa">
                    <img src="${logoUrl}" class="logo-grande" crossorigin="anonymous">
                    <div class="info-validade">${validadeStr}</div>
                    <div class="info-contato">🌐 www.donaantonia.com.br &nbsp;|&nbsp; 📱 (65) 99815-0975</div>
                    <div class="ig-title-capa">🔥 SUPER OFERTAS</div>
                </div>
                <div class="ig-grid-2" id="grid-${i}"></div>
            `;
        } else {
            // Se forem as imagens seguintes
            igPost.innerHTML = `
                <div class="ig-header-normal">
                    <img src="${logoUrl}" class="logo-pequena" crossorigin="anonymous">
                    <div class="info-normal-text">
                        <div class="info-validade-small">${validadeStr}</div>
                        <div class="info-site-small">🌐 www.donaantonia.com.br</div>
                    </div>
                </div>
                <div class="ig-grid-4" id="grid-${i}"></div>
            `;
        }
        
        palco.appendChild(igPost);
        const grid = document.getElementById(`grid-${i}`);

        // Montar os cards dentro do grid
        grupo.forEach(p => {
            const preco = parseFloat(p.preco).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
            const precoAntigo = parseFloat(p.preco_antigo).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
            
            // Usamos style inline flex:1 para forçar o card a ocupar todo o espaço e esticar a imagem
            grid.innerHTML += `
                <div class="card-sq">
                    <div class="tag-desconto">-${p.descontoPerc}%</div>
                    <div class="card-sq-img-area">
                        <img src="/site/img/produtos/${p.codigo || p.id}.webp" class="card-sq-img" crossorigin="anonymous">
                    </div>
                    <div class="card-info">
                        <div class="preco-antigo">${precoAntigo}</div>
                        <div class="preco-novo">${preco}</div>
                        <div class="nome-produto">${p.nome}</div>
                    </div>
                </div>
            `;
        });

        // ESTRATÉGIA ANTI-CORTE: Esperar rigorosamente que TODAS as imagens deste post carreguem
        const imagensNoPost = igPost.querySelectorAll('img');
        await Promise.all(Array.from(imagensNoPost).map(img => {
            if (img.complete) return Promise.resolve();
            return new Promise(resolve => {
                img.onload = resolve;
                img.onerror = resolve; // Resolve mesmo em erro para não travar o loop
            });
        }));
        
        // Pausa extra de segurança para os browsers processarem a renderização CSS
        await new Promise(r => setTimeout(r, 600)); 
        
        // Capturar
        const canvas = await html2canvas(igPost, { 
            scale: 1, 
            useCORS: true,
            allowTaint: true,
            backgroundColor: "#e2e8f0" 
        });
        
        const dataUrl = canvas.toDataURL("image/png");

        if (i === 0) galeria.innerHTML = ''; 
        
        galeria.innerHTML += `
            <div class="preview-box">
                <p style="font-weight:bold; margin-bottom:5px;">${i === 0 ? '🏆 CAPA (Maiores Descontos)' : 'Post ' + (i + 1)}</p>
                <img src="${dataUrl}" class="preview-img">
                <a href="${dataUrl}" download="oferta-instagram-${i+1}.png" class="btn-download">⬇️ Descarregar PNG</a>
            </div>
        `;
        
        // Remove do DOM após fotografar para não pesar a memória
        igPost.remove();
    }

    btn.innerText = "GERAR IMAGENS PARA INSTAGRAM";
    btn.disabled = false;
}
</script>
</body>
</html>
