<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Atualizando Dona Antônia</title>
  <style>body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;min-height:100vh;margin:0;display:grid;place-items:center;background:#f7f3ea;color:#173126}main{width:min(90%,430px);padding:28px;border-radius:22px;background:#fff;box-shadow:0 16px 44px rgba(23,49,38,.12);text-align:center}h1{font-size:24px;margin:0 0 10px}p{line-height:1.5;color:#66736c}.loader{width:42px;height:42px;margin:0 auto 18px;border:4px solid #dfe8e1;border-top-color:#165c38;border-radius:50%;animation:r .8s linear infinite}@keyframes r{to{transform:rotate(360deg)}}</style>
</head>
<body>
<main><div class="loader"></div><h1>Atualizando o site</h1><p>Limpando uma versão antiga e abrindo a versão mais recente.</p></main>
<script>
(async function(){
  const BUILD = '2026-07-13-cache-definitivo-v1';
  try {
    if ('serviceWorker' in navigator) {
      const registrations = await navigator.serviceWorker.getRegistrations();
      await Promise.all(registrations.map(r => r.unregister()));
    }
    if ('caches' in window) {
      const names = await caches.keys();
      await Promise.all(names.map(name => caches.delete(name)));
    }
    const technicalKeys = [
      'da_produtos_cache_v5','da_produtos_home_cache_v2','da_cestas_cache_v5',
      'da_kits_cache_v1','da_banners_cache_v5','da_app_version_v1'
    ];
    technicalKeys.forEach(key => localStorage.removeItem(key));
  } catch (_) {}
  const target = new URL('/', window.location.origin);
  target.searchParams.set('__da_v', BUILD);
  target.searchParams.set('__da_r', String(Date.now()));
  window.location.replace(target.href);
})();
</script>
</body>
</html>
