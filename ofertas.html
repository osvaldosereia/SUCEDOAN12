<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ofertas - Dona Antônia</title>
    <meta name="theme-color" content="#ffffff">
    <meta name="robots" content="index, follow">
    <style>
        :root {
            --bg: #f6f7f5;
            --card: #ffffff;
            --text: #101828;
            --muted: #667085;
            --line: #e5e7eb;
            --dark: #0f172a;
            --danger: #e11d48;
            --green: #22c55e;
            --safe-bottom: env(safe-area-inset-bottom);
            --safe-top: env(safe-area-inset-top);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { min-height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); }
        body { padding-bottom: max(96px, calc(96px + var(--safe-bottom))); }
        button, input { font: inherit; }
        button { border: 0; cursor: pointer; touch-action: manipulation; }
        .topo {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255,255,255,.96);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--line);
            padding: max(12px, var(--safe-top)) 12px 12px;
            box-shadow: 0 6px 24px rgba(16,24,40,.06);
        }
        .logo-box { display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .logo { height: 48px; max-width: 210px; object-fit: contain; }
        .busca-wrap { position: relative; width: 100%; max-width: 680px; margin: 0 auto; }
        .busca {
            width: 100%;
            height: 48px;
            border-radius: 999px;
            border: 1px solid #d0d5dd;
            background: #fff;
            outline: none;
            padding: 0 48px 0 44px;
            font-size: 15px;
            font-weight: 650;
            color: var(--text);
            box-shadow: 0 1px 2px rgba(16,24,40,.04);
        }
        .busca:focus { border-color: #14532d; box-shadow: 0 0 0 4px rgba(22,163,74,.10); }
        .lupa { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); font-weight: 900; }
        .limpar {
            position: absolute;
            right: 9px;
            top: 50%;
            transform: translateY(-50%);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #f1f5f9;
            color: var(--muted);
            font-size: 18px;
            font-weight: 900;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .limpar.show { display: flex; }
        .main { width: 100%; max-width: 980px; margin: 0 auto; padding: 12px; }
        .titulo-linha { display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; padding: 6px 2px 12px; }
        .titulo-linha h1 { font-size: 18px; line-height: 1.1; font-weight: 950; letter-spacing: -.04em; }
        .titulo-linha span { font-size: 12px; color: var(--muted); font-weight: 800; white-space: nowrap; }
        .aviso {
            background: #ecfdf3;
            color: #14532d;
            border: 1px solid #bbf7d0;
            padding: 11px 12px;
            border-radius: 16px;
            font-size: 12.5px;
            font-weight: 850;
            line-height: 1.35;
            margin-bottom: 12px;
            text-align: center;
        }
        .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
        .card {
            min-width: 0;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 1px 2px rgba(16,24,40,.035);
            position: relative;
        }
        .badge {
            position: absolute;
            left: 8px;
            top: 8px;
            z-index: 2;
            background: #fff1f2;
            border: 1px solid #fecdd3;
            color: var(--danger);
            border-radius: 999px;
            padding: 4px 7px;
            font-size: 10.5px;
            font-weight: 950;
            box-shadow: 0 4px 12px rgba(225,29,72,.08);
        }
        .foto-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            min-height: 142px;
            border-radius: 17px;
            background: linear-gradient(180deg, #fff 0%, #f8fafc 100%);
            border: 1px solid #eef2f7;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .foto { width: 100%; height: 100%; object-fit: contain; padding: 5px; mix-blend-mode: multiply; }
        .info { display: flex; flex-direction: column; gap: 5px; flex: 1; min-height: 116px; }
        .meta { min-height: 14px; font-size: 10.2px; color: var(--muted); font-weight: 850; text-transform: uppercase; letter-spacing: .03em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .nome {
            min-height: 36px;
            font-size: 13px;
            line-height: 1.35;
            color: #1f2937;
            font-weight: 760;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .precos { margin-top: auto; }
        .preco-antigo { color: #98a2b3; text-decoration: line-through; font-size: 11px; font-weight: 750; height: 14px; }
        .preco { color: var(--dark); font-size: 19px; font-weight: 950; letter-spacing: -.04em; }
        .add, .qty {
            width: 100%;
            height: 40px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 950;
        }
        .add { background: var(--dark); color: #fff; box-shadow: 0 7px 18px rgba(15,23,42,.16); }
        .add:active, .enviar:active, .qty button:active { transform: scale(.97); }
        .qty { display: none; grid-template-columns: 42px 1fr 42px; overflow: hidden; border: 1px solid #d0d5dd; background: #fff; }
        .qty.show { display: grid; }
        .qty button { background: #fff; color: var(--dark); font-size: 20px; font-weight: 950; }
        .qty .qtd { display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 950; border-left: 1px solid var(--line); border-right: 1px solid var(--line); }
        .empty, .loading, .erro {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 32px 18px;
            text-align: center;
            color: var(--muted);
            font-weight: 800;
            line-height: 1.45;
        }
        .barra-final {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            z-index: 60;
            background: rgba(255,255,255,.97);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-top: 1px solid var(--line);
            box-shadow: 0 -8px 28px rgba(16,24,40,.08);
            padding: 10px 12px max(10px, var(--safe-bottom));
        }
        .barra-inner { width: 100%; max-width: 980px; margin: 0 auto; display: flex; align-items: center; gap: 10px; }
        .total-box { flex: 1; min-width: 0; }
        .total-label { display: block; font-size: 11px; color: var(--muted); font-weight: 850; text-transform: uppercase; letter-spacing: .04em; }
        .total-valor { display: block; font-size: 21px; color: var(--dark); font-weight: 950; letter-spacing: -.05em; white-space: nowrap; }
        .enviar {
            min-width: 150px;
            height: 52px;
            border-radius: 18px;
            background: linear-gradient(135deg, #25D366 0%, #16a34a 100%);
            color: #fff;
            font-size: 13px;
            font-weight: 950;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            line-height: 1.05;
            box-shadow: 0 10px 22px rgba(37,211,102,.28);
        }
        .enviar:disabled { background: #cbd5e1; color: #f8fafc; box-shadow: none; cursor: not-allowed; }
        .mini { font-size: 10px; opacity: .92; font-weight: 850; margin-top: 3px; }
        @media (min-width: 700px) {
            .topo { padding-left: 24px; padding-right: 24px; }
            .logo { height: 54px; }
            .main { padding: 18px 18px 12px; }
            .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
            .foto-box { min-height: 180px; }
            .titulo-linha h1 { font-size: 22px; }
        }
        @media (min-width: 1024px) {
            .grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        }
    </style>
</head>
<body>
    <header class="topo">
        <div class="logo-box">
            <a href="index.html" aria-label="Ir para o site principal">
                <img class="logo" src="img/logoantonia5.png" alt="Dona Antônia" onerror="this.style.display='none'">
            </a>
        </div>
        <div class="busca-wrap">
            <span class="lupa">⌕</span>
            <input id="busca" class="busca" type="search" autocomplete="off" placeholder="Buscar qualquer produto do site...">
            <button id="limparBusca" class="limpar" type="button" aria-label="Limpar busca">×</button>
        </div>
    </header>

    <main class="main">
        <div class="aviso">Este link é para quem já fez o pedido e quer adicionar produtos em oferta.</div>
        <div class="titulo-linha">
            <h1 id="titulo">Ofertas disponíveis</h1>
            <span id="contador">Carregando...</span>
        </div>
        <section id="grid" class="grid" aria-live="polite">
            <div class="loading">Carregando ofertas...</div>
        </section>
    </main>

    <footer class="barra-final">
        <div class="barra-inner">
            <div class="total-box">
                <span class="total-label">Total adicional</span>
                <span id="totalValor" class="total-valor">R$ 0,00</span>
            </div>
            <button id="btnEnviar" class="enviar" type="button" disabled>
                Enviar
                <span class="mini">pelo WhatsApp</span>
            </button>
        </div>
    </footer>

<script>
(function(){
    'use strict';

    const FIREBASE_URL = 'https://cedar-chemist-310801-default-rtdb.firebaseio.com/produtos.json';
    const WHATSAPP_NUMERO = '5565998150975';
    const CACHE_KEY = 'dona_antonia_ofertas_produtos_cache_v1';
    const CART_KEY = 'dona_antonia_ofertas_cart_v1';
    const CACHE_MAX_AGE = 1000 * 60 * 8;

    const $ = id => document.getElementById(id);
    const grid = $('grid');
    const busca = $('busca');
    const limparBusca = $('limparBusca');
    const btnEnviar = $('btnEnviar');
    const totalValor = $('totalValor');
    const contador = $('contador');
    const titulo = $('titulo');

    let todosProdutos = [];
    let ofertas = [];
    let carrinho = carregarCarrinho();
    let termoBusca = '';

    function fmt(v) {
        return Number(v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function norm(s) {
        return String(s || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
    }

    function escapeHtml(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function toNumber(value) {
        if (typeof value === 'number') return Number.isFinite(value) ? value : 0;
        const str = String(value || '').trim().replace(/\./g, '').replace(',', '.');
        const n = Number(str);
        return Number.isFinite(n) ? n : 0;
    }

    function parseDateFlexible(value) {
        if (!value) return null;
        if (value instanceof Date && !isNaN(value)) return value;
        const raw = String(value).trim();
        if (!raw) return null;

        let m = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (m) return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]), 23, 59, 59, 999);

        m = raw.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
        if (m) return new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]), 23, 59, 59, 999);

        const d = new Date(raw);
        return isNaN(d) ? null : d;
    }

    function formatName(name) {
        return String(name || '').trim().toLowerCase().split(/\s+/).map((w, i) => {
            return (w.length >= 4 || i === 0) ? w.charAt(0).toUpperCase() + w.slice(1) : w;
        }).join(' ');
    }

    function extractVolume(name) {
        const match = String(name || '').match(/(?:\d+(?:,\d+)?\s*(?:kg|g|ml|l|litros|litro|unidades|unidade|un|rolos|folhas))/i);
        return match ? match[0] : '';
    }

    function normalizarImagemProduto(p) {
        const placeholder = 'img/logoantonia5.png';
        const valorImagem = p.url_imagem || p.imagem || p.image || p.img || p.foto || p.foto_url || p.urlImagem || p.imagem_url || '';
        if (valorImagem && typeof valorImagem === 'string') {
            const img = valorImagem.trim();
            if (img.startsWith('http://') || img.startsWith('https://') || img.startsWith('data:')) return img;
            if (img.startsWith('../')) return img;
            if (img.startsWith('./')) return img.replace('./', '');
            if (img.startsWith('/site/')) return img.replace('/site/', '');
            if (img.startsWith('/')) return img.substring(1);
            return img;
        }
        const codigoProduto = String(p.codigo || p.id || p.firebaseKey || '').trim();
        return codigoProduto ? `img/produtos/${codigoProduto}.webp` : placeholder;
    }

    function normalizarDescontoParaGrupo(percentual) {
        const pct = Number(percentual || 0);
        if (pct >= 35) return 40;
        if (pct >= 25) return 30;
        if (pct >= 15) return 20;
        if (pct >= 8) return 10;
        if (pct > 0) return 5;
        return 0;
    }

    function normalizarProdutos(raw) {
        const lista = Array.isArray(raw)
            ? raw.filter(Boolean).map((produto, index) => ({ ...produto, firebaseKey: produto.firebaseKey || produto.id || produto.codigo || String(index) }))
            : (raw ? Object.entries(raw).map(([firebaseKey, produto]) => ({ ...(produto || {}), firebaseKey })) : []);

        const hoje = new Date();
        hoje.setHours(0, 0, 0, 0);

        return lista
            .filter(p => p && p.situacao !== 'I' && parseInt(p.estoque || 0, 10) > 0)
            .map(p => {
                const nome = formatName(p.nome || 'Produto');
                const precoNormal = toNumber(p.preco);
                const precoOferta = toNumber(p.preco_oferta);
                const validadeOferta = parseDateFlexible(p.validade_oferta);
                const temOferta = !!(precoOferta > 0 && precoNormal > 0 && precoOferta < precoNormal && validadeOferta && validadeOferta >= hoje);
                const descontoReal = temOferta ? Math.round(((precoNormal - precoOferta) / precoNormal) * 100) : 0;
                const precoFinal = temOferta ? precoOferta : precoNormal;

                return {
                    id: String(p.codigo || p.id || p.firebaseKey || nome),
                    firebaseKey: String(p.firebaseKey || p.id || p.codigo || ''),
                    codigo: String(p.codigo || p.id || p.firebaseKey || ''),
                    nome,
                    preco: precoFinal,
                    precoNormal,
                    precoOferta,
                    validadeOferta,
                    temOferta,
                    descontoReal,
                    descontoGrupo: normalizarDescontoParaGrupo(descontoReal),
                    estoque: parseInt(p.estoque || 0, 10) || 0,
                    imagem: normalizarImagemProduto(p),
                    categoria: p.categoria || '',
                    subcategoria: p.subcategoria || '',
                    subsubcategoria: p.subsubcategoria || '',
                    marca: p.marca || '',
                    embalagem: p.embalagem || extractVolume(p.nome || nome),
                    ean: p.ean || p.gtin || '',
                    gtin: p.gtin || p.ean || ''
                };
            });
    }

    function produtoCombinaBusca(p, termo) {
        const q = norm(termo);
        if (!q) return true;
        const haystack = norm([
            p.nome, p.codigo, p.ean, p.gtin, p.categoria, p.subcategoria, p.subsubcategoria, p.marca, p.embalagem
        ].join(' '));
        return haystack.includes(q);
    }

    function getListaAtual() {
        if (termoBusca) {
            return todosProdutos.filter(p => produtoCombinaBusca(p, termoBusca));
        }
        return ofertas;
    }

    function render() {
        const lista = getListaAtual();
        limparBusca.classList.toggle('show', !!termoBusca);
        titulo.textContent = termoBusca ? 'Resultado da busca' : 'Ofertas disponíveis';
        contador.textContent = `${lista.length} produto${lista.length === 1 ? '' : 's'}`;

        if (!lista.length) {
            grid.className = '';
            grid.innerHTML = `<div class="empty">${termoBusca ? 'Nenhum produto encontrado para essa busca.' : 'Nenhuma oferta disponível no momento.'}</div>`;
            atualizarTotal();
            return;
        }

        grid.className = 'grid';
        grid.innerHTML = lista.map(renderCard).join('');
        atualizarTotal();
    }

    function renderCard(p) {
        const qtd = carrinho[p.id] || 0;
        const meta = [p.embalagem, p.marca].filter(Boolean).join(' • ');
        const isOferta = p.temOferta;
        const desconto = p.descontoReal > 0 ? `-${p.descontoReal}%` : 'Oferta';

        return `
            <article class="card" data-id="${escapeHtml(p.id)}">
                ${isOferta ? `<div class="badge">${desconto}</div>` : ''}
                <div class="foto-box">
                    <img class="foto" src="${escapeHtml(p.imagem)}" alt="${escapeHtml(p.nome)}" loading="lazy" decoding="async" onerror="this.src='img/logoantonia5.png'">
                </div>
                <div class="info">
                    <div class="meta">${escapeHtml(meta)}</div>
                    <div class="nome">${escapeHtml(p.nome)}</div>
                    <div class="precos">
                        <div class="preco-antigo">${isOferta ? fmt(p.precoNormal) : ''}</div>
                        <div class="preco">${fmt(p.preco)}</div>
                    </div>
                    <button class="add" type="button" data-action="add" style="display:${qtd > 0 ? 'none' : 'block'}">Adicionar</button>
                    <div class="qty ${qtd > 0 ? 'show' : ''}">
                        <button type="button" data-action="minus">−</button>
                        <div class="qtd">${qtd}</div>
                        <button type="button" data-action="plus">+</button>
                    </div>
                </div>
            </article>
        `;
    }

    function alterarQtd(id, novaQtd) {
        const produto = todosProdutos.find(p => p.id === id);
        if (!produto) return;
        const qtd = Math.max(0, Math.min(99, Number(novaQtd || 0)));
        if (qtd <= 0) delete carrinho[id];
        else carrinho[id] = qtd;
        salvarCarrinho();
        render();
    }

    function atualizarTotal() {
        let total = 0;
        let itens = 0;
        Object.keys(carrinho).forEach(id => {
            const produto = todosProdutos.find(p => p.id === id);
            const qtd = Number(carrinho[id] || 0);
            if (produto && qtd > 0) {
                total += produto.preco * qtd;
                itens += qtd;
            }
        });
        totalValor.textContent = fmt(total);
        btnEnviar.disabled = total <= 0;
        btnEnviar.querySelector('.mini').textContent = itens ? `${itens} item${itens === 1 ? '' : 's'}` : 'pelo WhatsApp';
    }

    function carregarCarrinho() {
        try { return JSON.parse(localStorage.getItem(CART_KEY) || '{}') || {}; }
        catch(e) { return {}; }
    }

    function salvarCarrinho() {
        try { localStorage.setItem(CART_KEY, JSON.stringify(carrinho)); } catch(e) {}
    }

    function montarMensagemWhatsApp() {
        const linhas = [];
        let total = 0;

        Object.keys(carrinho).forEach(id => {
            const produto = todosProdutos.find(p => p.id === id);
            const qtd = Number(carrinho[id] || 0);
            if (!produto || qtd <= 0) return;
            const subtotal = produto.preco * qtd;
            total += subtotal;
            linhas.push(`${qtd}x ${produto.nome} - ${fmt(produto.preco)} = ${fmt(subtotal)}`);
        });

        if (!linhas.length) return '';

        return `*ADICIONAR AO PEDIDO ANTERIOR*\n` +
            `------------------------------\n` +
            `Olá! Já fiz um pedido e quero adicionar estes produtos:\n\n` +
            `*ITENS ADICIONAIS*\n` +
            `${linhas.join('\n')}\n\n` +
            `*TOTAL DO ACRÉSCIMO:* ${fmt(total)}\n` +
            `------------------------------\n` +
            `Pode incluir na minha entrega?`;
    }

    function enviarWhatsApp() {
        const msg = montarMensagemWhatsApp();
        if (!msg) return;
        const url = `https://wa.me/${WHATSAPP_NUMERO}?text=${encodeURIComponent(msg)}`;
        window.location.href = url;
    }

    async function fetchProdutos() {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 8000);
        try {
            const res = await fetch(`${FIREBASE_URL}?_=${Date.now()}`, {
                cache: 'no-store',
                signal: controller.signal,
                headers: { 'Accept': 'application/json' }
            });
            if (!res.ok) throw new Error('Firebase HTTP ' + res.status);
            const data = await res.json();
            try { localStorage.setItem(CACHE_KEY, JSON.stringify({ savedAt: Date.now(), data })); } catch(e) {}
            return data;
        } finally {
            clearTimeout(timer);
        }
    }

    function lerCache() {
        try {
            const cache = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
            if (!cache || !cache.data) return null;
            if ((Date.now() - Number(cache.savedAt || 0)) > CACHE_MAX_AGE) return null;
            return cache.data;
        } catch(e) { return null; }
    }

    function aplicarProdutos(raw) {
        todosProdutos = normalizarProdutos(raw);
        ofertas = todosProdutos
            .filter(p => p.temOferta && p.categoria !== 'Cestas')
            .sort((a, b) => Number(b.descontoReal || 0) - Number(a.descontoReal || 0) || a.nome.localeCompare(b.nome));
        render();
    }

    async function iniciar() {
        const cache = lerCache();
        if (cache) aplicarProdutos(cache);

        try {
            const fresh = await fetchProdutos();
            aplicarProdutos(fresh);
        } catch(err) {
            console.error(err);
            if (!todosProdutos.length) {
                grid.className = '';
                grid.innerHTML = '<div class="erro">Não foi possível carregar as ofertas agora. Verifique a conexão e tente novamente.</div>';
                contador.textContent = 'Erro';
            }
        }
    }

    grid.addEventListener('click', function(ev) {
        const btn = ev.target.closest('[data-action]');
        const card = ev.target.closest('.card');
        if (!btn || !card) return;
        const id = card.getAttribute('data-id');
        const atual = Number(carrinho[id] || 0);
        const action = btn.getAttribute('data-action');
        if (action === 'add') alterarQtd(id, 1);
        if (action === 'plus') alterarQtd(id, atual + 1);
        if (action === 'minus') alterarQtd(id, atual - 1);
    });

    busca.addEventListener('input', function() {
        termoBusca = busca.value.trim();
        render();
        window.scrollTo({ top: 0, behavior: 'auto' });
    });

    limparBusca.addEventListener('click', function() {
        busca.value = '';
        termoBusca = '';
        render();
        busca.focus();
        window.scrollTo({ top: 0, behavior: 'auto' });
    });

    btnEnviar.addEventListener('click', enviarWhatsApp);

    iniciar();
})();
</script>
</body>
</html>
