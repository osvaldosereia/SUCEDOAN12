<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ofertas Especiais - Dona Antônia</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #000000;
            --success: #059669; 
            --bg-card: #f2f2f5;
            --text-dark: #111111;
            --text-light: #777777;
            --border-light: #eaeaea;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #fff; color: var(--text-dark); padding-bottom: 120px; }

        /* Header e Chips */
        .top-nav { position: sticky; top: 0; z-index: 1000; background: #fff; border-bottom: 1px solid var(--border-light); }
        .header-simple { padding: 15px 20px 10px; text-align: center; }
        .header-simple h1 { font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        .chip-container {
            display: flex; gap: 10px; padding: 10px 20px 15px;
            overflow-x: auto; scrollbar-width: none;
        }
        .chip-container::-webkit-scrollbar { display: none; }
        .chip {
            background: var(--bg-card); color: var(--text-light);
            padding: 8px 16px; border-radius: 20px; font-size: 12px;
            font-weight: 700; white-space: nowrap; cursor: pointer; border: 1px solid transparent;
        }
        .chip.active { background: var(--primary); color: #fff; }

        /* Container da Vitrine (Visual de Lista Idêntico ao Site Principal) */
        .vitrine-container { background: #fff; padding-top: 5px; }
        .product-page { display: flex; flex-direction: column; gap: 8px; padding: 10px; }
        
        /* Cabeçalho de Categoria */
        .category-header {
            padding: 25px 15px 5px; font-weight: 800; font-size: 1.1rem; color: var(--text-dark); 
            border-bottom: 2px solid var(--primary); margin: 0 10px 10px 10px; display: flex; align-items: center; gap: 8px;
        }

        /* Estilos do Card Lista */
        .product-card-list {
            background-color: #ffffff;
            border-radius: 12px;
            display: flex;
            padding: 10px;
            gap: 12px;
            align-items: center;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-light);
        }
        .product-icon-list {
            width: 100px;
            height: 100px;
            object-fit: contain;
            mix-blend-mode: multiply;
            border-radius: 8px;
            background: #fff;
            padding: 5px;
            flex-shrink: 0;
        }
        .product-info-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0; 
        }
        .product-name-list {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 4px;
            line-height: 1.2;
        }
        .tag-embalagem-list {
            font-size: 11px;
            color: var(--primary);
            background: #e6e6e6;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 6px;
            display: inline-block;
            width: fit-content;
        }
        .tag-preco-list {
            font-size: 16px;
            font-weight: 800;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }
        .old-price {
            text-decoration: line-through;
            font-size: 0.65rem;
            color: #999;
            font-weight: normal;
        }
        .badge-desc {
            position: absolute;
            top: 0; right: 0;
            background: #ef4444; color: #fff;
            font-size: 0.7rem; padding: 3px 8px;
            border-bottom-left-radius: 8px; font-weight: 800; z-index: 5;
        }
        
        /* Botões de Ação do Card */
        .card-action-area {
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }
        .btn-quick-add-list {
            background: var(--primary);
            color: #fff;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .btn-quick-add-list:active { opacity: 0.8; transform: scale(0.95); }
        
        .qty-controls {
            display: flex; align-items: center; gap: 12px; background: var(--bg-card);
            padding: 6px 10px; border-radius: 8px; font-weight: 700; font-size: 14px; margin: 0; flex-shrink: 0;
        }
        .qty-btn { cursor: pointer; color: var(--text-light); padding: 5px; transition: color 0.2s; }
        .qty-btn:active { color: var(--text-dark); }

        /* Barra de Valor */
        .cart-bar {
            position: fixed; bottom: 25px; left: 15px; right: 15px;
            background: var(--primary); color: #fff; padding: 15px 20px;
            border-radius: 16px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 1100;
            transform: translateY(150%); transition: transform 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            cursor: pointer;
        }
        .cart-bar.active { transform: translateY(0); }
        .cart-info b { font-size: 18px; display: block; }
        .cart-info span { font-size: 11px; text-transform: uppercase; opacity: 0.8; font-weight: 700; }
        .btn-view { background: var(--success); color: #fff; padding: 10px 15px; border-radius: 8px; font-weight: 800; font-size: 12px; text-transform: uppercase; }

        /* Modal Resumo */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: none; align-items: flex-end; }
        .modal-content { background: #fff; width: 100%; border-radius: 24px 24px 0 0; padding: 25px; max-height: 85vh; overflow-y: auto; }
        .summary-list { display: flex; flex-direction: column; gap: 15px; margin: 20px 0; }
        .item-row { display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
        .item-img { width: 50px; height: 50px; object-fit: contain; background: var(--bg-card); border-radius: 6px; }
        .item-info { flex: 1; }
        .item-info h4 { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
        .item-info p { font-size: 13px; font-weight: 800; }
        
        .btn-confirm { width: 100%; background: var(--success); color: #fff; padding: 18px; border-radius: 14px; border: none; font-weight: 800; font-size: 16px; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-nav">
        <header class="header-simple">
            <h1>Ofertas Dona Antônia</h1>
        </header>
        <div class="chip-container" id="discount-chips">
            <div class="chip active" onclick="filterOffers(0, this)">Todas</div>
            <div class="chip" onclick="filterOffers(35, this)">35% OFF</div>
            <div class="chip" onclick="filterOffers(30, this)">30% OFF</div>
            <div class="chip" onclick="filterOffers(25, this)">25% OFF</div>
            <div class="chip" onclick="filterOffers(20, this)">20% OFF</div>
            <div class="chip" onclick="filterOffers(15, this)">15% OFF</div>
            <div class="chip" onclick="filterOffers(10, this)">10% OFF</div>
        </div>
    </div>

    <div class="vitrine-container" id="vitrine"></div>

    <div class="cart-bar" id="cartBar" onclick="openModal()">
        <div class="cart-info">
            <span id="txt-items">0 itens selecionados</span>
            <b id="txt-total">R$ 0,00</b>
        </div>
        <div class="btn-view">Confirmar</div>
    </div>

    <div class="modal" id="modalSummary" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="font-weight: 800; font-size: 20px;">Resumo das Ofertas</h2>
            <div class="summary-list" id="summaryItems"></div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0;">
                <span style="font-weight: 600; color: #777;">Total Adicional:</span>
                <span id="modalTotal" style="font-size: 22px; font-weight: 900;">R$ 0,00</span>
            </div>
            <button class="btn-confirm" onclick="sendToZap()">
                <i class="fa-brands fa-whatsapp" style="font-size: 20px;"></i> ENVIAR AO WHATSAPP
            </button>
            <button onclick="closeModal()" style="width: 100%; padding: 15px; border: none; background: none; color: #aaa; font-weight: 600; cursor: pointer;">Continuar Comprando</button>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        let PRODS = [];
        let CART = {};
        let currentFilter = 0;

        // Lista oficial de categorias para ordenação, exatamente igual à vitrine principal
        const ORDEM_CATEGORIAS = [
            'mercearia basica', 'lavanderia', 'limpeza', 'cafe da manha', 
            'temperos', 'sucos e refris', 'bolachas e biscoitos', 'beleza', 
            'higiene', 'sabonete', 'shampoo',
        ];

        const fmt = v => Number(v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        function norm(s) { return s ? String(s).normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase() : ""; }

        // Mesma lógica de aplicação de descontos baseada em validade / seed
        function aplicarDescontos(products) {
            let now = new Date();
            let eligibleForRandom = [];
            
            products.forEach(p => {
                p.discountPercent = 0; p.oldPrice = p.price;
                if (p.vencimento) {
                    let partes = p.vencimento.split('/');
                    let vDate = new Date(partes[2], partes[1] - 1, partes[0]); 
                    let days = (vDate - now) / (1000 * 60 * 60 * 24);
                    if (days >= 0 && days <= 30) p.discountPercent = 35;
                    else if (days > 30 && days <= 60) p.discountPercent = 30;
                    else if (days > 60 && days <= 90) p.discountPercent = 25;
                }
                if (p.discountPercent === 0) eligibleForRandom.push(p);
            });

            let seed = Math.floor(now.getTime() / (48 * 60 * 60 * 1000));
            const seededRandom = (s) => { let x = Math.sin(s++) * 10000; return x - Math.floor(x); };

            eligibleForRandom.sort((a, b) => seededRandom(seed + parseInt(a.id.replace(/\D/g,'') || 0)) - seededRandom(seed + parseInt(b.id.replace(/\D/g,'') || 0)));
            let r20=5, r15=5, r10=100;
            eligibleForRandom.forEach(p => {
                if(r20>0){ p.discountPercent=20; r20--; } else if(r15>0){ p.discountPercent=15; r15--; } else if(r10>0){ p.discountPercent=10; r10--; }
            });

            products.forEach(p => { if(p.discountPercent > 0) p.price = p.oldPrice * (1 - p.discountPercent/100); });
        }

        async function init() {
            try {
                // Tenta puxar do arquivo local
                const res = await fetch('/site/produtos.json');
                const data = await res.json();
                
                PRODS = data.filter(x => x.situacao !== "I").map(p => ({
                    id: String(p.codigo || p.id),
                    name: p.nome,
                    price: parseFloat(p.preco) * 1.06,
                    stock: parseInt(p.estoque) || 0,
                    img: p.url_imagem || `/site/img/produtos/${p.codigo}.webp`,
                    vencimento: p.validade || p.vencimento || null,
                    categoria: p.categoria || "Outros",
                    embalagem: p.embalagem || ""
                }));

                aplicarDescontos(PRODS);
                
                // Filtra apenas os que tem desconto e estoque, e depois ordena por Categoria, e então Maior Desconto
                PRODS = PRODS.filter(p => p.discountPercent > 0 && p.stock > 0).sort((a, b) => {
                    let catA = norm(a.categoria || '').trim();
                    let catB = norm(b.categoria || '').trim();

                    let iA = ORDEM_CATEGORIAS.indexOf(catA);
                    let iB = ORDEM_CATEGORIAS.indexOf(catB);
                    
                    if (iA === -1) iA = 999; 
                    if (iB === -1) iB = 999;
                    
                    if (iA !== iB) return iA - iB; 
                    return b.discountPercent - a.discountPercent; 
                });

                render();
            } catch (e) { console.error(e); }
        }

        function filterOffers(pct, el) {
            currentFilter = pct;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        // Nova renderização utilizando o layout e subdivisões idênticos ao site principal
        function render() {
            const list = currentFilter === 0 ? PRODS : PRODS.filter(p => p.discountPercent === currentFilter);
            
            let html = '<div class="product-page">';
            let lastCatRendered = null;

            if (list.length === 0) {
                html += `<div style="padding: 40px; text-align: center; color: var(--text-light);">Nenhuma oferta encontrada para esta categoria de desconto.</div>`;
            } else {
                list.forEach(p => {
                    let catAtual = p.categoria || 'Outros';
                    
                    // Exibe a tag de categoria caso seja uma nova categoria na lista
                    if (catAtual !== lastCatRendered) {
                        lastCatRendered = catAtual;
                        html += `
                            <div class="category-header">
                                <i class="fa-solid fa-tag" style="color: #ef4444;"></i> ${catAtual}
                            </div>`;
                    }

                    // Verifica as embalagens e montagem do HTML do card
                    let embalagemHtml = p.embalagem ? `<div class="tag-embalagem-list">${p.embalagem}</div>` : '';
                    
                    html += `
                    <div class="product-card-list bordered">
                        <div class="badge-desc">-${p.discountPercent}%</div>
                        <img src="${p.img}" class="product-icon-list" onerror="this.src='/site/img/logoantonia5.png'">
                        <div class="product-info-list">
                            ${embalagemHtml}
                            <div class="product-name-list">${p.name}</div>
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:auto;">
                                <div class="tag-preco-list">
                                    <span class="old-price">${fmt(p.oldPrice)}</span>
                                    <span style="color: var(--success);">${fmt(p.price)}</span>
                                </div>
                                <div class="card-action-area" id="action-card-${p.id}">
                                    </div>
                            </div>
                        </div>
                    </div>`;
                });
            }
            
            html += '</div>';
            $('vitrine').innerHTML = html;
            updateAllCardUIs();
        }

        // Função para atualizar especificamente os botões de cada card sem precisar recarregar toda a lista
        function updateAllCardUIs() {
            PRODS.forEach(p => {
                let q = CART[p.id] || 0;
                let el = $('action-card-' + p.id);
                if (el) {
                    if (q === 0) {
                        el.innerHTML = `<div class="btn-quick-add-list" onclick="updateCartItem('${p.id}', 1)"><i class="fa-solid fa-plus"></i> Adicionar</div>`;
                    } else {
                        el.innerHTML = `
                        <div class="qty-controls">
                            <i class="fa-solid fa-minus qty-btn" onclick="updateCartItem('${p.id}', -1)"></i>
                            <span style="font-weight:bold; width: 20px; text-align:center;">${q}</span>
                            <i class="fa-solid fa-plus qty-btn" onclick="updateCartItem('${p.id}', 1)"></i>
                        </div>`;
                    }
                }
            });
        }

        // Função universal de gerenciar adição e subtração no carrinho
        function updateCartItem(id, delta) {
            let p = PRODS.find(x => x.id === id);
            if (!p) return;
            
            let currentInCart = CART[id] || 0;
            let n = Math.max(0, currentInCart + delta);
            
            if (n > p.stock) return alert("Estoque insuficiente.");
            
            CART[id] = n;
            if (n === 0) delete CART[id];
            
            updateTotals();
            updateAllCardUIs(); // Atualiza os botões visualmente
        }

        function updateTotals() {
            let total = 0, count = 0;
            Object.entries(CART).forEach(([cid, q]) => {
                const p = PRODS.find(x => x.id === cid);
                if(p) { total += p.price * q; count += q; }
            });
            
            $('txt-items').innerText = `${count} itens selecionados`;
            $('txt-total').innerText = fmt(total);
            
            if (count > 0) {
                $('cartBar').classList.add('active');
            } else {
                $('cartBar').classList.remove('active');
            }

            // Se o modal estiver aberto, atualiza a lista de lá também
            if ($('modalSummary').style.display === 'flex') {
                if (count === 0) closeModal();
                else openModal();
            }
        }

        function openModal() {
            let html = '', total = 0;
            Object.entries(CART).forEach(([id, q]) => {
                const p = PRODS.find(x => x.id === id);
                if(p) {
                    total += p.price * q;
                    html += `
                        <div class="item-row">
                            <img src="${p.img}" class="item-img" onerror="this.src='/site/img/logoantonia5.png'">
                            <div class="item-info">
                                <h4>${p.name}</h4>
                                <p style="color: #666; font-size: 11px;">
                                    <span style="text-decoration: line-through;">${fmt(p.oldPrice)}</span> 
                                    <span style="color: var(--success); margin-left: 5px; font-weight: 800;">${fmt(p.price)}</span>
                                </p>
                            </div>
                            <div style="display: flex; flex-direction: column; align-items: flex-end;">
                                <div style="font-weight:800; margin-bottom: 5px;">${fmt(p.price * q)}</div>
                                <div class="qty-controls" style="padding: 4px 8px; font-size: 12px; background: #fff; border: 1px solid var(--border-light);">
                                    <i class="fa-solid fa-minus qty-btn" onclick="updateCartItem('${p.id}', -1)"></i>
                                    <span style="font-weight:bold; width: 16px; text-align:center;">${q}</span>
                                    <i class="fa-solid fa-plus qty-btn" onclick="updateCartItem('${p.id}', 1)"></i>
                                </div>
                            </div>
                        </div>`;
                }
            });
            $('summaryItems').innerHTML = html;
            $('modalTotal').innerText = fmt(total);
            $('modalSummary').style.display = 'flex';
        }

        function closeModal() { $('modalSummary').style.display = 'none'; }

        function sendToZap() {
            let msg = "*ADICIONAR AO MEU PEDIDO (OFERTAS):*\n\n", total = 0;
            Object.entries(CART).forEach(([id, q]) => {
                const p = PRODS.find(x => x.id === id);
                if(p) { msg += `✅ ${q}x ${p.name} - ${fmt(p.price * q)}\n`; total += p.price * q; }
            });
            msg += `\n*TOTAL EXTRA: ${fmt(total)}*`;
            window.location.href = `https://api.whatsapp.com/send?phone=5565998150975&text=${encodeURIComponent(msg)}`;
        }

        init();
    </script>
</body>
</html>
