<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ofertas Especiais - Dona Antônia</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #000000;
            --success: #059669; 
            --bg-card: #f2f2f5;
            --text-dark: #111111;
            --text-light: #777777;
            --border-light: #eaeaea;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #fff; color: var(--text-dark); padding-bottom: 120px; }

        /* Header e Chips */
        .top-nav { position: sticky; top: 0; z-index: 1000; background: #fff; border-bottom: 1px solid var(--border-light); }
        .header-simple { padding: 15px 20px 10px; text-align: center; }
        .header-simple h1 { font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        .chip-container {
            display: flex; gap: 10px; padding: 10px 20px 15px;
            overflow-x: auto; scrollbar-width: none;
        }
        .chip-container::-webkit-scrollbar { display: none; }
        .chip {
            background: var(--bg-card); color: var(--text-light);
            padding: 8px 16px; border-radius: 20px; font-size: 12px;
            font-weight: 700; white-space: nowrap; cursor: pointer; border: 1px solid transparent;
        }
        .chip.active { background: var(--primary); color: #fff; }

        /* Vitrine */
        .vitrine-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--border-light); border-top: 1px solid var(--border-light); }
        .prod-card { background: #fff; padding: 15px; position: relative; display: flex; flex-direction: column; align-items: center; }
        .badge-desc { position: absolute; top: 10px; right: 10px; background: #ef4444; color: #fff; font-size: 10px; padding: 3px 7px; border-radius: 5px; font-weight: 800; z-index: 5; }
        .prod-img { width: 100%; aspect-ratio: 1; object-fit: contain; margin-bottom: 10px; }
        .prod-name { font-size: 11px; font-weight: 600; text-align: center; height: 32px; overflow: hidden; color: #444; margin-bottom: 5px; }
        .price-box { text-align: center; margin-bottom: 10px; }
        .old-price { font-size: 10px; text-decoration: line-through; color: #aaa; }
        .current-price { font-size: 15px; font-weight: 800; color: var(--text-dark); display: block; }
        
        .btn-add { width: 36px; height: 36px; background: var(--primary); color: #fff; border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-add:active { transform: scale(0.9); }

        /* Barra de Valor */
        .cart-bar {
            position: fixed; bottom: 25px; left: 15px; right: 15px;
            background: var(--primary); color: #fff; padding: 15px 20px;
            border-radius: 16px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 1100;
            transform: translateY(150%); transition: transform 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        .cart-bar.active { transform: translateY(0); }
        .cart-info b { font-size: 18px; display: block; }
        .cart-info span { font-size: 11px; text-transform: uppercase; opacity: 0.8; font-weight: 700; }
        .btn-view { background: var(--success); color: #fff; padding: 10px 15px; border-radius: 8px; font-weight: 800; font-size: 12px; text-transform: uppercase; }

        /* Modal Resumo */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: none; align-items: flex-end; }
        .modal-content { background: #fff; width: 100%; border-radius: 24px 24px 0 0; padding: 25px; max-height: 85vh; overflow-y: auto; }
        .summary-list { display: flex; flex-direction: column; gap: 15px; margin: 20px 0; }
        .item-row { display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
        .item-img { width: 50px; height: 50px; object-fit: contain; background: var(--bg-card); border-radius: 6px; }
        .item-info { flex: 1; }
        .item-info h4 { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
        .item-info p { font-size: 13px; font-weight: 800; }
        
        .btn-confirm { width: 100%; background: var(--success); color: #fff; padding: 18px; border-radius: 14px; border: none; font-weight: 800; font-size: 16px; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-nav">
        <header class="header-simple">
            <h1>Ofertas Dona Antônia</h1>
        </header>
        <div class="chip-container" id="discount-chips">
            <div class="chip active" onclick="filterOffers(0, this)">Todas</div>
            <div class="chip" onclick="filterOffers(35, this)">35% OFF</div>
            <div class="chip" onclick="filterOffers(30, this)">30% OFF</div>
            <div class="chip" onclick="filterOffers(25, this)">25% OFF</div>
            <div class="chip" onclick="filterOffers(20, this)">20% OFF</div>
            <div class="chip" onclick="filterOffers(15, this)">15% OFF</div>
            <div class="chip" onclick="filterOffers(10, this)">10% OFF</div>
        </div>
    </div>

    <div class="vitrine-grid" id="vitrine"></div>

    <div class="cart-bar" id="cartBar" onclick="openModal()">
        <div class="cart-info">
            <span id="txt-items">0 itens selecionados</span>
            <b id="txt-total">R$ 0,00</b>
        </div>
        <div class="btn-view">Confirmar</div>
    </div>

    <div class="modal" id="modalSummary" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="font-weight: 800; font-size: 20px;">Resumo das Ofertas</h2>
            <div class="summary-list" id="summaryItems"></div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0;">
                <span style="font-weight: 600; color: #777;">Total Adicional:</span>
                <span id="modalTotal" style="font-size: 22px; font-weight: 900;">R$ 0,00</span>
            </div>
            <button class="btn-confirm" onclick="sendToZap()">
                <i class="fa-brands fa-whatsapp" style="font-size: 20px;"></i> ENVIAR AO WHATSAPP
            </button>
            <button onclick="closeModal()" style="width: 100%; padding: 15px; border: none; background: none; color: #aaa; font-weight: 600;">Continuar Comprando</button>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        let PRODS = [];
        let CART = {};
        let currentFilter = 0;

        const fmt = v => Number(v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        // MESMA LÓGICA DO SITE PRINCIPAL
        function aplicarDescontos(products) {
            let now = new Date();
            let eligibleForRandom = [];
            
            products.forEach(p => {
                p.discountPercent = 0; p.oldPrice = p.price;
                if (p.vencimento) {
                    let partes = p.vencimento.split('/');
                    let vDate = new Date(partes[2], partes[1] - 1, partes[0]); 
                    let days = (vDate - now) / (1000 * 60 * 60 * 24);
                    if (days >= 0 && days <= 30) p.discountPercent = 35;
                    else if (days > 30 && days <= 60) p.discountPercent = 30;
                    else if (days > 60 && days <= 90) p.discountPercent = 25;
                }
                if (p.discountPercent === 0) eligibleForRandom.push(p);
            });

            let seed = Math.floor(now.getTime() / (48 * 60 * 60 * 1000));
            const seededRandom = (s) => { let x = Math.sin(s++) * 10000; return x - Math.floor(x); };

            eligibleForRandom.sort((a, b) => seededRandom(seed + parseInt(a.id.replace(/\D/g,'') || 0)) - seededRandom(seed + parseInt(b.id.replace(/\D/g,'') || 0)));
            let r20=5, r15=5, r10=100;
            eligibleForRandom.forEach(p => {
                if(r20>0){ p.discountPercent=20; r20--; } else if(r15>0){ p.discountPercent=15; r15--; } else if(r10>0){ p.discountPercent=10; r10--; }
            });

            products.forEach(p => { if(p.discountPercent > 0) p.price = p.oldPrice * (1 - p.discountPercent/100); });
        }

        async function init() {
            try {
                const res = await fetch('/site/produtos.json');
                const data = await res.json();
                
                PRODS = data.filter(x => x.situacao !== "I").map(p => ({
                    id: String(p.codigo || p.id),
                    name: p.nome,
                    price: parseFloat(p.preco) * 1.06,
                    stock: parseInt(p.estoque) || 0,
                    img: p.url_imagem || `/site/img/produtos/${p.codigo}.webp`,
                    vencimento: p.validade || p.vencimento || null
                }));

                aplicarDescontos(PRODS);
                PRODS = PRODS.filter(p => p.discountPercent > 0 && p.stock > 0).sort((a,b) => b.discountPercent - a.discountPercent);
                render();
            } catch (e) { console.error(e); }
        }

        function filterOffers(pct, el) {
            currentFilter = pct;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        function render() {
            const list = currentFilter === 0 ? PRODS : PRODS.filter(p => p.discountPercent === currentFilter);
            $('vitrine').innerHTML = list.map(p => `
                <div class="prod-card">
                    <div class="badge-desc">-${p.discountPercent}%</div>
                    <img src="${p.img}" class="prod-img" onerror="this.src='/site/img/logoantonia5.png'">
                    <div class="prod-name">${p.name}</div>
                    <div class="price-box">
                        <span class="old-price">${fmt(p.oldPrice)}</span>
                        <span class="current-price">${fmt(p.price)}</span>
                    </div>
                    <button class="btn-add" onclick="addToCart('${p.id}')"><i class="fa-solid fa-plus"></i></button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            CART[id] = (CART[id] || 0) + 1;
            let total=0, count=0;
            Object.entries(CART).forEach(([cid, q]) => {
                const p = PRODS.find(x => x.id === cid);
                if(p) { total += p.price * q; count += q; }
            });
            $('txt-items').innerText = `${count} itens selecionados`;
            $('txt-total').innerText = fmt(total);
            $('cartBar').classList.add('active');
        }

        function openModal() {
            let html = '', total = 0;
            Object.entries(CART).forEach(([id, q]) => {
                const p = PRODS.find(x => x.id === id);
                if(p) {
                    total += p.price * q;
                    html += `
                        <div class="item-row">
                            <img src="${p.img}" class="item-img">
                            <div class="item-info">
                                <h4>${p.name}</h4>
                                <p>${q}x ${fmt(p.price)}</p>
                            </div>
                            <div style="font-weight:800;">${fmt(p.price * q)}</div>
                        </div>`;
                }
            });
            $('summaryItems').innerHTML = html;
            $('modalTotal').innerText = fmt(total);
            $('modalSummary').style.display = 'flex';
        }

        function closeModal() { $('modalSummary').style.display = 'none'; }

        function sendToZap() {
            let msg = "*ADICIONAR AO MEU PEDIDO (OFERTAS):*\n\n", total = 0;
            Object.entries(CART).forEach(([id, q]) => {
                const p = PRODS.find(x => x.id === id);
                if(p) { msg += `✅ ${q}x ${p.name} - ${fmt(p.price * q)}\n`; total += p.price * q; }
            });
            msg += `\n*TOTAL EXTRA: ${fmt(total)}*`;
            window.location.href = `https://api.whatsapp.com/send?phone=5565998150975&text=${encodeURIComponent(msg)}`;
        }

        init();
    </script>
</body>
</html>
