name: Aplicar módulo de pedidos do site zero

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  aplicar:
    if: github.event.issue.title == 'APLICAR PEDIDOS SITE ZERO PR 27'
    runs-on: ubuntu-latest
    steps:
      - name: Baixar branch da reconstrução
        uses: actions/checkout@v4
        with:
          ref: agent/reconstrucao-site-zero
          fetch-depth: 0

      - name: Aplicar e validar módulo
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode scripts/loja-pedido-v1.js.gz.b64 | gzip --decompress > site/loja-pedido-v1.js
          node --check site/loja-pedido-v1.js
          cat site/loja-data-v1.js site/loja-cache-v1.js site/loja-ui2-v1.js site/loja-catalogo-v1.js site/loja-navegacao-v1.js site/loja-pedido-v1.js > /tmp/loja-completa.js
          node --check /tmp/loja-completa.js

      - name: Salvar somente na branch de reconstrução
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/loja-pedido-v1.js
          git diff --cached --quiet && exit 0
          git commit -m "Preserva formato completo dos pedidos no Firebase"
          git push origin HEAD:agent/reconstrucao-site-zero
