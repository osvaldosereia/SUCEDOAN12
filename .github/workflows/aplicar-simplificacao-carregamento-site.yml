name: Aplicar simplificação do carregamento do site

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/simplificar-carregamento-site.mjs
      - .github/workflows/aplicar-simplificacao-carregamento-site.yml

permissions:
  contents: write

concurrency:
  group: simplificar-carregamento-site
  cancel-in-progress: false

jobs:
  aplicar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Aplicar simplificação
        run: node scripts/simplificar-carregamento-site.mjs

      - name: Validar scripts
        run: |
          node --check scripts/sincronizar-produtos-home-firebase.mjs
          node --check scripts/simplificar-carregamento-site.mjs
          grep -q "PRODUCT_HOME_URLS: \['/site/produtos-home.json'\]" index.html
          grep -q "DA_CARREGAMENTO_NATIVO_SIMPLES_V18" index.html
          ! grep -q 'id="da-fast-home-runtime"' index.html
          ! grep -q 'rel="preload" href="site/produtos-home.json' index.html
          git diff --check

      - name: Publicar alterações
        run: |
          if git diff --quiet -- index.html scripts/sincronizar-produtos-home-firebase.mjs; then
            echo "Nenhuma alteração pendente."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html scripts/sincronizar-produtos-home-firebase.mjs
          git commit -m "Simplifica carregamento de produtos e imagens"
          git push
