name: Instalar Compra Rápida

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/compra-rapida-integracao.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: compra-rapida-integracao
  cancel-in-progress: false

jobs:
  integrar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Montar e validar arquivos
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site produtos

          base64 -d .github/compra-rapida-payload/compra-rapida.js.gz.b64 | gzip -d > site/compra-rapida.js
          cat .github/compra-rapida-payload/json/part-* | base64 -d | gzip -d > site/compra-rapida.json
          cat .github/compra-rapida-payload/admin/part-* | base64 -d | gzip -d > produtos/index.html

          node --check site/compra-rapida.js
          python -m json.tool site/compra-rapida.json >/dev/null
          grep -q '<!DOCTYPE html>' produtos/index.html
          grep -q 'Compra Rápida' produtos/index.html

      - name: Integrar ao site
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          import json
          import re

          version = '2026-07-17-compra-rapida-v15'
          marker = '<!-- DA_COMPRA_RAPIDA_RUNTIME -->'
          script = f'{marker}\n<script src="site/compra-rapida.js?v={version}" defer></script>'

          index_path = Path('index.html')
          text = index_path.read_text(encoding='utf-8')
          if marker in text:
              text = re.sub(
                  r'<!-- DA_COMPRA_RAPIDA_RUNTIME -->\s*<script[^>]+site/compra-rapida\.js[^>]*></script>',
                  script,
                  text,
                  count=1,
              )
          else:
              if '</body>' not in text:
                  raise SystemExit('index.html sem fechamento </body>')
              text = text.replace('</body>', f'\n{script}\n\n</body>', 1)

          text = text.replace('2026-07-17-imagens-mobile-v14', version)
          index_path.write_text(text, encoding='utf-8')

          app_version = {
              'version': version,
              'updatedAt': datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace('+00:00', 'Z'),
              'purpose': 'Compra Rápida guiada, catálogo administrável e integração com o carrinho atual',
          }
          Path('site/app-version.json').write_text(
              json.dumps(app_version, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          PY

          grep -q 'DA_COMPRA_RAPIDA_RUNTIME' index.html
          grep -q '2026-07-17-compra-rapida-v15' index.html

      - name: Limpar instalador temporário
        shell: bash
        run: |
          rm -rf .github/compra-rapida-payload
          rm -f .github/workflows/compra-rapida-integracao.yml

      - name: Publicar integração
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'Dona Antônia Automação'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'Nenhuma alteração pendente.'
            exit 0
          fi
          git commit -m 'Integrar Compra Rápida ao site'
          git push origin HEAD:main || {
            git pull --rebase origin main
            git push origin HEAD:main
          }
