name: Corrigir salvamento do admin

on:
  push:
    paths:
      - '.github/workflows/corrigir-salvamento-admin-20260724.yml'

permissions:
  contents: write

jobs:
  corrigir-admin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Atualizar base
        run: git pull --rebase origin main

      - name: Corrigir gravação dos arquivos do catálogo
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('producao/index.html')
          content = path.read_text(encoding='utf-8')

          old = '''  async function saveGithubFiles({produtosHome,metaCatalogCsv,adminMeta,cestas,kits}={}){readSettingsFromUi(); const ops=[]; if(produtosHome) ops.push(githubUpsert(state.settings.githubProdutosHomePath||"site/produtos-home.json", produtosHome, "Atualiza produtos-home.json pelo admin Dona Antônia")); if(metaCatalogCsv) ops.push(githubUpsertText(state.settings.githubMetaPath, metaCatalogCsv, "Atualiza produtos_meta.csv (Meta) pelo admin Dona Antônia")); if(adminMeta) ops.push(githubUpsert(state.settings.githubAdminMetaPath, adminMeta, "Atualiza produtos_admin_meta.json pelo admin Dona Antônia")); if(cestas) ops.push(githubUpsert(state.settings.githubCestasPath, cestas, "Atualiza produtos-cesta-basica.json pelo admin Dona Antônia")); if(kits) ops.push(githubUpsert(state.settings.githubKitsPath, kits, "Atualiza site/kits.json pelo admin Dona Antônia")); await Promise.all(ops)}'''
          new = '''  async function saveGithubFiles({produtosHome,metaCatalogCsv,adminMeta,cestas,kits}={}){
            readSettingsFromUi();
            const ops=[];
            if(produtosHome) ops.push({label:"produtos-home.json",run:()=>githubUpsert(state.settings.githubProdutosHomePath||"site/produtos-home.json",produtosHome,"Atualiza produtos-home.json pelo admin Dona Antônia")});
            if(metaCatalogCsv) ops.push({label:"produtos_meta.csv",run:()=>githubUpsertText(state.settings.githubMetaPath,metaCatalogCsv,"Atualiza produtos_meta.csv (Meta) pelo admin Dona Antônia")});
            if(adminMeta) ops.push({label:"produtos_admin_meta.json",run:()=>githubUpsert(state.settings.githubAdminMetaPath,adminMeta,"Atualiza produtos_admin_meta.json pelo admin Dona Antônia")});
            if(cestas) ops.push({label:"produtos-cesta-basica.json",run:()=>githubUpsert(state.settings.githubCestasPath,cestas,"Atualiza produtos-cesta-basica.json pelo admin Dona Antônia")});
            if(kits) ops.push({label:"site/kits.json",run:()=>githubUpsert(state.settings.githubKitsPath,kits,"Atualiza site/kits.json pelo admin Dona Antônia")});
            const summary={total:ops.length,written:0,skipped:0,files:[]};
            for(const op of ops){
              let result=null;
              for(let attempt=1;attempt<=4;attempt+=1){
                try{result=await op.run();break}
                catch(error){
                  const retryable=/GitHub PUT .*: (409|422)\b/.test(String(error?.message||error));
                  if(!retryable||attempt===4)throw error;
                  await new Promise(resolve=>setTimeout(resolve,attempt*450));
                }
              }
              const skipped=!!result?.skipped;
              summary[skipped?"skipped":"written"]+=1;
              summary.files.push({label:op.label,skipped});
            }
            return summary;
          }'''

          if old not in content:
              raise SystemExit('Função saveGithubFiles original não encontrada; correção cancelada.')
          content = content.replace(old, new, 1)

          old_summary = '    const summary=await daCompatSaveGithubFilesBase(payload);'
          new_summary = '    const summary=(await daCompatSaveGithubFilesBase(payload))||{total:0,written:0,skipped:0,files:[]};'
          if old_summary not in content:
              raise SystemExit('Camada de compatibilidade do salvamento não encontrada; correção cancelada.')
          content = content.replace(old_summary, new_summary, 1)

          path.write_text(content, encoding='utf-8')
          PY

          grep -q 'const summary={total:ops.length,written:0,skipped:0,files:\[\]};' producao/index.html
          grep -q 'const summary=(await daCompatSaveGithubFilesBase(payload))||' producao/index.html
          rm -f .github/workflows/corrigir-salvamento-admin-20260724.yml

      - name: Publicar correção
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add producao/index.html .github/workflows/corrigir-salvamento-admin-20260724.yml
          git commit -m 'Corrige retorno e conflitos no salvamento do admin'
          for tentativa in 1 2 3 4 5; do
            if git push origin main; then
              exit 0
            fi
            git pull --rebase origin main
          done
          echo 'Não foi possível publicar a correção após cinco tentativas.' >&2
          exit 1
