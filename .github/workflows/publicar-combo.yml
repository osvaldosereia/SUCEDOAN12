name: Publicar combo com imagem e redes sociais

on:
  workflow_dispatch:
  schedule:
    - cron: "10 8,11,14,17 * * *"
      timezone: "America/Cuiaba"

permissions:
  contents: write

concurrency:
  group: publicar-combo-redes
  cancel-in-progress: false

jobs:
  publicar-combo:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install @google/genai

      - name: Gerar imagem do combo e publicar
        run: node scripts/publicar-combo-redes.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}

          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}

          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}

          GOOGLE_BUSINESS_ACCOUNT_ID: ${{ secrets.GOOGLE_BUSINESS_ACCOUNT_ID }}
          GOOGLE_BUSINESS_LOCATION_ID: ${{ secrets.GOOGLE_BUSINESS_LOCATION_ID }}
          GOOGLE_BUSINESS_ACCESS_TOKEN: ${{ secrets.GOOGLE_BUSINESS_ACCESS_TOKEN }}

      - name: Salvar imagem gerada no GitHub
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add site/img/combos/*.jpg site/publicados-combos.json
          git diff --cached --quiet || git commit -m "Publica imagem promocional de combo"
          git push
