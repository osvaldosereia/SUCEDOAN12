name: Hotfix site banners e admin

on:
  push:
    branches: [ main ]
    paths:
      - '.hotfix-banner-trigger'
      - '.github/workflows/patch-producao-index-hotfix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Aplicar hotfix no site e no admin
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json

          changed = []
          def write_if_changed(path, text):
              p = Path(path)
              old = p.read_text(encoding='utf-8') if p.exists() else ''
              if old != text:
                  p.write_text(text, encoding='utf-8')
                  changed.append(path)

          # SITE PUBLICO: mais respiro, mais altura e imagem sem corte.
          root = Path('index.html')
          html = root.read_text(encoding='utf-8')
          site_marker = '/* DA_HOTFIX_BANNER_LAYOUT_CAROUSEL_20260710 */'
          site_css = r'''

    /* DA_HOTFIX_BANNER_LAYOUT_CAROUSEL_20260710 */
    .da-banner {
      margin: 24px 0 36px !important;
      padding-top: 8px !important;
    }
    .da-banner-carousel {
      margin: 24px 0 36px !important;
      overflow: hidden !important;
      border-radius: 28px !important;
    }
    .da-banner-carousel .da-banner-slide {
      margin: 0 !important;
      padding: 0 !important;
    }
    .da-banner-picture {
      aspect-ratio: 16 / 10 !important;
      min-height: clamp(184px, 56vw, 390px) !important;
      background: linear-gradient(135deg, #eef8f2, #fff7ed) !important;
    }
    .da-banner-picture img {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain !important;
      object-position: center center !important;
      background: transparent !important;
    }
    @media (min-width: 768px) {
      .da-banner-hero .da-banner-picture,
      .da-banner-section .da-banner-picture,
      .da-banner-carousel .da-banner-picture {
        aspect-ratio: 32 / 11 !important;
        min-height: 250px !important;
        max-height: 430px !important;
      }
    }
'''
          if site_marker not in html:
              if '</style>' not in html:
                  raise SystemExit('Nao encontrei </style> no index.html')
              html = html.replace('</style>', site_css + '\n  </style>', 1)
              write_if_changed('index.html', html)
              print('index.html: layout de banners aplicado')
          else:
              print('index.html: layout ja aplicado')

          # ADMIN: painel/filtro de produtos com banner + botao remover banner.
          admin = Path('producao/index.html')
          adm = admin.read_text(encoding='utf-8')
          manager_marker = '/* DA_HOTFIX_ADMIN_BANNER_MANAGER_20260710 */'
          manager_js = r'''

/* DA_HOTFIX_ADMIN_BANNER_MANAGER_20260710 */
(function(){
  const DA_BANNERS_JSON_PATH="site/banners/exemplo.json";
  function daInjectBannerManagerStyle(){
    if(document.getElementById("daBannerManagerStyle"))return;
    const style=document.createElement("style");style.id="daBannerManagerStyle";
    style.textContent=`
      .product-workbench.da-product-has-banner{border-color:#7bd88f!important;box-shadow:0 0 0 2px rgba(21,115,71,.14),var(--shadow)!important}
      .da-banner-product-status{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 7px}
      .da-banner-active-chip{background:#edf8f1!important;color:#157347!important;border-color:#caead7!important}
      .workbench-banner-found{grid-column:1/-1;margin-top:8px;padding:9px 11px;border-radius:12px;background:#edf8f1;border:1px solid #caead7;color:#157347;font-size:12px;font-weight:800}
      .da-banner-filter-on{background:#111!important;color:#fff!important;border-color:#111!important}
      .da-banner-count-pill{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 7px;border-radius:999px;background:rgba(255,255,255,.26);font-size:12px;font-weight:950}
    `;
    document.head.appendChild(style);
  }
  function daClean(v){return textNorm(String(v||"")).replace(/[^a-z0-9]+/g,"")}
  function daProductCodes(p){return new Set([getKey(p),getCode(p),p?.codigo,p?.id,p?.firebaseKey,p?.gtin,p?.ean].map(daClean).filter(Boolean))}
  function daBannerProductValue(b){
    const link=b&&b.link;
    if(link&&typeof link==="object"&&textNorm(link.tipo||link.type)==="produto")return link.valor||link.value||link.href||link.url||"";
    if(typeof link==="string")return link;
    const m=String(b?.id||"").match(/^produto-([a-z0-9]+)-/i);
    return m?m[1]:"";
  }
  function daBannerMatchesProduct(b,p){
    if(!b||b.ativo===false||!p)return false;
    const value=daClean(daBannerProductValue(b));
    return !!value&&daProductCodes(p).has(value);
  }
  function daBannersForProduct(p){return (state.daBannerList||[]).filter(b=>daBannerMatchesProduct(b,p))}
  function daBannerProducts(){return state.produtos.filter(p=>daBannersForProduct(p).length>0)}
  function daDecodeGithubContent(file){return decodeURIComponent(escape(atob(String(file.content||"").replace(/\s/g,""))))}
  async function daLoadBannerJson(){
    readSettingsFromUi();
    try{
      const file=await githubContent(DA_BANNERS_JSON_PATH);
      if(file&&file.content)return JSON.parse(daDecodeGithubContent(file));
    }catch(e){console.warn("Banners via GitHub API indisponiveis, tentando raw publico",e)}
    const raw=githubRawFileUrl(DA_BANNERS_JSON_PATH);
    if(!raw)throw new Error("Configure GitHub owner/repo/branch para carregar banners.");
    const r=await fetch(`${raw}?v=${Date.now()}`,{cache:"no-store"});
    if(!r.ok)throw new Error(`Banners raw HTTP ${r.status}`);
    return await r.json();
  }
  async function daRefreshBannerIndex(showStatus=false){
    try{
      const data=await daLoadBannerJson();
      state.daBannerJson=data&&typeof data==="object"?data:{banners:[]};
      state.daBannerList=Array.isArray(state.daBannerJson.banners)?state.daBannerJson.banners.filter(b=>b&&b.ativo!==false):[];
      state.daBannerIndexLoaded=true;
      daInstallBannerToolbarButton();
      if(showStatus)setStatus(`Índice de banners carregado: ${state.daBannerList.length} ativo(s).`,"ok");
      return state.daBannerList;
    }catch(e){console.warn("Erro ao carregar índice de banners",e);state.daBannerList=state.daBannerList||[];state.daBannerIndexLoaded=false;daInstallBannerToolbarButton();if(showStatus)setStatus("Não foi possível carregar o índice de banners: "+e.message,"err");return state.daBannerList}
  }
  function daInstallBannerToolbarButton(){
    daInjectBannerManagerStyle();
    const toolbar=document.querySelector('#tab-produtos .panel-head .toolbar');
    if(!toolbar)return;
    let btn=toolbar.querySelector('[data-action="view-products-with-banners"]');
    if(!btn){btn=document.createElement('button');btn.type='button';btn.className='btn gold';btn.dataset.action='view-products-with-banners';toolbar.insertBefore(btn,toolbar.firstChild)}
    const count=daBannerProducts().length;
    btn.classList.toggle('da-banner-filter-on',!!state.showOnlyBannerProducts);
    btn.innerHTML=`📣 Produtos com banner <span class="da-banner-count-pill">${count}</span>`;
    let refresh=toolbar.querySelector('[data-action="refresh-banner-index"]');
    if(!refresh){refresh=document.createElement('button');refresh.type='button';refresh.className='btn';refresh.dataset.action='refresh-banner-index';refresh.textContent='Atualizar banners';toolbar.insertBefore(refresh,btn.nextSibling)}
  }
  const daBaseRenderProductWorkbench=renderProductWorkbench;
  renderProductWorkbench=function(p){
    const banners=daBannersForProduct(p),has=banners.length>0;
    let html=daBaseRenderProductWorkbench(p);
    if(has)html=html.replace('class="product-card product-workbench','class="product-card product-workbench da-product-has-banner');
    const badge=has?`<div class="da-banner-product-status"><span class="chip da-banner-active-chip">📣 ${banners.length} banner${banners.length>1?'s':''} ativo${banners.length>1?'s':''}</span><span class="chip">${esc(banners.map(b=>b.posicao||'sem posição').join(' · '))}</span></div>`:'';
    html=html.replace('<div class="workbench-title"><strong>',`<div class="workbench-title">${badge}<strong>`);
    if(has){
      const info=`<div class="workbench-banner-found"><strong>Banner ativo:</strong> ${esc(banners.map(b=>`${b.id||'banner'} em ${b.posicao||'sem posição'}`).join(' · '))}</div>`;
      html=html.replace('</select></div>\n          <button class="btn create-banner-btn"',`</select></div>${info}\n          <button class="btn create-banner-btn"`);
      const remove=`<button class="btn small red" type="button" data-action="remove-product-banner" data-key="${esc(getKey(p))}">Remover banner</button>`;
      html=html.replace('</button>\n        </div>\n        <div class="workbench-sections">',`</button>${remove}\n        </div>\n        <div class="workbench-sections">`);
    }
    return html;
  };
  const daBaseRenderProducts=renderProducts;
  renderProducts=function(){
    daInjectBannerManagerStyle();
    const original=state.produtos;
    if(state.showOnlyBannerProducts)state.produtos=original.filter(p=>daBannersForProduct(p).length>0);
    try{return daBaseRenderProducts.apply(this,arguments)}
    finally{state.produtos=original;daInstallBannerToolbarButton()}
  };
  const daBaseCreateProductBanner=createProductBanner;
  createProductBanner=async function(key){
    const result=await daBaseCreateProductBanner.apply(this,arguments);
    setTimeout(()=>daRefreshBannerIndex(true).then(()=>renderProducts()),900);
    return result;
  };
  async function daRemoveProductBanner(key){
    const product=productByKey(key);if(!product)return alert("Produto não encontrado.");
    const current=daBannersForProduct(product);
    if(!current.length)return alert("Este produto não tem banner ativo no JSON atual.");
    if(!confirm(`Remover/desativar ${current.length} banner(s) de ${getName(product)}?`))return;
    readSettingsFromUi();
    const file=await githubContent(DA_BANNERS_JSON_PATH);
    if(!file||!file.content)throw new Error("Não encontrei site/banners/exemplo.json no GitHub.");
    const data=JSON.parse(daDecodeGithubContent(file));
    let removed=0;
    data.banners=(Array.isArray(data.banners)?data.banners:[]).map(b=>{
      if(daBannerMatchesProduct(b,product)){removed++;return {...b,ativo:false,removido_em:nowIso(),removido_por:"admin"}}
      return b;
    });
    data.versao=`${new Date().toISOString().replace(/[:.]/g,'-')}-banner-removido`;
    if(!removed)return alert("Não encontrei banner ativo deste produto no JSON remoto.");
    await githubUpsert(DA_BANNERS_JSON_PATH,data,`Remove banner do produto ${product.codigo||getName(product)}`);
    await daRefreshBannerIndex(true);
    renderProducts();
    setStatus(`${removed} banner(s) removido(s) de ${getName(product)}.`,"ok");
  }
  document.addEventListener('click',e=>{
    const btn=e.target.closest('[data-action]');if(!btn)return;
    const action=btn.dataset.action;
    if(action==='view-products-with-banners'){state.showOnlyBannerProducts=!state.showOnlyBannerProducts;state.productPage=1;renderProducts();}
    if(action==='refresh-banner-index'){runUiAction(btn,'Atualizando...',async()=>{await daRefreshBannerIndex(true);renderProducts();});}
    if(action==='remove-product-banner'){runUiAction(btn,'Removendo...',async()=>daRemoveProductBanner(btn.dataset.key));}
  },true);
  const daBaseLoadData=loadData;
  loadData=async function(){
    const result=await daBaseLoadData.apply(this,arguments);
    await daRefreshBannerIndex(false);
    renderProducts();
    return result;
  };
  window.daRefreshBannerIndex=daRefreshBannerIndex;
})();
'''
          if manager_marker not in adm:
              needle = '\n  loadData();'
              pos = adm.rfind(needle)
              if pos < 0:
                  raise SystemExit('Nao encontrei loadData(); no producao/index.html')
              adm = adm[:pos] + manager_js + adm[pos:]
              write_if_changed('producao/index.html', adm)
              print('producao/index.html: gestor de banners aplicado')
          else:
              print('producao/index.html: gestor de banners ja aplicado')

          # JSON: valida e atualiza versao sem perder banners criados.
          bp = Path('site/banners/exemplo.json')
          data = json.loads(bp.read_text(encoding='utf-8'))
          if not isinstance(data.get('banners'), list):
              raise SystemExit('site/banners/exemplo.json sem array banners')
          if sum(1 for b in data['banners'] if b.get('ativo') is True and b.get('posicao') == 'home.higiene.topo') >= 2:
              data['versao'] = '2026-07-10-1950-admin-banner-manager-ok'
              write_if_changed('site/banners/exemplo.json', json.dumps(data, ensure_ascii=False, indent=2) + '\n')
              print('site/banners/exemplo.json: validado')

          print('Arquivos alterados:', ', '.join(changed) or 'nenhum')
          PY

      - name: Commitar alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add index.html producao/index.html site/banners/exemplo.json
            git commit -m "Adiciona gestor de banners no admin e ajusta layout"
            git push
          else
            echo "Nenhuma alteração necessária."
          fi
