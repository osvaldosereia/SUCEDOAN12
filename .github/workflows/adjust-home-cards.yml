name: Aplicar ajustes finais da página inicial

on:
  push:
    paths:
      - '.github/workflows/adjust-home-cards.yml'

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Atualizar base
        shell: bash
        run: git pull --rebase origin main

      - name: Ajustar index raiz
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          content = path.read_text(encoding='utf-8')

          # Mostra a embalagem acima do nome em todos os cards padrão de produto.
          old_product = '''          <div class="product-body">
            <a class="product-name" href="#/produto/${route}" title="${escapeHtml(p.name)}">${escapeHtml(cardName)}</a>'''
          new_product = '''          <div class="product-body">
            ${p.embalagem ? `<div class="product-packaging" aria-label="Embalagem do produto" title="${escapeHtml(p.embalagem)}">${escapeHtml(p.embalagem)}</div>` : ''}
            <a class="product-name" href="#/produto/${route}" title="${escapeHtml(p.name)}">${escapeHtml(cardName)}</a>'''
          if old_product in content:
              content = content.replace(old_product, new_product, 1)
          elif new_product not in content:
              raise SystemExit('Bloco do card de produto não encontrado.')

          # Substitui os quatro atalhos antigos pelos três atalhos comerciais novos.
          new_quick_links = r'''    function homeQuickLinksHtml() {
      const available = state.products.filter(isAvailable);
      const offers = getTopOffers(240);
      const discountOf = product => Number(productDisplayPricing(product).discountPercent || 0);
      const exact50 = offers.find(product => Math.round(discountOf(product)) === 50);
      const exact40 = offers.find(product => Math.round(discountOf(product)) === 40);
      const product50 = exact50 || offers.find(product => discountOf(product) >= 50) || available[0];
      const product40 = exact40 || offers.find(product => discountOf(product) >= 40 && discountOf(product) < 50) || available[1] || available[0];
      const product5 = available
        .filter(product => {
          const price = Number(productDisplayPricing(product).effective || 0);
          return price > 0 && price <= 5;
        })
        .sort((a, b) => Number(productDisplayPricing(a).effective || 0) - Number(productDisplayPricing(b).effective || 0))[0] || available[2] || available[0];
      const cards = [
        { href: '#/ofertas/50', title: '50% DE DESCONTO', copy: 'Produtos selecionados pela metade do preço', product: product50, cls: 'deal-50' },
        { href: '#/ofertas/40', title: '40% DE DESCONTO', copy: 'Economize em produtos com desconto especial', product: product40, cls: 'deal-40' },
        { href: '#/ofertas/ate-5', title: 'ATÉ 5 REAIS', copy: 'Achadinhos baratos para completar a compra', product: product5, cls: 'deal-5' }
      ];
      return `<section class="home-quick-grid home-deal-grid" aria-label="Atalhos de descontos">${cards.map((card, index) => {
        const image = card.product ? card.product.img : 'img/logoantonia5.png';
        const fallbacks = card.product ? imageFallbackList(card.product.images) : '';
        return `<a class="home-quick-card home-deal-card ${card.cls}" href="${card.href}"><div><strong>${escapeHtml(card.title)}</strong><span>${escapeHtml(card.copy)}</span></div><img class="home-deal-product-img" loading="${index === 0 ? 'eager' : 'lazy'}" decoding="async" width="112" height="112"${index === 0 ? ' fetchpriority="high"' : ''} src="${escapeHtml(image)}" data-fallback-images="${escapeHtml(fallbacks)}" alt="" onerror="window.__daFallbackImg(this)"></a>`;
      }).join('')}</section>`;
    }'''
          quick_pattern = re.compile(r'    function homeQuickLinksHtml\(\) \{.*?\n    \}\n\n    function brandStripHtml', re.S)
          if quick_pattern.search(content):
              content = quick_pattern.sub(new_quick_links + '\n\n    function brandStripHtml', content, count=1)
          elif 'home-quick-grid home-deal-grid' not in content:
              raise SystemExit('Função dos atalhos da home não encontrada.')

          # Torna os três atalhos funcionais, com páginas filtradas.
          new_render_offers = r'''    function renderOffers(mode) {
      const requestedMode = String(mode || '').toLowerCase();
      const allOffers = getTopOffers(240);
      const discountOf = product => Number(productDisplayPricing(product).discountPercent || 0);
      let products = allOffers;
      let title = 'Ofertas';
      let subtitle = 'Produtos com desconto disponíveis agora.';
      let emptyTitle = 'Sem ofertas no momento';
      let metaDescription = 'Ofertas de supermercado com entrega em Cuiabá e Várzea Grande.';

      if (requestedMode === '50') {
        const exact = allOffers.filter(product => Math.round(discountOf(product)) === 50);
        products = exact.length ? exact : allOffers.filter(product => discountOf(product) >= 50);
        title = '50% de desconto';
        subtitle = 'Produtos selecionados com metade do preço.';
        emptyTitle = 'Nenhum produto com 50% agora';
        metaDescription = 'Produtos com 50% de desconto e entrega em Cuiabá e Várzea Grande.';
      } else if (requestedMode === '40') {
        const exact = allOffers.filter(product => Math.round(discountOf(product)) === 40);
        products = exact.length ? exact : allOffers.filter(product => discountOf(product) >= 40 && discountOf(product) < 50);
        title = '40% de desconto';
        subtitle = 'Produtos selecionados com desconto especial.';
        emptyTitle = 'Nenhum produto com 40% agora';
        metaDescription = 'Produtos com 40% de desconto e entrega em Cuiabá e Várzea Grande.';
      } else if (requestedMode === 'ate-5') {
        products = state.products
          .filter(isAvailable)
          .filter(product => {
            const price = Number(productDisplayPricing(product).effective || 0);
            return price > 0 && price <= 5;
          })
          .sort((a, b) => Number(productDisplayPricing(a).effective || 0) - Number(productDisplayPricing(b).effective || 0) || a.name.localeCompare(b.name, 'pt-BR'));
        title = 'Até 5 reais';
        subtitle = 'Produtos econômicos por até R$ 5,00.';
        emptyTitle = 'Nenhum produto de até R$ 5 agora';
        metaDescription = 'Produtos por até cinco reais com entrega em Cuiabá e Várzea Grande.';
      }

      app.innerHTML = `<div class="container">${pageHeader(title, subtitle, '#/')}${bannerSlotHtml('ofertas.topo', { kind: 'section' })}${products.length ? `<div class="product-grid">${products.map(product => productCard(product)).join('')}</div>` : `<div class="empty"><strong>${escapeHtml(emptyTitle)}</strong>Volte mais tarde ou navegue pelas categorias.</div>`}</div>`;
      setActiveNav('ofertas');
      updateMeta(`${title} - Dona Antônia`, metaDescription, `/?secao=${encodeURIComponent(requestedMode || 'ofertas')}`);
    }'''
          offers_pattern = re.compile(r'    function renderOffers\(\) \{.*?\n    \}\n\n    function renderRoutine', re.S)
          if offers_pattern.search(content):
              content = offers_pattern.sub(new_render_offers + '\n\n    function renderRoutine', content, count=1)
          elif 'const requestedMode = String(mode ||' not in content:
              raise SystemExit('Função de ofertas não encontrada.')

          old_router = "      if (parts[0] === 'ofertas') return renderOffers();"
          new_router = "      if (parts[0] === 'ofertas') return renderOffers(parts[1] || '');"
          if old_router in content:
              content = content.replace(old_router, new_router, 1)
          elif new_router not in content:
              raise SystemExit('Rota de ofertas não encontrada.')

          # Retira somente a prateleira Ofertas de hoje da página inicial.
          content = content.replace('        const offers=getTopOffers(20);\n', '', 1)
          content = content.replace('          ${daHomeOfferShelfHtml(offers)}\n', '', 1)

          # Remove uma eventual versão parcial do estilo anterior e aplica o estilo final.
          content = re.sub(r'\n\s*<style id="daCategoriesPackaging20260724">.*?</style>\s*\n', '\n', content, flags=re.S)
          content = re.sub(r'\n\s*<style id="daHomeDealsPackaging20260724">.*?</style>\s*\n', '\n', content, flags=re.S)
          style = r'''
  <style id="daHomeDealsPackaging20260724">
    .home-clean.da-home-funnel [data-home-secondary-slot] .category-section {
      margin-top: clamp(56px, 6.5vw, 84px) !important;
    }
    .product-packaging {
      display: block;
      min-width: 0;
      margin: 0;
      color: #173b63;
      font-size: 11px;
      line-height: 1.2;
      font-weight: 400;
      letter-spacing: .01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .home-deal-grid {
      display: grid !important;
      grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
      gap: 14px !important;
      margin-top: 18px;
    }
    .home-deal-grid .home-deal-card {
      min-height: 122px !important;
      grid-template-columns: minmax(0, 1fr) 88px !important;
      padding: 17px !important;
      border: 0 !important;
      color: #fff !important;
      box-shadow: 0 14px 30px rgba(20, 35, 27, .12) !important;
    }
    .home-deal-grid .home-deal-card strong {
      color: #fff !important;
      font-size: 17px !important;
      line-height: 1.08 !important;
      font-weight: 900 !important;
    }
    .home-deal-grid .home-deal-card span {
      color: rgba(255, 255, 255, .88) !important;
      font-size: 12px !important;
    }
    .home-deal-grid .deal-50 { background: linear-gradient(135deg, #a61b35, #e5484d) !important; }
    .home-deal-grid .deal-40 { background: linear-gradient(135deg, #173b63, #2f6fb0) !important; }
    .home-deal-grid .deal-5 { background: linear-gradient(135deg, #146c43, #26a269) !important; }
    .home-deal-grid .home-deal-product-img {
      display: block !important;
      width: 88px !important;
      height: 88px !important;
      padding: 7px !important;
      border-radius: 20px !important;
      object-fit: contain !important;
      background: #fff !important;
      mix-blend-mode: normal !important;
      filter: none !important;
    }
    @media (max-width: 767px) {
      .home-clean.da-home-funnel [data-home-secondary-slot] .category-section {
        margin-top: 44px !important;
      }
      .product-packaging { font-size: 10.5px; }
      .home-deal-grid {
        grid-template-columns: 1fr !important;
        gap: 11px !important;
      }
      .home-deal-grid .home-deal-card {
        min-height: 108px !important;
        grid-template-columns: minmax(0, 1fr) 82px !important;
        padding: 14px 15px !important;
      }
      .home-deal-grid .home-deal-product-img {
        display: block !important;
        width: 82px !important;
        height: 82px !important;
        border-radius: 18px !important;
      }
    }
  </style>
'''
          if '</head>' not in content:
              raise SystemExit('Fechamento do head não encontrado.')
          content = content.replace('</head>', style + '</head>', 1)

          path.write_text(content, encoding='utf-8')
          PY

          rm -f .github/workflows/adjust-home-cards.yml
          rm -f .github/workflows/ajuste-categorias-embalagem-20260724.yml

      - name: Validar alterações
        shell: bash
        run: |
          grep -q 'home-quick-grid home-deal-grid' index.html
          grep -q 'product-packaging' index.html
          grep -q "renderOffers(parts\[1\] || '')" index.html
          if grep -q '\${daHomeOfferShelfHtml(offers)}' index.html; then
            echo 'A seção Ofertas de hoje ainda está na home.' >&2
            exit 1
          fi

      - name: Publicar alteração
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html .github/workflows/adjust-home-cards.yml .github/workflows/ajuste-categorias-embalagem-20260724.yml
          git commit -m 'Atualiza atalhos e apresentação dos produtos na home'
          for tentativa in 1 2 3 4 5; do
            if git push origin main; then
              exit 0
            fi
            git pull --rebase origin main
          done
          echo 'Não foi possível publicar após cinco tentativas.' >&2
          exit 1
