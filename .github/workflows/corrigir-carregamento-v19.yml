name: Corrigir carregamento imediato v19

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/corrigir-carregamento-v19.mjs
      - .github/workflows/corrigir-carregamento-v19.yml

permissions:
  contents: write

concurrency:
  group: corrigir-carregamento-v19
  cancel-in-progress: true

jobs:
  corrigir:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Aplicar correção
        run: node scripts/corrigir-carregamento-v19.mjs

      - name: Validar arquivos
        shell: bash
        run: |
          set -euo pipefail
          grep -q "2026-07-21-carregamento-imediato-v19" index.html
          grep -q "compact-cache-fast" index.html
          grep -q "data-fallback-images" index.html
          grep -q '"version": "2026-07-21-carregamento-imediato-v19"' site/app-version.json
          ! grep -q "clearSavedCatalogAndCart();" <(sed -n '/function enforceAppVersion/,/function purgeBrowserRuntimeCaches/p' index.html)

      - name: Publicar correção e remover instalador temporário
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/corrigir-carregamento-v19.mjs .github/workflows/corrigir-carregamento-v19.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A index.html site/app-version.json scripts/corrigir-carregamento-v19.mjs .github/workflows/corrigir-carregamento-v19.yml
          git commit -m "Corrige lentidão e fallback de imagens dos kits"
          git push origin HEAD:main
