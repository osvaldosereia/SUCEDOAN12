name: Instalar Compra Rapida no admin de producao

on:
  push:
    branches: [main]
    paths:
      - .github/mover-compra-rapida-producao.trigger

permissions:
  contents: write

jobs:
  instalar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Montar modulo e ajustar admins
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          base64 -d .github/tmp/compra-rapida-admin.js.gz.b64 | gzip -d > producao/compra-rapida-admin.js
          node --check producao/compra-rapida-admin.js

          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('producao/index.html')
          text = path.read_text(encoding='utf-8')
          text = re.sub(r'<title>.*?</title>', '<title>Dona Antônia — Admin completo</title>', text, count=1, flags=re.S)
          text = re.sub(r'\s*<link[^>]+href=["\']compra-rapida-admin\.css[^>]*>\s*', '\n', text, flags=re.I)
          text = re.sub(r'\s*<script[^>]+src=["\']compra-rapida-admin\.js[^>]*>\s*</script>\s*', '\n', text, flags=re.I)
          text = text.replace('</head>', '  <link rel="stylesheet" href="compra-rapida-admin.css?v=2026-07-18-producao-v2">\n</head>', 1)
          text = text.replace('</body>', '  <script src="compra-rapida-admin.js?v=2026-07-18-producao-v2"></script>\n</body>', 1)
          path.write_text(text, encoding='utf-8')
          PY

          python - <<'PY'
          from pathlib import Path
          import urllib.request, json, base64, os

          url = 'https://api.github.com/repos/osvaldosereia/SUCEDOAN12/git/blobs/670c69dd373698224f61916c7b1772cb20fbd0f1'
          request = urllib.request.Request(url, headers={
              'Accept': 'application/vnd.github+json',
              'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
              'X-GitHub-Api-Version': '2022-11-28'
          })
          with urllib.request.urlopen(request) as response:
              payload = json.load(response)
          Path('produtos/index.html').write_bytes(base64.b64decode(payload['content']))
          PY

          grep -q 'data-tab="compra-rapida"' producao/compra-rapida-admin.js
          grep -q 'compra-rapida-admin.js?v=2026-07-18-producao-v2' producao/index.html
          grep -q 'XML > CSV RÁPIDO' produtos/index.html

      - name: Publicar integracao final
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/mover-compra-rapida-producao.trigger .github/tmp/compra-rapida-admin.js.gz.b64 .github/workflows/mover-compra-rapida-producao.yml
          git add producao/index.html producao/compra-rapida-admin.js producao/compra-rapida-admin.css produtos/index.html
          git commit -m "Mover Compra Rápida para o admin de produção"
          git push
