name: Expand app-next modular preview

on:
  push:
    branches:
      - agent/refatoracao-index-modular
    paths:
      - app-next/.package/**
      - .github/workflows/expand-app-next.yml

permissions:
  contents: write

jobs:
  expand-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Rebuild validated source package
        shell: bash
        run: |
          set -euo pipefail
          cat app-next/.package/part-*.b64 > /tmp/app-next-source.b64
          echo "28c00500690d7774dea080ba8eace7b4bb6026247bdf59ffb02dd0a5583b981a  /tmp/app-next-source.b64" | sha256sum -c -
          base64 --decode /tmp/app-next-source.b64 > /tmp/app-next-source.tar.xz
          echo "acf85c3afc042ee0dfcf11b58fe106482fc0d2fa34ca42e8d0af93cbd03472dd  /tmp/app-next-source.tar.xz" | sha256sum -c -
          tar -xJf /tmp/app-next-source.tar.xz -C app-next

      - name: Run modular tests
        shell: bash
        run: |
          set -euo pipefail
          cd app-next
          npm test
          npm run check

      - name: Commit expanded preview
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app-next/src app-next/styles app-next/tests
          if git diff --cached --quiet; then
            echo "Preview already expanded."
            exit 0
          fi
          git commit -m "Expande e valida aplicação modular paralela"
          git push origin HEAD:agent/refatoracao-index-modular
