name: Sincronizar Firebase para Bling

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run apenas confere; production envia alterações ao Bling"
        required: true
        default: dry-run
        type: choice
        options: [dry-run, production]
      max_products:
        description: "0 envia todos; use 1 no primeiro teste em production"
        required: false
        default: "0"
        type: string
      sync_stock:
        description: "yes confere o Firebase e ajusta somente o saldo fisico do deposito Geral"
        required: true
        default: "no"
        type: choice
        options: ['no', 'yes']
  repository_dispatch:
    types: [bling-sync]

permissions:
  contents: write

concurrency:
  group: bling-product-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
      BLING_CLIENT_ID: ${{ secrets.BLING_CLIENT_ID }}
      BLING_CLIENT_SECRET: ${{ secrets.BLING_CLIENT_SECRET }}
      BLING_REFRESH_TOKEN: ${{ secrets.BLING_REFRESH_TOKEN }}
      SYNC_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || github.event.client_payload.mode || 'dry-run' }}
      MAX_PRODUCTS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_products || github.event.client_payload.max_products || '0' }}
      SYNC_STOCK: ${{ github.event_name == 'workflow_dispatch' && inputs.sync_stock || github.event.client_payload.sync_stock || 'no' }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Sincronizar produtos
        id: sync
        env:
          BLING_REFRESH_TOKEN_FILE: ${{ runner.temp }}/bling-refresh-token
        run: |
          if [ "$SYNC_MODE" = "production" ]; then
            node scripts/sincronizar-bling.mjs --apply --state .automation/bling-sync-state.json
          else
            node scripts/sincronizar-bling.mjs --state .automation/bling-sync-state.json
          fi

      - name: Atualizar refresh token do Bling
        if: always() && env.SYNC_MODE == 'production'
        env:
          GH_TOKEN: ${{ secrets.GH_SECRETS_TOKEN }}
          BLING_REFRESH_TOKEN_FILE: ${{ runner.temp }}/bling-refresh-token
        run: |
          if [ ! -s "$BLING_REFRESH_TOKEN_FILE" ]; then exit 0; fi
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Configure a secret GH_SECRETS_TOKEN para guardar o refresh token renovado."
            exit 1
          fi
          gh secret set BLING_REFRESH_TOKEN --repo "$GITHUB_REPOSITORY" --body "$(cat "$BLING_REFRESH_TOKEN_FILE")"

      - name: Guardar estado da sincronização
        if: success() && env.SYNC_MODE == 'production'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .automation/bling-sync-state.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "chore: atualiza estado da sincronização Bling"
          git pull --rebase origin main
          git push

      - name: Publicar relatório da execução
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-bling-${{ github.run_id }}
          path: bling-sync-report.json
          if-no-files-found: ignore
