name: Apply app-next parity fixes

on:
  push:
    branches:
      - agent/refatoracao-index-modular
    paths:
      - 'app-next/.patch/parity.patch.gz'
      - '.github/workflows/app-next-apply-parity.yml'

permissions:
  contents: write

jobs:
  apply-test-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Verify and apply parity patch
        shell: bash
        run: |
          set -euo pipefail
          echo "673c28f3bf86242691d380767c27529b7938b53f1c4bb25723fce6abd779c48c  app-next/.patch/parity.patch.gz" | sha256sum -c -
          gunzip -c app-next/.patch/parity.patch.gz > /tmp/parity.patch
          echo "3fbb5d18535d1ca9b03a06e7b2ac4899620f92ede434bb0fd509eed2e1f8b777  /tmp/parity.patch" | sha256sum -c -
          cd app-next
          git apply --check /tmp/parity.patch
          git apply /tmp/parity.patch

      - name: Run complete modular tests
        shell: bash
        run: |
          set -euo pipefail
          cd app-next
          npm test
          npm run check

      - name: Commit validated parity fixes
        shell: bash
        run: |
          set -euo pipefail
          rm -f app-next/.patch/parity.patch.gz
          rmdir app-next/.patch 2>/dev/null || true
          rm -f .github/workflows/app-next-apply-parity.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Corrige paridade funcional da homologação modular"
          git push origin HEAD:agent/refatoracao-index-modular
