name: Remover seção Aqui Tem

on:
  push:
    paths:
      - '.github/workflows/remove-aqui-tem.yml'

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remover seção Aqui Tem do index raiz
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          content = path.read_text(encoding='utf-8')
          old = "slot.innerHTML=`${daHomeHereTemHtml()}${categoryButtonsHtml()}`;"
          new = "slot.innerHTML=`${categoryButtonsHtml()}`;"
          occurrences = content.count(old)
          if occurrences != 1:
              raise SystemExit(f'Esperava 1 ocorrência, encontrei {occurrences}. Nenhuma alteração foi publicada.')
          path.write_text(content.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Publicar alteração
        shell: bash
        run: |
          if git diff --quiet -- index.html; then
            echo 'Nenhuma alteração necessária.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Remove seção Aqui Tem da página inicial'
          git push
