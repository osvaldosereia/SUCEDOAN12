name: Banner inteligente V13.1 híbrido

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Apenas escolher posição e oferta, sem chamar o Make
        required: true
        default: true
        type: boolean
  repository_dispatch:
    types: [criar_banner_inteligente]

concurrency:
  group: banner-inteligente-v13-1
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  selecionar-e-enviar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MAKE_BANNER_WEBHOOK_URL: ${{ secrets.MAKE_BANNER_WEBHOOK_URL }}
      FIREBASE_PRODUTOS_URL: https://cedar-chemist-310801-default-rtdb.firebaseio.com/produtos.json
      BANNERS_PATH: site/banners/banners.json
      KITS_PATH: site/kits.json
      CESTAS_PATH: site/produtos-cesta-basica.json
      REQUEST_ID: ${{ github.event.client_payload.requisicao_id || github.run_id }}
      DRY_RUN: ${{ inputs.dry_run || github.event.client_payload.dry_run || 'false' }}

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v7

      - name: Escolher posição e oferta e enviar ao Make
        run: node scripts/banner-intelligence-v13.1.mjs
