name: Ajustar banners, Aqui Tem e cache

on:
  pull_request:
    branches: [main]
    paths:
      - index.html
      - scripts/patch-storefront-banners-cache.mjs
      - scripts/build-fast-home-test.mjs
      - .github/workflows/patch-storefront-banners-cache.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: storefront-banners-cache-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  patch-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 1
          persist-credentials: true

      - name: Validar sintaxe do patch
        run: node --check scripts/patch-storefront-banners-cache.mjs

      - name: Aplicar ajustes no index
        run: node scripts/patch-storefront-banners-cache.mjs

      - name: Validar estrutura final
        shell: bash
        run: |
          test -s index.html
          grep -q 'DA_STOREFRONT_BANNERS_CACHE_V10' index.html
          grep -q 'banners-pos-quarto-cache-v10' index.html
          grep -q 'cdn.jsdelivr.net/gh/osvaldosereia/SUCEDOAN12@main/' index.html
          grep -q "slice(0,4)" index.html
          grep -q "slice(0,4).map" index.html
          grep -q 'da-home-here-item:nth-child(n+7)' index.html
          grep -q 'grid-template-columns:repeat(6' index.html
          grep -q "renderHome=function" index.html
          ! grep -A12 'renderHome=function' index.html | grep -q "home.hero"
          grep -q '<meta name="robots" content="index, follow">' index.html
          bytes=$(wc -c < index.html)
          test "$bytes" -lt 720000
          echo "Index final: $bytes bytes"

      - name: Salvar index atualizado na branch
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          git add index.html scripts/build-fast-home-test.mjs
          if git diff --cached --quiet; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Aplicar banners após o quarto item e cache CDN'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
