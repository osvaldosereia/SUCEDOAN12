name: Criar combos automaticos

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:

jobs:
  criar-combos:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Criar combos inteligentes
        run: node scripts/criar-combos.js
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}

      - name: Salvar arquivos de combos no GitHub
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          echo "Arquivos alterados:"
          git status --short

          if [ -f "site/combo.json" ]; then
            git add site/combo.json
          else
            echo "ERRO: site/combo.json não foi encontrado."
            ls -la site || true
            exit 1
          fi

          if [ -f "site/palavras-combo-usadas.json" ]; then
            git add site/palavras-combo-usadas.json
          fi

          if git diff --cached --quiet; then
            echo "Nenhuma alteração para salvar."
          else
            git commit -m "Atualiza combos automaticos"
            git push
          fi
