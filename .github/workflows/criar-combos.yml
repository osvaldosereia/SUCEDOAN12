name: Criar combos automaticos

on:
  workflow_dispatch:
  schedule:
    - cron: "7 8,11,14,17 * * *"
      timezone: "America/Cuiaba"

permissions:
  contents: write

concurrency:
  group: criar-combos-automaticos
  cancel-in-progress: false

jobs:
  criar-combos:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Atualizar repositorio antes de criar combo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase origin "${GITHUB_REF_NAME}"

      - name: Mostrar horario da execucao
        run: |
          echo "Horario UTC:"
          date -u
          echo "Horario Cuiaba:"
          TZ="America/Cuiaba" date

      - name: Criar combos inteligentes
        run: node scripts/criar-combos.js
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}

      - name: Salvar combo.json no GitHub
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add site/combo.json

          if git diff --cached --quiet; then
            echo "Nenhuma alteracao no combo.json para salvar."
            exit 0
          fi

          git commit -m "Atualiza combos automaticos"
          git push
