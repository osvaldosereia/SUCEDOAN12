name: Criar combos automaticos

on:
  workflow_dispatch:
  schedule:
    - cron: "2/5 * * * *"

permissions:
  contents: write

jobs:
  criar-combos:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Diagnostico
        run: |
          echo "Evento: ${{ github.event_name }}"
          echo "Schedule: ${{ github.event.schedule }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Data UTC:"
          date -u

      - name: Criar combos inteligentes
        run: node scripts/criar-combos.js
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}

      - name: Salvar combo.json no GitHub
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add site/combo.json
          git diff --cached --quiet || git commit -m "Atualiza combos automaticos"
          git push
