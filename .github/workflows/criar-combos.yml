name: Criar combos automaticos

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  criar-combos:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Criar combos inteligentes
        run: node scripts/criar-combos.js
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}

      - name: Salvar combo.json no GitHub
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add combo.json

          if git diff --cached --quiet; then
            echo "Nenhuma alteração para salvar."
          else
            git commit -m "Atualiza combos automaticos"
            git push
          fi
