name: Expand app-next parity files

on:
  push:
    branches:
      - agent/refatoracao-index-modular
    paths:
      - 'app-next/.package/parity-files.tar.gz'
      - '.github/workflows/app-next-expand-parity.yml'

permissions:
  contents: write

jobs:
  expand-test-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Verify and expand parity package
        shell: bash
        run: |
          set -euo pipefail
          echo "6ae8f1fec9a0553f80dff42cd9ea0bc44c8dd02d94096316051f6e8e59ebe142  app-next/.package/parity-files.tar.gz" | sha256sum -c -
          tar -xzf app-next/.package/parity-files.tar.gz -C app-next

      - name: Run complete modular tests
        shell: bash
        run: |
          set -euo pipefail
          cd app-next
          npm test
          npm run check

      - name: Commit validated parity files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app-next/src app-next/tests
          if git diff --cached --quiet; then
            echo "Parity files already current."
            exit 0
          fi
          git commit -m "Corrige paridade funcional da homologação modular"
          git push origin HEAD:agent/refatoracao-index-modular
