name: Sincronizar catálogos de produtos com Firebase
run-name: Catálogos oficiais · ${{ github.event_name }}

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sincronizar_produtos_home]
  schedule:
    - cron: "*/5 * * * *"
  push:
    branches: [main]
    paths:
      - ".github/workflows/sincronizar-produtos-home-firebase.yml"
      - "scripts/sincronizar-produtos-home-firebase.mjs"
      - "scripts/corrigir-sincronizacao-catalogos.mjs"
      - "producao/catalog-sync-admin.js"
      - "producao/nfe-import.js"

permissions:
  contents: write

concurrency:
  group: sincronizar-catalogos-produtos-firebase
  cancel-in-progress: true

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Baixar somente os arquivos necessários
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            index.html
            producao/index.html
            site/app-version.json
            site/produtos-home.json
            site/produtos.json
            scripts/corrigir-sincronizacao-catalogos.mjs
            scripts/sincronizar-produtos-home-firebase.mjs

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Corrigir leitura e publicar catálogos oficiais
        shell: bash
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_AUTH_TOKEN: ${{ secrets.FIREBASE_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          tracked_files=(index.html producao/index.html site/app-version.json site/produtos-home.json site/produtos.json)

          for attempt in 1 2 3 4; do
            echo "Tentativa ${attempt}: atualizando a base e lendo o Firebase..."
            git fetch --depth=1 origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"

            node scripts/corrigir-sincronizacao-catalogos.mjs
            node scripts/sincronizar-produtos-home-firebase.mjs

            if git diff --quiet -- "${tracked_files[@]}"; then
              echo "A leitura e os catálogos já estão sincronizados com o Firebase."
              exit 0
            fi

            git add -- "${tracked_files[@]}"
            git commit -m "Unifica leitura e catálogos de produtos com o Firebase"

            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Correções e catálogos publicados com sucesso."
              exit 0
            fi

            echo "O repositório mudou durante a publicação; repetindo com a versão mais recente."
            sleep $((attempt * 3))
          done

          echo "Não foi possível publicar as correções após quatro tentativas."
          exit 1
