name: Sincronizar catálogos de produtos com Firebase

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sincronizar_produtos_home]
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: sincronizar-catalogos-produtos-firebase
  cancel-in-progress: true

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Gerar e publicar catálogos oficiais
        shell: bash
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_AUTH_TOKEN: ${{ secrets.FIREBASE_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4; do
            echo "Tentativa ${attempt}: atualizando a base e lendo o Firebase..."
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"

            node scripts/sincronizar-produtos-home-firebase.mjs

            if git diff --quiet -- site/produtos-home.json site/produtos.json; then
              echo "Os catálogos já estão sincronizados com o Firebase."
              exit 0
            fi

            git add site/produtos-home.json site/produtos.json
            git commit -m "Sincroniza catálogos de produtos diretamente do Firebase"

            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Catálogos publicados com sucesso."
              exit 0
            fi

            echo "O repositório mudou durante a publicação; repetindo com a versão mais recente."
            sleep $((attempt * 3))
          done

          echo "Não foi possível publicar os catálogos após quatro tentativas."
          exit 1
