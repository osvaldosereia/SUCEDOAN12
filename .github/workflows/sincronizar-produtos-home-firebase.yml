name: Sincronizar produtos-home com Firebase
run-name: Produtos-home oficial · ${{ github.event_name }}

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sincronizar_produtos_home]
  schedule:
    - cron: "*/5 * * * *"
  push:
    branches: [main]
    paths:
      - ".github/workflows/sincronizar-produtos-home-firebase.yml"
      - "scripts/sincronizar-produtos-home-firebase.mjs"

permissions:
  contents: write

concurrency:
  group: sincronizar-produtos-home-firebase
  cancel-in-progress: true

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Baixar catálogo leve e sincronizador
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          show-progress: false
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            site/produtos-home.json
            scripts/sincronizar-produtos-home-firebase.mjs

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Gerar catálogo leve diretamente do Firebase
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_AUTH_TOKEN: ${{ secrets.FIREBASE_AUTH_TOKEN }}
        run: node scripts/sincronizar-produtos-home-firebase.mjs

      - name: Publicar somente produtos-home
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/produtos-home.json
          if git diff --cached --quiet; then
            echo "produtos-home já está sincronizado com o Firebase."
            exit 0
          fi
          git commit -m "Sincroniza produtos-home diretamente do Firebase"
          git push origin "HEAD:${GITHUB_REF_NAME}"
