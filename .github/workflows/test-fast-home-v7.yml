name: Testar home ultra leve v7

on:
  pull_request:
    branches: [main]
    paths:
      - index.html
      - scripts/build-fast-home-test.mjs
      - .github/workflows/test-fast-home-v7.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fast-home-v7-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 1
          persist-credentials: true

      - name: Gerar página de teste
        run: node scripts/build-fast-home-test.mjs

      - name: Validar estrutura e segurança
        shell: bash
        run: |
          test -s index.html
          test -s index-pagespeed-test.html
          grep -q 'DA_FAST_HOME_TEST_V7' index-pagespeed-test.html
          grep -q 'fast-home-test-v7' index-pagespeed-test.html
          grep -q 'getTopOffers(20)' index-pagespeed-test.html
          grep -q 'limit:4' index-pagespeed-test.html
          grep -q "max-width:767px" index-pagespeed-test.html
          grep -q "img.loading='eager'" index-pagespeed-test.html
          grep -q "img.fetchPriority='high'" index-pagespeed-test.html
          grep -q "carousel:false" index-pagespeed-test.html
          grep -q 'noindex, nofollow' index-pagespeed-test.html
          ! grep -q 'DA_FAST_HOME_TEST_V7' index.html
          git diff --exit-code -- index.html

      - name: Verificar tamanho e sintaxe básica
        shell: bash
        run: |
          node --check scripts/build-fast-home-test.mjs
          bytes=$(wc -c < index-pagespeed-test.html)
          test "$bytes" -lt 650000
          echo "Página de teste: $bytes bytes"

      - name: Publicar página de teste na branch
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          git add index-pagespeed-test.html
          if git diff --cached --quiet; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Gerar home ultra leve v7 para testes'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
