name: Validar pagina PageSpeed paralela

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - index-pagespeed-test.html
      - scripts/build-pagespeed-test.mjs
      - scripts/audit-index-dead-code.mjs
      - .github/workflows/build-pagespeed-test.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pagespeed-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gerar-e-validar:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Baixar branch de teste
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 1
          persist-credentials: true

      - name: Gerar pagina paralela
        run: node scripts/build-pagespeed-test.mjs

      - name: Auditar duplicacoes e codigo possivelmente inativo
        run: node scripts/audit-index-dead-code.mjs index-pagespeed-test.html pagespeed-code-audit.md

      - name: Validar estabilidade e preservacao do index publico
        shell: bash
        run: |
          test -s index.html
          test -s index-pagespeed-test.html
          test -s pagespeed-code-audit.md
          grep -q 'DA_PAGESPEED_TEST' index-pagespeed-test.html
          grep -q 'pagespeed-test-v5' index-pagespeed-test.html
          grep -q 'window.__DA_PAGESPEED_TEST__ = true' index-pagespeed-test.html
          grep -q 'da-pagespeed-booting' index-pagespeed-test.html
          grep -q "classList.remove('da-pagespeed-booting')" index-pagespeed-test.html
          grep -q 'da-home-profit' index-pagespeed-test.html
          grep -q "const offers=getTopOffers(12)" index-pagespeed-test.html
          grep -q 'aspect-ratio:4/5' index-pagespeed-test.html
          grep -q 'da-home-bottom-safe' index-pagespeed-test.html
          grep -q 'removeFeaturedProductSections' index-pagespeed-test.html
          ! grep -q 'data-home-personalization-slot="chosen"' index-pagespeed-test.html
          ! grep -q 'data-home-personalization-slot="recent"' index-pagespeed-test.html
          ! grep -q 'DA_PAGESPEED_TEST' index.html
          ! grep -q 'http-equiv="Cache-Control"' index-pagespeed-test.html
          ! grep -q 'window.location.replace(versionedLocation(BUILD, true))' index-pagespeed-test.html
          ! grep -q 'startDeploymentVersionWatch();' index-pagespeed-test.html
          git diff --exit-code -- index.html

      - name: Salvar pagina e auditoria na branch de teste
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          git add index-pagespeed-test.html pagespeed-code-audit.md
          if git diff --cached --quiet; then
            echo 'Pagina e auditoria ja estao atualizadas.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Gerar home PageSpeed v5 sem destaques e com rodape seguro'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
