name: Aplicar correcao do carregamento do admin

on:
  push:
    paths:
      - .github/workflows/aplicar-correcao-admin-firebase.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aplicar-correcao-admin-firebase
  cancel-in-progress: false

jobs:
  corrigir-admin:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Aplicar, validar e publicar
        shell: bash
        run: |
          set -euo pipefail
          branch="${GITHUB_REF_NAME:-main}"
          expected_before="39c59ce8f4ef21ffd514fd66c861a259c106c990"
          expected_after="757738add107ce44e4946b985d339ca507445854"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for tentativa in 1 2 3 4 5; do
            echo "Tentativa ${tentativa} de 5"
            git fetch origin "$branch"
            git reset --hard "origin/${branch}"

            current="$(git hash-object producao/index.html)"
            if [[ "$current" != "$expected_before" && "$current" != "$expected_after" ]]; then
              echo "producao/index.html mudou depois da analise. SHA atual: $current" >&2
              exit 1
            fi

            if [[ "$current" == "$expected_before" ]]; then
              python3 scripts/maintenance/admin-clean-round1.py
              python3 scripts/maintenance/admin-clean-round2.py
            else
              echo "A correcao ja esta aplicada; apenas removendo os arquivos temporarios."
            fi

            result="$(git hash-object producao/index.html)"
            if [[ "$result" != "$expected_after" ]]; then
              echo "O resultado nao corresponde ao arquivo validado. SHA obtido: $result" >&2
              exit 1
            fi

            python3 - <<'PY'
          from pathlib import Path
          import re
          import subprocess
          import tempfile

          html = Path("producao/index.html").read_text(encoding="utf-8")
          scripts = re.findall(r"<script(?:\s[^>]*)?>([\s\S]*?)</script>", html, re.I)
          with tempfile.TemporaryDirectory() as directory:
              for index, content in enumerate(scripts, 1):
                  path = Path(directory) / f"inline-{index}.js"
                  path.write_text(content, encoding="utf-8")
                  subprocess.run(["node", "--check", str(path)], check=True)

          if len(re.findall(r"\basync\s+function\s+loadData\s*\(", html)) != 1:
              raise SystemExit("O admin precisa ter exatamente uma implementacao de loadData.")
          for obsolete in (
              "const originalLoadData=loadData",
              "const daV6LoadDataBase = loadData",
              "const daLoadDataWithQueueBase=loadData",
              "const daOfferLoadDataBase=loadData",
          ):
              if obsolete in html:
                  raise SystemExit(f"Wrapper antigo ainda presente: {obsolete}")
          print("Validacao concluida: scripts validos e um unico carregador de dados.")
          PY

            git diff --check
            git add producao/index.html
            git rm -f \
              scripts/maintenance/admin-clean-round1.py \
              scripts/maintenance/admin-clean-round2.py \
              .github/workflows/aplicar-correcao-admin-firebase.yml

            if git diff --cached --quiet; then
              echo "Nenhuma alteracao pendente."
              exit 0
            fi

            git commit -m "Corrige carregamento automatico do Firebase no admin"
            if git push origin "HEAD:${branch}"; then
              echo "Correcao publicada e arquivos temporarios removidos."
              exit 0
            fi

            echo "A branch recebeu outro commit. Reaplicando sobre a versao mais recente."
            sleep $((tentativa * 3))
          done

          echo "Nao foi possivel publicar depois de 5 tentativas." >&2
          exit 1
