name: Restaurar e corrigir carregamento do admin

on:
  push:
    paths:
      - .github/workflows/aplicar-correcao-admin-firebase-segura.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aplicar-correcao-admin-firebase-segura
  cancel-in-progress: false

jobs:
  corrigir:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Aplicar correção mínima e publicar
        shell: bash
        run: |
          set -euo pipefail
          branch="${GITHUB_REF_NAME:-main}"
          expected_before="39c59ce8f4ef21ffd514fd66c861a259c106c990"
          expected_after="8057d575cc9797c9f65219233b65efb9c5703ce0"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for tentativa in 1 2 3 4 5; do
            git fetch origin "$branch"
            git reset --hard "origin/${branch}"

            current="$(git hash-object producao/index.html)"
            if [[ "$current" != "$expected_before" && "$current" != "$expected_after" ]]; then
              echo "O admin mudou depois da análise. SHA atual: $current" >&2
              exit 1
            fi

            if [[ "$current" == "$expected_before" ]]; then
              python3 scripts/maintenance/admin-firebase-safe-fix.py
            fi

            result="$(git hash-object producao/index.html)"
            if [[ "$result" != "$expected_after" ]]; then
              echo "Resultado inesperado: $result" >&2
              exit 1
            fi

            git diff --check
            git add producao/index.html
            git rm -f scripts/maintenance/admin-firebase-safe-fix.py .github/workflows/aplicar-correcao-admin-firebase-segura.yml

            if git diff --cached --quiet; then
              exit 0
            fi

            git commit -m "Corrige Firebase preservando todas as abas do admin"
            if git push origin "HEAD:${branch}"; then
              echo "Admin restaurado e correção mínima publicada."
              exit 0
            fi

            sleep $((tentativa * 3))
          done

          echo "Não foi possível publicar após cinco tentativas." >&2
          exit 1
