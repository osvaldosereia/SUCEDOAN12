name: Aplicar correção da galeria de imagens v19

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/corrigir-galeria-imagens-v19.mjs
      - .github/workflows/aplicar-correcao-galeria-imagens-v19.yml

permissions:
  contents: write

concurrency:
  group: corrigir-galeria-imagens-v19
  cancel-in-progress: true

jobs:
  corrigir:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          show-progress: false

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Aplicar correção isolada
        run: node scripts/corrigir-galeria-imagens-v19.mjs

      - name: Validar resultado
        shell: bash
        run: |
          set -euo pipefail
          grep -q "2026-07-21-imagens-unicas-v19" index.html
          grep -q "const logicalKey" index.html
          grep -q "assetCandidates(current).forEach(add)" index.html
          grep -q "Remove fotos repetidas" site/app-version.json

      - name: Publicar correção
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html site/app-version.json
          if git diff --cached --quiet; then
            echo "A correção já está aplicada."
            exit 0
          fi
          git commit -m "Corrige fotos repetidas e fallback das imagens"
          git push origin "HEAD:${GITHUB_REF_NAME}"
