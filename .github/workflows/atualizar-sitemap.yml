name: Atualizar sitemap SEO local

on:
  workflow_dispatch:
  schedule:
    - cron: '15 7 * * *'

permissions:
  contents: write

jobs:
  gerar-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Gerar sitemap.xml e robots.txt
        run: node scripts/gerar-sitemap.js
        env:
          SITE_URL: https://www.donaantonia.com.br
          FIREBASE_URL: https://cedar-chemist-310801-default-rtdb.firebaseio.com/produtos.json

      - name: Publicar alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml robots.txt
          git diff --cached --quiet || git commit -m "Atualiza sitemap SEO local"
          git push
