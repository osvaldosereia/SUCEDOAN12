name: Ajustar categorias e embalagem

on:
  push:
    paths:
      - '.github/workflows/ajuste-categorias-embalagem-20260724.yml'

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Atualizar versão mais recente
        run: git pull --rebase origin main

      - name: Ajustar página inicial e cards
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          content = path.read_text(encoding='utf-8')

          old_markup = '''          <div class="product-body">
            <a class="product-name" href="#/produto/${route}" title="${escapeHtml(p.name)}">${escapeHtml(cardName)}</a>'''
          new_markup = '''          <div class="product-body">
            ${p.embalagem ? `<div class="product-packaging" aria-label="Embalagem do produto" title="${escapeHtml(p.embalagem)}">${escapeHtml(p.embalagem)}</div>` : ''}
            <a class="product-name" href="#/produto/${route}" title="${escapeHtml(p.name)}">${escapeHtml(cardName)}</a>'''

          if old_markup in content:
              content = content.replace(old_markup, new_markup, 1)
          elif new_markup not in content:
              raise SystemExit('Bloco do card de produto não encontrado; nenhuma alteração foi publicada.')

          style_id = 'daCategoriesPackaging20260724'
          style = '''
  <style id="daCategoriesPackaging20260724">
    .home-clean.da-home-funnel [data-home-secondary-slot] .category-section {
      margin-top: clamp(56px, 6.5vw, 84px) !important;
    }
    .product-packaging {
      display: block;
      min-width: 0;
      margin: 0;
      color: #173b63;
      font-size: 11px;
      line-height: 1.2;
      font-weight: 400;
      letter-spacing: .01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    @media (max-width: 767px) {
      .home-clean.da-home-funnel [data-home-secondary-slot] .category-section {
        margin-top: 44px !important;
      }
      .product-packaging {
        font-size: 10.5px;
      }
    }
  </style>
'''
          if f'id="{style_id}"' not in content:
              if '</head>' not in content:
                  raise SystemExit('Fechamento do head não encontrado; nenhuma alteração foi publicada.')
              content = content.replace('</head>', style + '</head>', 1)

          path.write_text(content, encoding='utf-8')
          PY

          rm -f .github/workflows/ajuste-categorias-embalagem-20260724.yml

      - name: Publicar alteração
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html .github/workflows/ajuste-categorias-embalagem-20260724.yml
          git commit -m 'Ajusta respiro de categorias e exibe embalagem nos cards'
          for tentativa in 1 2 3 4 5; do
            if git push origin main; then
              exit 0
            fi
            git pull --rebase origin main
          done
          echo 'Não foi possível publicar após 5 tentativas.' >&2
          exit 1
