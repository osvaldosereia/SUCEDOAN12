name: Atualizar admin para produtos-home

on:
  push:
    branches: [main]
    paths:
      - scripts/atualizar-admin-produtos-home.mjs
      - .github/workflows/atualizar-admin-produtos-home.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: atualizar-admin-produtos-home
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Aplicar alteração no admin
        run: node scripts/atualizar-admin-produtos-home.mjs

      - name: Validar que produtos.json inativo não será publicado
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'function productsHomeObject' producao/index.html
          grep -q 'site/produtos-home.json' producao/index.html
          if grep -q 'saveGithubFiles({produtos:productsObject()' producao/index.html; then
            echo 'O admin ainda tenta publicar o produtos.json inativo.' >&2
            exit 1
          fi

      - name: Publicar admin atualizado
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- producao/index.html; then
            echo 'Admin já está atualizado.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add producao/index.html
          git commit -m 'Atualiza admin para publicar produtos-home do Firebase'
          git push
