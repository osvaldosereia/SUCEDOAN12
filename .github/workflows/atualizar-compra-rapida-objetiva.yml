name: Atualizar Compra Rapida Objetiva
on:
  push:
    paths:
      - '.github/compra-rapida-objetiva.trigger'
permissions:
  contents: write
jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Atualizar referência e versão
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          import re
          s=re.sub(r'site/compra-rapida\.js\?v=[^"\']+', 'site/compra-rapida.js?v=2026-07-18-objetiva-v3', s)
          s=s.replace('2026-07-18-compra-rapida-multiplos-v2','2026-07-18-compra-rapida-objetiva-v3')
          p.write_text(s,encoding='utf-8')
          PY
          rm -f .github/workflows/atualizar-compra-rapida-objetiva.yml .github/compra-rapida-objetiva.trigger
      - name: Publicar
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Ativar Compra Rápida objetiva no site" || exit 0
          git push