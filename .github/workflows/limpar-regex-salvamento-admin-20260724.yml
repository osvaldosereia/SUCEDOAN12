name: Limpar regex do salvamento do admin

on:
  push:
    paths:
      - '.github/workflows/limpar-regex-salvamento-admin-20260724.yml'

permissions:
  contents: write

jobs:
  limpar-regex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Atualizar base
        run: git pull --rebase origin main

      - name: Remover caractere de controle
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('producao/index.html')
          content = path.read_text(encoding='utf-8')
          bad = 'const retryable=/GitHub PUT .*: (409|422)' + chr(8) + '/.test'
          good = 'const retryable=/GitHub PUT .*: (409|422)/.test'
          if bad not in content:
              raise SystemExit('Caractere de controle esperado não encontrado; nenhuma alteração publicada.')
          content = content.replace(bad, good, 1)
          if chr(8) in content:
              raise SystemExit('Ainda existe caractere de controle no index.')
          path.write_text(content, encoding='utf-8')
          PY

          grep -q 'const retryable=/GitHub PUT .*: (409|422)/.test' producao/index.html
          rm -f .github/workflows/limpar-regex-salvamento-admin-20260724.yml

      - name: Publicar limpeza
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add producao/index.html .github/workflows/limpar-regex-salvamento-admin-20260724.yml
          git commit -m 'Finaliza repetição segura de conflitos no salvamento'
          for tentativa in 1 2 3 4 5; do
            if git push origin main; then
              exit 0
            fi
            git pull --rebase origin main
          done
          echo 'Não foi possível publicar a limpeza após cinco tentativas.' >&2
          exit 1
