<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Estoque Rápido</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fafafa; margin: 0; padding: 0; color: #000; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header-area { padding: 5px; background: white; border-bottom: 1px solid #ddd; }
        
        /* Câmera centralizada e ajustada */
        #reader { 
            width: 100%; 
            height: 200px; 
            margin: 0 auto 5px; 
            background: #000;
            position: relative;
            overflow: hidden;
        }
        #reader video {
            object-fit: cover !important;
            width: 100% !important;
            height: 100% !important;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .content-area { flex: 1; display: flex; flex-direction: column; padding: 10px; overflow: hidden; }
        
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .form-group { display: flex; flex-direction: column; }
        .label { font-size: 10px; color: #444; text-transform: uppercase; font-weight: 800; margin-bottom: 2px; }
        
        input { 
            font-size: 16px; 
            width: 100%; 
            padding: 10px; 
            height: 30px; 
            border: 1px solid #bbb; 
            border-radius: 8px; 
            box-sizing: border-box; 
        }
        
        .bottom-bar { position: fixed; bottom: 0; width: 100%; height: 55px; background: #fff; border-top: 1px solid #ddd; display: flex; align-items: center; justify-content: space-around; z-index: 10; }
        .btn-icon { background: none; border: none; font-size: 24px; padding: 10px; cursor: pointer; }
        
        #config-panel { display: none; padding: 10px; background: #f0f0f0; border-bottom: 1px solid #ddd; font-size: 12px; position: absolute; top: 0; left: 0; right: 0; z-index: 20; }
    </style>
</head>
<body>

<div class="header-area">
    <div id="reader"></div>
    <div style="display:flex; gap:5px;">
        <input type="text" id="search" placeholder="Código ou Nome..." style="flex:1; height: 40px !important;">
        <button onclick="buscar()" style="padding: 0 15px; background:#000; color:#fff; border:none; border-radius:6px; font-weight:bold;">BUSCAR</button>
    </div>
</div>

<div id="config-panel">
    <input type="text" id="cfg-user" placeholder="Usuário GitHub" style="margin-bottom:4px;">
    <input type="text" id="cfg-repo" placeholder="Repositório" style="margin-bottom:4px;">
    <input type="password" id="cfg-token" placeholder="Token" style="margin-bottom:4px;">
    <button onclick="saveConfig()" style="width:100%; padding:10px; border:none; background:#000; color:#fff; border-radius:4px;">SALVAR CREDENCIAIS</button>
    <button onclick="syncData()" style="width:100%; padding:10px; border:none; background:#22c55e; color:#fff; border-radius:4px; margin-top:4px;">SINCRONIZAR DADOS</button>
</div>

<div class="content-area">
    <h3 id="display-nome" style="margin:0 0 10px 0; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:800;">Aguardando leitura...</h3>
    
    <div class="row">
        <div class="form-group"><div class="label">ESTOQUE</div><input type="number" id="val-estoque" onchange="updateCurrent('estoque', this.value)"></div>
        <div class="form-group"><div class="label">VALIDADE</div><input type="date" id="val-validade" onchange="updateCurrent('validade', this.value)"></div>
    </div>
    <div class="row">
        <div class="form-group"><div class="label">EAN</div><input type="text" id="val-gtin" onchange="updateCurrent('gtin', this.value)"></div>
        <div class="form-group"><div class="label">EMBALAGEM</div><input type="text" id="val-embalagem" onchange="updateCurrent('embalagem', this.value)"></div>
    </div>
    <div class="row">
        <div class="form-group"><div class="label">GÔNDOLA</div><input type="text" id="val-gondola" onchange="updateCurrent('gondola', this.value)"></div>
        <div class="form-group"><div class="label">PRATELEIRA</div><input type="text" id="val-prateleira" onchange="updateCurrent('prateleira', this.value)"></div>
    </div>
</div>

<div class="bottom-bar">
    <button class="btn-icon" onclick="toggleConfig()">⚙️</button>
    <button class="btn-icon" onclick="verFoto()">📷</button>
    <button class="btn-icon" onclick="saveDataToGithub()">💾</button>
</div>

<div id="modal-foto" style="display:none; position:fixed; inset:0; background:#000; z-index:99; align-items:center; justify-content:center;" onclick="this.style.display='none'">
    <img id="img-ampliada" style="max-width:95%; border-radius:8px;">
</div>

<script>
    let products = [];
    let currentProd = null;
    const html5QrCode = new Html5Qrcode("reader");
    
    // ---------------------------------------------------------
    // FUNÇÕES DE AUTO-REPARO DE TEXTOS QUEBRADOS
    // ---------------------------------------------------------
    
    function fixBrokenText(text) {
        if (!text || typeof text !== 'string') return text;
        try {
            // Se conseguir decodificar, significa que estava quebrado e agora arrumou.
            return decodeURIComponent(escape(text));
        } catch (e) {
            // Se der erro, significa que o texto JÁ ESTAVA CERTO e não precisava mexer.
            return text; 
        }
    }

    function autoFixDatabase(dataArray) {
        return dataArray.map(item => {
            const newItem = { ...item };
            // Varre todas as informações do produto procurando textos para consertar
            for (let key in newItem) {
                if (typeof newItem[key] === 'string') {
                    newItem[key] = fixBrokenText(newItem[key]);
                }
            }
            return newItem;
        });
    }

    // ---------------------------------------------------------
    // FUNÇÕES MODERNAS PARA UTF-8 E BASE64
    // ---------------------------------------------------------
    
    function utf8ToBase64(str) {
        const bytes = new TextEncoder().encode(str);
        let binary = '';
        for (let i = 0; i < bytes.byteLength; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary);
    }

    function base64ToUtf8(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        return new TextDecoder().decode(bytes);
    }
    
    // ---------------------------------------------------------

    async function startScanner() {
        try {
            await html5QrCode.start({ facingMode: "environment" }, { fps: 5, qrbox: 180 }, (decodedText) => {
                document.getElementById('search').value = decodedText;
                buscar();
            });
        } catch (err) { console.error("Câmera:", err); }
    }

    function toggleConfig() {
        const p = document.getElementById('config-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function buscar() {
        const termo = document.getElementById('search').value.toLowerCase();
        const p = products.find(x => x.nome?.toLowerCase().includes(termo) || x.gtin?.includes(termo) || x.codigo?.includes(termo));
        if(p) {
            currentProd = p;
            document.getElementById('display-nome').innerText = p.nome;
            document.getElementById('val-estoque').value = p.estoque || 0;
            document.getElementById('val-validade').value = formatDate(p.validade);
            document.getElementById('val-gtin').value = p.gtin || '';
            document.getElementById('val-embalagem').value = p.embalagem || '';
            document.getElementById('val-gondola').value = p.gondola || '';
            document.getElementById('val-prateleira').value = p.prateleira || '';
        } else { alert("Produto não encontrado."); }
    }

    function updateCurrent(field, value) {
        if(!currentProd) return;
        if(field === 'validade') {
            const d = value.split('-');
            currentProd.validade = `${d[2]}/${d[1]}/${d[0]}`;
        } else { currentProd[field] = value; }
        currentProd.last_update = Date.now();
        localforage.setItem('sucedoan_pim_v37', products);
    }

    function formatDate(d) {
        if (!d || !d.includes('/')) return '';
        const p = d.split('/');
        return `${p[2]}-${p[1]}-${p[0]}`;
    }

    function verFoto() {
        if(!currentProd || !currentProd.url_imagem) return alert("Selecione um produto");
        document.getElementById('img-ampliada').src = currentProd.url_imagem.replace("../", "https://donaantonia.com.br/");
        document.getElementById('modal-foto').style.display = 'flex';
    }

    async function syncData() {
        const cfg = await localforage.getItem('sucedoan_config');
        if(!cfg) return alert("Configure as credenciais");
        
        const res = await fetch(`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/site/produtos.json?t=${Date.now()}`, { 
            headers: { "Authorization": `Bearer ${cfg.token}` } 
        });
        const data = await res.json();
        
        const decodedString = base64ToUtf8(data.content);
        let rawProducts = JSON.parse(decodedString);
        
        // A MÁGICA ACONTECE AQUI: O sistema passa um "pente fino" limpando a sujeira!
        products = autoFixDatabase(rawProducts);
        
        await localforage.setItem('sucedoan_pim_v37', products);
        alert("Sincronizado e Auto-Reparado!");
        
        if(currentProd) buscar(); 
    }

    async function saveDataToGithub() {
        const cfg = await localforage.getItem('sucedoan_config');
        if(!cfg) return alert("Configure as credenciais");
        
        const res = await fetch(`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/site/produtos.json?t=${Date.now()}`, { 
            headers: { "Authorization": `Bearer ${cfg.token}` } 
        });
        const currentData = await res.json();
        
        const jsonString = JSON.stringify(products, null, 2);
        const contentStr = utf8ToBase64(jsonString);
        
        await fetch(`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/site/produtos.json`, {
            method: 'PUT',
            headers: { "Authorization": `Bearer ${cfg.token}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: "Update mobile", content: contentStr, sha: currentData.sha })
        });
        alert("Salvo!");
    }

    async function saveConfig() {
        await localforage.setItem('sucedoan_config', { user: document.getElementById('cfg-user').value, repo: document.getElementById('cfg-repo').value, token: document.getElementById('cfg-token').value });
        alert("Credenciais salvas");
    }

    window.onload = async () => {
        products = await localforage.getItem('sucedoan_pim_v37') || [];
        const cfg = await localforage.getItem('sucedoan_config');
        if(cfg) {
            document.getElementById('cfg-user').value = cfg.user;
            document.getElementById('cfg-repo').value = cfg.repo;
            document.getElementById('cfg-token').value = cfg.token;
        }
        startScanner();
    };
</script>
</body>
</html>
