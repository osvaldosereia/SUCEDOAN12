<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Estoque Rápido</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fafafa; margin: 0; padding: 0; color: #000; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Cabeçalho Fixo */
        .header-area { padding: 10px; background: white; border-bottom: 1px solid #ddd; }
        #reader { width: 100%; max-width: 300px; margin: 0 auto 10px; }
        
        /* Área de Conteúdo (Formulário) */
        .content-area { flex: 1; overflow-y: auto; padding: 10px 10px 80px 10px; }
        
        /* Campos de Entrada */
        .form-group { margin-bottom: 8px; }
        .label { font-size: 9px; color: #666; text-transform: uppercase; font-weight: 800; margin-bottom: 2px; }
        input { font-size: 16px; width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        /* Barra de Botões Inferior */
        .bottom-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #fff; border-top: 1px solid #ddd; display: flex; align-items: center; justify-content: space-around; z-index: 10; }
        .btn-icon { background: none; border: none; font-size: 24px; padding: 10px; cursor: pointer; }
        
        /* Config Panel */
        #config-panel { display: none; padding: 10px; border-bottom: 1px solid #ddd; background: #f0f0f0; }
    </style>
</head>
<body>

<!-- Cabeçalho (Scanner) -->
<div class="header-area">
    <div id="reader"></div>
    <div style="display:flex; gap:5px;">
        <input type="text" id="search" placeholder="Nome, EAN ou SKU..." style="flex:1;">
        <button onclick="buscar()" style="padding: 0 15px; background:#000; color:#fff; border:none; border-radius:6px; font-weight:bold;">OK</button>
    </div>
</div>

<!-- Configurações -->
<div id="config-panel">
    <input type="text" id="cfg-user" class="form-group" placeholder="Usuário GitHub">
    <input type="text" id="cfg-repo" class="form-group" placeholder="Repositório">
    <input type="password" id="cfg-token" class="form-group" placeholder="Token GitHub">
    <button class="btn" style="width:100%; padding:10px; border:none; border-radius:6px; background:#000; color:#fff;" onclick="saveConfig()">SALVAR CREDENCIAIS</button>
    <button class="btn" style="width:100%; padding:10px; border:none; border-radius:6px; background:#22c55e; color:#fff; margin-top:5px;" onclick="syncData()">SINCRONIZAR (BAIXAR)</button>
</div>

<!-- Área do Produto -->
<div class="content-area">
    <div id="product-view">
        <h3 id="display-nome" style="margin:0 0 10px 0; font-size:16px; border-bottom: 1px solid #eee; padding-bottom:5px;">Aguardando leitura...</h3>
        
        <div class="form-group"><div class="label">ESTOQUE</div><input type="number" id="val-estoque" onchange="updateCurrent('estoque', this.value)"></div>
        <div class="form-group"><div class="label">VALIDADE</div><input type="date" id="val-validade" onchange="updateCurrent('validade', this.value)"></div>
        <div class="form-group"><div class="label">EAN</div><input type="text" id="val-gtin" onchange="updateCurrent('gtin', this.value)"></div>
        <div class="form-group"><div class="label">EMBALAGEM</div><input type="text" id="val-embalagem" onchange="updateCurrent('embalagem', this.value)"></div>
        <div class="form-group"><div class="label">GÔNDOLA</div><input type="text" id="val-gondola" onchange="updateCurrent('gondola', this.value)"></div>
        <div class="form-group"><div class="label">PRATELEIRA</div><input type="text" id="val-prateleira" onchange="updateCurrent('prateleira', this.value)"></div>
    </div>
</div>

<!-- Barra de Ações Fixa (Botões) -->
<div class="bottom-bar">
    <button class="btn-icon" onclick="toggleConfig()">⚙️</button>
    <button class="btn-icon" onclick="verFoto()">📷</button>
    <button class="btn-icon" onclick="saveDataToGithub()">💾</button>
</div>

<div id="modal-foto" style="display:none; position:fixed; inset:0; background:#000; z-index:99; align-items:center; justify-content:center;" onclick="this.style.display='none'">
    <img id="img-ampliada" style="max-width:95%; border-radius:8px;">
</div>

<script>
    let products = [];
    let currentProd = null;
    const html5QrCode = new Html5Qrcode("reader");
    
    async function startScanner() {
        try {
            await html5QrCode.start({ facingMode: "environment" }, { fps: 5, qrbox: 200 }, (decodedText) => {
                document.getElementById('search').value = decodedText;
                buscar();
            });
        } catch (err) { console.error("Câmera:", err); }
    }

    function toggleConfig() {
        const p = document.getElementById('config-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function buscar() {
        const termo = document.getElementById('search').value.toLowerCase();
        const p = products.find(x => 
            x.nome?.toLowerCase().includes(termo) || 
            x.gtin?.includes(termo) || 
            x.codigo?.includes(termo)
        );

        if(p) {
            currentProd = p;
            document.getElementById('display-nome').innerText = p.nome;
            document.getElementById('val-estoque').value = p.estoque || 0;
            document.getElementById('val-validade').value = formatDate(p.validade);
            document.getElementById('val-gtin').value = p.gtin || '';
            document.getElementById('val-embalagem').value = p.embalagem || '';
            document.getElementById('val-gondola').value = p.gondola || '';
            document.getElementById('val-prateleira').value = p.prateleira || '';
        } else {
            alert("Produto não encontrado.");
        }
    }

    function updateCurrent(field, value) {
        if(!currentProd) return;
        if(field === 'validade') {
            const d = value.split('-');
            currentProd.validade = `${d[2]}/${d[1]}/${d[0]}`;
        } else {
            currentProd[field] = value;
        }
        currentProd.last_update = Date.now();
        localforage.setItem('sucedoan_pim_v37', products);
    }

    function formatDate(d) {
        if (!d || !d.includes('/')) return '';
        const p = d.split('/');
        return `${p[2]}-${p[1]}-${p[0]}`;
    }

    function verFoto() {
        if(!currentProd || !currentProd.url_imagem) return alert("Selecione um produto primeiro");
        document.getElementById('img-ampliada').src = currentProd.url_imagem.replace("../", "https://donaantonia.com.br/");
        document.getElementById('modal-foto').style.display = 'flex';
    }

    async function syncData() {
        const cfg = await localforage.getItem('sucedoan_config');
        if(!cfg) return alert("Configure as credenciais primeiro");
        const res = await fetch(`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/site/produtos.json?t=${Date.now()}`, { headers: { "Authorization": `Bearer ${cfg.token}` } });
        const data = await res.json();
        products = JSON.parse(atob(data.content));
        await localforage.setItem('sucedoan_pim_v37', products);
        alert("Sincronizado!");
    }

    async function saveDataToGithub() {
        const cfg = await localforage.getItem('sucedoan_config');
        if(!cfg) return alert("Configure as credenciais primeiro");
        const res = await fetch(`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/site/produtos.json?t=${Date.now()}`, { headers: { "Authorization": `Bearer ${cfg.token}` } });
        const currentData = await res.json();
        const contentStr = btoa(unescape(encodeURIComponent(JSON.stringify(products, null, 2))));
        await fetch(`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/site/produtos.json`, {
            method: 'PUT',
            headers: { "Authorization": `Bearer ${cfg.token}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: "Update mobile", content: contentStr, sha: currentData.sha })
        });
        alert("Salvo na nuvem!");
    }

    async function saveConfig() {
        await localforage.setItem('sucedoan_config', { user: document.getElementById('cfg-user').value, repo: document.getElementById('cfg-repo').value, token: document.getElementById('cfg-token').value });
        alert("Credenciais salvas");
    }

    window.onload = async () => {
        products = await localforage.getItem('sucedoan_pim_v37') || [];
        const cfg = await localforage.getItem('sucedoan_config');
        if(cfg) {
            document.getElementById('cfg-user').value = cfg.user;
            document.getElementById('cfg-repo').value = cfg.repo;
            document.getElementById('cfg-token').value = cfg.token;
        }
        startScanner();
    };
</script>
</body>
</html>
