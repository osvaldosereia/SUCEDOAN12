<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucedoan - Gestão de Estoque</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-body: #f4f4f5; --accent: #000000; --text-primary: #0f172a; --border: #e4e4e7; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .product-row { display: grid; grid-template-columns: 2fr 1fr 1fr 100px; gap: 10px; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); }
        .form-input { padding: 8px; border: 1px solid var(--border); border-radius: 6px; width: 100%; }
        .btn { padding: 10px 20px; border-radius: 6px; cursor: pointer; border: none; font-weight: 800; }
        .btn-primary { background: var(--accent); color: white; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Gestão de Estoque e Validade</h2>
        <div id="estoque-list">
            </div>
        <div style="margin-top: 20px; display: flex; gap: 10px;">
            <button class="btn btn-primary" onclick="syncAndSave()">SALVAR NA NUVEM (JSON + META)</button>
            <button class="btn" onclick="window.location.href='index.html'">VOLTAR AO PIM</button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'sucedoan_pim_v37';
        // Inclua aqui as funções GitHubAPI do seu index.html ou importe via arquivo separado
        // Para simplificar, assumo que estas funções estão disponíveis globalmente ou injetadas.
        
        let products = [];

        window.onload = async () => {
            products = await localforage.getItem(STORAGE_KEY) || [];
            renderEstoque();
            lucide.createIcons();
        };

        function renderEstoque() {
            const list = document.getElementById('estoque-list');
            list.innerHTML = `
                <div class="product-row" style="font-weight: 800; font-size: 11px;">
                    <div>Produto</div><div>Estoque</div><div>Validade</div><div>Status</div>
                </div>
            `;
            products.forEach(p => {
                list.innerHTML += `
                    <div class="product-row">
                        <div style="font-size: 12px; font-weight: 600;">${p.nome}</div>
                        <input type="number" class="form-input" value="${p.estoque || 0}" onchange="updateProd('${p.codigo}', 'estoque', this.value)">
                        <input type="date" class="form-input" value="${p.validade && p.validade.includes('/') ? p.validade.split('/').reverse().join('-') : ''}" onchange="updateProd('${p.codigo}', 'validade', this.value)">
                        <span style="font-size:10px;">${p.situacao}</span>
                    </div>
                `;
            });
        }

        async function updateProd(sku, field, val) {
            const p = products.find(x => x.codigo === sku);
            if(p) {
                if(field === 'validade' && val.includes('-')) {
                    const d = val.split('-');
                    p.validade = `${d[2]}/${d[1]}/${d[0]}`;
                } else {
                    p[field] = val;
                }
                p.last_update = Date.now();
                await localforage.setItem(STORAGE_KEY, products);
            }
        }

        // SOLUÇÃO PARA O CONFLITO DE DADOS
        async function syncAndSave() {
            if(!confirm("Atenção: Isso buscará a versão mais recente da nuvem antes de salvar para evitar sobrescrever dados de outros usuários. Continuar?")) return;
            
            try {
                // 1. Re-buscar a versão atual do GitHub para ter o SHA mais recente
                // Isso força o sistema a saber o que está na nuvem AGORA antes de salvar
                const fileData = await GitHubAPI.getFileData('site/produtos.json');
                
                // 2. Agora salvamos. Como chamamos getFileData agora, o SHA está fresco.
                // Reutilizando sua lógica de saveFile existente (que usa o sha interno)
                await salvarProdutosJSON(); // Função herdada do seu sistema que usa a fila
                
                alert("Sincronização iniciada. A fila de salvamento foi processada com a referência mais recente da nuvem.");
            } catch(e) {
                alert("Erro crítico: Não foi possível sincronizar com o GitHub. Tente novamente mais tarde.");
            }
        }
    </script>
</body>
</html>
