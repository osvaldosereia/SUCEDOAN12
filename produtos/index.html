<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importador XML Simples</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Barra de rolagem simples */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 h-screen flex flex-col font-sans overflow-hidden">

    <header class="bg-white p-4 shadow-md flex justify-between items-center z-10">
        <h1 class="text-xl font-black text-blue-600">XML > CSV RÁPIDO</h1>
        <div class="flex gap-3">
            <label class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-bold cursor-pointer transition-colors shadow">
                + IMPORTAR XMLs
                <input type="file" id="xmlInput" accept=".xml" multiple class="hidden">
            </label>
            <button onclick="exportarCSV()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded font-bold transition-colors shadow">
                ↓ EXPORTAR CSV
            </button>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        
        <div class="w-1/3 bg-white border-r flex flex-col h-full">
            <div class="p-3 bg-slate-50 border-b text-xs font-bold text-slate-500 uppercase">
                Produtos Carregados (<span id="contador">0</span>)
            </div>
            <div id="listaProdutos" class="flex-1 overflow-y-auto p-2 space-y-2">
                <p class="text-center text-slate-400 mt-10 text-sm">Nenhum XML carregado.</p>
            </div>
        </div>

        <div class="w-2/3 bg-slate-50 flex flex-col h-full">
            <div class="p-4 border-b bg-white">
                <h2 class="text-lg font-bold text-slate-700" id="nomeProdutoAtual">Selecione um produto</h2>
            </div>
            <div class="flex-1 overflow-y-auto p-6">
                <div id="formularioEditor" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    <p class="text-slate-400 col-span-3 text-sm">As opções de edição aparecerão aqui.</p>
                </div>
            </div>
        </div>
    </main>

<script>
    // 1. DADOS PRINCIPAIS
    let produtos = []; // Lista que vai guardar todos os produtos extraídos
    let indiceSelecionado = null; // Para saber qual produto estamos editando
    
    // O cabeçalho exato necessário para o seu CSV
    const colunasModelo = [
        "ID", "Código", "Descrição", "Unidade", "NCM", "Origem", "Preço", "Valor IPI fixo", "Observações", "Situação", 
        "Estoque", "Preço de custo", "Cód. no fornecedor", "Fornecedor", "Localização", "Estoque máximo", "Estoque mínimo", 
        "Peso líquido (Kg)", "Peso bruto (Kg)", "GTIN/EAN", "GTIN/EAN da Embalagem", "Largura do produto", "Altura do Produto", 
        "Profundidade do produto", "Data Validade", "Descrição do Produto no Fornecedor", "Descrição Complementar", 
        "Itens p/ caixa", "Produto Variação", "Tipo Produção", "Classe de enquadramento do IPI", "Código na Lista de Serviços", 
        "Tipo do item", "Grupo de Tags/Tags", "Tributos", "Código Pai", "Código Integração", "Grupo de produtos", "Marca", 
        "CEST", "Volumes", "Descrição Curta", "Cross-Docking", "URL Imagens Externas", "Link Externo", "Meses Garantia no Fornecedor", 
        "Clonar dados do pai", "Condição do Produto", "Frete Grátis", "Número FCI", "Vídeo", "Departamento", "Unidade de Medida", 
        "Preço de Compra", "Valor base ICMS ST para retenção", "Valor ICMS ST para retenção", "Valor ICMS próprio do substituto", 
        "Categoria do produto", "Informações Adicionais"
    ];

    // 2. IMPORTAR E LER O XML
    document.getElementById('xmlInput').addEventListener('change', function(e) {
        const arquivos = Array.from(e.target.files);
        
        arquivos.forEach(arquivo => {
            const reader = new FileReader();
            reader.onload = function(evento) {
                // Transforma o texto do arquivo em um objeto XML navegável
                const xmlDoc = new DOMParser().parseFromString(evento.target.result, "text/xml");
                extrairProdutosDoXML(xmlDoc);
            };
            reader.readAsText(arquivo);
        });
        
        // Limpa o input para permitir selecionar os mesmos arquivos novamente se necessário
        e.target.value = ''; 
    });

    // 3. EXTRAIR DADOS DO XML
    function extrairProdutosDoXML(xml) {
        // Pega o nome do fornecedor (emitente)
        const fornecedor = xml.querySelector('emit > xNome')?.textContent || "";
        
        // Procura por todos os itens (detalhes) da nota
        const itens = xml.querySelectorAll('det');
        
        itens.forEach(det => {
            const prod = det.querySelector('prod');
            
            // Cria um objeto vazio e preenche com as chaves do modelo
            let novoProduto = {};
            colunasModelo.forEach(col => novoProduto[col] = "");
            
            // Pega os dados básicos
            const ean = prod.querySelector('cEAN')?.textContent || "";
            const valorUn = (prod.querySelector('vUnCom')?.textContent || "0.00").replace('.', ',');
            const qtd = (prod.querySelector('qCom')?.textContent || "0").replace('.', ',');
            
            // Preenche o objeto com o que achamos no XML
            novoProduto["Descrição"] = prod.querySelector('xProd')?.textContent || "Produto Sem Nome";
            novoProduto["Unidade"] = prod.querySelector('uCom')?.textContent || "";
            novoProduto["NCM"] = prod.querySelector('NCM')?.textContent || "";
            novoProduto["CEST"] = prod.querySelector('CEST')?.textContent || "";
            novoProduto["Preço"] = valorUn;
            novoProduto["Preço de custo"] = valorUn;
            novoProduto["Estoque"] = qtd;
            novoProduto["Fornecedor"] = fornecedor;
            novoProduto["GTIN/EAN"] = ean ? `\t${ean}` : ""; // \t previne problemas no Excel
            
            // Gera um código aleatório simples (ex: PROD-A1B2)
            const codigoAleatorio = Math.random().toString(36).substring(2, 6).toUpperCase();
            novoProduto["Código"] = `P-${codigoAleatorio}`;
            
            // Adiciona valores padrão
            novoProduto["Situação"] = "Ativo";
            novoProduto["Condição do Produto"] = "Novo";
            
            produtos.push(novoProduto);
        });
        
        renderizarLista();
    }

    // 4. RENDERIZAR A LISTA NA TELA
    function renderizarLista() {
        const divLista = document.getElementById('listaProdutos');
        document.getElementById('contador').innerText = produtos.length;
        divLista.innerHTML = ""; // Limpa a lista
        
        produtos.forEach((p, index) => {
            const div = document.createElement('div');
            // Estilização simples. Se for o selecionado, fica azulzinho.
            div.className = `p-3 border rounded cursor-pointer transition-colors ${indiceSelecionado === index ? 'bg-blue-100 border-blue-300' : 'bg-white hover:bg-slate-50'}`;
            
            div.innerHTML = `
                <div class="font-bold text-sm truncate text-slate-800">${p["Descrição"]}</div>
                <div class="flex justify-between mt-1 text-xs text-slate-500">
                    <span>Cod: ${p["Código"]}</span>
                    <span class="font-black text-emerald-600">R$ ${p["Preço"]}</span>
                </div>
            `;
            
            // Quando clicar, abre o editor
            div.onclick = () => abrirEditor(index);
            divLista.appendChild(div);
        });
    }

    // 5. ABRIR EDITOR PARA PERSONALIZAR
    function abrirEditor(index) {
        indiceSelecionado = index;
        renderizarLista(); // Re-renderiza para atualizar a cor do item selecionado
        
        const produto = produtos[index];
        document.getElementById('nomeProdutoAtual').innerText = produto["Descrição"];
        
        const form = document.getElementById('formularioEditor');
        form.innerHTML = ""; // Limpa o formulário anterior
        
        // Cria um campo (input) para cada coluna do modelo
        colunasModelo.forEach(coluna => {
            const div = document.createElement('div');
            div.innerHTML = `
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">${coluna}</label>
                <input type="text" 
                       value="${produto[coluna] || ''}" 
                       oninput="atualizarDado(${index}, '${coluna}', this.value)"
                       class="w-full border border-slate-300 rounded p-2 text-sm focus:border-blue-500 outline-none">
            `;
            form.appendChild(div);
        });
    }

    // 6. ATUALIZAR DADO ENQUANTO DIGITA
    function atualizarDado(indexProduto, chave, novoValor) {
        produtos[indexProduto][chave] = novoValor;
        
        // Se mudou o nome ou código, atualiza o título e a lista (opcional, mas bom visualmente)
        if(chave === "Descrição") {
            document.getElementById('nomeProdutoAtual').innerText = novoValor;
        }
    }

    // 7. EXPORTAR PARA CSV
    function exportarCSV() {
        if (produtos.length === 0) {
            alert("Não há produtos para exportar. Importe um XML primeiro.");
            return;
        }

        // '\ufeff' ajuda o Excel a ler caracteres especiais (acentos, ç)
        let conteudoCSV = "\ufeff"; 
        
        // Linha 1: Cabeçalhos (ex: "ID";"Código";"Descrição")
        conteudoCSV += colunasModelo.map(col => `"${col}"`).join(";") + "\r\n";

        // Linhas seguintes: Os dados dos produtos
        produtos.forEach(prod => {
            let linha = colunasModelo.map(col => {
                let valor = prod[col] || "";
                // Remove aspas internas para não quebrar o CSV
                valor = String(valor).replace(/"/g, ''); 
                return `"${valor}"`;
            }).join(";");
            
            conteudoCSV += linha + "\r\n";
        });

        // Rotina padrão do JavaScript para baixar um arquivo
        const blob = new Blob([conteudoCSV], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "produtos_exportados.csv";
        link.click();
    }
</script>
</body>
</html>
