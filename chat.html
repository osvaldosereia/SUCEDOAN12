<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dona Antônia | Atendimento Virtual</title>
    <style>
        /* 1. ESTILIZAÇÃO (CSS) - A "Roupa" do Chat */
        :root {
            --brand: #5A3826;       /* Marrom escuro da sua marca */
            --brand-light: #EBD9C3; /* Bege claro */
            --bg-chat: #f3f4f6;     /* Cinza bem clarinho pro fundo */
            --msg-bot: #ffffff;     /* Fundo da mensagem do bot */
            --msg-user: #059669;    /* Fundo da mensagem do cliente (verde conversão) */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }

        body {
            background-color: var(--bg-chat);
            display: flex;
            flex-direction: column;
            height: 100vh; /* Ocupa 100% da altura da tela */
        }

        /* Cabeçalho do Chat */
        header {
            background-color: var(--brand);
            color: white;
            padding: 15px 20px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Área onde as mensagens aparecem */
        #area-mensagens {
            flex: 1; /* Preenche todo o espaço restante */
            padding: 20px;
            overflow-y: auto; /* Permite rolar a tela */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Estilo base de todas as bolhas de mensagem */
        .mensagem {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-in; /* Animação de entrada suave */
        }

        /* Bolha do Bot (Fica na esquerda) */
        .bot {
            background-color: var(--msg-bot);
            color: #333;
            align-self: flex-start; /* Alinha à esquerda */
            border-bottom-left-radius: 2px; /* Biquinho do balão */
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        /* Bolha do Usuário (Fica na direita) */
        .usuario {
            background-color: var(--msg-user);
            color: white;
            align-self: flex-end; /* Alinha à direita */
            border-bottom-right-radius: 2px;
        }

        /* Barra inferior para digitar */
        #area-input {
            display: flex;
            padding: 15px;
            background-color: white;
            border-top: 1px solid #ddd;
        }

        #input-mensagem {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 25px;
            outline: none;
            font-size: 1em;
        }

        #btn-enviar {
            background-color: var(--brand);
            color: white;
            border: none;
            padding: 0 20px;
            margin-left: 10px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>🧺 Dona Antônia Bot</header>
    
    <div id="area-mensagens">
        </div>

    <div id="area-input">
        <input type="text" id="input-mensagem" placeholder="Digite sua resposta aqui..." onkeypress="verificarEnter(event)">
        <button id="btn-enviar" onclick="enviarMensagem()">Enviar</button>
    </div>

    <script>
        // Variáveis globais para guardar o estado da conversa
        let estadoConversa = 'INICIO';
        let dadosCestas = [];
        let dadosProdutos = [];

        // Função que roda assim que o site carrega
        window.onload = async function() {
            // Simulamos o carregamento dos seus JSONs (em um servidor real usaríamos o fetch)
            // Para o exemplo rodar direto, vou simular que ele já leu os arquivos.
            adicionarMensagemNaTela("Olá! Sou a assistente virtual da Dona Antônia. 🧺", "bot");
            
            setTimeout(() => {
                adicionarMensagemNaTela("Para começarmos, sua compra de mercado costuma ser para quantas pessoas?", "bot");
            }, 1000); // Atraso de 1 segundo para parecer humano
        };

        // Função que detecta se o usuário apertou a tecla "Enter"
        function verificarEnter(evento) {
            if (evento.key === "Enter") {
                enviarMensagem();
            }
        }

        // Função principal de envio
        function enviarMensagem() {
            const campoInput = document.getElementById('input-mensagem');
            const texto = campoInput.value.trim();

            if (texto === "") return; // Não faz nada se estiver vazio

            // 1. Mostra a mensagem do usuário na tela
            adicionarMensagemNaTela(texto, "usuario");
            campoInput.value = ""; // Limpa o campo

            // 2. O bot "pensa" e responde depois de um tempinho
            setTimeout(() => {
                processarLogicaDeVendas(texto);
            }, 800);
        }

        // Função que cria o visual da bolha de mensagem no HTML
        function adicionarMensagemNaTela(texto, remetente) {
            const areaMensagens = document.getElementById('area-mensagens');
            
            // Cria um elemento <div> novo
            const divMensagem = document.createElement('div');
            // Adiciona as classes CSS (ex: "mensagem bot" ou "mensagem usuario")
            divMensagem.className = `mensagem ${remetente}`;
            divMensagem.innerHTML = texto;

            // Coloca a nova <div> dentro da área de mensagens
            areaMensagens.appendChild(divMensagem);

            // Rola a tela automaticamente para o final
            areaMensagens.scrollTop = areaMensagens.scrollHeight;
        }

        // A Lógica do Funil de Vendas
        function processarLogicaDeVendas(mensagemUsuario) {
            let respostaBot = "";
            let textoMinusculo = mensagemUsuario.toLowerCase();

            // Máquina de estados para guiar a conversa
            switch (estadoConversa) {
                case 'INICIO':
                    // Verifica o tamanho da família
                    if (textoMinusculo.includes("1") || textoMinusculo.includes("2") || textoMinusculo.includes("pouca")) {
                        respostaBot = "Entendi! Uma Cesta Mini ou Econômica seria ideal. E você prefere o arroz da marca Bonini ou Koblenz?";
                    } else {
                        respostaBot = "Legal! Uma família maior precisa de uma Cesta Grande. Você prefere arroz Bonini ou Koblenz?";
                    }
                    estadoConversa = 'ESCOLHA_ARROZ';
                    break;

                case 'ESCOLHA_ARROZ':
                    respostaBot = "Ótima escolha de arroz! 🍚 Baseado no que me falou, recomendo a nossa Cesta de destaque por um ótimo preço. Posso incluir ela no seu pedido de hoje?";
                    estadoConversa = 'OFERTA_CESTA';
                    break;

                case 'OFERTA_CESTA':
                    if (textoMinusculo.includes("sim") || textoMinusculo.includes("pode") || textoMinusculo.includes("quero")) {
                        respostaBot = "Cesta adicionada! 🛒 Dica de especialista: vi que temos promoções em itens de Limpeza e Higiene hoje. Quer aproveitar o frete e adicionar um kit limpeza?";
                        estadoConversa = 'CROSS_SELL';
                    } else {
                        respostaBot = "Sem problemas! Quer ver outras opções de cestas?";
                        estadoConversa = 'INICIO';
                    }
                    break;

                case 'CROSS_SELL':
                    respostaBot = "Perfeito! Tudo anotado. Vou preparar o seu link de pagamento para finalizarmos via WhatsApp. Muito obrigada por comprar com a Dona Antônia! 🥰";
                    estadoConversa = 'FIM';
                    break;

                default:
                    respostaBot = "Obrigada! Se precisar de algo, basta atualizar a página para começarmos de novo.";
                    break;
            }

            adicionarMensagemNaTela(respostaBot, "bot");
        }
    </script>
</body>
</html>
