<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Dona Antônia V2 · Admin Homologação</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="admin-shell">
    <aside class="sidebar">
      <a class="admin-brand" href="./index.html"><strong>Admin Dona Antônia V2</strong><span>Homologação · sem gravação</span></a>
      <nav class="admin-nav" aria-label="Módulos administrativos">
        <button class="active" type="button" data-module="dashboard">Visão geral</button>
        <button type="button" data-module="inventory">Estoque e validade</button>
        <button type="button" data-module="products">Produtos</button>
        <button type="button" data-module="registrations">Cadastros auxiliares</button>
        <button type="button" data-module="baskets">Cestas básicas</button>
        <button type="button" data-module="kits">Kits promocionais</button>
        <button type="button" data-module="banners">Banners e campanhas</button>
        <button type="button" data-module="quick-purchase">Compra rápida</button>
        <button type="button" data-module="orders">Pedidos e operação</button>
        <button type="button" data-module="integrations">Integrações</button>
        <button type="button" data-module="publishing">Publicação</button>
        <button type="button" data-module="diagnostics">Diagnóstico</button>
      </nav>
      <div class="sidebar-note">Os módulos de escrita permanecem bloqueados até o mapeamento completo do admin atual, definição dos contratos e testes de homologação.</div>
    </aside>
    <main class="admin-main">
      <header class="admin-topbar">
        <div><h1 id="module-title">Visão geral</h1><p id="module-subtitle">Carregando diagnóstico administrativo…</p></div>
        <div id="admin-status" class="status" aria-live="polite">Verificando catálogo…</div>
      </header>
      <div id="admin-content" class="admin-content"></div>
    </main>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
