<!doctype html><html lang="pt-BR"><meta charset="utf-8"><title>Admin basket audit tests</title><body><pre id="out"></pre><script type="module">import{auditBasket,auditBaskets,filterBasketAudits}from'../admin/basket-audit.js';const out=document.getElementById('out'),tests=[];const test=(name,fn)=>{try{fn();tests.push(`✓ ${name}`)}catch(e){tests.push(`✗ ${name}: ${e.message}`)}};const assert=(value,message)=>{if(!value)throw new Error(message)};const index=new Map([['a',{id:'a',nome:'Arroz',preco:10,precoOferta:0,estoque:5,situacao:'A'}],['b',{id:'b',nome:'Feijão',preco:8,precoOferta:7,estoque:1,situacao:'A'}]]);test('cesta válida calcula soma avulsa',()=>{const audit=auditBasket({id:'1',nome:'Cesta',preco:24,items:[{ref:'a',quantidade:1},{ref:'b',quantidade:2}]},index);assert(audit.retailTotal===24,'soma incorreta');assert(audit.valid,'deveria ser válida')});test('estoque insuficiente bloqueia',()=>{const audit=auditBasket({id:'2',nome:'Cesta',preco:20,items:[{ref:'b',quantidade:2}]},new Map([['b',{id:'b',nome:'Feijão',preco:8,estoque:1,situacao:'A'}]]));assert(!audit.valid,'não bloqueou');assert(audit.insufficient.length===1,'não identificou estoque')});test('produto ausente bloqueia',()=>{const audit=auditBasket({id:'3',nome:'Cesta',preco:10,items:[{ref:'x',quantidade:1}]},index);assert(audit.missing[0]==='x','não identificou ausente')});test('resumo conta bloqueadas',()=>{const result=auditBaskets([{id:'1',nome:'Boa',preco:10,items:[{ref:'a',quantidade:1}]},{id:'2',nome:'Ruim',preco:10,items:[{ref:'x',quantidade:1}]}],index);assert(result.valid===1&&result.blocked===1,'contagem incorreta')});test('busca ignora acento',()=>{const rows=[auditBasket({id:'1',nome:'Cestão Família',preco:10,items:[{ref:'a',quantidade:1}]},index)];assert(filterBasketAudits(rows,'cestao','').length===1,'busca falhou')});out.textContent=tests.join('\n');</script></body></html>
