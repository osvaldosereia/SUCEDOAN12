<!doctype html><meta charset="utf-8"><title>Admin Kit Audit Tests</title><pre id="out"></pre><script type="module">import{auditKit,auditKits,filterKitAudits}from'../admin/kit-audit.js';const out=document.getElementById('out');const tests=[];const test=(name,fn)=>tests.push([name,fn]);const product={id:'p1',codigo:'1',nome:'Arroz',preco:10,precoOferta:0,estoque:5,situacao:'A'};const index=new Map([['p1',product]]);const base={id:'k1',nome:'Kit Arroz',preco:8,inicio:'2026-07-01',fim:'2026-07-31',items:[{ref:'p1',quantidade:1}],carousel:{generated:true,status:'gerado'}};test('calcula economia e desconto',()=>{const a=auditKit(base,index,new Date('2026-07-10').getTime());if(a.savings!==2||a.discount!==20)throw Error('cálculo incorreto')});test('marca promoção ativa',()=>{if(auditKit(base,index,new Date('2026-07-10').getTime()).periodStatus!=='active')throw Error('período incorreto')});test('marca promoção encerrada',()=>{if(auditKit(base,index,new Date('2026-08-10').getTime()).periodStatus!=='expired')throw Error('não expirou')});test('bloqueia estoque insuficiente',()=>{const a=auditKit({...base,items:[{ref:'p1',quantidade:9}]},index);if(a.valid||!a.insufficient.length)throw Error('estoque não bloqueou')});test('detecta carrossel',()=>{if(!auditKit(base,index).carouselGenerated)throw Error('carrossel ausente')});test('filtra sem carrossel',()=>{const rows=auditKits([base,{...base,id:'k2',nome:'Outro',carousel:{generated:false}}],index).rows;if(filterKitAudits(rows,'','no-carousel').length!==1)throw Error('filtro incorreto')});let passed=0;for(const[name,fn]of tests){try{fn();out.textContent+=`✓ ${name}\n`;passed++}catch(error){out.textContent+=`✗ ${name}: ${error.message}\n`}}out.textContent+=`\n${passed}/${tests.length} testes aprovados.`;</script>
