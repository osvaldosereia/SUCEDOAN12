<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>Testes diagnóstico geral V2</title></head><body><pre id="out"></pre><script type="module">import{buildDiagnosticSummary,diagnosticRecommendations}from'../admin/diagnostic-audit.js';const out=document.getElementById('out'),results=[];const test=(name,fn)=>{try{fn();results.push(`✅ ${name}`)}catch(error){results.push(`❌ ${name}: ${error.message}`)}};const assert=(value,message)=>{if(!value)throw new Error(message)};const product={nome:'Arroz',codigo:'1',categoria:'Mercearia',preco:20,estoque:10};const basket={id:'c1',preco:50,items:[{ref:'1'}]};const order={cliente:{nome:'Maria'},itens:[{nome:'Arroz'}]};test('diagnóstico completo chega a 100%',()=>{const summary=buildDiagnosticSummary({products:[product],baskets:[basket],orders:[order],integrationResults:[{status:'ok'}],publicationPlan:{ready:true}});assert(summary.score===100,'pontuação incorreta')});test('produto incompleto cria bloqueio',()=>{const summary=buildDiagnosticSummary({products:[{...product,categoria:''}],baskets:[basket],integrationResults:[{status:'ok'}],publicationPlan:{ready:true}});assert(!summary.checks.find(check=>check.id==='catalog').ok,'catálogo deveria bloquear')});test('estoque zero cria alerta',()=>{const summary=buildDiagnosticSummary({products:[{...product,estoque:0}],baskets:[basket],integrationResults:[{status:'ok'}],publicationPlan:{ready:true}});assert(summary.stockIssues===1,'estoque não detectado')});test('integração incompleta reduz prontidão',()=>{const summary=buildDiagnosticSummary({products:[product],baskets:[basket],integrationResults:[{status:'ok'},{status:'error'}],publicationPlan:{ready:true}});assert(summary.status!=='ready','diagnóstico não deveria estar pronto')});test('recomendações retornam apenas falhas',()=>{const summary=buildDiagnosticSummary({products:[product],baskets:[basket],integrationResults:[],publicationPlan:null});const recs=diagnosticRecommendations(summary);assert(recs.some(item=>item.id==='integrations')&&recs.some(item=>item.id==='publication'),'recomendações ausentes')});out.textContent=results.join('\n');</script></body></html>
