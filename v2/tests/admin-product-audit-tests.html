<!doctype html><html lang="pt-BR"><meta charset="utf-8"><title>Admin product audit tests</title><body><pre id="out"></pre><script type="module">import{auditProduct,auditProducts,filterProducts}from'../admin/product-audit.js';const out=document.getElementById('out');const results=[];const test=(name,fn)=>{try{fn();results.push(`✅ ${name}`)}catch(error){results.push(`❌ ${name}: ${error.message}`)}};const complete={id:'1',nome:'Arroz',codigo:'10',gtin:'789',ncm:'1006',categoria:'Mercearia',subcategoria:'Arroz',marca:'Marca',embalagem:'5kg',preco:30,imagem:'arroz.webp'};const incomplete={id:'2',nome:'Feijão',codigo:'20',gtin:'',ncm:'',categoria:'',subcategoria:'',marca:'',embalagem:'1kg',preco:0,imagem:''};test('produto completo recebe 100%',()=>{const audit=auditProduct(complete);if(!audit.complete||audit.score!==100)throw new Error(JSON.stringify(audit))});test('produto incompleto lista pendências',()=>{const audit=auditProduct(incomplete);if(audit.complete||!audit.missing.some(item=>item.field==='ncm'))throw new Error(JSON.stringify(audit))});test('resumo calcula completos e incompletos',()=>{const audit=auditProducts([complete,incomplete]);if(audit.completeCount!==1||audit.incompleteCount!==1)throw new Error(JSON.stringify(audit))});test('filtro por campo ausente funciona',()=>{const rows=filterProducts([complete,incomplete],{quality:'missing:ncm'});if(rows.length!==1||rows[0].id!=='2')throw new Error(JSON.stringify(rows))});test('busca normalizada encontra produto',()=>{const rows=filterProducts([complete,incomplete],{query:'feijao'});if(rows.length!==1||rows[0].id!=='2')throw new Error(JSON.stringify(rows))});out.textContent=results.join('\n');</script></body></html>
