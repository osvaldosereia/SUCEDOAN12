<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>Testes editor de produto V2</title></head><body><pre id="out"></pre><script type="module">import{normalizeDraft,validateProductDraft,diffProduct,saveProductDraft,readProductDrafts,discardProductDraft}from'../admin/product-editor.js';const out=document.getElementById('out'),results=[];const test=(name,fn)=>{try{fn();results.push(`✅ ${name}`)}catch(error){results.push(`❌ ${name}: ${error.message}`)}};const assert=(value,message)=>{if(!value)throw new Error(message)};localStorage.clear();const product={id:'p1',nome:'Arroz',codigo:'1',gtin:'7891234567890',ncm:'10063021',preco:20,preco_custo:15,estoque:10,categoria:'Mercearia'};test('normaliza campos numéricos',()=>assert(normalizeDraft(product,{preco:'22.5'}).preco===22.5,'preço não normalizado'));test('bloqueia nome vazio',()=>assert(!validateProductDraft({...normalizeDraft(product),nome:''}).valid,'nome vazio permitido'));test('bloqueia NCM inválido',()=>assert(!validateProductDraft({...normalizeDraft(product),ncm:'123'}).valid,'NCM inválido permitido'));test('detecta somente campos alterados',()=>{const diff=diffProduct(product,{...normalizeDraft(product),preco:22});assert(diff.length===1&&diff[0].field==='preco','diff incorreto')});test('salva apenas rascunho local',()=>{const draft={...normalizeDraft(product),preco:22};const saved=saveProductDraft(product,draft);assert(saved.environment==='homologation-local','ambiente incorreto');assert(readProductDrafts().p1.draft.preco===22,'rascunho não salvo')});test('descarta rascunho',()=>{discardProductDraft(product);assert(!readProductDrafts().p1,'rascunho não removido')});out.textContent=results.join('\n');</script></body></html>
