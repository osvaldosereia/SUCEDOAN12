<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>Testes auditoria banners V2</title></head><body><pre id="out"></pre><script type="module">import{normalizeBanner,auditBanner,auditBannerDocument,filterBannerAudits}from'../admin/banner-audit.js';const out=document.getElementById('out'),results=[];const test=(name,fn)=>{try{fn();results.push(`✅ ${name}`)}catch(error){results.push(`❌ ${name}: ${error.message}`)}};const assert=(value,message)=>{if(!value)throw new Error(message)};const product={id:'p1',codigo:'1',nome:'Arroz',categoria:'Mercearia',situacao:'A',estoque:10,preco:20};const index=new Map([['p1',product],['1',product]]);test('normaliza referência de produto',()=>assert(normalizeBanner({id:'b1',produto:'p1'}).productRefs[0]==='p1','referência não normalizada'));test('banner válido resolve produto',()=>assert(auditBanner(normalizeBanner({id:'b1',produto:'p1',imagem:'x.webp',posicao:'categoria'}),index).valid,'banner deveria ser válido'));test('produto ausente cria banner órfão',()=>{const audit=auditBanner(normalizeBanner({id:'b2',produto:'ausente',imagem:'x.webp',posicao:'categoria'}),index);assert(audit.orphan&&audit.missingProducts.length===1,'órfão não detectado')});test('produto sem estoque bloqueia banner',()=>{const empty={...product,id:'p2',estoque:0};const audit=auditBanner(normalizeBanner({id:'b3',produto:'p2',imagem:'x.webp',posicao:'categoria'}),new Map([['p2',empty]]));assert(audit.unavailableProducts.length===1,'indisponibilidade não detectada')});test('cobertura calcula banners faltantes',()=>{const doc={settings:{automatic_positioning:{max_active_per_category:8}},banners:[{id:'b1',categoria:'Mercearia',imagem:'x.webp',posicao:'categoria'}]};const audit=auditBannerDocument(doc,index,['Mercearia']);assert(audit.coverage[0].missing===7,'cobertura incorreta')});test('filtro encontra órfãos',()=>{const rows=[auditBanner(normalizeBanner({id:'b2',produto:'ausente',imagem:'x.webp',posicao:'categoria'}),index)];assert(filterBannerAudits(rows,'','orphan').length===1,'filtro órfão falhou')});out.textContent=results.join('\n');</script></body></html>
