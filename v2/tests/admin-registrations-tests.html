<!doctype html><meta charset="utf-8"><title>Admin registrations tests</title><pre id="out"></pre><script type="module">import{buildRegistrationAudit,filterRegistrationRows}from'../admin/registrations-audit.js';const products=[{categoria:'Alimentos',subcategoria:'Arroz',subsubcategoria:'Branco',marca:'Marca A',fornecedor:'Fornecedor 1',embalagem:'5 kg',tags:['básico','cesta']},{categoria:'Alimentos',subcategoria:'Feijão',marca:'Marca B',fornecedor:'Fornecedor 1',embalagem:'1 kg',tags:'básico,oferta'},{categoria:'Limpeza',subcategoria:'Lavanderia',marca:'Marca A',embalagem:'500 ml',tags:[]}];const audit=buildRegistrationAudit(products);const tests=[['conta categorias',audit.categories.length===2],['conta marcas',audit.brands.find(x=>x.name==='Marca A')?.count===2],['monta hierarquia',audit.hierarchy.find(x=>x.category==='Alimentos')?.subcategories.length===2],['detecta fornecedor ausente',audit.missing.supplier===1],['detecta tags ausentes',audit.missing.tags===1],['busca sem acento',filterRegistrationRows([{name:'Açúcar',count:1}],'acucar').length===1]];document.getElementById('out').textContent=tests.map(([name,ok])=>`${ok?'✓':'✗'} ${name}`).join('\n');if(tests.some(([,ok])=>!ok))throw new Error('Falha nos testes de cadastros auxiliares');</script>
