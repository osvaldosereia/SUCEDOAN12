<!doctype html><meta charset="utf-8"><title>Testes entrega V2</title><pre id="out"></pre><script type="module">import{orderFingerprint,prepareOrderEnvelope,formatWhatsAppMessage}from'../shared/order-delivery.js';const out=document.getElementById('out');const results=[];const test=(name,fn)=>{try{fn();results.push('✅ '+name)}catch(error){results.push('❌ '+name+' — '+error.message)}};const order={ambiente:'homologation',cliente:{nome:'Maria Teste',telefone:'65999999999'},entrega:{logradouro:'Rua A',numero:'10',bairro:'Centro',cidade:'Cuiabá'},pagamento:{tipo:'pix'},itens:[{firebaseKey:'p1',nome:'Arroz',quantidade:2,precoUnitario:10,subtotal:20}],total:20};test('fingerprint é determinístico',()=>{if(orderFingerprint(order)!==orderFingerprint(order))throw new Error('fingerprint mudou')});test('envelope permanece em homologação',()=>{const env=prepareOrderEnvelope(order);if(env.ambiente!=='homologation'||env.canais.whatsapp!=='bloqueado_homologacao')throw new Error('canal liberado')});test('produção é rejeitada',()=>{let ok=false;try{prepareOrderEnvelope({...order,ambiente:'production'})}catch{ok=true}if(!ok)throw new Error('produção aceita')});test('mensagem recebe aviso de homologação',()=>{if(!formatWhatsAppMessage(order).includes('HOMOLOGAÇÃO - NÃO ENVIAR'))throw new Error('aviso ausente')});out.textContent=results.join('\n');</script>
