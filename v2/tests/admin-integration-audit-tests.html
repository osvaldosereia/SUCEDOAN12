<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>Testes integrações V2</title></head><body><pre id="out"></pre><script type="module">import{buildIntegrationRegistry,summarizeIntegrationResults,describeTarget}from'../admin/integration-audit.js';const out=document.getElementById('out'),results=[];const test=(name,fn)=>{try{fn();results.push(`✅ ${name}`)}catch(error){results.push(`❌ ${name}: ${error.message}`)}};const assert=(value,message)=>{if(!value)throw new Error(message)};const registry=buildIntegrationRegistry();test('Firebase aparece configurado',()=>assert(registry.find(item=>item.id==='firebase')?.configured,'Firebase deveria estar configurado'));test('Make permanece sem teste direto',()=>{const make=registry.find(item=>item.id==='make');assert(!make.configured&&make.writesBlocked,'Make deveria permanecer bloqueado')});test('Bling não expõe token',()=>assert(registry.find(item=>item.id==='bling')?.endpoint==='Não armazenado na V2','Bling expôs configuração'));test('resumo identifica integração saudável',()=>{const resultsMap=new Map();for(const check of registry[0].checks)resultsMap.set(`firebase:${check.label}`,{ok:true});const summary=summarizeIntegrationResults(registry,resultsMap);assert(summary.healthy>=1,'saudável não identificado')});test('alvo sensível é mascarado',()=>assert(describeTarget('1234567890abcdef').includes('••••'),'não mascarou'));out.textContent=results.join('\n');</script></body></html>
