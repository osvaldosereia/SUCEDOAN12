<!doctype html><meta charset="utf-8"><title>Checkout tests</title><pre id="out"></pre><script type="module">import{validateCheckout,buildOrderDraft,emptyCheckout}from'../shared/checkout.js';const out=document.getElementById('out');const log=(name,ok)=>out.textContent+=`${ok?'OK':'FALHA'} - ${name}\n`;const summary={total:100,rows:[{product:{id:'1',firebaseKey:'fb1',codigo:'P1',nome:'Produto'},quantity:2,subtotal:100}]};const valid=emptyCheckout();Object.assign(valid.cliente,{nome:'Cliente Teste',telefone:'65999999999'});Object.assign(valid.entrega,{cidade:'Cuiabá',bairro:'Centro',logradouro:'Rua A',numero:'10'});log('rejeita vazio',!validateCheckout(emptyCheckout(),{total:0,rows:[]}).valid);log('aceita dados mínimos válidos',validateCheckout(valid,summary).valid);const order=buildOrderDraft(valid,summary);log('monta pedido sem enviar',order.valid&&order.order.status==='rascunho_homologacao'&&order.order.itens.length===1);log('pedido marcado como homologação',order.order.ambiente==='homologation');</script>
