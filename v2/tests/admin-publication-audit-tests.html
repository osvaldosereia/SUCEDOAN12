<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>Testes publicação V2</title></head><body><pre id="out"></pre><script type="module">import{buildPublicationPlan,publicationChecklist,rollbackPlan,summarizePublicationHistory}from'../admin/publication-audit.js';const out=document.getElementById('out'),results=[];const test=(name,fn)=>{try{fn();results.push(`✅ ${name}`)}catch(error){results.push(`❌ ${name}: ${error.message}`)}};const assert=(value,message)=>{if(!value)throw new Error(message)};test('bloqueia plano com checklist incompleto',()=>{const plan=buildPublicationPlan({files:[{path:'v2/site/index.html'}],checks:publicationChecklist({tests:false,mobile:true,integrations:true,backup:true,review:true})});assert(!plan.ready&&plan.blocking.length===1,'plano deveria estar bloqueado')});test('libera plano somente em homologação',()=>{const checks=publicationChecklist({tests:true,mobile:true,integrations:true,backup:true,review:true});assert(buildPublicationPlan({files:[{path:'v2/site/index.html'}],checks}).ready,'homologação deveria estar pronta');assert(!buildPublicationPlan({environment:'production',files:[{path:'v2/site/index.html'}],checks}).ready,'produção não deve liberar')});test('identifica arquivo sensível',()=>{const plan=buildPublicationPlan({files:[{path:'v2/shared/',risk:'high'}],checks:[]});assert(plan.sensitive.length===1,'risco alto não identificado')});test('rollback nunca é automático',()=>{const rollback=rollbackPlan({targetBranch:'main',files:[{path:'v2/site/index.html'}]});assert(!rollback.automatic&&rollback.requiresApproval,'rollback inseguro')});test('resume histórico',()=>{const summary=summarizePublicationHistory([{id:'1',status:'planned',files:2},{id:'2',status:'rolled_back',files:2}]);assert(summary.total===2&&summary.rolledBack===1,'histórico incorreto')});out.textContent=results.join('\n');</script></body></html>
