<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>Testes pedidos V2</title></head><body><pre id="out"></pre><script type="module">import{auditOrder,auditOrders,filterOrderAudits}from'../admin/order-audit.js';const out=document.getElementById('out'),r=[];const t=(n,f)=>{try{f();r.push('✅ '+n)}catch(e){r.push('❌ '+n+': '+e.message)}};const a=(v,m)=>{if(!v)throw new Error(m)};const base={id:'1',numero:'1',cliente:{nome:'Maria',telefone:'65999999999'},entrega:{cidade:'Cuiabá',bairro:'Centro',logradouro:'Rua A'},itens:[{nome:'Arroz',quantidade:1,separado:false,conferido:false,faltante:false}],integracoes:{whatsapp:true,make:true,bling:true,erro:''}};t('pedido válido',()=>a(auditOrder(base).valid,'deveria ser válido'));t('detecta separação',()=>a(auditOrder({...base,itens:[{...base.itens[0],separado:true}]}).stage==='separated','etapa incorreta'));t('detecta faltante',()=>a(auditOrder({...base,itens:[{...base.itens[0],faltante:true}]}).missing.length===1,'faltante não detectado'));t('detecta integração pendente',()=>a(auditOrder({...base,integracoes:{whatsapp:true,make:false,bling:false,erro:''}}).integrationIssues.length===2,'integrações incorretas'));t('resume pedidos',()=>a(auditOrders([base]).total===1,'total incorreto'));t('filtra alertas',()=>a(filterOrderAudits([auditOrder({...base,integracoes:{whatsapp:false,make:false,bling:false,erro:''}})],'','issues').length===1,'filtro falhou'));out.textContent=r.join('\n');</script></body></html>
