<!doctype html><html lang="pt-BR"><meta charset="utf-8"><title>Testes Compra Rápida V2</title><body><pre id="out"></pre><script type="module">import{normalizeQuickPurchase,resolveQuickPurchase}from'../shared/quick-purchase.js';const out=document.getElementById('out');const log=(name,ok)=>out.textContent+=`${ok?'✓':'✗'} ${name}\n`;const config=normalizeQuickPurchase({titulo:'Teste',secoes:[{id:'a',titulo:'Despensa',itens:[{id:'arroz',titulo:'Arroz',produtos:['1','2','3']}]}]});log('normaliza apenas referências',config.sections[0].items[0].productRefs.join(',')==='1,2,3');const map=new Map([['1',{id:'1',situacao:'A',estoque:3,preco:10}],['2',{id:'2',situacao:'A',estoque:0,preco:5}]]);const result=resolveQuickPurchase(config,map);log('mantém produto válido',result.config.sections[0].items[0].products.length===1);log('ignora referência ausente e sem estoque',result.missing.length===2);log('configuração resolvida permanece utilizável',result.valid===true);const empty=normalizeQuickPurchase({secoes:[]});log('configuração vazia fica sem seções',empty.sections.length===0);</script></body></html>
