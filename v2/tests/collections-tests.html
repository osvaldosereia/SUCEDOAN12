<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>V2 · Testes de coleções</title><style>body{font-family:system-ui;padding:24px}li{margin:8px 0}.ok{color:green}.fail{color:#b42318}</style></head><body><h1>Testes de coleções</h1><ol id="results"></ol><script type="module">import{normalizeBasket,resolveCollection}from'../shared/collections.js';import{createProductIndex,normalizeCatalog}from'../shared/catalog.js';const list=document.getElementById('results');function test(name,fn){const li=document.createElement('li');try{fn();li.textContent=`✓ ${name}`;li.className='ok'}catch(error){li.textContent=`✗ ${name}: ${error.message}`;li.className='fail'}list.appendChild(li)}const products=normalizeCatalog({a:{id:'A',nome:'Produto A',preco:10,estoque:5,situacao:'A'},b:{id:'B',nome:'Produto B',preco:8,estoque:0,situacao:'A'}});const index=createProductIndex(products);test('coleção válida resolve todos os itens',()=>{const basket=normalizeBasket({id:'C1',produtos:[{id:'A',quantidade:2}]});const audit=resolveCollection(basket,index);if(!audit.valid||audit.rows[0].quantidade!==2)throw new Error('coleção deveria ser válida')});test('produto inexistente bloqueia coleção',()=>{const basket=normalizeBasket({id:'C2',produtos:['X']});const audit=resolveCollection(basket,index);if(audit.valid||audit.missing[0]!=='X')throw new Error('produto ausente não detectado')});test('produto sem estoque bloqueia coleção',()=>{const basket=normalizeBasket({id:'C3',produtos:['B']});const audit=resolveCollection(basket,index);if(audit.valid||!audit.unavailable.length)throw new Error('indisponibilidade não detectada')});test('coleção sem produtos é inválida',()=>{const audit=resolveCollection(normalizeBasket({id:'C4',produtos:[]}),index);if(audit.valid)throw new Error('coleção vazia foi aceita')});</script></body></html>
