<!doctype html><meta charset="utf-8"><title>Admin quick purchase audit tests</title><pre id="out"></pre><script type="module">import{auditQuickPurchase,filterQuickSections}from'../admin/quick-purchase-audit.js';const product={id:'p1',nome:'Arroz',preco:10,estoque:5,situacao:'A'},map=new Map([['p1',product]]),config={titulo:'Compra rápida',sections:[{id:'s1',titulo:'Mercearia',items:[{id:'i1',titulo:'Arroz',productRefs:['p1','p2']}]}]};const audit=auditQuickPurchase(config,map);const tests=[['conta seções',audit.sectionCount===1],['conta grupos',audit.groups===1],['detecta referência ausente',audit.missing.length===1],['calcula cobertura',audit.coverage===50],['grupo continua válido com uma opção',audit.emptyItems.length===0],['busca seção',filterQuickSections(audit.sections,'mercearia').length===1],['busca produto',filterQuickSections(audit.sections,'arroz').length===1]];document.getElementById('out').textContent=tests.map(([name,ok])=>`${ok?'✓':'✗'} ${name}`).join('\n');if(tests.some(([,ok])=>!ok))throw new Error('Falha nos testes da Compra rápida');</script>
