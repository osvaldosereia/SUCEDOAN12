  <style>
    :root {
      --bg: #f7f8f5;
      --surface: #ffffff;
      --surface-soft: #f4f6f2;
      --ink: #101828;
      --muted: #667085;
      --muted-2: #98a2b3;
      --line: #e5e7eb;
      --line-strong: #d0d5dd;
      --brand: #14532d;
      --brand-2: #16a34a;
      --danger: #e11d48;
      --warning: #f59e0b;
      --whatsapp: #22c55e;
      --shadow: 0 1px 2px rgba(16, 24, 40, .05), 0 12px 30px rgba(16, 24, 40, .07);
      --radius: 20px;
      --header-h: 126px;
      --bottom-h: 78px;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 0 0, rgba(20, 83, 45, .08), transparent 30%),
        linear-gradient(180deg, #fff 0%, var(--bg) 38%, var(--bg) 100%);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    button, input, select, textarea { font: inherit; }
    button { border: none; background: none; cursor: pointer; touch-action: manipulation; }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    .svg-icon { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2.35; stroke-linecap: round; stroke-linejoin: round; }
    .svg-fill { width: 20px; height: 20px; fill: currentColor; }

    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: calc(var(--header-h) + var(--safe-top));
      padding: calc(12px + var(--safe-top)) 14px 12px;
      z-index: 40;
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(229,231,235,.9);
      box-shadow: 0 8px 28px rgba(16,24,40,.06);
    }
    .header-inner { max-width: 1180px; margin: 0 auto; display: grid; gap: 10px; }
    .header-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .brand-logo { width: 148px; height: 42px; object-fit: contain; }
    .brand-text { display: none; line-height: 1.05; }
    .brand-text strong { display: block; font-size: 14px; font-weight: 950; letter-spacing: -.03em; }
    .brand-text span { display: block; margin-top: 3px; color: var(--muted); font-size: 11px; font-weight: 750; }
    .header-pill { display: inline-flex; align-items: center; gap: 7px; height: 36px; padding: 0 12px; border: 1px solid var(--line); border-radius: 999px; background: #fff; font-size: 12px; font-weight: 850; color: var(--brand); white-space: nowrap; }
    .search-wrap { position: relative; display: flex; align-items: center; }
    .search-wrap > .svg-icon { position: absolute; left: 15px; color: var(--muted); pointer-events: none; }
    .search-input {
      width: 100%; height: 48px;

      border-radius: 999px;
      background: #fff;

      outline: none;
      font-size: 15px;
      font-weight: 650;
      box-shadow: 0 1px 2px rgba(16,24,40,.04);

    .search-clear, .search-submit {

      display: none; align-items: center; justify-content: center;

    .search-submit { right: 46px; background: var(--brand); color: #fff; }
    .search-clear.show, .search-submit.show { display: flex; }

    .app {
      position: fixed;
      top: calc(var(--header-h) + var(--safe-top));
      left: 0; right: 0;
      height: calc(100dvh - var(--header-h) - var(--safe-top));
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px 12px calc(var(--bottom-h) + var(--safe-bottom) + 18px);
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }
    .app::-webkit-scrollbar, .rail::-webkit-scrollbar, .chips::-webkit-scrollbar { display: none; }
    .container { max-width: 1180px; margin: 0 auto; }
    .page-head { display: flex; align-items: center; gap: 10px; margin: 2px 0 12px; }
    .back-btn { width: 38px; height: 38px; border-radius: 999px; background: #fff; border: 1px solid var(--line); display: inline-flex; align-items: center; justify-content: center; }
    .page-title { font-size: 20px; font-weight: 950; letter-spacing: -.035em; line-height: 1.1; }
    .page-subtitle { color: var(--muted); font-size: 13px; font-weight: 700; margin-top: 4px; }

    .hero { background: var(--surface); border: 1px solid var(--line); border-radius: 26px; padding: 18px; box-shadow: var(--shadow); overflow: hidden; }
    .hero-eyebrow { display: inline-flex; align-items: center; gap: 7px; padding: 6px 10px; border-radius: 999px; background: #ecfdf3; color: var(--brand); font-size: 11px; font-weight: 900; margin-bottom: 10px; }
    .hero-title { font-size: 24px; line-height: 1.05; letter-spacing: -.045em; font-weight: 950; }
    .hero-copy { margin-top: 8px; color: var(--muted); font-size: 14px; line-height: 1.45; font-weight: 650; }
    .hero-actions { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; margin-top: 15px; }
    .quick-card { min-height: 76px; border-radius: 20px; border: 1px solid var(--line); background: var(--surface-soft); padding: 12px; display: flex; flex-direction: column; justify-content: space-between; gap: 7px; }
    .quick-card strong { font-size: 14px; font-weight: 950; letter-spacing: -.02em; }
    .quick-card span { color: var(--muted); font-size: 12px; font-weight: 700; line-height: 1.25; }
    .quick-card.primary { background: linear-gradient(135deg, #14532d, #16a34a); color: #fff; border-color: transparent; }
    .quick-card.primary span { color: rgba(255,255,255,.82); }
    .quick-card.danger { background: #fff1f2; color: #9f1239; border-color: #fecdd3; }

    .section { margin-top: 18px; }
    .section-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 14px; margin: 0 2px 10px; }
    .section-title { font-size: 18px; line-height: 1.1; font-weight: 950; letter-spacing: -.035em; }
    .section-caption { font-size: 12.5px; color: var(--muted); font-weight: 700; margin-top: 4px; }
    .see-all { color: var(--brand); font-size: 13px; font-weight: 900; white-space: nowrap; }
    .rail { display: flex; gap: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 1px 1px 4px; scroll-snap-type: x proximity; }
    .rail > * { scroll-snap-align: start; }

    .routine-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
    .routine-card { border: 1px solid var(--line); border-radius: 20px; padding: 13px; min-height: 96px; background: #fff; box-shadow: 0 1px 2px rgba(16,24,40,.03); display: flex; flex-direction: column; justify-content: space-between; }
    .routine-card strong { font-size: 14px; font-weight: 950; letter-spacing: -.02em; }
    .routine-card span { color: var(--muted); font-size: 12px; font-weight: 700; line-height: 1.3; margin-top: 6px; }

    .chips { display: flex; gap: 8px; overflow-x: auto; padding: 1px 1px 9px; -webkit-overflow-scrolling: touch; }
    .chip { display: inline-flex; align-items: center; justify-content: center; height: 34px; padding: 0 13px; border-radius: 999px; border: 1px solid var(--line); background: #fff; color: var(--muted); font-size: 12.5px; font-weight: 850; white-space: nowrap; }
    .chip.active { background: var(--brand); border-color: var(--brand); color: #fff; }

    .product-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
    .product-list { display: grid; gap: 10px; }
    .product-card { background: #fff; border: 1px solid var(--line); border-radius: 20px; overflow: hidden; box-shadow: 0 1px 2px rgba(16,24,40,.04); content-visibility: auto; contain-intrinsic-size: 250px; }
    .product-card.compact { width: 154px; flex: 0 0 154px; }
    .product-imgbox { height: 126px; background: linear-gradient(180deg,#fff,#f8fafc); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #eef2f7; }
    .product-imgbox img { width: 100%; height: 100%; object-fit: contain; padding: 9px; }
    .product-body { padding: 10px; display: grid; gap: 7px; }
    .product-meta { min-height: 15px; color: var(--muted); text-transform: uppercase; letter-spacing: .035em; font-size: 10.5px; font-weight: 850; display: flex; gap: 5px; flex-wrap: wrap; }
    .discount { color: var(--danger); }
    .product-name { min-height: 38px; font-size: 13.6px; line-height: 1.35; font-weight: 800; letter-spacing: -.015em; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; }
    .price-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 8px; }
    .price-wrap { min-width: 0; }
    .old-price { color: var(--muted-2); text-decoration: line-through; font-size: 11px; font-weight: 800; }
    .price { font-size: 18px; font-weight: 950; letter-spacing: -.04em; }
    .add-area { margin-top: 2px; }
    .add-btn, .qty-control { width: 100%; height: 40px; border-radius: 999px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 950; }
    .add-btn { background: var(--ink); color: #fff; box-shadow: 0 7px 18px rgba(15,23,42,.16); }
    .add-btn:disabled { background: #cbd5e1; box-shadow: none; color: #fff; }
    .qty-control { border: 1px solid var(--line-strong); background: #fff; justify-content: space-between; overflow: hidden; }
    .qty-control button { width: 38px; height: 100%; font-size: 18px; font-weight: 950; color: var(--brand); }
    .qty-control span { font-weight: 950; }
    .product-card.list { display: grid; grid-template-columns: 112px 1fr; min-height: 136px; }
    .product-card.list .product-imgbox { height: 100%; border-bottom: none; border-right: 1px solid #eef2f7; }
    .product-card.list .product-name { min-height: 36px; }
    .product-card.list .product-body { padding: 11px; }

    .basket-card { background: #fff; border: 1px solid var(--line); border-radius: 22px; overflow: hidden; box-shadow: 0 1px 2px rgba(16,24,40,.04); }
    .basket-card.compact { width: 190px; flex: 0 0 190px; }
    .basket-imgbox { height: 126px; background: #f8fafc; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #eef2f7; }
    .basket-imgbox img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
    .basket-body { padding: 12px; display: grid; gap: 8px; }
    .basket-name { font-size: 15px; line-height: 1.25; font-weight: 950; letter-spacing: -.02em; min-height: 38px; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; }
    .basket-desc { color: var(--muted); font-size: 12px; font-weight: 700; line-height: 1.35; min-height: 32px; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; }

    .empty, .notice { background: #fff; border: 1px solid var(--line); border-radius: 22px; padding: 24px 18px; text-align: center; color: var(--muted); font-weight: 750; }
    .empty strong { display: block; color: var(--ink); font-size: 17px; font-weight: 950; margin-bottom: 7px; }
    .notice { text-align: left; font-size: 13px; line-height: 1.45; }
    .toast { position: fixed; left: 50%; top: calc(14px + var(--safe-top)); transform: translate(-50%, -150%); z-index: 90; max-width: 92vw; background: var(--brand); color: #fff; padding: 12px 16px; border-radius: 999px; font-size: 14px; font-weight: 900; box-shadow: 0 16px 35px rgba(20,83,45,.28); opacity: 0; transition: transform .25s ease, opacity .25s ease; text-align: center; }
    .toast.show { transform: translate(-50%, 0); opacity: 1; }

    .bottom-bar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 45; height: calc(var(--bottom-h) + var(--safe-bottom)); padding: 6px 10px calc(6px + var(--safe-bottom)); background: rgba(255,255,255,.96); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(229,231,235,.95); box-shadow: 0 -8px 28px rgba(16,24,40,.08); display: flex; align-items: center; gap: 8px; }
    .bottom-nav { flex: 1; min-width: 0; display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; }
    .nav-item { position: relative; height: 58px; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: var(--muted); font-size: 9.5px; font-weight: 850; }
    .nav-item.active { color: var(--brand); background: #ecfdf3; }
    .nav-item .svg-icon { width: 22px; height: 22px; }
    .cart-badge { position: absolute; top: 3px; right: 8px; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 999px; display: none; align-items: center; justify-content: center; background: var(--danger); color: #fff; font-size: 10px; font-weight: 950; border: 2px solid #fff; }
    .checkout-cta { width: 132px; height: 52px; border-radius: 18px; background: linear-gradient(135deg, var(--whatsapp), #16a34a); color: #fff; box-shadow: 0 10px 22px rgba(34,197,94,.26); display: flex; flex-direction: column; align-items: flex-start; justify-content: center; padding: 0 13px; line-height: 1.12; }
    .checkout-cta small { font-size: 10px; text-transform: uppercase; letter-spacing: .03em; font-weight: 850; }
    .checkout-cta strong { font-size: 14px; font-weight: 950; }
    .checkout-cta:disabled { background: #cbd5e1; box-shadow: none; color: #fff; }

    .drawer-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.36); z-index: 58; opacity: 0; pointer-events: none; transition: opacity .2s ease; }
    .drawer-overlay.show { opacity: 1; pointer-events: auto; }
    .drawer { position: fixed; top: 0; right: 0; width: 100%; max-width: 480px; height: 100dvh; background: var(--bg); z-index: 60; transform: translateX(104%); transition: transform .28s cubic-bezier(.2,.8,.2,1); display: flex; flex-direction: column; box-shadow: -18px 0 50px rgba(15,23,42,.18); }
    .drawer.open { transform: translateX(0); }
    .drawer-head { flex: 0 0 auto; padding: calc(18px + var(--safe-top)) 18px 14px; background: rgba(255,255,255,.96); backdrop-filter: blur(16px); border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .drawer-title { font-size: 20px; font-weight: 950; letter-spacing: -.035em; }
    .drawer-close { width: 40px; height: 40px; border-radius: 999px; border: 1px solid var(--line); background: #fff; display: flex; align-items: center; justify-content: center; }
    .drawer-body { overflow-y: auto; padding: 14px 14px calc(26px + var(--safe-bottom)); -webkit-overflow-scrolling: touch; }
    .checkout-section { background: #fff; border: 1px solid var(--line); border-radius: 22px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(16,24,40,.035); }
    .checkout-title { font-size: 16px; font-weight: 950; margin-bottom: 12px; }
    .cart-row { display: grid; grid-template-columns: 64px 1fr auto; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px dashed var(--line); }
    .cart-row:last-child { border-bottom: none; }
    .cart-img { width: 64px; height: 64px; object-fit: contain; border-radius: 14px; background: #f8fafc; border: 1px solid #eef2f7; padding: 4px; }
    .cart-name { font-size: 13px; line-height: 1.3; color: var(--ink); font-weight: 800; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; }
    .cart-price { color: var(--muted); font-size: 12px; font-weight: 800; margin-top: 4px; }
    .cart-qty { display: flex; align-items: center; border: 1px solid var(--line-strong); border-radius: 12px; height: 36px; overflow: hidden; background: #fff; }
    .cart-qty button { width: 32px; height: 100%; font-size: 17px; font-weight: 950; color: var(--brand); }
    .cart-qty span { width: 28px; text-align: center; font-size: 13px; font-weight: 950; }
    .summary-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 10px 0; color: var(--muted); font-size: 14px; font-weight: 800; }
    .summary-row.total { color: var(--ink); border-top: 1px dashed var(--line); padding-top: 13px; margin-top: 13px; font-size: 20px; font-weight: 950; }
    .min-order { display: none; margin-top: 12px; padding: 12px; border-radius: 16px; background: #fffbeb; color: #92400e; border: 1px solid #fde68a; font-size: 13px; font-weight: 850; line-height: 1.35; }
    .checkout-alert { display: none; margin-bottom: 12px; padding: 12px; border-radius: 16px; background: #fff1f2; color: #9f1239; border: 1px solid #fecdd3; font-size: 13px; font-weight: 850; line-height: 1.4; }
    .field { width: 100%; height: 48px; border: 1px solid var(--line-strong); border-radius: 14px; padding: 0 13px; outline: none; background: #fff; margin-bottom: 10px; font-size: 14px; font-weight: 650; }
    .field:focus { border-color: var(--brand); box-shadow: 0 0 0 4px rgba(22,163,74,.10); }
    .field.invalid { border-color: var(--danger); background: #fff1f2; box-shadow: 0 0 0 3px rgba(225,29,72,.10); }
    .field-row { display: flex; gap: 8px; }
    .radio-option { display: flex; align-items: center; gap: 10px; min-height: 46px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 14px; background: #fff; margin-bottom: 8px; font-size: 13px; font-weight: 800; color: var(--ink); }
    .radio-option input { width: 18px; height: 18px; accent-color: var(--brand); }
    .send-btn { width: 100%; min-height: 52px; border-radius: 16px; background: linear-gradient(135deg, var(--whatsapp), #16a34a); color: #fff; display: flex; align-items: center; justify-content: center; gap: 9px; font-size: 15px; font-weight: 950; text-transform: uppercase; box-shadow: 0 10px 24px rgba(34,197,94,.24); }
    .send-btn:disabled { background: #cbd5e1; box-shadow: none; }
    .mini-suggest { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
    .mini-suggest .product-card { width: 132px; flex: 0 0 132px; border-radius: 17px; }
    .mini-suggest .product-imgbox { height: 88px; }
    .mini-suggest .product-name { font-size: 12px; min-height: 32px; }
    .mini-suggest .price { font-size: 15px; }

    .product-detail { background: #fff; border: 1px solid var(--line); border-radius: 26px; overflow: hidden; box-shadow: var(--shadow); }
    .detail-imgbox { height: 280px; background: #f8fafc; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #eef2f7; }
    .detail-imgbox img { width: 100%; height: 100%; object-fit: contain; padding: 18px; }
    .detail-info { padding: 18px; display: grid; gap: 12px; }
    .detail-brand { display: inline-flex; width: max-content; padding: 5px 10px; border-radius: 999px; background: #ecfdf3; color: var(--brand); font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: .04em; }
    .detail-title { font-size: 23px; line-height: 1.14; letter-spacing: -.045em; font-weight: 950; }
    .detail-price { font-size: 31px; font-weight: 950; letter-spacing: -.05em; }
    .desc { color: var(--muted); font-size: 14px; line-height: 1.55; font-weight: 650; }

    @media (min-width: 768px) {
      :root { --header-h: 78px; --bottom-h: 0px; }
      .header { padding: calc(10px + var(--safe-top)) 28px 10px; }
      .header-inner { grid-template-columns: auto 1fr auto; align-items: center; gap: 24px; }
      .brand-logo { width: 160px; height: 44px; }
      .brand-text { display: block; }
      .search-wrap { max-width: 520px; justify-self: center; width: 100%; }
      .header-pill { height: 40px; }
      .app { padding: 24px 24px 32px; }
      .bottom-bar { display: none; }
      .hero { padding: 26px; }
      .hero-title { font-size: 36px; max-width: 640px; }
      .hero-copy { max-width: 640px; }
      .hero-actions { grid-template-columns: repeat(4, minmax(0,1fr)); }
      .routine-grid { grid-template-columns: repeat(4, minmax(0,1fr)); }
      .product-grid { grid-template-columns: repeat(4, minmax(0,1fr)); gap: 14px; }
      .product-card.compact { width: 188px; flex-basis: 188px; }
      .product-imgbox { height: 150px; }
      .product-list { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .drawer { border-radius: 24px 0 0 24px; }
      .product-detail { display: grid; grid-template-columns: 48% 1fr; }
      .detail-imgbox { height: auto; min-height: 440px; border-bottom: none; border-right: 1px solid #eef2f7; }
      .detail-info { padding: 32px; align-content: center; }
      .detail-title { font-size: 30px; }
    }
  </style>

<body>

  <script>
  (function(){
    'use strict';

    const CONFIG = {
      SITE_BASE_URL: 'https://www.donaantonia.com.br',
      PRODUCT_URL: 'https://cedar-chemist-310801-default-rtdb.firebaseio.com/produtos.json',
      MAKE_WEBHOOK_URL: 'https://hook.eu1.make.com/cmjv3cc829ocf26vo1h8fs61n5lkt6hc',
      WHATSAPP_NUMBER: '5565998150975',
      PRODUCT_CACHE_KEY: 'da_produtos_cache_v4',
      PRODUCT_CACHE_MAX_AGE: 1000 * 60 * 20,
      CART_STORAGE_KEY: 'da_carrinho_v1',
      CHECKOUT_CLIENT_KEY: 'da_checkout_cliente_v1',
      MIN_ORDER: 75,
      DEFAULT_DDD: '65'
    };

    const ROUTINES = {
      'compra-mes': { title: 'Compra do mês', subtitle: 'Básicos para encher a despensa', terms: ['arroz','feijao','oleo','acucar','cafe','leite','macarrao','molho','farinha','sal'] },
      'limpeza': { title: 'Limpeza da casa', subtitle: 'Lavanderia, banheiro e cozinha', terms: ['sabao','detergente','desinfetante','amaciante','agua sanitaria','limpa','multiuso','esponja','papel higienico'] },
      'cafe': { title: 'Café da manhã', subtitle: 'Café, leite, achocolatado e biscoitos', terms: ['cafe','leite','nescau','toddy','biscoito','bolacha','margarina','achocolatado','pao'] },
      'higiene': { title: 'Higiene e beleza', subtitle: 'Cuidados pessoais do dia a dia', terms: ['sabonete','shampoo','condicionador','creme dental','desodorante','absorvente','hidratante','escova'] }
    };

    const state = {
      products: [],
      productMap: new Map(),
      cestas: [],
      cart: {},
      cartOrder: [],
      basketCustomizations: {},
      virtualFees: {},
      activeCategory: 'Todos',
      searchQuery: '',
      searchTimer: null,
      isReady: false
    };

    const $ = id => document.getElementById(id);
    const app = $('app');

    function fmt(value) {
      return Number(value || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function norm(value) {
      return String(value || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase()
        .trim();
    }

    function words(value) {
      return norm(value).split(/[^a-z0-9]+/g).filter(Boolean);
    }

    function slug(value) {
      return norm(value).replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
    }

    function parseMoney(value) {
      if (typeof value === 'number') return value;
      const str = String(value || '').trim();
      if (!str) return 0;
      const normalized = str.includes(',') ? str.replace(/\./g, '').replace(',', '.') : str;
      return Number(normalized) || 0;
    }

    function formatName(value) {
      const raw = String(value || 'Produto').trim().replace(/\s+/g, ' ');
      if (!raw) return 'Produto';
      return raw.toLowerCase().replace(/(^|\s|[-/])([a-záéíóúâêôãõç])/g, (m, sep, chr) => sep + chr.toUpperCase()).replace(/\b(kg|g|ml|l|un|und|pct|cx)\b/gi, m => m.toLowerCase());
    }

    function imageFor(raw, product) {
      const val = raw.url_imagem || raw.imagem || raw.image || raw.img || raw.foto || raw.foto_url || raw.urlImagem || raw.imagem_url || '';
      if (typeof val === 'string' && val.trim()) {
        const img = val.trim();
        if (/^(https?:|data:)/i.test(img)) return img;
        if (img.startsWith('../')) return img;
        if (img.startsWith('./')) return img.slice(2);
        if (img.startsWith('/site/')) return img.replace('/site/', '');
        if (img.startsWith('/')) return img.slice(1);
        return img;
      }
      const code = String(product.codigo || product.id || product.firebaseKey || '').trim();
      return code ? `img/produtos/${encodeURIComponent(code)}.webp` : 'img/logoantonia5.png';
    }

    function extractVolume(text) {
      const m = String(text || '').match(/(\d+[\.,]?\d*)\s?(kg|g|ml|l|lt|un|und|pct|cx)\b/i);
      return m ? m[0].replace(',', '.') : '';
    }

    function normalizeProduct(raw, key, index) {
      const name = formatName(raw.nome || raw.name || raw.descricao || 'Produto');
      const id = String(raw.codigo || raw.id || key || index || slug(name)).trim();
      const oldPrice = parseMoney(raw.preco || raw.price || raw.valor || 0);
      const product = {
        id,
        firebaseKey: String(key || raw.firebaseKey || raw.id || raw.codigo || ''),
        codigo: String(raw.codigo || raw.sku || id),
        name,
        slug: slug(name),
        price: oldPrice,
        oldPrice,
        stock: parseInt(raw.estoque, 10) || 0,
        situacao: String(raw.situacao || '').trim(),
        categoria: String(raw.categoria || raw.category || 'Outros').trim() || 'Outros',
        subcategoria: String(raw.subcategoria || '').trim(),
        subsubcategoria: String(raw.subsubcategoria || '').trim(),
        marca: String(raw.marca || '').trim(),
        embalagem: String(raw.embalagem || extractVolume(raw.nome || name)).trim(),
        descricao: String(raw.descricao || raw.description || '').trim(),
        gtin: String(raw.gtin || raw.ean || '').trim(),
        ean: String(raw.ean || raw.gtin || '').trim(),
        gondola: String(raw.gondola || raw['gôndola'] || '').trim(),
        prateleira: String(raw.prateleira || '').trim(),
        localizacao: String(raw.localizacao || '').trim(),
        preco_oferta: parseMoney(raw.preco_oferta || raw.precoOferta || 0),
        validade_oferta: raw.validade_oferta || raw.validadeOferta || '',
        validade: raw.validade || raw.vencimento || '',
        tag_global: raw.tag_global || raw.tagGlobal || raw.tags || raw.tag || raw.global || '',
        rawProduto: raw
      };
      product.img = imageFor(raw, product);
      product.url_imagem = product.img;
      product.searchTokens = buildSearchTokens(product);
      applyProductDiscount(product);
      return product;
    }

    function buildSearchTokens(p) {
      const core = [p.name, p.marca, p.embalagem, p.categoria, p.subcategoria, p.subsubcategoria, p.codigo, p.gtin, p.ean].join(' ');
      const tokens = words(core);
      return { text: norm(core), tokens, code: norm([p.codigo, p.gtin, p.ean].join(' ')) };
    }

    function applyProductDiscount(p) {
      p.discountPercent = 0;
      p.hasExplicitOffer = false;
      p.oldPrice = Number(p.oldPrice || p.price || 0);
      p.price = Number(p.oldPrice || p.price || 0);

      if (p.preco_oferta && p.validade_oferta) {
        const valid = new Date(p.validade_oferta);
        if (!isNaN(valid.getTime()) && valid >= new Date() && p.preco_oferta < p.oldPrice) {
          p.price = p.preco_oferta;
          p.hasExplicitOffer = true;
          p.discountPercent = Math.round(((p.oldPrice - p.price) / Math.max(p.oldPrice, .01)) * 100);
        }
      }
    }

    function isAvailable(p) {
      if (!p) return false;
      if (String(p.situacao || '').toUpperCase() === 'I') return false;
      if (Number(p.stock || 0) <= 0 && !p.isFee) return false;
      if (Number(p.price || 0) <= 0 && !p.isFee) return false;
      return true;
    }

    function readCache(key) {
      try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch(e) { return null; }
    }

    function writeCache(key, data) {
      try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
    }

    async function fetchJson(url, timeoutMs) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs || 6500);
      try {
        const sep = url.includes('?') ? '&' : '?';
        const res = await fetch(`${url}${sep}_=${Date.now()}`, { cache: 'no-store', signal: controller.signal, headers: { Accept: 'application/json' } });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } finally { clearTimeout(timer); }
    }

    function normalizeProducts(raw) {
      const entries = Array.isArray(raw)
        ? raw.map((value, index) => [String(index), value]).filter(([, value]) => value)
        : Object.entries(raw || {});
      const products = entries.map(([key, value], index) => normalizeProduct(value || {}, key, index)).filter(p => String(p.situacao || '').toUpperCase() !== 'I');
      products.sort((a,b) => a.name.localeCompare(b.name, 'pt-BR'));
      state.productMap = new Map(products.map(p => [String(p.id), p]));
      state.products = products;
      rebuildVirtualFees();
    }

    async function loadProducts() {
      const cache = readCache(CONFIG.PRODUCT_CACHE_KEY);
      const freshEnough = cache && cache.savedAt && (Date.now() - Number(cache.savedAt) < CONFIG.PRODUCT_CACHE_MAX_AGE);
      if (cache && cache.data) normalizeProducts(cache.data);
      try {
        if (!freshEnough || !state.products.length) {
          const data = await fetchJson(CONFIG.PRODUCT_URL, 6500);
          normalizeProducts(data);
          writeCache(CONFIG.PRODUCT_CACHE_KEY, { savedAt: Date.now(), data });
        }
      } catch (err) {
        console.error('Erro ao carregar Firebase:', err);
        if (!state.products.length) throw err;
        showToast('Usando produtos salvos. Verifique a conexão depois.');
      }
    }

    async function loadCestas() {
      const urls = ['cestas.json', './cestas.json', 'site/cestas.json'];
      for (const url of urls) {
        try {
          const data = await fetchJson(url, 4500);
          const list = Array.isArray(data) ? data : Object.values(data || {});
          state.cestas = list.filter(c => c && c.id && c.nome && Array.isArray(c.produtos)).map(c => ({
            id: String(c.id),
            nome: String(c.nome || 'Cesta Básica'),
            descricao: String(c.descricao || c.description || 'Kit de produtos selecionados.'),
            imagem: normalizeRelativeImage(c.imagem || c.img || c.url_imagem || 'img/logoantonia5.png'),
            preco: parseMoney(c.preco || c.price || 0),
            precoOriginal: parseMoney(c.precoOriginal || c.preco_original || 0),
            produtos: c.produtos || [],
            validade: c.validade || ''
          }));
          return;
        } catch(e) {}
      }
      state.cestas = [];
    }

    function normalizeRelativeImage(value) {
      const img = String(value || '').trim();
      if (!img) return 'img/logoantonia5.png';
      if (/^(https?:|data:)/i.test(img)) return img;
      if (img.startsWith('./')) return img.slice(2);
      if (img.startsWith('/site/')) return img.replace('/site/', '');
      if (img.startsWith('/')) return img.slice(1);
      return img;
    }

    function loadCart() {
      state.cart = {};
      state.cartOrder = [];
      state.basketCustomizations = {};
      try {
        const saved = JSON.parse(localStorage.getItem(CONFIG.CART_STORAGE_KEY) || 'null');
        if (!saved || typeof saved !== 'object') return;
        const cart = saved.cart && typeof saved.cart === 'object' ? saved.cart : {};
        const order = Array.isArray(saved.cartOrder) ? saved.cartOrder : Object.keys(cart);
        order.concat(Object.keys(cart)).forEach(id => {
          const key = String(id);
          const qty = Math.max(0, parseInt(cart[key], 10) || 0);
          if (qty > 0 && !state.cartOrder.includes(key)) {
            state.cart[key] = qty;
            state.cartOrder.push(key);
          }
        });
        state.basketCustomizations = saved.basketCustomizations && typeof saved.basketCustomizations === 'object' ? saved.basketCustomizations : {};
      } catch(e) { localStorage.removeItem(CONFIG.CART_STORAGE_KEY); }
    }

    function saveCart() {
      writeCache(CONFIG.CART_STORAGE_KEY, {
        savedAt: Date.now(),
        cart: state.cart,
        cartOrder: state.cartOrder,
        basketCustomizations: state.basketCustomizations
      });
    }

    function getProductById(id) {
      const key = String(id);
      return state.productMap.get(key) || state.virtualFees[key] || null;
    }

    function getCartItems() {
      return state.cartOrder.map(id => {
        const product = getProductById(id);
        const qty = Number(state.cart[id] || 0);
        return product && qty > 0 ? { id, product, qty } : null;
      }).filter(Boolean);
    }

    function subtotalCart(includeFees) {
      return getCartItems().reduce((sum, item) => {
        if (!includeFees && item.product.isFee) return sum;
        return sum + Number(item.product.price || 0) * item.qty;
      }, 0);
    }

    function cartCount() {
      return getCartItems().reduce((sum, item) => item.product.isFee ? sum : sum + item.qty, 0);
    }

    function setQty(id, qty, options) {
      const key = String(id);
      const product = getProductById(key);
      if (!product) return;
      const next = Math.max(0, parseInt(qty, 10) || 0);
      if (next <= 0) {
        delete state.cart[key];
        state.cartOrder = state.cartOrder.filter(x => String(x) !== key);
      } else {
        if (!state.cartOrder.includes(key)) state.cartOrder.push(key);
        state.cart[key] = next;
      }
      if (!options || !options.silent) showToast(next > 0 ? 'Produto atualizado na compra.' : 'Produto removido da compra.');
      saveCart();
      updateCartUI();
      syncVisibleCards();
      if ($('checkout-drawer').classList.contains('open')) renderCheckout();
    }

    function addToCart(id, qty) {
      const key = String(id);
      const current = Number(state.cart[key] || 0);
      setQty(key, current + (Number(qty) || 1));
    }

    function removeMissingCartItems() {
      let changed = false;
      Object.keys(state.cart).forEach(id => {
        if (!getProductById(id)) { delete state.cart[id]; changed = true; }
      });
      state.cartOrder = state.cartOrder.filter(id => state.cart[id] && getProductById(id));
      if (changed) saveCart();
    }

    function rebuildVirtualFees() {
      state.virtualFees = {};
      Object.entries(state.basketCustomizations || {}).forEach(([basketId, info]) => {
        const feeId = 'fee_' + basketId;
        state.virtualFees[feeId] = {
          id: feeId,
          name: 'Ajuste de valor da cesta',
          price: Number(info.fee || 0),
          img: 'img/logoantonia5.png',
          isFee: true,
          categoria: 'Cestas',
          stock: 999
        };
      });
    }

    function parseBasketItem(line) {
      const str = String(line || '').trim();
      const m = str.match(/^(\d+)\s*x\s*(.+)$/i);
      if (m) return { qty: Number(m[1] || 1), code: m[2].trim() };
      return { qty: 1, code: str };
    }

    function findProductByCode(code) {
      const wanted = norm(code);
      return state.products.find(p => [p.id, p.codigo, p.firebaseKey, p.gtin, p.ean].some(v => norm(v) === wanted)) || null;
    }

    function addBasketToCart(basketId) {
      const basket = state.cestas.find(c => String(c.id) === String(basketId));
      if (!basket) return;
      let added = 0;
      let sum = 0;
      (basket.produtos || []).forEach(line => {
        const parsed = parseBasketItem(line);
        const p = findProductByCode(parsed.code);
        if (!p || !isAvailable(p)) return;
        const qty = Math.max(1, parsed.qty || 1);
        const key = String(p.id);
        if (!state.cartOrder.includes(key)) state.cartOrder.push(key);
        state.cart[key] = Number(state.cart[key] || 0) + qty;
        sum += Number(p.price || 0) * qty;
        added += qty;
      });
      if (!added) { showToast('Não consegui localizar os itens dessa cesta.'); return; }
      if (basket.preco && basket.preco > sum) {
        const fee = Math.round((basket.preco - sum + Number.EPSILON) * 100) / 100;
        const feeId = 'fee_' + basket.id;
        state.basketCustomizations[basket.id] = { name: basket.nome, changed: false, fee };
        state.virtualFees[feeId] = { id: feeId, name: 'Ajuste de valor da cesta', price: fee, img: basket.imagem || 'img/logoantonia5.png', isFee: true, categoria: 'Cestas', stock: 999 };
        if (!state.cartOrder.includes(feeId)) state.cartOrder.push(feeId);
        state.cart[feeId] = 1;
      }
      saveCart();
      updateCartUI();
      syncVisibleCards();
      showToast(`${basket.nome} adicionada à compra.`);
    }

    function productScore(p, query) {
      const terms = words(query);
      if (!terms.length) return 0;
      const st = p.searchTokens || buildSearchTokens(p);
      let score = 0;
      for (const term of terms) {
        let matched = false;
        const codeExact = [p.codigo, p.gtin, p.ean, p.id].some(v => norm(v) === term);
        if (codeExact) { score += 120; matched = true; }
        if (!matched && st.tokens.some(t => t === term)) { score += 80; matched = true; }
        if (!matched && term.length >= 2 && st.tokens.some(t => t.startsWith(term))) { score += term.length <= 3 ? 55 : 45; matched = true; }
        if (!matched && term.length >= 4 && st.text.includes(term)) { score += 18; matched = true; }
        if (!matched) return 0;
      }
      if (norm(p.name).startsWith(norm(query))) score += 35;
      if (p.discountPercent > 0) score += 5;
      return score;
    }

    function searchProducts(query, options) {
      const available = state.products.filter(p => isAvailable(p));
      const section = options && options.section;
      const pool = section === 'ofertas' ? available.filter(p => Number(p.discountPercent || 0) > 0) : available;
      const q = String(query || '').trim();
      if (!q) return pool;
      return pool
        .map(p => ({ p, score: productScore(p, q) }))
        .filter(x => x.score > 0)
        .sort((a,b) => b.score - a.score || a.p.name.localeCompare(b.p.name, 'pt-BR'))
        .map(x => x.p);
    }

    function productsByRoutine(key, limit) {
      const routine = ROUTINES[key];
      if (!routine) return [];
      const scored = state.products.filter(isAvailable).map(p => {
        const text = p.searchTokens.text;
        let score = 0;
        routine.terms.forEach(term => { if (text.includes(norm(term))) score += 1; });
        return { p, score };
      }).filter(x => x.score > 0).sort((a,b) => b.score - a.score || a.p.price - b.p.price).map(x => x.p);
      return scored.slice(0, limit || 24);
    }

    function getCategories() {
      const count = new Map();
      state.products.filter(isAvailable).forEach(p => count.set(p.categoria, (count.get(p.categoria) || 0) + 1));
      return Array.from(count.entries()).sort((a,b) => b[1] - a[1] || a[0].localeCompare(b[0], 'pt-BR'));
    }

    function getTopOffers(limit) {
      return state.products.filter(p => isAvailable(p) && Number(p.discountPercent || 0) > 0)
        .sort((a,b) => Number(b.discountPercent || 0) - Number(a.discountPercent || 0) || a.price - b.price)
        .slice(0, limit || 12);
    }

    function getCompleteCartSuggestions(limit) {
      const cartCats = new Set(getCartItems().map(i => i.product.categoria).filter(Boolean));
      const already = new Set(Object.keys(state.cart));
      let list = state.products.filter(p => isAvailable(p) && !already.has(String(p.id)));
      if (cartCats.size) list = list.sort((a,b) => (cartCats.has(b.categoria) ? 1 : 0) - (cartCats.has(a.categoria) ? 1 : 0) || a.price - b.price);
      else list = productsByRoutine('compra-mes', 40).filter(p => !already.has(String(p.id)));
      return list.slice(0, limit || 10);
    }

    function productRouteKey(p) {
      return `${encodeURIComponent(p.codigo || p.id)}-${p.slug || slug(p.name)}`;
    }

    function findProductByRoute(value) {
      const raw = decodeURIComponent(String(value || '')).split('?')[0].split('#')[0];
      const possibleCode = raw.split('-')[0];
      const normalized = norm(raw);
      return state.products.find(p => norm(p.codigo) === norm(possibleCode) || norm(p.id) === norm(possibleCode) || norm(productRouteKey(p)) === normalized || p.slug === normalized) || null;
    }

    function fallbackImg(el) {
      el.onerror = null;
      el.src = 'img/logoantonia5.png';
    }
    window.__daFallbackImg = fallbackImg;

    function qtyControlHtml(id, qty) {
      if (qty > 0) {
        return `<div class="qty-control" data-product-qty="${escapeHtml(id)}"><button type="button" data-action="dec" data-id="${escapeHtml(id)}">−</button><span>${qty}</span><button type="button" data-action="inc" data-id="${escapeHtml(id)}">+</button></div>`;
      }
      return `<button class="add-btn" type="button" data-action="add" data-id="${escapeHtml(id)}">Adicionar</button>`;
    }

    function productMetaHtml(p) {
      const parts = [];
      if (p.discountPercent > 0) parts.push(`<span class="discount">-${Math.round(p.discountPercent)}%</span>`);
      if (p.embalagem) parts.push(`<span>${escapeHtml(p.embalagem)}</span>`);
      if (p.marca) parts.push(`<span>${escapeHtml(p.marca)}</span>`);
      return parts.join('<span>•</span>');
    }

    function productCard(p, mode) {
      const id = String(p.id);
      const qty = Number(state.cart[id] || 0);
      const unavailable = !isAvailable(p);
      const classes = ['product-card'];
      if (mode === 'compact') classes.push('compact');
      if (mode === 'list') classes.push('list');
      return `
        <article class="${classes.join(' ')}" data-card-id="${escapeHtml(id)}">
          <a class="product-imgbox" href="#/produto/${productRouteKey(p)}" aria-label="Ver ${escapeHtml(p.name)}">
            <img loading="lazy" decoding="async" src="${escapeHtml(p.img)}" alt="${escapeHtml(p.name)}" onerror="window.__daFallbackImg(this)">
          </a>
          <div class="product-body">
            <div class="product-meta">${productMetaHtml(p) || '&nbsp;'}</div>
            <a class="product-name" href="#/produto/${productRouteKey(p)}">${escapeHtml(p.name)}</a>
            <div class="price-row">
              <div class="price-wrap">
                ${p.oldPrice > p.price ? `<div class="old-price">${fmt(p.oldPrice)}</div>` : ''}
                <div class="price">${fmt(p.price)}</div>
              </div>
            </div>
            <div class="add-area" data-card-controls="${escapeHtml(id)}">${unavailable ? '<button class="add-btn" disabled>Esgotado</button>' : qtyControlHtml(id, qty)}</div>
          </div>
        </article>`;
    }

    function basketCard(cesta, mode) {
      const classes = ['basket-card'];
      if (mode === 'compact') classes.push('compact');
      return `
        <article class="${classes.join(' ')}">
          <div class="basket-imgbox"><img loading="lazy" decoding="async" src="${escapeHtml(cesta.imagem)}" alt="${escapeHtml(cesta.nome)}" onerror="window.__daFallbackImg(this)"></div>
          <div class="basket-body">
            <div class="basket-name">${escapeHtml(cesta.nome)}</div>
            <div class="basket-desc">${escapeHtml(cesta.descricao || 'Kit pronto para facilitar sua compra.')}</div>
            <div class="price-row"><div>${cesta.precoOriginal > cesta.preco ? `<div class="old-price">${fmt(cesta.precoOriginal)}</div>` : ''}<div class="price">${cesta.preco ? fmt(cesta.preco) : 'Ver itens'}</div></div></div>
            <button class="add-btn" type="button" data-action="add-basket" data-id="${escapeHtml(cesta.id)}">Adicionar cesta</button>
          </div>
        </article>`;
    }

    function shelf(title, caption, items, href, type) {
      if (!items || !items.length) return '';
      const cards = items.map(item => type === 'basket' ? basketCard(item, 'compact') : productCard(item, 'compact')).join('');
      return `<section class="section"><div class="section-head"><div><h2 class="section-title">${escapeHtml(title)}</h2>${caption ? `<div class="section-caption">${escapeHtml(caption)}</div>` : ''}</div>${href ? `<a class="see-all" href="${href}">Ver todos</a>` : ''}</div><div class="rail">${cards}</div></section>`;
    }

    function pageHeader(title, subtitle, backHref) {
      return `<div class="page-head">${backHref ? `<a class="back-btn" href="${backHref}"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M19 12H5m7 7l-7-7 7-7"></path></svg></a>` : ''}<div><h1 class="page-title">${escapeHtml(title)}</h1>${subtitle ? `<div class="page-subtitle">${escapeHtml(subtitle)}</div>` : ''}</div></div>`;
    }

      const limpeza = productsByRoutine('limpeza', 10);

    function renderCategories() {
      const cats = getCategories();
      app.innerHTML = `<div class="container">${pageHeader('Categorias', 'Escolha um setor para navegar.', '#/')}
        <div class="routine-grid">${cats.map(([cat, count]) => `<a class="routine-card" href="#/categoria/${encodeURIComponent(cat)}"><strong>${escapeHtml(cat)}</strong><span>${count} produtos disponíveis</span></a>`).join('')}</div></div>`;
      setActiveNav('categorias');
    }

    function renderCategory(cat) {
      const decoded = decodeURIComponent(cat || '');
      const products = state.products.filter(p => isAvailable(p) && p.categoria === decoded);
      const subs = Array.from(new Set(products.map(p => p.subcategoria).filter(Boolean))).sort((a,b) => a.localeCompare(b,'pt-BR'));
      const currentSub = new URLSearchParams(location.hash.split('?')[1] || '').get('sub') || 'Todos';
      const filtered = currentSub === 'Todos' ? products : products.filter(p => p.subcategoria === currentSub);
      const chips = `<div class="chips"><a class="chip ${currentSub === 'Todos' ? 'active' : ''}" href="#/categoria/${encodeURIComponent(decoded)}">Todos</a>${subs.map(s => `<a class="chip ${currentSub === s ? 'active' : ''}" href="#/categoria/${encodeURIComponent(decoded)}?sub=${encodeURIComponent(s)}">${escapeHtml(s)}</a>`).join('')}</div>`;
      app.innerHTML = `<div class="container">${pageHeader(decoded, `${filtered.length} produtos encontrados`, '#/categorias')}${chips}<div class="product-grid">${filtered.map(p => productCard(p)).join('')}</div></div>`;

      updateMeta(`${decoded} - Dona Antônia`, `Compre ${decoded.toLowerCase()} com entrega em Cuiabá e Várzea Grande.`, `/?categoria=${encodeURIComponent(decoded)}`);

    function renderOffers() {
      const products = getTopOffers(200);
      app.innerHTML = `<div class="container">${pageHeader('Ofertas', 'Produtos com desconto disponíveis agora.', '#/')}${products.length ? `<div class="product-grid">${products.map(p => productCard(p)).join('')}</div>` : `<div class="empty"><strong>Sem ofertas no momento</strong>Volte mais tarde ou navegue pelas categorias.</div>`}</div>`;

      updateMeta('Ofertas - Dona Antônia', 'Ofertas de supermercado com entrega em Cuiabá e Várzea Grande.', '/?secao=ofertas');

    function renderRoutine(key) {
      const routine = ROUTINES[key] || ROUTINES['compra-mes'];
      const products = productsByRoutine(key, 200);
      app.innerHTML = `<div class="container">${pageHeader(routine.title, routine.subtitle, '#/')}${products.length ? `<div class="product-grid">${products.map(p => productCard(p)).join('')}</div>` : `<div class="empty"><strong>Nenhum produto encontrado</strong>Use a busca para encontrar o que precisa.</div>`}</div>`;
      setActiveNav('home');

    function renderCestas() {
      app.innerHTML = `<div class="container">${pageHeader('Cestas básicas', 'Escolha um kit pronto e envie pelo WhatsApp.', '#/')}${state.cestas.length ? `<div class="product-grid">${state.cestas.map(c => basketCard(c)).join('')}</div>` : `<div class="empty"><strong>Nenhuma cesta carregada</strong>Confira se o arquivo cestas.json está junto com o index.html.</div>`}</div>`;
      setActiveNav('home');
    }

    function renderSearch(query) {
      const q = String(query || '').trim();
      const products = searchProducts(q);
      app.innerHTML = `<div class="container">${pageHeader(q ? `Busca: ${q}` : 'Busca', q ? `${products.length} resultado(s)` : 'Digite o produto na busca acima.', '#/')}${q ? (products.length ? `<div class="product-list">${products.map(p => productCard(p, 'list')).join('')}</div>` : `<div class="empty"><strong>Nenhum produto encontrado</strong>Não achamos nada para "${escapeHtml(q)}". Tente buscar pelo nome exato, marca ou embalagem.</div>`) : ''}</div>`;
      setActiveNav('home');
    }

    function renderProduct(routeId) {
      const p = findProductByRoute(routeId);
      if (!p) {
        app.innerHTML = `<div class="container">${pageHeader('Produto não encontrado', 'Esse item pode ter saído do estoque.', '#/')}<div class="empty"><strong>Produto indisponível</strong>Volte para a loja e procure outro item.</div></div>`;
        return;
      }
      const related = state.products.filter(x => isAvailable(x) && x.id !== p.id && (x.categoria === p.categoria || x.marca === p.marca)).slice(0, 10);
      app.innerHTML = `<div class="container">${pageHeader('Produto', '', '#/')}

            <div data-card-controls="${escapeHtml(p.id)}">${qtyControlHtml(p.id, Number(state.cart[p.id] || 0))}</div>
            <div class="desc">${escapeHtml(p.descricao || `${p.categoria}${p.subcategoria ? ' • ' + p.subcategoria : ''}${p.embalagem ? ' • ' + p.embalagem : ''}`)}</div>
          </div>
        </article>
        ${shelf('Produtos relacionados', 'Itens parecidos ou da mesma categoria.', related, `#/categoria/${encodeURIComponent(p.categoria)}`)}
      </div>`;
      setActiveNav('home');
      updateMeta(`${p.name} - Dona Antônia`, `Compre ${p.name} com entrega em Cuiabá e Várzea Grande.`, `/?p=${encodeURIComponent(productRouteKey(p))}`);

          <div class="checkout-title">Dona Antônia</div>
          <p class="desc"><strong>Atendimento:</strong> segunda a sábado, das 08h às 18h. Atendimento somente por delivery.</p>

        </section>
      </div>`;
      setActiveNav('home');
    }

    function handleRoute() {
      if (!state.isReady) return;
      const hash = location.hash || '#/';
      const clean = hash.replace(/^#\/?/, '').split('?')[0];
      const parts = clean.split('/').filter(Boolean);
      clearSearchButtonsState();
      if (!parts.length) return renderHome();
      if (parts[0] === 'categorias') return renderCategories();
      if (parts[0] === 'categoria') return renderCategory(parts.slice(1).join('/'));
      if (parts[0] === 'ofertas') return renderOffers();
      if (parts[0] === 'rotina') return renderRoutine(parts[1]);
      if (parts[0] === 'produto') return renderProduct(parts.slice(1).join('/'));
      if (parts[0] === 'cestas') return renderCestas();
      if (parts[0] === 'busca') return renderSearch(state.searchQuery || decodeURIComponent(parts.slice(1).join(' ')));
      if (parts[0] === 'informacoes') return renderInfo();
      return renderHome();
    }

    function clearSearchButtonsState() {
      if ((location.hash || '').startsWith('#/busca')) return;
      const input = $('search-input');
      if (input && !input.matches(':focus')) input.value = state.searchQuery = '';
      updateSearchButtons();
    }

    function updateSearchButtons() {
      const has = !!String($('search-input').value || '').trim();
      $('search-clear').classList.toggle('show', has);
      $('search-submit').classList.toggle('show', has);
    }

    function runInstantSearch() {
      const q = $('search-input').value.trim();
      state.searchQuery = q;
      updateSearchButtons();
      clearTimeout(state.searchTimer);
      state.searchTimer = setTimeout(() => {
        if (q) {
          if (!(location.hash || '').startsWith('#/busca')) history.replaceState(null, '', '#/busca');
          renderSearch(q);
        } else if ((location.hash || '').startsWith('#/busca')) {
          history.replaceState(null, '', '#/');
          renderHome();
        }
      }, 120);
    }

    function clearSearch() {
      $('search-input').value = '';
      state.searchQuery = '';
      updateSearchButtons();
      if ((location.hash || '').startsWith('#/busca')) location.hash = '#/';
      else handleRoute();
    }

    function setActiveNav(name) {
      ['home','categorias','ofertas'].forEach(k => {
        const el = $('nav-' + k);
        if (el) el.classList.toggle('active', k === name);

    }

    function getAgoraCuiaba() {
      return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Cuiaba' }));
    }

    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return d;
    }

    function formatDateValue(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function formatDateLabel(d) {
      return d.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: '2-digit' });
    }

    function agendamentoOptionsHtml() {
      const now = getAgoraCuiaba();
      let first = new Date(now);
      if (now.getHours() >= 10) first = addDays(first, 1);
      const dates = [];
      let cursor = new Date(first);
      while (dates.length < 6) {
        if (cursor.getDay() !== 0) dates.push(new Date(cursor));
        cursor = addDays(cursor, 1);
      }
      return dates.map((d, i) => `<label class="radio-option"><input type="radio" name="agendamento" value="${formatDateValue(d)}" ${i === 0 ? 'checked' : ''}>${i === 0 ? 'Próxima entrega: ' : ''}${formatDateLabel(d)}</label>`).join('');
    }

    function openCheckout() {
      renderCheckout();
      $('drawer-overlay').classList.add('show');
      $('checkout-drawer').classList.add('open');
      $('checkout-drawer').setAttribute('aria-hidden', 'false');
      updateCartUI();
    }

    function closeCheckout() {
      $('drawer-overlay').classList.remove('show');
      $('checkout-drawer').classList.remove('open');
      $('checkout-drawer').setAttribute('aria-hidden', 'true');
    }

    function limparNumeros(value) { return String(value || '').replace(/\D/g, ''); }
    function limparCPF(value) { return limparNumeros(value).slice(0, 11); }
    function formatarCPF(value) {
      const n = limparCPF(value);
      return n.replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2');
    }
    function limparCEP(value) { return limparNumeros(value).slice(0, 8); }
    function formatarCEP(value) { return limparCEP(value).replace(/(\d{5})(\d)/, '$1-$2'); }
    function telefoneSomenteNumeros(value) { return limparNumeros(value).slice(0, 13); }
    function limparTelefone(value) {
      let tel = telefoneSomenteNumeros(value);
      if (tel.length === 13 && tel.startsWith('55')) tel = tel.slice(2);
      if (tel.length === 12 && tel.startsWith('55')) tel = tel.slice(2);
      if (tel.length === 12 && tel.startsWith('0')) tel = tel.slice(1);
      if (tel.length === 10 && /^[1-9]{2}\d{8}$/.test(tel)) tel = tel.slice(0,2) + '9' + tel.slice(2);
      return tel.slice(0, 11);
    }
    function formatarTelefone(value) {
      const n = limparTelefone(value);
      if (n.length <= 2) return n;
      if (n.length <= 6) return `(${n.slice(0,2)}) ${n.slice(2)}`;
      if (n.length <= 10) return `(${n.slice(0,2)}) ${n.slice(2,6)}-${n.slice(6)}`;
      return `(${n.slice(0,2)}) ${n.slice(2,7)}-${n.slice(7,11)}`;
    }
    function telefoneValidoBR(value) { return /^[1-9]{2}9\d{8}$/.test(limparTelefone(value)); }
    function emailValido(value) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(value || '').trim()); }

    function saveCheckoutClient() {
      const ids = ['chk-nome','chk-cpf','chk-telefone','chk-email','chk-cep','chk-cidade','chk-bairro','chk-rua','chk-quadra','chk-casa','chk-frente','chk-pagamento'];
      const dados = {};
      ids.forEach(id => { const el = $(id); if (el) dados[id] = el.value || ''; });
      writeCache(CONFIG.CHECKOUT_CLIENT_KEY, { savedAt: Date.now(), dados });
    }

    function restoreCheckoutClient() {
      const saved = readCache(CONFIG.CHECKOUT_CLIENT_KEY);
      const dados = saved && saved.dados ? saved.dados : {};
      Object.entries(dados).forEach(([id, value]) => { const el = $(id); if (el && !el.value) el.value = value || ''; });
      const cpf = $('chk-cpf'); if (cpf) cpf.value = formatarCPF(cpf.value);
      const tel = $('chk-telefone'); if (tel) tel.value = tel.value ? formatarTelefone(tel.value) : '';
      const cep = $('chk-cep'); if (cep) cep.value = formatarCEP(cep.value);
    }

    function showCheckoutErrors(errors) {
      const alert = $('checkout-alert');
      if (alert) {
        alert.innerHTML = `<strong>Confira antes de enviar:</strong><br>${errors.map(e => '• ' + escapeHtml(e.label)).join('<br>')}`;
        alert.style.display = 'block';
      }
      errors.forEach(e => { const el = $(e.id); if (el) el.classList.add('invalid'); });
      const first = errors.find(e => $(e.id));
      if (first) $(first.id).scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    async function sendOrder(btn) {
      const items = getCartItems();
      if (!items.filter(i => !i.product.isFee).length) return;
      const nome = $('chk-nome').value.trim();
      const cpf = limparCPF($('chk-cpf').value);
      const telefone = limparTelefone($('chk-telefone').value);
      const email = $('chk-email').value.trim().toLowerCase();
      const cep = limparCEP($('chk-cep').value);
      const cidade = $('chk-cidade').value.trim();
      const uf = 'MT';
      const bairro = $('chk-bairro').value.trim();
      const rua = $('chk-rua').value.trim();
      const quadra = $('chk-quadra').value.trim();
      const casa = $('chk-casa').value.trim();
      const frente = $('chk-frente').value.trim();
      const pag = $('chk-pagamento').value;
      const agendamentoObj = document.querySelector('input[name="agendamento"]:checked');
      const dataAgendamento = agendamentoObj ? agendamentoObj.value : '';

      const errors = [
        { id: 'agendamento-options-container', label: 'Data de agendamento', valid: !!dataAgendamento },
        { id: 'chk-nome', label: 'Nome completo', valid: !!nome },
        { id: 'chk-cpf', label: 'CPF válido com 11 números', valid: cpf.length === 11 },
        { id: 'chk-telefone', label: 'Telefone/WhatsApp válido com DDD', valid: telefoneValidoBR(telefone) },
        { id: 'chk-email', label: 'E-mail válido', valid: emailValido(email) },
        { id: 'chk-cep', label: 'CEP válido com 8 números', valid: cep.length === 8 },
        { id: 'chk-cidade', label: 'Cidade', valid: !!cidade },
        { id: 'chk-bairro', label: 'Bairro', valid: !!bairro },
        { id: 'chk-rua', label: 'Rua', valid: !!rua },
        { id: 'chk-casa', label: 'Nº da casa', valid: !!casa },
        { id: 'chk-frente', label: 'Como é a frente da casa', valid: !!frente },
        { id: 'chk-pagamento', label: 'Forma de pagamento', valid: !!pag }
      ].filter(e => !e.valid);
      document.querySelectorAll('.field.invalid').forEach(el => el.classList.remove('invalid'));
      if (errors.length) { showCheckoutErrors(errors); return; }

      saveCheckoutClient();
      btn.disabled = true;
      const original = btn.innerHTML;
      btn.textContent = 'Processando...';

      const orderId = String(Date.now()).slice(-6);
      let itemsTxt = '';
      let totalBruto = 0;
      let totalTaxasExtras = 0;
      const pedidoItens = [];

      items.forEach(({id, product, qty}) => {
        const line = Number(product.price || 0) * qty;
        totalBruto += line;
        if (product.isFee || String(id).startsWith('fee_')) { totalTaxasExtras += line; return; }
        itemsTxt += `${qty}x ${product.name}\n`;
        pedidoItens.push({
          firebaseKey: String(product.firebaseKey || ''),
          sku: String(product.codigo || product.id),
          nome: product.name,
          qtd: qty,
          price: Number(product.price || 0),
          gtin: String(product.gtin || ''),
          ean: String(product.ean || product.gtin || ''),
          url_imagem: String(product.url_imagem || product.img || ''),
          gondola: String(product.gondola || 'Z-Sem Gôndola'),
          prateleira: String(product.prateleira || '-'),
          localizacao: String(product.localizacao || ''),
          categoria: String(product.categoria || ''),
          subcategoria: String(product.subcategoria || ''),
          subsubcategoria: String(product.subsubcategoria || ''),
          marca: String(product.marca || ''),
          embalagem: String(product.embalagem || '')
        });
      });

      const totalSite = Math.round((totalBruto + Number.EPSILON) * 100) / 100;
      const totalProdutosBling = Math.round((pedidoItens.reduce((sum, item) => sum + Number(item.qtd || 0) * Number(item.price || 0), 0) + Number.EPSILON) * 100) / 100;
      const diferencaBling = Math.round((totalSite - totalProdutosBling + Number.EPSILON) * 100) / 100;
      const outrasDespesasBling = diferencaBling > 0 ? diferencaBling : 0;
      const descontoBling = diferencaBling < 0 ? Math.abs(diferencaBling) : 0;
      const hasBasket = Object.keys(state.basketCustomizations || {}).length > 0;
      const pagamentoBling = normalizarPagamentoParaBling(pag);

      const makePayload = {
        pedido: {
          id: orderId,
          itens: pedidoItens,
          total: totalSite,
          totalProdutos: totalProdutosBling,
          outrasDespesasBling,
          descontoBling,
          desconto: 0,
          observacoes: hasBasket ? 'Pedido com Cesta/Kit' : 'Pedido Comum',
          cliente: {
            nome,
            cpf,
            telefone,
            telefoneFormatado: formatarTelefone(telefone),
            celular: telefone,
            email,
            cep,
            cepFormatado: formatarCEP(cep),
            cidade,
            uf,
            bairro,
            rua,
            quadra,
            casa,
            numero: casa,
            complemento: quadra ? `Quadra ${quadra}. ${frente}` : frente,
            frente,
            pagamento: pagamentoBling.nome,
            pagamentoCodigo: pagamentoBling.codigo,
            pagamentoIdBling: pagamentoBling.idBling,
            agendamento: dataAgendamento
          }
        }
      };

      const dadosCliente = `\n*👤 DADOS DO CLIENTE E ENTREGA*\nNome: ${nome}\nCPF: ${formatarCPF(cpf)}\nTelefone/WhatsApp: ${formatarTelefone(telefone)}\nE-mail: ${email}\nEndereço: CEP ${formatarCEP(cep)}, ${cidade}/${uf}, Bairro ${bairro}, Rua ${rua}, Quadra ${quadra || 'S/N'}, Casa ${casa}\nDetalhes: ${frente}\n📅 *Agendamento:* ${dataAgendamento}\n💳 *Pagamento:* ${pagamentoBling.nome}`;
      let basketInfo = '';
      if (hasBasket) {
        basketInfo = '\n------------------------------';
        Object.values(state.basketCustomizations).forEach(info => { basketInfo += `\nCesta/Kit ${info.name || ''} PADRÃO`; });
      }

      let msg;
      if (totalSite >= CONFIG.MIN_ORDER) {
        try {
          await fetch(CONFIG.MAKE_WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(makePayload)
          });
        } catch(err) { console.error('Erro na integração Make:', err); }
        msg = `*PEDIDO #${orderId}*\n------------------------------\n*ITENS SELECIONADOS*\n${itemsTxt}\n*RESUMO DE VALORES*\n💰 *TOTAL:* ${fmt(totalSite)}${basketInfo}\n------------------------------${dadosCliente}\n------------------------------\nOlá, esse é o meu pedido.`;
      } else {
        msg = `*ADICIONAR AO PEDIDO ANTERIOR*\n------------------------------\nOlá! Gostaria de adicionar os itens abaixo ao pedido que fiz anteriormente:\n\n*ITENS ADICIONAIS*\n${itemsTxt}\n*RESUMO DE VALORES*\n💰 *TOTAL DO ACRÉSCIMO:* ${fmt(totalSite)}${basketInfo}\n------------------------------${dadosCliente}\n------------------------------\nPor favor, podem incluir na minha entrega?`;
      }

      abrirWhatsAppPedido(msg);
      state.cart = {};
      state.cartOrder = [];
      state.basketCustomizations = {};
      state.virtualFees = {};
      localStorage.removeItem(CONFIG.CART_STORAGE_KEY);
      updateCartUI();
      syncVisibleCards();
      closeCheckout();
      setTimeout(() => { btn.disabled = false; btn.innerHTML = original; }, 1500);
    }

    function normalizarPagamentoParaBling(pagamento) {
      const codigo = String(pagamento || '').trim().toUpperCase();
      const nomes = {
        DINHEIRO: 'Dinheiro',
        PIX: 'Pix',
        CARTAO_DE_DEBITO: 'Cartão de Débito',
        CARTAO_DE_CREDITO: 'Cartão de Crédito',
        VALE_ALIMENTACAO: 'Vale Alimentação',
        VALE_REFEICAO: 'Vale Refeição'
      };
      return { codigo, nome: nomes[codigo] || pagamento || '', idBling: '' };
    }

    function abrirWhatsAppPedido(mensagem) {
      const texto = encodeURIComponent(mensagem);
      const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const urlMobile = `https://api.whatsapp.com/send?phone=${CONFIG.WHATSAPP_NUMBER}&text=${texto}&type=phone_number&app_absent=0`;
      const urlDesktop = `https://web.whatsapp.com/send?phone=${CONFIG.WHATSAPP_NUMBER}&text=${texto}`;
      if (isMobile) window.location.href = urlMobile;
      else window.open(urlDesktop, '_blank', 'noopener,noreferrer');
    }

    function showToast(message) {
      const el = $('toast');
      el.textContent = message;
      el.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => el.classList.remove('show'), 1800);
    }

    function updateMeta(title, description, path) {
      document.title = title;
      const meta = $('meta-description');
      if (meta) meta.setAttribute('content', description);
      const canonical = document.querySelector('link[rel="canonical"]');
      if (canonical) canonical.setAttribute('href', CONFIG.SITE_BASE_URL + (path || '/'));
    }

    function bindEvents() {
      window.addEventListener('hashchange', () => { handleRoute(); app.scrollTo({ top: 0, behavior: 'auto' }); });
      $('search-input').addEventListener('input', runInstantSearch);
      $('search-form').addEventListener('submit', e => { e.preventDefault(); const q = $('search-input').value.trim(); state.searchQuery = q; if (q) { history.replaceState(null, '', '#/busca'); renderSearch(q); } });
      $('search-clear').addEventListener('click', clearSearch);
      $('bottom-cta').addEventListener('click', openCheckout);
      $('nav-cart').addEventListener('click', openCheckout);
      $('drawer-close').addEventListener('click', closeCheckout);
      $('drawer-overlay').addEventListener('click', closeCheckout);
      document.addEventListener('click', e => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const action = btn.getAttribute('data-action');
        const id = btn.getAttribute('data-id');
        if (action === 'add') addToCart(id, 1);
        if (action === 'inc') addToCart(id, 1);
        if (action === 'dec') setQty(id, Number(state.cart[id] || 0) - 1);
        if (action === 'add-basket') addBasketToCart(id);
      });
      document.addEventListener('input', e => {
        const el = e.target;
        if (!el || !el.id || !el.id.startsWith('chk-')) return;
        if (el.id === 'chk-cpf') el.value = formatarCPF(el.value);
        if (el.id === 'chk-cep') el.value = formatarCEP(el.value);
        if (el.id === 'chk-telefone') {
          const nums = telefoneSomenteNumeros(el.value);
          el.value = nums ? el.value : '';
        }
        el.classList.remove('invalid');
        saveCheckoutClient();
      });
      document.addEventListener('change', e => {
        const el = e.target;
        if (!el || !el.id || !el.id.startsWith('chk-')) return;
        if (el.id === 'chk-telefone') el.value = formatarTelefone(el.value);
        saveCheckoutClient();
      });
      document.addEventListener('click', e => {
        const send = e.target.closest('#btn-send-order');
        if (send) sendOrder(send);
      });
    }

    async function init() {
      bindEvents();
      loadCart();
      updateCartUI();
      try {
        await Promise.all([loadProducts(), loadCestas()]);
        rebuildVirtualFees();
        removeMissingCartItems();
        state.isReady = true;
        handleRoute();
        updateCartUI();
      } catch(err) {
        console.error(err);
        app.innerHTML = `<div class="container"><div class="empty"><strong>Não foi possível carregar os produtos</strong>Verifique a conexão e tente novamente.</div></div>`;
      }
    }

    window.addToCart = addToCart;
    window.openCheckout = openCheckout;
    window.closeCheckout = closeCheckout;
    window.sendOrder = sendOrder;
    window.clearSearch = clearSearch;

    init();
  })();
  </script>
</body>
</html>
