  (function(){
    'use strict';
    window.__DA_PRODUCTION__ = true;

    var originalFetch = window.fetch.bind(window);
    window.fetch = function(input, init){
      var nextInit = init;
      try {
        var url = typeof input === 'string' ? input : String(input && input.url || '');
        var isOrderRequest = url.indexOf('hook.eu1.make.com/cmjv3cc829ocf26vo1h8fs61n5lkt6hc') >= 0 || url.indexOf('firebaseio.com/pedidos/') >= 0;
        if (isOrderRequest && init && typeof init.body === 'string' && init.body.trim().charAt(0) === '{') {
          var payload = JSON.parse(init.body);
          if (payload.pedido) {
            payload.pedido.metadados = payload.pedido.metadados || {};
            payload.pedido.metadados.previewModular = false;
            payload.pedido.metadados.ambiente = 'producao';
          }
          if (payload.metadados) {
            payload.metadados.previewModular = false;
            payload.metadados.ambiente = 'producao';
          }
          if (payload.controle) {
            payload.controle.preview_modular = false;
            payload.controle.ambiente = 'producao';
          }
          if (Array.isArray(payload.historico)) {
            payload.historico = payload.historico.map(function(item){
              var copy = Object.assign({}, item);
              if (copy.usuario === 'site-next') copy.usuario = 'site';
              if (String(copy.observacao || '').indexOf('testes') >= 0) copy.observacao = 'Pedido salvo pela nova versão modular do site.';
              return copy;
            });
          }
          nextInit = Object.assign({}, init, { body: JSON.stringify(payload) });
        }
      } catch (error) {
        console.warn('Não foi possível normalizar o ambiente do pedido:', error);
      }
      return originalFetch(input, nextInit);
    };
