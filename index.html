<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catálogo Ultramoderno</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-main: #1a1a1a;
            --accent: #000000;
            --radius-img: 16px;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #e0e0e0; /* Fundo escuro fora do app mobile */
            display: flex;
            justify-content: center;
        }

        /* Container que simula a tela do celular */
        .app-container {
            width: 100%;
            max-width: 414px; /* Largura padrão iPhone Max */
            min-height: 100vh;
            background-color: var(--bg-color);
            position: relative;
            overflow-x: hidden;
            padding-bottom: 100px; /* Espaço pro FAB */
        }

        /* Cestas Básicas Placeholder */
        .hero-section {
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin-bottom: 20px;
            height: 200px;
            display: flex;
            align-items: flex-end;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
        }
        .hero-section h1 {
            font-weight: 300;
            font-size: 24px;
            color: var(--text-main);
        }

        /* Lista de Categorias */
        .catalog-container {
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* O Card Horizontal Estreito */
        .category-chip {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            cursor: pointer;
            background: transparent;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 8px;
        }
        
        .chip-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .chip-left img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
        }

        .chip-title {
            font-weight: 400;
            font-size: 16px;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .arrow-icon {
            font-size: 12px;
            transition: transform 0.3s ease;
        }
        .category-chip.active .arrow-icon {
            transform: rotate(180deg);
        }

        /* Carrossel Minimalista */
        .carousel-wrapper {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
        }
        .carousel-wrapper.open {
            max-height: 800px; /* Valor alto para acomodar o conteúdo */
            opacity: 1;
            margin-top: 8px;
            margin-bottom: 16px;
        }

        .carousel {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 10px;
            padding-bottom: 10px; /* Espaço para a gaveta não cortar */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .carousel::-webkit-scrollbar {
            display: none;
        }

        /* Produto: A Regra do 2,2 (42% de largura do container) */
        .product-card {
            flex: 0 0 42%;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
        }

        .image-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--radius-img);
        }

        /* Elementos flutuantes na imagem */
        .price-tag {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 4px 8px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            color: var(--accent);
            border: 1px solid var(--glass-border);
        }

        .action-control {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            height: 32px;
            min-width: 32px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .action-control span.plus {
            font-size: 18px;
            font-weight: 300;
        }

        .action-control.expanded {
            min-width: 80px;
            justify-content: space-between;
            padding: 0 8px;
            background: var(--accent);
            color: #fff;
        }
        
        .action-control.expanded .qty-btn {
            font-size: 16px;
            padding: 0 4px;
        }
        
        .action-control.expanded .qty-number {
            font-weight: 600;
            font-size: 14px;
        }

        /* A Gaveta Mágica (Progressive Disclosure) */
        .product-details-drawer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
            background: transparent;
            padding: 0 4px;
        }

        .product-details-drawer.open {
            max-height: 100px;
            padding: 8px 4px 0 4px;
        }

        .product-name {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-main);
            line-height: 1.2;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-validity {
            font-size: 11px;
            font-weight: 600;
            color: #757575;
        }

        /* O FAB (Floating Action Button) do Carrinho */
        .fab-cart {
            position: fixed;
            bottom: 30px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background-color: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 1000;
            transition: transform 0.2s;
        }
        .fab-cart:active {
            transform: scale(0.95);
        }
        .fab-cart svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

    </style>
</head>
<body>

<div class="app-container">
    
    <div class="hero-section">
        <h1>Cestas<br>Básicas</h1>
    </div>

    <div class="catalog-container" id="catalog">
        </div>

    <div class="fab-cart" onclick="alert('Abrindo modal de finalização...')">
        <svg viewBox="0 0 24 24">
            <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
        </svg>
    </div>

</div>

<script>
    // SIMULAÇÃO DO SEU ARQUIVO palavra.json
    // O sistema lerá isso para montar as "categorias imaginárias"
    const database = [
        {
            palavra: "Café da Manhã",
            produtos: [
                { id: 1, nome: "Geleia Premium de Frutas Vermelhas Importada", preco: "R$ 34,90", validade: "12/08/2026", img: "https://images.unsplash.com/photo-1582293041079-7814c2f12063?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" },
                { id: 2, nome: "Pão de Forma Artesanal Fermentação Natural", preco: "R$ 18,50", validade: "05/03/2026", img: "https://images.unsplash.com/photo-1509440159596-0249088772ff?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" },
                { id: 3, nome: "Café em Grãos Torra Escura 500g", preco: "R$ 42,00", validade: "20/12/2026", img: "https://images.unsplash.com/photo-1559525839-b184a4d698c7?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" },
                { id: 4, nome: "Leite de Amêndoas Orgânico 1L", preco: "R$ 21,90", validade: "15/05/2026", img: "https://images.unsplash.com/photo-1563636619-e9143da7973b?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" }
            ]
        },
        {
            palavra: "Sexta à Noite",
            produtos: [
                { id: 5, nome: "Vinho Tinto Cabernet Sauvignon Reserva", preco: "R$ 89,90", validade: "Indeterminada", img: "https://images.unsplash.com/photo-1584916201218-f4242ceb4809?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" },
                { id: 6, nome: "Queijo Brie Maturado Peça 250g", preco: "R$ 45,00", validade: "10/04/2026", img: "https://images.unsplash.com/photo-1486297678162-eb2a19b0a32d?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" },
                { id: 7, nome: "Presunto Parma Fatiado 100g", preco: "R$ 38,50", validade: "22/03/2026", img: "https://images.unsplash.com/photo-1603048297172-c92544798d5e?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" }
            ]
        },
        {
            palavra: "Banho e SPA",
            produtos: [
                { id: 8, nome: "Shampoo Darling Ceramidas Força & Brilho 350ml", preco: "R$ 15,90", validade: "01/10/2027", img: "https://images.unsplash.com/photo-1620916566398-39f1143ab7be?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" },
                { id: 9, nome: "Sabonete Líquido Lavanda e Mel", preco: "R$ 22,90", validade: "15/11/2027", img: "https://images.unsplash.com/photo-1608248543803-ba4f8c70ae0b?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" }
            ]
        }
    ];

    const catalogContainer = document.getElementById('catalog');

    // Função para renderizar tudo na tela
    function renderApp() {
        database.forEach((categoria, index) => {
            // Pega a foto do primeiro produto
            const firstProductImg = categoria.produtos[0].img;

            // Cria o wrapper do chip + carrossel
            const section = document.createElement('div');
            
            // Cria os Cards dos Produtos (Carrossel)
            let productsHTML = '';
            categoria.produtos.forEach(prod => {
                productsHTML += `
                    <div class="product-card">
                        <div class="image-container">
                            <img src="${prod.img}" alt="${prod.nome}">
                            <div class="price-tag">${prod.preco}</div>
                            
                            <div class="action-control" id="control-${prod.id}" onclick="toggleQuantity(event, ${prod.id})">
                                <span class="plus">+</span>
                            </div>
                        </div>
                        
                        <div class="product-details-drawer" id="drawer-${prod.id}">
                            <div class="product-name">${prod.nome}</div>
                            <div class="product-validity">Validade: ${prod.validade}</div>
                        </div>
                    </div>
                `;
            });

            // Estrutura HTML do Chip + Carrossel
            section.innerHTML = `
                <div class="category-chip" onclick="toggleCarousel(this, 'carousel-${index}')">
                    <div class="chip-left">
                        <img src="${firstProductImg}" alt="${categoria.palavra}">
                        <h2 class="chip-title">${categoria.palavra}</h2>
                    </div>
                    <span class="arrow-icon">▼</span>
                </div>
                
                <div class="carousel-wrapper" id="carousel-${index}">
                    <div class="carousel">
                        ${productsHTML}
                    </div>
                </div>
            `;

            catalogContainer.appendChild(section);
        });
    }

    // Função para expandir/recolher o carrossel (O Acordeão)
    window.toggleCarousel = function(chipElement, carouselId) {
        chipElement.classList.toggle('active');
        const carousel = document.getElementById(carouselId);
        carousel.classList.toggle('open');
    };

    // Função mágica do botão +
    window.toggleQuantity = function(event, productId) {
        // Evita que o clique "vaze" e feche algo sem querer
        event.stopPropagation();
        
        const control = document.getElementById(`control-${productId}`);
        const drawer = document.getElementById(`drawer-${productId}`);

        // Se ainda não foi expandido (primeiro clique no +)
        if (!control.classList.contains('expanded')) {
            control.classList.add('expanded');
            control.innerHTML = `
                <span class="qty-btn" onclick="updateQty(event, ${productId}, -1)">-</span>
                <span class="qty-number" id="qty-${productId}">1</span>
                <span class="qty-btn" onclick="updateQty(event, ${productId}, 1)">+</span>
            `;
            // Abre a gaveta de informações ocultas (Nome e Validade)
            drawer.classList.add('open');
        }
    };

    // Função para gerenciar a quantidade dentro do botão expandido
    window.updateQty = function(event, productId, change) {
        event.stopPropagation(); // Não deixa fechar
        
        const qtyElement = document.getElementById(`qty-${productId}`);
        let currentQty = parseInt(qtyElement.innerText);
        let newQty = currentQty + change;

        if (newQty <= 0) {
            // Se zerar, volta o botão ao estado original (apenas "+") e fecha a gaveta
            const control = document.getElementById(`control-${productId}`);
            const drawer = document.getElementById(`drawer-${productId}`);
            
            control.classList.remove('expanded');
            control.innerHTML = `<span class="plus">+</span>`;
            drawer.classList.remove('open');
        } else {
            // Atualiza o número na tela
            qtyElement.innerText = newQty;
        }
    };

    // Inicia o app
    renderApp();

</script>

</body>
</html>
