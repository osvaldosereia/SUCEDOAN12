<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Super Cestas Básicas Dona Antônia - Qualidade e preço justo.">
<meta name="theme-color" content="#ffffff">
<title>Super Cestas Básicas Dona Antônia</title>
<style>
:root {
    --c-p: #0f172a;      
    --c-s: #334155;      
    --c-t: #64748b;      
    --c-a: #ea580c;      
    --c-ok: #15803d;     
    --c-err: #dc2626;    
    --c-bg: #ffffff;     /* Fundo totalmente branco */
    --c-surf: #ffffff;   
    --c-bd: #f1f5f9;     /* Linhas muito claras */
    --font: 'Inter', system-ui, sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;outline:none;margin:0;padding:0;}
body{font-family:var(--font);background:var(--c-bg);color:var(--c-p);height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
img{user-select:none;} 
button{cursor:pointer;border:none;background:0 0;font-family:inherit;font-weight:600}

/* LAYOUT E PALCO CENTRAL */
.layout-limit { width: 100%; max-width: 1200px; margin: 0 auto; position: relative; }
.main-stage{flex:1;position:relative;display:block;overflow-y:auto;overflow-x:hidden;background:var(--c-bg);padding-bottom:120px; scroll-behavior:auto;}
.page-section { width: 100%; max-width: 1200px; margin-left: auto; margin-right: auto; }
.section-title { font-size: 1.2rem; font-weight: 900; color: var(--c-p); padding: 25px 20px 15px; text-transform: uppercase; letter-spacing: -0.5px;}

/* GRADES CESTAS (Mantido como solicitado) */
.grid-wrapper, .grid-produtos { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 5px 20px 25px; width: 100%; align-content: start; }
@media(min-width: 800px) { .grid-wrapper, .grid-produtos { grid-template-columns: repeat(5, 1fr); gap: 15px; } }
@media(max-width:600px){ .grid-wrapper, .grid-produtos { gap: 10px; padding: 5px 15px 25px; } .section-title { padding: 25px 15px 15px; } }

.u-card{ background:var(--c-surf); border-radius:16px; border:1px solid var(--c-bd); display:flex;flex-direction:column; position:relative; height: 100%; }
.u-img-area{width:100%;aspect-ratio:1;background:#fff;position:relative;overflow:hidden;border-bottom:1px solid var(--c-bd); border-radius: 16px 16px 0 0;}
.u-img-cesta{width:100%;height:100%;object-fit:cover;}
.u-info{padding:10px;display:flex;flex-direction:column;gap:4px;flex:1;}
.u-name{font-size:0.75rem; font-weight:700; color:var(--c-p); line-height:1.2; display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden; min-height:3.6em; flex-grow: 1; }
.u-price{font-size:1.05rem;font-weight:900;color:var(--c-a);letter-spacing:-0.5px;}
.btn-big-action{ width:100%; background:var(--c-p); color:#fff; padding:10px 8px; border-radius:10px; font-weight:800; font-size:0.75rem; display:flex; align-items:center; justify-content:center; margin-top:5px; }

/* ==========================================
   NOVO SISTEMA: ACORDEÃO E CHIPS DE BUSCA
   ========================================== */
.acc-list { display: flex; flex-direction: column; }
.acc-item { border-bottom: 1px solid var(--c-bd); background: #fff; }
.acc-header { display: flex; align-items: center; padding: 12px 20px; cursor: pointer; transition: background 0.2s; }
.acc-header:active { background: #f8fafc; }
.acc-header img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; margin-right: 15px; border: 1px solid var(--c-bd); }
.acc-title { flex: 1; font-weight: 800; font-size: 1.1rem; color: var(--c-p); text-transform: capitalize; }
.acc-icon { width: 24px; height: 24px; color: var(--c-t); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.acc-item.open .acc-icon { transform: rotate(180deg); color: var(--c-p); }
.acc-body { display: none; padding: 15px 0 20px 0; background: #fff; border-top: 1px dashed var(--c-bd); }
.acc-item.open .acc-body { display: block; animation: fadeIn 0.3s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

/* ==========================================
   CARROSSEL 2.2 ITENS E CARD LIMPO
   ========================================== */
.carousel-track { display: flex; overflow-x: auto; gap: 8px; padding: 0 20px; scroll-snap-type: x mandatory; }
.carousel-track::-webkit-scrollbar { display: none; }

.clean-card { 
    flex: 0 0 calc(100vw / 2.3); /* Aproximadamente 2.2 na tela considerando os paddings */
    scroll-snap-align: start; 
    display: flex; flex-direction: column; 
}
@media(min-width: 600px) { .clean-card { flex: 0 0 160px; } }

.clean-img-wrap { 
    position: relative; width: 100%; aspect-ratio: 1; 
    border-radius: 12px; overflow: hidden; background: #fff; 
    border: 1px solid var(--c-bd); cursor: pointer;
}
.clean-img { width: 100%; height: 100%; object-fit: contain; mix-blend-mode: multiply; padding: 4px; }

.clean-img-overlay { 
    position: absolute; bottom: 8px; left: 8px; right: 8px; 
    display: flex; justify-content: space-between; align-items: center; 
}
.clean-price-tag { 
    background: rgba(255,255,255,0.95); backdrop-filter: blur(4px); 
    padding: 4px 8px; border-radius: 8px; font-weight: 900; font-size: 0.9rem; color: var(--c-p); 
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.clean-add-btn { width: 32px; height: 32px; border-radius: 50%; background: var(--c-p); color: #fff; font-size: 1.4rem; font-weight: 400; display: flex; align-items: center; justify-content: center; line-height: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.clean-add-btn:active { transform: scale(0.9); }
.clean-qty-box { display: flex; align-items: center; background: var(--c-ok); border-radius: 16px; height: 32px; padding: 0 2px; color: #fff; box-shadow: 0 2px 5px rgba(21,128,61,0.2); animation: popIn 0.2s ease-out; }
.clean-qty-btn { width: 26px; height: 26px; background: transparent; border: none; color: #fff; font-weight: 700; font-size: 1.1rem; display: flex; align-items: center; justify-content: center;}
.clean-qty-val { font-weight: 900; font-size: 0.9rem; min-width: 18px; text-align: center; }

/* Aba Retrátil Abaixo da Imagem */
.clean-details { margin-top: 6px; padding: 8px; background: #f8fafc; border-radius: 8px; display: none; border: 1px solid var(--c-bd); }
.clean-details.show { display: block; animation: slideDown 0.2s ease-out; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
.clean-details-name { font-size: 0.75rem; font-weight: 600; color: var(--c-p); line-height: 1.2; text-align: left;}
.clean-details-val { font-size: 0.65rem; color: var(--c-t); margin-top: 4px; font-weight: 500;}

/* CARRINHO FLUTUANTE DIREITO */
.fab-cart { position: fixed; bottom: 30px; right: 20px; width: 64px; height: 64px; background: var(--c-p); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 25px rgba(15,23,42,0.3); z-index: 1000; cursor: pointer; transition: transform 0.2s; border: 2px solid #fff; }
.fab-cart:active { transform: scale(0.9); }
.fab-cart svg { width: 28px; height: 28px; }
.cart-badge { position: absolute; top: -2px; right: -2px; background: var(--c-err); color: #fff; font-size: 0.75rem; font-weight: 900; min-width: 24px; height: 24px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; padding: 0 4px; display: none; }

/* MODAIS & OUTROS */
dialog{border:none;border-radius:24px;width:92%;max-width:420px;padding:0;box-shadow:0 25px 50px -12px rgba(0,0,0,0.4);background:#fff;animation:modalPop .2s}
dialog::backdrop{background:rgba(15,23,42,0.85);backdrop-filter:blur(4px)}
@keyframes modalPop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.modal-body{padding:25px 20px;text-align:center; position:relative;}
.btn-close-modal { position: absolute; top: 15px; right: 15px; width: 32px; height: 32px; background: #f1f5f9; border-radius: 50%; color: var(--c-p); font-weight: 800; font-size: 1rem; display: flex; align-items: center; justify-content: center; border: 1px solid var(--c-bd); z-index: 10; transition: background 0.2s; cursor: pointer; }

#modal-checkout, #modal-quick-view { margin: auto auto 0 auto; border-radius: 24px 24px 0 0; width: 100%; max-width: 600px; animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
#modal-checkout { height: 90dvh; max-height: 90dvh; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
#modal-checkout .modal-body { height: 100%; display: block; overflow-y: auto; padding: 25px 20px max(20px, env(safe-area-inset-bottom)); text-align: left; }
.chk-list-area { background: #fff; border: 1px solid var(--c-bd); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
.chk-item-simple { display: flex; justify-content: flex-start; align-items: flex-start; font-size: 0.9rem; color: var(--c-p); padding: 10px 0; border-bottom: 1px dashed var(--c-bd); gap: 10px;}
.chk-item-simple:last-child { border-bottom: none; }
.chk-item-qtd { color: var(--c-a); font-weight: 800; min-width: 25px; text-align: right;}
.chk-item-name { font-weight: 500; text-align: left; flex: 1; line-height: 1.3;}
#btn-send-order { background: #25D366; color: #fff; font-size: 1.05rem; padding: 16px; border-radius: 14px; width: 100%; font-weight: 800; display:flex; align-items:center; justify-content:center; border:none; cursor:pointer; }
.btn-checkout-secondary { width: 100%; padding: 12px; background: transparent; border: none; color: var(--c-s); font-weight: 700; font-size: 0.95rem; margin-top: 5px; cursor: pointer; }
.btn-modal{width:100%;padding:14px;border-radius:12px;font-weight:800;margin-bottom:10px;font-size:1rem; display:flex; align-items:center; justify-content:center; gap:8px; cursor: pointer; background:var(--c-p);color:#fff;}
#toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 400px; pointer-events: none; }
.toast { padding: 12px 20px; color: #fff; border-radius: 12px; font-weight: 700; font-size: 0.9rem; text-align: center; animation: toastPop 0.3s ease-out; pointer-events: auto; }
@keyframes toastPop { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>
</head>
<body>

<main class="main-stage" id="scroll-stage">
    
    <div id="section-cestas" class="page-section" style="display:none; padding-top:15px;">
        <div class="section-title">Cestas Básicas</div>
        <div class="grid-wrapper" id="grid-cestas"></div>
    </div>

    <div id="section-cesta-ativa" class="page-section" style="display:none; background: #f8fafc; padding: 15px 0; border-top: 1px solid var(--c-bd); border-bottom: 1px solid var(--c-bd);">
        <div class="section-title" style="color:var(--c-a); padding-top:0; padding-bottom:5px;">Sua Cesta</div>
        <div class="layout-limit" style="padding: 0 20px 10px; font-size:0.85rem; color:var(--c-s); font-weight:500;">Adicione ou edite as quantidades abaixo:</div>
        <div class="grid-produtos" id="grid-cesta-ativa"></div>
    </div>

    <div id="section-termos" class="page-section acc-list"></div>

</main>

<div class="fab-cart" onclick="openCheckout()">
    <div class="cart-badge" id="badge-count">0</div>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
</div>

<div id="toast-container"></div>

<dialog id="modal-quick-view">
    <div class="modal-body" style="padding: 30px 20px 25px max(20px, env(safe-area-inset-bottom));">
        <button class="btn-close-modal" onclick="this.closest('dialog').close()">✕</button>
        <div style="display:flex; justify-content:center; margin-bottom: 20px;">
            <img id="qv-img" src="" style="width: 270px; height: 270px; object-fit: contain; mix-blend-mode: multiply;">
        </div>
        <h3 id="qv-name" data-id="" style="font-size: 1.2rem; font-weight: 700; color: var(--c-p); margin-bottom: 8px; line-height: 1.2;"></h3>
        <div id="qv-price" style="font-size: 1.4rem; font-weight: 900; color: var(--c-a); margin-bottom: 25px;"></div>
        <div id="qv-action-area"></div>
    </div>
</dialog>

<dialog id="modal-checkout">
    <div class="modal-body">
        <button class="btn-close-modal" onclick="this.closest('dialog').close()">✕</button>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--c-bd); padding-bottom: 10px;">
            <h3 style="text-transform:uppercase; font-weight:900; color:var(--c-p); margin:0;">Seu Pedido</h3>
        </div>
        <div class="chk-list-area" id="chk-list"></div>
        <div style="text-align:right; margin-bottom:15px; border-top: 1px dashed var(--c-bd); padding-top: 15px;">
            <div style="font-size:0.85rem; font-weight:700; color:var(--c-s); text-transform:uppercase;">Total a pagar</div>
            <div style="font-size:2.2rem;font-weight:900; color:var(--c-p); line-height:1.1;" id="chk-total"></div>
        </div>
        <button id="btn-send-order" onclick="sendOrder()">ENVIAR PEDIDO NO WHATSAPP</button>
        <div style="display: flex; gap: 10px; align-items: center; margin-top: 10px;">
            <button class="btn-checkout-secondary" style="margin: 0; flex: 1;" onclick="$('modal-checkout').close()">Continuar Comprando</button>
        </div>
    </div>
</dialog>

<script>
const $=i=>document.getElementById(i);
const STATE={
    baskets:[], prods:[], termos:[], cart:{}, cartOrder:[], 
    openAccordions: new Set(),
    baseBasket:null, basketExtraFee:0
};

async function init(){
    try{
        const[r1,r2,r3]=await Promise.all([
            fetch('/site/produtos-cesta-basica.json?v='+Date.now()).catch(()=>({ok:false})),
            fetch('/site/produtos.json?v='+Date.now()).catch(()=>({ok:false})),
            fetch('/site/termos.json?v='+Date.now()).catch(()=>({ok:false}))
        ]);
        if(r1.ok) STATE.baskets = await r1.json();
        if(r2.ok){
            let t=(await r2.text()).trim().replace(/,(\s+)?$/,"");
            let raw = JSON.parse(t.startsWith('[')?t:'['+t+']');
            STATE.prods = raw.filter(x=>x.situacao==="A").map(p=>({
                id:String(p.codigo||p.id), name:p.nome, price:parseFloat(p.preco),
                stock:parseInt(p.estoque)||0, validade: p.validade || null,
                img:`/site/img/produtos/${p.codigo||p.id}.webp`
            }));
        }
        if(r3&&r3.ok) STATE.termos = await r3.json();
        else STATE.termos = ["Arroz", "Feijão", "Café", "Óleo", "Leite", "Biscoito", "Sabão", "Detergente", "Sabonete", "Papel"];

        renderHome();
        updateTotals(); 
    }catch(e){
        $('scroll-stage').innerHTML='<p style="padding:20px;text-align:center;color:red;font-weight:bold;">Erro na leitura dos arquivos.</p>';
    }
}

function renderHome() {
    if(STATE.baskets.length > 0) {
        $('section-cestas').style.display = 'block';
        $('grid-cestas').innerHTML = STATE.baskets.map(item => `<div class="u-card"><div class="u-img-area"><img src="${item.imagem}" class="u-img-cesta" loading="lazy"></div><div class="u-info"><div class="u-name">${formatName(item.nome)}</div><div class="u-price">${fmt(item.preco)}</div><button class="btn-big-action" onclick="confirmBasket('${item.id}')">SELECIONAR CESTA</button></div></div>`).join('');
    }
    
    if(STATE.cartOrder.length > 0) { 
        $('section-cesta-ativa').style.display = 'block'; 
        $('grid-cesta-ativa').innerHTML = STATE.cartOrder.map(id => {
            const p = STATE.prods.find(x => x.id === id);
            return `<div class="chk-item-simple"><span class="chk-item-qtd" style="font-size:1.1rem; padding-right:10px;">${STATE.cart[id]}x</span><span class="chk-item-name">${formatName(p.name)}</span></div>`;
        }).join('');
    } else {
        $('section-cesta-ativa').style.display = 'none';
    }

    renderTermos();
}

function renderTermos() {
    if (!STATE.termos || STATE.termos.length === 0) return;
    
    let html = '';
    STATE.termos.forEach((termo, index) => {
        let matchedProds = STATE.prods.filter(p => p.name.toLowerCase().includes(termo.toLowerCase()));
        
        if (matchedProds.length > 0) {
            let firstImg = matchedProds[0].img;
            
            let carouselHtml = matchedProds.map(p => {
                const q = STATE.cart[p.id] || 0;
                
                let ctrl = q > 0 
                    ? `<div class="clean-qty-box"><button class="clean-qty-btn" onclick="event.stopPropagation(); upd('${p.id}', -1)">-</button><span class="clean-qty-val">${q}</span><button class="clean-qty-btn" onclick="event.stopPropagation(); upd('${p.id}', 1)">+</button></div>`
                    : `<button class="clean-add-btn" onclick="event.stopPropagation(); upd('${p.id}', 1)">+</button>`;
                
                let detailsClass = q > 0 ? 'clean-details show' : 'clean-details';
                let validadeTxt = p.validade ? `<div class="clean-details-val">Válido até: ${p.validade}</div>` : '';

                return `
                <div class="clean-card">
                    <div class="clean-img-wrap" onclick="openQuickView('${p.id}')">
                        <img src="${p.img}" class="clean-img" loading="lazy" onerror="this.src='/site/img/produtos/cesta.webp'">
                        <div class="clean-img-overlay">
                            <div class="clean-price-tag">${fmt(p.price)}</div>
                            <div onclick="event.stopPropagation()">${ctrl}</div>
                        </div>
                    </div>
                    <div id="details-${p.id}" class="${detailsClass}">
                        <div class="clean-details-name">${formatName(p.name)}</div>
                        ${validadeTxt}
                    </div>
                </div>`;
            }).join('');

            let isOpen = STATE.openAccordions.has(index) ? 'open' : '';

            html += `
            <div class="acc-item ${isOpen}" id="acc-${index}">
                <div class="acc-header" onclick="toggleAccordion(${index})">
                    <img src="${firstImg}" onerror="this.src='/site/img/produtos/cesta.webp'">
                    <div class="acc-title">${termo}</div>
                    <svg class="acc-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </div>
                <div class="acc-body">
                    <div class="carousel-track">
                        ${carouselHtml}
                    </div>
                </div>
            </div>`;
        }
    });
    
    $('section-termos').innerHTML = html;
}

window.toggleAccordion = function(index) {
    const item = $(`acc-${index}`);
    if(item.classList.contains('open')){
        item.classList.remove('open');
        STATE.openAccordions.delete(index);
    } else {
        item.classList.add('open');
        STATE.openAccordions.add(index);
    }
}

window.openQuickView = function(id) {
    const p = STATE.prods.find(x => x.id === id); if(!p) return;
    $('qv-img').src = p.img; $('qv-name').innerText = formatName(p.name);
    $('qv-price').innerText = fmt(p.price);
    $('qv-action-area').innerHTML = p.stock <= 0 ? `<button class="btn-modal" disabled style="background:var(--c-bd);color:var(--c-s);">ESGOTADO</button>` : `<button class="btn-modal" onclick="addFromQuickView('${id}')">ADICIONAR PRODUTO</button>`;
    $('modal-quick-view').showModal();
}
window.addFromQuickView = function(id) { upd(id, 1); $('modal-quick-view').close(); }

function upd(id, delta){
    const p = STATE.prods.find(x=>x.id===id); if(!p) return;
    const cur = STATE.cart[id] || 0; let next = Math.max(0, cur + delta);
    if(next > p.stock) return showToast(`Apenas ${p.stock} un. disponíveis`, "r");
    if(cur === 0 && next > 0) STATE.cartOrder.push(id);
    STATE.cart[id] = next; if(next === 0){ delete STATE.cart[id]; STATE.cartOrder = STATE.cartOrder.filter(x=>x!==id); }
    renderHome(); updateTotals();
}

function confirmBasket(id){
    const c = STATE.baskets.find(x=>String(x.id)===String(id)); if(!c) return;
    STATE.baseBasket = c; let itemsSum = 0;
    c.produtos.forEach(s=>{
        const [qStr, ref] = s.split('x'); const p = STATE.prods.find(x=>x.id===ref.trim());
        if(p){ let q = Math.min(parseInt(qStr), p.stock); if(q > 0) { if(!(STATE.cart[p.id])) STATE.cartOrder.push(p.id); STATE.cart[p.id] = (STATE.cart[p.id] || 0) + q; itemsSum += (p.price * q); } }
    });
    STATE.basketExtraFee = Math.max(0, c.preco - itemsSum);
    renderHome(); updateTotals();
    showToast("Cesta adicionada!", "g");
}

function updateTotals(){
    let sum = 0; Object.entries(STATE.cart).forEach(([id,q])=>{ const p = STATE.prods.find(x=>x.id===id); if(p) sum += p.price * q; });
    let final = sum + STATE.basketExtraFee;
    $('chk-total').innerText = fmt(final);
    
    let totalItems = Object.values(STATE.cart).reduce((a,b)=>a+b,0);
    $('badge-count').innerText = totalItems;
    $('badge-count').style.display = totalItems > 0 ? 'flex' : 'none';
}

function openCheckout(){
    if(STATE.cartOrder.length === 0) return showToast("Seu carrinho está vazio.", "r");
    $('chk-list').innerHTML = STATE.cartOrder.map(id=>{ const p = STATE.prods.find(x=>x.id===id); return `<div class="chk-item-simple"><span class="chk-item-qtd">${STATE.cart[id]}x</span><span class="chk-item-name">${formatName(p.name)}</span></div>` }).join('');
    $('modal-checkout').showModal();
}

function sendOrder(){
    let itemsTxt=""; let final = parseMoney($('chk-total').innerText);
    Object.entries(STATE.cart).forEach(([id,q])=>{ const p=STATE.prods.find(x=>x.id===id); if(p) itemsTxt += `${q}x ${p.name}\n`; });
    if(STATE.basketExtraFee > 0) itemsTxt += `\n*Acréscimo Cesta Padrão: ${fmt(STATE.basketExtraFee)}*\n`;
    const msg = `*NOVO PEDIDO*\n\n*ITENS:*\n${itemsTxt}\n\n*TOTAL: ${fmt(final)}*`;
    window.location.href=`https://wa.me/5565998150975?text=${encodeURIComponent(msg)}`;
}

function formatName(s){ return s?s.toLowerCase().split(' ').map(w=>w.length<=3?w:w[0].toUpperCase()+w.slice(1)).join(' '):''; }
function parseMoney(s){ return parseFloat(s.replace('R$','').replace('.','').replace(',','.').trim()); }
function fmt(v){ return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function showToast(m,t){ const d=document.createElement('div'); d.className='toast'; d.style.background=t==='r'?'#dc2626':'#15803d'; d.innerText=m; $('toast-container').appendChild(d); setTimeout(()=>d.remove(),2500); }

init();
</script>
