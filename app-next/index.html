<body>
  <header class="header site-header">
    <div class="header-inner">
      <div class="header-top">
        <a class="brand" href="#/" aria-label="Ir para a página inicial">
          <img class="brand-logo" src="../img/logoantonia5.png" alt="Dona Antônia" width="160" height="44" decoding="async" fetchpriority="high">
          <span class="brand-text"><strong>Dona Antônia</strong><span>Supermercado e cestas</span></span>
        </a>
        <div class="header-actions" aria-label="Ações rápidas">
          <a class="header-favorites-btn" href="#/favoritos" aria-label="Ver favoritos">
            <svg class="svg-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            <span class="header-favorites-count" data-favorite-count hidden>0</span>
          </a>
          <button class="header-cart-btn" id="open-cart" type="button" aria-label="Abrir minha compra">
            <span class="header-cart-icon"><svg class="svg-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg><span class="header-cart-count" data-cart-count hidden>0</span></span>
            <span><small>Minha compra</small><strong data-cart-total>R$ 0,00</strong></span>
          </button>
          <button class="header-menu-btn" id="open-menu" type="button" aria-label="Abrir menu">
            <span class="hamburger" aria-hidden="true"><span></span><span></span><span></span></span>
            <span class="header-menu-text">Menu</span>
          </button>
        </div>
      </div>
      <form class="search-wrap search-form" id="search-form">
        <svg class="svg-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <input id="search-input" class="search-input" type="search" placeholder="Buscar produto. Ex: Omo, café, arroz" autocomplete="off" aria-label="Buscar produto">
        <button id="search-clear" class="search-clear" type="button" hidden aria-label="Limpar busca"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg></button>
      </form>
    </div>
  </header>

  <main id="app" class="app" aria-live="polite"></main>

  <nav class="bottom-bar" aria-label="Navegação principal">
    <a class="sidebar-brand" href="#/" aria-label="Ir para a página inicial">
      <img class="sidebar-brand-logo" src="../img/logoantonia5.png" alt="Dona Antônia" width="152" height="42" decoding="async">
      <span class="sidebar-brand-copy"><strong>Dona Antônia</strong><span>Supermercado e cestas</span></span>
    </a>
    <div class="bottom-nav">
      <a class="nav-item active" data-nav="home" href="#/"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path><path d="M9 22V12h6v10"></path></svg><span>Início</span></a>
      <a class="nav-item" data-nav="categories" href="#/categorias"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"></path></svg><span>Categorias</span></a>
      <a class="nav-item" data-nav="offers" href="#/ofertas"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"></path><path d="M7 7h.01"></path></svg><span>Ofertas</span></a>
      <a class="nav-item" data-nav="favorites" href="#/favoritos"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"></path></svg><span>Favoritos</span><span class="favorites-badge" data-favorite-count hidden>0</span></a>
      <button class="nav-item" id="bottom-cart" type="button"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg><span>Compra</span><span class="cart-badge" data-cart-count hidden>0</span><strong class="sidebar-cart-total" data-cart-total>R$ 0,00</strong></button>
    </div>
  </nav>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <aside id="menu-drawer" class="drawer" aria-hidden="true" aria-label="Menu"><header class="drawer-header"><div><strong>Menu Dona Antônia</strong><small>Navegação e informações</small></div><button data-close-drawer aria-label="Fechar">×</button></header><div id="menu-content" class="drawer-content"></div></aside>
  <aside id="checkout-drawer" class="drawer checkout-drawer" aria-hidden="true" aria-label="Minha compra"><header class="drawer-header"><div><strong>Minha compra</strong><small>Revise e envie pelo WhatsApp</small></div><button data-close-drawer aria-label="Fechar">×</button></header><div id="checkout-content" class="drawer-content"></div></aside>

  <script type="module" src="src/image-performance.js?v=20260724-3"></script>
  <script type="module" src="src/visual-parity.js?v=20260724-3"></script>
  <script type="module" src="src/main.js?v=20260724-3"></script>
  <script type="module">
    let detailsPromise;
    let polishPromise;
    const loadDetails = () => detailsPromise || (detailsPromise = import('./src/detail-review.js?v=20260724-3'));
    const loadPolish = () => polishPromise || (polishPromise = import('./src/live-polish.js?v=20260724-3'));
    const routeNeedsDetails = () => /^#\/(cesta|kit)(\/|$)/.test(location.hash || '');
    if (routeNeedsDetails()) loadDetails();
    window.addEventListener('hashchange', () => { if (routeNeedsDetails()) loadDetails(); });
    document.addEventListener('click', event => {
      if (event.target.closest('#open-cart,#bottom-cart,[data-action="add-basket"],[data-action="add-basket-custom"],[data-action="add-kit"]')) loadDetails();
    }, { passive: true });
    if ('requestIdleCallback' in window) requestIdleCallback(loadPolish, { timeout: 1400 });
    else setTimeout(loadPolish, 700);
  </script>
</body>
</html>
