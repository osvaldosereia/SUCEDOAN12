<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sucedoan PIM - High Density</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f4f4f5;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent: #000000;
            --accent-hover: #27272a;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #e4e4e7;
            --radius: 12px;
            --shadow: 0 4px 20px rgba(0,0,0,0.04);
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-body); height: 100vh; display: flex; flex-direction: column; color: var(--text-primary); overflow: hidden; -webkit-font-smoothing: antialiased; }
        
        /* HEADER & TOOLBAR */
        header { background: #ffffff; min-height: 54px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); gap: 15px; z-index: 10; }
        .brand { font-weight: 900; font-size: 16px; letter-spacing: -0.5px; margin-right: auto; display: flex; align-items: center; gap: 8px; }
        
        .toolbar { padding: 12px 20px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: space-between; }
        .toolbar-group { display: flex; gap: 8px; align-items: center; }
        
        .search-container { position: relative; width: 280px; }
        .search-input { width: 100%; background: #ffffff; border: 1px solid var(--border); padding: 10px 10px 10px 36px; border-radius: 8px; font-size: 12px; font-weight: 600; outline: none; box-shadow: var(--shadow); transition: 0.2s; }
        .search-input:focus { border-color: var(--accent); }
        .search-icon { position: absolute; left: 12px; top: 11px; color: #a1a1aa; }
        
        .nav-btn { background: #ffffff; border: 1px solid var(--border); color: var(--text-primary); padding: 8px 12px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; font-size: 11px; box-shadow: var(--shadow); }
        .nav-btn:hover { background: #f4f4f5; }
        .nav-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
        .nav-btn.primary:hover { background: var(--accent-hover); }
        .nav-btn.warning { background: var(--warning); color: white; border-color: var(--warning); }
        
        #queue-status { display:none; align-items:center; gap:6px; font-size:10px; font-weight:800; background:#f4f4f5; padding:6px 12px; border-radius:20px; border:1px solid var(--border); }

        /* GRID DE PRODUTOS (VITRINE MINIMALISTA) */
        .main-content { flex-grow: 1; overflow-y: auto; padding: 0 20px 40px 20px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
        
        .product-card { background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; transition: 0.2s; cursor: pointer; }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.06); border-color: #d4d4d8; }
        .product-card.inactive { opacity: 0.5; filter: grayscale(1); }
        
        .card-img-wrapper { aspect-ratio: 1; background: #f4f4f5; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .card-img { width: 100%; height: 100%; object-fit: contain; mix-blend-mode: multiply; }
        
        .card-info { padding: 12px; display: flex; flex-direction: column; gap: 10px; text-align: center; }
        .card-title { font-size: 11px; font-weight: 800; color: var(--text-primary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-btn { background: #f4f4f5; border: none; border-radius: 6px; padding: 8px; font-size: 10px; font-weight: 900; color: var(--accent); cursor: pointer; width: 100%; transition: 0.2s; text-transform: uppercase; }
        .card-btn:hover { background: var(--accent); color: white; }

        /* SISTEMA UNIVERSAL DE ABAS LATERAIS (OFFCANVAS) */
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(2px); z-index: 1000; display: none; opacity: 0; transition: 0.3s; }
        
        .sidebar { position: fixed; top: 0; right: 0; max-width: 100%; height: 100vh; background: #ffffff; box-shadow: -10px 0 40px rgba(0,0,0,0.1); transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; }
        .sidebar.open { transform: translateX(0); }
        
        #edit-sidebar { z-index: 1001; width: 480px; }
        #editor-sidebar { z-index: 1002; width: 420px; border-left: 1px solid var(--border); }
        #config-sidebar { z-index: 1003; width: 380px; }
        
        .sidebar-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #fafafa; }
        .sidebar-title { font-size: 14px; font-weight: 900; }
        .btn-icon { background: #f4f4f5; border: 1px solid var(--border); cursor: pointer; color: var(--text-primary); display: flex; justify-content: center; align-items: center; width: 28px; height: 28px; border-radius: 6px; transition: 0.2s; flex-shrink: 0; }
        .btn-icon:hover { background: var(--accent); color: white; border-color: var(--accent); }
        
        .sidebar-body { padding: 20px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 20px; }
        .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: #ffffff; }

        /* FORMULÁRIOS DA SIDEBAR */
        .form-section { display: flex; flex-direction: column; gap: 12px; }
        .section-title { font-size: 10px; font-weight: 900; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); padding-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group.full { grid-column: span 2; }
        .form-label { font-size: 10px; font-weight: 800; color: var(--text-primary); }
        
        .input-wrapper { display: flex; gap: 6px; align-items: stretch; }
        .form-input { flex-grow: 1; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; font-weight: 600; background: #fafafa; outline: none; transition: 0.2s; font-family: 'Inter', sans-serif; }
        .form-input:focus { border-color: var(--accent); background: #ffffff; }
        textarea.form-input { resize: vertical; min-height: 70px; line-height: 1.4; }
        
        /* BOTÕES DE INTELIGÊNCIA (SMART BUTTONS) */
        .btn-smart { background: #ffffff; border: 1px solid var(--border); border-radius: 6px; width: 36px; display: flex; justify-content: center; align-items: center; cursor: pointer; color: var(--text-secondary); transition: 0.2s; flex-shrink: 0; }
        .btn-smart:hover { background: #f4f4f5; border-color: var(--accent); color: var(--accent); }

        /* SLOTS DE IMAGEM */
        .image-slots { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .img-slot { aspect-ratio: 1; border: 1px dashed var(--border); border-radius: 6px; display: flex; justify-content: center; align-items: center; background: #fafafa; cursor: pointer; overflow: hidden; position: relative; transition: 0.2s; }
        .img-slot:hover { border-color: var(--accent); }
        .img-slot img { width: 100%; height: 100%; object-fit: contain; mix-blend-mode: multiply; }
        .img-slot .slot-num { position: absolute; top: 4px; left: 4px; background: rgba(0,0,0,0.8); color: white; font-size: 8px; padding: 2px 4px; border-radius: 4px; font-weight: 900; }

        /* EDITOR CANVAS PRO */
        canvas { background: #fafafa; width: 100%; aspect-ratio: 1; display: block; cursor: grab; border-bottom: 1px solid var(--border); }
        .editor-controls { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .slider-group { display: flex; align-items: center; gap: 12px; }
        .slider-group label { width: 16px; color: var(--text-secondary); display: flex; justify-content: center;}
        input[type=range] { flex-grow: 1; accent-color: var(--accent); }
        
        @media (max-width: 768px) {
            header { padding: 10px; flex-wrap: wrap; }
            .toolbar { padding: 10px; flex-direction: column; align-items: stretch; }
            .search-container { width: 100%; }
            .sidebar { width: 100%; }
            .main-content { padding: 10px; }
            .card-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .image-slots { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

    <script>
        const STORAGE_KEY = 'sucedoan_pim_v35'; 
        const CONFIG_KEY = 'sucedoan_config';
        localforage.config({ name: 'SucedoanPIM', storeName: 'produtos_db' });
    </script>

    <header>
        <div class="brand"><i data-lucide="package-search" size="20"></i> SUCEDOAN PIM</div>
        <div id="queue-status"></div>
        <button class="nav-btn" onclick="openSidebar('config-sidebar')"><i data-lucide="settings" size="14"></i> API</button>
    </header>

    <div class="toolbar">
        <div class="toolbar-group" style="flex-grow: 1;">
            <div class="search-container">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" class="search-input" id="search-input" placeholder="Buscar por SKU ou Nome...">
            </div>
            <button class="nav-btn" id="btn-24h" onclick="toggleFilter24h()" title="Mostrar apenas produtos cadastrados/editados nas últimas 24h">
                <i data-lucide="clock" size="14"></i> ÚLTIMAS 24H
            </button>
        </div>
        <div class="toolbar-group">
            <button class="nav-btn warning" onclick="forceBackupNow()" id="btn-force-sync" style="display:none;">
                <i data-lucide="upload-cloud" size="14"></i> SALVAR AGORA
            </button>
            <button class="nav-btn primary" onclick="createNewProduct()"><i data-lucide="plus" size="14"></i> NOVO</button>
        </div>
    </div>
    
    <div class="main-content">
        <div class="card-grid" id="product-grid"></div>
    </div>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeAllSidebars()"></div>

    <div class="sidebar" id="edit-sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">Curadoria do Produto</div>
            <button class="btn-icon" onclick="closeSidebar('edit-sidebar')"><i data-lucide="x" size="16"></i></button>
        </div>
        <div class="sidebar-body" id="sidebar-body">
            </div>
        <div class="sidebar-footer">
            <button class="nav-btn primary" style="flex:2; height:40px;" onclick="closeSidebar('edit-sidebar')"><i data-lucide="check" size="14"></i> CONCLUÍDO</button>
            <button class="nav-btn" style="flex:1; height:40px; color:var(--danger); border-color:#fecaca; background:#fef2f2;" onclick="deleteCurrentProduct()"><i data-lucide="trash-2" size="14"></i></button>
        </div>
    </div>

    <div class="sidebar" id="editor-sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">Ajuste de Imagem</div>
            <button class="btn-icon" onclick="closeSidebar('editor-sidebar')"><i data-lucide="x" size="16"></i></button>
        </div>
        <div style="flex-grow: 1; overflow-y: auto;">
            <canvas id="imageCanvas" width="420" height="420"></canvas>
            <div class="editor-controls">
                <div class="slider-group"><label title="Zoom"><i data-lucide="zoom-in" size="14"></i></label><input type="range" id="zoomRange" min="0.1" max="3" step="0.01" value="1"></div>
                <div class="slider-group"><label title="Brilho"><i data-lucide="sun" size="14"></i></label><input type="range" id="brightnessRange" min="0.1" max="2" step="0.05" value="1"></div>
                <div class="slider-group"><label title="Nitidez"><i data-lucide="focus" size="14"></i></label><input type="range" id="sharpenRange" min="0" max="5" step="0.1" value="0"></div>
                <div style="font-size:10px; text-align:center; color:var(--text-secondary); margin-top:5px;">Dica: Ctrl+V para colar uma foto da internet</div>
            </div>
        </div>
        <div class="sidebar-footer">
            <input type="file" id="fileInput" style="display:none" accept="image/*">
            <button class="nav-btn" style="flex:1; height:40px;" onclick="document.getElementById('fileInput').click()"><i data-lucide="folder-search" size="14"></i> PC</button>
            <button class="nav-btn primary" style="flex:2; height:40px;" onclick="saveImageToQueue()"><i data-lucide="save" size="14"></i> APLICAR FOTO</button>
        </div>
    </div>

    <div class="sidebar" id="config-sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">Configuração & Dados</div>
            <button class="btn-icon" onclick="closeSidebar('config-sidebar')"><i data-lucide="x" size="16"></i></button>
        </div>
        <div class="sidebar-body" style="gap:16px;">
            <div class="form-section">
                <div class="section-title">Credenciais GitHub</div>
                <div class="form-group"><label class="form-label">Token</label><input type="password" id="cfg-token" class="form-input"></div>
                <div class="form-group"><label class="form-label">Usuário</label><input type="text" id="cfg-user" class="form-input"></div>
                <div class="form-group"><label class="form-label">Repositório</label><input type="text" id="cfg-repo" class="form-input"></div>
                <button class="nav-btn primary" style="height:40px; justify-content:center; margin-top:5px;" onclick="saveConfig()">SALVAR CREDENCIAIS</button>
            </div>
            
            <div class="form-section" style="margin-top:10px;">
                <div class="section-title">Manutenção do Sistema</div>
                <button class="nav-btn" style="height:40px; justify-content:center;" onclick="fetchFromGithub()"><i data-lucide="cloud-download" size="14"></i> BAIXAR DA NUVEM</button>
                <button class="nav-btn" style="height:40px; justify-content:center;" onclick="exportarCSVCompleto()"><i data-lucide="file-down" size="14"></i> EXPORTAR CSV BLING</button>
                <input type="file" id="csv-file-append" accept=".csv" style="display:none">
                <button class="nav-btn" style="height:40px; justify-content:center;" onclick="document.getElementById('csv-file-append').click()"><i data-lucide="file-up" size="14"></i> IMPORTAR CSV</button>
            </div>
        </div>
        <div class="sidebar-footer">
            <button class="nav-btn" style="width:100%; height:40px; justify-content:center; color:var(--danger); border-color:#fecaca;" onclick="limparSistema()"><i data-lucide="trash-2" size="14"></i> RESETAR BANCO LOCAL</button>
        </div>
    </div>

    <script>
        let products = [];
        let currentEditingSku = null;
        let currentImageSlot = 1; 
        
        // Controle do Filtro de 24h
        let isFilter24hActive = false;

        function toggleFilter24h() {
            isFilter24hActive = !isFilter24hActive;
            const btn = document.getElementById('btn-24h');
            if(isFilter24hActive) btn.classList.add('primary');
            else btn.classList.remove('primary');
            renderGrid(document.getElementById('search-input').value);
        }
        
        // --- GESTÃO DE ABAS LATERAIS (OFFCANVAS) ---
        function openSidebar(id) {
            document.getElementById('sidebar-overlay').style.display = 'block';
            setTimeout(() => { 
                document.getElementById('sidebar-overlay').style.opacity = '1'; 
                document.getElementById(id).classList.add('open'); 
            }, 10);
        }

        function closeSidebar(id) {
            document.getElementById(id).classList.remove('open');
            setTimeout(() => {
                const openSidebars = document.querySelectorAll('.sidebar.open');
                if(openSidebars.length === 0) {
                    document.getElementById('sidebar-overlay').style.opacity = '0';
                    setTimeout(() => { document.getElementById('sidebar-overlay').style.display = 'none'; }, 300);
                    if(id === 'edit-sidebar') { currentEditingSku = null; renderGrid(document.getElementById('search-input').value); }
                }
            }, 50);
        }

        function closeAllSidebars() {
            document.querySelectorAll('.sidebar').forEach(el => el.classList.remove('open'));
            document.getElementById('sidebar-overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('sidebar-overlay').style.display = 'none'; }, 300);
            currentEditingSku = null;
            renderGrid(document.getElementById('search-input').value);
        }

        // --- FILA PREGUIÇOSA (STRICT 5 MINUTOS) ---
        let autoSaveTimer = null;
        const AUTO_SAVE_DELAY = 5 * 60 * 1000; 
        let githubQueue = [];
        let isProcessingQueue = false;
        
        window.addEventListener('beforeunload', function (e) {
            if (autoSaveTimer || githubQueue.length > 0 || isProcessingQueue) { e.preventDefault(); e.returnValue = ''; }
        });

        function updateQueueUI(msg, icon = 'info') {
            const el = document.getElementById('queue-status');
            const btnUrgent = document.getElementById('btn-force-sync');
            if(!el) return;
            
            if(msg === '') { el.style.display = 'none'; btnUrgent.style.display = 'none'; } 
            else {
                el.style.display = 'flex';
                let iconHtml = icon === 'clock' ? `<i data-lucide="clock" size="12"></i>` : icon === 'loader' ? `<i data-lucide="loader" class="spin-icon" size="12"></i>` : `<i data-lucide="cloud" size="12"></i>`;
                el.innerHTML = `${iconHtml} <span>${msg}</span>`;
                lucide.createIcons();
                btnUrgent.style.display = icon === 'clock' ? 'flex' : 'none';
            }
        }

        function scheduleAutoSave() {
            if(autoSaveTimer) clearTimeout(autoSaveTimer);
            updateQueueUI(`Nuvem em 5 min`, 'clock');
            autoSaveTimer = setTimeout(() => { forceBackupNow(); }, AUTO_SAVE_DELAY);
        }

        function forceBackupNow() {
            if(autoSaveTimer) { clearTimeout(autoSaveTimer); autoSaveTimer = null; }
            const cfg = JSON.parse(localStorage.getItem(CONFIG_KEY));
            if(!cfg || !cfg.token) { updateQueueUI(''); return; }
            
            githubQueue = githubQueue.filter(t => t.type !== 'json_backup');
            githubQueue.push({
                type: 'json_backup',
                desc: 'Atualizando Banco...',
                task: async () => {
                    const path = `site/bancodedados.json`;
                    const url = `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${path}`;
                    let sha = null;
                    try { const check = await fetch(url, { headers: { "Authorization": `token ${cfg.token}` } }); if(check.ok) { const json = await check.json(); sha = json.sha; } } catch(e) {}
                    const contentStr = JSON.stringify(products);
                    const base64 = btoa(unescape(encodeURIComponent(contentStr)));
                    const body = { message: `PIM AutoSave`, content: base64 };
                    if(sha) body.sha = sha;
                    const res = await fetch(url, { method: 'PUT', headers: { "Authorization": `token ${cfg.token}`, "Content-Type": "application/json" }, body: JSON.stringify(body) });
                    if(!res.ok) throw new Error("Falha no PUT");
                }
            });
            processQueue();
        }

        async function processQueue() {
            if(githubQueue.length === 0) { isProcessingQueue = false; updateQueueUI('Salvo!', 'cloud'); setTimeout(()=>updateQueueUI(''), 3000); return; }
            isProcessingQueue = true;
            const item = githubQueue.shift();
            updateQueueUI(item.desc, 'loader');
            try { await item.task(); } catch(e) {}
            setTimeout(() => { processQueue(); }, 2000);
        }

        // --- INICIALIZAÇÃO ---
        window.onload = async function() {
            lucide.createIcons();
            await loadData();
            document.getElementById('search-input').addEventListener('input', debounce((e) => renderGrid(e.target.value), 300));
            setupEditorEvents();
        };

        function debounce(func, wait) { let timeout; return function(...args) { clearTimeout(timeout); timeout = setTimeout(() => func.apply(this, args), wait); }; }

        async function loadData() {
            try { const saved = await localforage.getItem(STORAGE_KEY); if(saved && Array.isArray(saved)) products = saved; } catch (err) {}
            const cfg = JSON.parse(localStorage.getItem(CONFIG_KEY)||'{}');
            if(cfg.token) { document.getElementById('cfg-token').value = cfg.token; document.getElementById('cfg-user').value = cfg.user; document.getElementById('cfg-repo').value = cfg.repo; }
            renderGrid();
        }
        
        async function saveDataLocally() { 
            try { await localforage.setItem(STORAGE_KEY, products); scheduleAutoSave(); } catch (err) {}
        }

        // --- VITRINE MINIMALISTA (COM FILTROS) ---
        function renderGrid(filter = "") {
            const gridContainer = document.getElementById('product-grid'); 
            gridContainer.innerHTML = "";
            let filtered = products;
            
            // Filtro Texto
            if(filter) { const term = filter.toLowerCase(); filtered = filtered.filter(p => (p.nome||"").toLowerCase().includes(term) || (p.codigo||"").toLowerCase().includes(term)); }
            
            // Filtro 24 Horas
            if(isFilter24hActive) {
                const oneDay = 24 * 60 * 60 * 1000;
                const now = Date.now();
                filtered = filtered.filter(p => {
                    const time = p.last_update || p.id || 0;
                    return (now - time) <= oneDay;
                });
            }
            
            if (filtered.length === 0) {
                gridContainer.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 50px; color:var(--text-secondary);"><i data-lucide="layout-grid" size="40" style="opacity:0.3; margin-bottom:15px;"></i><h3 style="margin:0;">Nenhum produto</h3></div>`; 
                lucide.createIcons(); return;
            }

            filtered.forEach(p => {
                const card = document.createElement('div'); 
                card.className = `product-card ${p.situacao === 'I' ? 'inactive' : ''}`;
                card.onclick = () => { openEditSidebar(p.codigo); };
                
                const imgUrl = (p.url_imagem && p.url_imagem.length > 5) ? p.url_imagem : 'https://placehold.co/300x300/f4f4f5/a1a1aa?text=SEM+FOTO';
                
                card.innerHTML = `
                    <div class="card-img-wrapper"><img src="${imgUrl}" class="card-img" onerror="this.src='https://placehold.co/300x300/f4f4f5/ef4444?text=ERRO'"></div>
                    <div class="card-info">
                        <div class="card-title">${p.nome || 'Produto Sem Nome'}</div>
                        <button class="card-btn">EDITAR</button>
                    </div>
                `;
                gridContainer.appendChild(card);
            }); 
            lucide.createIcons();
        }

        // --- SIDEBAR: EDIÇÃO DE PRODUTO ---
        function openEditSidebar(sku) {
            currentEditingSku = sku;
            const p = products.find(x => x.codigo === sku); if(!p) return;
            
            const isInactive = p.situacao === 'I';
            const imgVars = [1,2,3,4,5].map(i => { const prop = i===1 ? 'url_imagem' : `url_imagem_${i}`; return p[prop] || ''; });
            const vidVars = [1,2,3,4,5].map(i => { const prop = i===1 ? 'link_video' : `link_video_${i}`; return p[prop] || ''; });
            const safeName = (p.nome||'').replace(/'/g, "\\'");

            let htmlImages = '';
            for(let i=1; i<=5; i++) {
                const src = imgVars[i-1] ? `<img src="${imgVars[i-1]}">` : `<i data-lucide="image-plus" size="20" style="color:#a1a1aa"></i>`;
                htmlImages += `<div class="img-slot" onclick="openCanvasSidebar('${p.codigo}', ${i})">${src}<div class="slot-num">${i}</div></div>`;
            }

            let htmlVideos = '';
            for(let i=1; i<=5; i++) {
                const prop = i===1 ? 'link_video' : `link_video_${i}`;
                htmlVideos += `<input type="text" class="form-input" style="margin-bottom:6px;" value="${vidVars[i-1]}" placeholder="Url YouTube ${i}" onchange="updateField('${p.codigo}', '${prop}', this.value)">`;
            }

            const sidebarBody = document.getElementById('sidebar-body');
            sidebarBody.innerHTML = `
                <div class="form-section">
                    <div class="section-title">Identificação</div>
                    <div class="form-grid">
                        <div class="form-group"><label class="form-label">SKU (Código)</label><input type="text" class="form-input" style="font-weight:900; color:var(--accent)" value="${p.codigo}" onchange="updateSku('${p.codigo}', this.value)"></div>
                        <div class="form-group"><label class="form-label">ID (Sistema)</label><input type="text" class="form-input" value="${p.id || p['ID'] || ''}" onchange="updateField('${p.codigo}', 'id', this.value)"></div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-title">Apresentação Principal</div>
                    <div class="form-group">
                        <label class="form-label">Nome do Produto</label>
                        <div class="input-wrapper">
                            <input type="text" class="form-input" style="font-weight:700;" value="${p.nome || ''}" onchange="updateField('${p.codigo}', 'nome', this.value)">
                            <button class="btn-smart" onclick="searchGoogleHD('${safeName}')" title="Google Imagens HD"><i data-lucide="image" size="16"></i></button>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Descrição Mínima</label>
                        <div class="input-wrapper">
                            <textarea class="form-input" placeholder="Escreva os benefícios do produto..." onchange="updateField('${p.codigo}', 'descricao', this.value)">${p.descricao || ''}</textarea>
                            <button class="btn-smart" onclick="searchAIReview('${safeName}')" title="Gerar Review IA (Módulo 50)"><i data-lucide="brain-circuit" size="16"></i></button>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-title">Mídia Rica</div>
                    <div class="image-slots">${htmlImages}</div>
                    
                    <div style="margin-top:15px; border:1px dashed var(--border); padding:12px; border-radius:8px; background:#fafafa;">
                        <button class="nav-btn" style="width:100%; justify-content:center; color:#dc2626; border-color:#fecaca; background:#fef2f2; margin-bottom:12px;" onclick="searchYoutubeShorts('${safeName}')">
                            <i data-lucide="youtube" size="16"></i> BUSCAR SHORTS NO YOUTUBE
                        </button>
                        ${htmlVideos}
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-title">Comercial & Tributário</div>
                    <div class="form-grid">
                        <div class="form-group"><label class="form-label">Custo (R$)</label><input type="number" step="0.01" class="form-input" value="${p.preco_custo || 0}" onchange="updateField('${p.codigo}', 'preco_custo', this.value)"></div>
                        <div class="form-group"><label class="form-label" style="color:var(--success)">Venda (R$)</label><input type="number" step="0.01" class="form-input" style="border-color:var(--success); color:var(--success); font-weight:800;" value="${p.preco || 0}" onchange="updateField('${p.codigo}', 'preco', this.value)"></div>
                        <div class="form-group"><label class="form-label">Estoque</label><input type="number" class="form-input" value="${p.estoque || 0}" onchange="updateField('${p.codigo}', 'estoque', this.value)"></div>
                        <div class="form-group"><label class="form-label">Status</label><button class="nav-btn ${isInactive ? '' : 'primary'}" style="width:100%; height:38px; justify-content:center;" onclick="toggleStatus('${p.codigo}')"><i data-lucide="power" size="14"></i> ${isInactive ? 'INATIVO' : 'ATIVO'}</button></div>
                        <div class="form-group full"><label class="form-label">Categoria</label><input type="text" class="form-input" value="${p.categoria || ''}" onchange="updateField('${p.codigo}', 'categoria', this.value)"></div>
                        <div class="form-group full"><label class="form-label">EAN</label><input type="text" class="form-input" value="${p.gtin || ''}" onchange="updateField('${p.codigo}', 'gtin', this.value)"></div>
                        
                        <div class="form-group full">
                            <label class="form-label">NCM</label>
                            <div class="input-wrapper">
                                <input type="text" class="form-input" value="${p.ncm || ''}" onchange="updateField('${p.codigo}', 'ncm', this.value)">
                                <button class="btn-smart" onclick="window.open('https://www.google.com/search?q=NCM+${encodeURIComponent(p.nome)}', '_blank')" title="Buscar NCM"><i data-lucide="search" size="16"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
            openSidebar('edit-sidebar');
        }

        async function updateField(sku, field, value) {
            const p = products.find(x => x.codigo === sku); if(!p) return;
            let finalVal = value; if(['preco','estoque','preco_custo'].includes(field)) finalVal = parseFloat(value.toString().replace(',','.')) || 0;
            p[field] = finalVal;
            p.last_update = Date.now(); // Rastreador 24h
            await saveDataLocally(); 
        }

        async function updateSku(oldSku, newSku) {
            newSku = newSku.trim().toUpperCase(); if(!newSku || oldSku === newSku) return;
            if(products.find(p => p.codigo === newSku)) { alert("SKU já existe!"); openEditSidebar(oldSku); return; }
            const p = products.find(p => p.codigo === oldSku);
            if(p) { p.codigo = newSku; p['Código'] = newSku; p.last_update = Date.now(); await saveDataLocally(); currentEditingSku = newSku; openEditSidebar(newSku); }
        }

        async function toggleStatus(sku) { 
            const p = products.find(x => x.codigo === sku); if (!p) return; 
            p.situacao = p.situacao === 'I' ? 'A' : 'I'; 
            p.last_update = Date.now();
            await saveDataLocally(); openEditSidebar(sku); 
        }

        async function deleteCurrentProduct() {
            if(!currentEditingSku) return;
            if(!confirm(`ATENÇÃO: Excluir permanentemente?`)) return;
            products = products.filter(p => p.codigo !== currentEditingSku);
            await saveDataLocally(); closeSidebar('edit-sidebar');
        }

        async function createNewProduct() {
            const timestamp = Date.now();
            const sku = timestamp.toString().slice(-8); 
            products.unshift({ id: timestamp, codigo: sku, nome: "", preco: 0, preco_custo: 0, situacao: 'A', estoque: 0, last_update: timestamp }); 
            await saveDataLocally(); renderGrid(document.getElementById('search-input').value); openEditSidebar(sku);
        }

        // --- INTELIGÊNCIA EXTERNA (GOOGLE & YOUTUBE) ---
        function searchGoogleHD(nome) {
            if(!nome) return;
            window.open(`https://www.google.com/search?tbm=isch&q=${encodeURIComponent(nome)}&tbs=isz:l`, '_blank');
        }

        function searchAIReview(nome) {
            if(!nome) return;
            const prompt = `Avalie o produto "${nome}" para ajudar um consumidor a decidir a compra. Fale sobre os benefícios, inclua opiniões e avaliações reais. Seja persuasivo e objetivo, limitando a resposta a 50 palavras no máximo.`;
            window.open(`https://www.google.com/search?q=${encodeURIComponent(prompt)}&udm=50`, '_blank');
        }

        function searchYoutubeShorts(nome) {
            if(!nome) return alert("Digite o nome do produto primeiro.");
            window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(nome + ' shorts')}`, '_blank');
        }

        // --- EDITOR CANVAS PRO EM SIDEBAR ---
        const canvas = document.getElementById('imageCanvas');
        const ctx = canvas.getContext('2d');
        let loadedImage = null; let imgOffsetX = 0; let imgOffsetY = 0; let isDragging = false; let startDragX = 0; let startDragY = 0;

        function openCanvasSidebar(sku, slot) {
            const p = products.find(x => x.codigo === sku); if(!p) return;
            currentImageSlot = slot;
            imgOffsetX = 0; imgOffsetY = 0; 
            document.getElementById('zoomRange').value = 1; document.getElementById('brightnessRange').value = 1; document.getElementById('sharpenRange').value = 0;
            
            const prop = slot === 1 ? 'url_imagem' : `url_imagem_${slot}`;
            const img = new Image(); img.crossOrigin = "Anonymous"; img.src = p[prop] || ""; 
            img.onload = () => { loadedImage = img; drawCanvas(); openSidebar('editor-sidebar'); }; 
            img.onerror = () => { loadedImage = null; drawCanvas(); openSidebar('editor-sidebar'); };
        }

        function applySharpen(context, w, h, mix) {
            if (mix <= 0) return;
            try {
                const imageData = context.getImageData(0, 0, w, h); const data = imageData.data; const w4 = w * 4; const copy = new Uint8ClampedArray(data);
                for (let y = 1; y < h - 1; y++) { for (let x = 1; x < w - 1; x++) { const i = (y * w + x) * 4; for (let c = 0; c < 3; c++) { const val = copy[i + c] * (1 + 4 * mix) + copy[i + c - 4] * (-mix) + copy[i + c + 4] * (-mix) + copy[i + c - w4] * (-mix) + copy[i + c + w4] * (-mix); data[i + c] = val; } } } 
                context.putImageData(imageData, 0, 0);
            } catch(e) {}
        }

        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(loadedImage) { 
                const zoom = parseFloat(document.getElementById('zoomRange').value); 
                const bright = parseFloat(document.getElementById('brightnessRange').value); 
                const sharpen = parseFloat(document.getElementById('sharpenRange').value); 
                
                ctx.filter = `brightness(${bright})`;
                const ratio = Math.min(canvas.width / loadedImage.width, canvas.height / loadedImage.height) * zoom;
                const w = loadedImage.width * ratio, h = loadedImage.height * ratio; 
                const posX = ((canvas.width - w) / 2) + imgOffsetX; const posY = ((canvas.height - h) / 2) + imgOffsetY; 
                
                ctx.drawImage(loadedImage, posX, posY, w, h); 
                ctx.filter = 'none';
                if(sharpen > 0) applySharpen(ctx, canvas.width, canvas.height, sharpen);
            } 
            else { ctx.font = "600 13px Inter"; ctx.fillStyle = "#a1a1aa"; ctx.textAlign = "center"; ctx.fillText("Ctrl+V ou busque foto no PC", canvas.width/2, canvas.height/2); }
        }

        function setupEditorEvents() {
            ['zoomRange','brightnessRange','sharpenRange'].forEach(id => { document.getElementById(id).addEventListener('input', drawCanvas); });
            document.getElementById('fileInput').addEventListener('change', (e) => { if(e.target.files && e.target.files[0]) { const reader = new FileReader(); reader.onload = (evt) => { const img = new Image(); img.onload = () => { loadedImage = img; imgOffsetX = 0; imgOffsetY = 0; drawCanvas(); }; img.src = evt.target.result; }; reader.readAsDataURL(e.target.files[0]); } });
            window.addEventListener('paste', e => { 
                const isEditorOpen = document.getElementById('editor-sidebar').classList.contains('open');
                const isEditOpen = document.getElementById('edit-sidebar').classList.contains('open');
                if(!isEditorOpen && !isEditOpen) return;
                
                const items = (e.clipboardData || e.originalEvent.clipboardData).items; 
                for (let index in items) { 
                    const item = items[index]; 
                    if (item.kind === 'file' && item.type.includes('image/')) { 
                        const blob = item.getAsFile(); const reader = new FileReader(); 
                        reader.onload = (event) => { 
                            const img = new Image(); 
                            img.onload = () => { 
                                loadedImage = img; imgOffsetX = 0; imgOffsetY = 0; drawCanvas(); 
                                if(!isEditorOpen && currentEditingSku) openCanvasSidebar(currentEditingSku, 1);
                            }; 
                            img.src = event.target.result; 
                        }; 
                        reader.readAsDataURL(blob); 
                    } 
                } 
            });
            canvas.addEventListener('mousedown', (e) => { isDragging = true; startDragX = e.offsetX - imgOffsetX; startDragY = e.offsetY - imgOffsetY; }); canvas.addEventListener('mousemove', (e) => { if (!isDragging) return; imgOffsetX = e.offsetX - startDragX; imgOffsetY = e.offsetY - startDragY; drawCanvas(); }); canvas.addEventListener('mouseup', () => { isDragging = false; }); canvas.addEventListener('mouseleave', () => { isDragging = false; });
        }

        async function saveImageToQueue() {
            if(!currentEditingSku) return; 
            const sku = currentEditingSku; const slot = currentImageSlot;
            const cfg = JSON.parse(localStorage.getItem(CONFIG_KEY)); 
            
            const base64full = canvas.toDataURL('image/webp', 0.9);
            const base64data = base64full.split(',')[1];
            
            const p = products.find(x => x.codigo === sku);
            const prop = slot === 1 ? 'url_imagem' : `url_imagem_${slot}`;
            p[prop] = base64full; 
            p.last_update = Date.now();
            await saveDataLocally();
            openEditSidebar(sku); 
            closeSidebar('editor-sidebar');
            
            if(!cfg || !cfg.token) return; 
            
            githubQueue.push({
                type: 'image_upload',
                desc: `Subindo Foto ${slot}...`,
                task: async () => {
                    const sufix = slot === 1 ? '' : `_${slot}`;
                    const folderPath = "site/img/produtos"; const fileName = `${sku}${sufix}.webp`; const fullPath = `${folderPath}/${fileName}`; 
                    const url = `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${fullPath}`;
                    let sha = null; try { const check = await fetch(url, { headers: { "Authorization": `token ${cfg.token}` } }); if(check.ok) { const json = await check.json(); sha = json.sha; } } catch(e) {}
                    
                    const body = { message: `PIM Upload Img ${fileName}`, content: base64data }; if(sha) body.sha = sha;
                    const res = await fetch(url, { method: 'PUT', headers: { "Authorization": `token ${cfg.token}`, "Content-Type": "application/json" }, body: JSON.stringify(body) }); 
                    
                    if(res.ok) { 
                        const pRef = products.find(x => x.codigo === sku); 
                        if(pRef) { pRef[prop] = `../${folderPath}/${fileName}?v=${Date.now()}`; pRef.last_update = Date.now(); await localforage.setItem(STORAGE_KEY, products); } 
                    }
                }
            });
            scheduleAutoSave();
        }

        // --- SISTEMA DE IMPORTAÇÃO CSV POR EAN ---
        function saveConfig() { const cfg = { token: document.getElementById('cfg-token').value, user: document.getElementById('cfg-user').value, repo: document.getElementById('cfg-repo').value }; localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg)); closeSidebar('config-sidebar'); }

        document.getElementById('csv-file-append').addEventListener('change', function(e) {
            if(!e.target.files[0]) return;
            Papa.parse(e.target.files[0], {
                header: true, skipEmptyLines: true, encoding: "UTF-8", delimiter: ";", transformHeader: h => h.replace(/"/g, '').trim(),
                complete: async (results) => {
                    results.data.forEach(d => {
                        const ean = d['GTIN/EAN'] ? d['GTIN/EAN'].trim() : '';
                        const fallbackSku = d['Código'] ? d['Código'].trim() : Date.now().toString().slice(-8);
                        
                        let pIdx = -1;
                        if(ean !== '') {
                            // Busca por EAN (Inteligência nova)
                            pIdx = products.findIndex(p => p.gtin === ean);
                        }
                        // Se não achou por EAN (ou EAN está vazio), busca por SKU para garantir que não duplica
                        if(pIdx === -1) {
                            pIdx = products.findIndex(p => p.codigo === fallbackSku);
                        }
                        
                        let n = { 
                            codigo: fallbackSku, 
                            nome: d['Descrição'], 
                            descricao: d['Descrição Curta'], 
                            preco: parseFloat(d['Preço']?.replace(',','.'))||0, 
                            preco_custo: parseFloat(d['Preço de custo']?.replace(',','.'))||0, 
                            estoque: parseFloat(d['Estoque']?.replace(',','.'))||0, 
                            categoria: d['Categoria do produto'], 
                            gtin: ean, 
                            ncm: d['NCM'], 
                            link_video: d['Vídeo'],
                            last_update: Date.now() // Marca como tocado nas últimas 24h
                        };
                        
                        if(d['URL Imagens Externas']) {
                            const imgs = d['URL Imagens Externas'].split('|');
                            n.url_imagem = imgs[0] || ''; n.url_imagem_2 = imgs[1] || ''; n.url_imagem_3 = imgs[2] || ''; n.url_imagem_4 = imgs[3] || ''; n.url_imagem_5 = imgs[4] || '';
                        }
                        
                        if(pIdx !== -1) products[pIdx] = {...products[pIdx], ...n}; 
                        else products.unshift({...n, id:Date.now()});
                    });
                    await saveDataLocally(); 
                    // Ativa o filtro de 24h automaticamente para você ver o que acabou de subir
                    if(!isFilter24hActive) toggleFilter24h(); 
                    else renderGrid(document.getElementById('search-input').value);
                    
                    alert("Importação concluída! O filtro de 24H foi ativado para mostrar os produtos."); 
                    closeSidebar('config-sidebar');
                }
            });
        });

        async function fetchFromGithub() {
            const cfg = JSON.parse(localStorage.getItem(CONFIG_KEY)); if(!cfg || !cfg.token) return alert("Configure a API.");
            if(products.length > 0) { if(!confirm("Baixar dados substituirá sua base local. Continuar?")) return; }
            try {
                const res = await fetch(`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/site/bancodedados.json?t=${Date.now()}`, { headers: { "Authorization": `token ${cfg.token}`, "Accept": "application/vnd.github.v3.raw" } });
                const data = await res.json();
                if(Array.isArray(data)) { products = data; await saveDataLocally(); renderGrid(); alert("Sincronizado!"); closeSidebar('config-sidebar'); }
            } catch(e) { alert("Erro: " + e.message); }
        }

        async function limparSistema() { if(confirm("Apagar dados do NAVEGADOR? Nuvem NÃO será afetada.")) { await localforage.clear(); location.reload(); } }

        function exportarCSVCompleto() {
            if (products.length === 0) return alert("Nada para exportar.");
            const colunasModelo = [ "ID", "Código", "Descrição", "Unidade", "NCM", "Origem", "Preço", "Valor IPI fixo", "Observações", "Situação", "Estoque", "Preço de custo", "Localização", "GTIN/EAN", "URL Imagens Externas", "Vídeo", "Categoria do produto", "Descrição Curta" ];
            const dadosParaExportar = products.map(p => {
                const linha = {}; 
                const fmt = (n) => (n !== undefined && n !== null && n !== "") ? parseFloat(n).toLocaleString('pt-BR', {minimumFractionDigits: 2}) : "";
                
                let urlImgs = [p.url_imagem, p.url_imagem_2, p.url_imagem_3, p.url_imagem_4, p.url_imagem_5].filter(u => u && u.length > 5).join('|');
                
                p['Descrição'] = p.nome; p['Preço'] = fmt(p.preco); p['Preço de custo'] = fmt(p.preco_custo); p['Estoque'] = fmt(p.estoque);
                p['URL Imagens Externas'] = urlImgs; p['Vídeo'] = p.link_video || ""; p['Descrição Curta'] = p.descricao || "";
                p['Situação'] = p.situacao === 'I' ? 'INATIVO' : 'ATIVO'; p['Origem'] = '0'; p['Unidade'] = 'un';
                
                colunasModelo.forEach(col => { linha[col] = (p[col] !== undefined && p[col] !== null) ? p[col] : ""; });
                return linha;
            });
            const csv = Papa.unparse({ fields: colunasModelo, data: dadosParaExportar }, { quotes: true, delimiter: ";" });
            const l = document.createElement("a"); l.href = URL.createObjectURL(new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' })); l.download = `bling_export_${new Date().getTime()}.csv`; l.click();
            closeSidebar('config-sidebar');
        }
    </script>
