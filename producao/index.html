<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#111827">
    <title>Separação de Pedidos</title>

    <style>
        :root {
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --line: #e5e7eb;
            --dark: #111827;
            --dark2: #1f2937;
            --green: #059669;
            --green2: #ecfdf5;
            --red: #dc2626;
            --red2: #fef2f2;
            --yellow: #facc15;
            --blue: #2563eb;
            --radius: 12px;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeSpeed;
        }

        body {
            overflow-x: hidden;
            font-size: 14px;
        }

        button, input, textarea, select {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
        }

        button {
            border: 0;
            border-radius: 10px;
            min-height: 42px;
            padding: 10px 12px;
            font-weight: 800;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        button:disabled {
            opacity: .55;
            cursor: not-allowed;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            background: var(--dark);
            color: #fff;
            padding: 10px;
            border-bottom: 1px solid #000;
        }

        .topbar-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand {
            flex: 1;
            font-size: 16px;
            font-weight: 900;
            line-height: 1.1;
        }

        .brand small {
            display: block;
            color: #d1d5db;
            font-size: 10px;
            font-weight: 700;
            margin-top: 2px;
        }

        .top-btn {
            background: #374151;
            color: #fff;
            min-width: 42px;
            min-height: 38px;
            padding: 8px 10px;
            border: 1px solid rgba(255,255,255,.08);
        }

        .top-btn.green { background: var(--green); }
        .top-btn.red { background: var(--red); }

        .container {
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            padding: 10px;
            padding-bottom: 80px;
        }

        .statusbar {
            margin: 10px 0;
            padding: 9px 10px;
            background: #fff7ed;
            border: 1px solid #fed7aa;
            border-radius: 10px;
            color: #9a3412;
            font-size: 12px;
            font-weight: 800;
            display: none;
        }

        .filters {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin: 10px 0;
        }

        .filter-btn {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--line);
            font-size: 12px;
            min-height: 38px;
            padding: 8px 6px;
        }

        .filter-btn.active {
            background: var(--dark);
            color: #fff;
            border-color: var(--dark);
        }

        .search-box {
            width: 100%;
            min-height: 42px;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 0 12px;
            background: #fff;
            color: var(--text);
            outline: none;
            font-weight: 700;
        }

        .section-title {
            margin: 16px 2px 8px;
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            font-weight: 900;
        }

        .empty {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 18px;
            text-align: center;
            color: var(--muted);
            font-weight: 800;
        }

        .order-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            margin-bottom: 10px;
            padding: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,.04);
        }

        .order-card.done {
            background: var(--green2);
            border-color: #a7f3d0;
        }

        .order-head {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }

        .order-check {
            width: 22px;
            height: 22px;
            margin-top: 2px;
            flex: 0 0 auto;
        }

        .order-main {
            flex: 1;
            min-width: 0;
        }

        .order-id {
            font-size: 17px;
            font-weight: 900;
            line-height: 1.1;
        }

        .order-meta {
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
            margin-top: 4px;
            line-height: 1.35;
        }

        .badge {
            display: inline-block;
            padding: 5px 8px;
            border-radius: 999px;
            background: #fef9c3;
            color: #854d0e;
            font-size: 10px;
            font-weight: 900;
            white-space: nowrap;
        }

        .badge.done {
            background: #d1fae5;
            color: #065f46;
        }

        .client-box {
            margin-top: 9px;
            background: #f9fafb;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 9px;
            font-size: 12px;
            line-height: 1.35;
        }

        .client-name {
            font-size: 13px;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 4px;
        }

        .client-line {
            color: var(--muted);
            font-weight: 700;
            overflow-wrap: anywhere;
        }

        .order-actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin-top: 9px;
        }

        .small-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 6px;
        }

        .btn {
            background: var(--dark);
            color: #fff;
        }

        .btn.light {
            background: #e5e7eb;
            color: var(--text);
        }

        .btn.green {
            background: var(--green);
            color: #fff;
        }

        .btn.red {
            background: var(--red);
            color: #fff;
        }

        .btn.blue {
            background: var(--blue);
            color: #fff;
        }

        .btn.whats {
            background: #16a34a;
            color: #fff;
        }

        .btn.warn {
            background: #f59e0b;
            color: #111827;
        }

        .btn.small {
            min-height: 36px;
            font-size: 12px;
            padding: 8px 6px;
        }

        .selectbar {
            display: none;
            position: sticky;
            top: 58px;
            z-index: 15;
            margin-bottom: 10px;
            background: #fff;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 8px;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }

        .selectbar span {
            flex: 1;
            font-weight: 900;
            font-size: 12px;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .sep-header {
            position: sticky;
            top: 58px;
            z-index: 12;
            background: var(--bg);
            padding: 10px 0;
            border-bottom: 1px solid var(--line);
        }

        .sep-title {
            font-size: 20px;
            font-weight: 900;
            margin: 8px 0 3px;
        }

        .sep-sub {
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            line-height: 1.35;
        }

        .item-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            margin: 10px 0;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,.04);
        }

        .item-card.done {
            opacity: .72;
            background: #f0fdf4;
            border-color: #bbf7d0;
        }

        .item-image-wrap {
            width: 100%;
            height: 170px;
            background: #f9fafb;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        .item-body {
            padding: 10px;
        }

        .qty {
            background: var(--red2);
            color: #991b1b;
            border: 2px solid #fecaca;
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            font-size: 24px;
            line-height: 1;
            font-weight: 900;
            margin-bottom: 9px;
        }

        .ean {
            background: #f3f4f6;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            font-size: 17px;
            font-weight: 900;
            letter-spacing: .5px;
            margin-bottom: 8px;
            overflow-wrap: anywhere;
        }

        .item-name {
            font-size: 16px;
            font-weight: 900;
            margin: 0 0 8px;
            line-height: 1.25;
        }

        .loc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 8px;
        }

        .loc-box {
            border: 1px solid var(--line);
            background: #f9fafb;
            border-radius: 8px;
            padding: 8px;
            text-align: center;
        }

        .loc-label {
            display: block;
            color: var(--muted);
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 900;
            margin-bottom: 2px;
        }

        .loc-value {
            display: block;
            font-size: 17px;
            color: var(--dark);
            font-weight: 900;
            overflow-wrap: anywhere;
        }

        .notfound {
            margin: 10px 0;
            padding: 10px;
            background: #fff7ed;
            border: 1px solid #fed7aa;
            color: #9a3412;
            border-radius: var(--radius);
            font-size: 12px;
            font-weight: 800;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,.72);
            padding: 12px;
            align-items: center;
            justify-content: center;
        }

        .modal.open {
            display: flex;
        }

        .modal-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 14px;
            padding: 14px;
            max-height: 92vh;
            overflow-y: auto;
        }

        .modal-title {
            margin: 0 0 6px;
            font-size: 18px;
            font-weight: 900;
        }

        .modal-text {
            margin: 0 0 12px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            line-height: 1.35;
        }

        .form-input {
            width: 100%;
            min-height: 42px;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 0 10px;
            margin-bottom: 8px;
            font-weight: 700;
            outline: none;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .sheet {
            position: fixed;
            top: 0;
            right: -105%;
            width: 92%;
            max-width: 420px;
            height: 100%;
            background: var(--bg);
            z-index: 80;
            transition: right .22s ease;
            box-shadow: -6px 0 20px rgba(0,0,0,.22);
            display: flex;
            flex-direction: column;
        }

        .sheet.open {
            right: 0;
        }

        .sheet-head {
            background: var(--dark);
            color: #fff;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sheet-head strong {
            flex: 1;
            font-size: 16px;
            font-weight: 900;
        }

        .sheet-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .info-box {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 10px;
            margin-bottom: 10px;
        }

        .info-box p {
            margin: 5px 0;
            font-size: 13px;
            line-height: 1.35;
            overflow-wrap: anywhere;
        }

        .info-box b {
            font-weight: 900;
        }

        #print-area { display: none; }

        .spin {
            display: inline-block;
            animation: spin .9s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 380px) {
            body { font-size: 13px; }
            .brand { font-size: 14px; }
            .topbar { padding: 8px; }
            .container { padding: 8px; padding-bottom: 70px; }
            .order-id { font-size: 15px; }
            .order-actions { grid-template-columns: 1fr; }
            .small-actions { grid-template-columns: 1fr 1fr; }
            .item-image-wrap { height: 135px; }
            .qty { font-size: 21px; padding: 7px; }
            .ean { font-size: 14px; }
            .item-name { font-size: 15px; }
            .loc-value { font-size: 15px; }
            button { min-height: 40px; padding: 9px 8px; }
            .grid-2 { grid-template-columns: 1fr; }
        }

        @media print {
            body * { visibility: hidden; }
            html, body { background: white; height: auto; }
            #print-area, #print-area * { visibility: visible; }
            #print-area {
                display: block !important;
                position: absolute;
                left: 0;
                top: 0;
                width: 100mm;
                min-height: 150mm;
                padding: 4mm;
                background: white;
                color: black;
                font-family: Arial, Helvetica, sans-serif;
            }
            @page { size: 100mm 150mm; margin: 0; }
            .p-title { font-size: 24px; font-weight: 900; text-align: center; border: 3px solid #000; padding: 8px; margin: 0 0 8px; }
            .p-section { border-bottom: 2px dashed #000; padding-bottom: 8px; margin-bottom: 8px; }
            .p-label { font-size: 10px; text-transform: uppercase; font-weight: 900; margin-top: 5px; }
            .p-value { font-size: 14px; font-weight: 900; margin-bottom: 5px; overflow-wrap: anywhere; }
            .p-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
            .p-table th { font-size: 11px; text-align: left; border-bottom: 2px solid #000; padding: 4px 0; }
            .p-table td { font-size: 12px; border-bottom: 1px solid #bbb; padding: 5px 0; font-weight: 700; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-row">
            <div class="brand">
                📦 Separação
                <small>Pedidos dos arquivos site/spedidos</small>
            </div>
            <button class="top-btn green" onclick="buscarPedidos()" title="Atualizar">↻</button>
            <button class="top-btn" onclick="abrirConfig()" title="Configurar">⚙</button>
        </div>
    </header>

    <main class="container">
        <div id="statusbar" class="statusbar"></div>

        <section id="screen-pedidos" class="screen active">
            <input id="busca" class="search-box" type="search" placeholder="Buscar pedido, cliente, telefone ou endereço..." oninput="renderizarListaPedidos()">

            <div class="filters">
                <button id="flt-todos" class="filter-btn active" onclick="definirFiltro('todos')">Todos</button>
                <button id="flt-pendentes" class="filter-btn" onclick="definirFiltro('pendentes')">Pendentes</button>
                <button id="flt-concluidos" class="filter-btn" onclick="definirFiltro('concluidos')">Concluídos</button>
            </div>

            <div id="selectbar" class="selectbar">
                <span id="select-count">0 selecionado(s)</span>
                <button class="btn red small" onclick="excluirSelecionados()">Excluir</button>
                <button class="btn light small" onclick="limparSelecao()">Limpar</button>
            </div>

            <div id="lista-pedidos" class="lista-pedidos">
                <div class="empty">Carregando pedidos...</div>
            </div>
        </section>

        <section id="screen-separacao" class="screen">
            <div class="sep-header">
                <button class="btn light small" onclick="voltarParaPedidos()">← Voltar aos pedidos</button>
                <div id="titulo-pedido-ativo" class="sep-title">Pedido</div>
                <div id="sub-pedido-ativo" class="sep-sub"></div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:8px;">
                    <button class="btn green small" onclick="separarTodosDeUmaVez()">✓ Marcar todos</button>
                    <button class="btn blue small" onclick="abrirEntregador(null, pedidoAtivo)">Entrega</button>
                </div>
            </div>
            <div id="lista-itens"></div>
        </section>
    </main>

    <div id="modal-config" class="modal">
        <div class="modal-card">
            <h3 class="modal-title">Credenciais GitHub</h3>
            <p class="modal-text">Use as mesmas credenciais do PIM. Elas ficam salvas somente neste aparelho.</p>
            <input id="cfg-user" class="form-input" type="text" placeholder="Usuário GitHub">
            <input id="cfg-repo" class="form-input" type="text" placeholder="Repositório">
            <input id="cfg-token" class="form-input" type="password" placeholder="Token GitHub">
            <div class="grid-2">
                <button class="btn green" onclick="salvarConfig()">Salvar</button>
                <button class="btn light" onclick="fecharConfig()">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modal-separador" class="modal">
        <div class="modal-card">
            <h3 class="modal-title">Quem está separando?</h3>
            <p class="modal-text">Escolha o separador para travar o pedido com o nome da pessoa.</p>
            <div class="grid-2">
                <button class="btn" onclick="definirSeparador('Kely')">Kely</button>
                <button class="btn" onclick="definirSeparador('Claudenil')">Claudenil</button>
                <button class="btn" onclick="definirSeparador('Jose')">Jose</button>
                <button class="btn" onclick="definirSeparador('André')">André</button>
                <button class="btn" onclick="definirSeparador('Jovenil')">Jovenil</button>
                <button class="btn" onclick="definirSeparador('Osvaldo')">Osvaldo</button>
            </div>
            <button class="btn light" style="width:100%; margin-top:8px;" onclick="fecharModalSeparador()">Cancelar</button>
        </div>
    </div>

    <div id="sheet-entrega" class="sheet">
        <div class="sheet-head">
            <strong>🚚 Dados da entrega</strong>
            <button class="top-btn" onclick="fecharEntregador()">✕</button>
        </div>
        <div id="entregador-content" class="sheet-body"></div>
    </div>

    <div id="print-area"></div>

    <script>
        const CAMINHO_PEDIDOS = 'site/pedidoseparar.json';
        const CAMINHO_SPEDIDOS = 'site/spedidos';
        let origemPedidos = 'arquivo';
        const CONFIG_STORAGE_KEY = 'separador_config_v2';
        const COOKIE_CONFIG_KEY = 'separador_config_bkp_v2';

        let cfg = null;
        let fileSha = null;
        let todosOsPedidos = [];
        let pedidoAtivo = null;
        let pedidoAguardandoSeparador = null;
        let idsSelecionados = new Set();
        let filtroAtual = 'todos';
        let salvando = false;

        window.onload = function() {
            carregarConfig();
        };

        function encodeBase64Unicode(str) {
            const bytes = new TextEncoder().encode(str);
            let bin = '';
            for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
            return btoa(bin);
        }

        function decodeBase64Unicode(b64) {
            const clean = String(b64 || '').replace(/\s/g, '');
            const bin = atob(clean);
            const bytes = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
            return new TextDecoder('utf-8').decode(bytes);
        }

        function salvarCookie(nome, valor, dias) {
            const data = new Date();
            data.setTime(data.getTime() + (dias * 24 * 60 * 60 * 1000));
            document.cookie = nome + '=' + encodeURIComponent(valor) + ';expires=' + data.toUTCString() + ';path=/;SameSite=Lax';
        }

        function lerCookie(nome) {
            const nomeEq = nome + '=';
            const partes = document.cookie.split(';');
            for (let i = 0; i < partes.length; i++) {
                let c = partes[i].trim();
                if (c.indexOf(nomeEq) === 0) return decodeURIComponent(c.substring(nomeEq.length));
            }
            return null;
        }

        function mostrarStatus(msg, tipo) {
            const el = document.getElementById('statusbar');
            if (!msg) {
                el.style.display = 'none';
                el.textContent = '';
                return;
            }
            el.style.display = 'block';
            el.textContent = msg;
            if (tipo === 'erro') {
                el.style.background = '#fef2f2';
                el.style.borderColor = '#fecaca';
                el.style.color = '#991b1b';
            } else if (tipo === 'ok') {
                el.style.background = '#ecfdf5';
                el.style.borderColor = '#a7f3d0';
                el.style.color = '#065f46';
            } else {
                el.style.background = '#fff7ed';
                el.style.borderColor = '#fed7aa';
                el.style.color = '#9a3412';
            }
        }

        function abrirConfig() {
            document.getElementById('cfg-user').value = cfg && cfg.user ? cfg.user : '';
            document.getElementById('cfg-repo').value = cfg && cfg.repo ? cfg.repo : '';
            document.getElementById('cfg-token').value = cfg && cfg.token ? cfg.token : '';
            document.getElementById('modal-config').classList.add('open');
        }

        function fecharConfig() {
            document.getElementById('modal-config').classList.remove('open');
        }

        function carregarConfig() {
            try {
                let raw = localStorage.getItem(CONFIG_STORAGE_KEY);
                if (!raw) raw = lerCookie(COOKIE_CONFIG_KEY);
                cfg = raw ? JSON.parse(raw) : null;
            } catch (e) {
                cfg = null;
            }

            if (!cfg || !cfg.user || !cfg.repo || !cfg.token) {
                abrirConfig();
                document.getElementById('lista-pedidos').innerHTML = '<div class="empty">Configure o GitHub para carregar os pedidos.</div>';
            } else {
                buscarPedidos();
            }
        }

        function salvarConfig() {
            const user = document.getElementById('cfg-user').value.trim();
            const repo = document.getElementById('cfg-repo').value.trim();
            const token = document.getElementById('cfg-token').value.trim();
            if (!user || !repo || !token) {
                alert('Preencha usuário, repositório e token.');
                return;
            }
            cfg = { user, repo, token };
            const raw = JSON.stringify(cfg);
            localStorage.setItem(CONFIG_STORAGE_KEY, raw);
            salvarCookie(COOKIE_CONFIG_KEY, raw, 365);
            fecharConfig();
            buscarPedidos();
        }

        function githubHeaders() {
            return {
                'Authorization': 'Bearer ' + cfg.token,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            };
        }

        function githubUrl(caminho) {
            return 'https://api.github.com/repos/' + encodeURIComponent(cfg.user) + '/' + encodeURIComponent(cfg.repo) + '/contents/' + caminho + '?t=' + Date.now();
        }

        async function fetchComTimeout(url, options, timeoutMs) {
            const controller = new AbortController();
            const timer = setTimeout(function() { controller.abort(); }, timeoutMs || 30000);
            try {
                const finalOptions = Object.assign({}, options || {}, { signal: controller.signal });
                return await fetch(url, finalOptions);
            } finally {
                clearTimeout(timer);
            }
        }

        function textoSeguro(v) {
            return String(v === undefined || v === null ? '' : v);
        }

        function escaparHTML(v) {
            return textoSeguro(v)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function obterDataPedido(pedido) {
            return pedido.criado_em || pedido.data || pedido.data_pedido || new Date().toISOString();
        }

        function extrairCidadeDoEndereco(endereco) {
            const t = textoSeguro(endereco);
            if (!t) return 'Cidade ND';
            if (/cuiab[aá]/i.test(t)) return 'Cuiabá';
            if (/v[aá]rzea\s*grande/i.test(t)) return 'Várzea Grande';
            const m = t.match(/,\s*([^,\/]+)\/[A-Z]{2}/i);
            if (m && m[1]) return m[1].trim();
            return 'Cidade ND';
        }

        function obterClientePedido(pedido) {
            const cliente = pedido.cliente || {};
            const entrega = pedido.entrega || {};
            const pagamento = pedido.pagamento || {};

            const endereco = entrega.endereco || cliente.endereco || pedido.endereco || pedido.cliente_endereco || '';
            const agendamento = entrega.agendamento || cliente.agendamento || pedido.agendamento || '';

            return {
                nome: cliente.nome || pedido.cliente_nome || pedido.nome_cliente || 'Cliente não informado',
                codigo: cliente.codigo || pedido.cliente_codigo || pedido.codigo_cliente || 'N/A',
                telefone: cliente.telefone || pedido.cliente_telefone || pedido.telefone_cliente || 'Sem telefone',
                email: cliente.email || pedido.cliente_email || pedido.email_cliente || '',
                cpf: cliente.cpf || pedido.cliente_cpf || pedido.cpf_cliente || '',
                endereco: endereco,
                detalhes: entrega.detalhes || cliente.detalhes || pedido.detalhes || '',
                agendamento: agendamento,
                pagamento: pagamento.forma || cliente.pagamento || pedido.forma_pagamento || pedido.pagamento || '',
                total: pagamento.total_texto || pedido.total_texto || pedido.total || '',
                cidade: cliente.cidade || pedido.cliente_cidade || pedido.cidade_cliente || extrairCidadeDoEndereco(endereco),
                rota: cliente.rota || pedido.cliente_rota || pedido.rota_cliente || agendamento || 'Rota ND'
            };
        }

        function normalizarItemSeparacao(item) {
            const qtd = parseInt(item.quantidade || item.qtd || item.qtde || 1, 10);
            const ean = item.ean || item.gtin || item.codigo_barras || '';
            return Object.assign({}, item, {
                nome: item.nome || item.nome_produto || item.nome_digitado_no_pedido || 'Produto sem nome',
                quantidade: isNaN(qtd) || qtd <= 0 ? 1 : qtd,
                gtin: item.gtin || ean || '',
                ean: ean || item.gtin || '',
                url_imagem: item.url_imagem || item.imagem || item.foto || '',
                gondola: item.gondola || item['gôndola'] || item.local_gondola || 'Z-Sem Gôndola',
                prateleira: item.prateleira || item.local_prateleira || '-',
                status: item.status || 'pendente'
            });
        }

        function normalizarPedidoSeparacao(pedido) {
            const data = obterDataPedido(pedido);
            const id = String(pedido.id || pedido.numero_pedido || pedido.numero || Date.now());
            const itens = Array.isArray(pedido.itens) ? pedido.itens.map(normalizarItemSeparacao) : [];
            const itensNaoEncontrados = Array.isArray(pedido.itens_nao_encontrados) ? pedido.itens_nao_encontrados : [];

            return Object.assign({}, pedido, {
                id: id,
                numero_pedido: String(pedido.numero_pedido || id),
                data: data,
                criado_em: pedido.criado_em || data,
                status: pedido.status || 'pendente',
                itens: itens,
                itens_nao_encontrados: itensNaoEncontrados
            });
        }

        function limparCamposInternosPedido(pedido) {
            const copia = Object.assign({}, pedido || {});
            delete copia.__githubPath;
            delete copia.__githubSha;
            delete copia.__githubFileName;
            return copia;
        }

        async function lerJsonGitHubPorPath(caminho) {
            const res = await fetchComTimeout(githubUrl(caminho), {
                headers: githubHeaders(),
                cache: 'no-store'
            }, 30000);

            if (!res.ok) {
                let msg = 'HTTP ' + res.status;
                try {
                    const erro = await res.json();
                    if (erro && erro.message) msg += ' - ' + erro.message;
                } catch (e) {}
                throw new Error('Erro ao ler ' + caminho + ': ' + msg);
            }

            const data = await res.json();
            const json = data.content ? JSON.parse(decodeBase64Unicode(data.content)) : null;
            return { json: json, sha: data.sha, path: caminho, name: caminho.split('/').pop() };
        }

        async function buscarPedidosDaPastaSpedidos() {
            const res = await fetchComTimeout(githubUrl(CAMINHO_SPEDIDOS), {
                headers: githubHeaders(),
                cache: 'no-store'
            }, 30000);

            if (res.status === 404) {
                return null;
            }

            if (!res.ok) {
                let msg = 'HTTP ' + res.status;
                try {
                    const erro = await res.json();
                    if (erro && erro.message) msg += ' - ' + erro.message;
                } catch (e) {}
                throw new Error('Erro ao acessar pasta ' + CAMINHO_SPEDIDOS + ': ' + msg);
            }

            const arquivos = await res.json();
            if (!Array.isArray(arquivos)) {
                return null;
            }

            const jsons = arquivos
                .filter(function(arq) {
                    return arq && arq.type === 'file' && /\.json$/i.test(arq.name || '');
                })
                .sort(function(a, b) {
                    return String(b.name || '').localeCompare(String(a.name || ''));
                });

            const pedidos = [];
            for (let i = 0; i < jsons.length; i++) {
                try {
                    const lido = await lerJsonGitHubPorPath(jsons[i].path);
                    const conteudo = lido.json;
                    const lista = Array.isArray(conteudo) ? conteudo : [conteudo];
                    lista.forEach(function(pedidoBruto) {
                        if (!pedidoBruto || typeof pedidoBruto !== 'object') return;
                        const normalizado = normalizarPedidoSeparacao(pedidoBruto);
                        normalizado.__githubPath = lido.path;
                        normalizado.__githubSha = lido.sha;
                        normalizado.__githubFileName = lido.name;
                        pedidos.push(normalizado);
                    });
                } catch (e) {
                    console.error(e);
                }
            }

            return pedidos;
        }

        function montarNomeArquivoPedido(pedido) {
            const id = String((pedido && (pedido.id || pedido.numero_pedido)) || Date.now()).replace(/[^a-zA-Z0-9_-]/g, '-');
            return CAMINHO_SPEDIDOS + '/pedido-' + id + '.json';
        }

        async function salvarPedidoNaPastaSpedidos(pedido, mensagem) {
            const caminho = pedido.__githubPath || montarNomeArquivoPedido(pedido);
            let shaAtual = pedido.__githubSha || null;

            try {
                const atual = await lerJsonGitHubPorPath(caminho);
                shaAtual = atual.sha;
            } catch (e) {
                if (!String(e.message || '').includes('HTTP 404')) {
                    // Se falhar por motivo diferente, ainda tentamos salvar usando o SHA local, quando existir.
                    console.warn(e);
                }
            }

            const body = {
                message: mensagem || 'Atualização do separador',
                content: encodeBase64Unicode(JSON.stringify(limparCamposInternosPedido(pedido), null, 2))
            };
            if (shaAtual) body.sha = shaAtual;

            const putUrl = 'https://api.github.com/repos/' + encodeURIComponent(cfg.user) + '/' + encodeURIComponent(cfg.repo) + '/contents/' + caminho;
            const putRes = await fetchComTimeout(putUrl, {
                method: 'PUT',
                headers: githubHeaders(),
                body: JSON.stringify(body)
            }, 45000);

            if (!putRes.ok) {
                let msg = 'HTTP ' + putRes.status;
                try {
                    const erro = await putRes.json();
                    if (erro && erro.message) msg += ' - ' + erro.message;
                } catch(e) {}
                throw new Error(msg);
            }

            const dataPut = await putRes.json();
            if (dataPut && dataPut.content) {
                pedido.__githubPath = dataPut.content.path || caminho;
                pedido.__githubSha = dataPut.content.sha || shaAtual;
                pedido.__githubFileName = dataPut.content.name || caminho.split('/').pop();
            }
        }

        async function excluirPedidoDaPastaSpedidos(pedido) {
            if (!pedido || !pedido.__githubPath) return;
            const caminho = pedido.__githubPath;
            let shaAtual = pedido.__githubSha;

            if (!shaAtual) {
                const atual = await lerJsonGitHubPorPath(caminho);
                shaAtual = atual.sha;
            }

            const delUrl = 'https://api.github.com/repos/' + encodeURIComponent(cfg.user) + '/' + encodeURIComponent(cfg.repo) + '/contents/' + caminho;
            const delRes = await fetchComTimeout(delUrl, {
                method: 'DELETE',
                headers: githubHeaders(),
                body: JSON.stringify({
                    message: 'Pedido #' + pedido.id + ' excluído pelo separador',
                    sha: shaAtual
                })
            }, 45000);

            if (!delRes.ok && delRes.status !== 404) {
                let msg = 'HTTP ' + delRes.status;
                try {
                    const erro = await delRes.json();
                    if (erro && erro.message) msg += ' - ' + erro.message;
                } catch(e) {}
                throw new Error(msg);
            }
        }

        async function buscarPedidos() {
            if (!cfg || !cfg.token) {
                abrirConfig();
                return;
            }

            mostrarStatus('Buscando pedidos atualizados...', 'aviso');
            document.getElementById('lista-pedidos').innerHTML = '<div class="empty"><span class="spin">↻</span> Carregando pedidos...</div>';
            idsSelecionados.clear();
            atualizarBarraSelecao();

            try {
                const pedidosSpedidos = await buscarPedidosDaPastaSpedidos();

                if (pedidosSpedidos !== null) {
                    origemPedidos = 'pasta';
                    fileSha = null;
                    todosOsPedidos = pedidosSpedidos.map(normalizarPedidoSeparacao);
                    mostrarStatus('Pedidos atualizados pela pasta site/spedidos. Total: ' + todosOsPedidos.length, 'ok');
                    setTimeout(function() { mostrarStatus(''); }, 2200);
                    renderizarListaPedidos();
                    return;
                }

                origemPedidos = 'arquivo';
                const res = await fetchComTimeout(githubUrl(CAMINHO_PEDIDOS), {
                    headers: githubHeaders(),
                    cache: 'no-store'
                }, 30000);

                if (res.status === 404) {
                    fileSha = null;
                    todosOsPedidos = [];
                    mostrarStatus('Não encontrei site/spedidos nem o arquivo pedidoseparar.json.', 'aviso');
                    renderizarListaPedidos();
                    return;
                }

                if (!res.ok) {
                    let msg = 'HTTP ' + res.status;
                    try {
                        const erro = await res.json();
                        if (erro && erro.message) msg += ' - ' + erro.message;
                    } catch (e) {}
                    throw new Error(msg);
                }

                const data = await res.json();
                fileSha = data.sha;

                let conteudo = [];
                if (data.content) {
                    conteudo = JSON.parse(decodeBase64Unicode(data.content));
                }

                todosOsPedidos = Array.isArray(conteudo) ? conteudo.map(normalizarPedidoSeparacao) : [];
                mostrarStatus('Pedidos atualizados pelo arquivo antigo. Total: ' + todosOsPedidos.length, 'ok');
                setTimeout(function() { mostrarStatus(''); }, 2200);
                renderizarListaPedidos();
            } catch (err) {
                console.error(err);
                mostrarStatus('Erro ao buscar pedidos: ' + err.message, 'erro');
                document.getElementById('lista-pedidos').innerHTML = '<div class="empty">Erro ao carregar. Confira internet, token, repositório e pasta site/spedidos.</div>';
            }
        }

        function definirFiltro(filtro) {
            filtroAtual = filtro;
            ['todos','pendentes','concluidos'].forEach(function(f) {
                const el = document.getElementById('flt-' + f);
                if (el) el.classList.toggle('active', f === filtro);
            });
            renderizarListaPedidos();
        }

        function pedidoCombinaBusca(pedido, termo) {
            if (!termo) return true;
            const c = obterClientePedido(pedido);
            const alvo = [pedido.id, pedido.numero_pedido, c.nome, c.telefone, c.endereco, c.agendamento, c.pagamento].join(' ').toLowerCase();
            return alvo.indexOf(termo.toLowerCase()) !== -1;
        }

        function pedidoCombinaFiltro(pedido) {
            if (filtroAtual === 'pendentes') return pedido.status !== 'concluido';
            if (filtroAtual === 'concluidos') return pedido.status === 'concluido';
            return true;
        }

        function renderizarListaPedidos() {
            const el = document.getElementById('lista-pedidos');
            const termo = document.getElementById('busca') ? document.getElementById('busca').value.trim() : '';

            const pendentes = todosOsPedidos.filter(function(p) { return p.status !== 'concluido'; });
            const concluidos = todosOsPedidos.filter(function(p) { return p.status === 'concluido'; });
            const ordenados = pendentes.concat(concluidos).filter(function(p) {
                return pedidoCombinaFiltro(p) && pedidoCombinaBusca(p, termo);
            });

            if (ordenados.length === 0) {
                el.innerHTML = '<div class="empty">Nenhum pedido para mostrar.</div>';
                return;
            }

            let html = '';
            let ultimoGrupo = '';
            const hoje = new Date();
            hoje.setHours(0,0,0,0);

            ordenados.forEach(function(pedido) {
                const dataObj = new Date(obterDataPedido(pedido));
                const dataValida = isNaN(dataObj.getTime()) ? new Date() : dataObj;
                const dataSemHora = new Date(dataValida.getFullYear(), dataValida.getMonth(), dataValida.getDate());
                const diff = Math.floor((hoje.getTime() - dataSemHora.getTime()) / 86400000);
                const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
                let grupo = dataValida.getDate() + ' de ' + meses[dataValida.getMonth()];
                if (diff === 0) grupo = 'Hoje';
                if (diff === 1) grupo = 'Ontem';

                if (grupo !== ultimoGrupo) {
                    html += '<div class="section-title">' + escaparHTML(grupo) + '</div>';
                    ultimoGrupo = grupo;
                }

                const indexReal = todosOsPedidos.findIndex(function(x) { return x.id === pedido.id; });
                const cliente = obterClientePedido(pedido);
                const itens = Array.isArray(pedido.itens) ? pedido.itens : [];
                const totalSkus = itens.length;
                const totalUn = itens.reduce(function(s, i) { return s + (parseInt(i.quantidade, 10) || 0); }, 0);
                const separados = itens.filter(function(i) { return i.status === 'separado'; }).length;
                const hora = dataValida.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                const done = pedido.status === 'concluido';
                const naoEncontrados = Array.isArray(pedido.itens_nao_encontrados) ? pedido.itens_nao_encontrados.length : 0;

                html += `
                <article class="order-card ${done ? 'done' : ''}">
                    <div class="order-head">
                        <input class="order-check" type="checkbox" ${idsSelecionados.has(pedido.id) ? 'checked' : ''} onchange="toggleSelecao('${escaparHTML(pedido.id)}', this.checked)">
                        <div class="order-main" onclick="abrirPedido(${indexReal})">
                            <div class="order-id">Pedido #${escaparHTML(pedido.id)}</div>
                            <div class="order-meta">${escaparHTML(hora)} • ${totalSkus} itens • ${totalUn} peças • ${separados}/${totalSkus} separados</div>
                            <div class="order-meta">Separador: <b>${escaparHTML(pedido.separador || 'Aguardando')}</b></div>
                        </div>
                        <span class="badge ${done ? 'done' : ''}">${done ? 'SEPARADO' : 'PENDENTE'}</span>
                    </div>

                    <div class="client-box" onclick="abrirPedido(${indexReal})">
                        <div class="client-name">${escaparHTML(cliente.nome)}</div>
                        <div class="client-line">☎ ${escaparHTML(cliente.telefone)}</div>
                        <div class="client-line">📍 ${escaparHTML(cliente.endereco || cliente.cidade)}</div>
                        <div class="client-line">📅 ${escaparHTML(cliente.agendamento || 'Sem agendamento')} ${cliente.total ? ' • ' + escaparHTML(cliente.total) : ''}</div>
                        ${naoEncontrados > 0 ? '<div class="client-line" style="color:#b45309;">⚠ ' + naoEncontrados + ' item(ns) não encontrado(s) no banco</div>' : ''}
                    </div>

                    <div class="order-actions">
                        <button class="btn light small" onclick="imprimirPedido(event, ${indexReal})">Etiqueta</button>
                        <button class="btn whats small" onclick="compartilharWhatsApp(event, ${indexReal})">WhatsApp</button>
                        <button class="btn blue small" onclick="abrirEntregador(event, ${indexReal})">Entrega</button>
                    </div>

                    <div class="small-actions">
                        <button class="btn light small" onclick="moverPedido(${indexReal}, -1)">↑ Subir</button>
                        <button class="btn light small" onclick="moverPedido(${indexReal}, 1)">↓ Descer</button>
                    </div>
                </article>`;
            });

            el.innerHTML = html;
            atualizarBarraSelecao();
        }

        function toggleSelecao(id, checked) {
            if (checked) idsSelecionados.add(id);
            else idsSelecionados.delete(id);
            atualizarBarraSelecao();
        }

        function atualizarBarraSelecao() {
            const bar = document.getElementById('selectbar');
            const count = document.getElementById('select-count');
            if (idsSelecionados.size > 0) {
                bar.style.display = 'flex';
                count.textContent = idsSelecionados.size + ' selecionado(s)';
            } else {
                bar.style.display = 'none';
                count.textContent = '0 selecionado(s)';
            }
        }

        function limparSelecao() {
            idsSelecionados.clear();
            renderizarListaPedidos();
        }

        async function excluirSelecionados() {
            if (idsSelecionados.size === 0) return;
            if (!confirm('Excluir ' + idsSelecionados.size + ' pedido(s)?')) return;

            const removidos = todosOsPedidos.filter(function(p) { return idsSelecionados.has(p.id); });
            todosOsPedidos = todosOsPedidos.filter(function(p) { return !idsSelecionados.has(p.id); });
            idsSelecionados.clear();

            if (origemPedidos === 'pasta') {
                try {
                    mostrarStatus('Excluindo arquivo(s) da pasta site/spedidos...', 'aviso');
                    for (let i = 0; i < removidos.length; i++) {
                        await excluirPedidoDaPastaSpedidos(removidos[i]);
                    }
                    mostrarStatus('Pedido(s) excluído(s) com sucesso.', 'ok');
                    setTimeout(function() { mostrarStatus(''); }, 2000);
                } catch (err) {
                    console.error(err);
                    mostrarStatus('Erro ao excluir: ' + err.message, 'erro');
                    alert('Erro ao excluir no GitHub: ' + err.message);
                }
                renderizarListaPedidos();
                return;
            }

            await salvarNoGitHub(false, 'Pedidos excluídos pelo separador');
            renderizarListaPedidos();
        }

        async function moverPedido(index, direcao) {
            if (index < 0) return;
            const novoIndex = index + direcao;
            if (novoIndex < 0 || novoIndex >= todosOsPedidos.length) return;
            const item = todosOsPedidos.splice(index, 1)[0];
            todosOsPedidos.splice(novoIndex, 0, item);
            renderizarListaPedidos();
            if (origemPedidos !== 'pasta') {
                await salvarNoGitHub(false, 'Rota reorganizada no separador');
            } else {
                mostrarStatus('Ordem alterada nesta tela. Na pasta site/spedidos cada pedido fica em arquivo separado.', 'ok');
                setTimeout(function() { mostrarStatus(''); }, 2200);
            }
        }

        function abrirPedido(index) {
            if (index === null || index === undefined || index < 0 || !todosOsPedidos[index]) return;
            if (!todosOsPedidos[index].separador) {
                pedidoAguardandoSeparador = index;
                document.getElementById('modal-separador').classList.add('open');
                return;
            }
            executarAberturaPedido(index);
        }

        async function definirSeparador(nome) {
            if (pedidoAguardandoSeparador === null) return;
            const index = pedidoAguardandoSeparador;
            todosOsPedidos[index].separador = nome;
            pedidoAguardandoSeparador = null;
            document.getElementById('modal-separador').classList.remove('open');
            await salvarNoGitHub(false, 'Pedido #' + todosOsPedidos[index].id + ' atribuído para ' + nome);
            executarAberturaPedido(index);
        }

        function fecharModalSeparador() {
            pedidoAguardandoSeparador = null;
            document.getElementById('modal-separador').classList.remove('open');
        }

        function executarAberturaPedido(index) {
            pedidoAtivo = index;
            document.getElementById('screen-pedidos').classList.remove('active');
            document.getElementById('screen-separacao').classList.add('active');
            const p = todosOsPedidos[index];
            const c = obterClientePedido(p);
            document.getElementById('titulo-pedido-ativo').textContent = 'Separando #' + p.id;
            document.getElementById('sub-pedido-ativo').textContent = c.nome + ' • ' + c.telefone + ' • ' + (c.agendamento || 'sem agendamento');
            renderizarItensDoPedido();
            window.scrollTo(0, 0);
        }

        function voltarParaPedidos() {
            pedidoAtivo = null;
            document.getElementById('screen-separacao').classList.remove('active');
            document.getElementById('screen-pedidos').classList.add('active');
            renderizarListaPedidos();
            window.scrollTo(0, 0);
        }

        function formatarImagem(url) {
            const u = textoSeguro(url).trim();
            if (!u) return 'https://placehold.co/400x300/f4f4f5/6b7280?text=SEM+FOTO';
            if (u.indexOf('../') === 0) return u.replace('../', 'https://donaantonia.com.br/');
            return u;
        }

        function renderizarItensDoPedido() {
            const p = todosOsPedidos[pedidoAtivo];
            if (!p) return;

            p.itens = Array.isArray(p.itens) ? p.itens.map(normalizarItemSeparacao) : [];
            p.itens.sort(function(a, b) {
                const g = String(a.gondola || '').localeCompare(String(b.gondola || ''));
                if (g !== 0) return g;
                return String(a.prateleira || '').localeCompare(String(b.prateleira || ''));
            });

            let html = '';

            if (Array.isArray(p.itens_nao_encontrados) && p.itens_nao_encontrados.length > 0) {
                html += '<div class="notfound"><b>Itens não encontrados no banco:</b><br>';
                html += p.itens_nao_encontrados.map(function(i) {
                    return escaparHTML((i.quantidade || 1) + 'x ' + (i.nome_digitado_no_pedido || i.nome || 'Produto sem nome'));
                }).join('<br>');
                html += '</div>';
            }

            if (p.itens.length === 0) {
                html += '<div class="empty">Este pedido não possui itens encontrados para separar.</div>';
                document.getElementById('lista-itens').innerHTML = html;
                return;
            }

            html += p.itens.map(function(item, idx) {
                const separado = item.status === 'separado';
                return `
                <article class="item-card ${separado ? 'done' : ''}">
                    <div class="item-image-wrap">
                        <img class="item-img" loading="lazy" src="${escaparHTML(formatarImagem(item.url_imagem))}" onerror="this.src='https://placehold.co/400x300/f4f4f5/dc2626?text=SEM+FOTO'" alt="${escaparHTML(item.nome)}">
                    </div>
                    <div class="item-body">
                        <div class="qty">${escaparHTML(item.quantidade)} UNIDADE(S)</div>
                        <div class="ean">${escaparHTML(item.ean || item.gtin || 'SEM EAN')}</div>
                        <h3 class="item-name">${escaparHTML(item.nome)}</h3>
                        <div class="loc-grid">
                            <div class="loc-box"><span class="loc-label">Gôndola</span><span class="loc-value">${escaparHTML(item.gondola || 'Z-Sem Gôndola')}</span></div>
                            <div class="loc-box"><span class="loc-label">Prateleira</span><span class="loc-value">${escaparHTML(item.prateleira || '-')}</span></div>
                        </div>
                        ${separado
                            ? '<button class="btn green" style="width:100%;" disabled>✓ Separado</button>'
                            : '<button class="btn" style="width:100%;" onclick="confirmarSeparacao(' + idx + ')">Marcar como separado</button>'}
                    </div>
                </article>`;
            }).join('');

            document.getElementById('lista-itens').innerHTML = html;
        }

        async function confirmarSeparacao(itemIndex) {
            const p = todosOsPedidos[pedidoAtivo];
            if (!p || !p.itens[itemIndex]) return;
            p.itens[itemIndex].status = 'separado';

            if (p.itens.length > 0 && p.itens.every(function(i) { return i.status === 'separado'; })) {
                p.status = 'concluido';
                await salvarNoGitHub(true, 'Pedido #' + p.id + ' concluído');
            } else {
                renderizarItensDoPedido();
                await salvarNoGitHub(false, 'Item separado no pedido #' + p.id);
            }
        }

        async function separarTodosDeUmaVez() {
            if (pedidoAtivo === null || !todosOsPedidos[pedidoAtivo]) return;
            const senha = prompt('Digite a senha para marcar todos como separados:');
            if (senha === null) return;
            if (senha !== '0904') {
                alert('Senha incorreta.');
                return;
            }
            todosOsPedidos[pedidoAtivo].itens.forEach(function(i) { i.status = 'separado'; });
            todosOsPedidos[pedidoAtivo].status = 'concluido';
            await salvarNoGitHub(true, 'Pedido #' + todosOsPedidos[pedidoAtivo].id + ' concluído em lote');
        }

        async function salvarNoGitHub(pedidoCompleto, mensagem) {
            if (salvando) {
                mostrarStatus('Já existe uma gravação em andamento. Aguarde finalizar.', 'aviso');
                return;
            }
            salvando = true;
            mostrarStatus('Salvando no GitHub...', 'aviso');

            try {
                if (origemPedidos === 'pasta') {
                    if (pedidoAtivo !== null && todosOsPedidos[pedidoAtivo]) {
                        await salvarPedidoNaPastaSpedidos(todosOsPedidos[pedidoAtivo], mensagem);
                    } else {
                        for (let i = 0; i < todosOsPedidos.length; i++) {
                            await salvarPedidoNaPastaSpedidos(todosOsPedidos[i], mensagem);
                        }
                    }

                    mostrarStatus('Salvo com sucesso na pasta site/spedidos.', 'ok');
                    setTimeout(function() { mostrarStatus(''); }, 2000);

                    if (pedidoCompleto) {
                        alert('🎉 Pedido concluído!');
                        voltarParaPedidos();
                    } else if (pedidoAtivo !== null) {
                        renderizarItensDoPedido();
                    } else {
                        renderizarListaPedidos();
                    }
                    return;
                }

                let shaAtual = fileSha;
                let pedidosServidor = [];

                const getRes = await fetchComTimeout(githubUrl(CAMINHO_PEDIDOS), {
                    headers: githubHeaders(),
                    cache: 'no-store'
                }, 30000);

                if (getRes.ok) {
                    const dataGet = await getRes.json();
                    shaAtual = dataGet.sha;
                    fileSha = dataGet.sha;
                    pedidosServidor = JSON.parse(decodeBase64Unicode(dataGet.content));
                    if (!Array.isArray(pedidosServidor)) pedidosServidor = [];
                    pedidosServidor = pedidosServidor.map(normalizarPedidoSeparacao);
                } else if (getRes.status !== 404) {
                    throw new Error('Erro ao ler versão atual: HTTP ' + getRes.status);
                }

                if (pedidoAtivo !== null && todosOsPedidos[pedidoAtivo]) {
                    const meuPedido = todosOsPedidos[pedidoAtivo];
                    const idx = pedidosServidor.findIndex(function(p) { return String(p.id) === String(meuPedido.id); });
                    if (idx !== -1) pedidosServidor[idx] = meuPedido;
                    else pedidosServidor.push(meuPedido);
                    todosOsPedidos = pedidosServidor.map(normalizarPedidoSeparacao);
                    pedidoAtivo = todosOsPedidos.findIndex(function(p) { return String(p.id) === String(meuPedido.id); });
                } else {
                    pedidosServidor = todosOsPedidos.map(normalizarPedidoSeparacao);
                }

                const body = {
                    message: mensagem || 'Atualização do separador',
                    content: encodeBase64Unicode(JSON.stringify(todosOsPedidos, null, 2))
                };
                if (shaAtual) body.sha = shaAtual;

                const putUrl = 'https://api.github.com/repos/' + encodeURIComponent(cfg.user) + '/' + encodeURIComponent(cfg.repo) + '/contents/' + CAMINHO_PEDIDOS;
                const putRes = await fetchComTimeout(putUrl, {
                    method: 'PUT',
                    headers: githubHeaders(),
                    body: JSON.stringify(body)
                }, 45000);

                if (!putRes.ok) {
                    let msg = 'HTTP ' + putRes.status;
                    try {
                        const erro = await putRes.json();
                        if (erro && erro.message) msg += ' - ' + erro.message;
                    } catch(e) {}
                    throw new Error(msg);
                }

                const dataPut = await putRes.json();
                fileSha = dataPut && dataPut.content ? dataPut.content.sha : fileSha;
                mostrarStatus('Salvo com sucesso.', 'ok');
                setTimeout(function() { mostrarStatus(''); }, 2000);

                if (pedidoCompleto) {
                    alert('🎉 Pedido concluído!');
                    voltarParaPedidos();
                } else if (pedidoAtivo !== null) {
                    renderizarItensDoPedido();
                } else {
                    renderizarListaPedidos();
                }
            } catch (err) {
                console.error(err);
                mostrarStatus('Erro ao salvar: ' + err.message, 'erro');
                alert('Erro ao salvar no GitHub: ' + err.message);
            } finally {
                salvando = false;
            }
        }

        function abrirEntregador(event, index) {
            if (event && event.stopPropagation) event.stopPropagation();
            if (index === null || index === undefined || index < 0) return;
            const p = todosOsPedidos[index];
            if (!p) return;
            const c = obterClientePedido(p);
            const telLimpo = textoSeguro(c.telefone).replace(/\D/g, '');
            const linkTel = telLimpo ? 'tel:' + telLimpo : '#';
            const linkWa = telLimpo ? 'https://wa.me/55' + telLimpo : '#';
            const mapa = c.endereco || (c.nome + ' ' + c.cidade);
            const linkMaps = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(mapa);

            const itens = Array.isArray(p.itens) ? p.itens : [];
            const htmlItens = itens.map(function(i) {
                return '<li style="padding:7px 0; border-bottom:1px solid var(--line); font-size:13px;"><b>' + escaparHTML(i.quantidade) + 'x</b> ' + escaparHTML(i.nome) + '</li>';
            }).join('');

            document.getElementById('entregador-content').innerHTML = `
                <div class="info-box">
                    <p style="font-size:18px; font-weight:900; margin-top:0;">Pedido #${escaparHTML(p.id)}</p>
                    <p><b>Cliente:</b> ${escaparHTML(c.nome)}</p>
                    <p><b>Telefone:</b> ${escaparHTML(c.telefone)}</p>
                    <p><b>CPF:</b> ${escaparHTML(c.cpf || '-')}</p>
                    <p><b>E-mail:</b> ${escaparHTML(c.email || '-')}</p>
                    <p><b>Endereço:</b> ${escaparHTML(c.endereco || 'Não informado')}</p>
                    <p><b>Detalhes:</b> ${escaparHTML(c.detalhes || '-')}</p>
                    <p><b>Agendamento:</b> ${escaparHTML(c.agendamento || '-')}</p>
                    <p><b>Pagamento:</b> ${escaparHTML(c.pagamento || '-')}</p>
                    <p><b>Total:</b> ${escaparHTML(c.total || '-')}</p>
                </div>

                <div style="display:grid; grid-template-columns:1fr; gap:8px; margin-bottom:10px;">
                    <a class="btn blue" style="text-decoration:none; text-align:center;" href="${escaparHTML(linkTel)}">Ligar normal</a>
                    <a class="btn whats" style="text-decoration:none; text-align:center;" target="_blank" href="${escaparHTML(linkWa)}">Chamar no WhatsApp</a>
                    <a class="btn red" style="text-decoration:none; text-align:center;" target="_blank" href="${escaparHTML(linkMaps)}">Abrir no Google Maps</a>
                </div>

                <div class="info-box">
                    <p style="font-weight:900; margin-top:0;">Itens do pedido</p>
                    <ul style="list-style:none; padding:0; margin:0;">${htmlItens}</ul>
                </div>
            `;
            document.getElementById('sheet-entrega').classList.add('open');
        }

        function fecharEntregador() {
            document.getElementById('sheet-entrega').classList.remove('open');
        }

        function compartilharWhatsApp(event, index) {
            event.stopPropagation();
            const p = todosOsPedidos[index];
            const c = obterClientePedido(p);
            let msg = '*🚚 PEDIDO #' + p.id + '*\n\n';
            msg += '*👤 Cliente:* ' + c.nome + '\n';
            msg += '*📞 Telefone:* ' + c.telefone + '\n';
            msg += '*📍 Endereço:* ' + (c.endereco || 'Não informado') + '\n';
            msg += '*📝 Detalhes:* ' + (c.detalhes || '-') + '\n';
            msg += '*📅 Agendamento:* ' + (c.agendamento || '-') + '\n';
            msg += '*💳 Pagamento:* ' + (c.pagamento || '-') + '\n';
            msg += '*💰 Total:* ' + (c.total || '-') + '\n\n';
            msg += '*📦 ITENS:*\n';
            (p.itens || []).forEach(function(i) {
                msg += '• ' + i.quantidade + 'x ' + i.nome + '\n';
            });
            if (Array.isArray(p.itens_nao_encontrados) && p.itens_nao_encontrados.length > 0) {
                msg += '\n*⚠ Itens não encontrados:*\n';
                p.itens_nao_encontrados.forEach(function(i) {
                    msg += '• ' + (i.quantidade || 1) + 'x ' + (i.nome_digitado_no_pedido || i.nome || 'Produto') + '\n';
                });
            }
            window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
        }

        function imprimirPedido(event, index) {
            event.stopPropagation();
            const p = todosOsPedidos[index];
            const c = obterClientePedido(p);
            const data = new Date(obterDataPedido(p));
            const dataTexto = isNaN(data.getTime()) ? '' : data.toLocaleString('pt-BR');
            const linhas = (p.itens || []).map(function(i) {
                return '<tr><td style="width:40px;">' + escaparHTML(i.quantidade) + 'x</td><td>' + escaparHTML(i.nome) + '</td></tr>';
            }).join('');

            document.getElementById('print-area').innerHTML = `
                <div class="p-title">PEDIDO #${escaparHTML(p.id)}</div>
                <div class="p-section">
                    <div class="p-label">Cliente</div>
                    <div class="p-value">${escaparHTML(c.nome)}</div>
                    <div class="p-label">Telefone</div>
                    <div class="p-value">${escaparHTML(c.telefone)}</div>
                    <div class="p-label">Endereço</div>
                    <div class="p-value" style="font-size:12px;">${escaparHTML(c.endereco || 'Não informado')}</div>
                    <div class="p-label">Detalhes</div>
                    <div class="p-value" style="font-size:12px;">${escaparHTML(c.detalhes || '-')}</div>
                    <div class="p-label">Agendamento</div>
                    <div class="p-value" style="font-size:12px;">${escaparHTML(c.agendamento || '-')}</div>
                    <div class="p-label">Pagamento / Total</div>
                    <div class="p-value" style="font-size:12px;">${escaparHTML(c.pagamento || '-')} • ${escaparHTML(c.total || '-')}</div>
                    <div class="p-label">Data</div>
                    <div class="p-value" style="font-size:11px;">${escaparHTML(dataTexto)}</div>
                </div>
                <div class="p-label">Produtos</div>
                <table class="p-table">
                    <thead><tr><th>Qtd</th><th>Produto</th></tr></thead>
                    <tbody>${linhas}</tbody>
                </table>
            `;
            window.print();
        }
    </script>
</body>
