<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sucedoan PIM - Gestão de Produtos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #e2e8f0;
            --radius: 8px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-body); height: 100vh; display: flex; flex-direction: column; color: var(--text-primary); overflow: hidden; }
        
        /* HEADER */
        header { background: #ffffff; min-height: 60px; display: flex; align-items: center; padding: 10px 24px; border-bottom: 1px solid var(--border); gap: 15px; flex-shrink: 0; box-shadow: var(--shadow-sm); z-index: 20; flex-wrap: wrap; }
        .brand { font-weight: 800; font-size: 18px; color: #0f172a; margin-right: auto; display: flex; align-items: center; gap: 8px; }
        .brand span { color: var(--accent); }
        
        .nav-btn { background: #f8fafc; border: 1px solid var(--border); color: var(--text-secondary); padding: 8px 14px; border-radius: var(--radius); font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 12px; min-height: 40px; }
        .nav-btn:hover { background: #e2e8f0; color: var(--text-primary); }
        .nav-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
        .nav-btn.primary:hover { background: var(--accent-hover); }
        .nav-btn.success { background: var(--success); color: white; border-color: var(--success); }
        .nav-btn.warning { background: #fffbeb; color: var(--warning); border-color: #fcd34d; }
        .nav-btn.warning:hover { background: #fef3c7; }

        /* STATUS DE FILA E AUTOSAVE */
        #queue-status { display:none; align-items:center; gap:8px; font-size:12px; font-weight:600; color:#0369a1; background:#e0f2fe; padding:8px 16px; border-radius:20px; border:1px solid #bae6fd; }

        /* TOOLBAR */
        .toolbar { padding: 12px 24px; display: flex; gap: 12px; background: #ffffff; border-bottom: 1px solid var(--border); flex-shrink: 0; align-items: center; flex-wrap: wrap; justify-content: space-between; }
        .toolbar-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .search-container { position: relative; width: 280px; }
        .search-input { width: 100%; background: #f8fafc; border: 1px solid var(--border); padding: 10px 10px 10px 36px; border-radius: var(--radius); font-size: 13px; outline: none; transition: 0.2s; }
        .search-input:focus { border-color: var(--accent); background: #ffffff; }
        .search-icon { position: absolute; left: 12px; top: 12px; color: #94a3b8; width: 16px; }
        .toolbar-select { background: #f8fafc; border: 1px solid var(--border); padding: 10px 12px; border-radius: var(--radius); font-weight: 500; font-size: 12px; outline: none; }
        
        /* GRID DE PRODUTOS */
        .product-grid { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80%; color: var(--text-secondary); text-align: center; }
        
        /* DESKTOP LIST ROW */
        .list-row { display: grid; grid-template-columns: 80px 2fr 1fr 100px 90px 70px 60px 80px 80px 60px 100px; gap: 8px; padding: 6px 12px; border-bottom: 1px solid var(--border); background: var(--bg-card); align-items: center; font-size: 12px; transition: 0.2s; }
        .list-row:hover { background: #f8fafc; }
        .list-header { font-weight: 600; background: #f1f5f9; color: var(--text-secondary); font-size: 10px; position: sticky; top: 0; z-index: 10; border-top: 1px solid var(--border); padding-top: 10px; padding-bottom: 10px;}
        
        .list-input, .list-select { width: 100%; border: 1px solid transparent; background: transparent; font-size: 12px; padding: 6px; border-radius: 4px; color: var(--text-primary); outline: none; }
        .list-input:hover, .list-select:hover { border-color: var(--border); background: #fff; }
        .list-input:focus { border-color: var(--accent); background: #fff; }
        .list-input.number { text-align: right; font-weight: 600; }
        
        /* BOTÕES PEQUENOS (Ações na Tabela/Cards) */
        .action-cell { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }
        .btn-icon { background: white; border: 1px solid var(--border); padding: 6px; border-radius: 4px; cursor: pointer; color: var(--text-secondary); display:flex; justify-content:center; align-items:center; transition:0.2s; }
        .btn-icon:hover { background: #f1f5f9; color: var(--accent); border-color: var(--accent); }
        .btn-icon.del:hover { color: var(--danger); border-color: var(--danger); }
        .btn-text-icon { font-size: 10px; font-weight: bold; padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; background: white; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .btn-text-icon:hover { background: #f1f5f9; border-color: var(--accent); color: var(--text-primary); }

        /* MODALS */
        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); z-index: 2000; display: none; justify-content: center; align-items: center; padding: 16px; }
        .modal-card { background: #ffffff; border-radius: 12px; width: 600px; max-width: 100%; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .modal-header { padding: 16px 20px; background: #ffffff; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-weight: 800; }
        .modal-body { padding: 20px; overflow-y: auto; }
        .close-btn { background: #f1f5f9; border: none; cursor: pointer; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
        
        /* EDITOR CANVAS */
        canvas { background: #f8fafc; max-width: 100%; border: 1px dashed var(--border); margin: 0 auto; display: block; cursor: grab; border-radius: 8px; }
        .editor-tools { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; background: #f1f5f9; padding: 10px; border-radius: 6px; }

        /* RESPONSIVO MOBILE */
        @media (max-width: 768px) {
            header { flex-direction: column; align-items: stretch; }
            .brand { justify-content: center; margin-bottom: 10px; }
            #queue-status { width: 100%; justify-content: center; }
            
            .toolbar { flex-direction: column; align-items: stretch; padding: 12px; }
            .toolbar-group { justify-content: space-between; width: 100%; }
            .search-container { width: 100%; }
            .nav-btn { flex: 1; font-size: 11px; }
            
            .product-grid { padding: 10px; }
            .list-header { display: none; } 
            
            /* MOBILE CARDS */
            .list-row { 
                display: flex; flex-direction: column; gap: 10px; padding: 16px; 
                border: 1px solid var(--border); border-radius: 10px; margin-bottom: 12px; 
                box-shadow: var(--shadow-sm); 
            }
            .list-row > div { width: 100%; display: flex; flex-direction: column; }
            .list-row > div::before { font-size: 10px; color: var(--accent); font-weight: 800; margin-bottom: 4px; }
            
            .list-row > div:nth-child(1)::before { content: "SKU"; }
            .list-row > div:nth-child(2)::before { content: "NOME DO PRODUTO"; }
            .list-row > div:nth-child(3)::before { content: "CATEGORIA"; }
            
            /* Agrupamentos no Mobile */
            .mobile-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
            .list-row > div:nth-child(4) { grid-column: span 1; }
            .list-row > div:nth-child(4)::before { content: "EAN"; }
            .list-row > div:nth-child(5) { grid-column: span 1; }
            .list-row > div:nth-child(5)::before { content: "NCM"; }
            
            .list-row > div:nth-child(7)::before { content: "ESTOQUE"; }
            .list-row > div:nth-child(8)::before { content: "VALIDADE"; }
            .list-row > div:nth-child(9)::before { content: "CUSTO (R$)"; }
            .list-row > div:nth-child(10)::before { content: "VENDA (R$)"; }
            
            /* Ações */
            .list-row > div:nth-child(11) { flex-direction: row; flex-wrap: wrap; justify-content: center; margin-top: 10px; border-top: 1px dashed var(--border); padding-top: 10px; gap: 8px; }
            .list-row > div:nth-child(11)::before { display: none; }
            .action-cell { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
            
            .list-input, .list-select { border: 1px solid var(--border); background: #f8fafc; padding: 10px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <script>
        let availableCategories = []; 
        const STORAGE_KEY = 'sucedoan_data_v29'; // Atualizado
        const CONFIG_KEY = 'sucedoan_config';
        const GONDOLAS = Array.from({length: 20}, (_, i) => String(i).padStart(2, '0'));
        const PRATELEIRAS = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L', 'M'].flatMap(letra => [`${letra}1`, `${letra}2`]);
    </script>

    <header>
        <div class="brand"><i data-lucide="package" size="20" style="color:var(--accent)"></i> SUCEDOAN <span>PIM</span></div>
        <div id="queue-status"></div>
        <button class="nav-btn config" onclick="openConfigModal()"><i data-lucide="settings" size="18"></i> API</button>
    </header>

    <div class="view-section active">
        <div class="toolbar">
            <div class="toolbar-group">
                <div class="search-container">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" class="search-input" id="search-input" placeholder="Buscar SKU, Nome...">
                </div>
                <select id="filter-select" class="toolbar-select" onchange="renderGrid(document.getElementById('search-input').value, true)">
                    <option value="all">Todos os Produtos</option>
                    <option value="ativos">Apenas Ativos</option>
                    <option value="inativos">Apenas Inativos</option>
                    <option value="margin_error">Alerta: Sem Lucro</option>
                </select>
            </div>

            <div class="toolbar-group">
                <button class="nav-btn warning" onclick="forceBackupNow()" title="Forçar envio de dados aguardando na fila para a nuvem" id="btn-force-sync" style="display:none;">
                    <i data-lucide="upload-cloud" size="16"></i> SALVAR AGORA
                </button>
                
                <button class="nav-btn success" onclick="fetchFromGithub()"><i data-lucide="cloud-download" size="16"></i> BAIXAR NUVEM</button>
                
                <input type="file" id="csv-file-append" accept=".csv" style="display:none">
                <button class="nav-btn" onclick="document.getElementById('csv-file-append').click()"><i data-lucide="file-up" size="16"></i> LER CSV</button>
                
                <button class="nav-btn" onclick="exportarCSVCompleto()"><i data-lucide="file-down" size="16"></i> EXPORTAR CSV</button>

                <button class="nav-btn primary" onclick="createNewProduct()"><i data-lucide="plus" size="16"></i> NOVO</button>
            </div>
        </div>
        
        <div class="product-grid" id="product-grid"></div>
    </div>

    <div id="modal-editor" class="modal-overlay">
        <div class="modal-card" style="width:450px;">
            <div class="modal-header"><span>Editor de Imagem</span><button class="close-btn" onclick="closeModal('modal-editor')"><i data-lucide="x"></i></button></div>
            <div class="modal-body">
                <div style="font-size:11px; text-align:center; color:var(--text-secondary); margin-bottom:10px;">Cole a imagem com (Ctrl+V) ou busque no seu PC</div>
                <canvas id="imageCanvas" width="400" height="400"></canvas>
                
                <div class="editor-tools">
                    <div><label style="font-size:10px;">Zoom</label><input type="range" id="zoomRange" min="0.1" max="3" step="0.01" value="1" style="width:100%"></div>
                    <div><label style="font-size:10px;">Nitidez</label><input type="range" id="sharpenRange" min="0" max="5" step="0.1" value="0" style="width:100%"></div>
                </div>
                
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button class="nav-btn" style="flex:1;" onclick="document.getElementById('fileInput').click()">BUSCAR NO PC</button>
                    <input type="file" id="fileInput" style="display:none" accept="image/*">
                    <button class="nav-btn primary" style="flex:1;" onclick="queueImageUpload()">SALVAR IMAGEM</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-config" class="modal-overlay">
        <div class="modal-card" style="width:400px">
            <div class="modal-header"><span>Configuração Nuvem (GitHub)</span><button class="close-btn" onclick="closeModal('modal-config')"><i data-lucide="x"></i></button></div>
            <div class="modal-body">
                <div style="margin-bottom: 10px;"><label style="font-size:12px;">Token GitHub</label><input type="password" id="cfg-token" style="width:100%; padding:10px; border-radius:6px; border:1px solid var(--border);"></div>
                <div style="margin-bottom: 10px;"><label style="font-size:12px;">Usuário</label><input type="text" id="cfg-user" style="width:100%; padding:10px; border-radius:6px; border:1px solid var(--border);"></div>
                <div style="margin-bottom: 15px;"><label style="font-size:12px;">Repositório</label><input type="text" id="cfg-repo" style="width:100%; padding:10px; border-radius:6px; border:1px solid var(--border);"></div>
                <button class="nav-btn primary" style="width:100%;" onclick="saveConfig()">SALVAR</button>
            </div>
        </div>
    </div>

    <script>
        let products = [];
        
        // --- ESTRATÉGIA AUTO-SAVE DEBOUNCE (5 MINUTOS) ---
        let autoSaveTimer = null;
        const AUTO_SAVE_DELAY = 5 * 60 * 1000; // 5 minutos em milissegundos
        
        // Fila real de processamento da API
        let githubQueue = [];
        let isProcessingQueue = false;
        let queueInterval = null;

        window.addEventListener('beforeunload', function (e) {
            if (autoSaveTimer || githubQueue.length > 0 || isProcessingQueue) {
                e.preventDefault();
                e.returnValue = 'Existem envios pendentes para a nuvem. Se fechar, eles serão perdidos.';
            }
        });

        // Atualiza a barra de status lá em cima
        function updateQueueUI(msg, icon = 'info') {
            const el = document.getElementById('queue-status');
            const btnUrgent = document.getElementById('btn-force-sync');
            if(!el) return;
            
            if(msg === '') {
                el.style.display = 'none';
                btnUrgent.style.display = 'none';
            } else {
                el.style.display = 'flex';
                let iconHtml = '';
                if(icon === 'clock') iconHtml = `<i data-lucide="clock" size="14"></i>`;
                else if(icon === 'loader') iconHtml = `<i data-lucide="loader" class="spin-icon" size="14"></i>`;
                else iconHtml = `<i data-lucide="cloud" size="14"></i>`;
                
                el.innerHTML = `${iconHtml} <span>${msg}</span>`;
                lucide.createIcons();
                
                // Mostrar botão URGENTE se estiver em modo debounce
                if(icon === 'clock') btnUrgent.style.display = 'flex';
                else btnUrgent.style.display = 'none';
            }
        }

        // Função chamada sempre que há QUALQUER edição no painel
        function scheduleAutoSave() {
            // Zera o cronômetro anterior
            if(autoSaveTimer) {
                clearTimeout(autoSaveTimer);
            }
            
            updateQueueUI(`Edições salvas localmente. Envio automático em 5 min.`, 'clock');
            
            // Inicia novo cronômetro de 5 minutos
            autoSaveTimer = setTimeout(() => {
                executeBackupJSON();
                autoSaveTimer = null;
            }, AUTO_SAVE_DELAY);
        }

        // Função do Botão "SALVAR AGORA"
        function forceBackupNow() {
            if(autoSaveTimer) {
                clearTimeout(autoSaveTimer);
                autoSaveTimer = null;
            }
            executeBackupJSON();
        }

        // Adiciona de fato à fila de comunicação com o GitHub (Delay da API)
        function executeBackupJSON() {
            const cfg = JSON.parse(localStorage.getItem(CONFIG_KEY));
            if(!cfg || !cfg.token) {
                updateQueueUI('');
                return alert("Configure a API do GitHub para salvar na nuvem.");
            }
            
            // Adiciona a tarefa na fila (Delay de 3 segundos padrão para API)
            addToQueue('backup', 'Enviando JSON para Nuvem...', async () => {
                const path = `site/bancodedados.json`;
                const url = `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${path}`;
                let sha = null;
                try {
                    const check = await fetch(url, { headers: { "Authorization": `token ${cfg.token}` } });
                    if(check.ok) { const json = await check.json(); sha = json.sha; }
                } catch(e) {}
                
                const contentStr = JSON.stringify(products);
                const base64 = btoa(unescape(encodeURIComponent(contentStr)));
                const body = { message: `AutoSave (Painel PIM)`, content: base64 };
                if(sha) body.sha = sha;
                
                const res = await fetch(url, { method: 'PUT', headers: { "Authorization": `token ${cfg.token}`, "Content-Type": "application/json" }, body: JSON.stringify(body) });
                if(!res.ok) throw new Error("Falha no PUT");
            }, 3000);
        }

        // Motor da Fila
        function addToQueue(type, desc, taskFunc, delayMs = 3000) {
            githubQueue.push({ type, desc, task: taskFunc, delay: delayMs });
            updateQueueUI(`Aguardando Envio...`, 'loader');
            if(!isProcessingQueue && !queueInterval) processQueue();
        }

        async function processQueue() {
            if(githubQueue.length === 0) { isProcessingQueue = false; updateQueueUI('Todos os dados estão sincronizados.', 'cloud'); setTimeout(()=>updateQueueUI(''), 3000); return; }
            isProcessingQueue = true;
            const item = githubQueue.shift();
            updateQueueUI(item.desc, 'loader');
            
            try { await item.task(); } catch(e) { console.error(`Erro:`, e); }
            
            isProcessingQueue = false; 
            let remaining = item.delay / 1000;
            queueInterval = setInterval(() => {
                remaining--;
                if(remaining <= 0) {
                    clearInterval(queueInterval); queueInterval = null;
                    if(githubQueue.length > 0) processQueue(); else { updateQueueUI('Sucesso!', 'cloud'); setTimeout(()=>updateQueueUI(''), 3000); }
                } else { updateQueueUI(`Segurança API: ${remaining}s`, 'loader'); }
            }, 1000);
        }

        // --- INICIALIZAÇÃO ---
        window.onload = function() {
            lucide.createIcons();
            loadData();
            document.getElementById('search-input').addEventListener('input', debounce((e) => renderGrid(e.target.value, true), 300));
            setupEditorEvents();
        };

        function debounce(func, wait) { let timeout; return function(...args) { clearTimeout(timeout); timeout = setTimeout(() => func.apply(this, args), wait); }; }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if(saved) products = JSON.parse(saved);
            
            const cfg = JSON.parse(localStorage.getItem(CONFIG_KEY)||'{}');
            if(cfg.token) { document.getElementById('cfg-token').value = cfg.token; document.getElementById('cfg-user').value = cfg.user; document.getElementById('cfg-repo').value = cfg.repo; }
            
            renderGrid();
        }
        
        function saveData() { 
            localStorage.setItem(STORAGE_KEY, JSON.stringify(products)); 
            scheduleAutoSave(); // Sempre que salva localmente, engatilha os 5 minutos
        }

        // --- BAIXAR DA NUVEM ---
        async function fetchFromGithub() {
            const cfg = JSON.parse(localStorage.getItem(CONFIG_KEY));
            if(!cfg || !cfg.token) { openConfigModal(); return alert("Configure as credenciais."); }
            if(products.length > 0) { if(!confirm("Substituir dados locais pelos dados da nuvem?")) return; }
            
            updateQueueUI('Baixando dados...', 'loader');
            try {
                const url = `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/site/bancodedados.json?t=${Date.now()}`;
                const res = await fetch(url, { headers: { "Authorization": `token ${cfg.token}`, "Accept": "application/vnd.github.v3.raw" } });
                if(!res.ok) throw new Error("Arquivo não encontrado.");
                const data = await res.json();
                if(Array.isArray(data)) { products = data; localStorage.setItem(STORAGE_KEY, JSON.stringify(products)); renderGrid(); updateQueueUI('Download completo', 'cloud'); setTimeout(()=>updateQueueUI(''), 3000);}
            } catch(e) { alert("Erro: " + e.message); updateQueueUI(''); }
        }

        // --- RESTAURAÇÃO: EXPORTAR CSV ORIGINAL (COMPLETO) ---
        function exportarCSVCompleto() {
            if (products.length === 0) return alert("Nada para exportar.");
            
            // AS COLUNAS EXATAS DO ARQUIVO ORIGINAL
            const colunasModelo = [ "ID", "Código", "Descrição", "Unidade", "NCM", "Origem", "Preço", "Valor IPI fixo", "Observações", "Situação", "Estoque", "Preço de custo", "Cód. no fornecedor", "Fornecedor", "Localização", "Estoque máximo", "Estoque mínimo", "Peso líquido (Kg)", "Peso bruto (Kg)", "GTIN/EAN", "GTIN/EAN da Embalagem", "Largura do produto", "Altura do Produto", "Profundidade do produto", "Data Validade", "Descrição do Produto no Fornecedor", "Descrição Complementar", "Itens p/ caixa", "Produto Variação", "Tipo Produção", "Classe de enquadramento do IPI", "Código na Lista de Serviços", "Tipo do item", "Grupo de Tags/Tags", "Tributos", "Código Pai", "Código Integração", "Grupo de produtos", "Marca", "CEST", "Volumes", "Descrição Curta", "Cross-Docking", "URL Imagens Externas", "Link Externo", "Meses Garantia no Fornecedor", "Clonar dados do pai", "Condição do Produto", "Frete Grátis", "Número FCI", "Vídeo", "Departamento", "Unidade de Medida", "Preço de Compra", "Valor base ICMS ST para retenção", "Valor ICMS ST para retenção", "Valor ICMS próprio do substituto", "Categoria do produto", "Informações Adicionais" ];

            const dadosParaExportar = products.map(p => {
                const linha = {}; 
                const fmt = (n) => (n !== undefined && n !== null && n !== "") ? parseFloat(n).toLocaleString('pt-BR', {minimumFractionDigits: 2}) : "";
                
                p['Descrição'] = p.nome; 
                p['Preço'] = fmt(p.preco); 
                p['Preço de custo'] = fmt(p.preco_custo); 
                p['Estoque'] = fmt(p.estoque);
                p['Localização'] = p.localizacao || ""; 
                p['GTIN/EAN'] = p.gtin || ""; 
                p['URL Imagens Externas'] = p.url_imagem || ""; 
                p['NCM'] = p.ncm || ""; 
                p['Situação'] = p.situacao === 'I' ? 'INATIVO' : 'ATIVO'; 
                p['Categoria do produto'] = p.categoria || "";
                p['Origem'] = '0'; 
                p['Unidade'] = 'un'; 
                p['Grupo de produtos'] = '';

                // Mapeia todas as dezenas de colunas
                colunasModelo.forEach(col => { 
                    linha[col] = (p[col] !== undefined && p[col] !== null) ? p[col] : ""; 
                });
                return linha;
            });

            const csv = Papa.unparse({ fields: colunasModelo, data: dadosParaExportar }, { quotes: true, delimiter: ";" });
            const l = document.createElement("a"); 
            l.href = URL.createObjectURL(new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' }));
            l.download = `backup_produtos_completo_${new Date().getTime()}.csv`; 
            l.click();
        }

        // --- INTERFACE (UI) E RENDERIZAÇÃO ---
        function renderGrid(filter = "", forceShow = false) {
            const gridContainer = document.getElementById('product-grid'); 
            gridContainer.innerHTML = "";
            const filterMode = document.getElementById('filter-select').value; 
            
            let filtered = products;
            if(filter) { const term = filter.toLowerCase(); filtered = filtered.filter(p => (p.nome||"").toLowerCase().includes(term) || (p.codigo||"").toLowerCase().includes(term)); }
            if(filterMode === 'ativos') filtered = filtered.filter(p => p.situacao !== 'I');
            else if (filterMode === 'inativos') filtered = filtered.filter(p => p.situacao === 'I');
            
            if (filtered.length === 0) {
                gridContainer.innerHTML = `<div class="empty-state"><i data-lucide="package-open" size="64" style="color:var(--border); margin-bottom:10px;"></i><h3>Nenhum Produto</h3><p>Crie um novo produto ou baixe da nuvem.</p></div>`; 
                lucide.createIcons(); return;
            }

            const header = document.createElement('div'); 
            header.className = 'list-row list-header';
            header.innerHTML = `<div>SKU</div><div>NOME DO PRODUTO</div><div>CATEGORIA</div><div>EAN</div><div>NCM</div><div>ESTOQUE</div><div>VAL.</div><div>CUSTO</div><div>VENDA</div><div>AÇÕES</div>`;
            gridContainer.appendChild(header);

            filtered.forEach(p => { gridContainer.appendChild(createListRow(p)); }); 
            lucide.createIcons();
        }

        function createListRow(p) {
            const isInactive = p.situacao === 'I';
            const row = document.createElement('div'); 
            row.className = `list-row`;
            if (isInactive) row.style.opacity = "0.5";
            
            const safeName = p.nome ? p.nome.replace(/'/g, "\\'") : "";

            // Botões de Buscas Restaurados
            const btnGoogleImg = `<button class="btn-text-icon" onclick="window.open('https://www.google.com/search?tbm=isch&q=${encodeURIComponent(p.nome)}', '_blank')" title="Buscar Imagem"><i data-lucide="image" size="12"></i> FOTO</button>`;
            const btnSearchNcm = `<button class="btn-text-icon" onclick="window.open('https://www.google.com/search?q=NCM+${encodeURIComponent(p.nome)}', '_blank')" title="Buscar NCM"><i data-lucide="search" size="12"></i> NCM</button>`;
            const btnEditCanvas = `<button class="btn-icon" onclick="openEditor('${p.codigo}')" title="Editar Imagem (Canvas)"><i data-lucide="camera" size="16"></i></button>`;

            row.innerHTML = `
                <div><input type="text" class="list-input" style="font-weight:800; color:var(--accent);" value="${p.codigo}" readonly></div>
                <div>
                    <input type="text" class="list-input" style="font-weight:600;" value="${p.nome || ''}" onchange="updateProduct('${p.codigo}', 'nome', this.value)">
                    <div style="display:flex; gap:6px; margin-top:4px; padding-left:6px;">${btnGoogleImg}</div>
                </div>
                <div><input type="text" class="list-input" value="${p.categoria || ''}" onchange="updateProduct('${p.codigo}', 'categoria', this.value)" placeholder="Categoria"></div>
                
                <div class="mobile-grid-2">
                    <input type="text" class="list-input" value="${p.gtin || ''}" onchange="updateProduct('${p.codigo}', 'gtin', this.value)" placeholder="EAN">
                    <div>
                        <input type="text" class="list-input" value="${p.ncm || ''}" onchange="updateProduct('${p.codigo}', 'ncm', this.value)" placeholder="NCM">
                        <div style="display:flex; gap:6px; margin-top:2px;">${btnSearchNcm}</div>
                    </div>
                </div>

                <div class="mobile-grid-2">
                    <input type="text" class="list-input number" value="${formatNum(p.estoque)}" onchange="updateProduct('${p.codigo}', 'estoque', this.value)">
                    <input type="text" class="list-input" style="text-align:center;" value="${p.validade || ''}" placeholder="DD/MM" onchange="updateProduct('${p.codigo}', 'validade', this.value)">
                </div>

                <div class="mobile-grid-2">
                    <input type="text" class="list-input number" value="${formatNum(p.preco_custo)}" onchange="updateProduct('${p.codigo}', 'preco_custo', this.value)">
                    <input type="text" class="list-input number" style="color:var(--success);" value="${formatNum(p.preco)}" onchange="updateProduct('${p.codigo}', 'preco', this.value)">
                </div>
                
                <div>
                    <div class="action-cell">
                        ${btnEditCanvas}
                        <button class="btn-icon" style="${isInactive ? 'color:var(--danger)' : 'color:var(--success)'}" onclick="toggleActive('${p.codigo}')"><i data-lucide="power" size="16"></i></button>
                        <button class="btn-icon del" onclick="deleteProduct('${p.codigo}')"><i data-lucide="trash-2" size="16"></i></button>
                    </div>
                </div>
            `;
            return row;
        }

        // --- LÓGICA DE DADOS ---
        function updateProduct(sku, field, value) {
            const p = products.find(x => x.codigo === sku); if(!p) return;
            let finalVal = value; if(['preco','estoque','preco_custo'].includes(field)) finalVal = parseFloat(value.replace(',','.')) || 0;
            p[field] = finalVal;
            saveData(); // Salva e engatilha os 5 minutos
        }

        function toggleActive(sku) { 
            const p = products.find(x => x.codigo === sku); if (!p) return; 
            p.situacao = p.situacao === 'I' ? 'A' : 'I'; 
            saveData(); renderGrid(document.getElementById('search-input').value, true); 
        }

        function deleteProduct(sku) {
            if(!confirm(`Excluir SKU: ${sku}?`)) return;
            products = products.filter(p => p.codigo !== sku);
            saveData(); renderGrid(document.getElementById('search-input').value, true);
        }

        function createNewProduct() {
            const timestamp = Date.now();
            const sku = timestamp.toString().slice(-8); 
            products.unshift({ id: timestamp, codigo: sku, nome: "NOVO PRODUTO", preco: 0, preco_custo: 0, situacao: 'A', estoque: 0 }); 
            saveData(); renderGrid(document.getElementById('search-input').value, true);
        }

        function formatNum(n) { return n ? n.toLocaleString('pt-BR', {minimumFractionDigits: 2}) : '0,00'; }

        // --- EDITOR CANVAS RESTAURADO ---
        let currentEditingId = null;
        const canvas = document.getElementById('imageCanvas');
        const ctx = canvas.getContext('2d');
        let loadedImage = null; let imgOffsetX = 0; let imgOffsetY = 0; let isDragging = false; let startDragX = 0; let startDragY = 0;

        function openEditor(sku) {
            const p = products.find(x => x.codigo === sku); currentEditingId = sku; 
            imgOffsetX = 0; imgOffsetY = 0; document.getElementById('zoomRange').value = 1; document.getElementById('sharpenRange').value = 0;
            const img = new Image(); img.crossOrigin = "Anonymous"; img.src = p.url_imagem || ""; 
            img.onload = () => { loadedImage = img; drawCanvas(); document.getElementById('modal-editor').style.display = 'flex'; }; 
            img.onerror = () => { loadedImage = null; drawCanvas(); document.getElementById('modal-editor').style.display = 'flex'; };
        }

        function setupEditorEvents() {
            ['zoomRange','sharpenRange'].forEach(id => { document.getElementById(id).addEventListener('input', drawCanvas); });
            document.getElementById('fileInput').addEventListener('change', (e) => { if(e.target.files && e.target.files[0]) { const reader = new FileReader(); reader.onload = (evt) => { const img = new Image(); img.onload = () => { loadedImage = img; imgOffsetX = 0; imgOffsetY = 0; drawCanvas(); }; img.src = evt.target.result; }; reader.readAsDataURL(e.target.files[0]); } });
            window.addEventListener('paste', e => { if(document.getElementById('modal-editor').style.display === 'none') return; const items = (e.clipboardData || e.originalEvent.clipboardData).items; for (let index in items) { const item = items[index]; if (item.kind === 'file' && item.type.includes('image/')) { const blob = item.getAsFile(); const reader = new FileReader(); reader.onload = (event) => { const img = new Image(); img.onload = () => { loadedImage = img; imgOffsetX = 0; imgOffsetY = 0; drawCanvas(); }; img.src = event.target.result; }; reader.readAsDataURL(blob); } } });
            canvas.addEventListener('mousedown', (e) => { isDragging = true; startDragX = e.offsetX - imgOffsetX; startDragY = e.offsetY - imgOffsetY; }); canvas.addEventListener('mousemove', (e) => { if (!isDragging) return; imgOffsetX = e.offsetX - startDragX; imgOffsetY = e.offsetY - startDragY; drawCanvas(); }); canvas.addEventListener('mouseup', () => { isDragging = false; }); canvas.addEventListener('mouseleave', () => { isDragging = false; });
        }

        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(loadedImage) { const zoom = parseFloat(document.getElementById('zoomRange').value); const w = loadedImage.width * zoom, h = loadedImage.height * zoom; const posX = ((canvas.width - w) / 2) + imgOffsetX; const posY = ((canvas.height - h) / 2) + imgOffsetY; ctx.drawImage(loadedImage, posX, posY, w, h); } 
            else { ctx.font = "600 14px Inter"; ctx.fillStyle = "#94a3b8"; ctx.textAlign = "center"; ctx.fillText("Cole ou busque uma imagem", canvas.width/2, canvas.height/2); }
        }

        function queueImageUpload() {
            if(!currentEditingId) return; const sku = currentEditingId; const cfg = JSON.parse(localStorage.getItem(CONFIG_KEY)); if(!cfg || !cfg.token) return alert("Configure a API primeiro.");
            const base64 = canvas.toDataURL('image/webp', 0.9).split(',')[1];
            
            // Força a imagem a furar a fila dos 5 minutos, salva a imagem imediatamente!
            addToQueue('image', `Subindo Imagem ${sku}`, async () => {
                const folderPath = "site/img/produtos"; const fileName = sku + ".webp"; const fullPath = `${folderPath}/${fileName}`; const url = `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${fullPath}`;
                let sha = null; try { const check = await fetch(url, { headers: { "Authorization": `token ${cfg.token}` } }); if(check.ok) { const json = await check.json(); sha = json.sha; } } catch(e) {}
                const body = { message: `Upload img ${sku}`, content: base64 }; if(sha) body.sha = sha;
                const res = await fetch(url, { method: 'PUT', headers: { "Authorization": `token ${cfg.token}`, "Content-Type": "application/json" }, body: JSON.stringify(body) }); 
                if(res.ok) { const p = products.find(x => x.codigo === sku); if(p) { p.url_imagem = `../${folderPath}/${fileName}?v=${Date.now()}`; saveData(); } }
            }, 3000); 
            closeModal('modal-editor'); 
        }

        // --- IMPORT CSV E CONFIGS ---
        document.getElementById('csv-file-append').addEventListener('change', function(e) {
            if(!e.target.files[0]) return;
            Papa.parse(e.target.files[0], {
                header: true, skipEmptyLines: true, encoding: "UTF-8", delimiter: ";", transformHeader: h => h.replace(/"/g, '').trim(),
                complete: (results) => {
                    results.data.forEach(d => {
                        const sku = d['Código']; if(!sku) return;
                        const pIdx = products.findIndex(p => p.codigo === sku);
                        let n = { codigo: sku, nome: d['Descrição'], preco: parseFloat(d['Preço']?.replace(',','.'))||0, estoque: parseFloat(d['Estoque']?.replace(',','.'))||0 };
                        if(pIdx !== -1) products[pIdx] = {...products[pIdx], ...n}; else products.unshift({...n, id:Date.now()});
                    });
                    saveData(); renderGrid(); alert("Lido com sucesso!");
                }
            });
        });

        function openConfigModal() { document.getElementById('modal-config').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function saveConfig() { const cfg = { token: document.getElementById('cfg-token').value, user: document.getElementById('cfg-user').value, repo: document.getElementById('cfg-repo').value }; localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg)); closeModal('modal-config'); }
    </script>
</body>
</html>
