### Passo 2: Criar as funções de Backup (Cookies)
Vamos adicionar funções para gravar e ler cookies no JavaScript. 

**O que fazer:** Encontra o início da tua secção `<script>` e adiciona as funções de manipulação de cookies logo a seguir à função de base64.

```javascript
    <script>
        function encodeBase64(str) { return btoa(new TextEncoder().encode(str).reduce((d, b) => d + String.fromCharCode(b), '')); }
        function decodeBase64(b64) { return new TextDecoder('utf-8').decode(Uint8Array.from(atob(b64.replace(/\s/g, '')), c => c.charCodeAt(0))); }

        // --- NOVAS FUNÇÕES DE BACKUP DE CREDENCIAIS ---
        function salvarCookie(nome, valor, dias) {
            let data = new Date();
            data.setTime(data.getTime() + (dias * 24 * 60 * 60 * 1000));
            let expiracao = "expires=" + data.toUTCString();
            document.cookie = nome + "=" + valor + ";" + expiracao + ";path=/";
        }

        function lerCookie(nome) {
            let nomeEq = nome + "=";
            let cookies = document.cookie.split(';');
            for(let i = 0; i < cookies.length; i++) {
                let c = cookies[i];
                while (c.charAt(0) == ' ') c = c.substring(1, c.length);
                if (c.indexOf(nomeEq) == 0) return c.substring(nomeEq.length, c.length);
            }
            return null;
        }
