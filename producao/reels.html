<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucedoan Reels Studio PRO v7</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f5f5f7; --accent: #000000; --card-bg: #ffffff;
            --text-main: #1d1d1f; --text-dim: #86868b;
            /* Multiplicadores dinâmicos para as fontes */
            --price-scale: 1;
            --name-scale: 1;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); overflow: hidden; }

        /* --- ADMIN PANEL --- */
        #admin-panel { position: fixed; left: 0; top: 0; bottom: 0; width: 420px; background: white; border-right: 1px solid #e5e5e7; padding: 30px; z-index: 100; overflow-y: auto; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 10px 0 30px rgba(0,0,0,0.05); }
        #admin-panel.hidden { transform: translateX(-100%); }
        h1 { font-weight: 900; font-size: 20px; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; color: var(--accent); letter-spacing: -0.5px;}
        
        .section { margin-bottom: 25px; }
        .label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; display: block; letter-spacing: 0.5px; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 10px; font-size: 14px; margin-bottom: 12px; outline: none; background: #fafafa; font-family: 'Inter'; transition: 0.2s;}
        input:focus, select:focus { border-color: var(--accent); background: #fff; }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 800; font-size: 13px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { transform: scale(0.98); }
        .btn-record { background: #ff3b30; color: white; }
        .btn-record:hover { background: #d32f2f; }

        /* Estilização dos Sliders (Ranges) */
        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; margin: 8px 0; }
        input[type="range"]:focus { outline: none; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #d2d2d7; border-radius: 4px; }
        input[type="range"]::-webkit-slider-thumb { height: 18px; width: 18px; border-radius: 50%; background: var(--accent); cursor: pointer; -webkit-appearance: none; margin-top: -6px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* --- REELS VIEWPORT --- */
        #viewport { margin-left: 420px; height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; transition: margin 0.4s cubic-bezier(0.16, 1, 0.3, 1); position: relative;}
        #viewport.full { margin-left: 0; cursor: pointer; }
        
        #reels-container { height: 90vh; aspect-ratio: 9/16; background: #e5e5e7; position: relative; overflow: hidden; box-shadow: 0 10px 50px rgba(0,0,0,0.8); border-radius: 4px; }

        .scene { position: absolute; inset: 0; display: none; width: 100%; height: 100%; animation-fill-mode: both; }
        .scene.active { display: grid; }

        /* DINÂMICA DE GRELHAS */
        .grid-base { gap: 2px; background: #e5e5e7; }
        .grid-1x1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .grid-1x2 { grid-template-columns: 1fr; grid-template-rows: repeat(2, 1fr); }
        .grid-2x2 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-2x3 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(3, 1fr); }

        .product-card { background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5%; text-align: center; width: 100%; height: 100%; overflow: hidden; }
        .product-card img { width: 100%; object-fit: contain; margin-bottom: 5%; mix-blend-mode: multiply; }
        .product-card .price { font-weight: 900; color: #000; letter-spacing: -1px; line-height: 1; margin-bottom: 2%; }
        .product-card .name { color: var(--text-dim); font-weight: 700; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Proporções dinâmicas + Multiplicador de Fontes */
        .grid-1x1 .product-card img { height: 65%; }
        .grid-1x1 .product-card .price { font-size: calc(clamp(30px, 6vh, 80px) * var(--price-scale)); }
        .grid-1x1 .product-card .name { font-size: calc(clamp(16px, 2.5vh, 30px) * var(--name-scale)); }

        .grid-1x2 .product-card img { height: 60%; }
        .grid-1x2 .product-card .price { font-size: calc(clamp(24px, 4.5vh, 60px) * var(--price-scale)); }
        .grid-1x2 .product-card .name { font-size: calc(clamp(14px, 2vh, 24px) * var(--name-scale)); }

        .grid-2x2 .product-card img { height: 55%; }
        .grid-2x2 .product-card .price { font-size: calc(clamp(18px, 3.5vh, 45px) * var(--price-scale)); }
        .grid-2x2 .product-card .name { font-size: calc(clamp(11px, 1.5vh, 20px) * var(--name-scale)); }

        .grid-2x3 .product-card img { height: 50%; }
        .grid-2x3 .product-card .price { font-size: calc(clamp(16px, 2.8vh, 32px) * var(--price-scale)); }
        .grid-2x3 .product-card .name { font-size: calc(clamp(9px, 1.2vh, 16px) * var(--name-scale)); }

        /* Loaders e Contadores */
        #loader-overlay, #countdown-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; color: white; }
        #countdown-overlay { font-size: 120px; font-weight: 900; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid white; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #rec-status { position: absolute; top: 20px; right: 20px; background: rgba(255,0,0,0.9); color: white; padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 900; display: none; z-index: 1000; letter-spacing: 1px;}
        
        #float-toggle { position: fixed; bottom: 30px; left: 30px; z-index: 1000; width: 50px; height: 50px; border-radius: 25px; padding: 0; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: none; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        #viewport.full ~ #float-toggle { display: flex; align-items: center; justify-content: center; }
        #viewport.full ~ #float-toggle.visible { opacity: 1; pointer-events: auto; }

        /* ANIMAÇÕES DE TRANSIÇÃO */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        @keyframes slideLeftIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes slideLeftOut { from { transform: translateX(0); } to { transform: translateX(-100%); } }
        @keyframes scaleFadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
        @keyframes scaleFadeOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(1.03); } }
        @keyframes slideShortIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideShortOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-30px); } }

        .anim-in-fade { animation-name: fadeIn; animation-duration: 0.6s; } .anim-out-fade { animation-name: fadeOut; animation-duration: 0.6s; }
        .anim-in-slideLeft { animation-name: slideLeftIn; animation-duration: 0.5s; } .anim-out-slideLeft { animation-name: slideLeftOut; animation-duration: 0.5s; }
        .anim-in-fadeFast { animation-name: fadeIn; animation-duration: 0.25s; } .anim-out-fadeFast { animation-name: fadeOut; animation-duration: 0.25s; }
        .anim-in-scaleFade { animation-name: scaleFadeIn; animation-duration: 0.35s; } .anim-out-scaleFade { animation-name: scaleFadeOut; animation-duration: 0.35s; }
        .anim-in-slideShort { animation-name: slideShortIn; animation-duration: 0.3s; } .anim-out-slideShort { animation-name: slideShortOut; animation-duration: 0.3s; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <h1><i data-lucide="video"></i> SUCEDOAN REELS</h1>
        
        <div class="section">
            <span class="label">1. Filtrar Produtos</span>
            <input type="text" id="cfg-keywords" placeholder="Palavras-chave (ex: sony, fone)" onchange="buildScenes()">
            <select id="cfg-cat" onchange="buildScenes()">
                <option value="">Todas as Categorias</option>
            </select>
        </div>

        <div class="section">
            <span class="label">2. Layout do Vídeo</span>
            <select id="cfg-layout" onchange="buildScenes()">
                <option value="1x1">1 Produto (Tela Cheia)</option>
                <option value="1x2">2 Produtos (Vertical)</option>
                <option value="2x2">4 Produtos (2x2)</option>
                <option value="2x3" selected>6 Produtos (2x3 Clássico)</option>
            </select>
        </div>

        <div class="section">
            <span class="label">3. Transição e Velocidade</span>
            <select id="cfg-trans-type">
                <optgroup label="Mais Rápidas / Discretas">
                    <option value="none">Corte Seco (Sem Efeito)</option>
                    <option value="fadeFast">Fade Rápido</option>
                    <option value="scaleFade" selected>Escala Suave (Premium)</option>
                    <option value="slideShort">Deslize Curto</option>
                </optgroup>
                <optgroup label="Clássicas">
                    <option value="fade">Fade Lento</option>
                    <option value="slideLeft">Deslizar para Esquerda</option>
                </optgroup>
            </select>
            
            <div style="display: flex; align-items: center; gap: 10px; margin-top:15px; background: #fafafa; padding: 10px; border-radius: 10px; border: 1px solid #d2d2d7;">
                <i data-lucide="clock" size="16" style="color:var(--text-dim)"></i>
                <input type="number" id="cfg-speed" value="3.0" step="0.5" min="1" style="width: 70px; margin:0; padding: 6px; text-align:center;">
                <span style="font-size: 12px; font-weight:800; color:var(--text-main);">Segundos por Slide</span>
            </div>
        </div>

        <div class="section">
            <span class="label">4. Ajuste de Fontes</span>
            <div style="display: flex; gap: 15px; background: #fafafa; padding: 15px; border-radius: 10px; border: 1px solid #d2d2d7;">
                <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                    <span style="font-size: 11px; font-weight:800; color:var(--text-main); text-align:center;">Valor: <span id="lbl-font-price">100</span>%</span>
                    <input type="range" id="cfg-font-price" min="50" max="180" value="100" oninput="updateFonts()">
                </div>
                <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                    <span style="font-size: 11px; font-weight:800; color:var(--text-main); text-align:center;">Nome: <span id="lbl-font-name">100</span>%</span>
                    <input type="range" id="cfg-font-name" min="50" max="180" value="100" oninput="updateFonts()">
                </div>
            </div>
        </div>

        <div class="section" style="border:none;">
            <button class="btn btn-primary" onclick="initiatePlayback(false)"><i data-lucide="play-circle"></i> VER ECRÃ INTEIRO</button>
            <button id="btn-start-record" class="btn btn-record" onclick="initiatePlayback(true)"><i data-lucide="video-recording"></i> GRAVAR REELS (.WEBM)</button>
        </div>
        
        <div style="font-size: 11px; color: var(--text-dim); text-align:center; font-weight: 600; padding-top: 10px; border-top: 1px solid #eee;">
            Grelhas geradas: <span id="scene-count" style="color:var(--accent)">0</span>
        </div>
    </div>

    <div id="viewport">
        <div id="reels-container">
            <div id="rec-status">🔴 GRAVANDO</div>
            
            <div id="loader-overlay">
                <div class="spinner"></div>
                <div style="font-size: 14px; font-weight: bold; letter-spacing: 1px;">A CARREGAR IMAGENS...</div>
            </div>
            
            <div id="countdown-overlay">3</div>
            </div>
    </div>

    <button id="float-toggle" class="btn btn-primary" onclick="stopAndExitFullscreen()" title="Parar e Sair"><i data-lucide="x"></i></button>

    <script>
        const STORAGE_KEY = 'sucedoan_pim_v37';
        const CAT_KEY = 'sucedoan_categorias';
        
        let allProducts = [];
        let scenesData = []; 
        let imageUrlsToPreload = [];
        let currentSceneIndex = 0;
        let slideTimer = null;
        let isPlaying = false;
        let mediaRecorder;
        let recordedChunks = [];
        let hideBtnTimeout;

        localforage.config({ name: 'SucedoanPIM', storeName: 'produtos_db' });

        window.onload = async () => {
            lucide.createIcons();
            await loadData();
            setupViewportClick();
            updateFonts(); // Inicializa os tamanhos das fontes
        };

        // Atualiza as Fontes em Tempo Real
        function updateFonts() {
            const priceScale = document.getElementById('cfg-font-price').value;
            const nameScale = document.getElementById('cfg-font-name').value;
            
            document.getElementById('lbl-font-price').innerText = priceScale;
            document.getElementById('lbl-font-name').innerText = nameScale;
            
            // O CSS recebe a conversão para decimal (100% = 1.0, 150% = 1.5, etc.)
            document.documentElement.style.setProperty('--price-scale', priceScale / 100);
            document.documentElement.style.setProperty('--name-scale', nameScale / 100);
        }

        // Lógica do Botão Oculto
        function setupViewportClick() {
            document.getElementById('viewport').addEventListener('click', () => {
                if(isPlaying) {
                    const btn = document.getElementById('float-toggle');
                    btn.classList.add('visible');
                    
                    if(hideBtnTimeout) clearTimeout(hideBtnTimeout);
                    hideBtnTimeout = setTimeout(() => {
                        btn.classList.remove('visible');
                    }, 3000);
                }
            });
        }

        async function loadData() {
            try {
                const data = await localforage.getItem(STORAGE_KEY);
                const cats = await localforage.getItem(CAT_KEY);
                
                if(data) {
                    allProducts = data.filter(p => p.situacao !== 'I');
                }

                if(cats) {
                    const select = document.getElementById('cfg-cat');
                    cats.forEach(c => { select.innerHTML += `<option value="${c.nome}">${c.nome}</option>`; });
                }
                buildScenes(); 
            } catch (e) { console.error("Erro ao carregar dados locais", e); }
        }

        function buildScenes() {
            scenesData = [];
            imageUrlsToPreload = [];
            const container = document.getElementById('reels-container');
            
            container.querySelectorAll('.scene').forEach(s => s.remove());

            const keywordString = document.getElementById('cfg-keywords').value.toLowerCase();
            const keywords = keywordString.split(',').map(k => k.trim()).filter(k => k.length > 0);
            const cat = document.getElementById('cfg-cat').value;
            const layout = document.getElementById('cfg-layout').value;

            let filtered = allProducts.filter(p => {
                const nomeProduto = (p.nome || "").toLowerCase();
                const matchesName = keywords.length === 0 || keywords.some(kw => nomeProduto.includes(kw));
                const matchesCat = cat === "" || p.categoria === cat;
                return matchesName && matchesCat;
            });

            if (filtered.length === 0) {
                document.getElementById('scene-count').innerText = "0";
                return;
            }

            let slotsPerSlide = 6;
            if (layout === '1x1') slotsPerSlide = 1;
            if (layout === '1x2') slotsPerSlide = 2;
            if (layout === '2x2') slotsPerSlide = 4;

            const slidesCount = Math.ceil(filtered.length / slotsPerSlide);
            const totalSlotsNeeded = slidesCount * slotsPerSlide;
            
            let displayList = [];
            for (let i = 0; i < totalSlotsNeeded; i++) {
                displayList.push(filtered[i % filtered.length]);
            }

            for (let i = 0; i < displayList.length; i += slotsPerSlide) {
                const batch = displayList.slice(i, i + slotsPerSlide);
                let gridHtml = `<div class="scene grid-base grid-${layout}">`;
                
                batch.forEach(p => {
                    const imgUrl = (p.url_imagem && p.url_imagem.length > 5) ? p.url_imagem : 'https://placehold.co/400x600/f4f4f5/a1a1aa?text=SEM+FOTO';
                    if (!imageUrlsToPreload.includes(imgUrl)) imageUrlsToPreload.push(imgUrl);

                    gridHtml += `
                        <div class="product-card">
                            <img src="${imgUrl}">
                            <div class="price">R$ ${parseFloat(p.preco||0).toFixed(2).replace('.', ',')}</div>
                            <div class="name">${p.nome}</div>
                        </div>
                    `;
                });
                
                gridHtml += `</div>`;
                scenesData.push(gridHtml);
            }

            scenesData.forEach((sceneHtml, index) => {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = sceneHtml;
                const sceneEl = tempDiv.firstElementChild;
                sceneEl.id = `scene-${index}`;
                container.appendChild(sceneEl);
            });

            document.getElementById('scene-count').innerText = scenesData.length;
        }

        async function preloadAllImages() {
            const overlay = document.getElementById('loader-overlay');
            overlay.style.display = 'flex';
            
            const promises = imageUrlsToPreload.map(url => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = resolve;
                    img.onerror = resolve; 
                    img.src = url;
                });
            });

            await Promise.all(promises);
            overlay.style.display = 'none';
        }

        async function initiatePlayback(withRecording) {
            buildScenes(); 

            if (scenesData.length === 0) {
                return alert("Nenhum produto encontrado com estes filtros.");
            }

            await preloadAllImages();

            if (withRecording) {
                const success = await setupRecording();
                if(!success) return; 
            }

            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('viewport').classList.add('full');
            
            startCountdown(() => {
                startSlideshow();
            });
        }

        function startCountdown(callback) {
            const overlay = document.getElementById('countdown-overlay');
            overlay.style.display = 'flex';
            let count = 3;
            overlay.innerText = count;

            const interval = setInterval(() => {
                count--;
                if(count > 0) {
                    overlay.innerText = count;
                } else if (count === 0) {
                    overlay.innerText = "PLAY";
                } else {
                    clearInterval(interval);
                    overlay.style.display = 'none';
                    callback();
                }
            }, 1000);
        }

        function startSlideshow() {
            isPlaying = true;
            const layout = document.getElementById('cfg-layout').value;
            
            document.querySelectorAll('.scene').forEach(s => {
                s.className = `scene grid-base grid-${layout}`; 
                s.classList.remove('active');
            });
            
            currentSceneIndex = 0;
            document.getElementById(`scene-0`).classList.add('active');
            
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                document.getElementById('rec-status').style.display = 'flex';
            }

            scheduleNextScene();
        }

        function stopAndExitFullscreen() {
            isPlaying = false;
            if(slideTimer) clearTimeout(slideTimer);
            
            document.getElementById('admin-panel').classList.remove('hidden');
            document.getElementById('viewport').classList.remove('full');
            document.getElementById('rec-status').style.display = 'none';
            document.getElementById('float-toggle').classList.remove('visible');

            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
        }

        function scheduleNextScene() {
            if(!isPlaying) return;
            const speedMs = parseFloat(document.getElementById('cfg-speed').value) * 1000;
            
            slideTimer = setTimeout(() => {
                transitionToNext();
            }, speedMs);
        }

        function transitionToNext() {
            if(!isPlaying || scenesData.length <= 1) return;

            const transType = document.getElementById('cfg-trans-type').value;
            const layout = document.getElementById('cfg-layout').value;
            const currentEl = document.getElementById(`scene-${currentSceneIndex}`);
            
            currentSceneIndex++;
            if(currentSceneIndex >= scenesData.length) currentSceneIndex = 0; 
            
            const nextEl = document.getElementById(`scene-${currentSceneIndex}`);

            currentEl.className = `scene grid-base grid-${layout} active`;
            nextEl.className = `scene grid-base grid-${layout}`;

            if(transType === 'none') {
                currentEl.classList.remove('active');
                nextEl.classList.add('active');
                scheduleNextScene();
            } else {
                currentEl.classList.add(`anim-out-${transType}`);
                
                currentEl.onanimationend = () => {
                    currentEl.classList.remove('active');
                    currentEl.onanimationend = null;
                    
                    nextEl.classList.add('active');
                    nextEl.classList.add(`anim-in-${transType}`);
                    scheduleNextScene();
                };
            }
        }

        async function setupRecording() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { frameRate: { ideal: 60 } },
                    audio: false
                });

                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' }); 
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `Sucedoan_Reels_Raw_${Date.now()}.webm`;
                    a.click();
                    recordedChunks = [];
                    document.getElementById('rec-status').style.display = 'none';
                };

                mediaRecorder.start();
                return true;
            } catch (err) {
                console.warn("Gravação cancelada:", err.message);
                return false;
            }
        }
    </script>
</body>
</html>
