<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucedoan Reels Studio PRO v10</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style id="dynamic-styles"></style>
    
    <style>
        :root {
            --bg: #f5f5f7; --accent: #000000; --card-bg: #ffffff;
            --text-main: #1d1d1f; --text-dim: #86868b;
            --price-scale: 1; --name-scale: 1; --img-brightness: 1;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); overflow: hidden; }

        /* --- ADMIN PANEL --- */
        #admin-panel { position: fixed; left: 0; top: 0; bottom: 0; width: 420px; background: white; border-right: 1px solid #e5e5e7; padding: 25px; z-index: 100; overflow-y: auto; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 10px 0 30px rgba(0,0,0,0.05); }
        #admin-panel.hidden { transform: translateX(-100%); }
        h1 { font-weight: 900; font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: var(--accent); }
        
        .section { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; display: block; letter-spacing: 0.5px; }
        
        input[type="text"], input[type="number"], select { width: 100%; padding: 10px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 12px; margin-bottom: 8px; outline: none; background: #fafafa; transition: 0.2s;}
        input:focus, select:focus { border-color: var(--accent); background: #fff; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 900; font-size: 13px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { transform: scale(0.98); }
        .btn-record { background: #ff3b30; color: white; }
        .btn-record:hover { background: #d32f2f; }

        /* Sliders */
        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; margin: 5px 0 15px 0; }
        input[type="range"]:focus { outline: none; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #d2d2d7; border-radius: 4px; }
        input[type="range"]::-webkit-slider-thumb { height: 16px; width: 16px; border-radius: 50%; background: var(--accent); cursor: pointer; -webkit-appearance: none; margin-top: -6px; }

        /* --- REELS VIEWPORT --- */
        #viewport { margin-left: 420px; height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; transition: margin 0.4s cubic-bezier(0.16, 1, 0.3, 1); position: relative;}
        #viewport.full { margin-left: 0; cursor: pointer; }
        
        #reels-container { height: 90vh; aspect-ratio: 9/16; background: #ffffff; position: relative; overflow: hidden; box-shadow: 0 10px 50px rgba(0,0,0,0.8); border-radius: 4px; }

        .scene { position: absolute; inset: 0; display: none; width: 100%; height: 100%; animation-fill-mode: forwards; }
        .scene.active { display: grid; }

        /* GRELHAS */
        .grid-base { gap: 2px; background: #f0f0f0; } 
        .grid-1x1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .grid-1x2 { grid-template-columns: 1fr; grid-template-rows: repeat(2, 1fr); }
        .grid-2x2 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-2x3 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(3, 1fr); }

        .product-card { background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5%; text-align: center; width: 100%; height: 100%; overflow: hidden; }
        
        /* Controle de Luminosidade Limpo */
        .product-card img { 
            width: 100%; object-fit: contain; margin-bottom: 5%; 
            filter: brightness(var(--img-brightness));
        }
        
        .product-card .price { font-weight: 900; color: #000; letter-spacing: -1px; line-height: 1; margin-bottom: 2%; }
        .product-card .name { color: var(--text-dim); font-weight: 700; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .grid-1x1 .product-card img { height: 65%; } .grid-1x1 .product-card .price { font-size: calc(clamp(30px, 6vh, 80px) * var(--price-scale)); } .grid-1x1 .product-card .name { font-size: calc(clamp(16px, 2.5vh, 30px) * var(--name-scale)); }
        .grid-1x2 .product-card img { height: 60%; } .grid-1x2 .product-card .price { font-size: calc(clamp(24px, 4.5vh, 60px) * var(--price-scale)); } .grid-1x2 .product-card .name { font-size: calc(clamp(14px, 2vh, 24px) * var(--name-scale)); }
        .grid-2x2 .product-card img { height: 55%; } .grid-2x2 .product-card .price { font-size: calc(clamp(18px, 3.5vh, 45px) * var(--price-scale)); } .grid-2x2 .product-card .name { font-size: calc(clamp(11px, 1.5vh, 20px) * var(--name-scale)); }
        .grid-2x3 .product-card img { height: 50%; } .grid-2x3 .product-card .price { font-size: calc(clamp(16px, 2.8vh, 32px) * var(--price-scale)); } .grid-2x3 .product-card .name { font-size: calc(clamp(9px, 1.2vh, 16px) * var(--name-scale)); }

        /* Tela Branca Inicial */
        #white-start-screen { position: absolute; inset: 0; background: #ffffff; z-index: 90; display: none; }

        /* Loaders */
        #loader-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; color: white; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid white; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #rec-status { position: absolute; top: 20px; right: 20px; background: rgba(255,0,0,0.9); color: white; padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 900; display: none; z-index: 1000; letter-spacing: 1px;}
        #float-toggle { position: fixed; bottom: 30px; left: 30px; z-index: 1000; width: 50px; height: 50px; border-radius: 25px; padding: 0; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: none; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        #viewport.full ~ #float-toggle { display: flex; align-items: center; justify-content: center; }
        #viewport.full ~ #float-toggle.visible { opacity: 1; pointer-events: auto; }

        /* =========================================
           ANIMAÇÕES DE TRANSIÇÃO
           ========================================= */
        @keyframes staySolid { from { opacity: 1; } to { opacity: 1; } }
        
        /* Blur Zoom (Zoom com Desfoque) */
        @keyframes blurZoomIn { from { opacity: 0; filter: blur(12px); transform: scale(0.85); } to { opacity: 1; filter: blur(0); transform: scale(1); } }
        @keyframes blurZoomOut { from { opacity: 1; filter: blur(0); transform: scale(1); } to { opacity: 0.5; filter: blur(12px); transform: scale(1.15); } }

        /* Morph (Transformação de Produto) */
        @keyframes morphIn { from { opacity: 0; filter: contrast(1.5) blur(5px); transform: scale(0.98); } 50% { filter: contrast(1.8) blur(2px); } to { opacity: 1; filter: contrast(1) blur(0); transform: scale(1); } }
        @keyframes morphOut { from { opacity: 1; filter: contrast(1) blur(0); transform: scale(1); } 50% { filter: contrast(1.8) blur(2px); } to { opacity: 0; filter: contrast(1.5) blur(5px); transform: scale(1.02); } }

        /* Blur Fade (Clássico Premium) */
        @keyframes blurIn { from { opacity: 0; filter: blur(15px); } to { opacity: 1; filter: blur(0); } }
        @keyframes blurOut { from { opacity: 1; filter: blur(0); } to { opacity: 0.5; filter: blur(15px); } }

        .anim-in-blurZoom { animation: blurZoomIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; } 
        .anim-out-blurZoom { animation: blurZoomOut 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .anim-in-morph { animation: morphIn 0.8s ease-in-out forwards; } 
        .anim-out-morph { animation: morphOut 0.8s ease-in-out forwards; }
        .anim-in-blurFade { animation: blurIn 0.7s ease forwards; } 
        .anim-out-blurFade { animation: blurOut 0.7s ease forwards; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <h1><i data-lucide="video"></i> SUCEDOAN REELS</h1>
        
        <div class="section">
            <span class="label">1. Configurações Básicas</span>
            <input type="text" id="cfg-keywords" placeholder="Buscar (ex: sony, fone)" onchange="buildScenes()">
            <select id="cfg-cat" onchange="buildScenes()"><option value="">Todas as Categorias</option></select>
            <div class="grid-2">
                <select id="cfg-layout" onchange="buildScenes()">
                    <option value="1x1">1x1 (Tela Cheia)</option>
                    <option value="1x2">1x2 (Vertical)</option>
                    <option value="2x2">2x2 (4 Prods)</option>
                    <option value="2x3" selected>2x3 (6 Prods)</option>
                </select>
                <select id="cfg-trans-type">
                    <option value="blurZoom" selected>Zoom + Desfoque</option>
                    <option value="morph">Transformação (Morph)</option>
                    <option value="blurFade">Fade + Desfoque</option>
                </select>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 10px; align-items:center;">
                <input type="number" id="cfg-speed" value="1.5" step="0.5" min="0.5" style="width: 80px; margin:0;">
                <span style="font-size: 11px; font-weight: bold;">Segs/Slide (A partir de 0.5s)</span>
            </div>
            
            <label style="display:flex; align-items:center; gap:8px; margin-top:12px; font-size:12px; font-weight:bold; cursor:pointer;">
                <input type="checkbox" id="cfg-hide-name" style="width:auto; margin:0;" onchange="updateDynamicStyles()">
                Ocultar Nomes dos Produtos
            </label>
        </div>

        <div class="section">
            <span class="label">2. Ajuste Visual de Fontes e Luz</span>
            <div class="grid-2">
                <div>
                    <span style="font-size:9px;">Tam. Valor: <span id="lbl-font-price">100</span>%</span>
                    <input type="range" id="cfg-font-price" min="50" max="180" value="100" oninput="updateDynamicStyles()">
                </div>
                <div>
                    <span style="font-size:9px;">Tam. Nome: <span id="lbl-font-name">100</span>%</span>
                    <input type="range" id="cfg-font-name" min="50" max="180" value="100" oninput="updateDynamicStyles()">
                </div>
            </div>
            
            <div style="margin-top: 5px;">
                <span style="font-size:9px;">Luminosidade das Fotos: <span id="lbl-brightness">100</span>%</span>
                <input type="range" id="cfg-brightness" min="50" max="150" value="100" oninput="updateDynamicStyles()">
            </div>
        </div>

        <div class="section" style="border:none;">
            <button class="btn btn-primary" onclick="initiatePlayback(false)"><i data-lucide="play-circle"></i> VER ECRÃ INTEIRO</button>
            <button id="btn-start-record" class="btn btn-record" onclick="initiatePlayback(true)"><i data-lucide="video-recording"></i> GRAVAR REELS (15 Segs)</button>
        </div>
    </div>

    <div id="viewport">
        <div id="reels-container">
            
            <div id="white-start-screen"></div>

            <div id="scenes-wrapper" style="position:absolute; inset:0;"></div>
            
            <div id="rec-status">🔴 GRAVANDO</div>
            <div id="loader-overlay"><div class="spinner"></div><div style="font-size: 14px; font-weight: bold; letter-spacing: 1px;">A PREPARAR MAGIA...</div></div>
        </div>
    </div>

    <button id="float-toggle" class="btn btn-primary" onclick="stopAndExitFullscreen()" title="Parar e Sair"><i data-lucide="x"></i></button>

    <script>
        const STORAGE_KEY = 'sucedoan_pim_v37';
        const CAT_KEY = 'sucedoan_categorias';
        const MAX_VIDEO_TIME = 15000; // Exatamente 15 Segundos de produtos
        
        let allProducts = [];
        let scenesData = []; 
        let imageUrlsToPreload = [];
        let currentSceneIndex = 0;
        let slideTimer = null;
        let isPlaying = false;
        let totalElapsedMs = 0;
        let mediaRecorder;
        let recordedChunks = [];
        let hideBtnTimeout;

        localforage.config({ name: 'SucedoanPIM', storeName: 'produtos_db' });

        window.onload = async () => {
            lucide.createIcons();
            await loadData();
            setupViewportClick();
            updateDynamicStyles();
        };

        function updateDynamicStyles() {
            const priceScale = document.getElementById('cfg-font-price').value;
            const nameScale = document.getElementById('cfg-font-name').value;
            const brightness = document.getElementById('cfg-brightness').value;
            const hideName = document.getElementById('cfg-hide-name').checked;
            
            document.getElementById('lbl-font-price').innerText = priceScale;
            document.getElementById('lbl-font-name').innerText = nameScale;
            document.getElementById('lbl-brightness').innerText = brightness;
            
            document.documentElement.style.setProperty('--price-scale', priceScale / 100);
            document.documentElement.style.setProperty('--name-scale', nameScale / 100);
            document.documentElement.style.setProperty('--img-brightness', brightness / 100);

            let styleString = '';
            if (hideName) {
                styleString += '.product-card .name { display: none !important; } ';
            }
            document.getElementById('dynamic-styles').innerHTML = styleString;
        }

        function setupViewportClick() {
            document.getElementById('viewport').addEventListener('click', () => {
                if(isPlaying) {
                    const btn = document.getElementById('float-toggle');
                    btn.classList.add('visible');
                    if(hideBtnTimeout) clearTimeout(hideBtnTimeout);
                    hideBtnTimeout = setTimeout(() => { btn.classList.remove('visible'); }, 3000);
                }
            });
        }

        async function loadData() {
            try {
                const data = await localforage.getItem(STORAGE_KEY);
                const cats = await localforage.getItem(CAT_KEY);
                
                if(data) allProducts = data.filter(p => p.situacao !== 'I');
                if(cats) cats.forEach(c => { document.getElementById('cfg-cat').innerHTML += `<option value="${c.nome}">${c.nome}</option>`; });
                
                buildScenes(); 
            } catch (e) { console.error(e); }
        }

        function buildScenes() {
            scenesData = [];
            imageUrlsToPreload = [];
            const container = document.getElementById('scenes-wrapper');
            container.innerHTML = '';

            const keywords = document.getElementById('cfg-keywords').value.toLowerCase().split(',').map(k => k.trim()).filter(k => k.length > 0);
            const cat = document.getElementById('cfg-cat').value;
            const layout = document.getElementById('cfg-layout').value;

            let filtered = allProducts.filter(p => {
                const nomeProduto = (p.nome || "").toLowerCase();
                const matchesName = keywords.length === 0 || keywords.some(kw => nomeProduto.includes(kw));
                const matchesCat = cat === "" || p.categoria === cat;
                return matchesName && matchesCat;
            });

            if (filtered.length === 0) return;

            let slotsPerSlide = 6;
            if (layout === '1x1') slotsPerSlide = 1;
            if (layout === '1x2') slotsPerSlide = 2;
            if (layout === '2x2') slotsPerSlide = 4;

            const totalSlotsNeeded = Math.ceil(filtered.length / slotsPerSlide) * slotsPerSlide;
            let displayList = [];
            for (let i = 0; i < totalSlotsNeeded; i++) {
                displayList.push(filtered[i % filtered.length]);
            }

            for (let i = 0; i < displayList.length; i += slotsPerSlide) {
                const batch = displayList.slice(i, i + slotsPerSlide);
                let gridHtml = `<div class="scene grid-base grid-${layout}">`;
                
                batch.forEach(p => {
                    const imgUrl = (p.url_imagem && p.url_imagem.length > 5) ? p.url_imagem : 'https://placehold.co/400x600/f4f4f5/a1a1aa?text=SEM+FOTO';
                    if (!imageUrlsToPreload.includes(imgUrl)) imageUrlsToPreload.push(imgUrl);
                    gridHtml += `<div class="product-card"><img src="${imgUrl}"><div class="price">R$ ${parseFloat(p.preco||0).toFixed(2).replace('.', ',')}</div><div class="name">${p.nome}</div></div>`;
                });
                
                gridHtml += `</div>`;
                scenesData.push(gridHtml);
            }

            scenesData.forEach((sceneHtml, index) => {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = sceneHtml;
                const sceneEl = tempDiv.firstElementChild;
                sceneEl.id = `scene-${index}`;
                container.appendChild(sceneEl);
            });
        }

        async function preloadAllImages() {
            const overlay = document.getElementById('loader-overlay');
            overlay.style.display = 'flex';
            
            const promises = imageUrlsToPreload.map(url => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = resolve;
                    img.onerror = resolve; 
                    img.src = url;
                });
            });

            await Promise.all(promises);
            overlay.style.display = 'none';
        }

        async function initiatePlayback(withRecording) {
            buildScenes(); 
            if (scenesData.length === 0) return alert("Nenhum produto encontrado.");

            await preloadAllImages();

            // Pede permissão e inicia a gravação ANTES da tela branca começar
            if (withRecording) {
                const success = await setupRecording();
                if(!success) return; 
            }

            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('viewport').classList.add('full');
            
            // Ativa a tela branca inicial por 1 segundo
            const whiteScreen = document.getElementById('white-start-screen');
            whiteScreen.style.display = 'block';

            setTimeout(() => {
                whiteScreen.style.display = 'none';
                startSlideshow();
            }, 1000);
        }

        function startSlideshow() {
            isPlaying = true;
            totalElapsedMs = 0;
            const layout = document.getElementById('cfg-layout').value;
            
            document.querySelectorAll('.scene').forEach(s => {
                s.className = `scene grid-base grid-${layout}`; 
            });
            
            currentSceneIndex = 0;
            document.getElementById(`scene-0`).classList.add('active');
            
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                document.getElementById('rec-status').style.display = 'flex';
            }

            scheduleNextScene();
        }

        // Tempo Automático
        function scheduleNextScene() {
            if(!isPlaying) return;
            const speedMs = parseFloat(document.getElementById('cfg-speed').value) * 1000;
            
            slideTimer = setTimeout(() => {
                totalElapsedMs += speedMs;
                if(totalElapsedMs >= MAX_VIDEO_TIME) {
                    triggerClosingSequence();
                } else {
                    transitionToNext();
                }
            }, speedMs);
        }

        function transitionToNext() {
            if(!isPlaying || scenesData.length <= 1) return;

            const transType = document.getElementById('cfg-trans-type').value;
            const layout = document.getElementById('cfg-layout').value;
            
            const currentEl = document.getElementById(`scene-${currentSceneIndex}`);
            currentSceneIndex++;
            if(currentSceneIndex >= scenesData.length) currentSceneIndex = 0; 
            const nextEl = document.getElementById(`scene-${currentSceneIndex}`);

            currentEl.style.zIndex = "1";
            nextEl.style.zIndex = "2";
            nextEl.className = `scene grid-base grid-${layout} active`;

            currentEl.classList.add(`anim-out-${transType}`);
            nextEl.classList.add(`anim-in-${transType}`);
            
            let animEnded = false;
            const finishTransition = () => {
                if (animEnded) return;
                animEnded = true;
                currentEl.classList.remove('active', `anim-out-${transType}`);
                nextEl.classList.remove(`anim-in-${transType}`);
                currentEl.style.zIndex = ""; nextEl.style.zIndex = "";
                nextEl.removeEventListener('animationend', endHandler);
                scheduleNextScene(); 
            };
            
            const endHandler = (e) => { if (e.target === nextEl) finishTransition(); };
            nextEl.addEventListener('animationend', endHandler);
            setTimeout(finishTransition, 1000); 
        }

        // Fim Limpo
        function triggerClosingSequence() {
            const currentEl = document.getElementById(`scene-${currentSceneIndex}`);
            if(currentEl) {
                currentEl.style.transition = 'opacity 0.5s ease';
                currentEl.style.opacity = '0';
            }
            // Encerra após meio segundo de fade
            setTimeout(stopAndExitFullscreen, 500);
        }

        function stopAndExitFullscreen() {
            isPlaying = false;
            if(slideTimer) clearTimeout(slideTimer);
            
            document.getElementById('admin-panel').classList.remove('hidden');
            document.getElementById('viewport').classList.remove('full');
            document.getElementById('rec-status').style.display = 'none';
            document.getElementById('float-toggle').classList.remove('visible');
            
            if(document.getElementById(`scene-${currentSceneIndex}`)) {
                document.getElementById(`scene-${currentSceneIndex}`).style.opacity = '1';
            }

            if (mediaRecorder && mediaRecorder.state === 'recording') { mediaRecorder.stop(); }
        }

        async function setupRecording() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: { frameRate: { ideal: 60 } }, audio: false });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' }); 
                
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `Reels_Produtos_${Date.now()}.webm`;
                    a.click();
                    recordedChunks = [];
                    document.getElementById('rec-status').style.display = 'none';
                };
                mediaRecorder.start();
                return true;
            } catch (err) {
                console.warn("Gravação cancelada:", err.message);
                return false;
            }
        }
    </script>
</body>
</html>
