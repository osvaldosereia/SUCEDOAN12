<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucedoan Reels Studio PRO v2</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f9f9fb; --accent: #000000; --card-bg: #ffffff;
            --text-main: #1d1d1f; --text-dim: #86868b;
            --trans-speed: 0.6s;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); overflow: hidden; }

        /* --- ADMIN PANEL --- */
        #admin-panel { position: fixed; left: 0; top: 0; bottom: 0; width: 420px; background: white; border-right: 1px solid #e5e5e7; padding: 25px; z-index: 100; overflow-y: auto; transition: transform 0.4s ease; }
        #admin-panel.hidden { transform: translateX(-100%); }
        h1 { font-weight: 900; font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .section { border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; display: block; }
        input, select { width: 100%; padding: 10px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 13px; margin-bottom: 8px; outline: none; background: #fafafa; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 800; font-size: 12px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-record { background: #ff3b30; color: white; }

        /* --- REELS VIEWPORT --- */
        #viewport { margin-left: 420px; height: 100vh; display: flex; align-items: center; justify-content: center; background: #111; transition: margin 0.4s; }
        #viewport.full { margin-left: 0; }
        
        #reels-container {
            width: auto; height: 90vh; aspect-ratio: 9/16; background: #fff;
            position: relative; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .scene {
            position: absolute; inset: 0; display: none; flex-direction: column; 
            background: #fff; width: 100%; height: 100%;
            /* Preparação para Animação */
            animation-duration: var(--trans-speed);
            animation-fill-mode: both;
        }
        .scene.active { display: flex; }

        /* Cena de Grelha de Produtos */
        .grid-scene { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(3, 1fr); gap: 1px; background: #f0f0f0; }
        .product-card { background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; text-align: center; }
        .product-card img { max-width: 90%; max-height: 60%; object-fit: contain; margin-bottom: 8px; }
        .product-card .price { font-size: 18px; font-weight: 900; color: #000; letter-spacing: -1px; }
        .product-card .name { font-size: 10px; color: var(--text-dim); font-weight: 600; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Cenas Especiais (Abertura/Encerramento) */
        .special-scene { align-items: center; justify-content: center; text-align: center; padding: 30px; background: var(--accent); color: white; }
        .special-scene h2 { font-size: 48px; font-weight: 900; text-transform: uppercase; line-height: 1; margin: 0 0 15px 0; }
        .special-scene p { font-size: 18px; font-weight: 400; opacity: 0.8; margin: 0; }

        /* Indicador de Gravação e Controles */
        #rec-status { position: absolute; top: 20px; right: 20px; background: rgba(255,0,0,0.8); color: white; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 900; display: none; z-index: 1000; }
        #float-toggle { position: fixed; bottom: 20px; right: 20px; z-index: 1000; width: 50px; height: 50px; border-radius: 25px; padding: 0; }

        /* =========================================
           10+ ANIMAÇÕES DE TRANSIÇÃO (IN e OUT)
           ========================================= */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        
        @keyframes slideUpIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes slideUpOut { from { transform: translateY(0); } to { transform: translateY(-100%); } }
        
        @keyframes slideDownIn { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        @keyframes slideDownOut { from { transform: translateY(0); } to { transform: translateY(100%); } }

        @keyframes slideLeftIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes slideLeftOut { from { transform: translateX(0); } to { transform: translateX(-100%); } }

        @keyframes zoomInIn { from { opacity: 0; transform: scale(0.3); } to { opacity: 1; transform: scale(1); } }
        @keyframes zoomInOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(1.5); } }

        @keyframes flipIn { from { transform: perspective(400px) rotateY(90deg); opacity: 0; } to { transform: perspective(400px) rotateY(0); opacity: 1; } }
        @keyframes flipOut { from { transform: perspective(400px) rotateY(0); opacity: 1; } to { transform: perspective(400px) rotateY(-90deg); opacity: 0; } }

        @keyframes bounceIn { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.05); opacity: 1; } 70% { transform: scale(0.9); } 100% { transform: scale(1); } }
        @keyframes bounceOut { 20% { transform: scale(0.9); } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(0.3); opacity: 0; } }

        @keyframes spinIn { from { transform: rotate(-180deg) scale(0); opacity: 0; } to { transform: rotate(0) scale(1); opacity: 1; } }
        @keyframes spinOut { from { transform: rotate(0) scale(1); opacity: 1; } to { transform: rotate(180deg) scale(0); opacity: 0; } }

        @keyframes blurIn { from { filter: blur(20px); opacity: 0; } to { filter: blur(0); opacity: 1; } }
        @keyframes blurOut { from { filter: blur(0); opacity: 1; } to { filter: blur(20px); opacity: 0; } }

        @keyframes dropIn { from { transform: translateY(-500px); opacity: 0; animation-timing-function: ease-in; } 38% { transform: translateY(0); animation-timing-function: ease-out; } 55% { transform: translateY(-65px); animation-timing-function: ease-in; } 72% { transform: translateY(0); animation-timing-function: ease-out; } 81% { transform: translateY(-28px); animation-timing-function: ease-in; } 90% { transform: translateY(0); animation-timing-function: ease-out; } 95% { transform: translateY(-8px); animation-timing-function: ease-in; } 100% { transform: translateY(0); animation-timing-function: ease-out; } }

        /* Classes utilitárias geradas pelo JS */
        .anim-none { animation: none; }
        .anim-in-fade { animation-name: fadeIn; } .anim-out-fade { animation-name: fadeOut; }
        .anim-in-slideUp { animation-name: slideUpIn; } .anim-out-slideUp { animation-name: slideUpOut; }
        .anim-in-slideDown { animation-name: slideDownIn; } .anim-out-slideDown { animation-name: slideDownOut; }
        .anim-in-slideLeft { animation-name: slideLeftIn; } .anim-out-slideLeft { animation-name: slideLeftOut; }
        .anim-in-zoom { animation-name: zoomInIn; } .anim-out-zoom { animation-name: zoomInOut; }
        .anim-in-flip { animation-name: flipIn; } .anim-out-flip { animation-name: flipOut; }
        .anim-in-bounce { animation-name: bounceIn; } .anim-out-bounce { animation-name: bounceOut; }
        .anim-in-spin { animation-name: spinIn; } .anim-out-spin { animation-name: spinOut; }
        .anim-in-blur { animation-name: blurIn; } .anim-out-blur { animation-name: blurOut; }
        .anim-in-drop { animation-name: dropIn; } .anim-out-drop { animation-name: slideDownOut; /* Drop não tem out perfeito, usa slide */ }
    </style>
</head>
<body>

    <div id="admin-panel">
        <h1><i data-lucide="film"></i> REELS STUDIO PRO</h1>
        
        <div class="section">
            <span class="label">1. Buscar Produtos (Vírgula para várias palavras)</span>
            <input type="text" id="cfg-keywords" placeholder="Ex: fone, teclado, sony" onchange="buildScenes()">
            <select id="cfg-cat" onchange="buildScenes()">
                <option value="">Todas as Categorias</option>
            </select>
        </div>

        <div class="section">
            <span class="label">2. Cenas Especiais</span>
            <div class="grid-2">
                <div>
                    <span class="label">Abertura</span>
                    <select id="cfg-opening" onchange="buildScenes()">
                        <option value="none">Nenhuma</option>
                        <option value="Oferta Relâmpago|Aproveite agora">Oferta Relâmpago</option>
                        <option value="Lançamentos|Chegou novidade">Lançamentos</option>
                        <option value="Destaques|Os mais vendidos">Destaques da Semana</option>
                        <option value="Promoção|Descontos imperdíveis">Promoção</option>
                        <option value="Nova Coleção|Confira as peças">Nova Coleção</option>
                        <option value="Queima Estoque|Últimas unidades">Queima de Estoque</option>
                        <option value="Bem-vindo|Conheça a loja">Bem-vindo à Loja</option>
                        <option value="Top 10|Os melhores">Top 10</option>
                        <option value="Black Friday|Preços de custo">Black Friday</option>
                        <option value="Especial|Para você">Especial</option>
                    </select>
                </div>
                <div>
                    <span class="label">Encerramento</span>
                    <select id="cfg-closing" onchange="buildScenes()">
                        <option value="none">Nenhum</option>
                        <option value="Acesse o Site|Link na Bio">Acesse o Site</option>
                        <option value="Compre Agora|Envie um Direct">Compre Agora</option>
                        <option value="Fale Connosco|WhatsApp na Bio">Fale no WhatsApp</option>
                        <option value="Siga-nos|Acompanhe as novidades">Siga nosso Perfil</option>
                        <option value="Obrigado|Volte sempre">Obrigado</option>
                        <option value="Gostou?|Curta e Compartilhe">Curta e Compartilhe</option>
                        <option value="Salve o Vídeo|Para não esquecer">Salve este Reel</option>
                        <option value="Comente|Qual o seu favorito?">Deixe um comentário</option>
                        <option value="Última Chance|Corra para o site">Última Chance</option>
                        <option value="Até Logo|Esperamos por ti">Até a próxima</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="section">
            <span class="label">3. Transições e Tempo</span>
            <div class="grid-2">
                <select id="cfg-trans-type">
                    <option value="none">Sem Transição (Corte)</option>
                    <option value="fade">Suave (Fade)</option>
                    <option value="slideLeft">Deslizar Esquerda</option>
                    <option value="slideUp">Deslizar Cima</option>
                    <option value="slideDown">Deslizar Baixo</option>
                    <option value="zoom">Efeito Zoom</option>
                    <option value="flip">Girar (Flip)</option>
                    <option value="bounce">Pulo (Bounce)</option>
                    <option value="spin">Rodopiar (Spin)</option>
                    <option value="blur">Desfoque (Blur)</option>
                    <option value="drop">Queda (Drop)</option>
                </select>
                <select id="cfg-trans-dir">
                    <option value="both">Entrada e Saída</option>
                    <option value="in">Apenas Entrada</option>
                    <option value="out">Apenas Saída</option>
                </select>
            </div>
            <div style="display: flex; align-items: center; gap: 10px; margin-top:10px;">
                <input type="number" id="cfg-speed" value="3.0" step="0.5" min="1" style="width: 80px; margin:0;">
                <span style="font-size: 11px; font-weight:bold;">Segundos por Cena</span>
            </div>
        </div>

        <div class="section" style="border:none;">
            <button class="btn btn-primary" onclick="toggleMode()"><i data-lucide="play"></i> REPRODUZIR SLIDES</button>
            <button id="btn-start-record" class="btn btn-record" onclick="startCapture()"><i data-lucide="video"></i> GRAVAR VÍDEO (.WEBM)</button>
        </div>
        
        <div style="font-size: 10px; color: var(--text-dim); text-align:center;">
            Produtos disponíveis: <span id="db-count">0</span> | Cenas geradas: <span id="scene-count">0</span>
        </div>
    </div>

    <div id="viewport">
        <div id="reels-container">
            <div id="rec-status">🔴 GRAVANDO</div>
            </div>
    </div>

    <button id="float-toggle" class="btn btn-primary" onclick="toggleMode()"><i data-lucide="settings"></i></button>

    <script>
        const STORAGE_KEY = 'sucedoan_pim_v37';
        const CAT_KEY = 'sucedoan_categorias';
        
        let allProducts = [];
        let scenesData = []; // Guarda o HTML de cada cena
        let currentSceneIndex = 0;
        let slideTimer = null;
        let isPlaying = false;

        localforage.config({ name: 'SucedoanPIM', storeName: 'produtos_db' });

        window.onload = async () => {
            lucide.createIcons();
            await loadData();
        };

        async function loadData() {
            try {
                const data = await localforage.getItem(STORAGE_KEY);
                const cats = await localforage.getItem(CAT_KEY);
                
                if(data) {
                    allProducts = data.filter(p => p.situacao !== 'I');
                    document.getElementById('db-count').innerText = allProducts.length;
                }

                if(cats) {
                    const select = document.getElementById('cfg-cat');
                    cats.forEach(c => {
                        select.innerHTML += `<option value="${c.nome}">${c.nome}</option>`;
                    });
                }
                buildScenes(); // Constrói a primeira vez
            } catch (e) { console.error(e); }
        }

        // ==========================================
        // LÓGICA DE CONSTRUÇÃO DE CENAS E FILTROS
        // ==========================================
        function buildScenes() {
            scenesData = [];
            const container = document.getElementById('reels-container');
            
            // Limpa container (mantendo o rec-status)
            container.innerHTML = '<div id="rec-status">🔴 GRAVANDO</div>';

            // 1. APLICAR FILTROS (Múltiplas Palavras-chave)
            const keywordString = document.getElementById('cfg-keywords').value.toLowerCase();
            // Separa por vírgula, limpa espaços vazios
            const keywords = keywordString.split(',').map(k => k.trim()).filter(k => k.length > 0);
            const cat = document.getElementById('cfg-cat').value;

            let filtered = allProducts.filter(p => {
                const nomeProduto = (p.nome || "").toLowerCase();
                // Se houver keywords, tem que bater com pelo menos uma (Lógica OR)
                const matchesName = keywords.length === 0 || keywords.some(kw => nomeProduto.includes(kw));
                const matchesCat = cat === "" || p.categoria === cat;
                return matchesName && matchesCat;
            });

            // 2. CENA DE ABERTURA
            const opening = document.getElementById('cfg-opening').value;
            if(opening !== 'none') {
                const [title, sub] = opening.split('|');
                scenesData.push(`
                    <div class="scene special-scene">
                        <h2>${title}</h2>
                        <p>${sub}</p>
                    </div>
                `);
            }

            // 3. CENAS DE PRODUTOS (Batches de 6)
            for (let i = 0; i < filtered.length; i += 6) {
                const batch = filtered.slice(i, i + 6);
                let gridHtml = `<div class="scene grid-scene">`;
                
                batch.forEach(p => {
                    const img = (p.url_imagem && p.url_imagem.length > 5) ? p.url_imagem : 'https://placehold.co/400x600/f4f4f5/a1a1aa?text=SEM+FOTO';
                    gridHtml += `
                        <div class="product-card">
                            <img src="${img}">
                            <div class="price">R$ ${parseFloat(p.preco||0).toFixed(2)}</div>
                            <div class="name">${p.nome}</div>
                        </div>
                    `;
                });

                // Preencher buracos vazios se o último lote tiver < 6
                for(let j = batch.length; j < 6; j++) { gridHtml += `<div class="product-card"></div>`; }
                
                gridHtml += `</div>`;
                scenesData.push(gridHtml);
            }

            // 4. CENA DE ENCERRAMENTO
            const closing = document.getElementById('cfg-closing').value;
            if(closing !== 'none') {
                const [title, sub] = closing.split('|');
                scenesData.push(`
                    <div class="scene special-scene" style="background:#111;">
                        <h2>${title}</h2>
                        <p>${sub}</p>
                    </div>
                `);
            }

            // Renderizar as Cenas ocultas no DOM
            scenesData.forEach((sceneHtml, index) => {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = sceneHtml;
                const sceneEl = tempDiv.firstElementChild;
                sceneEl.id = `scene-${index}`;
                container.appendChild(sceneEl);
            });

            document.getElementById('scene-count').innerText = scenesData.length;
            currentSceneIndex = 0;

            if (scenesData.length > 0) {
                document.getElementById('scene-0').classList.add('active');
            }
        }

        // ==========================================
        // MOTOR DE ANIMAÇÃO E TRANSIÇÃO
        // ==========================================
        function toggleMode() {
            const panel = document.getElementById('admin-panel');
            const view = document.getElementById('viewport');
            
            panel.classList.toggle('hidden');
            view.classList.toggle('full');

            isPlaying = panel.classList.contains('hidden');
            
            if(isPlaying && scenesData.length > 0) {
                // Começa sempre da cena 0 ao dar Play
                document.querySelectorAll('.scene').forEach(s => {
                    s.className = s.className.replace(/anim-[a-zA-Z-]+/g, ''); // Limpa classes antigas de anim
                    s.classList.remove('active');
                });
                currentSceneIndex = 0;
                document.getElementById(`scene-0`).classList.add('active');
                scheduleNextScene();
            } else {
                if(slideTimer) clearTimeout(slideTimer);
            }
        }

        function scheduleNextScene() {
            if(!isPlaying) return;
            const speedMs = parseFloat(document.getElementById('cfg-speed').value) * 1000;
            
            slideTimer = setTimeout(() => {
                transitionToNext();
            }, speedMs);
        }

        function transitionToNext() {
            if(!isPlaying || scenesData.length <= 1) return;

            const transType = document.getElementById('cfg-trans-type').value;
            const transDir = document.getElementById('cfg-trans-dir').value;
            
            const currentEl = document.getElementById(`scene-${currentSceneIndex}`);
            
            currentSceneIndex++;
            if(currentSceneIndex >= scenesData.length) currentSceneIndex = 0; // Loop infinito
            
            const nextEl = document.getElementById(`scene-${currentSceneIndex}`);

            // Limpar classes de animação prévias
            currentEl.className = currentEl.className.replace(/anim-[a-zA-Z-]+/g, '');
            nextEl.className = nextEl.className.replace(/anim-[a-zA-Z-]+/g, '');

            if(transType === 'none') {
                currentEl.classList.remove('active');
                nextEl.classList.add('active');
                scheduleNextScene();
            } else {
                // Processa lógica de In/Out/Both
                const applyOut = transDir === 'both' || transDir === 'out';
                const applyIn = transDir === 'both' || transDir === 'in';

                if (applyOut) {
                    currentEl.classList.add(`anim-out-${transType}`);
                    // Ouve o fim da animação de saída do elemento atual
                    currentEl.onanimationend = () => {
                        currentEl.classList.remove('active');
                        currentEl.onanimationend = null;
                        
                        nextEl.classList.add('active');
                        if (applyIn) nextEl.classList.add(`anim-in-${transType}`);
                        scheduleNextScene();
                    };
                } else {
                    // Sem animação de saída, troca direto e faz a de entrada
                    currentEl.classList.remove('active');
                    nextEl.classList.add('active');
                    if (applyIn) nextEl.classList.add(`anim-in-${transType}`);
                    scheduleNextScene();
                }
            }
        }

        // ==========================================
        // GRAVAÇÃO DA TELA
        // ==========================================
        let mediaRecorder;
        let recordedChunks = [];

        async function startCapture() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { frameRate: { ideal: 60 } },
                    audio: false
                });

                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' }); // vp8 é mais universal
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `reels_sucedoan_${Date.now()}.webm`;
                    a.click();
                    recordedChunks = [];
                    document.getElementById('rec-status').style.display = 'none';
                };

                mediaRecorder.start();
                document.getElementById('rec-status').style.display = 'flex';
                
                // Entra em modo full screen e inicia o vídeo automaticamente
                if(!document.getElementById('admin-panel').classList.contains('hidden')) {
                    toggleMode();
                }

            } catch (err) {
                alert("Erro ao gravar: " + err.message);
            }
        }
    </script>
</body>
</html>
