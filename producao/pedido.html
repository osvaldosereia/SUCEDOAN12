<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestor de Pedidos - Sucedoan</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        .hidden { display: none !important; }

        :root {
            --bg-body: #f4f4f5; --bg-card: #ffffff; --text-primary: #0f172a; --text-secondary: #64748b;
            --accent: #000000; --accent-hover: #27272a; --success: #10b981; --warning: #f59e0b;
            --danger: #ef4444; --border: #e4e4e7; --radius: 12px; --shadow: 0 4px 20px rgba(0,0,0,0.04);
        }
        
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-body); height: 100vh; display: flex; flex-direction: column; color: var(--text-primary); overflow: hidden; -webkit-font-smoothing: antialiased; }
        
        header { background: #ffffff; min-height: 54px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); gap: 15px; z-index: 10; }
        .brand { font-weight: 900; font-size: 16px; letter-spacing: -0.5px; margin-right: auto; display: flex; align-items: center; gap: 8px; }
        
        #queue-status { display:none; align-items:center; gap:6px; font-size:11px; font-weight:800; background:#fffbeb; color:#b45309; padding:6px 12px; border-radius:20px; border:1px solid #fde68a; }
        
        .nav-btn { background: #ffffff; border: 1px solid var(--border); color: var(--text-primary); padding: 8px 12px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; font-size: 11px; box-shadow: var(--shadow); min-height: 36px; box-sizing: border-box; justify-content: center;}
        .nav-btn:hover:not(:disabled) { background: #f4f4f5; }
        .nav-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
        .nav-btn.primary:hover:not(:disabled) { background: var(--accent-hover); }
        .nav-btn.success-btn { background: var(--success); color: white; border-color: var(--success); }
        .nav-btn.success-btn:hover:not(:disabled) { background: #059669; }
        .nav-btn.bling-btn { background: #e6fffa; color: #047857; border-color: #b9fbc0; }
        .nav-btn.bling-btn:hover { background: #b9fbc0; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spin-icon { animation: spin 2s linear infinite; }

        .main-content { flex-grow: 1; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
        
        .panel { background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: var(--shadow); }
        .panel-title { font-size: 14px; font-weight: 900; margin: 0; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        .form-input { width: 100%; max-width: 100%; flex-grow: 1; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; font-weight: 600; background: #fafafa; outline: none; transition: 0.2s; font-family: 'Inter', sans-serif; box-sizing: border-box; }
        .form-input:focus { border-color: var(--accent); background: #ffffff; }

        .client-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
        .form-label { font-size: 10px; font-weight: 800; color: var(--text-primary); text-transform: uppercase;}

        .order-day-group { margin-bottom: 15px; }
        .order-day-title { font-size: 12px; font-weight: 800; color: var(--text-secondary); background: #f1f5f9; padding: 6px 12px; border-radius: 6px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        .order-card { border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
        .order-header-row { display: flex; justify-content: space-between; align-items: center; }
        .order-info { display: flex; flex-direction: column; gap: 4px; }
        .order-id { font-size: 13px; font-weight: 900; color: var(--accent); }
        .order-meta { font-size: 10px; color: var(--text-secondary); font-weight: 600; }
        .status-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 800; text-transform: uppercase; width: fit-content; }
        .status-pendente { background: #fef08a; color: #854d0e; border: 1px solid #fde047; }
        .status-concluido { background: #bbf7d0; color: #166534; border: 1px solid #86efac; }

        .falhas-container { margin-top: 5px; border-top: 1px dashed #fca5a5; padding-top: 10px; }
        .falhas-titulo { font-size: 10px; font-weight: 800; color: var(--danger); display: flex; align-items: center; gap: 4px; margin-bottom: 6px; }
        .falha-card { background: #fee2e2; border: 1px solid #fca5a5; padding: 8px; border-radius: 6px; margin-bottom: 4px; display: flex; justify-content: space-between; font-size: 11px; align-items: center; }
        .falha-nome { color: #991b1b; font-weight: 700; }
        .falha-qtd { color: white; background: #ef4444; font-weight: 900; padding: 2px 6px; border-radius: 4px; font-size: 10px; }

        #alerta-customizado { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; padding: 15px; border-radius: 10px; color: white; font-weight: bold; text-align: center; z-index: 10000; display: none; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .alerta-erro { background-color: var(--danger); } .alerta-sucesso { background-color: var(--success); } .alerta-aviso { background-color: var(--warning); color: #000; }

        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(2px); z-index: 1000; display: none; opacity: 0; transition: 0.3s; }
        .sidebar { position: fixed; top: 0; right: 0; max-width: 100%; height: 100vh; background: #ffffff; box-shadow: -10px 0 40px rgba(0,0,0,0.1); transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; z-index: 1005; width: 380px; }
        .sidebar.open { transform: translateX(0); }
        .sidebar-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #fafafa; }
        .sidebar-title { font-size: 14px; font-weight: 900; }
        .btn-icon { background: #f4f4f5; border: 1px solid var(--border); cursor: pointer; color: var(--text-primary); display: flex; justify-content: center; align-items: center; width: 36px; height: 36px; border-radius: 6px; transition: 0.2s; flex-shrink: 0; }
        .btn-icon:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .sidebar-body { padding: 20px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 20px; }

        @media (max-width: 768px) {
            .main-content { grid-template-columns: 1fr; }
            header { padding: 10px 15px; }
        }
    </style>
</head>
<body>

    <script>
        const STORAGE_KEY = 'sucedoan_pim_v37'; 
        const CONFIG_KEY = 'sucedoan_config';
        const CATEGORIAS_KEY = 'sucedoan_categorias'; 
        const MARCAS_KEY = 'sucedoan_marcas';
        const TAGS_KEY = 'sucedoan_tags_globais'; 
        const QUEUE_KEY = 'sucedoan_fila_sincronizacao';
        const FIREBASE_DATABASE_URL = 'https://cedar-chemist-310801-default-rtdb.firebaseio.com'; 
        
        let products = [];
        let tagsDoSistema = [];
        let categoriasDoSistema = [];
        let marcasDoSistema = [];
        
        localforage.config({ name: 'SucedoanPIM', storeName: 'produtos_db' });
    </script>

    <div id="alerta-customizado">Mensagem</div>

    <header>
        <div class="brand"><i data-lucide="clipboard-list" size="20"></i> GESTOR DE PEDIDOS</div>
        <div id="queue-status"></div>
        <button class="nav-btn" onclick="openConfig()"><i data-lucide="settings" size="14"></i> CREDENCIAIS</button>
    </header>

    <div class="main-content">
        <div class="panel">
            <h3 class="panel-title"><i data-lucide="plus-circle" size="18"></i> Lançar Novo Pedido</h3>
            
            <div style="background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 5px;">
                <h4 style="margin: 0 0 12px 0; font-size: 11px; color: var(--text-secondary); text-transform: uppercase;"><i data-lucide="user" size="12"></i> Dados do Cliente (Aparecerá no Entregador)</h4>
                
                <div class="client-grid">
                    <div class="form-group">
                        <label class="form-label">Código</label>
                        <input type="text" id="cli-codigo" class="form-input" placeholder="Ex: 1234">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nome</label>
                        <input type="text" id="cli-nome" class="form-input" placeholder="Ex: João da Silva">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Telefone (Whatsapp)</label>
                        <input type="text" id="cli-telefone" class="form-input" placeholder="65999999999">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Cidade</label>
                        <select id="cli-cidade" class="form-input">
                            <option value="">Selecione...</option>
                            <option value="Cuiabá">Cuiabá</option>
                            <option value="Várzea Grande">Várzea Grande</option>
                        </select>
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label class="form-label">Rota</label>
                        <select id="cli-rota" class="form-input">
                            <option value="">Selecione...</option>
                            <option value="Coxipó">Coxipó</option>
                            <option value="VG">VG</option>
                            <option value="Cuiabá">Cuiabá</option>
                            <option value="CPA">CPA</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" style="margin-top: 5px;">Cole o texto do pedido (Produtos):</label>
                <textarea id="order-text-input" class="form-input" style="height: 200px; font-family: monospace; font-size: 12px;" placeholder="PEDIDO #123456&#10;1 x Arroz 5kg&#10;2 x Feijão 1kg"></textarea>
            </div>
            
            <button class="nav-btn success-btn" style="height: 48px; font-size: 13px; margin-top: 5px;" onclick="processarBaixaPedidoTexto()">
                <i data-lucide="check-circle" size="16"></i> PROCESSAR E ABATER ESTOQUE
            </button>
        </div>

        <div class="panel">
            <h3 class="panel-title"><i data-lucide="history" size="18"></i> Lista de Separação (Nuvem)</h3>
            <button class="nav-btn primary" onclick="carregarHistoricoPedidos()">
                <i data-lucide="refresh-cw" size="14"></i> ATUALIZAR HISTÓRICO
            </button>
            <div id="historico-container" style="margin-top: 10px; flex-grow: 1; overflow-y: auto;">
                <p style="text-align:center; font-size:12px; color:var(--text-secondary);">Clique em atualizar para carregar os pedidos.</p>
            </div>
        </div>
    </div>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeConfig()"></div>
    <div class="sidebar" id="config-sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">Credenciais do GitHub</div>
            <button class="btn-icon" onclick="closeConfig()"><i data-lucide="x" size="16"></i></button>
        </div>
        <div class="sidebar-body">
            <p style="font-size: 11px; color: var(--text-secondary);">As credenciais são partilhadas com o PIM localmente.</p>
            <div class="form-group"><label class="form-label">Token de Acesso Pessoal</label><input type="password" id="cfg-token" class="form-input"></div>
            <div class="form-group"><label class="form-label">Nome de Utilizador</label><input type="text" id="cfg-user" class="form-input"></div>
            <div class="form-group"><label class="form-label">Repositório</label><input type="text" id="cfg-repo" class="form-input"></div>
            <button class="nav-btn primary" style="height:44px; margin-top:15px;" onclick="saveConfig()">GUARDAR CREDENCIAIS</button>
        </div>
    </div>

    <script>
        // ==========================================================
        // UTILITÁRIOS E GITHUB API
        // ==========================================================
        function limparTexto(texto) {
            if (!texto) return "";
            return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^\w\s]/gi, '').replace(/\s+/g, ' ').trim().toUpperCase();
        }

        function mostrarAlerta(msg, tipo = 'sucesso') { 
            let a = document.getElementById('alerta-customizado'); a.innerText = msg; a.className = ''; 
            if(tipo === 'erro') a.classList.add('alerta-erro'); else if(tipo === 'aviso') a.classList.add('alerta-aviso'); else a.classList.add('alerta-sucesso'); 
            a.style.display = 'block'; setTimeout(() => a.style.display = 'none', 4000); 
        }

        const GitHubAPI = {
            getConfig: async function() {
                const cfg = await localforage.getItem(CONFIG_KEY);
                if (!cfg || !cfg.token || !cfg.user || !cfg.repo) {
                    mostrarAlerta("Atenção: Configure as credenciais na aba 'Credenciais' primeiro!", "erro");
                    return null;
                }
                return cfg;
            },
            getHeaders: function(cfg) {
                return { "Authorization": `Bearer ${cfg.token}`, "X-GitHub-Api-Version": "2022-11-28", "Content-Type": "application/json" };
            },
            encodeUTF8toBase64: function(str) {
                const bytes = new TextEncoder().encode(str); let binString = ''; const chunkSize = 8192;
                for (let i = 0; i < bytes.length; i += chunkSize) binString += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
                return btoa(binString);
            },
            decodeBase64toUTF8: function(base64) {
                const cleanBase64 = base64.replace(/\s/g, ''); const binString = atob(cleanBase64); const bytes = new Uint8Array(binString.length);
                for (let i = 0; i < binString.length; i++) bytes[i] = binString.charCodeAt(i);
                return new TextDecoder('utf-8').decode(bytes); 
            },
            getFileData: async function(path) {
                const cfg = await this.getConfig(); if (!cfg) throw new Error("Credenciais ausentes");
                const res = await fetch(`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${path}`, { headers: this.getHeaders(cfg), cache: "no-store" });
                if (res.status === 404) return null; if (!res.ok) throw new Error(`Falha ao ler ${path}`);
                return await res.json();
            },
            saveFile: async function(path, content, message) {
                const cfg = await this.getConfig(); if (!cfg) throw new Error("Credenciais ausentes");
                let sha = null;
                try { const existingFile = await this.getFileData(path); if (existingFile) sha = existingFile.sha; } catch(e) {}
                const contentStr = typeof content === 'string' ? content : JSON.stringify(content, null, 2);
                const finalBase64 = this.encodeUTF8toBase64(contentStr); 
                const body = { message: message, content: finalBase64 }; if (sha) body.sha = sha;
                const res = await fetch(`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${path}`, { method: 'PUT', headers: this.getHeaders(cfg), body: JSON.stringify(body) });
                if (!res.ok) { const errorData = await res.json(); throw new Error(`Erro do GitHub: ${errorData.message}`); }
                return await res.json();
            }
        };

        // ==========================================================
        // SISTEMA DE FILA PERSISTENTE (Para continuar se a aba fechar)
        // ==========================================================
        let syncQueue = [];
        let isSyncing = false;
        let countdownTimer = 0;
        let countdownInterval = null;

        function renderQueueStatus() {
            const el = document.getElementById('queue-status');
            if (isSyncing && countdownTimer > 0) {
                el.style.display = 'flex'; el.innerHTML = `<i data-lucide="loader" size="14"></i> <span>Espera <b>${countdownTimer}s</b></span>`; lucide.createIcons();
            } else if (isSyncing && countdownTimer === 0) {
                el.style.display = 'flex'; el.innerHTML = `<i data-lucide="loader" class="spin-icon" size="14"></i> <span>Enviando...</span>`; lucide.createIcons();
            } else if (syncQueue.length > 0) {
                el.style.display = 'flex'; el.innerHTML = `<i data-lucide="list" size="14"></i> <span>Fila: ${syncQueue.length}</span>`; lucide.createIcons();
            } else { el.style.display = 'none'; }
        }

        async function saveQueueLocally() {
            await localforage.setItem(QUEUE_KEY, syncQueue);
        }

        async function enqueueDataTask(taskName, taskType, payload) {
            syncQueue.push({ id: Date.now(), name: taskName, type: taskType, payload: payload });
            await saveQueueLocally();
            
            if (!isSyncing) {
                executeNextInQueue();
            } else {
                renderQueueStatus();
            }
        }

        function startQueueCountdown(duration) {
            if (countdownInterval) clearInterval(countdownInterval);
            countdownTimer = duration; 
            isSyncing = true; 
            renderQueueStatus();
            countdownInterval = setInterval(() => {
                countdownTimer--; renderQueueStatus();
                if (countdownTimer <= 0) { 
                    clearInterval(countdownInterval); 
                    executeNextInQueue(); 
                }
            }, 1000);
        }

        async function executeNextInQueue() {
            if (syncQueue.length === 0) { isSyncing = false; renderQueueStatus(); return; }
            
            isSyncing = true; 
            countdownTimer = 0; 
            renderQueueStatus();
            
            const task = syncQueue[0]; 
            
            try {
                if (task.type === 'BLING_CSV') {
                    await GitHubAPI.saveFile(`site/exportacoes/${task.payload.filename}`, task.payload.content, task.payload.message);
                } 
                else if (task.type === 'SEPARACAO_JSON') {
                    let pedidosSeparacao = [];
                    try {
                        const fileData = await GitHubAPI.getFileData('site/pedidoseparar.json');
                        if (fileData && fileData.content) pedidosSeparacao = JSON.parse(GitHubAPI.decodeBase64toUTF8(fileData.content));
                    } catch (e) {} 
                    pedidosSeparacao.push(task.payload.novoPedido);
                    await GitHubAPI.saveFile('site/pedidoseparar.json', pedidosSeparacao, task.payload.message);
                }

                mostrarAlerta(`✅ ${task.name} processado!`, 'sucesso');
                syncQueue.shift(); 
                await saveQueueLocally(); 

                if (syncQueue.length > 0) {
                    startQueueCountdown(60);
                } else {
                    isSyncing = false;
                    renderQueueStatus();
                }

            } catch (e) {
                console.error(e);
                mostrarAlerta(`❌ Erro em ${task.name}. Tentando novamente...`, 'erro');
                startQueueCountdown(60); 
            }
        }

        // ==========================================================
        // INICIALIZAÇÃO E RETOMA DA FILA
        // ==========================================================
        window.onload = async function() { 
            lucide.createIcons(); 
            try { const saved = await localforage.getItem(STORAGE_KEY); if(saved && Array.isArray(saved)) products = saved; } catch (err) {}
            try { const c = await localforage.getItem(CATEGORIAS_KEY); if(c) categoriasDoSistema = c; } catch (err) {}
            try { const m = await localforage.getItem(MARCAS_KEY); if(m) marcasDoSistema = m; } catch (err) {}
            try { const t = await localforage.getItem(TAGS_KEY); if(t) tagsDoSistema = t; } catch (err) {}
            
            const cfg = await localforage.getItem(CONFIG_KEY) || {}; 
            if(cfg.token) { 
                document.getElementById('cfg-token').value = cfg.token; 
                document.getElementById('cfg-user').value = cfg.user; 
                document.getElementById('cfg-repo').value = cfg.repo; 
            }

            try { 
                const savedQueue = await localforage.getItem(QUEUE_KEY); 
                if(savedQueue && Array.isArray(savedQueue) && savedQueue.length > 0) {
                    syncQueue = savedQueue;
                    mostrarAlerta(`Retomando envio de ${syncQueue.length} itens pendentes.`, 'aviso');
                    executeNextInQueue(); 
                }
            } catch (err) {}

            carregarHistoricoPedidos();
        };

        function openConfig() { document.getElementById('sidebar-overlay').style.display = 'block'; setTimeout(() => { document.getElementById('sidebar-overlay').style.opacity = '1'; document.getElementById('config-sidebar').classList.add('open'); }, 10); }
        function closeConfig() { document.getElementById('config-sidebar').classList.remove('open'); setTimeout(() => { document.getElementById('sidebar-overlay').style.opacity = '0'; setTimeout(() => { document.getElementById('sidebar-overlay').style.display = 'none'; }, 300); }, 50); }
        
        async function saveConfig() { 
            const cfg = { token: document.getElementById('cfg-token').value, user: document.getElementById('cfg-user').value, repo: document.getElementById('cfg-repo').value }; 
            await localforage.setItem(CONFIG_KEY, cfg); 
            mostrarAlerta("Credenciais guardadas com segurança!", "sucesso"); closeConfig(); 
        }

        // ==========================================================
        // PROCESSAMENTO DO PEDIDO E EXPORTAÇÃO
        // ==========================================================
        function sanitizeProductsForExport(prods) {
            const camposPermitidos = ['id', 'codigo', 'nome', 'gtin', 'preco', 'preco_custo', 'estoque', 'situacao', 'ncm', 'validade', 'categoria', 'subcategoria', 'subsubcategoria', 'marca', 'embalagem', 'tag_global', 'link_youtube', 'last_update', 'url_imagem', 'gondola', 'prateleira', 'localizacao', 'descricao'];
            return prods.map(p => {
                let cleanP = {};
                camposPermitidos.forEach(campo => {
                    if (p[campo] !== undefined && p[campo] !== null) {
                        cleanP[campo] = p[campo];
                        if (campo === 'url_imagem' && typeof p[campo] === 'string' && p[campo].startsWith('data:image')) cleanP[campo] = "";
                        else if (campo === 'url_imagem' && typeof p[campo] === 'string') cleanP[campo] = p[campo].split('?')[0]; 
                    }
                });
                return cleanP;
            });
        }
        async function localizarFirebaseKey(produto) {
            const savedKey = String(produto.firebaseKey || produto.key || '').trim();
            if (savedKey) return savedKey;
            const codigo = String(produto.codigo || produto.id || '').trim();
            if (!codigo) throw new Error('Produto sem firebaseKey ou código para atualizar o estoque.');
            const query = new URL(FIREBASE_DATABASE_URL + '/produtos.json');
            query.searchParams.set('orderBy', JSON.stringify('codigo'));
            query.searchParams.set('equalTo', JSON.stringify(codigo));
            query.searchParams.set('limitToFirst', '1');
            const response = await fetch(query, { cache: 'no-store', headers: { Accept: 'application/json' } });
            if (!response.ok) throw new Error('Firebase recusou a busca do produto ' + codigo + ': HTTP ' + response.status);
            const data = await response.json();
            const key = Object.keys(data || {})[0];
            if (!key) throw new Error('Produto não localizado no Firebase: ' + codigo);
            produto.firebaseKey = key;
            return key;
        }

        async function salvarProdutosFirebase(produtosAlterados) {
            for (const produto of produtosAlterados) {
                const key = await localizarFirebaseKey(produto);
                const payload = {
                    estoque: Math.max(0, Number(produto.estoque || 0)),
                    last_update: Number(produto.last_update || Date.now()),
                    updated_at: new Date().toISOString()
                };
                const response = await fetch(FIREBASE_DATABASE_URL + '/produtos/' + encodeURIComponent(key) + '.json', {
                    method: 'PATCH',
                    cache: 'no-store',
                    headers: { Accept: 'application/json', 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error('Firebase recusou o estoque de ' + (produto.nome || key) + ': HTTP ' + response.status);
            }
        }

        async function processarBaixaPedidoTexto() {
            const texto = document.getElementById('order-text-input').value;
            if(!texto) return mostrarAlerta("Por favor, cole o texto do pedido primeiro.", "aviso");

            // Captura dos dados do Cliente
            const codCli = document.getElementById('cli-codigo').value.trim();
            const nomeCli = document.getElementById('cli-nome').value.trim() || 'Cliente Não Informado';
            const telCli = document.getElementById('cli-telefone').value.trim();
            const cidCli = document.getElementById('cli-cidade').value;
            const rotaCli = document.getElementById('cli-rota').value;

            const matchPedido = texto.match(/PEDIDO\s*#?(\d+)/i);
            const numeroPedido = matchPedido ? matchPedido[1] : Date.now().toString().slice(-6);
            
            const hoje = new Date();
            const dataAtual = String(hoje.getDate()).padStart(2, '0') + '/' + String(hoje.getMonth() + 1).padStart(2, '0') + '/' + hoje.getFullYear();

            const linhas = texto.split('\n'); 
            let encontrados = 0; 
            let falhas = []; 
            let itensPedidoBling = [];
            let totalPedidoCalc = 0;
            let itensParaSeparacao = [];
            const produtosAlterados = [];

            linhas.forEach(linha => {
                const linhaLimpa = linha.trim();
                const match = linhaLimpa.match(/^(\d+)\s*x?\s+(.*)$/i);

                if(match) {
                    const qtd = parseInt(match[1]);
                    const nomeProcuradoNormalizado = limparTexto(match[2]);

                    const p = products.find(prod => limparTexto(prod.nome) === nomeProcuradoNormalizado);

                    if(p) {
                        p.estoque = Math.max(0, (p.estoque || 0) - qtd); 
                        p.last_update = Date.now();
                        if (!produtosAlterados.includes(p)) produtosAlterados.push(p); 
                        encontrados++; 
                        
                        const valorUn = parseFloat(p.preco) || 0;
                        const valorTotalItem = valorUn * qtd;
                        totalPedidoCalc += valorTotalItem; 

                        itensPedidoBling.push({
                            "Número pedido": numeroPedido,
                            "Nome Comprador": nomeCli, // Substituido para ir nome do cliente pro Bling
                            "Data": dataAtual,
                            "Produto": p.nome,
                            "SKU": p.codigo,
                            "Un": "UN",
                            "Quantidade": qtd,
                            "Valor Unitário": valorUn.toFixed(2).replace('.', ','),
                            "Valor Total": valorTotalItem.toFixed(2).replace('.', ','),
                            "Total Pedido": "", 
                            "Valor Frete Pedido": "0,00",
                            "Valor Desconto Pedido": "0,00",
                            "Outras despesas": "0,00",
                            "Tipo Frete": "R",
                            "Observações": "Pedido importado via Sucedoan PIM (Gestor)",
                            "Qtd Parcela": "1",
                            "Data Prevista": dataAtual
                        });

                        itensParaSeparacao.push({
                            id_produto: p.codigo,
                            nome: p.nome,
                            quantidade: qtd,
                            url_imagem: p.url_imagem || "",
                            gtin: p.gtin || "", 
                            gondola: p.gondola || "Z-Sem Gôndola",
                            prateleira: p.prateleira || "-",
                            status: "pendente" 
                        });
                    } else {
                        falhas.push({ nome: match[2].trim(), quantidade: qtd }); 
                    }
                }
            });

            if(encontrados > 0) {
                // 1. Salvar no banco local
                await localforage.setItem(STORAGE_KEY, products);

                // 2. CSV do Bling
                const totalPedidoFormatado = totalPedidoCalc.toFixed(2).replace('.', ',');
                itensPedidoBling.forEach(item => item["Total Pedido"] = totalPedidoFormatado);
                const filenameBling = `Bling_Pedido_Venda_${numeroPedido}.csv`;
                const csv = Papa.unparse(itensPedidoBling, { delimiter: ";" });
                const csvComBom = "\ufeff" + csv;
                
                enqueueDataTask(`Bling CSV #${numeroPedido}`, "BLING_CSV", {
                    filename: filenameBling,
                    content: csvComBom,
                    message: `Exportação Pedido: ${filenameBling}`
                });

                // 3. Adicionar na lista de separação incluindo DADOS DO CLIENTE
                const novoPedido = {
                    id: numeroPedido,
                    data: new Date().toISOString(),
                    status: "pendente",
                    cliente_codigo: codCli,
                    cliente_nome: nomeCli,
                    cliente_telefone: telCli,
                    cliente_cidade: cidCli,
                    cliente_rota: rotaCli,
                    itens: itensParaSeparacao,
                    itensNaoEncontrados: falhas
                };

                enqueueDataTask(`Lista de Separação #${numeroPedido}`, "SEPARACAO_JSON", {
                    novoPedido: novoPedido,
                    message: `Adicionado Pedido #${numeroPedido} para separação`
                });

                // 4. Salvar estoque diretamente na fonte oficial
                await salvarProdutosFirebase(produtosAlterados); 

                let msg = `✅ Sucesso! ${encontrados} produtos abatidos.\nEstoque salvo no Firebase; enviando somente os arquivos auxiliares em segundo plano.`;
                if(falhas.length > 0) msg += `\n\n⚠️ ${falhas.length} iten(s) não encontrado(s).`;
                mostrarAlerta(msg, falhas.length > 0 ? "aviso" : "sucesso");

                // Limpar campos
                document.getElementById('order-text-input').value = "";
                document.getElementById('cli-codigo').value = "";
                document.getElementById('cli-nome').value = "";
                document.getElementById('cli-telefone').value = "";
                document.getElementById('cli-cidade').value = "";
                document.getElementById('cli-rota').value = "";

                setTimeout(carregarHistoricoPedidos, 2000);
            } else {
                mostrarAlerta("❌ Nenhum produto reconhecido no texto.", "erro");
            }
        }

        // ==========================================================
        // EXIBIÇÃO DO HISTÓRICO DE PEDIDOS E CARDS DE FALHAS
        // ==========================================================
        window.forcarDownloadGithub = async function(nomeArquivo) {
            try {
                mostrarAlerta("A preparar o download do Bling...", "aviso");
                const cfg = await GitHubAPI.getConfig(); if(!cfg) return;
                const url = `https://raw.githubusercontent.com/${cfg.user}/${cfg.repo}/main/site/exportacoes/${nomeArquivo}`;
                const resposta = await fetch(url, { headers: { "Authorization": `token ${cfg.token}` } });
                if (!resposta.ok) throw new Error("Arquivo não encontrado ou erro na rede");
                const blob = await resposta.blob();
                const blobUrl = URL.createObjectURL(blob);
                const link = document.createElement("a"); link.href = blobUrl; link.download = nomeArquivo;
                document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(blobUrl);
                mostrarAlerta("Download concluído!", "sucesso");
            } catch (erro) {
                mostrarAlerta("O ficheiro CSV ainda não foi gerado ou ocorreu um erro.", "erro");
            }
        };

        async function carregarHistoricoPedidos() {
            const container = document.getElementById('historico-container');
            container.innerHTML = '<div style="text-align:center; padding:30px;"><i data-lucide="loader" class="spin-icon" size="24"></i><br><br>Buscando histórico na nuvem...</div>';
            lucide.createIcons();
            
            try {
                const fileData = await GitHubAPI.getFileData('site/pedidoseparar.json');
                if (!fileData || !fileData.content) {
                    container.innerHTML = '<p style="text-align:center; font-size:12px; color:var(--text-secondary); padding:20px;">Nenhum pedido encontrado no servidor.</p>';
                    return;
                }
                
                const decodedStr = GitHubAPI.decodeBase64toUTF8(fileData.content);
                const pedidos = JSON.parse(decodedStr);
                
                const pedidosAgrupados = {};
                pedidos.forEach(p => {
                    const dataObj = new Date(p.data);
                    const dataFormatada = dataObj.toLocaleDateString('pt-BR');
                    if(!pedidosAgrupados[dataFormatada]) pedidosAgrupados[dataFormatada] = [];
                    pedidosAgrupados[dataFormatada].push(p);
                });
                
                container.innerHTML = "";
                const datasOrdenadas = Object.keys(pedidosAgrupados).sort((a, b) => b.split('/').reverse().join('') - a.split('/').reverse().join(''));
                
                datasOrdenadas.forEach(data => {
                    let htmlData = `<div class="order-day-group">
                        <div class="order-day-title"><span><i data-lucide="calendar" size="12" style="margin-right:4px; vertical-align:middle;"></i> ${data}</span><span>${pedidosAgrupados[data].length} Pedido(s)</span></div>`;
                    
                    const pedidosDia = pedidosAgrupados[data].sort((a, b) => new Date(b.data) - new Date(a.data));
                    
                    pedidosDia.forEach(pedido => {
                        const qtdItens = pedido.itens ? pedido.itens.reduce((acc, item) => acc + item.quantidade, 0) : 0;
                        const statusClass = pedido.status === 'pendente' ? 'status-pendente' : 'status-concluido';
                        const statusText = pedido.status === 'pendente' ? 'EM SEPARAÇÃO' : 'CONCLUÍDO';
                        
                        let htmlFalhas = "";
                        if (pedido.itensNaoEncontrados && pedido.itensNaoEncontrados.length > 0) {
                            htmlFalhas += `<div class="falhas-container">`;
                            htmlFalhas += `<div class="falhas-titulo"><i data-lucide="alert-triangle" size="12"></i> PRODUTOS NÃO ENCONTRADOS</div>`;
                            pedido.itensNaoEncontrados.forEach(f => {
                                htmlFalhas += `
                                    <div class="falha-card">
                                        <span class="falha-nome">${f.nome}</span>
                                        <span class="falha-qtd">${f.quantidade}x</span>
                                    </div>
                                `;
                            });
                            htmlFalhas += `</div>`;
                        }

                        htmlData += `
                            <div class="order-card">
                                <div class="order-header-row">
                                    <div class="order-info">
                                        <span class="order-id">PEDIDO #${pedido.id}</span>
                                        <span class="order-meta">${qtdItens} volumes encontrados | ${new Date(pedido.data).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})}</span>
                                        <span class="status-badge ${statusClass}">${statusText}</span>
                                    </div>
                                    <button class="nav-btn bling-btn" style="height:36px; padding:0 15px;" onclick="forcarDownloadGithub('Bling_Pedido_Venda_${pedido.id}.csv')" title="Baixar CSV para importar no Bling">
                                        <i data-lucide="download" size="14"></i> CSV BLING
                                    </button>
                                </div>
                                ${htmlFalhas}
                            </div>
                        `;
                    });
                    
                    htmlData += `</div>`;
                    container.innerHTML += htmlData;
                });
                lucide.createIcons();
            } catch (e) {
                container.innerHTML = '<p style="color:var(--danger); font-size:12px; text-align:center; padding:20px;">Erro ao carregar histórico.<br>Certifique-se que o arquivo "site/pedidoseparar.json" existe.</p>';
            }
        }
    </script>
