<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Separador PRO - Fullscreen</title>
    <style>
        :root { --primary: #4CAF50; --secondary: #2196F3; --danger: #f44336; --warning: #ff9800; --dark: #111; --light: #f4f4f4; }
        body, html { font-family: Arial, sans-serif; background-color: #fff; margin: 0; padding: 0; height: 100%; color: var(--dark); user-select: none; overflow: hidden; }
        
        button { border: none; border-radius: 10px; font-weight: bold; color: white; cursor: pointer; }
        .hidden { display: none !important; }
        
        /* ================= TELA DE FOCO FULLSCREEN ================= */
        .tela-foco { height: 100vh; display: flex; flex-direction: column; padding: 5px; box-sizing: border-box; }
        
        /* TOPO: FOTO E INFO LADO A LADO */
        .foco-topo { display: flex; gap: 8px; height: 28vh; flex-shrink: 0; }
        
        .foco-img-container { flex: 1.2; border: 2px solid #eee; border-radius: 10px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background: #fff; }
        .foco-img-container img { max-width: 95%; max-height: 95%; object-fit: contain; }
        
        .foco-info-box { flex: 1; background: var(--dark); color: white; border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .foco-loc-label { font-size: 12px; color: #aaa; text-transform: uppercase; }
        .foco-loc-valor { color: var(--warning); font-size: 45px; font-weight: 900; line-height: 1; margin: 5px 0; }
        .foco-contagem { font-size: 14px; font-weight: bold; }
        .foco-contagem span { color: var(--secondary); font-size: 18px; }

        /* NOME E SKU */
        .foco-detalhes-prod { text-align: center; padding: 8px 0; flex-shrink: 0; }
        .foco-nome { font-size: 18px; font-weight: bold; margin: 0; color: #000; line-height: 1.2; }
        .foco-sku { font-size: 22px; font-weight: 900; color: var(--danger); margin: 2px 0; letter-spacing: 1px; }

        /* LINHA DE CHECKLIST (SKU + TICKS) */
        .linha-conferencia { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px; flex-shrink: 0; padding: 5px; background: #f0f7ff; border-radius: 8px; }
        .ticks-container { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
        .tick-box { width: 24px; height: 24px; border-radius: 4px; background: #ddd; border: 1px solid #bbb; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: transparent; }
        .tick-box.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* INTERAÇÃO / TECLADO */
        .area-interacao { flex: 1; display: flex; flex-direction: column; min-height: 0; justify-content: flex-end; }
        .display-teclado { text-align: center; font-size: 36px; font-weight: 900; letter-spacing: 15px; color: var(--secondary); height: 45px; }
        .display-teclado.erro { color: var(--danger); animation: shake 0.3s; }
        
        .grid-teclado { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(4, 1fr); gap: 5px; flex: 1; padding: 5px 0; }
        .btn-num { background: #f4f4f4; border: 1px solid #ccc; color: #111; font-size: 30px; font-weight: 900; border-radius: 8px; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 0 #bbb; }
        .btn-num:active { background: #ddd; transform: translateY(3px); box-shadow: none; }
        
        /* BOTÃO PEGUEI MAIS 1 */
        .btn-add-grande { width: 100%; height: 100%; font-size: 30px; font-weight: 900; border-radius: 15px; box-shadow: 0 8px 0 #1976D2; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-add-grande span { font-size: 14px; font-weight: normal; margin-top: 5px; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }

        /* MODAL FOTO FULL */
        #modal-foto-full { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; display:flex; flex-direction:column; }
    </style>
</head>
<body>

<div id="alerta-customizado"></div>

<div id="modal-foto-full" class="hidden" onclick="fecharFoto()">
    <div style="flex:1; display:flex; align-items:center; justify-content:center;">
        <img id="img-full" style="max-width:100%; max-height:100%;">
    </div>
    <button style="padding:20px; background:var(--danger); font-size:20px;">FECHAR FOTO</button>
</div>

<div id="app-ui">
    <div class="container" id="tela-inicial" style="text-align:center; padding-top:50px;">
        <h1>🛒 SEPARADOR</h1>
        <button class="btn-primary" style="padding:30px; font-size:24px; width:90%;" onclick="carregarPedidosFila()">ABRIR PEDIDOS</button>
    </div>

    <div class="container hidden" id="tela-lista-pedidos" style="padding:15px;">
        <button onclick="abrirTela('tela-inicial')" style="background:var(--danger); padding:10px; width:100%;">VOLTAR</button>
        <div id="area-lista-pedidos" style="margin-top:20px;"></div>
    </div>

    <div class="tela-foco hidden" id="tela-separacao-foco">
        
        <div class="foco-topo">
            <div class="foco-img-container" onclick="abrirFoto()">
                <img id="foco-img" src="">
            </div>
            <div class="foco-info-box">
                <span class="foco-loc-label">Gôndola</span>
                <span class="foco-loc-valor" id="foco-loc">A1</span>
                <div class="foco-contagem">Faltam: <span id="span-faltam">0</span>/<span id="span-total">0</span></div>
            </div>
        </div>

        <div class="foco-detalhes-prod">
            <p class="foco-nome" id="foco-nome">Carregando...</p>
            <p class="foco-sku" id="foco-sku">SKU: 000000</p>
        </div>

        <div class="linha-conferencia">
            <div class="ticks-container" id="foco-ticks"></div>
        </div>

        <div id="bloco-desempate" class="area-desempate hidden" style="display:flex; gap:5px; background:#fff3e0; padding:5px; overflow-x:auto;"></div>

        <div class="area-interacao">
            <div id="bloco-teclado-foco" style="display:flex; flex-direction:column; height:100%;">
                <div id="display-foco" class="display-teclado"></div>
                <div class="grid-teclado">
                    <div class="btn-num" onclick="addFoco(1)">1</div><div class="btn-num" onclick="addFoco(2)">2</div><div class="btn-num" onclick="addFoco(3)">3</div>
                    <div class="btn-num" onclick="addFoco(4)">4</div><div class="btn-num" onclick="addFoco(5)">5</div><div class="btn-num" onclick="addFoco(6)">6</div>
                    <div class="btn-num" onclick="addFoco(7)">7</div><div class="btn-num" onclick="addFoco(8)">8</div><div class="btn-num" onclick="addFoco(9)">9</div>
                    <button style="background:var(--danger); font-size:14px;" onclick="cancelarPicking()">SAIR</button>
                    <div class="btn-num" onclick="addFoco(0)">0</div>
                    <div></div>
                </div>
            </div>

            <div id="bloco-add-foco" class="hidden" style="height:100%; padding:10px; box-sizing:border-box;">
                <button class="btn-secondary btn-add-grande" onclick="registrarUnidadeFoco()">
                    PEGUEI MAIS 1
                    <span id="txt-unidade-progresso">Clique para confirmar unidade</span>
                </button>
            </div>

            <div id="bloco-confirmacao-item" class="hidden" style="height:100%; background:#fff3e0; padding:15px; border-radius:15px; text-align:center;">
                <h2 style="margin:0;">CONFERIR?</h2>
                <p style="font-size:20px; font-weight:bold;">Separou <span id="conf-qtd" style="font-size:40px; color:var(--primary);">0</span> unidades?</p>
                <button class="btn-primary" style="width:100%; padding:20px; font-size:22px;" onclick="confirmarFimItem()">SIM, TUDO OK</button>
            </div>
        </div>
    </div>

    <div class="container hidden" id="tela-conclusao" style="text-align:center; padding:20px;">
        <h2 style="color:var(--primary);">PEDIDO FINALIZADO!</h2>
        <div id="area-checklist" style="text-align:left; border:1px solid #ccc; padding:10px; margin:15px 0; background:#f9f9f9;"></div>
        <button class="btn-print" style="width:100%; padding:20px;" onclick="window.print()">IMPRIMIR ETIQUETA</button>
        <button class="btn-secondary" style="width:100%; padding:15px; margin-top:10px;" onclick="abrirTela('tela-inicial')">MENU INICIAL</button>
    </div>
</div>

<script>
    let bancoDeDados = []; let pedidoAtual = null; let listaDeSeparacao = []; let indexAtualPicking = 0;
    let focoDisplayStr = ""; let focoModo = "EAN"; let focoLimite = 4; let audioCtx = null;

    async function carregarPedidosFila() {
        abrirTela('tela-lista-pedidos');
        const resposta = await fetch('../site/pedidos_fila.json');
        const pedidos = await resposta.json();
        let html = "";
        pedidos.filter(p => p.status === 'PENDENTE').forEach(p => {
            html += `<div class="resultado-item" onclick='iniciarSeparacaoPedido(${JSON.stringify(p)})'>
                PEDIDO: ${p.orderNum} <br> <small>${p.items.length} Itens</small>
            </div>`;
        });
        document.getElementById('area-lista-pedidos').innerHTML = html || "Sem pedidos.";
    }

    function iniciarSeparacaoPedido(pedido) {
        pedidoAtual = pedido;
        listaDeSeparacao = pedido.items.filter(i => i.foundProduct).map(i => ({
            quantidadeTotal: i.qtd, unidadesLidas: 0, nomePedido: i.nomeOriginal,
            produtoDb: i.foundProduct, localizacao: i.foundProduct.localizacao || "SEM LOC"
        }));
        listaDeSeparacao.sort((a,b) => a.localizacao.localeCompare(b.localizacao));
        indexAtualPicking = 0;
        document.documentElement.requestFullscreen().catch(() => {});
        abrirTela('tela-separacao-foco');
        renderizarItemFoco();
    }

    function renderizarItemFoco() {
        if (indexAtualPicking >= listaDeSeparacao.length) { abrirTela('tela-conclusao'); return; }
        let item = listaDeSeparacao[indexAtualPicking];
        let sku = item.produtoDb.codigo || item.produtoDb["Código"];
        
        document.getElementById('foco-loc').innerText = item.localizacao;
        document.getElementById('foco-img').src = `../site/img/produtos/${sku}.webp`;
        document.getElementById('foco-nome').innerText = item.nomePedido;
        document.getElementById('foco-sku').innerText = `SKU: ${sku}`;
        document.getElementById('span-faltam').innerText = item.quantidadeTotal - item.unidadesLidas;
        document.getElementById('span-total').innerText = item.quantidadeTotal;

        // Ticks
        let htmlTicks = "";
        for(let i=0; i<item.quantidadeTotal; i++) {
            htmlTicks += `<div class="tick-box ${i < item.unidadesLidas ? 'active' : ''}">${i < item.unidadesLidas ? '✓' : ''}</div>`;
        }
        document.getElementById('foco-ticks').innerHTML = htmlTicks;

        // Interface
        document.getElementById('bloco-teclado-foco').classList.add('hidden');
        document.getElementById('bloco-add-foco').classList.add('hidden');
        document.getElementById('bloco-confirmacao-item').classList.add('hidden');

        if (item.unidadesLidas === 0) {
            document.getElementById('bloco-teclado-foco').classList.remove('hidden');
            focoDisplayStr = ""; atualizarDisplayFoco();
        } else if (item.unidadesLidas < item.quantidadeTotal) {
            document.getElementById('bloco-add-foco').classList.remove('hidden');
        } else {
            document.getElementById('conf-qtd').innerText = item.quantidadeTotal;
            document.getElementById('bloco-confirmacao-item').classList.remove('hidden');
        }
    }

    function addFoco(num) {
        if (focoDisplayStr.length < 4) {
            focoDisplayStr += num;
            atualizarDisplayFoco();
            if (focoDisplayStr.length === 4) setTimeout(validarEAN, 200);
        }
    }

    function validarEAN() {
        let item = listaDeSeparacao[indexAtualPicking];
        let eanCorreto = String(item.produtoDb.gtin || item.produtoDb["GTIN/EAN"] || "").replace(/\D/g, "");
        if (eanCorreto.endsWith(focoDisplayStr)) {
            registrarUnidadeFoco();
        } else {
            document.getElementById('display-foco').classList.add('erro');
            setTimeout(() => { focoDisplayStr = ""; document.getElementById('display-foco').classList.remove('erro'); atualizarDisplayFoco(); }, 500);
        }
    }

    function registrarUnidadeFoco() {
        listaDeSeparacao[indexAtualPicking].unidadesLidas++;
        renderizarItemFoco();
    }

    function confirmarFimItem() { indexAtualPicking++; renderizarItemFoco(); }

    function atualizarDisplayFoco() { document.getElementById('display-foco').innerText = focoDisplayStr + "-".repeat(4 - focoDisplayStr.length); }
    function abrirTela(id) { 
        ['tela-inicial', 'tela-lista-pedidos', 'tela-separacao-foco', 'tela-conclusao'].forEach(t => document.getElementById(t).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    function abrirFoto() { document.getElementById('img-full').src = document.getElementById('foco-img').src; document.getElementById('modal-foto-full').classList.remove('hidden'); }
    function fecharFoto() { document.getElementById('modal-foto-full').classList.add('hidden'); }
    function cancelarPicking() { if(confirm("Sair?")) abrirTela('tela-inicial'); }
</script>
</body>
</html>
