<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Etiquetas</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        /* --- ESTILOS DO APLICATIVO (TELA DO CELULAR) --- */
        :root {
            --primary: #4CAF50;
            --secondary: #2196F3;
            --danger: #f44336;
            --dark: #333;
            --light: #f4f4f4;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px;
            color: var(--dark);
        }
        h1, h2 { text-align: center; }
        
        button {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            font-size: 18px; font-weight: bold; color: white;
            background-color: var(--primary); border: none; border-radius: 8px;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:active { transform: translateY(2px); }
        .btn-secondary { background-color: var(--secondary); }
        .btn-danger { background-color: var(--danger); }
        .btn-print { background-color: #000000; }
        
        .container {
            max-width: 600px; margin: auto; background: white;
            padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 16px; }
        .form-group input {
            width: 100%; padding: 15px; font-size: 18px;
            border: 2px solid #ccc; border-radius: 8px; box-sizing: border-box;
        }
        
        #lista-resultados { margin-bottom: 20px; }
        .resultado-item {
            padding: 15px; margin-bottom: 8px; background-color: #e3f2fd;
            border: 1px solid #90caf9; border-radius: 8px; font-size: 16px;
            font-weight: bold; color: #0d47a1; cursor: pointer;
        }
        .resultado-item:active { background-color: #bbdefb; }
        .resultado-dica { font-size: 13px; color: #555; font-weight: normal; margin-top: 4px; }
        
        .produto-foto {
            width: 100%; max-height: 250px; object-fit: contain;
            margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd;
        }
        
        #reader { width: 100%; margin-bottom: 20px; }
        .hidden { display: none !important; }
        
        #status-db {
            text-align: center; padding: 10px; margin-bottom: 15px;
            border-radius: 6px; font-weight: bold;
        }
        .status-ok { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-erro { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* --- ESTILOS EXCLUSIVOS PARA A IMPRESSORA TÉRMICA (58mm) --- */
        @media print {
            @page { margin: 0; size: 58mm auto; }
            body { margin: 0; padding: 0; background: white; }
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            
            #print-area {
                position: absolute; left: 0; top: 0;
                width: 48mm; /* Área útil de tinta da bobina */
                padding: 2mm 5mm; 
                margin: 0; border: none;
                text-align: center; font-family: 'Arial', sans-serif; color: #000;
            }
            
            /* O Código do Produto fica Gigante no topo */
            .destaque-codigo {
                font-size: 26px; /* Fonte bem grande */
                font-weight: 900; /* Extra negrito */
                margin: 0 0 5px 0;
                letter-spacing: 1px;
            }

            /* A Foto fica com contraste alto e em preto e branco para não borrar na térmica */
            #print-area img { 
                width: 45mm; /* Ocupa quase toda a largura */
                height: auto;
                max-height: 45mm;
                object-fit: contain;
                margin-bottom: 8px;
                filter: grayscale(100%) contrast(120%); 
            }
            
            /* Nome do Produto com bom destaque */
            #print-area h3 { 
                margin: 0 0 8px 0; 
                font-size: 16px; 
                text-transform: uppercase;
                line-height: 1.1;
            }
            
            /* Linhas com as informações (EAN, Validade, Local) bem legíveis */
            .info-linha { 
                font-size: 14px; 
                margin: 5px 0; 
                font-weight: bold; 
                border-bottom: 1px dashed #999; /* Linha para separar as infos */
                padding-bottom: 4px;
                text-align: left; /* Alinha à esquerda para facilitar a leitura */
            }
            .info-linha span { font-weight: normal; float: right; } /* Joga o valor para a direita */
        }
    </style>
</head>
<body>

<div class="container" id="app-container">
    <h1>🏷️ Gestão de Etiquetas</h1>

    <div id="status-db" class="status-erro">⏳ Carregando banco de dados...</div>
    
    <div id="area-upload" class="hidden">
        <p style="text-align:center; font-weight:bold; color:red;">Falha ao carregar automático. Selecione o bancodedados.json:</p>
        <input type="file" id="file-json" accept=".json" style="display:block; margin:auto; margin-bottom: 15px;">
    </div>
    
    <div id="area-busca" class="hidden">
        <div class="form-group">
            <label>🔍 Buscar Produto (Nome ou Código):</label>
            <input type="text" id="inp-busca" placeholder="Ex: Vinagre, 494079I..." oninput="buscarPorNome()">
        </div>
        
        <div id="lista-resultados"></div>

        <hr style="margin: 20px 0;">
        <h3 style="text-align: center;">OU</h3>
        
        <button id="btn-iniciar" onclick="iniciarLeitor()">📷 Ler Código com a Câmera</button>
    </div>
    
    <div id="reader" class="hidden"></div>
    <button id="btn-cancelar" class="hidden btn-danger" onclick="pararLeitor()">Cancelar Câmera</button>

    <div id="product-form" class="hidden">
        <button class="btn-danger" style="margin-bottom: 15px;" onclick="fecharCard()">❌ Fechar Produto</button>
        
        <h2>Editar Etiqueta</h2>
        <img id="img-foto" class="produto-foto" src="" alt="Foto do Produto" onerror="this.style.display='none'">
        
        <div class="form-group"><label>Código Interno</label><input type="text" id="inp-codigo"></div>
        
        <div class="form-group"><label>Nome do Produto</label><input type="text" id="inp-nome"></div>
        <div class="form-group"><label>Código EAN</label><input type="text" id="inp-ean"></div>
        <div class="form-group"><label>Endereço (Gôndola)</label><input type="text" id="inp-loc"></div>
        <div class="form-group"><label>Estoque</label><input type="text" id="inp-estoque"></div>
        <div class="form-group"><label>Data de Validade</label><input type="text" id="inp-validade"></div>
        <div class="form-group"><label>Preço de Custo (R$)</label><input type="text" id="inp-custo"></div>
        <div class="form-group"><label>Preço de Venda (R$)</label><input type="text" id="inp-venda"></div>
        
        <button class="btn-print" onclick="imprimirEtiqueta()">🖨️ Imprimir na Térmica (58mm)</button>
        <button onclick="salvarEtiquetaLocal()">💾 Guardar Dados Modificados</button>
    </div>

    <hr>
    <button class="btn-secondary" onclick="exportarCSV()">📄 Exportar Alterações (CSV)</button>
    <button class="btn-danger" onclick="limparSalvos()">🗑️ Limpar Lista de Alterações</button>
</div>

<div id="print-area" class="hidden">
    <div id="print-cod" class="destaque-codigo"></div>
    
    <img id="print-img" src="" alt="Foto">
    
    <h3 id="print-nome"></h3>
    
    <div class="info-linha"><strong>EAN:</strong> <span id="print-ean"></span></div>
    <div class="info-linha"><strong>VAL:</strong> <span id="print-validade"></span></div>
    <div class="info-linha"><strong>LOC:</strong> <span id="print-loc"></span></div>
</div>

<script>
    let bancoDeDados = [];
    let html5QrCode = null;

    // Etapa 1: Carregamento
    window.onload = async function() {
        try {
            const resposta = await fetch('../site/bancodedados.json');
            if(!resposta.ok) throw new Error("Arquivo não encontrado.");
            bancoDeDados = await resposta.json();
            liberarLeitor("✅ Banco de Dados Carregado (" + bancoDeDados.length + " produtos)");
        } catch (erro) {
            document.getElementById('status-db').innerText = "❌ Erro ao ler pasta /site/. Use o botão abaixo.";
            document.getElementById('area-upload').classList.remove('hidden');
        }
    };

    document.getElementById('file-json').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    bancoDeDados = JSON.parse(e.target.result);
                    liberarLeitor("✅ Banco de Dados Carregado Manualmente (" + bancoDeDados.length + " produtos)");
                    document.getElementById('area-upload').classList.add('hidden');
                } catch (error) {
                    alert("O arquivo selecionado não é um JSON válido.");
                }
            };
            reader.readAsText(file);
        }
    });

    function liberarLeitor(mensagem) {
        let status = document.getElementById('status-db');
        status.innerText = mensagem;
        status.className = 'status-ok';
        document.getElementById('area-busca').classList.remove('hidden');
    }

    // Busca
    function buscarPorNome() {
        let termo = document.getElementById('inp-busca').value.toLowerCase().trim();
        let lista = document.getElementById('lista-resultados');
        lista.innerHTML = ''; 
        
        if (termo.length < 3) return; 

        let encontrados = bancoDeDados.filter(p => {
            let nomeDb = String(p.nome || p["Descrição"] || "").toLowerCase();
            let codDb = String(p.codigo || p["Código"] || "").toLowerCase();
            let eanDb = String(p.gtin || p["GTIN/EAN"] || "").replace(/\D/g, "");
            return nomeDb.includes(termo) || codDb.includes(termo) || eanDb.includes(termo);
        });

        if (encontrados.length === 0) {
            lista.innerHTML = '<div style="text-align:center; color:red; padding:10px;">Nenhum produto encontrado.</div>';
            return;
        }

        encontrados.slice(0, 10).forEach(p => {
            let nome = p.nome || p["Descrição"] || "Sem Nome";
            let cod = p.codigo || p["Código"] || "";
            let preco = p.preco || p["Preço"] || "0,00";

            let div = document.createElement('div');
            div.className = 'resultado-item';
            div.innerHTML = `${nome} <div class="resultado-dica">Cód: ${cod} | R$ ${preco}</div>`;
            
            div.onclick = function() {
                preencherFormulario(p);
                lista.innerHTML = ''; 
                document.getElementById('inp-busca').value = ''; 
            };
            lista.appendChild(div);
        });
    }

    // Câmera
    function iniciarLeitor() {
        document.getElementById('reader').classList.remove('hidden');
        document.getElementById('btn-cancelar').classList.remove('hidden');
        document.getElementById('product-form').classList.add('hidden');
        document.getElementById('img-foto').style.display = 'block'; 

        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 100 } },
            (codigoLido) => {
                pararLeitor();
                buscarProdutoPorCamera(codigoLido);
            },
            (err) => {}
        ).catch(err => {
            alert("Erro: Câmera negada ou acesso sem HTTPS/Certificado.");
        });
    }

    function pararLeitor() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('reader').classList.add('hidden');
                document.getElementById('btn-cancelar').classList.add('hidden');
            }).catch(err => console.log(err));
        }
    }

    function buscarProdutoPorCamera(eanLido) {
        let eanLimpo = String(eanLido).replace(/\D/g, "").replace(/^0+/, "");
        let lidoExato = String(eanLido).trim().toUpperCase();

        const produtoEncontrado = bancoDeDados.find(p => {
            let eanDb = String(p.gtin || p["GTIN/EAN"] || "").replace(/\D/g, "").replace(/^0+/, "");
            let codigoDb = String(p.codigo || p["Código"] || "").trim().toUpperCase();
            return (eanDb === eanLimpo && eanLimpo !== "") || (codigoDb === lidoExato && lidoExato !== "");
        });

        if (produtoEncontrado) {
            preencherFormulario(produtoEncontrado);
        } else {
            alert("Produto não encontrado pela câmera! Código lido: " + eanLido);
        }
    }

    // Preencher dados no formulário visível
    function preencherFormulario(produto) {
        const codigo = produto.codigo || produto["Código"] || "";
        
        document.getElementById('inp-codigo').value = codigo; // Preenche o código interno
        document.getElementById('inp-nome').value = produto.nome || produto["Descrição"] || "";
        document.getElementById('inp-ean').value = String(produto.gtin || produto["GTIN/EAN"] || "").replace(/[^0-9]/g, "");
        document.getElementById('inp-loc').value = produto.localizacao || produto["Localização"] || "";
        document.getElementById('inp-estoque').value = produto.estoque || produto["Estoque"] || "";
        document.getElementById('inp-validade').value = produto.validade || produto["Data Validade"] || "";
        document.getElementById('inp-custo').value = produto.preco_custo || produto["Preço de custo"] || "";
        document.getElementById('inp-venda').value = produto.preco || produto["Preço"] || "";
        
        document.getElementById('img-foto').src = `../site/img/produtos/${codigo}.webp`;
        
        document.getElementById('area-busca').classList.add('hidden');
        document.getElementById('product-form').classList.remove('hidden');
    }

    function fecharCard() {
        document.getElementById('product-form').classList.add('hidden');
        document.getElementById('area-busca').classList.remove('hidden');
    }

    // Rotina de Impressão Térmica
    function imprimirEtiqueta() {
        // Envia os dados editados para o layout invisível de impressão
        document.getElementById('print-cod').innerText = document.getElementById('inp-codigo').value;
        document.getElementById('print-img').src = document.getElementById('img-foto').src;
        document.getElementById('print-nome').innerText = document.getElementById('inp-nome').value;
        document.getElementById('print-ean').innerText = document.getElementById('inp-ean').value;
        document.getElementById('print-loc').innerText = document.getElementById('inp-loc').value;
        document.getElementById('print-validade').innerText = document.getElementById('inp-validade').value;
        
        // Se a imagem estiver quebrada (não existir no site), esconde na hora de imprimir
        let foto = document.getElementById('print-img');
        if (foto.naturalWidth === 0 || foto.src === "" || foto.style.display === "none") {
            foto.style.display = 'none';
        } else {
            foto.style.display = 'block';
        }

        document.getElementById('print-area').classList.remove('hidden');
        window.print(); 
        document.getElementById('print-area').classList.add('hidden');
    }

    // Salvar e Exportar (mantidos intactos)
    function salvarEtiquetaLocal() {
        const etiqueta = {
            codigo: document.getElementById('inp-codigo').value,
            nome: document.getElementById('inp-nome').value,
            ean: document.getElementById('inp-ean').value,
            loc: document.getElementById('inp-loc').value,
            estoque: document.getElementById('inp-estoque').value,
            validade: document.getElementById('inp-validade').value,
            custo: document.getElementById('inp-custo').value,
            venda: document.getElementById('inp-venda').value
        };

        let salvas = JSON.parse(localStorage.getItem('etiquetas_csv') || '[]');
        salvas.push(etiqueta);
        localStorage.setItem('etiquetas_csv', JSON.stringify(salvas));
        alert("Etiqueta guardada na memória para exportação!");
        fecharCard(); 
    }

    function exportarCSV() {
        let salvas = JSON.parse(localStorage.getItem('etiquetas_csv') || '[]');
        if(salvas.length === 0) {
            alert("Não há dados guardados para exportar.");
            return;
        }
        let conteudoCSV = "Codigo;Nome;EAN;Localizacao;Estoque;Validade;Preco Custo;Preco Venda\n";
        salvas.forEach(e => {
            let linha = [e.codigo, String(e.nome).replace(/;/g, ","), e.ean, e.loc, e.estoque, e.validade, e.custo, e.venda].join(";");
            conteudoCSV += linha + "\n";
        });

        const blob = new Blob(["\uFEFF" + conteudoCSV], { type: 'text/csv;charset=utf-8;' }); 
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "etiquetas_editadas.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function limparSalvos() {
        if(confirm("Deseja apagar todas as etiquetas guardadas?")) {
            localStorage.removeItem('etiquetas_csv');
            alert("Dados limpos!");
        }
    }
</script>

</body>
</html>
