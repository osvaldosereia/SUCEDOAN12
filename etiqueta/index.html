<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Estoque Profissional (Modo ZXing)</title>
    
    <style>
        /* ==================== ESTILOS DO APLICATIVO ==================== */
        :root { 
            --primary: #4CAF50; 
            --secondary: #2196F3; 
            --danger: #f44336; 
            --warning: #ff9800; 
            --dark: #333; 
            --light: #f4f4f4; 
        }
        
        body, html { 
            font-family: Arial, sans-serif; 
            background-color: var(--light); 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            color: var(--dark); 
        }
        
        h1, h2, h3 { text-align: center; margin-top: 0; }
        
        button { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            font-size: 16px; font-weight: bold; color: white; 
            background-color: var(--primary); border: none; 
            border-radius: 8px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        
        .btn-secondary { background-color: var(--secondary); }
        .btn-danger { background-color: var(--danger); }
        .btn-warning { background-color: var(--warning); color: #000; }
        .btn-print { background-color: #000; }
        
        .container { 
            max-width: 600px; margin: 20px auto; background: white; 
            padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #555; }
        .form-group input, .form-group textarea, .form-group select { 
            width: 100%; padding: 15px; font-size: 16px; border: 2px solid #ccc; 
            border-radius: 8px; box-sizing: border-box; background-color: #fff; 
        }
        
        .resultado-item { 
            padding: 15px; margin-bottom: 8px; background-color: #e3f2fd; 
            border: 1px solid #90caf9; border-radius: 8px; font-size: 16px; 
            font-weight: bold; color: #0d47a1; cursor: pointer; 
        }
        .resultado-dica { font-size: 13px; color: #555; font-weight: normal; margin-top: 4px; }
        
        /* --- CARDS DE PRODUTO PARA BUSCA --- */
        .produto-card {
            background: white; border: 2px solid #e0e0e0; border-radius: 12px; 
            margin-bottom: 15px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.05); 
            cursor: pointer; transition: transform 0.2s;
        }
        .produto-card:active { transform: scale(0.98); }
        .produto-card img {
            width: 100%; height: 200px; object-fit: contain; 
            background-color: #fff; border-bottom: 1px solid #f0f0f0; padding: 10px; box-sizing: border-box;
        }
        .produto-card-info { padding: 15px; text-align: center; background-color: #fafafa; }
        .produto-card-nome { font-size: 18px; font-weight: bold; color: var(--dark); margin-bottom: 5px; line-height: 1.2; }
        .produto-card-detalhes { font-size: 14px; color: #666; }
        .produto-card-preco { font-size: 20px; font-weight: 900; color: var(--primary); margin-top: 8px; }

        .linha-dupla { display: flex; gap: 10px; }
        .linha-dupla .form-group { flex: 1; }
        .linha-dupla button { margin: 0; } 
        .hidden { display: none !important; }

        #alerta-customizado { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 400px; padding: 15px; border-radius: 8px; 
            color: white; font-weight: bold; text-align: center; z-index: 9999; display: none; 
        }
        .alerta-erro { background-color: var(--danger); }
        .alerta-sucesso { background-color: var(--primary); }
        .alerta-aviso { background-color: var(--warning); color: #000; }

        /* --- MODO FOCO DE SEPARAÇÃO --- */
        .tela-foco { 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
            padding: 15px; box-sizing: border-box; background: #fff; 
        }
        .info-box { 
            flex: 1; background: #f9f9f9; border-radius: 12px; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; text-align: center; 
            border: 2px solid #eee; overflow-y: auto;
        }
        
        #foco-pedido-info { font-size: 14px; color: #888; font-weight: bold; margin-bottom: 10px; }
        .badge-loc { background: var(--dark); color: white; padding: 8px 16px; border-radius: 12px; font-size: 22px; font-weight: bold; margin-bottom: 15px; }
        #foco-img { width: 100%; max-height: 220px; object-fit: contain; border-radius: 8px; margin-bottom: 15px; }
        .foco-qtd-texto { font-size: 20px; color: #555; margin-bottom: 5px; }
        .foco-qtd-texto span { font-size: 32px; font-weight: 900; color: var(--secondary); }
        #foco-nome { font-size: 24px; margin: 0 0 15px 0; line-height: 1.2; font-weight: bold; color: #222;}
        
        .ticks-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px; width: 100%; }
        .tick-box { width: 30px; height: 30px; border-radius: 6px; background-color: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; color: transparent; transition: all 0.3s ease; border: 1px solid #ccc; }
        .tick-box.active { background-color: var(--primary); color: white; border-color: var(--primary); }
    </style>
</head>
<body>

<div id="alerta-customizado">Mensagem</div>

<div id="app-ui">
    
    <div class="container" id="tela-inicial">
        <h1>📦 Sistema de Estoque</h1>
        <p id="status-db" style="text-align:center; font-weight:bold; color:#721c24;">⏳ Carregando banco de dados...</p>
        
        <div id="area-upload" class="hidden">
            <input type="file" id="file-json" accept=".json" style="display:block; margin:auto; margin-bottom: 15px;">
        </div>
        
        <div id="botoes-menu" class="hidden">
            <button style="padding: 25px; font-size: 20px;" onclick="abrirTela('tela-etiquetas')">🏷️ Gestão de Etiquetas</button>
            <button class="btn-secondary" style="padding: 25px; font-size: 20px;" onclick="abrirTelaListaPedidos()">🛒 Iniciar Separação</button>
            <hr>
            <button class="btn-warning" onclick="exportarBancoCSV()">💾 Exportar Todo o Banco (CSV Completo)</button>
            <button class="btn-danger" style="margin-top: 10px; opacity: 0.8;" onclick="limparMemoriaLocal()">⚠️ Limpar Memória do Celular</button>
        </div>
    </div>

    <div class="container hidden" id="tela-etiquetas">
        
        <div id="area-busca-etiqueta">
            <h2>🔍 Buscar Produto</h2>
            <div class="form-group">
                <input type="text" id="inp-busca" placeholder="Digite Nome, SKU ou EAN..." oninput="buscarPorNome()">
            </div>
            
            <button onclick="iniciarLeituraNativa('busca')" class="btn-primary" style="margin-bottom: 20px; padding: 20px; font-size: 18px;">
                📱 Bipar Código com App
            </button>
            
            <div id="lista-resultados"></div>
            
            <button class="btn-danger" style="margin-top: 30px;" onclick="abrirTela('tela-inicial')">⬅️ Voltar ao Menu</button>
        </div>

        <div id="product-form" class="hidden">
            
            <img id="img-foto" src="" style="width: 100%; max-height: 200px; object-fit: contain; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px;">
            
            <div class="linha-dupla">
                <div class="form-group">
                    <label>SKU (Cód Interno)</label>
                    <input type="text" id="inp-codigo" readonly style="background:#f0f0f0;">
                </div>
                <div class="form-group">
                    <label>EAN (Cód Barras)</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="text" id="inp-ean" style="flex: 1;">
                        
                        <button type="button" class="btn-primary" style="width: auto; padding: 0 15px; margin: 0; font-size: 14px;" onclick="iniciarLeituraNativa('ean')">
                            📱 App
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label>Nome do Produto</label>
                <input type="text" id="inp-nome">
            </div>
            
            <div class="linha-dupla">
                <div class="form-group">
                    <label>Estoque</label>
                    <input type="text" id="inp-estoque">
                </div>
                <div class="form-group">
                    <label>Validade</label>
                    <input type="text" id="inp-validade" placeholder="Ex: 10/2025">
                </div>
            </div>
            
            <div class="linha-dupla">
                <div class="form-group">
                    <label>Gôndola</label>
                    <select id="inp-gondola"></select>
                </div>
                <div class="form-group">
                    <label>Prateleira</label>
                    <select id="inp-prateleira"></select>
                </div>
            </div>
            
            <div class="form-group">
                <label>Preço Venda (R$)</label>
                <input type="text" id="inp-venda">
            </div>
            
            <button class="btn-print" onclick="imprimirEtiquetaGondola()" style="padding: 20px; font-size: 18px;">🖨️ Imprimir Etiqueta</button>
            <button class="btn-secondary" onclick="salvarProdutoLocal()">✅ Salvar Alterações Localmente</button>
            
            <div class="linha-dupla" style="margin-top: 20px;">
                <button class="btn-danger" onclick="fecharCardProduto()">❌ Fechar</button>
                <button class="btn-warning" onclick="abrirTela('tela-inicial')">⬅️ Menu</button>
            </div>
        </div>
    </div>

    <div class="container hidden" id="tela-separacao-input">
        <button class="btn-danger" onclick="abrirTela('tela-inicial')">⬅️ Voltar ao Menu</button>
        <h2>📋 Fila de Pedidos</h2>
        <button onclick="carregarPedidosFila()" style="background-color: var(--dark); padding: 10px; margin-bottom: 15px;">🔄 Atualizar Lista</button>
        
        <div id="area-lista-pedidos"></div>
    </div>

    <div class="tela-foco hidden" id="tela-separacao-foco">
        <div class="info-box">
            <div id="foco-pedido-info">Pedido: 000 | Entrega: 00/00/00</div>
            <span class="badge-loc" id="foco-loc">📍 Gôndola: A1</span>
            
            <img id="foco-img" src="" alt="Produto" onerror="this.style.display='none'">
            
            <div class="foco-qtd-texto" id="foco-qtd-texto"></div>
            <h3 id="foco-nome">Nome do Produto</h3>
            
            <div class="ticks-container" id="foco-ticks"></div>
            
            <button class="btn-primary" style="padding: 25px; font-size: 22px; width: 100%; margin-top: 10px;" onclick="iniciarLeituraNativa('separacao')">
                📱 BIPAR ITEM
            </button>
            
            <button class="btn-danger" style="margin-top: 15px;" onclick="cancelarPicking()">Cancelar Separação</button>
        </div>
    </div>

    <div class="container hidden" id="tela-conclusao">
        <h2>🎉 Separação Concluída!</h2>
        <p style="text-align: center;">Todos os produtos foram bipados.</p>
        
        <button class="btn-print" onclick="imprimirRelatorioSeparacao()" style="padding: 20px; font-size: 18px;">🖨️ Imprimir Pedido</button>
        <button class="btn-secondary" onclick="abrirTela('tela-inicial')">✅ Concluir e Voltar</button>
    </div>
</div>

<script>
    // ==================== VARIÁVEIS GLOBAIS ====================
    let bancoDeDados = []; 
    let pedidosFila = [];
    let listaDeSeparacao = []; 
    let indexAtualPicking = 0; 
    let produtoSendoEditadoIndex = -1;
    let pedidoAtual = null; 
    let audioCtx = null;
    let modificacoesLocais = JSON.parse(localStorage.getItem('estoque_modificacoes') || '{}');

    // ==================== INICIALIZAÇÃO E RETORNO DO APP ====================
    window.onload = async function() {
        preencherSeletoresLocalizacao();
        try { 
            const resposta = await fetch('../site/bancodedados.json'); 
            bancoDeDados = await resposta.json(); 
            aplicarModificacoesLocaisNoBanco();
            
            liberarSistema(); 
            
            // VERIFICA SE ESTAMOS VOLTANDO DO APLICATIVO ZXING
            processarRetornoDoAplicativo();
            
        } catch (erro) { 
            document.getElementById('area-upload').classList.remove('hidden'); 
        }
    };

    function processarRetornoDoAplicativo() {
        const parametros = new URLSearchParams(window.location.search);
        const codigoRecebido = parametros.get('codigo');
        const modoRecebido = parametros.get('modo');

        // Se tem código e não é o texto puro "{CODE}" (caso o usuário tenha cancelado a leitura)
        if (codigoRecebido && codigoRecebido !== '{CODE}') {
            
            // 1. Limpa a URL lá em cima para a página não ficar recarregando sempre o mesmo código
            window.history.replaceState({}, document.title, window.location.pathname);
            
            inicializarAudio();
            tocarBipe('sucesso');
            
            // 2. Recupera a memória de onde o usuário estava
            let estadoSalvo = JSON.parse(localStorage.getItem('estado_app') || '{}');

            if (modoRecebido === 'busca') {
                abrirTela('tela-etiquetas');
                document.getElementById('inp-busca').value = codigoRecebido;
                buscarProdutoPorCamera(codigoRecebido);
            } 
            else if (modoRecebido === 'ean') {
                // Restaura o formulário exatamente como estava
                produtoSendoEditadoIndex = estadoSalvo.produtoSendoEditadoIndex;
                let form = estadoSalvo.formTemp || {};
                
                abrirTela('tela-etiquetas');
                document.getElementById('area-busca-etiqueta').classList.add('hidden');
                document.getElementById('product-form').classList.remove('hidden');

                document.getElementById('inp-codigo').value = form.codigo || '';
                document.getElementById('inp-nome').value = form.nome || '';
                document.getElementById('inp-estoque').value = form.estoque || '';
                document.getElementById('inp-validade').value = form.validade || '';
                definirValorSeletorSeguro(document.getElementById('inp-gondola'), form.gondola || '');
                definirValorSeletorSeguro(document.getElementById('inp-prateleira'), form.prateleira || '');
                document.getElementById('inp-venda').value = form.venda || '';
                
                // Restaura a imagem
                const img = document.getElementById('img-foto'); 
                img.style.display = 'block'; img.src = `../site/img/produtos/${form.codigo}.webp`; 
                img.onerror = function() { this.style.display = 'none'; };

                // PREENCHE O EAN NOVO!
                document.getElementById('inp-ean').value = codigoRecebido;
                mostrarAlerta("✅ Código EAN preenchido!", "sucesso");
            } 
            else if (modoRecebido === 'separacao') {
                // Restaura a lista de pedidos e variáveis de separação
                pedidoAtual = estadoSalvo.pedidoAtual;
                listaDeSeparacao = estadoSalvo.listaDeSeparacao || [];
                indexAtualPicking = estadoSalvo.indexAtualPicking || 0;

                if (listaDeSeparacao.length > 0) {
                    entrarTelaCheia();
                    abrirTela('tela-separacao-foco');
                    renderizarItemFoco();
                    validarLeituraProduto(codigoRecebido); // Faz a conferência
                } else {
                    abrirTelaListaPedidos(); // Falha de segurança, volta pra lista
                }
            }
            
            // 3. Limpa a memória para não interferir na próxima
            localStorage.removeItem('estado_app');
        }
    }

   // ==================== O MOTOR DO APLICATIVO NATIVO (INTENT CORRIGIDO) ====================
    function iniciarLeituraNativa(modo) {
        // 1. Salvar o estado da tela na memória do celular antes de sair
        let estado = {
            produtoSendoEditadoIndex: produtoSendoEditadoIndex,
            indexAtualPicking: indexAtualPicking,
            pedidoAtual: pedidoAtual,
            listaDeSeparacao: listaDeSeparacao
        };

        // Se estiver editando EAN, salva o que a pessoa já tinha digitado
        if (modo === 'ean') {
            estado.formTemp = {
                codigo: document.getElementById('inp-codigo').value,
                nome: document.getElementById('inp-nome').value,
                estoque: document.getElementById('inp-estoque').value,
                validade: document.getElementById('inp-validade').value,
                gondola: document.getElementById('inp-gondola').value,
                prateleira: document.getElementById('inp-prateleira').value,
                venda: document.getElementById('inp-venda').value
            };
        }

        localStorage.setItem('estado_app', JSON.stringify(estado));

        // 2. Montar o Link Mágico
        // Pega o endereço exato do seu site
        let urlLimpa = window.location.href.split('?')[0]; 
        
        // Define para onde o aplicativo deve voltar enviando o código
        let urlDeRetorno = encodeURIComponent(`${urlLimpa}?modo=${modo}&codigo={CODE}`);
        
        // CORREÇÃO: Comando Oficial do Android (Intent) que obriga o Chrome a abrir o App!
let linkIntent = `http://zxing.appspot.com/scan?ret=${urlDeRetorno}`;        
        // 3. Executar a abertura do aplicativo
        window.location.href = linkIntent;
    }

    // ==================== FUNÇÕES BÁSICAS ====================
    function preencherSeletoresLocalizacao() {
        let selGondola = document.getElementById('inp-gondola');
        let selPrateleira = document.getElementById('inp-prateleira');
        selGondola.innerHTML = '<option value="">Sem Gôndola</option>';
        selPrateleira.innerHTML = '<option value="">Sem Prateleira</option>';
        for(let i = 0; i <= 20; i++) {
            let num = i.toString().padStart(2, '0'); 
            selGondola.innerHTML += `<option value="${num}">${num}</option>`;
        }
        let letras = ['A', 'B', 'C', 'D', 'E', 'F', 'G'];
        letras.forEach(letra => {
            selPrateleira.innerHTML += `<option value="${letra}1">${letra}1</option>`;
            selPrateleira.innerHTML += `<option value="${letra}2">${letra}2</option>`;
        });
    }

    function aplicarModificacoesLocaisNoBanco() {
        bancoDeDados.forEach(produto => {
            let sku = String(produto.codigo || produto["Código"] || "");
            if (sku && modificacoesLocais[sku]) { Object.assign(produto, modificacoesLocais[sku]); }
        });
    }

    function liberarSistema() {
        document.getElementById('status-db').innerText = `✅ Banco Conectado (${bancoDeDados.length} itens)`;
        document.getElementById('status-db').style.color = "green";
        document.getElementById('botoes-menu').classList.remove('hidden');
    }

    function entrarTelaCheia() {
        let elem = document.documentElement;
        if (elem.requestFullscreen) { elem.requestFullscreen().catch(()=>{}); }
        else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen().catch(()=>{}); }
        else if (elem.msRequestFullscreen) { elem.msRequestFullscreen().catch(()=>{}); }
    }

    function sairTelaCheia() {
        if (document.fullscreenElement || document.webkitFullscreenElement) {
            if (document.exitFullscreen) { document.exitFullscreen().catch(()=>{}); }
            else if (document.webkitExitFullscreen) { document.webkitExitFullscreen().catch(()=>{}); }
        }
    }

    function inicializarAudio() {
        if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    }

    function tocarBipe(tipo) {
        if (!audioCtx) return;
        try {
            const osc = audioCtx.createOscillator();
            const ganho = audioCtx.createGain();
            osc.connect(ganho); ganho.connect(audioCtx.destination);
            if (tipo === 'sucesso') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(900, audioCtx.currentTime); 
                ganho.gain.setValueAtTime(0.5, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.1); 
            } else {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); 
                ganho.gain.setValueAtTime(0.5, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.4); 
            }
        } catch(e) { }
    }

    function falarTexto(texto) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            let msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'pt-BR'; msg.rate = 1.2; 
            window.speechSynthesis.speak(msg);
        }
    }

    function mostrarAlerta(msg, tipo = 'sucesso', tempo = 3000) {
        let alerta = document.getElementById('alerta-customizado'); 
        alerta.innerText = msg; alerta.className = ''; 
        if (tipo === 'erro') alerta.classList.add('alerta-erro'); 
        else if (tipo === 'aviso') alerta.classList.add('alerta-aviso'); 
        else alerta.classList.add('alerta-sucesso');
        alerta.style.display = 'block'; setTimeout(() => { alerta.style.display = 'none'; }, tempo);
    }

    function abrirTela(idTela) {
        let telas = ['tela-inicial', 'tela-etiquetas', 'tela-separacao-input', 'tela-separacao-foco', 'tela-conclusao'];
        telas.forEach(id => { document.getElementById(id).classList.add('hidden'); });
        document.getElementById(idTela).classList.remove('hidden');
    }

    function abrirTelaListaPedidos() {
        inicializarAudio(); abrirTela('tela-separacao-input'); carregarPedidosFila();
    }

    // ==================== GESTÃO DE ETIQUETAS ====================
    function buscarPorNome() {
        let termo = document.getElementById('inp-busca').value.toLowerCase().trim();
        let lista = document.getElementById('lista-resultados'); 
        lista.innerHTML = ''; 
        if (termo.length < 3) return; 

        let encontrados = bancoDeDados.map((p, i) => ({ produto: p, indexOriginal: i })).filter(item => {
            let nomeDb = String(item.produto.nome || item.produto["Descrição"] || "").toLowerCase();
            let codDb = String(item.produto.codigo || item.produto["Código"] || "").toLowerCase();
            let eanDb = String(item.produto.gtin || item.produto["GTIN/EAN"] || "").replace(/\D/g, "");
            return nomeDb.includes(termo) || codDb.includes(termo) || eanDb.includes(termo);
        });

        if (encontrados.length === 0) { 
            lista.innerHTML = '<div style="color:red; padding:10px; text-align:center;">Nenhum produto encontrado.</div>'; 
            return; 
        }

        encontrados.slice(0, 10).forEach(item => {
            let nome = item.produto.nome || item.produto["Descrição"] || "Sem Nome"; 
            let sku = item.produto.codigo || item.produto["Código"] || ""; 
            let preco = item.produto.preco || item.produto["Preço"] || "0,00";
            
            let caminhoFoto = `../site/img/produtos/${sku}.webp`;
            let imagemReserva = "data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22100%25%22%20height%3D%22200%22%20style%3D%22background%3A%23f4f4f4%22%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20font-family%3D%22sans-serif%22%20font-size%3D%2216%22%20fill%3D%22%23aaa%22%3ESem%20Foto%3C%2Ftext%3E%3C%2Fsvg%3E";

            let div = document.createElement('div'); 
            div.className = 'produto-card'; 
            
            div.innerHTML = `
                <img src="${caminhoFoto}" onerror="this.onerror=null; this.src='${imagemReserva}';">
                <div class="produto-card-info">
                    <div class="produto-card-nome">${nome}</div>
                    <div class="produto-card-detalhes">SKU: ${sku}</div>
                    <div class="produto-card-preco">R$ ${preco}</div>
                </div>
            `;
            
            div.onclick = function() { abrirCardProduto(item.produto, item.indexOriginal); }; 
            
            lista.appendChild(div);
        });
    }

    function definirValorSeletorSeguro(elementoSelect, valor) {
        if (!valor) { elementoSelect.value = ""; return; }
        let opcaoExiste = Array.from(elementoSelect.options).some(opt => opt.value === valor);
        if (!opcaoExiste) { elementoSelect.add(new Option(valor + " (No Banco)", valor)); }
        elementoSelect.value = valor;
    }

    function abrirCardProduto(produto, indexDaBusca) {
        produtoSendoEditadoIndex = indexDaBusca;
        const sku = produto.codigo || produto["Código"] || "";
        
        document.getElementById('inp-codigo').value = sku;
        document.getElementById('inp-nome').value = produto.nome || produto["Descrição"] || "";
        document.getElementById('inp-ean').value = String(produto.gtin || produto["GTIN/EAN"] || "").replace(/[^0-9]/g, "");
        document.getElementById('inp-estoque').value = produto.estoque || produto["Estoque"] || "";
        document.getElementById('inp-validade').value = produto.validade || produto["Data Validade"] || "";
        document.getElementById('inp-venda').value = produto.preco || produto["Preço"] || "";
        
        let locCompleta = produto.localizacao || produto["Localização"] || ""; 
        let valGondola = produto.gondola || produto["Gôndola"] || "";
        let valPrateleira = produto.prateleira || produto["Prateleira"] || "";

        if (locCompleta && !valGondola && !valPrateleira) {
            let partes = locCompleta.split('-'); 
            if (partes.length >= 2) { valGondola = partes[0].trim(); valPrateleira = partes[1].trim(); } 
            else { valGondola = locCompleta.trim(); }
        }

        definirValorSeletorSeguro(document.getElementById('inp-gondola'), valGondola);
        definirValorSeletorSeguro(document.getElementById('inp-prateleira'), valPrateleira);

        const img = document.getElementById('img-foto'); 
        img.style.display = 'block'; img.src = `../site/img/produtos/${sku}.webp`; 
        img.onerror = function() { this.style.display = 'none'; };
        
        document.getElementById('area-busca-etiqueta').classList.add('hidden'); 
        document.getElementById('product-form').classList.remove('hidden');
    }

    function fecharCardProduto() { 
        document.getElementById('product-form').classList.add('hidden'); 
        document.getElementById('area-busca-etiqueta').classList.remove('hidden'); 
    }

    function buscarProdutoPorCamera(codigoLido) {
        let eanLimpo = String(codigoLido).replace(/\D/g, "").replace(/^0+/, ""); 
        let skuLimpo = String(codigoLido).trim().toUpperCase();
        const itemAchado = bancoDeDados.map((p, i) => ({ produto: p, indexOriginal: i })).find(item => { 
            let eanDb = String(item.produto.gtin || item.produto["GTIN/EAN"] || "").replace(/\D/g, "").replace(/^0+/, ""); 
            let skuDb = String(item.produto.codigo || item.produto["Código"] || "").trim().toUpperCase(); 
            return (eanDb === eanLimpo && eanLimpo !== "") || (skuDb === skuLimpo && skuLimpo !== ""); 
        });
        if (itemAchado) abrirCardProduto(itemAchado.produto, itemAchado.indexOriginal); else mostrarAlerta("Produto não encontrado! (Lido: " + codigoLido + ")", "erro");
    }

    function salvarProdutoLocal() {
        if (produtoSendoEditadoIndex === -1) return; 
        
        let produto = bancoDeDados[produtoSendoEditadoIndex];
        let sku = document.getElementById('inp-codigo').value;
        let atualizacoes = {};
        
        if("Código" in produto) atualizacoes["Código"] = sku; else atualizacoes.codigo = sku;
        if("Descrição" in produto) atualizacoes["Descrição"] = document.getElementById('inp-nome').value; else atualizacoes.nome = document.getElementById('inp-nome').value;
        if("GTIN/EAN" in produto) atualizacoes["GTIN/EAN"] = document.getElementById('inp-ean').value; else atualizacoes.gtin = document.getElementById('inp-ean').value;
        if("Estoque" in produto) atualizacoes["Estoque"] = document.getElementById('inp-estoque').value; else atualizacoes.estoque = document.getElementById('inp-estoque').value;
        if("Data Validade" in produto) atualizacoes["Data Validade"] = document.getElementById('inp-validade').value; else atualizacoes.validade = document.getElementById('inp-validade').value;
        if("Preço" in produto) atualizacoes["Preço"] = document.getElementById('inp-venda').value; else atualizacoes.preco = document.getElementById('inp-venda').value;
        
        let vGon = document.getElementById('inp-gondola').value;
        let vPra = document.getElementById('inp-prateleira').value;

        atualizacoes["gondola"] = vGon; atualizacoes["Gôndola"] = vGon;
        atualizacoes["prateleira"] = vPra; atualizacoes["Prateleira"] = vPra;

        let localizacaoUnida = "";
        if (vGon && vPra) localizacaoUnida = `${vGon}-${vPra}`;
        else if (vGon) localizacaoUnida = vGon;
        else if (vPra) localizacaoUnida = vPra;

        if("Localização" in produto || !("localizacao" in produto)) atualizacoes["Localização"] = localizacaoUnida;
        atualizacoes["localizacao"] = localizacaoUnida;

        Object.assign(produto, atualizacoes);
        modificacoesLocais[sku] = atualizacoes;
        localStorage.setItem('estoque_modificacoes', JSON.stringify(modificacoesLocais));
        mostrarAlerta("✅ Alterações salvas na memória do celular!", "sucesso");
    }

    function exportarBancoCSV() { 
        if (bancoDeDados.length === 0) { mostrarAlerta("Banco de dados vazio.", "erro"); return; }
        let colunasSet = new Set();
        bancoDeDados.forEach(obj => { Object.keys(obj).forEach(key => colunasSet.add(key)); });
        let colunas = Array.from(colunasSet); 
        let csv = colunas.join(';') + '\n';
        bancoDeDados.forEach(obj => { 
            let linha = colunas.map(coluna => {
                let valor = obj[coluna];
                if (valor === null || valor === undefined) return "";
                return String(valor).replace(/;/g, ",").replace(/\n/g, " ").replace(/\r/g, "");
            });
            csv += linha.join(';') + '\n'; 
        });
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a"); link.setAttribute("href", URL.createObjectURL(blob));
        link.setAttribute("download", `banco_atualizado_${new Date().getTime()}.csv`); 
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }
    
    function limparMemoriaLocal() {
        if(confirm("ATENÇÃO: Isso apagará todas as edições feitas neste celular que ainda não foram exportadas. Continuar?")) {
            localStorage.removeItem('estoque_modificacoes'); modificacoesLocais = {}; mostrarAlerta("Memória limpa com sucesso.", "sucesso");
        }
    }

    // ==================== MOTOR DE IMPRESSÃO ====================
    function imprimirPelaPaginaFantasma(htmlConteudo) {
        let iframe = document.getElementById('frame-impressao');
        if (!iframe) {
            iframe = document.createElement('iframe'); iframe.id = 'frame-impressao'; iframe.style.position = 'absolute';
            iframe.style.width = '0px'; iframe.style.height = '0px'; iframe.style.border = 'none'; iframe.style.left = '-9999px'; 
            document.body.appendChild(iframe);
        }
        let htmlCompleto = `<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><style>@page { margin: 0; size: 58mm auto; } body { margin: 0; padding: 0; width: 48mm; font-family: Arial, sans-serif; color: #000; background: #fff; } .etiqueta { width: 48mm; padding: 2mm 0; padding-bottom: 15mm; box-sizing: border-box; text-align: center; } .foto-print { width: 100%; max-height: 45mm; object-fit: contain; margin-bottom: 8px; display: block; } .titulo { font-size: 14px; font-weight: bold; margin-bottom: 2px; } .sku { font-size: 38px; font-weight: 900; margin: 0 0 10px 0; letter-spacing: 1px; } .nome { font-size: 16px; font-weight: bold; text-transform: uppercase; margin-bottom: 12px; line-height: 1.2; } .linha { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; border-bottom: 1px dashed #000; padding: 4px 0; margin: 0;} .linha span.valor { font-weight: normal; } .rel-titulo { font-size: 18px; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; border-bottom: 2px solid #000; padding-bottom: 5px; text-align: center; } .rel-info { font-size: 14px; font-weight: bold; margin-bottom: 10px; text-align: center; } .rel-item { border-bottom: 1px dashed #000; padding: 4px 0; font-size: 14px; font-weight: bold; text-align: left; }</style></head><body>${htmlConteudo}</body></html>`;
        let doc = iframe.contentWindow.document || iframe.contentDocument; doc.open(); doc.write(htmlCompleto); doc.close();
        setTimeout(() => { iframe.contentWindow.focus(); iframe.contentWindow.print(); }, 800);
    }

    function imprimirEtiquetaGondola() {
        let sku = document.getElementById('inp-codigo').value; let nome = document.getElementById('inp-nome').value; let ean = document.getElementById('inp-ean').value; let val = document.getElementById('inp-validade').value; let gon = document.getElementById('inp-gondola').value; let pra = document.getElementById('inp-prateleira').value;
        let imgElement = document.getElementById('img-foto'); let fotoTag = '';
        if (imgElement.style.display !== 'none' && imgElement.src) { fotoTag = `<img src="${imgElement.src}" class="foto-print" onerror="this.style.display='none'">`; }
        let conteudoEtiqueta = `<div class="etiqueta">${fotoTag} <div class="titulo">SKU</div> <div class="sku">${sku}</div><div class="nome">${nome}</div><div class="linha"><span>EAN:</span> <span class="valor">${ean}</span></div><div class="linha"><span>VAL:</span> <span class="valor">${val}</span></div><div class="linha"><span>GÔNDOLA:</span> <span class="valor">${gon}</span></div><div class="linha"><span>PRAT:</span> <span class="valor">${pra}</span></div><div style="margin-top: 100px; border-bottom: 2px dashed #000; height: 5px;"></div></div>`;
        imprimirPelaPaginaFantasma(conteudoEtiqueta);
    }

    function imprimirRelatorioSeparacao() {
        let numeroPedido = pedidoAtual ? (pedidoAtual.orderNum || 'N/A') : 'N/A';
        let dataEntrega = (pedidoAtual && pedidoAtual.deliveryMatch && pedidoAtual.deliveryMatch[1]) ? pedidoAtual.deliveryMatch[1] : 'N/A';
        let cont = `<div class="etiqueta"><div class="rel-titulo">Pedido ${numeroPedido}</div><div class="rel-info">Entrega: ${dataEntrega}</div>`;
        listaDeSeparacao.forEach(i => { let status = i.status === 'concluido' ? '[OK]' : '[FALTOU]'; cont += `<div class="rel-item">${status} ${i.quantidadeTotal}x ${i.nomePedido.substring(0, 18)}</div>`; });
        cont += `<div style="margin-top: 100px; border-bottom: 2px dashed #000; height: 5px;"></div></div>`; imprimirPelaPaginaFantasma(cont);
    }

    // ==================== FLUXO DE SEPARAÇÃO ====================
    async function carregarPedidosFila() {
        let container = document.getElementById('area-lista-pedidos'); container.innerHTML = '<p style="text-align:center; padding: 20px;">⏳ Carregando fila de pedidos...</p>';
        try {
            const resposta = await fetch('../site/pedidos_fila.json'); if (!resposta.ok) throw new Error("Erro");
            pedidosFila = await resposta.json(); renderizarPedidosFila();
        } catch (erro) { container.innerHTML = '<p style="text-align:center; color:red; font-weight:bold;">❌ Não foi possível carregar os pedidos.</p>'; }
    }

    function renderizarPedidosFila() {
        let container = document.getElementById('area-lista-pedidos'); container.innerHTML = '';
        let pendentes = pedidosFila.filter(p => p.status === 'PENDENTE');
        if (pendentes.length === 0) { container.innerHTML = '<div style="text-align:center; padding: 20px; font-size: 18px; color: green; font-weight: bold;">✅ Nenhum pedido pendente!</div>'; return; }
        pendentes.forEach((pedido) => {
            let div = document.createElement('div'); div.className = 'resultado-item'; 
            let numItens = pedido.items ? pedido.items.length : 0;
            let dataApresentacao = new Date(pedido.dataCriacao).toLocaleDateString('pt-BR');
            let nomePedido = pedido.orderNum || "Pedido sem número";
            div.innerHTML = `${nomePedido} <div class="resultado-dica">📅 ${dataApresentacao} | 📦 ${numItens} itens para separar</div>`;
            div.onclick = function() { iniciarSeparacaoPedido(pedido); }; container.appendChild(div);
        });
    }

    function iniciarSeparacaoPedido(pedido) {
        listaDeSeparacao = []; pedidoAtual = pedido; 
        if (!pedido.items || pedido.items.length === 0) { mostrarAlerta("Este pedido não tem produtos listados.", "erro"); return; }
        pedido.items.forEach(item => {
            if (item.foundProduct) {
                listaDeSeparacao.push({
                    quantidadeTotal: item.qtd, unidadesLidas: 0, nomePedido: item.nomeOriginal, produtoDb: item.foundProduct, 
                    localizacao: item.foundProduct.localizacao || item.foundProduct["Localização"] || "ZZZ", status: 'pendente'
                });
            }
        });
        if (listaDeSeparacao.length === 0) { mostrarAlerta("Nenhum item do pedido foi encontrado.", "erro"); return; }
        listaDeSeparacao.sort((a, b) => a.localizacao.localeCompare(b.localizacao)); 
        indexAtualPicking = 0; 
        entrarTelaCheia(); abrirTela('tela-separacao-foco'); renderizarItemFoco();
    }

    function renderizarItemFoco() {
        if (indexAtualPicking >= listaDeSeparacao.length) { finalizarPicking(); return; }
        let item = listaDeSeparacao[indexAtualPicking]; 
        let skuItem = item.produtoDb.codigo || item.produtoDb["Código"] || "";
        let numPed = pedidoAtual ? (pedidoAtual.orderNum || 'N/A') : 'N/A';
        let dtEnt = (pedidoAtual && pedidoAtual.deliveryMatch && pedidoAtual.deliveryMatch[1]) ? pedidoAtual.deliveryMatch[1] : 'N/A';
        document.getElementById('foco-pedido-info').innerText = `Pedido: ${numPed} | Entrega: ${dtEnt}`;
        document.getElementById('foco-loc').innerText = `📍 Gôndola: ${item.localizacao}`; 
        let img = document.getElementById('foco-img'); 
        img.src = `../site/img/produtos/${skuItem}.webp`; img.style.display = 'block';
        document.getElementById('foco-qtd-texto').innerHTML = `<span>${item.quantidadeTotal}</span> unidades de:`;
        document.getElementById('foco-nome').innerText = item.nomePedido; 
        let containerTicks = document.getElementById('foco-ticks'); containerTicks.innerHTML = '';
        for(let i = 0; i < item.quantidadeTotal; i++) {
            let tick = document.createElement('div'); tick.className = 'tick-box';
            if(i < item.unidadesLidas) { tick.classList.add('active'); tick.innerHTML = '✓'; }
            containerTicks.appendChild(tick);
        }
    }

    function validarLeituraProduto(codigoLido) {
        let eanLimpo = String(codigoLido).replace(/\D/g, "").replace(/^0+/, ""); let skuLimpo = String(codigoLido).trim().toUpperCase();
        let itemAtual = listaDeSeparacao[indexAtualPicking]; 
        let eanEsperado = String(itemAtual.produtoDb.gtin || itemAtual.produtoDb["GTIN/EAN"] || "").replace(/\D/g, "").replace(/^0+/, ""); 
        let skuEsperado = String(itemAtual.produtoDb.codigo || itemAtual.produtoDb["Código"] || "").trim().toUpperCase();
        let nomeParaVoz = itemAtual.nomePedido.split(' ').slice(0, 3).join(' ');

        if (eanEsperado === eanLimpo || skuEsperado === skuLimpo) {
            itemAtual.unidadesLidas++; 
            if (itemAtual.unidadesLidas < itemAtual.quantidadeTotal) { 
                let faltam = itemAtual.quantidadeTotal - itemAtual.unidadesLidas;
                falarTexto(`Faltam ${faltam}.`); mostrarAlerta(`✅ Correto! Faltam ${faltam}.`, "aviso", 1500); renderizarItemFoco(); 
            } else { 
                itemAtual.status = 'concluido'; falarTexto(`${nomeParaVoz} concluído.`);
                mostrarAlerta(`🎉 Item Completo!`, "sucesso", 1500); indexAtualPicking++; renderizarItemFoco(); 
            }
        } else { tocarBipe('erro'); falarTexto("Produto incorreto!"); mostrarAlerta(`❌ Produto Errado! Lido: ${codigoLido}`, "erro"); }
    }

    function cancelarPicking() { 
        if (confirm("Tem certeza que deseja cancelar a separação?")) { sairTelaCheia(); abrirTela('tela-inicial'); } 
    }
    
    function finalizarPicking() { 
        sairTelaCheia(); falarTexto("Pedido finalizado com sucesso."); abrirTela('tela-conclusao'); 
    }
</script>
