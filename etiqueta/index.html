<script>
    // 1. Declaração de Variáveis Globais
    let bancoDeDados = []; 
    let pedidosFila = []; 
    let listaDeSeparacao = []; 
    let indexAtualPicking = 0; 
    let pedidoAtual = null; 
    let audioCtx = null;

    // 2. Carregamento Inicial (Conexão com o Banco)
    window.onload = async function() {
        try { 
            console.log("Tentando conectar ao banco de dados...");
            // Verifica se o caminho do arquivo JSON está correto no seu projeto
            const resposta = await fetch('../site/bancodedados.json'); 
            
            if (!resposta.ok) {
                throw new Error(`Erro HTTP: ${resposta.status}`);
            }

            bancoDeDados = await resposta.json(); 
            let modificacoesLocais = JSON.parse(localStorage.getItem('estoque_modificacoes') || '{}');
            
            bancoDeDados.forEach(p => { 
                let sku = p.codigo || p["Código"]; 
                if(sku && modificacoesLocais[sku]) {
                    Object.assign(p, modificacoesLocais[sku]); 
                }
            });
            
            document.getElementById('status-db').innerText = `✅ Banco Preparado`; 
            document.getElementById('status-db').style.color = "green";
            document.getElementById('btn-iniciar').classList.remove('hidden');
            
            verificarEstadoSalvo();
        } catch (erro) { 
            console.error("Falha ao carregar o banco de dados:", erro);
            document.getElementById('status-db').innerText = "❌ Erro ao ler Banco Local. Verifique o caminho ou servidor."; 
        }
    };

    // 3. Controle de Telas
    function abrirTela(id) { 
        ['tela-inicial', 'tela-lista-pedidos', 'tela-separacao-foco', 'tela-conclusao'].forEach(t => document.getElementById(t).classList.add('hidden')); 
        document.getElementById(id).classList.remove('hidden'); 
        if (id === 'tela-inicial') verificarEstadoSalvo(); 
    }
    
    // 4. Alertas e Áudio
    function mostrarAlerta(msg, tipo = 'sucesso') { 
        let a = document.getElementById('alerta-customizado'); 
        a.innerText = msg; a.className = ''; 
        if(tipo === 'erro') a.classList.add('alerta-erro'); 
        else if(tipo === 'aviso') a.classList.add('alerta-aviso'); 
        else a.classList.add('alerta-sucesso'); 
        
        a.style.display = 'block'; 
        setTimeout(() => a.style.display = 'none', 2000); 
    }
    
    function inicializarAudio() { 
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
    }
    
    function tocarBipe(tipo) { 
        if (!audioCtx) return; 
        try { 
            const osc = audioCtx.createOscillator(); 
            const ganho = audioCtx.createGain(); 
            osc.connect(ganho); 
            ganho.connect(audioCtx.destination); 
            
            if(tipo === 'sucesso'){ 
                osc.type = 'sine'; osc.frequency.setValueAtTime(900, audioCtx.currentTime); 
                ganho.gain.setValueAtTime(0.5, audioCtx.currentTime); 
                osc.start(); osc.stop(audioCtx.currentTime + 0.1); 
            } else { 
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(250, audioCtx.currentTime); 
                ganho.gain.setValueAtTime(0.5, audioCtx.currentTime); 
                osc.start(); osc.stop(audioCtx.currentTime + 0.5); 
            } 
        } catch(e){} 
    }

    // ================== SISTEMA DE SALVAMENTO (LOCAL STORAGE) ==================
    function salvarProgresso() {
        if (!pedidoAtual) return;
        const estado = {
            pedidoAtual: pedidoAtual,
            listaDeSeparacao: listaDeSeparacao,
            indexAtualPicking: indexAtualPicking
        };
        localStorage.setItem('estadoPickingSalvo', JSON.stringify(estado));
    }

    function limparProgresso() {
        localStorage.removeItem('estadoPickingSalvo');
    }

    function verificarEstadoSalvo() {
        const salvo = localStorage.getItem('estadoPickingSalvo');
        if (salvo) {
            document.getElementById('btn-continuar').classList.remove('hidden');
        } else {
            document.getElementById('btn-continuar').classList.add('hidden');
        }
    }

    // 5. Função que estava incompleta agora corrigida!
    function continuarSeparacaoSalva() {
        inicializarAudio();
        const salvoString = localStorage.getItem('estadoPickingSalvo');
        
        if (salvoString) {
            const salvo = JSON.parse(salvoString);
            pedidoAtual = salvo.pedidoAtual;
            listaDeSeparacao = salvo.listaDeSeparacao;
            indexAtualPicking = salvo.indexAtualPicking;
            
            abrirTela('tela-separacao-foco');
            mostrarAlerta('Progresso recuperado com sucesso!');
            // Nota: Adicione aqui a função que carrega o item atual na tela
        } else {
            mostrarAlerta('Nenhum progresso salvo encontrado.', 'erro');
        }
    }
</script>
