<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Separador de Pedidos (Picking)</title>
    <style>
        :root { --primary: #4CAF50; --secondary: #2196F3; --danger: #f44336; --warning: #ff9800; --dark: #333; --light: #f4f4f4; }
        body, html { font-family: Arial, sans-serif; background-color: var(--light); margin: 0; padding: 0; height: 100%; color: var(--dark); user-select: none; overflow: hidden; }
        button { border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.96); }
        .btn-primary { background-color: var(--primary); } .btn-secondary { background-color: var(--secondary); }
        .btn-danger { background-color: var(--danger); } .btn-print { background-color: #000; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 15px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .hidden { display: none !important; }
        h1, h2 { text-align: center; margin-top: 0; }
        .resultado-item { padding: 15px; margin-bottom: 8px; background-color: #e3f2fd; border: 1px solid #90caf9; border-radius: 8px; font-size: 16px; font-weight: bold; color: #0d47a1; cursor: pointer; }
        
        /* TELA DE FOCO */
        .tela-foco { height: 100vh; display: flex; flex-direction: column; padding: 8px; box-sizing: border-box; background: #fff; }
        .foco-header { display: flex; justify-content: space-between; align-items: center; background: var(--dark); color: white; padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; font-size: 14px; font-weight: bold; }
        .foco-loc { color: var(--warning); font-size: 16px; }
        .foco-produto-card { display: flex; gap: 10px; background: #f9f9f9; padding: 8px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 8px; align-items: center; }
        .foco-produto-card img { width: 65px; height: 65px; object-fit: contain; background: white; border: 1px solid #ccc; border-radius: 6px; }
        .foco-produto-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .foco-nome { font-size: 15px; font-weight: bold; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .foco-qtd { font-size: 14px; color: #555; } .foco-qtd span { font-size: 20px; font-weight: 900; color: var(--secondary); }
        
        .ticks-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin-bottom: 8px; }
        .tick-box { width: 22px; height: 22px; border-radius: 4px; background-color: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: transparent; border: 1px solid #ccc; }
        .tick-box.active { background-color: var(--primary); color: white; border-color: var(--primary); }
        
        .area-desempate { display: flex; gap: 5px; overflow-x: auto; background: #ffebee; padding: 6px; border-radius: 8px; border: 1px solid #ffcdd2; margin-bottom: 8px; justify-content: center; }
        .card-desempate { background: white; padding: 4px; border-radius: 6px; text-align: center; width: 65px; flex-shrink: 0; }
        .card-desempate img { width: 100%; height: 50px; object-fit: contain; } .card-desempate .desc { font-size: 9px; font-weight: bold; }

        .area-interacao { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; }
        .display-teclado { text-align: center; font-size: 30px; font-weight: 900; letter-spacing: 12px; color: var(--secondary); height: 40px; border-bottom: 2px solid #ccc; margin-bottom: 8px; }
        .grid-teclado { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .btn-num { background: #f0f0f0; border: 2px solid #ddd; color: #333; font-size: 24px; font-weight: bold; border-radius: 8px; height: 55px; margin:0;}
        .btn-action { font-size: 16px; height: 55px; border-radius: 8px; margin:0;}

        #alerta-customizado { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; padding: 12px; border-radius: 8px; color: white; font-weight: bold; text-align: center; z-index: 10000; display: none; }
        .alerta-erro { background-color: var(--danger); } .alerta-sucesso { background-color: var(--primary); } .alerta-aviso { background-color: var(--warning); color: #000; }
    </style>
</head>
<body>

<div id="alerta-customizado">Mensagem</div>

<div id="app-ui" style="height: 100%;">
    <div class="container" id="tela-inicial">
        <h1>🛒 Separador de Pedidos</h1>
        <p id="status-db" style="text-align:center; font-weight:bold; color:#721c24;">⏳ Carregando banco...</p>
        <button id="btn-iniciar" class="btn-primary hidden" style="padding:25px; font-size:22px; width:100%; margin-top:30px;" onclick="carregarPedidosFila()">📋 Ver Lista de Pedidos</button>
    </div>

    <div class="container hidden" id="tela-lista-pedidos">
        <button class="btn-danger" style="padding:15px; width:100%;" onclick="abrirTela('tela-inicial')">⬅️ Voltar</button>
        <h2 style="margin-top:20px;">Fila de Separação</h2>
        <button class="btn-secondary" style="padding:15px; width:100%; margin-bottom:20px;" onclick="carregarPedidosFila()">🔄 Atualizar Lista</button>
        <div id="area-lista-pedidos"></div>
    </div>

    <div class="tela-foco hidden" id="tela-separacao-foco">
        <div class="foco-header"><span id="foco-pedido-info">Ped: 000</span><span class="foco-loc" id="foco-loc">📍 A1</span></div>
        <div class="foco-produto-card">
            <img id="foco-img" src="">
            <div class="foco-produto-info">
                <div class="foco-nome" id="foco-nome">Nome Produto</div>
                <div class="foco-qtd">Faltam <span id="span-faltam">0</span> de <span id="span-total">0</span></div>
            </div>
        </div>
        <div class="ticks-container" id="foco-ticks"></div>
        <div id="bloco-desempate" class="area-desempate hidden"></div>
        
        <div class="area-interacao">
            <div id="bloco-teclado-foco">
                <div id="foco-teclado-titulo" style="text-align:center; font-size:12px; font-weight:bold; color:#555;">Digite os 4 últimos do EAN</div>
                <div id="display-foco" class="display-teclado"></div>
                <div class="grid-teclado">
                    <button class="btn-num" onclick="addFoco(1)">1</button><button class="btn-num" onclick="addFoco(2)">2</button><button class="btn-num" onclick="addFoco(3)">3</button>
                    <button class="btn-num" onclick="addFoco(4)">4</button><button class="btn-num" onclick="addFoco(5)">5</button><button class="btn-num" onclick="addFoco(6)">6</button>
                    <button class="btn-num" onclick="addFoco(7)">7</button><button class="btn-num" onclick="addFoco(8)">8</button><button class="btn-num" onclick="addFoco(9)">9</button>
                    <button class="btn-action btn-danger" onclick="apagarFoco()">Corrigir</button><button class="btn-num" onclick="addFoco(0)">0</button><button class="btn-action btn-primary" id="btn-ok-foco" onclick="confirmarFoco()">OK</button>
                </div>
            </div>
            <div id="bloco-add-foco" class="hidden" style="display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1;">
                <div style="color:green; font-weight:bold; margin-bottom:10px; font-size:16px;">✅ Código Validado!</div>
                <button class="btn-secondary" style="width:100%; height:90px; font-size:24px; border-radius:12px; font-weight:900;" onclick="registrarUnidadeFoco()">➕ PEGUEI MAIS 1</button>
            </div>
            <button class="btn-danger" style="padding:10px; font-size:13px; margin-top:8px; opacity:0.8; width:100%;" onclick="if(confirm('Cancelar separação?')) abrirTela('tela-inicial');">❌ Cancelar Separação</button>
        </div>
    </div>

    <div class="container hidden" id="tela-conclusao">
        <h2>🎉 Separação Concluída!</h2>
        <button class="btn-print" style="padding: 20px; width:100%; margin-top:20px;" onclick="imprimirRelatorioSeparacao()">🖨️ Imprimir Pedido</button>
        <button class="btn-primary" style="padding: 20px; width:100%; margin-top:20px;" onclick="abrirTela('tela-inicial')">✅ Finalizar</button>
    </div>
</div>

<script>
    let bancoDeDados = []; let pedidosFila = []; let listaDeSeparacao = []; let indexAtualPicking = 0; let pedidoAtual = null; let audioCtx = null;
    let focoDisplayStr = ""; let focoModo = "EAN"; let focoLimite = 4; let focoProdutosEmpatados = [];

    window.onload = async function() {
        try { 
            const resposta = await fetch('../site/bancodedados.json'); bancoDeDados = await resposta.json(); 
            // CARREGA AS MODIFICAÇÕES FEITAS PELO GESTOR DE ETIQUETAS!
            let modificacoesLocais = JSON.parse(localStorage.getItem('estoque_modificacoes') || '{}');
            bancoDeDados.forEach(p => { let sku = p.codigo || p["Código"]; if(sku && modificacoesLocais[sku]) Object.assign(p, modificacoesLocais[sku]); });
            document.getElementById('status-db').innerText = `✅ Banco Carregado e Atualizado`; document.getElementById('status-db').style.color = "green";
            document.getElementById('btn-iniciar').classList.remove('hidden');
        } catch (erro) { document.getElementById('status-db').innerText = "❌ Erro ao ler Banco Local."; }
    };

    function abrirTela(id) { ['tela-inicial', 'tela-lista-pedidos', 'tela-separacao-foco', 'tela-conclusao'].forEach(t => document.getElementById(t).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
    function mostrarAlerta(msg, tipo = 'sucesso') { let a = document.getElementById('alerta-customizado'); a.innerText = msg; a.className = ''; if(tipo === 'erro') a.classList.add('alerta-erro'); else if(tipo === 'aviso') a.classList.add('alerta-aviso'); else a.classList.add('alerta-sucesso'); a.style.display = 'block'; setTimeout(() => a.style.display = 'none', 2500); }
    function inicializarAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function tocarBipe(tipo) { if (!audioCtx) return; try { const osc = audioCtx.createOscillator(); const ganho = audioCtx.createGain(); osc.connect(ganho); ganho.connect(audioCtx.destination); if(tipo === 'sucesso'){ osc.type = 'sine'; osc.frequency.setValueAtTime(900, audioCtx.currentTime); ganho.gain.setValueAtTime(0.5, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.1); } else { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); ganho.gain.setValueAtTime(0.5, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.4); } } catch(e){} }

    async function carregarPedidosFila() {
        inicializarAudio(); abrirTela('tela-lista-pedidos');
        let container = document.getElementById('area-lista-pedidos'); container.innerHTML = '<p style="text-align:center;">⏳ Carregando...</p>';
        try {
            const resposta = await fetch('../site/pedidos_fila.json'); pedidosFila = await resposta.json(); container.innerHTML = '';
            let pendentes = pedidosFila.filter(p => p.status === 'PENDENTE'); if(pendentes.length===0) return container.innerHTML = '<h3 style="color:green; text-align:center;">✅ Tudo limpo!</h3>';
            pendentes.forEach(pedido => {
                let div = document.createElement('div'); div.className = 'resultado-item'; div.innerHTML = `${pedido.orderNum} <br><span style="font-size:12px; color:#555; font-weight:normal;">📦 ${pedido.items?pedido.items.length:0} itens</span>`;
                div.onclick = () => iniciarSeparacaoPedido(pedido); container.appendChild(div);
            });
        } catch (e) { container.innerHTML = '<p color="red">❌ Falha.</p>'; }
    }

    function iniciarSeparacaoPedido(pedido) {
        listaDeSeparacao = []; pedidoAtual = pedido; 
        pedido.items.forEach(item => { if (item.foundProduct) listaDeSeparacao.push({ quantidadeTotal: item.qtd, unidadesLidas: 0, nomePedido: item.nomeOriginal, produtoDb: item.foundProduct, localizacao: item.foundProduct.localizacao || item.foundProduct["Localização"] || "ZZZ", status: 'pendente' }); });
        listaDeSeparacao.sort((a, b) => a.localizacao.localeCompare(b.localizacao)); indexAtualPicking = 0; 
        abrirTela('tela-separacao-foco'); renderizarItemFoco();
    }

    function renderizarItemFoco() {
        if (indexAtualPicking >= listaDeSeparacao.length) { abrirTela('tela-conclusao'); return; }
        let item = listaDeSeparacao[indexAtualPicking]; let skuItem = item.produtoDb.codigo || item.produtoDb["Código"] || "";
        document.getElementById('foco-pedido-info').innerText = `Ped: ${pedidoAtual.orderNum}`; document.getElementById('foco-loc').innerText = `📍 ${item.localizacao}`; document.getElementById('foco-img').src = `../site/img/produtos/${skuItem}.webp`; document.getElementById('foco-nome').innerText = item.nomePedido; 
        document.getElementById('span-faltam').innerText = item.quantidadeTotal - item.unidadesLidas; document.getElementById('span-total').innerText = item.quantidadeTotal;
        let cTicks = document.getElementById('foco-ticks'); cTicks.innerHTML = '';
        for(let i=0; i<item.quantidadeTotal; i++) { let tick = document.createElement('div'); tick.className = 'tick-box'; if(i<item.unidadesLidas) { tick.classList.add('active'); tick.innerHTML='✓'; } cTicks.appendChild(tick); }
        focoProdutosEmpatados = []; document.getElementById('bloco-desempate').classList.add('hidden');
        
        if (item.unidadesLidas === 0) { document.getElementById('bloco-add-foco').classList.add('hidden'); document.getElementById('bloco-teclado-foco').classList.remove('hidden'); resetarTecladoFoco("EAN", 4, "Digite os 4 últimos do EAN Físico"); } 
        else { document.getElementById('bloco-teclado-foco').classList.add('hidden'); document.getElementById('bloco-add-foco').classList.remove('hidden'); }
    }

    function resetarTecladoFoco(modo, limite, titulo) { focoModo = modo; focoLimite = limite; focoDisplayStr = ""; document.getElementById('foco-teclado-titulo').innerText = titulo; atualizarDisplayFoco(); }
    function addFoco(num) { if(focoDisplayStr.length < focoLimite) { focoDisplayStr += num; atualizarDisplayFoco(); } }
    function apagarFoco() { focoDisplayStr = ""; atualizarDisplayFoco(); }
    function atualizarDisplayFoco() { document.getElementById('display-foco').innerText = focoDisplayStr + "-".repeat(focoLimite - focoDisplayStr.length); let btnOk = document.getElementById('btn-ok-foco'); if(focoDisplayStr.length === focoLimite){ btnOk.style.background = "var(--primary)"; btnOk.disabled = false; } else { btnOk.style.background = "#ccc"; btnOk.disabled = true; } }

    function confirmarFoco() {
        if(focoDisplayStr.length !== focoLimite) return;
        let skuCorreto = String(listaDeSeparacao[indexAtualPicking].produtoDb.codigo || listaDeSeparacao[indexAtualPicking].produtoDb["Código"] || "").trim().toUpperCase();
        if(focoModo === "EAN") {
            let achados = bancoDeDados.filter(p => String(p.gtin || p["GTIN/EAN"] || "").replace(/\D/g, "").replace(/^0+/, "").endsWith(focoDisplayStr));
            if (achados.length === 0) { tocarBipe('erro'); mostrarAlerta("❌ EAN não encontrado!", "erro"); apagarFoco(); } 
            else if (achados.length === 1) { if(String(achados[0].codigo || achados[0]["Código"] || "").trim().toUpperCase() === skuCorreto) registrarUnidadeFoco(); else { tocarBipe('erro'); mostrarAlerta("❌ Produto errado!", "erro"); apagarFoco(); } } 
            else { tocarBipe('erro'); mostrarAlerta("⚠️ EAN repetido! Precisamos do SKU.", "aviso"); acionarDesempateFoco(achados); }
        } else if (focoModo === "SKU") {
            let match = focoProdutosEmpatados.find(p => String(p.codigo || p["Código"] || "").trim().toUpperCase().endsWith(focoDisplayStr));
            if(match) { if(String(match.codigo || match["Código"] || "").trim().toUpperCase() === skuCorreto) registrarUnidadeFoco(); else { tocarBipe('erro'); mostrarAlerta("❌ Este não é o produto do pedido!", "erro"); apagarFoco(); } } 
            else { tocarBipe('erro'); mostrarAlerta("❌ SKU inválido.", "erro"); apagarFoco(); }
        }
    }

    function acionarDesempateFoco(lista) {
        focoProdutosEmpatados = lista; let area = document.getElementById('bloco-desempate'); area.innerHTML = '';
        lista.forEach(p => { let sku = String(p.codigo || p["Código"]); area.innerHTML += `<div class="card-desempate"><img src="../site/img/produtos/${sku}.webp" onerror="this.style.display='none'"><div class="desc">Fim: ${sku.slice(-2)}</div></div>`; });
        area.classList.remove('hidden'); resetarTecladoFoco("SKU", 2, "CONFLITO! Digite os 2 últimos do SKU");
    }

    function registrarUnidadeFoco() {
        let item = listaDeSeparacao[indexAtualPicking]; item.unidadesLidas++; 
        if (item.unidadesLidas < item.quantidadeTotal) { tocarBipe('sucesso'); mostrarAlerta(`✅ Registrado!`, "aviso", 800); renderizarItemFoco(); } 
        else { item.status = 'concluido'; tocarBipe('sucesso'); mostrarAlerta(`🎉 Pronto!`, "sucesso", 1200); indexAtualPicking++; renderizarItemFoco(); }
    }

    function imprimirRelatorioSeparacao() {
        let n = pedidoAtual ? (pedidoAtual.orderNum || 'N/A') : 'N/A';
        let iframe = document.getElementById('f-print') || document.createElement('iframe'); iframe.id = 'f-print'; iframe.style.display = 'none'; document.body.appendChild(iframe);
        let doc = iframe.contentWindow.document; doc.open();
        let html = `<html><head><style>@page{margin:0;size:58mm auto;} body{width:48mm;font-family:Arial;font-size:12px;} h3{text-align:center;margin-bottom:5px;border-bottom:1px solid #000;}</style></head><body><h3>Pedido ${n}</h3>`;
        listaDeSeparacao.forEach(i => html += `<div style="border-bottom:1px dashed #000; padding:4px 0;">[OK] ${i.quantidadeTotal}x ${i.nomePedido.substring(0, 18)}</div>`);
        doc.write(html + `<br><br><br></body></html>`); doc.close(); setTimeout(() => iframe.contentWindow.print(), 500);
    }
</script>
</body>
</html>
