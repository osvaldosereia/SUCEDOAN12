<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#111111">
    
    <title>Separador de Pedidos PRO</title>
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        :root { --primary: #4CAF50; --secondary: #2196F3; --danger: #f44336; --warning: #ff9800; --dark: #111; --light: #f4f4f4; }
        body, html { font-family: Arial, sans-serif; background-color: var(--light); margin: 0; padding: 0; height: 100dvh; color: var(--dark); user-select: none; overflow: hidden; }
        
        button { border: none; border-radius: 12px; font-weight: bold; color: white; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.96); }
        .btn-primary { background-color: var(--primary); } .btn-secondary { background-color: var(--secondary); }
        .btn-danger { background-color: var(--danger); } .btn-warning { background-color: var(--warning); color: #111; } .btn-print { background-color: #000; }
        .btn-outline { background-color: transparent; border: 2px solid var(--secondary); color: var(--secondary); }
        
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 15px; height: 100dvh; overflow-y: auto; box-sizing: border-box; }
        .hidden { display: none !important; }
        h1, h2 { text-align: center; margin-top: 0; }
        
        .resultado-item { padding: 15px; margin-bottom: 10px; background-color: #e3f2fd; border: 1px solid #90caf9; border-radius: 12px; font-size: 16px; font-weight: bold; color: #0d47a1; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* ================= TELA DE FOCO ================= */
        /* Padding-bottom garantindo o respiro na base */
        .tela-foco { height: 100dvh; display: flex; flex-direction: column; padding: 8px; box-sizing: border-box; background: #fff; padding-bottom: 35px; }
        
        /* 1. CÂMERA E BOTÃO DE GIRO NO TOPO */
        .bloco-camera-wrapper { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 6px; flex-shrink: 0; }
        
        .camera-quadrada { 
            width: 210px; height: 210px; 
            border-radius: 12px; overflow: hidden; 
            border: 3px solid var(--primary); background: #000; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        #leitor-camera { width: 100%; height: 100%; }
        #leitor-camera video { object-fit: cover; }

        /* 2. LAYOUT DIVIDIDO SUPER COMPACTO */
        .foco-topo-split { display: flex; gap: 6px; margin-bottom: 4px; flex-shrink: 0; }
        
        .col-esq { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
        /* Foto e nomes reduzidos verticalmente */
        .foco-img-container { flex: 1; min-height: 40px; height: 40px; border: 2px solid #ddd; border-radius: 8px; background: #fafafa; display: flex; align-items: center; justify-content: center; position: relative; padding: 2px; }
        .foco-img-container img { max-width: 100%; max-height: 100%; object-fit: contain; mix-blend-mode: multiply; }
        .foco-nome { font-size: 11px; font-weight: bold; text-align: center; line-height: 1.1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; padding: 0 2px; height: 32px; }

        .col-dir { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
        /* Box LOC e SKU ultra reduzidos */
        .box-loc, .box-sku { flex: 1; border-radius: 6px; padding: 1px 2px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .box-loc { background: var(--dark); color: white; border: 2px solid var(--dark); }
        .box-loc .label { font-size: 9px; color: #ccc; font-weight: bold; }
        .box-loc .valor { color: var(--warning); font-size: 16px; font-weight: 900; line-height: 1; margin-top: 0; }
        .box-sku { background: #f4f4f4; border: 2px solid #ccc; color: var(--dark); }
        .box-sku .label { font-size: 9px; color: #666; font-weight: bold; }
        .box-sku .valor { font-size: 14px; font-weight: 900; line-height: 1; margin-top: 0; }
        
        /* 3. PROGRESSO DIDÁTICO */
        .progresso-wrapper { background: #e3f2fd; border: 2px solid #2196F3; border-radius: 6px; padding: 4px; text-align: center; margin-bottom: 6px; flex-shrink: 0; }
        .progresso-numeros { font-size: 13px; font-weight: 900; color: #0d47a1; margin-bottom: 2px; }
        .progresso-barra-fundo { background: #bbdefb; height: 8px; border-radius: 4px; overflow: hidden; width: 100%; }
        .progresso-barra-fill { background: var(--primary); height: 100%; width: 0%; transition: width 0.3s ease-in-out; }

        /* 4. ÁREA DE INTERAÇÃO */
        .area-interacao { flex: 1; display: flex; flex-direction: column; min-height: 0; justify-content: flex-end; }
        
        #bloco-teclado-foco { display: flex; flex-direction: column; justify-content: flex-end; height: 100%; }
        .display-teclado { text-align: center; font-size: 20px; font-weight: 900; letter-spacing: 8px; color: var(--secondary); height: 26px; margin-bottom: 4px; flex-shrink: 0; }
        .display-teclado.erro { color: var(--danger); }
        
        /* TECLADO ACHATADO */
        .grid-teclado { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(4, 32px); gap: 4px; }
        .btn-num { background: #f0f0f0; border: 2px solid #ddd; color: #111; font-size: 18px; font-weight: 900; border-radius: 6px; margin: 0; box-shadow: 0 2px 0 #ccc; display: flex; align-items: center; justify-content: center; }
        .btn-num:active { background: #d0d0d0; box-shadow: none; transform: translateY(2px); }

        /* Alertas Customizados */
        #alerta-customizado { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; padding: 12px; border-radius: 8px; color: white; font-weight: bold; text-align: center; z-index: 10000; display: none; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .alerta-erro { background-color: var(--danger); } .alerta-sucesso { background-color: var(--primary); } .alerta-aviso { background-color: var(--warning); color: #000; }

        .checklist-box { background: #f9f9f9; border: 2px solid #eee; border-radius: 12px; padding: 10px; margin-top: 15px; max-height: 40dvh; overflow-y: auto; text-align: left; }
        .checklist-item { border-bottom: 1px dashed #ccc; padding: 8px 0; font-size: 13px; font-weight: bold; display: flex; justify-content: space-between; }
        .checklist-item:last-child { border-bottom: none; }
    </style>
</head>
<body id="body-app">

<div id="alerta-customizado">Mensagem</div>

<div id="modal-foto-full" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100dvh; background:rgba(0,0,0,0.95); z-index:9999; display:flex; flex-direction:column; padding:15px; box-sizing:border-box;">
    <div style="flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden;">
        <img id="img-full" src="" style="max-width:100%; max-height:100%; object-fit:contain;">
    </div>
    <button class="btn-danger" style="padding:20px; font-size:18px; margin-top:15px; font-weight:900;" onclick="fecharFotoTelaCheia()">❌ FECHAR FOTO</button>
</div>

<div id="app-ui" style="height: 100dvh;">
    <div class="container" id="tela-inicial">
        <h1>🛒 Separador (Picking)</h1>
        <p id="status-db" style="text-align:center; font-weight:bold; color:#721c24;">⏳ Carregando banco...</p>
        <button id="btn-iniciar" class="btn-primary hidden" style="padding:25px; font-size:20px; width:100%; margin-top:30px; box-shadow: 0 6px 0 #388E3C;" onclick="carregarPedidosFila();">📋 VER PEDIDOS</button>
    </div>

    <div class="container hidden" id="tela-lista-pedidos">
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="btn-danger" style="padding:15px; flex: 1; font-size: 14px;" onclick="abrirTela('tela-inicial')">⬅️ Voltar</button>
            <button class="btn-secondary" style="padding:15px; flex: 1; font-size: 14px;" onclick="carregarPedidosFila()">🔄 Atualizar</button>
        </div>
        <h2>Fila de Separação</h2>
        <div id="area-lista-pedidos" style="margin-top: 15px;"></div>
    </div>

    <div class="tela-foco hidden" id="tela-separacao-foco">
        
        <div id="bloco-camera" class="bloco-camera-wrapper hidden">
            <div id="container-camera" class="camera-quadrada">
                <div id="leitor-camera"></div>
            </div>
            <button class="btn-secondary" style="padding: 12px; font-size: 20px; border-radius: 50%; box-shadow: 0 4px 6px rgba(0,0,0,0.3);" onclick="girarCamera()">🔄</button>
        </div>

        <div class="foco-topo-split">
            <div class="col-esq">
                <div class="foco-img-container" onclick="abrirFotoTelaCheia()">
                    <div class="icone-lupa">🔍</div>
                    <img id="foco-img" src="">
                </div>
                <div class="foco-nome" id="foco-nome">Nome do Produto em ate 3 linhas</div>
            </div>
            
            <div class="col-dir">
                <div class="box-loc">
                    <div class="label">Localização</div>
                    <div class="valor" id="foco-loc">A1</div>
                </div>
                <div class="box-sku">
                    <div class="label">SKU / Cód</div>
                    <div class="valor" id="foco-sku">---</div>
                </div>
            </div>
        </div>

        <div class="progresso-wrapper">
            <div class="progresso-numeros" id="progresso-texto">0 de 0 Lidos</div>
            <div class="progresso-barra-fundo">
                <div class="progresso-barra-fill" id="progresso-fill"></div>
            </div>
        </div>

        <div style="display: flex; gap: 6px; margin-bottom: 4px; flex-shrink: 0;">
            <button id="btn-anterior" class="btn-secondary hidden" style="padding:8px 12px; font-size:14px;" onclick="voltarProdutoAnterior()">⬅️</button>
            <button class="btn-warning" style="flex:1; padding:8px; font-size:12px;" onclick="mandarParaFimDaFila()">⏭️ Pular</button>
            <button id="btn-alternar-modo" class="btn-outline" style="flex:1; padding:8px; font-size:12px;" onclick="alternarModoLeitura()">⌨️ EAN</button>
        </div>

        <div class="area-interacao">
            
            <div id="bloco-teclado-foco" class="hidden">
                <div id="display-foco" class="display-teclado"></div>
                <div class="grid-teclado">
                    <div class="btn-num" onclick="addFoco(1)">1</div>
                    <div class="btn-num" onclick="addFoco(2)">2</div>
                    <div class="btn-num" onclick="addFoco(3)">3</div>
                    <div class="btn-num" onclick="addFoco(4)">4</div>
                    <div class="btn-num" onclick="addFoco(5)">5</div>
                    <div class="btn-num" onclick="addFoco(6)">6</div>
                    <div class="btn-num" onclick="addFoco(7)">7</div>
                    <div class="btn-num" onclick="addFoco(8)">8</div>
                    <div class="btn-num" onclick="addFoco(9)">9</div>
                    <button class="btn-danger" style="font-size:12px; font-weight:bold; border-radius:6px; margin:0;" onclick="if(confirm('Sair da separação?')) abrirTela('tela-inicial');">❌ Sair</button>
                    <div class="btn-num" onclick="addFoco(0)">0</div>
                    <div style="visibility:hidden;"></div> 
                </div>
            </div>

            <div id="bloco-sem-ean" class="hidden" style="display:flex; flex-direction:column; justify-content:center; height:100%;">
                <button class="btn-primary" style="width:100%; flex:1; font-size:16px; border-radius:12px; font-weight:900; box-shadow: 0 4px 0 #388E3C; margin-bottom: 8px;" onclick="registrarUnidadeFoco()">
                    ➕ ADICIONAR (SEM EAN)
                </button>
            </div>

            <div id="bloco-concluido" class="hidden" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; background:#e8f5e9; border:2px solid var(--primary); border-radius:12px; padding:10px; box-sizing:border-box;">
                <p style="text-align:center; font-size:16px; font-weight:bold; color:var(--primary); margin:0 0 10px 0;">✅ Item Finalizado</p>
                <button class="btn-danger" style="width:100%; padding:10px; font-size:13px;" onclick="refazerLeituraItem()">🔄 Refazer Contagem</button>
            </div>

        </div>
    </div>

    <div class="container hidden" id="tela-conclusao">
        <h2 style="color:var(--primary); font-size: 24px;">🎉 Finalizado!</h2>
        <div class="checklist-box" id="area-checklist"></div>
        <button class="btn-print" style="padding: 20px; font-size: 18px; width:100%; margin-top:15px;" onclick="imprimirEtiquetaBluetooth()">🖨️ Imprimir Etiqueta</button>
        <button class="btn-secondary" style="padding: 15px; font-size: 16px; width:100%; margin-top:10px;" onclick="abrirTela('tela-inicial')">✅ Voltar ao Menu</button>
    </div>
</div>

<script>
    let bancoDeDados = []; let pedidosFila = []; let listaDeSeparacao = []; let indexAtualPicking = 0; let pedidoAtual = null; let audioCtx = null;
    let focoDisplayStr = ""; let focoLimite = 4;
    let html5QrCode = null; 
    let modoLeituraPadrao = 'CAMERA'; 
    let isProcessingScan = false;
    let cameraAtual = "environment"; 

    window.onload = async function() {
        try { 
            const resposta = await fetch('../site/bancodedados.json'); bancoDeDados = await resposta.json(); 
            let modificacoesLocais = JSON.parse(localStorage.getItem('estoque_modificacoes') || '{}');
            bancoDeDados.forEach(p => { let sku = p.codigo || p["Código"]; if(sku && modificacoesLocais[sku]) Object.assign(p, modificacoesLocais[sku]); });
            document.getElementById('status-db').innerText = `✅ Banco Preparado`; document.getElementById('status-db').style.color = "green";
            document.getElementById('btn-iniciar').classList.remove('hidden');
        } catch (erro) { document.getElementById('status-db').innerText = "❌ Erro ao ler Banco Local."; }
    };

    function abrirTela(id) { 
        ['tela-inicial', 'tela-lista-pedidos', 'tela-separacao-foco', 'tela-conclusao'].forEach(t => document.getElementById(t).classList.add('hidden')); 
        document.getElementById(id).classList.remove('hidden'); 
        if(id !== 'tela-separacao-foco') fecharCamera(); 
    }
    
    function mostrarAlerta(msg, tipo = 'sucesso') { 
        let a = document.getElementById('alerta-customizado'); a.innerText = msg; a.className = ''; 
        if(tipo === 'erro') a.classList.add('alerta-erro'); else if(tipo === 'aviso') a.classList.add('alerta-aviso'); else a.classList.add('alerta-sucesso'); 
        a.style.display = 'block'; setTimeout(() => a.style.display = 'none', 2000); 
    }
    
    function inicializarAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function tocarBipe(tipo) { 
        if (!audioCtx) return; try { 
            const osc = audioCtx.createOscillator(); const ganho = audioCtx.createGain(); osc.connect(ganho); ganho.connect(audioCtx.destination); 
            if(tipo === 'sucesso'){ osc.type = 'sine'; osc.frequency.setValueAtTime(900, audioCtx.currentTime); ganho.gain.setValueAtTime(0.5, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.1); } 
            else { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(250, audioCtx.currentTime); ganho.gain.setValueAtTime(0.5, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.5); } 
        } catch(e){} 
    }

    function abrirFotoTelaCheia() {
        let imgSrc = document.getElementById('foco-img').src;
        if(imgSrc && !imgSrc.includes("Sem%20Foto")) {
            document.getElementById('img-full').src = imgSrc;
            document.getElementById('modal-foto-full').classList.remove('hidden');
        }
    }
    function fecharFotoTelaCheia() { document.getElementById('modal-foto-full').classList.add('hidden'); }

    async function carregarPedidosFila() {
        inicializarAudio(); abrirTela('tela-lista-pedidos');
        let container = document.getElementById('area-lista-pedidos'); container.innerHTML = '<p style="text-align:center;">⏳ Buscando...</p>';
        try {
            const urlSemCache = '../site/pedidos_fila.json?nocache=' + new Date().getTime();
            const resposta = await fetch(urlSemCache); pedidosFila = await resposta.json(); container.innerHTML = '';
            let pendentes = pedidosFila.filter(p => p.status === 'PENDENTE'); 
            if(pendentes.length === 0) return container.innerHTML = '<h3 style="color:green; text-align:center;">✅ Fila Vazia!</h3>';
            
            pendentes.forEach(pedido => {
                let numeroPedido = pedido.orderNum || 'Sem Número';
                let qtdItens = pedido.items ? pedido.items.length : 0;
                let div = document.createElement('div'); div.className = 'resultado-item'; 
                div.innerHTML = `Pedido: ${numeroPedido} <br><span style="font-size:13px; color:#555; font-weight:normal;">📦 ${qtdItens} Produtos</span>`;
                div.onclick = () => { if (qtdItens > 0) iniciarSeparacaoPedido(pedido); else mostrarAlerta("❌ Erro: Pedido sem itens!", "erro"); };
                container.appendChild(div);
            });
        } catch (e) { container.innerHTML = '<p style="color:red; text-align:center;">❌ Falha de conexão.</p>'; }
    }

    function iniciarSeparacaoPedido(pedido) {
        listaDeSeparacao = []; pedidoAtual = pedido; 
        pedido.items.forEach(item => { if (item.foundProduct) listaDeSeparacao.push({ quantidadeTotal: item.qtd, unidadesLidas: 0, nomePedido: item.nomeOriginal, produtoDb: item.foundProduct, localizacao: item.foundProduct.localizacao || item.foundProduct["Localização"] || "SEM LOC", status: 'pendente' }); });
        listaDeSeparacao.sort((a, b) => a.localizacao.localeCompare(b.localizacao)); indexAtualPicking = 0; 
        modoLeituraPadrao = 'CAMERA';
        abrirTela('tela-separacao-foco'); renderizarItemFoco();
    }

    function alternarModoLeitura() {
        modoLeituraPadrao = (modoLeituraPadrao === 'CAMERA') ? 'TECLADO' : 'CAMERA';
        renderizarItemFoco();
    }

    function girarCamera() {
        cameraAtual = (cameraAtual === "environment") ? "user" : "environment";
        fecharCamera();
        setTimeout(() => { abrirCamera(); }, 300);
    }

    function renderizarItemFoco() {
        if (indexAtualPicking >= listaDeSeparacao.length) { finalizarPedido(); return; }
        
        let item = listaDeSeparacao[indexAtualPicking]; 
        let skuItem = item.produtoDb.codigo || item.produtoDb["Código"] || "";
        
        let rawEan = String(item.produtoDb.gtin || item.produtoDb["GTIN/EAN"] || "").replace(/\D/g, "");
        let hasEan = rawEan.length > 0;

        document.getElementById('foco-loc').innerText = `${item.localizacao}`; 
        document.getElementById('foco-sku').innerText = `${skuItem}`;
        document.getElementById('foco-nome').innerText = item.nomePedido; 
        
        let imgTag = document.getElementById('foco-img');
        imgTag.src = `../site/img/produtos/${skuItem}.webp`; 
        imgTag.onerror = function() { this.src='data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22100%25%22%20height%3D%22200%22%20style%3D%22background%3A%23f4f4f4%22%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20font-family%3D%22sans-serif%22%20font-size%3D%2216%22%20fill%3D%22%23aaa%22%3ESem%20Foto%3C%2Ftext%3E%3C%2Fsvg%3E'; };
        
        let btnAnterior = document.getElementById('btn-anterior');
        if (indexAtualPicking > 0) { btnAnterior.classList.remove('hidden'); } else { btnAnterior.classList.add('hidden'); }

        let btnModo = document.getElementById('btn-alternar-modo');
        if (modoLeituraPadrao === 'CAMERA') { btnModo.innerHTML = "⌨️ EAN"; } else { btnModo.innerHTML = "📷 Câmera"; }

        let textoProgresso = document.getElementById('progresso-texto');
        let barraProgresso = document.getElementById('progresso-fill');
        textoProgresso.innerText = `${item.unidadesLidas} de ${item.quantidadeTotal} Lidos`;
        barraProgresso.style.width = `${(item.unidadesLidas / item.quantidadeTotal) * 100}%`;
        
        document.getElementById('bloco-teclado-foco').classList.add('hidden');
        document.getElementById('bloco-sem-ean').classList.add('hidden');
        document.getElementById('bloco-concluido').classList.add('hidden');

        if (item.status === 'concluido') {
            fecharCamera();
            document.getElementById('bloco-camera').classList.add('hidden');
            btnModo.classList.add('hidden');
            document.getElementById('bloco-concluido').classList.remove('hidden');
        } else if (!hasEan) {
            fecharCamera();
            document.getElementById('bloco-camera').classList.add('hidden');
            btnModo.classList.add('hidden'); 
            document.getElementById('bloco-sem-ean').classList.remove('hidden');
        } else {
            btnModo.classList.remove('hidden');
            if (modoLeituraPadrao === 'CAMERA') {
                document.getElementById('bloco-camera').classList.remove('hidden');
                if (!html5QrCode || !html5QrCode.isScanning) { abrirCamera(); }
            } else {
                fecharCamera();
                document.getElementById('bloco-camera').classList.add('hidden');
                document.getElementById('bloco-teclado-foco').classList.remove('hidden');
                resetarTecladoFoco();
            }
        }
    }

    function mandarParaFimDaFila() {
        if (listaDeSeparacao.length - 1 === indexAtualPicking) { mostrarAlerta("Este já é o último produto!", "aviso"); return; }
        let itemAtual = listaDeSeparacao.splice(indexAtualPicking, 1)[0]; 
        listaDeSeparacao.push(itemAtual); 
        renderizarItemFoco(); 
    }

    function voltarProdutoAnterior() {
        if (indexAtualPicking > 0) { indexAtualPicking--; renderizarItemFoco(); }
    }

    function refazerLeituraItem() {
        listaDeSeparacao[indexAtualPicking].unidadesLidas = 0;
        listaDeSeparacao[indexAtualPicking].status = 'pendente';
        renderizarItemFoco();
    }

    // ================== CÂMERA OFICIAL (COM FILTROS OTIMIZADOS) ==================
    function abrirCamera() {
        if (!html5QrCode) { html5QrCode = new Html5Qrcode("leitor-camera"); }
        
        // DICA DE OURO: Limitamos aos formatos 1D (Barras comuns) para o celular processar muito mais rápido
        const formatosPermitidos = [
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.EAN_8,
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.UPC_A,
            Html5QrcodeSupportedFormats.UPC_E
        ];

        // Área de foco agora é um retângulo largo, ideal para códigos de barras EAN
        const config = { 
            fps: 15, 
            qrbox: { width: 210, height: 120 },
            formatsToSupport: formatosPermitidos 
        };

        if (cameraAtual === "user") {
            document.getElementById("container-camera").style.transform = "scaleX(-1)";
        } else {
            document.getElementById("container-camera").style.transform = "none";
        }

        html5QrCode.start(
            { facingMode: cameraAtual }, 
            config,
            (decodedText, decodedResult) => {
                if (isProcessingScan) return;
                isProcessingScan = true;

                let eanLidoLimpo = decodedText.replace(/\D/g, "");
                if (eanLidoLimpo.length >= 4) {
                    focoDisplayStr = eanLidoLimpo.slice(-4); 
                    avaliarFoco(); 
                } else {
                    tocarBipe('erro');
                    mostrarAlerta("❌ EAN Inválido.", "erro");
                }

                setTimeout(() => { isProcessingScan = false; }, 1500);
            },
            (errorMessage) => {} 
        ).catch((err) => {
            mostrarAlerta("⚠️ Câmera bloqueada. Use Digitar EAN.", "erro");
            alternarModoLeitura(); 
        });
    }

    function fecharCamera() {
        if (html5QrCode && html5QrCode.isScanning) { html5QrCode.stop().then(() => {}).catch(err => {}); }
    }

    function resetarTecladoFoco() { focoDisplayStr = ""; document.getElementById('display-foco').classList.remove('erro'); atualizarDisplayFoco(); }

    function addFoco(num) { 
        if(focoDisplayStr.length < focoLimite) { 
            focoDisplayStr += num; atualizarDisplayFoco(); 
            if(focoDisplayStr.length === focoLimite) { setTimeout(avaliarFoco, 100); }
        } 
    }

    function apagarFocoErro(msgAlerta) {
        tocarBipe('erro'); mostrarAlerta(msgAlerta, "erro");
        document.getElementById('display-foco').classList.add('erro');
        setTimeout(() => { resetarTecladoFoco(); }, 600);
    }
    
    function atualizarDisplayFoco() { document.getElementById('display-foco').innerText = focoDisplayStr + "-".repeat(focoLimite - focoDisplayStr.length); }

    function avaliarFoco() {
        let skuCorreto = String(listaDeSeparacao[indexAtualPicking].produtoDb.codigo || listaDeSeparacao[indexAtualPicking].produtoDb["Código"] || "").trim().toUpperCase();
        let achados = bancoDeDados.filter(p => String(p.gtin || p["GTIN/EAN"] || "").replace(/\D/g, "").replace(/^0+/, "").endsWith(focoDisplayStr));
        
        if (achados.length === 0) { 
            apagarFocoErro("❌ EAN não encontrado!"); 
        } else {
            let produtoCerto = achados.find(p => String(p.codigo || p["Código"] || "").trim().toUpperCase() === skuCorreto);
            if (produtoCerto) { 
                registrarUnidadeFoco(); 
            } else { 
                apagarFocoErro("❌ Produto Errado!"); 
            }
        }
    }

    function registrarUnidadeFoco() {
        let item = listaDeSeparacao[indexAtualPicking]; 
        item.unidadesLidas++; 
        tocarBipe('sucesso'); 
        
        if (item.unidadesLidas >= item.quantidadeTotal) {
            item.status = 'concluido'; 
            indexAtualPicking++; 
            mostrarAlerta("✅ Próximo produto!", "sucesso");
        } else {
            mostrarAlerta(`✅ ${item.unidadesLidas} lidos! Leia o próximo.`, "sucesso");
            focoDisplayStr = "";
        }
        
        renderizarItemFoco(); 
    }

    function finalizarPedido() {
        fecharCamera();
        let areaCheck = document.getElementById('area-checklist'); areaCheck.innerHTML = '';
        listaDeSeparacao.forEach(i => { areaCheck.innerHTML += `<div class="checklist-item"><span>${i.nomePedido.substring(0,25)}...</span> <span>${i.quantidadeTotal}x</span></div>`; });
        abrirTela('tela-conclusao');
    }

    function imprimirEtiquetaBluetooth() {
        let n = pedidoAtual ? (pedidoAtual.orderNum || 'N/A') : 'N/A'; let dataHora = new Date().toLocaleString('pt-BR');
        let iframe = document.getElementById('f-print') || document.createElement('iframe'); 
        iframe.id = 'f-print'; iframe.style.display = 'none'; document.body.appendChild(iframe);
        let doc = iframe.contentWindow.document; doc.open();
        
        let html = `<html><head><style>@page { margin: 0; size: 48mm auto; } body { width: 48mm; font-family: 'Courier New', monospace; font-size: 11px; margin: 0; padding: 2mm 0; color: #000; text-align: center; } h2 { font-size: 18px; font-weight: 900; margin: 0 0 5px 0; border-top: 2px solid #000; border-bottom: 2px solid #000; padding: 5px 0; } .data { font-size: 10px; margin-bottom: 10px; font-weight: bold; } .item { text-align: left; border-bottom: 1px dashed #000; padding: 4px 0; display: flex; justify-content: space-between; font-weight: bold; } .nome-item { width: 80%; display: inline-block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; } .qtd-item { width: 20%; text-align: right; font-size: 14px; } .fim { margin-top: 15px; text-align: center; font-size: 12px; border-bottom: 2px dashed #000; padding-bottom: 20px;} </style></head><body><h2>PEDIDO<br>${n}</h2><div class="data">Expedição:<br>${dataHora}</div><div style="border-top: 1px solid #000; margin-bottom: 5px;"></div><div style="text-align:left; font-weight:900; margin-bottom:2px;">Qtd  - Produto</div>`;
            
        listaDeSeparacao.forEach(i => { html += `<div class="item"><span class="qtd-item">${i.quantidadeTotal}x</span> <span class="nome-item" style="margin-left:5px;">${i.nomePedido}</span></div>`; });
        doc.write(html + `<div class="fim">SEPARAÇÃO CONCLUÍDA</div><br><br><br></body></html>`); doc.close(); 
        setTimeout(() => iframe.contentWindow.print(), 800);
    }
</script>
