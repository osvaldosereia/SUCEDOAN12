<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estoque Profissional</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        /* --- ESTILOS GERAIS E CORES --- */
        :root {
            --primary: #4CAF50; --secondary: #2196F3;
            --danger: #f44336; --warning: #ff9800;
            --dark: #333; --light: #f4f4f4;
        }
        
        body, html { font-family: Arial, sans-serif; background-color: var(--light); margin: 0; padding: 0; height: 100%; color: var(--dark); }
        h1, h2, h3 { text-align: center; margin-top: 0; }
        
        button { display: block; width: 100%; padding: 15px; margin: 10px 0; font-size: 16px; font-weight: bold; color: white; background-color: var(--primary); border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s; }
        button:active { transform: translateY(2px); }
        .btn-secondary { background-color: var(--secondary); }
        .btn-danger { background-color: var(--danger); }
        .btn-warning { background-color: var(--warning); color: #000; }
        .btn-print { background-color: #000; }
        
        .container { max-width: 600px; margin: 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #555;}
        .form-group input, .form-group textarea { width: 100%; padding: 15px; font-size: 16px; border: 2px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        
        .resultado-item { padding: 15px; margin-bottom: 8px; background-color: #e3f2fd; border: 1px solid #90caf9; border-radius: 8px; font-size: 16px; font-weight: bold; color: #0d47a1; cursor: pointer; }
        .resultado-dica { font-size: 13px; color: #555; font-weight: normal; margin-top: 4px; }
        
        .linha-dupla { display: flex; gap: 10px; }
        .linha-dupla .form-group { flex: 1; }

        .hidden { display: none !important; }

        /* --- MENSAGENS E TOASTS --- */
        #alerta-customizado { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; padding: 15px; border-radius: 8px; color: white; font-weight: bold; text-align: center; z-index: 9999; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: none; font-size: 16px; }
        .alerta-erro { background-color: var(--danger); }
        .alerta-sucesso { background-color: var(--primary); }
        .alerta-aviso { background-color: var(--warning); color: #000; }

        /* --- MODO FOCO (SEPARAÇÃO SEM ROLAGEM) --- */
        .tela-foco { height: 100vh; display: flex; flex-direction: column; overflow: hidden; padding: 10px; box-sizing: border-box; background: #222; }
        .camera-box { flex: 1; max-height: 45%; border-radius: 8px; overflow: hidden; position: relative; background: #000; border: 2px solid #555; }
        .info-box { flex: 1; background: white; border-radius: 8px; padding: 15px; margin-top: 10px; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; text-align: center; }
        .info-box img { max-height: 120px; object-fit: contain; border-radius: 8px; }
        .contador-unidades { font-size: 28px; font-weight: 900; color: var(--secondary); background: #e3f2fd; padding: 10px 20px; border-radius: 12px; border: 2px solid var(--secondary); }
        .badge-loc { background: var(--dark); color: white; padding: 5px 10px; border-radius: 15px; font-size: 14px; font-weight: bold; }

        /* --- ÁREAS DE IMPRESSÃO TÉRMICA (RAWBT / 58mm) --- */
        @media print {
            /* 1. Esconde a interface do aplicativo (telas, botões, alertas) */
            .container, .tela-foco, #alerta-customizado { 
                display: none !important; 
            }
            
            /* 2. Configura a página base limpa, fundo branco e texto preto forte */
            body { 
                margin: 0; padding: 0; 
                background-color: #ffffff !important; 
                color: #000000 !important; 
            }
            
            /* 3. A área que vai ser impressa volta ao fluxo normal (sem absolute) */
            .print-active { 
                display: block !important; 
                position: relative !important; 
                width: 100% !important; /* O RawBT já adapta para a bobina */
                margin: 0; padding: 0; 
                font-family: Arial, sans-serif; 
                color: #000000 !important;
                text-align: center;
            }
            
            /* --- Etiqueta de Gôndola --- */
            .destaque-codigo { font-size: 32px !important; font-weight: 900 !important; margin: 0 0 5px 0; letter-spacing: 1px; color: #000 !important; }
            .print-nome-etiqueta { font-size: 16px !important; font-weight: bold !important; text-transform: uppercase; margin-bottom: 10px; color: #000 !important; }
            
            /* Uso de Flexbox para organizar Esquerda/Direita perfeitamente no RawBT */
            .info-linha { 
                display: flex !important; 
                justify-content: space-between !important; 
                align-items: center !important;
                font-size: 14px !important; 
                font-weight: bold !important; 
                border-bottom: 1px dashed #000 !important; 
                padding: 4px 0 !important; 
                margin: 0 !important;
            }
            .info-linha span { font-weight: normal !important; }
            
            /* --- Relatório de Separação --- */
            .print-header { font-size: 16px !important; font-weight: bold !important; text-transform: uppercase; margin-bottom: 10px; border-bottom: 2px solid #000 !important; padding-bottom: 5px; }
            .print-report-item { text-align: left !important; font-size: 14px !important; border-bottom: 1px dashed #000 !important; padding: 6px 0 !important; font-weight: bold !important; }
        }
    </style>
</head>
<body>

<div id="alerta-customizado">Mensagem aqui</div>

<div class="container" id="tela-inicial">
    <h1>📦 Sistema de Estoque</h1>
    <p id="status-db" style="text-align:center; font-weight:bold; color:#721c24;">⏳ Carregando banco de dados...</p>
    
    <div id="area-upload" class="hidden">
        <input type="file" id="file-json" accept=".json" style="display:block; margin:auto; margin-bottom: 15px;">
    </div>

    <div id="botoes-menu" class="hidden">
        <button style="padding: 25px; font-size: 20px;" onclick="abrirTela('tela-etiquetas')">🏷️ Gestão de Etiquetas</button>
        <button class="btn-secondary" style="padding: 25px; font-size: 20px;" onclick="abrirTela('tela-separacao-input')">🛒 Iniciar Separação</button>
    </div>
</div>

<div class="container hidden" id="tela-etiquetas">
    <button class="btn-danger" onclick="abrirTela('tela-inicial')">⬅️ Voltar ao Menu</button>
    
    <div id="area-busca-etiqueta">
        <h2>🔍 Buscar Produto</h2>
        <div class="form-group">
            <input type="text" id="inp-busca" placeholder="Digite Nome, SKU ou EAN..." oninput="buscarPorNome()">
        </div>
        <button onclick="iniciarLeitor('busca')" class="btn-secondary" style="margin-bottom: 20px;">📷 Ler Código de Barras</button>
        
        <div id="lista-resultados"></div>
    </div>

    <div id="product-form" class="hidden">
        <button class="btn-danger" style="margin-bottom: 15px;" onclick="fecharCardProduto()">❌ Fechar Produto</button>
        
        <img id="img-foto" src="" style="width: 100%; max-height: 250px; object-fit: contain; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px;">
        
        <div class="linha-dupla">
            <div class="form-group"><label>SKU (Cód Interno)</label><input type="text" id="inp-codigo"></div>
            <div class="form-group"><label>EAN (Cód Barras)</label><input type="text" id="inp-ean"></div>
        </div>
        
        <div class="form-group"><label>Nome do Produto</label><input type="text" id="inp-nome"></div>
        
        <div class="linha-dupla">
            <div class="form-group"><label>Estoque</label><input type="text" id="inp-estoque"></div>
            <div class="form-group"><label>Validade</label><input type="text" id="inp-validade"></div>
        </div>

        <div class="linha-dupla">
            <div class="form-group"><label>Gôndola</label><input type="text" id="inp-gondola" placeholder="Ex: Corredor 3"></div>
            <div class="form-group"><label>Prateleira</label><input type="text" id="inp-prateleira" placeholder="Ex: Baixa"></div>
        </div>

        <div class="form-group"><label>Preço de Venda (R$)</label><input type="text" id="inp-venda"></div>
        
        <button class="btn-print" onclick="imprimirEtiquetaGondola()" style="padding: 20px; font-size: 18px;">🖨️ Imprimir Etiqueta (58mm)</button>
    </div>
</div>

<div class="container hidden" id="tela-camera-busca">
    <h2>📷 Lendo Código...</h2>
    <div id="reader-busca" style="width: 100%; margin-bottom: 20px;"></div>
    <button class="btn-danger" onclick="pararLeitor('tela-etiquetas')">Cancelar</button>
</div>

<div class="container hidden" id="tela-separacao-input">
    <button class="btn-danger" onclick="abrirTela('tela-inicial')">⬅️ Voltar ao Menu</button>
    <h2>📝 Colar Pedido</h2>
    <div class="form-group"><textarea id="texto-pedido" rows="10" placeholder="Cole aqui a lista do WhatsApp..."></textarea></div>
    <button class="btn-secondary" onclick="processarPedidoEPuxarFoco()">🚀 Iniciar Modo de Separação</button>
</div>

<div class="tela-foco hidden" id="tela-separacao-foco">
    <div class="camera-box"><div id="reader-picking" style="width: 100%; height: 100%;"></div></div>
    <div class="info-box">
        <span class="badge-loc" id="foco-loc">📍 Gôndola: A1</span>
        <h3 id="foco-nome" style="margin: 5px 0;">Nome do Produto</h3>
        <img id="foco-img" src="" alt="Produto" onerror="this.style.display='none'">
        <div class="contador-unidades" id="foco-contador">0 / 4 Separados</div>
        <div style="display:flex; gap:10px; width:100%;">
            <button class="btn-danger" onclick="cancelarPicking()">Encerrar</button>
            <button class="btn-secondary" onclick="pularItemAtual()">Pular (Falta)</button>
        </div>
    </div>
</div>

<div class="container hidden" id="tela-conclusao">
    <h2>🎉 Separação Concluída!</h2>
    <button class="btn-print" onclick="imprimirRelatorioSeparacao()" style="padding: 20px;">🖨️ Imprimir Relatório (58mm)</button>
    <button class="btn-secondary" onclick="abrirTela('tela-inicial')">🏠 Voltar ao Início</button>
</div>

<div id="print-area-etiqueta" class="hidden">
    <div style="font-size: 12px; margin-bottom: -5px; color: #555;">SKU:</div>
    <div id="print-cod" class="destaque-codigo"></div>
    <div id="print-nome" class="print-nome-etiqueta"></div>
    
    <div class="info-linha"><strong>EAN:</strong> <span id="print-ean"></span></div>
    <div class="info-linha"><strong>VAL:</strong> <span id="print-validade"></span></div>
    <div class="info-linha"><strong>GÔNDOLA:</strong> <span id="print-gondola"></span></div>
    <div class="info-linha"><strong>PRATELEIRA:</strong> <span id="print-prateleira"></span></div>
</div>

<div id="print-area-relatorio" class="hidden">
    <div class="print-header">Relatório de Separação</div>
    <div style="text-align:center; font-size:12px; margin-bottom:10px;" id="data-relatorio"></div>
    <div id="lista-print-relatorio"></div>
</div>

<script>
    let bancoDeDados = [];
    let html5QrCode = null;
    let listaDeSeparacao = [];
    let indexAtualPicking = 0;

    // --- CARREGAMENTO INICIAL ---
    window.onload = async function() {
        try {
            const resposta = await fetch('../site/bancodedados.json');
            bancoDeDados = await resposta.json();
            liberarSistema();
        } catch (erro) {
            document.getElementById('area-upload').classList.remove('hidden');
        }
    };

    function liberarSistema() {
        document.getElementById('status-db').innerText = "✅ Banco Conectado!";
        document.getElementById('status-db').style.color = "green";
        document.getElementById('botoes-menu').classList.remove('hidden');
    }

    function abrirTela(idTela) {
        // Esconde todas as telas principais
        ['tela-inicial', 'tela-etiquetas', 'tela-camera-busca', 'tela-separacao-input', 'tela-separacao-foco', 'tela-conclusao'].forEach(id => {
            document.getElementById(id).classList.add('hidden');
        });
        
        if(idTela !== 'tela-separacao-foco' && idTela !== 'tela-camera-busca') pararLeitor();
        document.getElementById(idTela).classList.remove('hidden');
    }

    function mostrarAlerta(mensagem, tipo = 'sucesso', tempo = 3000) {
        let alerta = document.getElementById('alerta-customizado');
        alerta.innerText = mensagem;
        alerta.className = ''; 
        if(tipo === 'erro') alerta.classList.add('alerta-erro');
        else if(tipo === 'aviso') alerta.classList.add('alerta-aviso');
        else alerta.classList.add('alerta-sucesso');
        
        alerta.style.display = 'block';
        setTimeout(() => { alerta.style.display = 'none'; }, tempo);
    }

    // ==================== LÓGICA: GESTÃO DE ETIQUETAS ==================== //

    function buscarPorNome() {
        let termo = document.getElementById('inp-busca').value.toLowerCase().trim();
        let lista = document.getElementById('lista-resultados');
        lista.innerHTML = ''; 
        
        // Exige pelo menos 3 caracteres para iniciar a busca (evita travar o app)
        if (termo.length < 3) return; 

        let encontrados = bancoDeDados.filter(p => {
            let nomeDb = String(p.nome || p["Descrição"] || "").toLowerCase();
            let codDb = String(p.codigo || p["Código"] || "").toLowerCase(); // SKU
            let eanDb = String(p.gtin || p["GTIN/EAN"] || "").replace(/\D/g, ""); // EAN
            
            return nomeDb.includes(termo) || codDb.includes(termo) || eanDb.includes(termo);
        });

        if (encontrados.length === 0) {
            lista.innerHTML = '<div style="text-align:center; color:red; padding:10px;">Nenhum produto encontrado.</div>';
            return;
        }

        encontrados.slice(0, 10).forEach(p => {
            let nome = p.nome || p["Descrição"] || "Sem Nome";
            let sku = p.codigo || p["Código"] || "";
            let preco = p.preco || p["Preço"] || "0,00";

            let div = document.createElement('div');
            div.className = 'resultado-item';
            div.innerHTML = `${nome} <div class="resultado-dica">SKU: ${sku} | R$ ${preco}</div>`;
            div.onclick = function() { abrirCardProduto(p); };
            lista.appendChild(div);
        });
    }

    function abrirCardProduto(produto) {
        const sku = produto.codigo || produto["Código"] || "";
        
        // Tenta preencher prateleira e gondola, se já existirem separadas no seu banco, ótimo.
        // Se só existir "localizacao", joga tudo na Gôndola por padrão.
        let locGeral = produto.localizacao || produto["Localização"] || "";
        let gondola = produto.gondola || produto["Gôndola"] || locGeral; 
        let prateleira = produto.prateleira || produto["Prateleira"] || "";

        document.getElementById('inp-codigo').value = sku;
        document.getElementById('inp-nome').value = produto.nome || produto["Descrição"] || "";
        document.getElementById('inp-ean').value = String(produto.gtin || produto["GTIN/EAN"] || "").replace(/[^0-9]/g, "");
        document.getElementById('inp-estoque').value = produto.estoque || produto["Estoque"] || "";
        document.getElementById('inp-validade').value = produto.validade || produto["Data Validade"] || "";
        document.getElementById('inp-venda').value = produto.preco || produto["Preço"] || "";
        
        // Novos Campos
        document.getElementById('inp-gondola').value = gondola;
        document.getElementById('inp-prateleira').value = prateleira;
        
        // Tratamento da Foto
        const imgElement = document.getElementById('img-foto');
        imgElement.style.display = 'block'; 
        imgElement.src = `../site/img/produtos/${sku}.webp`;
        imgElement.onerror = function() { this.style.display = 'none'; };
        
        // Esconde a busca, mostra o Card
        document.getElementById('area-busca-etiqueta').classList.add('hidden');
        document.getElementById('product-form').classList.remove('hidden');
    }

    function fecharCardProduto() {
        document.getElementById('product-form').classList.add('hidden');
        document.getElementById('area-busca-etiqueta').classList.remove('hidden');
        document.getElementById('inp-busca').value = '';
        document.getElementById('lista-resultados').innerHTML = '';
    }

    function imprimirEtiquetaGondola() {
        // Envia os dados dos inputs (onde o usuário pode ter editado) para o layout de impressão
        document.getElementById('print-cod').innerText = document.getElementById('inp-codigo').value;
        document.getElementById('print-nome').innerText = document.getElementById('inp-nome').value;
        document.getElementById('print-ean').innerText = document.getElementById('inp-ean').value;
        document.getElementById('print-validade').innerText = document.getElementById('inp-validade').value;
        
        // Gôndola e Prateleira
        document.getElementById('print-gondola').innerText = document.getElementById('inp-gondola').value;
        document.getElementById('print-prateleira').innerText = document.getElementById('inp-prateleira').value;

        // Ativa a área térmica
        let areaPrint = document.getElementById('print-area-etiqueta');
        areaPrint.classList.remove('hidden');
        areaPrint.classList.add('print-active');
        
        window.print();
        
        // Esconde de volta
        areaPrint.classList.add('hidden');
        areaPrint.classList.remove('print-active');
    }

    // ==================== CÂMERA (COMPARTILHADA) ==================== //

    function iniciarLeitor(modo) {
        if(modo === 'busca') {
            abrirTela('tela-camera-busca');
            html5QrCode = new Html5Qrcode("reader-busca");
        } else {
            // Modo picking da outra aba
            html5QrCode = new Html5Qrcode("reader-picking");
        }

        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 100 } },
            (codigoLido) => {
                if(modo === 'busca') {
                    pararLeitor('tela-etiquetas'); // Desliga a câmera e volta pra aba principal
                    buscarProdutoPorCamera(codigoLido);
                } else {
                    html5QrCode.pause(); 
                    validarLeituraProduto(codigoLido);
                    setTimeout(() => { if(html5QrCode.getState() === 2) html5QrCode.resume(); }, 1500);
                }
            },
            (err) => {}
        ).catch(err => { mostrarAlerta("Erro ao abrir a câmera.", "erro"); });
    }

    function pararLeitor(telaRetorno = null) {
        if (html5QrCode) {
            try { html5QrCode.stop(); } catch(e){}
        }
        if(telaRetorno) abrirTela(telaRetorno);
    }

    function buscarProdutoPorCamera(codigoLido) {
        let eanLimpo = String(codigoLido).replace(/\D/g, "").replace(/^0+/, "");
        let skuLido = String(codigoLido).trim().toUpperCase();

        const produtoEncontrado = bancoDeDados.find(p => {
            let eanDb = String(p.gtin || p["GTIN/EAN"] || "").replace(/\D/g, "").replace(/^0+/, "");
            let skuDb = String(p.codigo || p["Código"] || "").trim().toUpperCase();
            return (eanDb === eanLimpo && eanLimpo !== "") || (skuDb === skuLido && skuLido !== "");
        });

        if (produtoEncontrado) {
            abrirCardProduto(produtoEncontrado);
        } else {
            mostrarAlerta("Produto não encontrado! Código lido: " + codigoLido, "erro", 4000);
        }
    }

    // ==================== LÓGICA DE SEPARAÇÃO (PICKING) MANTIDA ==================== //
    // (Abaixo ficam as funções de processar pedido, validação e impressão do relatório que já fizemos antes)
    
    function processarPedidoEPuxarFoco() {
        const texto = document.getElementById('texto-pedido').value;
        const linhas = texto.split('\n');
        const regex = /^(\d+)[xX]\s+(.*)/; 
        listaDeSeparacao = [];

        linhas.forEach(linha => {
            const match = linha.trim().match(regex);
            if (match) {
                let quantidade = parseInt(match[1]);
                let nomeOriginal = match[2].trim();
                let nomeLimpoBusca = nomeOriginal.replace(/\(Oferta\)/gi, '').trim().toLowerCase();
                let palavrasChave = nomeLimpoBusca.split(' ');
                
                let melhorMatch = bancoDeDados.find(p => {
                    let nomeDb = String(p.nome || p["Descrição"] || "").toLowerCase();
                    return nomeDb.includes(palavrasChave[0]) && (palavrasChave[1] ? nomeDb.includes(palavrasChave[1]) : true);
                });

                if (melhorMatch) {
                    listaDeSeparacao.push({
                        quantidadeTotal: quantidade, unidadesLidas: 0,
                        nomePedido: nomeOriginal, produtoDb: melhorMatch,
                        localizacao: melhorMatch.localizacao || melhorMatch["Localização"] || "ZZZ",
                        status: 'pendente'
                    });
                }
            }
        });

        if(listaDeSeparacao.length === 0) { mostrarAlerta("Nenhum produto reconhecido.", "erro"); return; }
        listaDeSeparacao.sort((a, b) => a.localizacao.localeCompare(b.localizacao));
        
        indexAtualPicking = 0;
        abrirTela('tela-separacao-foco');
        renderizarItemFoco();
        iniciarLeitor('separacao');
    }

    function renderizarItemFoco() {
        if (indexAtualPicking >= listaDeSeparacao.length) { finalizarPicking(); return; }
        let item = listaDeSeparacao[indexAtualPicking];
        let sku = item.produtoDb.codigo || item.produtoDb["Código"] || "";

        document.getElementById('foco-nome').innerText = item.nomePedido;
        document.getElementById('foco-loc').innerText = `📍 Gôndola: ${item.localizacao}`;
        document.getElementById('foco-contador').innerText = `${item.unidadesLidas} / ${item.quantidadeTotal} Separados`;
        
        let img = document.getElementById('foco-img');
        img.src = `../site/img/produtos/${sku}.webp`;
        img.style.display = 'block';
    }

    function validarLeituraProduto(codigoLido) {
        let eanLido = String(codigoLido).replace(/\D/g, "").replace(/^0+/, "");
        let codLido = String(codigoLido).trim().toUpperCase();
        let itemAtual = listaDeSeparacao[indexAtualPicking];
        let eanEsperado = String(itemAtual.produtoDb.gtin || itemAtual.produtoDb["GTIN/EAN"] || "").replace(/\D/g, "").replace(/^0+/, "");
        let codEsperado = String(itemAtual.produtoDb.codigo || itemAtual.produtoDb["Código"] || "").trim().toUpperCase();

        if (eanEsperado === eanLido || codEsperado === codLido) {
            itemAtual.unidadesLidas++;
            if (itemAtual.unidadesLidas < itemAtual.quantidadeTotal) {
                mostrarAlerta(`✅ Correto! Faltam ${itemAtual.quantidadeTotal - itemAtual.unidadesLidas} unidades.`, "aviso", 2000);
                renderizarItemFoco();
            } else {
                itemAtual.status = 'concluido';
                mostrarAlerta(`🎉 Completo! Próximo item...`, "sucesso", 2000);
                indexAtualPicking++;
                renderizarItemFoco();
            }
        } else {
            mostrarAlerta(`❌ Produto Errado!`, "erro", 3000);
        }
    }

    function pularItemAtual() {
        if(confirm("Deseja pular este item?")) {
            listaDeSeparacao[indexAtualPicking].status = 'pulado';
            indexAtualPicking++;
            renderizarItemFoco();
        }
    }

    function cancelarPicking() {
        if(confirm("Cancelar toda a separação?")) { pararLeitor(); abrirTela('tela-inicial'); }
    }

    function finalizarPicking() { pararLeitor(); abrirTela('tela-conclusao'); }

    function imprimirRelatorioSeparacao() {
        let divLista = document.getElementById('lista-print-relatorio');
        divLista.innerHTML = ''; 
        document.getElementById('data-relatorio').innerText = `Impresso em: ${new Date().toLocaleString('pt-BR')}`;

        listaDeSeparacao.forEach(item => {
            let div = document.createElement('div');
            div.className = 'print-report-item';
            div.innerText = `${item.status === 'concluido' ? '[OK]' : '[FALTOU]'} ${item.quantidadeTotal}x ${item.nomePedido.substring(0, 20)}...`; 
            divLista.appendChild(div);
        });

        let areaRelatorio = document.getElementById('print-area-relatorio');
        areaRelatorio.classList.remove('hidden'); areaRelatorio.classList.add('print-active');
        window.print();
        areaRelatorio.classList.add('hidden'); areaRelatorio.classList.remove('print-active');
    }
</script>
</body>
</html>
