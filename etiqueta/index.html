<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estoque Profissional</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        /* --- 1. ESTILOS GERAIS E CORES --- */
        :root {
            --primary: #4CAF50; --secondary: #2196F3;
            --danger: #f44336; --warning: #ff9800;
            --dark: #333; --light: #f4f4f4;
        }
        
        body, html { font-family: Arial, sans-serif; background-color: var(--light); margin: 0; padding: 0; height: 100%; color: var(--dark); }
        h1, h2, h3 { text-align: center; margin-top: 0; }
        
        /* Botões */
        button { display: block; width: 100%; padding: 15px; margin: 10px 0; font-size: 16px; font-weight: bold; color: white; background-color: var(--primary); border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s; }
        button:active { transform: translateY(2px); }
        .btn-secondary { background-color: var(--secondary); }
        .btn-danger { background-color: var(--danger); }
        .btn-warning { background-color: var(--warning); color: #000; }
        .btn-print { background-color: #000; }
        
        /* Contêineres Padrões (Com Rolagem) */
        .container { max-width: 600px; margin: 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 16px; }
        .form-group input, .form-group textarea { width: 100%; padding: 15px; font-size: 16px; border: 2px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        
        /* --- 2. MENSAGENS DIDÁTICAS (TOASTS) --- */
        #alerta-customizado { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; padding: 15px; border-radius: 8px; color: white; font-weight: bold; text-align: center; z-index: 9999; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: none; font-size: 16px; }
        .alerta-erro { background-color: var(--danger); }
        .alerta-sucesso { background-color: var(--primary); }
        .alerta-aviso { background-color: var(--warning); color: #000; }

        /* --- 3. MODO FOCO (SEPARAÇÃO SEM ROLAGEM) --- */
        .tela-foco { height: 100vh; display: flex; flex-direction: column; overflow: hidden; padding: 10px; box-sizing: border-box; background: #222; }
        .camera-box { flex: 1; max-height: 45%; border-radius: 8px; overflow: hidden; position: relative; background: #000; border: 2px solid #555; }
        .info-box { flex: 1; background: white; border-radius: 8px; padding: 15px; margin-top: 10px; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; text-align: center; }
        .info-box img { max-height: 120px; object-fit: contain; border-radius: 8px; }
        .contador-unidades { font-size: 28px; font-weight: 900; color: var(--secondary); background: #e3f2fd; padding: 10px 20px; border-radius: 12px; border: 2px solid var(--secondary); }
        .badge-loc { background: var(--dark); color: white; padding: 5px 10px; border-radius: 15px; font-size: 14px; font-weight: bold; }

        .hidden { display: none !important; }

        /* --- 4. ÁREAS DE IMPRESSÃO (58mm) --- */
        @media print {
            @page { margin: 0; size: 58mm auto; }
            body { margin: 0; padding: 0; background: white; }
            body * { visibility: hidden; display: none; } /* Esconde tudo */
            
            /* Mostra apenas as áreas de impressão quando ativadas */
            .print-active, .print-active * { visibility: visible; display: block; }
            .print-active { position: absolute; left: 0; top: 0; width: 48mm; padding: 2mm 5mm; margin: 0; border: none; font-family: 'Arial', sans-serif; color: #000; text-align: center;}
            
            /* Estilo da Etiqueta */
            .destaque-codigo { font-size: 26px; font-weight: 900; margin: 0 0 5px 0; }
            #print-img { width: 45mm; max-height: 45mm; object-fit: contain; margin: 0 auto 8px auto; filter: grayscale(100%) contrast(120%); }
            
            /* Estilo do Relatório de Separação */
            .print-report-item { text-align: left; font-size: 12px; border-bottom: 1px dashed #999; padding: 4px 0; font-weight: bold; margin-bottom: 2px;}
            .print-header { font-size: 16px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; text-align: center; border-bottom: 2px solid #000;}
        }
    </style>
</head>
<body>

<div id="alerta-customizado">Mensagem aqui</div>

<div class="container" id="tela-inicial">
    <h1>📦 Sistema de Estoque</h1>
    <p id="status-db" style="text-align:center; font-weight:bold; color:#721c24;">⏳ Carregando banco de dados...</p>
    
    <div id="area-upload" class="hidden">
        <input type="file" id="file-json" accept=".json" style="display:block; margin:auto; margin-bottom: 15px;">
    </div>

    <div id="botoes-menu" class="hidden">
        <button class="btn-secondary" style="padding: 25px; font-size: 20px;" onclick="abrirTela('tela-separacao-input')">🛒 Iniciar Separação</button>
        <button style="padding: 25px; font-size: 20px;" onclick="abrirTela('tela-etiquetas')">🏷️ Gestão de Etiquetas</button>
    </div>
</div>

<div class="container hidden" id="tela-etiquetas">
    <button class="btn-danger" onclick="abrirTela('tela-inicial')">⬅️ Voltar ao Menu</button>
    <h2>Busca de Produto</h2>
    <div class="form-group">
        <input type="text" id="inp-busca" placeholder="Digite nome ou código..." oninput="buscarPorNome()">
    </div>
    <div id="lista-resultados"></div>
    <div id="product-form" class="hidden">
        <img id="img-foto" src="" style="width: 100%; max-height: 200px; object-fit: contain;">
        <div class="form-group"><label>Nome</label><input type="text" id="inp-nome"></div>
        <div class="form-group"><label>Código</label><input type="text" id="inp-codigo"></div>
        <div class="form-group"><label>EAN</label><input type="text" id="inp-ean"></div>
        <div class="form-group"><label>Localização</label><input type="text" id="inp-loc"></div>
        <div class="form-group"><label>Validade</label><input type="text" id="inp-validade"></div>
        <button class="btn-print" onclick="imprimirEtiqueta()">🖨️ Imprimir Etiqueta</button>
        <button class="btn-danger" onclick="document.getElementById('product-form').classList.add('hidden')">Fechar</button>
    </div>
</div>

<div class="container hidden" id="tela-separacao-input">
    <button class="btn-danger" onclick="abrirTela('tela-inicial')">⬅️ Voltar ao Menu</button>
    <h2>📝 Colar Pedido</h2>
    <div class="form-group">
        <textarea id="texto-pedido" rows="10" placeholder="Cole aqui a lista do WhatsApp..."></textarea>
    </div>
    <button class="btn-secondary" onclick="processarPedidoEPuxarFoco()">🚀 Iniciar Modo de Separação</button>
</div>

<div class="tela-foco hidden" id="tela-separacao-foco">
    
    <div class="camera-box">
        <div id="reader-picking" style="width: 100%; height: 100%;"></div>
    </div>
    
    <div class="info-box">
        <span class="badge-loc" id="foco-loc">📍 Gôndola: A1</span>
        <h3 id="foco-nome" style="margin: 5px 0;">Nome do Produto</h3>
        <img id="foco-img" src="" alt="Produto" onerror="this.style.display='none'">
        
        <div class="contador-unidades" id="foco-contador">0 / 4 Separados</div>
        
        <div style="display:flex; gap:10px; width:100%;">
            <button class="btn-danger" onclick="cancelarPicking()">Encerrar</button>
            <button class="btn-secondary" onclick="pularItemAtual()">Pular (Falta)</button>
        </div>
    </div>
</div>

<div class="container hidden" id="tela-conclusao">
    <h2>🎉 Separação Concluída!</h2>
    <p style="text-align:center;">Todos os itens disponíveis foram separados.</p>
    <button class="btn-print" onclick="imprimirRelatorioSeparacao()" style="padding: 20px; font-size:18px;">🖨️ Imprimir Relatório (58mm)</button>
    <button class="btn-secondary" onclick="abrirTela('tela-inicial')">🏠 Concluir e Voltar ao Início</button>
</div>

<div id="print-area-etiqueta" class="hidden">
    <div id="print-cod" class="destaque-codigo"></div>
    <img id="print-img" src="" alt="Foto">
    <h3 id="print-nome"></h3>
    <div><strong>EAN:</strong> <span id="print-ean"></span></div>
    <div><strong>VAL:</strong> <span id="print-validade"></span></div>
    <div><strong>LOC:</strong> <span id="print-loc"></span></div>
</div>

<div id="print-area-relatorio" class="hidden">
    <div class="print-header">Relatório de Separação</div>
    <div style="text-align:center; font-size:12px; margin-bottom:10px;" id="data-relatorio"></div>
    <div id="lista-print-relatorio"></div>
    <div style="margin-top:15px; text-align:center; font-weight:bold; font-size:14px;">Conferido por: __________</div>
</div>

<script>
    let bancoDeDados = [];
    let html5QrCode = null;
    let listaDeSeparacao = [];
    let indexAtualPicking = 0; // Controla qual item estamos separando agora

    // --- 1. INICIALIZAÇÃO E NAVEGAÇÃO ---
    window.onload = async function() {
        try {
            const resposta = await fetch('../site/bancodedados.json');
            bancoDeDados = await resposta.json();
            liberarSistema();
        } catch (erro) {
            document.getElementById('area-upload').classList.remove('hidden');
        }
    };

    function liberarSistema() {
        document.getElementById('status-db').innerText = "✅ Banco Conectado!";
        document.getElementById('status-db').style.color = "green";
        document.getElementById('botoes-menu').classList.remove('hidden');
    }

    function abrirTela(idTela) {
        // Esconde todas
        document.getElementById('tela-inicial').classList.add('hidden');
        document.getElementById('tela-etiquetas').classList.add('hidden');
        document.getElementById('tela-separacao-input').classList.add('hidden');
        document.getElementById('tela-separacao-foco').classList.add('hidden');
        document.getElementById('tela-conclusao').classList.add('hidden');
        
        // Desliga a câmera se não for a tela de foco
        if(idTela !== 'tela-separacao-foco') pararLeitor();

        // Mostra a escolhida
        document.getElementById(idTela).classList.remove('hidden');
    }

    // --- 2. ALERTAS DIDÁTICOS ---
    function mostrarAlerta(mensagem, tipo = 'sucesso', tempo = 3000) {
        let alerta = document.getElementById('alerta-customizado');
        alerta.innerText = mensagem;
        alerta.className = ''; // limpa classes
        if(tipo === 'erro') alerta.classList.add('alerta-erro');
        else if(tipo === 'aviso') alerta.classList.add('alerta-aviso');
        else alerta.classList.add('alerta-sucesso');
        
        alerta.style.display = 'block';
        setTimeout(() => { alerta.style.display = 'none'; }, tempo);
    }

    // --- 3. LÓGICA DE SEPARAÇÃO (PICKING) ---
    function processarPedidoEPuxarFoco() {
        const texto = document.getElementById('texto-pedido').value;
        const linhas = texto.split('\n');
        const regex = /^(\d+)[xX]\s+(.*)/; 
        
        listaDeSeparacao = [];

        linhas.forEach(linha => {
            const match = linha.trim().match(regex);
            if (match) {
                let quantidade = parseInt(match[1]); // Converte para número matemático
                let nomeOriginal = match[2].trim();
                let nomeLimpoBusca = nomeOriginal.replace(/\(Oferta\)/gi, '').trim().toLowerCase();
                let palavrasChave = nomeLimpoBusca.split(' ');
                
                let melhorMatch = bancoDeDados.find(p => {
                    let nomeDb = String(p.nome || p["Descrição"] || "").toLowerCase();
                    return nomeDb.includes(palavrasChave[0]) && (palavrasChave[1] ? nomeDb.includes(palavrasChave[1]) : true);
                });

                // Só adiciona na lista de separação se encontrou no banco
                if (melhorMatch) {
                    listaDeSeparacao.push({
                        quantidadeTotal: quantidade,
                        unidadesLidas: 0, // Inicia zerado!
                        nomePedido: nomeOriginal,
                        produtoDb: melhorMatch,
                        localizacao: melhorMatch.localizacao || melhorMatch["Localização"] || "ZZZ",
                        status: 'pendente' // pendente, concluido, pulado
                    });
                }
            }
        });

        if(listaDeSeparacao.length === 0) {
            mostrarAlerta("Nenhum produto reconhecido no banco de dados.", "erro");
            return;
        }

        // Ordena pela localização
        listaDeSeparacao.sort((a, b) => a.localizacao.localeCompare(b.localizacao));
        
        // Inicia o Modo Foco
        indexAtualPicking = 0;
        abrirTela('tela-separacao-foco');
        renderizarItemFoco();
        iniciarLeitorPicking();
    }

    function renderizarItemFoco() {
        // Se acabaram os itens, finaliza
        if (indexAtualPicking >= listaDeSeparacao.length) {
            finalizarPicking();
            return;
        }

        let item = listaDeSeparacao[indexAtualPicking];
        let cod = item.produtoDb.codigo || item.produtoDb["Código"] || "";

        document.getElementById('foco-nome').innerText = item.nomePedido;
        document.getElementById('foco-loc').innerText = `📍 Gôndola: ${item.localizacao}`;
        document.getElementById('foco-contador').innerText = `${item.unidadesLidas} / ${item.quantidadeTotal} Lidos`;
        
        let img = document.getElementById('foco-img');
        img.src = `../site/img/produtos/${cod}.webp`;
        img.style.display = 'block';
    }

    function iniciarLeitorPicking() {
        html5QrCode = new Html5Qrcode("reader-picking");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 100 } },
            (codigoLido) => {
                // Ao ler, congela a câmera por 1.5s para não ler repetido sem querer
                html5QrCode.pause(); 
                validarLeituraProduto(codigoLido);
                setTimeout(() => { if(html5QrCode.getState() === 2) html5QrCode.resume(); }, 1500);
            },
            (err) => {}
        ).catch(err => { mostrarAlerta("Erro ao acessar a câmera.", "erro"); });
    }

    function validarLeituraProduto(codigoLido) {
        let eanLido = String(codigoLido).replace(/\D/g, "").replace(/^0+/, "");
        let codLido = String(codigoLido).trim().toUpperCase();

        let itemAtual = listaDeSeparacao[indexAtualPicking];
        let eanEsperado = String(itemAtual.produtoDb.gtin || itemAtual.produtoDb["GTIN/EAN"] || "").replace(/\D/g, "").replace(/^0+/, "");
        let codEsperado = String(itemAtual.produtoDb.codigo || itemAtual.produtoDb["Código"] || "").trim().toUpperCase();

        // 1. O código lido bate com o produto que está na tela?
        if (eanEsperado === eanLido || codEsperado === codLido) {
            
            itemAtual.unidadesLidas++; // Soma 1 na contagem
            
            // Verifica se completou
            if (itemAtual.unidadesLidas < itemAtual.quantidadeTotal) {
                let faltam = itemAtual.quantidadeTotal - itemAtual.unidadesLidas;
                mostrarAlerta(`✅ Correto! Faltam ${faltam} unidades.`, "aviso", 2000);
                renderizarItemFoco(); // Atualiza o contador na tela
            } else {
                itemAtual.status = 'concluido';
                mostrarAlerta(`🎉 ${itemAtual.nomePedido} Completo! Próximo item...`, "sucesso", 2500);
                indexAtualPicking++; // Vai para o próximo item da lista
                renderizarItemFoco(); // Muda a tela para o próximo produto
            }
            
        } else {
            // 2. Errou o produto! Avisa de forma didática.
            mostrarAlerta(`❌ Errado! Você pegou o produto com final ${eanLido.slice(-4)}, mas precisamos do EAN final ${eanEsperado.slice(-4)}.`, "erro", 4000);
        }
    }

    function pularItemAtual() {
        if(confirm("Deseja pular este item? (Falta no estoque?)")) {
            listaDeSeparacao[indexAtualPicking].status = 'pulado';
            indexAtualPicking++;
            renderizarItemFoco();
        }
    }

    function cancelarPicking() {
        if(confirm("Tem certeza que deseja cancelar toda a separação?")) {
            pararLeitor();
            abrirTela('tela-inicial');
        }
    }

    function finalizarPicking() {
        pararLeitor();
        abrirTela('tela-conclusao');
    }

    function pararLeitor() {
        if (html5QrCode) {
            try { html5QrCode.stop(); } catch(e){}
        }
    }

    // --- 4. IMPRESSÃO TÉRMICA (RELATÓRIO) ---
    function imprimirRelatorioSeparacao() {
        let divLista = document.getElementById('lista-print-relatorio');
        divLista.innerHTML = ''; // Limpa anterior
        
        let dataAtual = new Date().toLocaleString('pt-BR');
        document.getElementById('data-relatorio').innerText = `Impresso em: ${dataAtual}`;

        listaDeSeparacao.forEach(item => {
            let div = document.createElement('div');
            div.className = 'print-report-item';
            
            let statusTexto = item.status === 'concluido' ? '[OK]' : '[FALTOU]';
            // Exemplo de linha: [OK] 4x Arroz Koblenz
            div.innerText = `${statusTexto} ${item.quantidadeTotal}x ${item.nomePedido.substring(0, 20)}...`; 
            
            divLista.appendChild(div);
        });

        // Troca a classe para mostrar apenas a área do relatório
        let areaRelatorio = document.getElementById('print-area-relatorio');
        areaRelatorio.classList.remove('hidden');
        areaRelatorio.classList.add('print-active');
        
        window.print();
        
        areaRelatorio.classList.add('hidden');
        areaRelatorio.classList.remove('print-active');
    }

    // --- FUNÇÕES DE ETIQUETA MANTIDAS (Busca, Preencher, ImprimirEtiqueta) ---
    // (Cole aqui as funções antigas buscarPorNome(), preencherFormulario(), imprimirEtiqueta().
    // Na hora de imprimir etiqueta, use: document.getElementById('print-area-etiqueta').classList.add('print-active');)

</script>
</body>
</html>
