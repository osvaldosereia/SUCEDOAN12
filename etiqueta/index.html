<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estoque Profissional</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        /* --- ESTILOS DO APP --- */
        :root { --primary: #4CAF50; --secondary: #2196F3; --danger: #f44336; --warning: #ff9800; --dark: #333; --light: #f4f4f4; }
        body, html { font-family: Arial, sans-serif; background-color: var(--light); margin: 0; padding: 0; height: 100%; color: var(--dark); }
        h1, h2, h3 { text-align: center; margin-top: 0; }
        
        button { display: block; width: 100%; padding: 15px; margin: 10px 0; font-size: 16px; font-weight: bold; color: white; background-color: var(--primary); border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-secondary { background-color: var(--secondary); }
        .btn-danger { background-color: var(--danger); }
        .btn-warning { background-color: var(--warning); color: #000; }
        .btn-print { background-color: #000; }
        
        .container { max-width: 600px; margin: 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #555;}
        .form-group input, .form-group textarea { width: 100%; padding: 15px; font-size: 16px; border: 2px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        
        .resultado-item { padding: 15px; margin-bottom: 8px; background-color: #e3f2fd; border: 1px solid #90caf9; border-radius: 8px; font-size: 16px; font-weight: bold; color: #0d47a1; cursor: pointer; }
        .resultado-dica { font-size: 13px; color: #555; font-weight: normal; margin-top: 4px; }
        .linha-dupla { display: flex; gap: 10px; }
        .linha-dupla .form-group { flex: 1; }
        .hidden { display: none !important; }

        #alerta-customizado { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; padding: 15px; border-radius: 8px; color: white; font-weight: bold; text-align: center; z-index: 9999; display: none; }
        .alerta-erro { background-color: var(--danger); }
        .alerta-sucesso { background-color: var(--primary); }
        .alerta-aviso { background-color: var(--warning); color: #000; }

        .tela-foco { height: 100vh; display: flex; flex-direction: column; overflow: hidden; padding: 10px; box-sizing: border-box; background: #222; }
        .camera-box { flex: 1; max-height: 45%; border-radius: 8px; overflow: hidden; position: relative; background: #000; border: 2px solid #555; }
        .info-box { flex: 1; background: white; border-radius: 8px; padding: 15px; margin-top: 10px; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; text-align: center; }
        .info-box img { max-height: 120px; object-fit: contain; border-radius: 8px; }
        .contador-unidades { font-size: 28px; font-weight: 900; color: var(--secondary); background: #e3f2fd; padding: 10px 20px; border-radius: 12px; border: 2px solid var(--secondary); }
        .badge-loc { background: var(--dark); color: white; padding: 5px 10px; border-radius: 15px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div id="alerta-customizado">Mensagem</div>

<div id="app-ui">
    <div class="container" id="tela-inicial">
        <h1>📦 Sistema de Estoque</h1>
        <p id="status-db" style="text-align:center; font-weight:bold; color:#721c24;">⏳ Carregando banco...</p>
        <div id="area-upload" class="hidden"><input type="file" id="file-json" accept=".json" style="display:block; margin:auto; margin-bottom: 15px;"></div>
        <div id="botoes-menu" class="hidden">
            <button style="padding: 25px; font-size: 20px;" onclick="abrirTela('tela-etiquetas')">🏷️ Gestão de Etiquetas</button>
            <button class="btn-secondary" style="padding: 25px; font-size: 20px;" onclick="abrirTela('tela-separacao-input')">🛒 Iniciar Separação</button>
            <hr><button class="btn-warning" onclick="exportarBancoCSV()">💾 Exportar Todo o Banco</button>
        </div>
    </div>

    <div class="container hidden" id="tela-etiquetas">
        <button class="btn-danger" onclick="abrirTela('tela-inicial')">⬅️ Voltar</button>
        <div id="area-busca-etiqueta">
            <h2>🔍 Buscar Produto</h2>
            <div class="form-group"><input type="text" id="inp-busca" placeholder="Digite Nome, SKU ou EAN..." oninput="buscarPorNome()"></div>
            <button onclick="iniciarLeitor('busca')" class="btn-secondary" style="margin-bottom: 20px;">📷 Ler Código</button>
            <div id="lista-resultados"></div>
        </div>

        <div id="product-form" class="hidden">
            <button class="btn-danger" style="margin-bottom: 15px;" onclick="fecharCardProduto()">❌ Fechar Produto</button>
            <img id="img-foto" src="" style="width: 100%; max-height: 250px; object-fit: contain; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px;">
            <div class="linha-dupla">
                <div class="form-group"><label>SKU</label><input type="text" id="inp-codigo" readonly style="background:#f0f0f0;"></div>
                <div class="form-group"><label>EAN</label><input type="text" id="inp-ean"></div>
            </div>
            <div class="form-group"><label>Nome</label><input type="text" id="inp-nome"></div>
            <div class="linha-dupla">
                <div class="form-group"><label>Estoque</label><input type="text" id="inp-estoque"></div>
                <div class="form-group"><label>Validade</label><input type="text" id="inp-validade"></div>
            </div>
            <div class="linha-dupla">
                <div class="form-group"><label>Gôndola</label><input type="text" id="inp-gondola" placeholder="Ex: Corredor 3"></div>
                <div class="form-group"><label>Prateleira</label><input type="text" id="inp-prateleira" placeholder="Ex: Baixa"></div>
            </div>
            <div class="form-group"><label>Preço</label><input type="text" id="inp-venda"></div>
            
            <button class="btn-print" onclick="imprimirEtiquetaGondola()" style="padding: 20px; font-size: 18px;">🖨️ Imprimir Etiqueta</button>
            <button class="btn-primary" onclick="salvarProdutoLocal()">✅ Salvar Alterações Localmente</button>
            <button class="btn-secondary" onclick="exportarProdutoCSV()">📄 Exportar Apenas Este</button>
        </div>
    </div>

    <div class="container hidden" id="tela-camera-busca">
        <h2>📷 Lendo Código...</h2>
        <div id="reader-busca" style="width: 100%; margin-bottom: 20px;"></div>
        <button class="btn-danger" onclick="pararLeitor('tela-etiquetas')">Cancelar</button>
    </div>

    <div class="container hidden" id="tela-separacao-input">
        <button class="btn-danger" onclick="abrirTela('tela-inicial')">⬅️ Voltar</button>
        <h2>📝 Colar Pedido</h2>
        <div class="form-group"><textarea id="texto-pedido" rows="10" placeholder="Cole a lista..."></textarea></div>
        <button class="btn-secondary" onclick="processarPedidoEPuxarFoco()">🚀 Iniciar Separação</button>
    </div>

    <div class="tela-foco hidden" id="tela-separacao-foco">
        <div class="camera-box"><div id="reader-picking" style="width: 100%; height: 100%;"></div></div>
        <div class="info-box">
            <span class="badge-loc" id="foco-loc">📍 Gôndola: A1</span>
            <h3 id="foco-nome">Nome</h3>
            <img id="foco-img" src="" alt="Produto" onerror="this.style.display='none'">
            <div class="contador-unidades" id="foco-contador">0 / 4 Separados</div>
            <div style="display:flex; gap:10px; width:100%;">
                <button class="btn-danger" onclick="cancelarPicking()">Encerrar</button>
                <button class="btn-secondary" onclick="pularItemAtual()">Pular (Falta)</button>
            </div>
        </div>
    </div>

    <div class="container hidden" id="tela-conclusao">
        <h2>🎉 Separação Concluída!</h2>
        <button class="btn-print" onclick="imprimirRelatorioSeparacao()" style="padding: 20px;">🖨️ Imprimir Relatório</button>
        <button class="btn-secondary" onclick="abrirTela('tela-inicial')">🏠 Voltar ao Início</button>
    </div>
</div>

<script>
    let bancoDeDados = []; let html5QrCode = null; let listaDeSeparacao = []; let indexAtualPicking = 0; let produtoSendoEditadoIndex = -1;

    window.onload = async function() {
        try { const resposta = await fetch('../site/bancodedados.json'); bancoDeDados = await resposta.json(); liberarSistema(); } 
        catch (erro) { document.getElementById('area-upload').classList.remove('hidden'); }
    };

    function liberarSistema() {
        document.getElementById('status-db').innerText = "✅ Banco Conectado";
        document.getElementById('status-db').style.color = "green";
        document.getElementById('botoes-menu').classList.remove('hidden');
    }

    function abrirTela(idTela) {
        ['tela-inicial', 'tela-etiquetas', 'tela-camera-busca', 'tela-separacao-input', 'tela-separacao-foco', 'tela-conclusao'].forEach(id => { document.getElementById(id).classList.add('hidden'); });
        if(idTela !== 'tela-separacao-foco' && idTela !== 'tela-camera-busca') pararLeitor();
        document.getElementById(idTela).classList.remove('hidden');
    }

    function mostrarAlerta(msg, tipo = 'sucesso', tempo = 3000) {
        let a = document.getElementById('alerta-customizado'); a.innerText = msg; a.className = ''; 
        if(tipo === 'erro') a.classList.add('alerta-erro'); else if(tipo === 'aviso') a.classList.add('alerta-aviso'); else a.classList.add('alerta-sucesso');
        a.style.display = 'block'; setTimeout(() => { a.style.display = 'none'; }, tempo);
    }

    function buscarPorNome() {
        let termo = document.getElementById('inp-busca').value.toLowerCase().trim();
        let lista = document.getElementById('lista-resultados'); lista.innerHTML = ''; 
        if (termo.length < 3) return; 

        let enc = bancoDeDados.map((p, i) => ({ p, i })).filter(item => {
            let n = String(item.p.nome || item.p["Descrição"] || "").toLowerCase();
            let c = String(item.p.codigo || item.p["Código"] || "").toLowerCase();
            let e = String(item.p.gtin || item.p["GTIN/EAN"] || "").replace(/\D/g, "");
            return n.includes(termo) || c.includes(termo) || e.includes(termo);
        });

        if (enc.length === 0) { lista.innerHTML = '<div style="color:red; padding:10px;">Nenhum encontrado.</div>'; return; }

        enc.slice(0, 10).forEach(item => {
            let n = item.p.nome || item.p["Descrição"] || "Sem Nome"; let s = item.p.codigo || item.p["Código"] || ""; let pr = item.p.preco || item.p["Preço"] || "0,00";
            let div = document.createElement('div'); div.className = 'resultado-item'; div.innerHTML = `${n} <div class="resultado-dica">SKU: ${s} | R$ ${pr}</div>`;
            div.onclick = function() { abrirCardProduto(item.p, item.i); }; lista.appendChild(div);
        });
    }

    function abrirCardProduto(p, i) {
        produtoSendoEditadoIndex = i;
        const sku = p.codigo || p["Código"] || "";
        document.getElementById('inp-codigo').value = sku;
        document.getElementById('inp-nome').value = p.nome || p["Descrição"] || "";
        document.getElementById('inp-ean').value = String(p.gtin || p["GTIN/EAN"] || "").replace(/[^0-9]/g, "");
        document.getElementById('inp-estoque').value = p.estoque || p["Estoque"] || "";
        document.getElementById('inp-validade').value = p.validade || p["Data Validade"] || "";
        document.getElementById('inp-venda').value = p.preco || p["Preço"] || "";
        document.getElementById('inp-gondola').value = p.gondola || p["Gôndola"] || p.localizacao || p["Localização"] || "";
        document.getElementById('inp-prateleira').value = p.prateleira || p["Prateleira"] || "";
        
        const img = document.getElementById('img-foto'); img.style.display = 'block'; img.src = `../site/img/produtos/${sku}.webp`; img.onerror = function() { this.style.display = 'none'; };
        document.getElementById('area-busca-etiqueta').classList.add('hidden'); document.getElementById('product-form').classList.remove('hidden');
    }

    function fecharCardProduto() { document.getElementById('product-form').classList.add('hidden'); document.getElementById('area-busca-etiqueta').classList.remove('hidden'); }

    function salvarProdutoLocal() {
        if (produtoSendoEditadoIndex === -1) return; let p = bancoDeDados[produtoSendoEditadoIndex];
        p.codigo = document.getElementById('inp-codigo').value; p.nome = document.getElementById('inp-nome').value; p.gtin = document.getElementById('inp-ean').value;
        p.estoque = document.getElementById('inp-estoque').value; p.validade = document.getElementById('inp-validade').value; p.preco = document.getElementById('inp-venda').value;
        p.gondola = document.getElementById('inp-gondola').value; p.prateleira = document.getElementById('inp-prateleira').value;
        mostrarAlerta("✅ Salvo!", "sucesso");
    }

    function converterParaCSV(arr) {
        if (arr.length === 0) return '';
        let csv = ['SKU', 'EAN', 'Nome', 'Estoque', 'Validade', 'Gondola', 'Prateleira', 'Preco'].join(';') + '\n';
        arr.forEach(p => { csv += [p.codigo || p["Código"]||"", p.gtin || p["GTIN/EAN"]||"", String(p.nome || p["Descrição"]||"").replace(/;/g, ","), p.estoque || p["Estoque"]||"", p.validade || p["Data Validade"]||"", p.gondola || p["Gôndola"]||p.localizacao||"", p.prateleira || p["Prateleira"]||"", p.preco || p["Preço"]||""].join(';') + '\n'; });
        return "\uFEFF" + csv;
    }

    function fazerDownloadCSV(c, n) {
        const link = document.createElement("a"); link.setAttribute("href", URL.createObjectURL(new Blob([c], { type: 'text/csv;charset=utf-8;' })));
        link.setAttribute("download", n); document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    function exportarProdutoCSV() { let se = bancoDeDados[produtoSendoEditadoIndex]; fazerDownloadCSV(converterParaCSV([se]), `produto_${se.codigo || se["Código"]}.csv`); }
    function exportarBancoCSV() { fazerDownloadCSV(converterParaCSV(bancoDeDados), `banco_${new Date().getTime()}.csv`); }


    // ============================================================================== //
    // IMPRESSÃO PROFISSIONAL RAWBT (IFRAME INVISÍVEL - PREVINE PRINT DE TELA)
    // ============================================================================== //

    function imprimirPelaPaginaFantasma(htmlConteudo) {
        let oldIframe = document.getElementById('frame-impressao');
        if (oldIframe) { oldIframe.remove(); }

        let iframe = document.createElement('iframe');
        iframe.id = 'frame-impressao';
        iframe.style.position = 'absolute';
        iframe.style.width = '0px';
        iframe.style.height = '0px';
        iframe.style.border = 'none';
        iframe.style.left = '-9999px'; 
        document.body.appendChild(iframe);

        let htmlCompleto = `
        <!DOCTYPE html>
        <html lang="pt-BR">
        <head>
            <meta charset="UTF-8">
            <style>
                @page { margin: 0; size: 58mm auto; }
                body { 
                    margin: 0; padding: 0; 
                    width: 48mm; 
                    font-family: Arial, sans-serif; 
                    color: #000; 
                    background: #fff;
                }
                .etiqueta {
                    width: 48mm;
                    padding: 2mm 0;
                    box-sizing: border-box;
                    text-align: center;
                }
                
                /* Estilo da Foto de Impressão */
                .foto-print {
                    width: 100%;
                    max-height: 45mm;
                    object-fit: contain;
                    margin-bottom: 8px;
                    display: block;
                    filter: grayscale(100%) contrast(120%);
                }

                .titulo { font-size: 14px; font-weight: bold; margin-bottom: 2px; }
                .sku { font-size: 38px; font-weight: 900; margin: 0 0 10px 0; letter-spacing: 1px; }
                .nome { font-size: 16px; font-weight: bold; text-transform: uppercase; margin-bottom: 12px; line-height: 1.2; }
                .linha { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; border-bottom: 1px dashed #000; padding: 4px 0; margin: 0;}
                .linha span.valor { font-weight: normal; }
                
                /* Relatório */
                .rel-titulo { font-size: 16px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; border-bottom: 2px solid #000; padding-bottom: 5px; text-align: center; }
                .rel-item { border-bottom: 1px dashed #000; padding: 4px 0; font-size: 14px; font-weight: bold; text-align: left;}
            </style>
        </head>
        <body>
            ${htmlConteudo}
        </body>
        </html>
        `;

        let doc = iframe.contentWindow || iframe.contentDocument.document || iframe.contentDocument;
        doc.document.open();
        doc.document.write(htmlCompleto);
        doc.document.close();

        setTimeout(() => {
            iframe.contentWindow.focus();
            iframe.contentWindow.print();
        }, 500);
    }

    function imprimirEtiquetaGondola() {
        let sku = document.getElementById('inp-codigo').value;
        let nome = document.getElementById('inp-nome').value;
        let ean = document.getElementById('inp-ean').value;
        let val = document.getElementById('inp-validade').value;
        let gon = document.getElementById('inp-gondola').value;
        let pra = document.getElementById('inp-prateleira').value;
        
        // Pega a URL da foto atual no form
        let imgElement = document.getElementById('img-foto');
        let fotoTag = '';
        
        // Se a imagem não for oculta, coloca no layout
        if (imgElement.style.display !== 'none' && imgElement.src) {
            fotoTag = `<img src="${imgElement.src}" class="foto-print" onerror="this.style.display='none'">`;
        }

        let conteudoEtiqueta = `
            <div class="etiqueta">
                ${fotoTag}
                <div class="titulo">SKU</div>
                <div class="sku">${sku}</div>
                <div class="nome">${nome}</div>
                <div class="linha"><span>EAN:</span> <span class="valor">${ean}</span></div>
                <div class="linha"><span>VAL:</span> <span class="valor">${val}</span></div>
                <div class="linha"><span>GÔNDOLA:</span> <span class="valor">${gon}</span></div>
                <div class="linha"><span>PRAT:</span> <span class="valor">${pra}</span></div>
            </div>
        `;
        imprimirPelaPaginaFantasma(conteudoEtiqueta);
    }

    function imprimirRelatorioSeparacao() {
        let cont = `<div class="etiqueta"><div class="rel-titulo">Relatório Separação</div><div style="font-size:12px; margin-bottom:10px;">${new Date().toLocaleString('pt-BR')}</div>`;
        listaDeSeparacao.forEach(i => { cont += `<div class="rel-item">${i.status === 'concluido' ? '[OK]' : '[FALTOU]'} ${i.quantidadeTotal}x ${i.nomePedido.substring(0, 18)}</div>`; });
        cont += `</div>`;
        imprimirPelaPaginaFantasma(cont);
    }

    // ==================== CÂMERA E SEPARAÇÃO (MANTIDOS) ==================== //
    function iniciarLeitor(m) {
        if(m === 'busca') { abrirTela('tela-camera-busca'); html5QrCode = new Html5Qrcode("reader-busca"); } else { html5QrCode = new Html5Qrcode("reader-picking"); }
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 100 } }, (cod) => {
            if(m === 'busca') { pararLeitor('tela-etiquetas'); buscarProdutoPorCamera(cod); } 
            else { html5QrCode.pause(); validarLeituraProduto(cod); setTimeout(() => { if(html5QrCode.getState() === 2) html5QrCode.resume(); }, 1500); }
        }, (err) => {}).catch(e => { mostrarAlerta("Erro na câmera", "erro"); });
    }
    function pararLeitor(t = null) { if (html5QrCode) { try { html5QrCode.stop(); } catch(e){} } if(t) abrirTela(t); }

    function buscarProdutoPorCamera(cod) {
        let el = String(cod).replace(/\D/g, "").replace(/^0+/, ""); let sl = String(cod).trim().toUpperCase();
        const ie = bancoDeDados.map((p, i) => ({ p, i })).find(i => { let ed = String(i.p.gtin || i.p["GTIN/EAN"] || "").replace(/\D/g, "").replace(/^0+/, ""); let sd = String(i.p.codigo || i.p["Código"] || "").trim().toUpperCase(); return (ed === el && el !== "") || (sd === sl && sl !== ""); });
        if (ie) abrirCardProduto(ie.p, ie.i); else mostrarAlerta("Não encontrado!", "erro");
    }

    function processarPedidoEPuxarFoco() {
        listaDeSeparacao = [];
        document.getElementById('texto-pedido').value.split('\n').forEach(l => {
            const m = l.trim().match(/^(\d+)[xX]\s+(.*)/); 
            if (m) {
                let pc = m[2].trim().replace(/\(Oferta\)/gi, '').toLowerCase().split(' ');
                let mt = bancoDeDados.find(p => String(p.nome || p["Descrição"] || "").toLowerCase().includes(pc[0]));
                if (mt) listaDeSeparacao.push({ quantidadeTotal: parseInt(m[1]), unidadesLidas: 0, nomePedido: m[2].trim(), produtoDb: mt, localizacao: mt.gondola || mt.localizacao || "ZZZ", status: 'pendente' });
            }
        });
        if(listaDeSeparacao.length === 0) { mostrarAlerta("Nenhum reconhecido.", "erro"); return; }
        listaDeSeparacao.sort((a, b) => a.localizacao.localeCompare(b.localizacao)); indexAtualPicking = 0; abrirTela('tela-separacao-foco'); renderizarItemFoco(); iniciarLeitor('separacao');
    }

    function renderizarItemFoco() {
        if (indexAtualPicking >= listaDeSeparacao.length) { finalizarPicking(); return; }
        let i = listaDeSeparacao[indexAtualPicking]; let s = i.produtoDb.codigo || i.produtoDb["Código"] || "";
        document.getElementById('foco-nome').innerText = i.nomePedido; document.getElementById('foco-loc').innerText = `📍 Gôndola: ${i.localizacao}`; document.getElementById('foco-contador').innerText = `${i.unidadesLidas} / ${i.quantidadeTotal}`;
        let img = document.getElementById('foco-img'); img.src = `../site/img/produtos/${s}.webp`; img.style.display = 'block';
    }

    function validarLeituraProduto(cod) {
        let el = String(cod).replace(/\D/g, "").replace(/^0+/, ""); let cl = String(cod).trim().toUpperCase();
        let ia = listaDeSeparacao[indexAtualPicking]; let ee = String(ia.produtoDb.gtin || ia.produtoDb["GTIN/EAN"] || "").replace(/\D/g, "").replace(/^0+/, ""); let ce = String(ia.produtoDb.codigo || ia.produtoDb["Código"] || "").trim().toUpperCase();
        if (ee === el || ce === cl) {
            ia.unidadesLidas++; if (ia.unidadesLidas < ia.quantidadeTotal) { mostrarAlerta(`Correto! Faltam ${ia.quantidadeTotal - ia.unidadesLidas}.`, "aviso"); renderizarItemFoco(); } 
            else { ia.status = 'concluido'; mostrarAlerta(`Completo!`, "sucesso"); indexAtualPicking++; renderizarItemFoco(); }
        } else { mostrarAlerta(`Errado!`, "erro"); }
    }

    function pularItemAtual() { if(confirm("Pular?")) { listaDeSeparacao[indexAtualPicking].status = 'pulado'; indexAtualPicking++; renderizarItemFoco(); } }
    function cancelarPicking() { if(confirm("Cancelar?")) { pararLeitor(); abrirTela('tela-inicial'); } }
    function finalizarPicking() { pararLeitor(); abrirTela('tela-conclusao'); }
</script>
</body>
</html>
