<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Bruto de Câmera</title>
</head>
<body style="text-align: center; font-family: Arial;">
    <h2>Teste de Câmera (Sem Restrições)</h2>
    
    <video id="video" width="100%" autoplay playsinline style="background: #000; height: 300px;"></video>
    
    <button onclick="ligarCamera()" style="padding: 20px; font-size: 20px; background: #2196F3; color: white; width: 100%; margin-top: 20px;">📸 Ligar Câmera</button>
    <p id="log" style="font-weight: bold; margin-top: 20px;">Aguardando...</p>

    <script>
        function ligarCamera() {
            document.getElementById('log').innerText = "Tentando ligar...";
            
            // Aqui está o segredo: pedimos apenas "vídeo". Sem forçar câmera traseira, sem forçar tamanho.
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(function(stream) {
                    document.getElementById('video').srcObject = stream;
                    document.getElementById('log').innerText = "✅ Câmera ligou com sucesso!";
                    document.getElementById('log').style.color = "green";
                })
                .catch(function(err) {
                    document.getElementById('log').innerText = "❌ Erro: " + err.name + " - " + err.message;
                    document.getElementById('log').style.color = "red";
                });
        }
    </script>
</body>
</html>
