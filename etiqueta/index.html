<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Separador de Pedidos PRO</title>
    <style>
        :root { --primary: #4CAF50; --secondary: #2196F3; --danger: #f44336; --warning: #ff9800; --dark: #111; --light: #f4f4f4; }
        body, html { font-family: Arial, sans-serif; background-color: var(--light); margin: 0; padding: 0; height: 100%; color: var(--dark); user-select: none; overflow: hidden; }
        
        button { border: none; border-radius: 12px; font-weight: bold; color: white; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.96); }
        .btn-primary { background-color: var(--primary); } .btn-secondary { background-color: var(--secondary); }
        .btn-danger { background-color: var(--danger); } .btn-print { background-color: #000; }
        
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .hidden { display: none !important; }
        h1, h2 { text-align: center; margin-top: 0; }
        
        .resultado-item { padding: 15px; margin-bottom: 10px; background-color: #e3f2fd; border: 1px solid #90caf9; border-radius: 12px; font-size: 18px; font-weight: bold; color: #0d47a1; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* ================= TELA DE FOCO (CRAVADA, SEM ROLAGEM) ================= */
        .tela-foco { height: 100vh; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; background: #fff; }
        
        /* Header - Gôndola GIGANTE */
        .foco-header { display: flex; flex-direction: column; align-items: center; background: var(--dark); color: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; text-align: center; }
        .foco-loc { color: var(--warning); font-size: 38px; font-weight: 900; letter-spacing: 2px; line-height: 1; margin-top: 5px; }
        .foco-pedido-info { font-size: 14px; color: #ccc; font-weight: bold; }

        /* Produto - Foto Gigante e Centralizada */
        .foco-produto-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fafafa; border-radius: 12px; border: 2px solid #eee; padding: 15px; margin-bottom: 10px; overflow: hidden; }
        .foco-produto-area img { max-width: 100%; max-height: 25vh; object-fit: contain; margin-bottom: 10px; mix-blend-mode: multiply; }
        .foco-nome { font-size: 20px; font-weight: bold; text-align: center; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 10px; padding: 0 10px; }
        
        .ticks-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; width: 100%; }
        .tick-box { width: 30px; height: 30px; border-radius: 6px; background-color: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; color: transparent; border: 1px solid #ccc; }
        .tick-box.active { background-color: var(--primary); color: white; border-color: var(--primary); }

        /* Área Inferior - Interação (Teclado ou Botoes) */
        .area-interacao { height: 35vh; display: flex; flex-direction: column; justify-content: flex-end; }
        
        /* Teclado Auto-Submit */
        .display-teclado { text-align: center; font-size: 34px; font-weight: 900; letter-spacing: 15px; color: var(--secondary); height: 45px; margin-bottom: 10px; }
        .display-teclado.erro { color: var(--danger); }
        .grid-teclado { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; flex: 1; }
        .btn-num { background: #f0f0f0; border: 2px solid #ddd; color: #111; font-size: 28px; font-weight: 900; border-radius: 10px; margin: 0; box-shadow: 0 2px 0 #ccc; }
        .btn-num:active { background: #d0d0d0; box-shadow: none; transform: translateY(2px); }

        /* Desempate Otimizado */
        .area-desempate { display: flex; gap: 8px; overflow-x: auto; background: #ffebee; padding: 10px; border-radius: 12px; border: 2px solid #ffcdd2; margin-bottom: 10px; align-items: center; }
        .card-desempate { background: white; padding: 5px; border-radius: 8px; text-align: center; width: 80px; flex-shrink: 0; border: 1px solid #ccc; }
        .card-desempate img { width: 100%; height: 60px; object-fit: contain; } 
        .card-desempate .desc { font-size: 13px; font-weight: 900; color: var(--danger); margin-top: 5px;}

        /* Alertas Customizados */
        #alerta-customizado { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; padding: 15px; border-radius: 10px; color: white; font-weight: bold; text-align: center; z-index: 10000; display: none; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .alerta-erro { background-color: var(--danger); } .alerta-sucesso { background-color: var(--primary); } .alerta-aviso { background-color: var(--warning); color: #000; }

        /* Checklist Conclusão */
        .checklist-box { background: #f9f9f9; border: 2px solid #eee; border-radius: 12px; padding: 15px; margin-top: 15px; max-height: 40vh; overflow-y: auto; text-align: left; }
        .checklist-item { border-bottom: 1px dashed #ccc; padding: 8px 0; font-size: 14px; font-weight: bold; display: flex; justify-content: space-between; }
        .checklist-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

<div id="alerta-customizado">Mensagem</div>

<div id="app-ui" style="height: 100%;">
    <div class="container" id="tela-inicial">
        <h1>🛒 Separador (Picking)</h1>
        <p id="status-db" style="text-align:center; font-weight:bold; color:#721c24;">⏳ Carregando banco...</p>
        <button id="btn-iniciar" class="btn-primary hidden" style="padding:30px; font-size:24px; width:100%; margin-top:40px; box-shadow: 0 6px 0 #388E3C;" onclick="carregarPedidosFila()">📋 VER PEDIDOS</button>
    </div>

    <div class="container hidden" id="tela-lista-pedidos">
        <button class="btn-danger" style="padding:15px; width:100%; margin-bottom: 15px;" onclick="abrirTela('tela-inicial')">⬅️ Voltar ao Início</button>
        <h2>Fila de Separação</h2>
        <div id="area-lista-pedidos" style="margin-top: 20px;"></div>
    </div>

    <div class="tela-foco hidden" id="tela-separacao-foco">
        
        <div class="foco-header">
            <div class="foco-pedido-info" id="foco-pedido-info">Pedido: 000</div>
            <div class="foco-loc" id="foco-loc">A1</div>
        </div>
        
        <div class="foco-produto-area">
            <img id="foco-img" src="">
            <div class="foco-nome" id="foco-nome">Nome Produto</div>
            <div class="ticks-container" id="foco-ticks"></div>
        </div>

        <div id="bloco-desempate" class="area-desempate hidden"></div>
        
        <div class="area-interacao">
            
            <div id="bloco-teclado-foco" style="display: flex; flex-direction: column; height: 100%;">
                <div id="foco-teclado-titulo" style="text-align:center; font-size:14px; font-weight:bold; color:#555;">Digite os 4 últimos do EAN</div>
                <div id="display-foco" class="display-teclado"></div>
                
                <div class="grid-teclado">
                    <button class="btn-num" onclick="addFoco(1)">1</button><button class="btn-num" onclick="addFoco(2)">2</button><button class="btn-num" onclick="addFoco(3)">3</button>
                    <button class="btn-num" onclick="addFoco(4)">4</button><button class="btn-num" onclick="addFoco(5)">5</button><button class="btn-num" onclick="addFoco(6)">6</button>
                    <button class="btn-num" onclick="addFoco(7)">7</button><button class="btn-num" onclick="addFoco(8)">8</button><button class="btn-num" onclick="addFoco(9)">9</button>
                    <button class="btn-danger" style="font-size:14px; font-weight:bold; border-radius:10px;" onclick="if(confirm('Cancelar separação?')) abrirTela('tela-inicial');">❌ Sair</button>
                    <button class="btn-num" onclick="addFoco(0)">0</button>
                    <button class="btn-num" style="background:#ddd; color:#999;" disabled>_</button> </div>
            </div>

            <div id="bloco-add-foco" class="hidden" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%;">
                <div style="color:green; font-weight:900; margin-bottom:15px; font-size:18px;">✅ PRODUTO CORRETO!</div>
                <button class="btn-secondary" style="width:100%; height:120px; font-size:28px; border-radius:16px; font-weight:900; box-shadow: 0 6px 0 #1976D2;" onclick="registrarUnidadeFoco()">
                    ➕ ADICIONAR UNIDADE
                </button>
                <button class="btn-danger" style="padding:15px; width:100%; margin-top:20px; font-size:16px;" onclick="if(confirm('Cancelar separação?')) abrirTela('tela-inicial');">❌ Abortar Pedido</button>
            </div>

            <div id="bloco-confirmacao-item" class="hidden" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; background:#fff3e0; border:3px solid var(--warning); border-radius:12px; padding:15px; box-sizing:border-box;">
                <h2 style="color:var(--warning); font-size:24px; margin-bottom:10px;">⚠️ ATENÇÃO</h2>
                <p style="text-align:center; font-size:18px; font-weight:bold; color:#333; margin-bottom: 20px;">
                    Você separou realmente <br><span style="font-size:38px; color:var(--primary); font-weight:900;" id="conf-qtd">0</span><br> unidades deste produto?
                </p>
                <button class="btn-primary" style="width:100%; padding:25px; font-size:20px; box-shadow: 0 5px 0 #388E3C;" onclick="confirmarFimItem()">✅ SIM, CONFERIDO</button>
            </div>

        </div>
    </div>

    <div class="container hidden" id="tela-conclusao">
        <h2 style="color:var(--primary); font-size: 28px;">🎉 Pedido Finalizado!</h2>
        <p style="text-align:center; color:#666;">Confira a lista abaixo antes de imprimir.</p>
        
        <div class="checklist-box" id="area-checklist">
            </div>

        <button class="btn-print" style="padding: 25px; font-size: 20px; width:100%; margin-top:20px;" onclick="imprimirEtiquetaBluetooth()">🖨️ Imprimir Etiqueta (48mm)</button>
        <button class="btn-secondary" style="padding: 20px; font-size: 18px; width:100%; margin-top:15px;" onclick="abrirTela('tela-inicial')">✅ Voltar ao Menu</button>
    </div>
</div>

<script>
    let bancoDeDados = []; let pedidosFila = []; let listaDeSeparacao = []; let indexAtualPicking = 0; let pedidoAtual = null; let audioCtx = null;
    let focoDisplayStr = ""; let focoModo = "EAN"; let focoLimite = 4; let focoProdutosEmpatados = [];

    window.onload = async function() {
        try { 
            const resposta = await fetch('../site/bancodedados.json'); bancoDeDados = await resposta.json(); 
            let modificacoesLocais = JSON.parse(localStorage.getItem('estoque_modificacoes') || '{}');
            bancoDeDados.forEach(p => { let sku = p.codigo || p["Código"]; if(sku && modificacoesLocais[sku]) Object.assign(p, modificacoesLocais[sku]); });
            document.getElementById('status-db').innerText = `✅ Banco Preparado`; document.getElementById('status-db').style.color = "green";
            document.getElementById('btn-iniciar').classList.remove('hidden');
        } catch (erro) { document.getElementById('status-db').innerText = "❌ Erro ao ler Banco Local."; }
    };

    function abrirTela(id) { ['tela-inicial', 'tela-lista-pedidos', 'tela-separacao-foco', 'tela-conclusao'].forEach(t => document.getElementById(t).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
    
    function mostrarAlerta(msg, tipo = 'sucesso') { 
        let a = document.getElementById('alerta-customizado'); a.innerText = msg; a.className = ''; 
        if(tipo === 'erro') a.classList.add('alerta-erro'); else if(tipo === 'aviso') a.classList.add('alerta-aviso'); else a.classList.add('alerta-sucesso'); 
        a.style.display = 'block'; setTimeout(() => a.style.display = 'none', 2500); 
    }
    
    function inicializarAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    
    function tocarBipe(tipo) { 
        if (!audioCtx) return; try { 
            const osc = audioCtx.createOscillator(); const ganho = audioCtx.createGain(); osc.connect(ganho); ganho.connect(audioCtx.destination); 
            if(tipo === 'sucesso'){ osc.type = 'sine'; osc.frequency.setValueAtTime(900, audioCtx.currentTime); ganho.gain.setValueAtTime(0.5, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.1); } 
            else { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(250, audioCtx.currentTime); ganho.gain.setValueAtTime(0.5, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.5); } 
        } catch(e){} 
    }

    async function carregarPedidosFila() {
        inicializarAudio(); abrirTela('tela-lista-pedidos');
        let container = document.getElementById('area-lista-pedidos'); container.innerHTML = '<p style="text-align:center;">⏳ Buscando...</p>';
        try {
            const resposta = await fetch('../site/pedidos_fila.json'); pedidosFila = await resposta.json(); container.innerHTML = '';
            let pendentes = pedidosFila.filter(p => p.status === 'PENDENTE'); if(pendentes.length===0) return container.innerHTML = '<h3 style="color:green; text-align:center;">✅ Fila Vazia!</h3>';
            pendentes.forEach(pedido => {
                let div = document.createElement('div'); div.className = 'resultado-item'; 
                div.innerHTML = `Pedido: ${pedido.orderNum} <br><span style="font-size:14px; color:#555; font-weight:normal;">📦 ${pedido.items?pedido.items.length:0} Produtos</span>`;
                div.onclick = () => iniciarSeparacaoPedido(pedido); container.appendChild(div);
            });
        } catch (e) { container.innerHTML = '<p style="color:red; text-align:center;">❌ Falha de conexão.</p>'; }
    }

    function iniciarSeparacaoPedido(pedido) {
        listaDeSeparacao = []; pedidoAtual = pedido; 
        pedido.items.forEach(item => { if (item.foundProduct) listaDeSeparacao.push({ quantidadeTotal: item.qtd, unidadesLidas: 0, nomePedido: item.nomeOriginal, produtoDb: item.foundProduct, localizacao: item.foundProduct.localizacao || item.foundProduct["Localização"] || "SEM LOC", status: 'pendente' }); });
        listaDeSeparacao.sort((a, b) => a.localizacao.localeCompare(b.localizacao)); indexAtualPicking = 0; 
        abrirTela('tela-separacao-foco'); renderizarItemFoco();
    }

    function renderizarItemFoco() {
        if (indexAtualPicking >= listaDeSeparacao.length) { finalizarPedido(); return; }
        
        let item = listaDeSeparacao[indexAtualPicking]; let skuItem = item.produtoDb.codigo || item.produtoDb["Código"] || "";
        document.getElementById('foco-pedido-info').innerText = `Pedido: ${pedidoAtual.orderNum}`; 
        document.getElementById('foco-loc').innerText = `${item.localizacao}`; 
        document.getElementById('foco-img').src = `../site/img/produtos/${skuItem}.webp`; 
        document.getElementById('foco-nome').innerText = item.nomePedido; 
        
        let cTicks = document.getElementById('foco-ticks'); cTicks.innerHTML = '';
        for(let i=0; i<item.quantidadeTotal; i++) { 
            let tick = document.createElement('div'); tick.className = 'tick-box'; 
            if(i<item.unidadesLidas) { tick.classList.add('active'); tick.innerHTML='✓'; } 
            cTicks.appendChild(tick); 
        }
        
        focoProdutosEmpatados = []; document.getElementById('bloco-desempate').classList.add('hidden');
        
        // Controle de Exibição (Teclado vs Botão vs Confirmação Final)
        document.getElementById('bloco-teclado-foco').classList.add('hidden');
        document.getElementById('bloco-add-foco').classList.add('hidden');
        document.getElementById('bloco-confirmacao-item').classList.add('hidden');

        if (item.unidadesLidas === 0) { 
            document.getElementById('bloco-teclado-foco').classList.remove('hidden'); 
            resetarTecladoFoco("EAN", 4, "DIGITE OS 4 ÚLTIMOS DO EAN"); 
        } else if (item.unidadesLidas < item.quantidadeTotal) { 
            document.getElementById('bloco-add-foco').classList.remove('hidden'); 
        } else {
            // Leu tudo! Hora da Confirmação Segura
            document.getElementById('conf-qtd').innerText = item.quantidadeTotal;
            document.getElementById('bloco-confirmacao-item').classList.remove('hidden');
            tocarBipe('sucesso');
        }
    }

    // ================== TECLADO COM AUTO-SUBMIT ==================
    function resetarTecladoFoco(modo, limite, titulo) { 
        focoModo = modo; focoLimite = limite; focoDisplayStr = ""; 
        document.getElementById('foco-teclado-titulo').innerText = titulo; 
        document.getElementById('display-foco').classList.remove('erro');
        atualizarDisplayFoco(); 
    }

    function addFoco(num) { 
        if(focoDisplayStr.length < focoLimite) { 
            focoDisplayStr += num; 
            atualizarDisplayFoco(); 
            // Se chegou no limite (4 ou 2), avalia automaticamente após um micro-atraso visual
            if(focoDisplayStr.length === focoLimite) {
                setTimeout(confirmarFoco, 150);
            }
        } 
    }

    function apagarFocoErro() {
        document.getElementById('display-foco').classList.add('erro');
        setTimeout(() => { focoDisplayStr = ""; document.getElementById('display-foco').classList.remove('erro'); atualizarDisplayFoco(); }, 600);
    }
    
    function atualizarDisplayFoco() { document.getElementById('display-foco').innerText = focoDisplayStr + "-".repeat(focoLimite - focoDisplayStr.length); }

    function confirmarFoco() {
        let skuCorreto = String(listaDeSeparacao[indexAtualPicking].produtoDb.codigo || listaDeSeparacao[indexAtualPicking].produtoDb["Código"] || "").trim().toUpperCase();
        
        if(focoModo === "EAN") {
            let achados = bancoDeDados.filter(p => String(p.gtin || p["GTIN/EAN"] || "").replace(/\D/g, "").replace(/^0+/, "").endsWith(focoDisplayStr));
            if (achados.length === 0) { tocarBipe('erro'); mostrarAlerta("❌ EAN não encontrado!", "erro"); apagarFocoErro(); } 
            else if (achados.length === 1) { 
                if(String(achados[0].codigo || achados[0]["Código"] || "").trim().toUpperCase() === skuCorreto) registrarUnidadeFoco(); 
                else { tocarBipe('erro'); mostrarAlerta("❌ Produto Errado!", "erro"); apagarFocoErro(); } 
            } 
            else { tocarBipe('erro'); mostrarAlerta("⚠️ Conflito! Preciso do SKU.", "aviso"); acionarDesempateFoco(achados); }
        } else if (focoModo === "SKU") {
            let match = focoProdutosEmpatados.find(p => String(p.codigo || p["Código"] || "").trim().toUpperCase().endsWith(focoDisplayStr));
            if(match) { 
                if(String(match.codigo || match["Código"] || "").trim().toUpperCase() === skuCorreto) registrarUnidadeFoco(); 
                else { tocarBipe('erro'); mostrarAlerta("❌ Produto Errado!", "erro"); apagarFocoErro(); } 
            } 
            else { tocarBipe('erro'); mostrarAlerta("❌ SKU não bate com a foto.", "erro"); apagarFocoErro(); }
        }
    }

    function acionarDesempateFoco(lista) {
        focoProdutosEmpatados = lista; let area = document.getElementById('bloco-desempate'); area.innerHTML = '';
        lista.forEach(p => { let sku = String(p.codigo || p["Código"]); area.innerHTML += `<div class="card-desempate"><img src="../site/img/produtos/${sku}.webp" onerror="this.style.display='none'"><div class="desc">SKU: ${sku.slice(-2)}</div></div>`; });
        area.classList.remove('hidden'); resetarTecladoFoco("SKU", 2, "⚠️ DESEMPATE: Digite os 2 últimos do SKU");
    }

    function registrarUnidadeFoco() {
        let item = listaDeSeparacao[indexAtualPicking]; item.unidadesLidas++; 
        tocarBipe('sucesso'); 
        renderizarItemFoco(); 
    }

    function confirmarFimItem() {
        let item = listaDeSeparacao[indexAtualPicking];
        item.status = 'concluido'; 
        indexAtualPicking++; 
        renderizarItemFoco();
    }

    // ================== CONCLUSÃO E IMPRESSÃO (BLUETOOTH TÉRMICA 48mm) ==================
    function finalizarPedido() {
        let areaCheck = document.getElementById('area-checklist'); areaCheck.innerHTML = '';
        listaDeSeparacao.forEach(i => {
            areaCheck.innerHTML += `<div class="checklist-item"><span>${i.nomePedido.substring(0,25)}...</span> <span>${i.quantidadeTotal}x</span></div>`;
        });
        abrirTela('tela-conclusao');
    }

    function imprimirEtiquetaBluetooth() {
        let n = pedidoAtual ? (pedidoAtual.orderNum || 'N/A') : 'N/A';
        let dataHora = new Date().toLocaleString('pt-BR');
        
        let iframe = document.getElementById('f-print') || document.createElement('iframe'); 
        iframe.id = 'f-print'; iframe.style.display = 'none'; document.body.appendChild(iframe);
        let doc = iframe.contentWindow.document; doc.open();
        
        // Configuração exata para Impressora Térmica Contínua de 48mm de impressão (Bobina 58mm)
        // Formatado como uma etiqueta vertical longa
        let html = `
        <html>
        <head>
            <style>
                @page { margin: 0; size: 48mm auto; } 
                body { width: 48mm; font-family: 'Courier New', monospace; font-size: 11px; margin: 0; padding: 2mm 0; color: #000; text-align: center; } 
                h2 { font-size: 18px; font-weight: 900; margin: 0 0 5px 0; border-top: 2px solid #000; border-bottom: 2px solid #000; padding: 5px 0; }
                .data { font-size: 10px; margin-bottom: 10px; font-weight: bold; }
                .item { text-align: left; border-bottom: 1px dashed #000; padding: 4px 0; display: flex; justify-content: space-between; font-weight: bold; }
                .nome-item { width: 80%; display: inline-block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
                .qtd-item { width: 20%; text-align: right; font-size: 14px; }
                .fim { margin-top: 15px; text-align: center; font-size: 12px; border-bottom: 2px dashed #000; padding-bottom: 20px;}
            </style>
        </head>
        <body>
            <h2>PEDIDO<br>${n}</h2>
            <div class="data">Expedição:<br>${dataHora}</div>
            <div style="border-top: 1px solid #000; margin-bottom: 5px;"></div>
            <div style="text-align:left; font-weight:900; margin-bottom:2px;">Qtd  - Produto</div>`;
            
        listaDeSeparacao.forEach(i => {
            html += `<div class="item"><span class="qtd-item">${i.quantidadeTotal}x</span> <span class="nome-item" style="margin-left:5px;">${i.nomePedido}</span></div>`;
        });
        
        doc.write(html + `<div class="fim">SEPARAÇÃO CONCLUÍDA</div><br><br><br></body></html>`); 
        doc.close(); 
        
        // O delay garante que a janela do print carregue os estilos
        setTimeout(() => iframe.contentWindow.print(), 800);
    }
</script>
</body>
</html>
