<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão e Separação</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        /* --- ESTILOS DO APLICATIVO --- */
        :root {
            --primary: #4CAF50;
            --secondary: #2196F3;
            --danger: #f44336;
            --warning: #ff9800;
            --dark: #333;
            --light: #f4f4f4;
        }
        
        body { font-family: Arial, sans-serif; background-color: var(--light); margin: 0; padding: 20px; color: var(--dark); }
        h1, h2, h3 { text-align: center; }
        
        button {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            font-size: 16px; font-weight: bold; color: white;
            background-color: var(--primary); border: none; border-radius: 8px;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:active { transform: translateY(2px); }
        .btn-secondary { background-color: var(--secondary); }
        .btn-danger { background-color: var(--danger); }
        .btn-warning { background-color: var(--warning); color: #000; }
        .btn-print { background-color: #000000; }
        
        .container {
            max-width: 600px; margin: auto; background: white;
            padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        /* Menu de Abas */
        .abas-menu { display: flex; gap: 10px; margin-bottom: 20px; }
        .abas-menu button { margin: 0; padding: 10px; font-size: 14px; }
        .aba-inativa { background-color: #ccc; color: #555; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 16px; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 15px; font-size: 16px;
            border: 2px solid #ccc; border-radius: 8px; box-sizing: border-box; font-family: Arial;
        }
        
        .resultado-item, .item-separacao {
            padding: 15px; margin-bottom: 8px; background-color: #e3f2fd;
            border: 1px solid #90caf9; border-radius: 8px; font-size: 16px;
            font-weight: bold; color: #0d47a1; cursor: pointer;
        }
        .item-separacao { cursor: default; display: flex; flex-direction: column; gap: 8px; }
        .item-separacao.separado { background-color: #d4edda; border-color: #c3e6cb; color: #155724; text-decoration: line-through; }
        .item-separacao.alerta { background-color: #fff3cd; border-color: #ffeeba; color: #856404; }
        
        .resultado-dica { font-size: 13px; color: #555; font-weight: normal; margin-top: 4px; }
        .loc-badge { display: inline-block; background: #333; color: #fff; padding: 3px 8px; border-radius: 12px; font-size: 12px; margin-top: 5px;}
        
        .produto-foto { width: 100%; max-height: 250px; object-fit: contain; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; }
        
        #reader { width: 100%; margin-bottom: 20px; }
        .hidden { display: none !important; }
        
        #status-db { text-align: center; padding: 10px; margin-bottom: 15px; border-radius: 6px; font-weight: bold; }
        .status-ok { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-erro { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* Estilos de Impressão (mantidos) */
        @media print {
            @page { margin: 0; size: 58mm auto; }
            body { margin: 0; padding: 0; background: white; }
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 48mm; padding: 2mm 5mm; margin: 0; border: none; text-align: center; color: #000; }
            .destaque-codigo { font-size: 26px; font-weight: 900; margin: 0 0 5px 0; }
            #print-area img { width: 45mm; max-height: 45mm; object-fit: contain; margin-bottom: 8px; filter: grayscale(100%) contrast(120%); }
            #print-area h3 { margin: 0 0 8px 0; font-size: 16px; text-transform: uppercase; }
            .info-linha { font-size: 14px; margin: 5px 0; font-weight: bold; border-bottom: 1px dashed #999; padding-bottom: 4px; text-align: left; }
            .info-linha span { font-weight: normal; float: right; }
        }
    </style>
</head>
<body>

<div class="container" id="app-container">
    <h1>📦 Estoque e Logística</h1>

    <div id="status-db" class="status-erro">⏳ Carregando banco de dados...</div>
    
    <div id="area-upload" class="hidden">
        <p style="text-align:center; font-weight:bold; color:red;">Selecione o bancodedados.json:</p>
        <input type="file" id="file-json" accept=".json" style="display:block; margin:auto; margin-bottom: 15px;">
    </div>

    <div class="abas-menu hidden" id="menu-abas">
        <button id="btn-aba-etiquetas" onclick="mudarAba('etiquetas')">🏷️ Etiquetas</button>
        <button id="btn-aba-separacao" class="aba-inativa" onclick="mudarAba('separacao')">🛒 Separação</button>
    </div>
    
    <div id="aba-etiquetas" class="hidden">
        <div class="form-group">
            <label>🔍 Buscar Produto (Nome ou Código):</label>
            <input type="text" id="inp-busca" placeholder="Ex: Vinagre, 494079I..." oninput="buscarPorNome()">
        </div>
        
        <div id="lista-resultados"></div>
        <hr style="margin: 20px 0;">
        <h3 style="text-align: center;">OU</h3>
        <button onclick="iniciarLeitor('busca')">📷 Ler Código com a Câmera</button>
    </div>

    <div id="aba-separacao" class="hidden">
        <div class="form-group">
            <label>📋 Cole o Pedido (WhatsApp/Sistema):</label>
            <textarea id="texto-pedido" rows="6" placeholder="Ex:&#10;1x OVO - 1 DUZIA&#10;4x ARROZ KOBLENZ 5KG"></textarea>
        </div>
        <button class="btn-secondary" onclick="processarPedido()">Gerar Lista de Separação</button>
        
        <div id="area-lista-separacao" style="margin-top: 20px;"></div>
    </div>
    
    <div id="reader-container" class="hidden" style="margin-top:20px; border: 2px solid #ccc; padding: 10px; border-radius: 8px;">
        <h3 id="titulo-camera">Escaneando...</h3>
        <img id="img-ref-separacao" class="produto-foto hidden" src="" alt="Referência">
        
        <div class="form-group">
            <label>Digitar EAN manualmente (se não ler):</label>
            <input type="number" id="inp-ean-manual" placeholder="Código de Barras">
            <button class="btn-secondary" onclick="verificarEanManual()">Confirmar Digitação</button>
        </div>

        <div id="reader"></div>
        <button class="btn-danger" onclick="pararLeitor()">Cancelar Câmera</button>
    </div>

    <div id="product-form" class="hidden">
        <button class="btn-danger" style="margin-bottom: 15px;" onclick="fecharCard()">❌ Fechar Produto</button>
        <h2>Editar Etiqueta</h2>
        <img id="img-foto" class="produto-foto" src="" alt="Foto do Produto">
        
        <div class="form-group"><label>Código Interno</label><input type="text" id="inp-codigo"></div>
        <div class="form-group"><label>Nome do Produto</label><input type="text" id="inp-nome"></div>
        <div class="form-group"><label>Código EAN</label><input type="text" id="inp-ean"></div>
        <div class="form-group"><label>Endereço (Gôndola)</label><input type="text" id="inp-loc"></div>
        <div class="form-group"><label>Estoque</label><input type="text" id="inp-estoque"></div>
        <div class="form-group"><label>Data de Validade</label><input type="text" id="inp-validade"></div>
        <div class="form-group"><label>Preço de Custo (R$)</label><input type="text" id="inp-custo"></div>
        <div class="form-group"><label>Preço de Venda (R$)</label><input type="text" id="inp-venda"></div>
        
        <button class="btn-print" onclick="imprimirEtiqueta()">🖨️ Imprimir na Térmica (58mm)</button>
        <button onclick="salvarEtiquetaLocal()">💾 Guardar Dados Modificados</button>
    </div>

</div>

<div id="print-area" class="hidden">
    <div id="print-cod" class="destaque-codigo"></div>
    <img id="print-img" src="" alt="Foto">
    <h3 id="print-nome"></h3>
    <div class="info-linha"><strong>EAN:</strong> <span id="print-ean"></span></div>
    <div class="info-linha"><strong>VAL:</strong> <span id="print-validade"></span></div>
    <div class="info-linha"><strong>LOC:</strong> <span id="print-loc"></span></div>
</div>

<script>
    let bancoDeDados = [];
    let html5QrCode = null;
    let modoAtualCamera = ''; // 'busca' ou 'separacao'
    let indexItemSendoConferido = null; // Guarda qual item da lista estamos separando
    let listaDeSeparacao = []; // Guarda os itens do pedido gerado

    // --- 1. CARREGAMENTO INICIAL ---
    window.onload = async function() {
        try {
            const resposta = await fetch('../site/bancodedados.json');
            if(!resposta.ok) throw new Error("Arquivo não encontrado.");
            bancoDeDados = await resposta.json();
            liberarSistema("✅ Banco de Dados Carregado (" + bancoDeDados.length + " produtos)");
        } catch (erro) {
            document.getElementById('status-db').innerText = "❌ Erro ao ler pasta. Use o botão abaixo.";
            document.getElementById('area-upload').classList.remove('hidden');
        }
    };

    document.getElementById('file-json').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    bancoDeDados = JSON.parse(e.target.result);
                    liberarSistema("✅ Banco de Dados Carregado Manualmente (" + bancoDeDados.length + " produtos)");
                    document.getElementById('area-upload').classList.add('hidden');
                } catch (error) { alert("O arquivo selecionado não é um JSON válido."); }
            };
            reader.readAsText(file);
        }
    });

    function liberarSistema(mensagem) {
        let status = document.getElementById('status-db');
        status.innerText = mensagem;
        status.className = 'status-ok';
        document.getElementById('menu-abas').classList.remove('hidden');
        mudarAba('etiquetas'); // Abre a aba de etiquetas por padrão
    }

    // --- 2. CONTROLE DE ABAS ---
    function mudarAba(abaId) {
        document.getElementById('aba-etiquetas').classList.add('hidden');
        document.getElementById('aba-separacao').classList.add('hidden');
        document.getElementById('btn-aba-etiquetas').classList.add('aba-inativa');
        document.getElementById('btn-aba-separacao').classList.add('aba-inativa');
        
        document.getElementById('aba-' + abaId).classList.remove('hidden');
        document.getElementById('btn-aba-' + abaId).classList.remove('aba-inativa');
        pararLeitor(); // Desliga a câmera se mudar de aba
    }

    // --- 3. ABA: GESTÃO DE ETIQUETAS ---
    function buscarPorNome() {
        let termo = document.getElementById('inp-busca').value.toLowerCase().trim();
        let lista = document.getElementById('lista-resultados');
        lista.innerHTML = ''; 
        if (termo.length < 3) return; 

        let encontrados = bancoDeDados.filter(p => {
            let nomeDb = String(p.nome || p["Descrição"] || "").toLowerCase();
            let codDb = String(p.codigo || p["Código"] || "").toLowerCase();
            let eanDb = String(p.gtin || p["GTIN/EAN"] || "").replace(/\D/g, "");
            return nomeDb.includes(termo) || codDb.includes(termo) || eanDb.includes(termo);
        });

        if (encontrados.length === 0) {
            lista.innerHTML = '<div style="text-align:center; color:red; padding:10px;">Nenhum produto encontrado.</div>';
            return;
        }

        encontrados.slice(0, 10).forEach(p => {
            let nome = p.nome || p["Descrição"] || "Sem Nome";
            let cod = p.codigo || p["Código"] || "";
            let preco = p.preco || p["Preço"] || "0,00";

            let div = document.createElement('div');
            div.className = 'resultado-item';
            div.innerHTML = `${nome} <div class="resultado-dica">Cód: ${cod} | R$ ${preco}</div>`;
            div.onclick = function() { preencherFormulario(p); lista.innerHTML = ''; document.getElementById('inp-busca').value = ''; };
            lista.appendChild(div);
        });
    }

    function preencherFormulario(produto) {
        const codigo = produto.codigo || produto["Código"] || "";
        document.getElementById('inp-codigo').value = codigo; 
        document.getElementById('inp-nome').value = produto.nome || produto["Descrição"] || "";
        document.getElementById('inp-ean').value = String(produto.gtin || produto["GTIN/EAN"] || "").replace(/[^0-9]/g, "");
        document.getElementById('inp-loc').value = produto.localizacao || produto["Localização"] || "";
        document.getElementById('inp-estoque').value = produto.estoque || produto["Estoque"] || "";
        document.getElementById('inp-validade').value = produto.validade || produto["Data Validade"] || "";
        document.getElementById('inp-custo').value = produto.preco_custo || produto["Preço de custo"] || "";
        document.getElementById('inp-venda').value = produto.preco || produto["Preço"] || "";
        
        const imgElement = document.getElementById('img-foto');
        imgElement.style.display = 'block'; // Garante que será visível (Correção anterior)
        imgElement.src = `../site/img/produtos/${codigo}.webp`;
        // Adiciona um fallback simples caso não exista
        imgElement.onerror = function() { this.style.display = 'none'; };
        
        document.getElementById('aba-etiquetas').classList.add('hidden');
        document.getElementById('product-form').classList.remove('hidden');
    }

    function fecharCard() {
        document.getElementById('product-form').classList.add('hidden');
        document.getElementById('aba-etiquetas').classList.remove('hidden');
    }

    // --- 4. ABA: SEPARAÇÃO DE PEDIDOS (PICKING) ---
    function processarPedido() {
        const texto = document.getElementById('texto-pedido').value;
        const linhas = texto.split('\n');
        
        // Expressão Regular: Procura o número, o 'x' e o resto da frase.
        const regex = /^(\d+)[xX]\s+(.*)/; 
        
        listaDeSeparacao = [];

        linhas.forEach(linha => {
            const match = linha.trim().match(regex);
            if (match) {
                let quantidade = match[1];
                let nomeOriginal = match[2].trim();
                
                // Remove palavras que atrapalham a busca (como ofertas e promoções)
                let nomeLimpoBusca = nomeOriginal.replace(/\(Oferta\)/gi, '').replace(/\(Promo\)/gi, '').trim().toLowerCase();
                
                // Quebra o nome em palavras para tentar achar no banco
                let palavrasChave = nomeLimpoBusca.split(' ');
                
                // Busca o melhor match no banco de dados
                let melhorMatch = bancoDeDados.find(p => {
                    let nomeDb = String(p.nome || p["Descrição"] || "").toLowerCase();
                    // Checa se as primeiras duas palavras principais coincidem
                    return nomeDb.includes(palavrasChave[0]) && (palavrasChave[1] ? nomeDb.includes(palavrasChave[1]) : true);
                });

                listaDeSeparacao.push({
                    quantidade: quantidade,
                    nomePedido: nomeOriginal,
                    produtoDb: melhorMatch || null,
                    localizacao: melhorMatch ? (melhorMatch.localizacao || melhorMatch["Localização"] || "Sem Local") : "ZZZ", // ZZZ joga pro final
                    separado: false
                });
            }
        });

        // Ordena pela localização para criar uma rota lógica no supermercado!
        listaDeSeparacao.sort((a, b) => a.localizacao.localeCompare(b.localizacao));
        
        renderizarListaSeparacao();
    }

    function renderizarListaSeparacao() {
        let divArea = document.getElementById('area-lista-separacao');
        divArea.innerHTML = '<h3>Lista de Separação</h3>';

        if(listaDeSeparacao.length === 0) {
            divArea.innerHTML += '<p style="color:red; text-align:center;">Nenhum item válido encontrado. Copie e cole os itens com o padrão "1x Nome do Produto".</p>';
            return;
        }

        listaDeSeparacao.forEach((item, index) => {
            let div = document.createElement('div');
            
            if (item.separado) {
                div.className = 'item-separacao separado';
            } else if (!item.produtoDb) {
                div.className = 'item-separacao alerta'; // Não achou no sistema
            } else {
                div.className = 'item-separacao';
            }

            let htmlConteudo = `
                <div><strong>${item.quantidade}x</strong> ${item.nomePedido}</div>
            `;

            if (item.produtoDb) {
                let cod = item.produtoDb.codigo || item.produtoDb["Código"] || "";
                htmlConteudo += `<div class="loc-badge">📍 Gôndola: ${item.localizacao} | Cód: ${cod}</div>`;
                
                // Botão de conferência (Só mostra se ainda não foi separado)
                if(!item.separado) {
                    htmlConteudo += `<button class="btn-warning" onclick="abrirConferenciaSeparacao(${index})" style="padding:10px; margin-top:10px;">📸 Conferir e Separar</button>`;
                } else {
                    htmlConteudo += `<div style="text-align:right; font-size: 20px;">✅ Separado</div>`;
                }
            } else {
                htmlConteudo += `<div class="resultado-dica" style="color:red;">⚠️ Produto não localizado no sistema. Separe manualmente.</div>
                                 <button class="btn-secondary" onclick="marcarSeparadoManual(${index})" style="padding:10px; margin-top:10px;">✅ Marcar Separado</button>`;
            }

            div.innerHTML = htmlConteudo;
            divArea.appendChild(div);
        });
    }

    function abrirConferenciaSeparacao(index) {
        indexItemSendoConferido = index;
        let item = listaDeSeparacao[index];
        let cod = item.produtoDb.codigo || item.produtoDb["Código"] || "";

        document.getElementById('aba-separacao').classList.add('hidden');
        document.getElementById('titulo-camera').innerText = `Procurando: ${item.quantidade}x ${item.nomePedido}`;
        
        // Mostra a imagem para ajudar na separação visual
        let imgRef = document.getElementById('img-ref-separacao');
        imgRef.src = `../site/img/produtos/${cod}.webp`;
        imgRef.classList.remove('hidden');
        imgRef.style.display = 'block';
        imgRef.onerror = function() { this.style.display = 'none'; };

        iniciarLeitor('separacao');
    }

    function marcarSeparadoManual(index) {
        listaDeSeparacao[index].separado = true;
        renderizarListaSeparacao();
    }

    function verificarEanManual() {
        let eanDigitado = document.getElementById('inp-ean-manual').value;
        if(eanDigitado) processarCodigoLido(eanDigitado);
    }

    // --- 5. CÂMERA COMPARTILHADA (Leitura de Código de Barras) ---
    function iniciarLeitor(modo) {
        modoAtualCamera = modo;
        document.getElementById('reader-container').classList.remove('hidden');
        document.getElementById('aba-etiquetas').classList.add('hidden');
        document.getElementById('inp-ean-manual').value = '';

        if(modo === 'busca') {
            document.getElementById('titulo-camera').innerText = "Busca por Código EAN";
            document.getElementById('img-ref-separacao').classList.add('hidden');
        }

        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 100 } },
            (codigoLido) => {
                pararLeitor();
                processarCodigoLido(codigoLido);
            },
            (err) => {} // Ignora erros contínuos de foco
        ).catch(err => {
            alert("Erro: Câmera negada. Tente digitar o código manualmente.");
        });
    }

    function pararLeitor() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('reader-container').classList.add('hidden');
                
                // Devolve para a aba correta
                if(modoAtualCamera === 'busca') document.getElementById('aba-etiquetas').classList.remove('hidden');
                if(modoAtualCamera === 'separacao') document.getElementById('aba-separacao').classList.remove('hidden');
                
            }).catch(err => console.log(err));
        } else {
            document.getElementById('reader-container').classList.add('hidden');
            if(modoAtualCamera === 'busca') document.getElementById('aba-etiquetas').classList.remove('hidden');
            if(modoAtualCamera === 'separacao') document.getElementById('aba-separacao').classList.remove('hidden');
        }
    }

    function processarCodigoLido(eanLido) {
        let eanLimpo = String(eanLido).replace(/\D/g, "").replace(/^0+/, "");
        let lidoExato = String(eanLido).trim().toUpperCase();

        if (modoAtualCamera === 'busca') {
            // Lógica antiga de busca
            const produtoEncontrado = bancoDeDados.find(p => {
                let eanDb = String(p.gtin || p["GTIN/EAN"] || "").replace(/\D/g, "").replace(/^0+/, "");
                let codigoDb = String(p.codigo || p["Código"] || "").trim().toUpperCase();
                return (eanDb === eanLimpo && eanLimpo !== "") || (codigoDb === lidoExato && lidoExato !== "");
            });

            if (produtoEncontrado) preencherFormulario(produtoEncontrado);
            else alert("Produto não encontrado! Lidos: " + eanLido);

        } else if (modoAtualCamera === 'separacao') {
            // Lógica nova de validação de picking
            let item = listaDeSeparacao[indexItemSendoConferido];
            let eanEsperado = String(item.produtoDb.gtin || item.produtoDb["GTIN/EAN"] || "").replace(/\D/g, "").replace(/^0+/, "");
            let codEsperado = String(item.produtoDb.codigo || item.produtoDb["Código"] || "").trim().toUpperCase();

            if (eanEsperado === eanLimpo || codEsperado === lidoExato) {
                // SUCESSO!
                item.separado = true;
                alert(`✅ Correto! Você separou: ${item.nomePedido}`);
                renderizarListaSeparacao();
                pararLeitor(); // Volta para a tela de separação
            } else {
                alert(`❌ Código INcorreto!\nLido: ${eanLido}\nEsperado: ${eanEsperado}`);
            }
        }
    }

    // --- FUNÇÕES DE IMPRESSÃO E SALVAMENTO (MANTIDAS) ---
    function imprimirEtiqueta() {
        document.getElementById('print-cod').innerText = document.getElementById('inp-codigo').value;
        document.getElementById('print-img').src = document.getElementById('img-foto').src;
        document.getElementById('print-nome').innerText = document.getElementById('inp-nome').value;
        document.getElementById('print-ean').innerText = document.getElementById('inp-ean').value;
        document.getElementById('print-loc').innerText = document.getElementById('inp-loc').value;
        document.getElementById('print-validade').innerText = document.getElementById('inp-validade').value;
        
        let foto = document.getElementById('print-img');
        if (foto.naturalWidth === 0 || foto.src === "" || foto.style.display === "none") {
            foto.style.display = 'none';
        } else { foto.style.display = 'block'; }

        document.getElementById('print-area').classList.remove('hidden');
        window.print(); 
        document.getElementById('print-area').classList.add('hidden');
    }

    function salvarEtiquetaLocal() {
        // ... Lógica de salvar e fecharCard mantida 
        fecharCard(); 
    }
</script>
</body>
</html>
