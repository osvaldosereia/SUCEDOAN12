<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Estoque (Layout Otimizado K9)</title>
    
    <style>
        /* ==================== ESTILOS GERAIS ==================== */
        :root { --primary: #4CAF50; --secondary: #2196F3; --danger: #f44336; --warning: #ff9800; --dark: #333; --light: #f4f4f4; }
        body, html { font-family: Arial, sans-serif; background-color: var(--light); margin: 0; padding: 0; height: 100%; color: var(--dark); user-select: none; overflow: hidden; }
        
        button { border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.96); }
        .btn-primary { background-color: var(--primary); } .btn-secondary { background-color: var(--secondary); }
        .btn-danger { background-color: var(--danger); } .btn-warning { background-color: var(--warning); color: #000; }
        .btn-print { background-color: #000; }
        
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 15px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .hidden { display: none !important; }
        
        h1, h2 { text-align: center; margin-top: 0; font-size: 22px; }
        input, select { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #ccc; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; }
        
        .resultado-item { padding: 12px; margin-bottom: 8px; background-color: #e3f2fd; border: 1px solid #90caf9; border-radius: 8px; font-size: 15px; font-weight: bold; color: #0d47a1; cursor: pointer; }
        
        #alerta-customizado { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; padding: 12px; border-radius: 8px; color: white; font-weight: bold; text-align: center; z-index: 10000; display: none; font-size: 14px; }
        .alerta-erro { background-color: var(--danger); } .alerta-sucesso { background-color: var(--primary); } .alerta-aviso { background-color: var(--warning); color: #000; }

        /* ==================== TELA DE FOCO (SEPARAÇÃO FIXA) ==================== */
        .tela-foco { height: 100vh; display: flex; flex-direction: column; padding: 8px; box-sizing: border-box; background: #fff; overflow: hidden; }
        
        /* Cabeçalho do Pedido */
        .foco-header { display: flex; justify-content: space-between; align-items: center; background: var(--dark); color: white; padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; font-size: 14px; font-weight: bold; }
        .foco-loc { color: var(--warning); font-size: 16px; }

        /* Card Horizontal Otimizado (Produto) */
        .foco-produto-card { display: flex; gap: 10px; background: #f9f9f9; padding: 8px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 8px; align-items: center; }
        .foco-produto-card img { width: 65px; height: 65px; object-fit: contain; background: white; border: 1px solid #ccc; border-radius: 6px; padding: 2px; }
        .foco-produto-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .foco-nome { font-size: 15px; font-weight: bold; line-height: 1.1; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .foco-qtd { font-size: 14px; color: #555; }
        .foco-qtd span { font-size: 20px; font-weight: 900; color: var(--secondary); }

        /* Barrinha de Ticks (Quantidade) */
        .ticks-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin-bottom: 8px; }
        .tick-box { width: 22px; height: 22px; border-radius: 4px; background-color: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: transparent; border: 1px solid #ccc; }
        .tick-box.active { background-color: var(--primary); color: white; border-color: var(--primary); }

        /* Área de Desempate Embutida */
        .area-desempate { display: flex; gap: 5px; overflow-x: auto; background: #ffebee; padding: 6px; border-radius: 8px; border: 1px solid #ffcdd2; margin-bottom: 8px; justify-content: center; }
        .card-desempate { background: white; padding: 4px; border-radius: 6px; text-align: center; width: 65px; flex-shrink: 0; }
        .card-desempate img { width: 100%; height: 50px; object-fit: contain; }
        .card-desempate .desc { font-size: 9px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: bold; margin-top: 2px;}

        /* Área do Teclado e Botões */
        .area-interacao { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; }
        .display-teclado { text-align: center; font-size: 30px; font-weight: 900; letter-spacing: 12px; color: var(--secondary); height: 40px; border-bottom: 2px solid #ccc; margin-bottom: 8px; }
        .grid-teclado { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .btn-num { background: #f0f0f0; border: 2px solid #ddd; color: #333; font-size: 24px; font-weight: bold; border-radius: 8px; height: 55px; }
        .btn-num:active { background: #d0d0d0; }
        .btn-action { font-size: 16px; height: 55px; border-radius: 8px; }

        /* Modais Antigos (Apenas para telas do Menu) */
        #modal-teclado-busca { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9000; display:flex; flex-direction:column; justify-content:flex-end; }
        .teclado-box-flutuante { background: white; border-radius: 20px 20px 0 0; padding: 15px; }
    </style>
</head>
<body>

<div id="alerta-customizado">Mensagem</div>

<div id="modal-teclado-busca" class="hidden">
    <div class="teclado-box-flutuante">
        <h3 style="margin-bottom: 5px;">Digite os 4 do EAN</h3>
        <div id="display-busca" class="display-teclado"></div>
        <div class="grid-teclado">
            <button class="btn-num" onclick="addDigitoBusca(1)">1</button><button class="btn-num" onclick="addDigitoBusca(2)">2</button><button class="btn-num" onclick="addDigitoBusca(3)">3</button>
            <button class="btn-num" onclick="addDigitoBusca(4)">4</button><button class="btn-num" onclick="addDigitoBusca(5)">5</button><button class="btn-num" onclick="addDigitoBusca(6)">6</button>
            <button class="btn-num" onclick="addDigitoBusca(7)">7</button><button class="btn-num" onclick="addDigitoBusca(8)">8</button><button class="btn-num" onclick="addDigitoBusca(9)">9</button>
            <button class="btn-action btn-danger" onclick="limparBusca()">Apagar</button><button class="btn-num" onclick="addDigitoBusca(0)">0</button>
            <button class="btn-action btn-primary" id="btn-ok-busca" onclick="confirmarBusca()">OK</button>
        </div>
        <button class="btn-danger" style="width:100%; padding:15px; margin-top:10px;" onclick="fecharTecladoBusca()">❌ Cancelar</button>
    </div>
</div>

<div id="app-ui" style="height: 100%;">
    
    <div class="container" id="tela-inicial">
        <h1>📦 Sistema de Estoque</h1>
        <p id="status-db" style="text-align:center; font-weight:bold; color:#721c24;">⏳ Carregando banco...</p>
        <div id="botoes-menu" class="hidden">
            <button class="btn-primary" style="padding:20px; font-size:18px;" onclick="abrirTela('tela-etiquetas')">🏷️ Gestão de Etiquetas</button>
            <button class="btn-secondary" style="padding:20px; font-size:18px;" onclick="abrirTelaListaPedidos()">🛒 Iniciar Separação</button>
            <button class="btn-warning" style="padding:15px; margin-top:30px;" onclick="exportarBancoCSV()">💾 Exportar Banco (CSV)</button>
        </div>
    </div>

    <div class="container hidden" id="tela-etiquetas">
        <div id="area-busca-etiqueta">
            <h2>🔍 Buscar Produto</h2>
            <button onclick="abrirTecladoBusca()" class="btn-primary" style="padding: 20px; font-size: 18px; margin-bottom: 20px;">
                ⌨️ Achar por EAN (4 Últimos)
            </button>
            <input type="text" id="inp-busca" placeholder="Busca por nome..." oninput="buscarPorNome()">
            <div id="lista-resultados"></div>
            <button class="btn-danger" style="padding:15px; margin-top: 20px;" onclick="abrirTela('tela-inicial')">⬅️ Voltar</button>
        </div>
        <div id="product-form" class="hidden">
            <img id="img-foto" src="" style="width: 100%; height: 150px; object-fit: contain; margin-bottom: 10px;">
            <input type="text" id="inp-codigo" readonly style="background:#eee;">
            <input type="number" id="inp-ean" placeholder="EAN">
            <input type="text" id="inp-nome" placeholder="Nome">
            <div style="display:flex; gap:10px;">
                <input type="number" id="inp-estoque" placeholder="Qtd">
                <input type="text" id="inp-validade" placeholder="Validade">
            </div>
            <button class="btn-print" style="padding:15px;" onclick="imprimirEtiquetaGondola()">🖨️ Imprimir</button>
            <button class="btn-secondary" style="padding:15px;" onclick="salvarProdutoLocal()">✅ Salvar</button>
            <button class="btn-danger" style="padding:15px;" onclick="fecharCardProduto()">❌ Fechar</button>
        </div>
    </div>

    <div class="container hidden" id="tela-separacao-input">
        <button class="btn-danger" style="padding:12px;" onclick="abrirTela('tela-inicial')">⬅️ Voltar</button>
        <h2>📋 Fila de Pedidos</h2>
        <button class="btn-print" style="padding:12px;" onclick="carregarPedidosFila()">🔄 Atualizar Lista</button>
        <div id="area-lista-pedidos" style="margin-top: 15px;"></div>
    </div>

    <div class="tela-foco hidden" id="tela-separacao-foco">
        
        <div class="foco-header">
            <span id="foco-pedido-info">Ped: 000</span>
            <span class="foco-loc" id="foco-loc">📍 A1</span>
        </div>
        
        <div class="foco-produto-card">
            <img id="foco-img" src="" alt="Prod">
            <div class="foco-produto-info">
                <div class="foco-nome" id="foco-nome">Nome do Produto</div>
                <div class="foco-qtd" id="foco-qtd-texto">Faltam <span id="span-faltam">0</span> de <span id="span-total">0</span></div>
            </div>
        </div>
        
        <div class="ticks-container" id="foco-ticks"></div>
        
        <div id="bloco-desempate" class="area-desempate hidden"></div>
        
        <div class="area-interacao">
            
            <div id="bloco-teclado-foco">
                <div id="foco-teclado-titulo" style="text-align:center; font-size:12px; font-weight:bold; color:#555;">Digite os 4 últimos do EAN Físico</div>
                <div id="display-foco" class="display-teclado"></div>
                <div class="grid-teclado">
                    <button class="btn-num" onclick="addFoco(1)">1</button><button class="btn-num" onclick="addFoco(2)">2</button><button class="btn-num" onclick="addFoco(3)">3</button>
                    <button class="btn-num" onclick="addFoco(4)">4</button><button class="btn-num" onclick="addFoco(5)">5</button><button class="btn-num" onclick="addFoco(6)">6</button>
                    <button class="btn-num" onclick="addFoco(7)">7</button><button class="btn-num" onclick="addFoco(8)">8</button><button class="btn-num" onclick="addFoco(9)">9</button>
                    <button class="btn-action btn-danger" onclick="apagarFoco()">Corrigir</button>
                    <button class="btn-num" onclick="addFoco(0)">0</button>
                    <button class="btn-action btn-primary" id="btn-ok-foco" onclick="confirmarFoco()">OK</button>
                </div>
            </div>

            <div id="bloco-add-foco" class="hidden" style="display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1;">
                <div style="color:green; font-weight:bold; margin-bottom:10px; font-size:16px;">✅ Código Validado!</div>
                <button class="btn-secondary" style="width:100%; height:90px; font-size:24px; border-radius:12px; font-weight:900;" onclick="registrarUnidadeFoco()">
                    ➕ PEGUEI MAIS 1
                </button>
            </div>
            
            <button class="btn-danger" style="padding:10px; font-size:13px; margin-top:8px; opacity:0.8;" onclick="cancelarPicking()">❌ Cancelar Separação</button>
        </div>
    </div>

    <div class="container hidden" id="tela-conclusao">
        <h2>🎉 Separação Concluída!</h2>
        <button class="btn-print" style="padding: 20px;" onclick="abrirTela('tela-inicial')">🖨️ Imprimir Pedido</button>
        <button class="btn-secondary" style="padding: 20px;" onclick="abrirTela('tela-inicial')">✅ Voltar ao Início</button>
    </div>
</div>

<script>
    let bancoDeDados = []; 
    let pedidosFila = []; let listaDeSeparacao = []; let indexAtualPicking = 0; let pedidoAtual = null; 
    let audioCtx = null;
    let modificacoesLocais = JSON.parse(localStorage.getItem('estoque_modificacoes') || '{}');

    window.onload = async function() {
        try { 
            const resposta = await fetch('../site/bancodedados.json'); 
            bancoDeDados = await resposta.json(); 
            bancoDeDados.forEach(p => { let sku = p.codigo || p["Código"]; if(sku && modificacoesLocais[sku]) Object.assign(p, modificacoesLocais[sku]); });
            document.getElementById('status-db').innerText = `✅ Banco Carregado`; document.getElementById('status-db').style.color = "green";
            document.getElementById('botoes-menu').classList.remove('hidden');
        } catch (erro) { document.getElementById('status-db').innerText = "❌ Erro ao ler Banco Local."; }
    };

    function mostrarAlerta(msg, tipo = 'sucesso', tempo = 2500) {
        let alerta = document.getElementById('alerta-customizado'); alerta.innerText = msg; alerta.className = ''; 
        if (tipo === 'erro') alerta.classList.add('alerta-erro'); else if (tipo === 'aviso') alerta.classList.add('alerta-aviso'); else alerta.classList.add('alerta-sucesso');
        alerta.style.display = 'block'; setTimeout(() => { alerta.style.display = 'none'; }, tempo);
    }
    
    function inicializarAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function tocarBipe(tipo) {
        if (!audioCtx) return; try {
            const osc = audioCtx.createOscillator(); const ganho = audioCtx.createGain(); osc.connect(ganho); ganho.connect(audioCtx.destination);
            if(tipo === 'sucesso'){ osc.type = 'sine'; osc.frequency.setValueAtTime(900, audioCtx.currentTime); ganho.gain.setValueAtTime(0.5, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.1); } 
            else { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); ganho.gain.setValueAtTime(0.5, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.4); }
        } catch(e){}
    }
    
    function abrirTela(idTela) {
        ['tela-inicial', 'tela-etiquetas', 'tela-separacao-input', 'tela-separacao-foco', 'tela-conclusao'].forEach(id => { document.getElementById(id).classList.add('hidden'); });
        document.getElementById(idTela).classList.remove('hidden');
    }

    // ==================== TELA DE SEPARAÇÃO FIXA (LÓGICA) ====================
    let focoDisplayStr = "";
    let focoModo = "EAN"; // Pode ser "EAN" ou "SKU" (desempate)
    let focoLimite = 4;
    let focoProdutosEmpatados = [];

    function abrirTelaListaPedidos() { inicializarAudio(); abrirTela('tela-separacao-input'); carregarPedidosFila(); }

    async function carregarPedidosFila() {
        let container = document.getElementById('area-lista-pedidos'); container.innerHTML = '<p>⏳ Carregando...</p>';
        try {
            const resposta = await fetch('../site/pedidos_fila.json'); pedidosFila = await resposta.json();
            container.innerHTML = ''; let pendentes = pedidosFila.filter(p => p.status === 'PENDENTE');
            if(pendentes.length===0) return container.innerHTML = '<h3 style="color:green; text-align:center;">✅ Tudo limpo!</h3>';
            pendentes.forEach(pedido => {
                let div = document.createElement('div'); div.className = 'resultado-item'; 
                div.innerHTML = `${pedido.orderNum} <br><span style="font-size:12px; color:#555; font-weight:normal;">📦 ${pedido.items?pedido.items.length:0} itens</span>`;
                div.onclick = () => iniciarSeparacaoPedido(pedido); container.appendChild(div);
            });
        } catch (e) { container.innerHTML = '<p color="red">❌ Falha.</p>'; }
    }

    function iniciarSeparacaoPedido(pedido) {
        listaDeSeparacao = []; pedidoAtual = pedido; 
        pedido.items.forEach(item => {
            if (item.foundProduct) {
                listaDeSeparacao.push({
                    quantidadeTotal: item.qtd, unidadesLidas: 0, nomePedido: item.nomeOriginal, 
                    produtoDb: item.foundProduct, localizacao: item.foundProduct.localizacao || item.foundProduct["Localização"] || "ZZZ", status: 'pendente'
                });
            }
        });
        listaDeSeparacao.sort((a, b) => a.localizacao.localeCompare(b.localizacao)); 
        indexAtualPicking = 0; 
        abrirTela('tela-separacao-foco'); renderizarItemFoco();
    }

    function renderizarItemFoco() {
        if (indexAtualPicking >= listaDeSeparacao.length) { abrirTela('tela-conclusao'); return; }
        
        let item = listaDeSeparacao[indexAtualPicking]; 
        let skuItem = item.produtoDb.codigo || item.produtoDb["Código"] || "";
        
        document.getElementById('foco-pedido-info').innerText = `Ped: ${pedidoAtual.orderNum}`;
        document.getElementById('foco-loc').innerText = `📍 ${item.localizacao}`; 
        document.getElementById('foco-img').src = `../site/img/produtos/${skuItem}.webp`;
        document.getElementById('foco-nome').innerText = item.nomePedido; 
        
        let faltam = item.quantidadeTotal - item.unidadesLidas;
        document.getElementById('span-faltam').innerText = faltam;
        document.getElementById('span-total').innerText = item.quantidadeTotal;
        
        let containerTicks = document.getElementById('foco-ticks'); containerTicks.innerHTML = '';
        for(let i=0; i < item.quantidadeTotal; i++) {
            let tick = document.createElement('div'); tick.className = 'tick-box';
            if(i < item.unidadesLidas) { tick.classList.add('active'); tick.innerHTML = '✓'; }
            containerTicks.appendChild(tick);
        }

        focoProdutosEmpatados = [];
        document.getElementById('bloco-desempate').classList.add('hidden');
        
        if (item.unidadesLidas === 0) {
            document.getElementById('bloco-add-foco').classList.add('hidden');
            document.getElementById('bloco-teclado-foco').classList.remove('hidden');
            resetarTecladoFoco("EAN", 4, "Digite os 4 últimos do EAN Físico");
        } else {
            document.getElementById('bloco-teclado-foco').classList.add('hidden');
            document.getElementById('bloco-add-foco').classList.remove('hidden');
        }
    }

    // ----- TECLADO EMBUTIDO DA SEPARAÇÃO -----
    function resetarTecladoFoco(modo, limite, titulo) {
        focoModo = modo; focoLimite = limite; focoDisplayStr = "";
        document.getElementById('foco-teclado-titulo').innerText = titulo;
        atualizarDisplayFoco();
    }

    function addFoco(num) {
        if(focoDisplayStr.length < focoLimite) { focoDisplayStr += num; atualizarDisplayFoco(); }
    }
    function apagarFoco() { focoDisplayStr = ""; atualizarDisplayFoco(); }
    
    function atualizarDisplayFoco() {
        document.getElementById('display-foco').innerText = focoDisplayStr + "-".repeat(focoLimite - focoDisplayStr.length);
        let btnOk = document.getElementById('btn-ok-foco');
        if(focoDisplayStr.length === focoLimite){ btnOk.style.background = "var(--primary)"; btnOk.disabled = false; } 
        else { btnOk.style.background = "#ccc"; btnOk.disabled = true; }
    }

    function confirmarFoco() {
        if(focoDisplayStr.length !== focoLimite) return;

        let itemAtual = listaDeSeparacao[indexAtualPicking];
        let skuCorreto = String(itemAtual.produtoDb.codigo || itemAtual.produtoDb["Código"] || "").trim().toUpperCase();

        if(focoModo === "EAN") {
            let encontrados = bancoDeDados.filter(p => {
                let eanFull = String(p.gtin || p["GTIN/EAN"] || "").replace(/\D/g, "").replace(/^0+/, "");
                return eanFull.endsWith(focoDisplayStr);
            });

            if (encontrados.length === 0) {
                tocarBipe('erro'); mostrarAlerta("❌ EAN não encontrado!", "erro"); apagarFoco();
            } else if (encontrados.length === 1) {
                let skuAchado = String(encontrados[0].codigo || encontrados[0]["Código"] || "").trim().toUpperCase();
                if(skuAchado === skuCorreto) registrarUnidadeFoco();
                else { tocarBipe('erro'); mostrarAlerta("❌ Produto errado!", "erro"); apagarFoco(); }
            } else {
                // EMPATE!
                tocarBipe('erro'); mostrarAlerta("⚠️ EAN repetido! Precisamos do SKU.", "aviso");
                acionarDesempateFoco(encontrados);
            }
        } 
        else if (focoModo === "SKU") {
            let match = focoProdutosEmpatados.find(p => {
                let skuDb = String(p.codigo || p["Código"] || "").trim().toUpperCase();
                return skuDb.endsWith(focoDisplayStr);
            });
            if(match) {
                let skuAchado = String(match.codigo || match["Código"] || "").trim().toUpperCase();
                if(skuAchado === skuCorreto) registrarUnidadeFoco();
                else { tocarBipe('erro'); mostrarAlerta("❌ Este não é o produto do pedido!", "erro"); apagarFoco(); }
            } else {
                tocarBipe('erro'); mostrarAlerta("❌ SKU inválido.", "erro"); apagarFoco();
            }
        }
    }

    function acionarDesempateFoco(lista) {
        focoProdutosEmpatados = lista;
        let area = document.getElementById('bloco-desempate');
        area.innerHTML = '';
        lista.forEach(p => {
            let sku = String(p.codigo || p["Código"]);
            area.innerHTML += `<div class="card-desempate"><img src="../site/img/produtos/${sku}.webp"><div class="desc">Fim: ${sku.slice(-2)}</div></div>`;
        });
        area.classList.remove('hidden');
        resetarTecladoFoco("SKU", 2, "CONFLITO! Digite os 2 últimos do SKU");
    }

    function registrarUnidadeFoco() {
        let itemAtual = listaDeSeparacao[indexAtualPicking];
        itemAtual.unidadesLidas++; 
        if (itemAtual.unidadesLidas < itemAtual.quantidadeTotal) { 
            tocarBipe('sucesso'); mostrarAlerta(`✅ Registrado!`, "aviso", 800); renderizarItemFoco(); 
        } else { 
            itemAtual.status = 'concluido'; tocarBipe('sucesso'); mostrarAlerta(`🎉 Pronto!`, "sucesso", 1200); 
            indexAtualPicking++; renderizarItemFoco(); 
        }
    }

    function cancelarPicking() { if(confirm("Cancelar separação?")) abrirTela('tela-inicial'); }

    // ==================== TECLADO DE BUSCA (MENU) ====================
    let buscaStr = "";
    function abrirTecladoBusca() { buscaStr = ""; atualizarBusca(); document.getElementById('modal-teclado-busca').classList.remove('hidden'); }
    function fecharTecladoBusca() { document.getElementById('modal-teclado-busca').classList.add('hidden'); }
    function limparBusca() { buscaStr = ""; atualizarBusca(); }
    function addDigitoBusca(num) { if(buscaStr.length < 4) { buscaStr += num; atualizarBusca(); } }
    function atualizarBusca() {
        document.getElementById('display-busca').innerText = buscaStr + "-".repeat(4 - buscaStr.length);
        document.getElementById('btn-ok-busca').disabled = (buscaStr.length !== 4);
    }
    function confirmarBusca() {
        if(buscaStr.length === 4) {
            fecharTecladoBusca();
            let achado = bancoDeDados.find(p => String(p.gtin || p["GTIN/EAN"]).replace(/\D/g,"").endsWith(buscaStr));
            if(achado) abrirCardProduto(achado, 0); else mostrarAlerta("Não encontrado.", "erro");
        }
    }

    // Funcionalidades da Ficha
    function buscarPorNome() { /* Implementação omitida por espaço, igual à original */ }
    function abrirCardProduto(produto, i) {
        document.getElementById('inp-codigo').value = produto.codigo || produto["Código"] || "";
        document.getElementById('inp-nome').value = produto.nome || produto["Descrição"] || "";
        document.getElementById('img-foto').src = `../site/img/produtos/${produto.codigo || produto["Código"]}.webp`;
        document.getElementById('area-busca-etiqueta').classList.add('hidden'); document.getElementById('product-form').classList.remove('hidden');
    }
    function fecharCardProduto() { document.getElementById('product-form').classList.add('hidden'); document.getElementById('area-busca-etiqueta').classList.remove('hidden'); }
</script>
</body>
