<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Hub V6 - Dona Antônia (GitHub Sync)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --border: #e2e8f0;
            --accent: #6366f1;
            --config-bg: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: #0f172a; padding: 20px; padding-bottom: 120px; }
        .container { max-width: 1200px; margin: 0 auto; }

        /* HEADER */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .header h1 { font-weight: 900; font-size: 26px; border-left: 5px solid var(--accent); padding-left: 15px; }

        /* CONFIGURAÇÕES GITHUB */
        .config-box { background: var(--config-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 30px; }
        .config-box h3 { font-size: 16px; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
        .config-grid input { padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; }

        /* GESTÃO DE PROMPTS */
        .prompt-box { background: white; padding: 25px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .prompt-box h2 { font-size: 18px; font-weight: 800; margin-bottom: 20px; color: var(--primary); }
        
        .input-group { display: grid; gap: 12px; margin-bottom: 15px; }
        .input-group input, .input-group textarea { padding: 14px; border: 1px solid var(--border); border-radius: 10px; width: 100%; font-size: 14px; outline-color: var(--accent); background: #fcfcfc; }
        .input-group textarea { height: 120px; resize: vertical; line-height: 1.5; }

        .tag-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .btn-tag { padding: 8px 14px; background: #eef2ff; color: var(--accent); border: 1px solid #c7d2fe; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-tag:hover { background: var(--accent); color: white; }

        .form-footer { display: flex; align-items: center; gap: 15px; }
        .btn-main { padding: 14px 28px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-sec { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 13px; }
        .btn-cancel { padding: 14px 20px; background: #f1f5f9; color: #64748b; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; display: none; }

        /* LISTA DE PROMPTS */
        .saved-prompts { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px; }
        .saved-item { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; }
        .saved-item h4 { font-size: 14px; font-weight: 800; margin-bottom: 6px; color: var(--primary); }
        .saved-item p { font-size: 12px; color: #64748b; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
        .saved-actions { display: flex; gap: 12px; margin-top: 10px; }
        .btn-sml { background: none; border: none; font-size: 12px; font-weight: 700; cursor: pointer; }
        .btn-edit { color: var(--accent); }
        .btn-del { color: var(--danger); }

        /* GRID E CARDS */
        .filters { display: flex; gap: 15px; margin-bottom: 25px; }
        .filters input { flex: 2; padding: 14px; border-radius: 10px; border: 1px solid var(--border); background: white; }
        .filters select { flex: 1; padding: 14px; border-radius: 10px; border: 1px solid var(--border); background: white; font-weight: 600; }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
        @media (max-width: 1024px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }

        .card { background: white; border: 1px solid var(--border); border-radius: 20px; padding: 20px; position: relative; display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .badge { position: absolute; top: 15px; right: 15px; background: var(--danger); color: white; padding: 6px 12px; border-radius: 10px; font-weight: 900; font-size: 13px; }
        .card-img-box { width: 100%; height: 150px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .card-img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .card-title { font-weight: 700; font-size: 14px; margin-bottom: 10px; height: 38px; overflow: hidden; line-height: 1.3; }
        .price-new { font-weight: 900; font-size: 18px; color: var(--primary); }
        .card-actions { display: grid; gap: 10px; margin-bottom: 15px; background: #f8fafc; padding: 12px; border-radius: 12px; }
        .card-actions select { padding: 8px; border-radius: 8px; border: 1px solid var(--border); font-size: 12px; font-weight: 700; width: 100%; }
        .btn-act { padding: 10px; border: none; border-radius: 8px; font-size: 11px; font-weight: 800; cursor: pointer; color: white; text-transform: uppercase; }
        .btn-p { background: var(--success); }
        .btn-i { background: var(--accent); }
        .card-footer-logo { border-top: 1px solid var(--border); padding-top: 15px; display: flex; justify-content: center; margin-top: auto; }
        .card-footer-logo img { height: 30px; }

        /* FAB E TOAST */
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2000; border: none; }
        #toast { visibility: hidden; background: #0f172a; color: white; border-radius: 50px; padding: 16px 40px; position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%); font-weight: 800; z-index: 5000; }
        #toast.show { visibility: visible; animation: fadeInUp 0.4s forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }

        /* EDITOR MODAL */
        #editorModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; }
        .editor-container { background: white; border-radius: 16px; padding: 20px; width: 95%; max-width: 900px; display: flex; gap: 20px; flex-wrap: wrap; }
        .editor-workspace { flex: 2; display: flex; justify-content: center; align-items: center; background: #e2e8f0; border-radius: 12px; min-height: 400px; }
        #canvasContainer { position: relative; background: #fff; overflow: hidden; }
        .format-square { width: 400px; height: 400px; }
        .format-reels { width: 300px; height: 533px; }
        #editorBgImage { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .draggable-text { position: absolute; z-index: 10; cursor: move; padding: 5px 10px; border: 2px dashed transparent; white-space: nowrap; }
        .draggable-text.active { border-color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Dashboard Marketing Dona Antônia</h1>
    </div>

    <div class="config-box">
        <h3>⚙️ Configurações de Sincronização (GitHub)</h3>
        <div class="config-grid">
            <input type="password" id="ghToken" placeholder="GitHub Personal Token">
            <input type="text" id="ghUser" placeholder="Usuário GitHub">
            <input type="text" id="ghRepo" placeholder="Nome do Repositório">
            <button class="btn-sec" onclick="saveGitHubConfig()">Salvar Credenciais</button>
        </div>
        <p style="font-size: 11px; color: #64748b; margin-top: 10px;">* As credenciais ficam salvas apenas neste navegador (LocalStorage).</p>
    </div>

    <div class="prompt-box">
        <h2 id="formTitle">Criar Novo Prompt</h2>
        <div class="input-group">
            <input type="text" id="pName" placeholder="Nome do Prompt (ex: Post de Promoção)">
            <textarea id="pText" placeholder="Comando para o Gemini... Use as tags abaixo."></textarea>
        </div>
        <div class="tag-row">
            <button class="btn-tag" onclick="insertTag('[NOME]')">+ [NOME]</button>
            <button class="btn-tag" onclick="insertTag('[PRECO]')">+ [PRECO]</button>
            <button class="btn-tag" onclick="insertTag('[PRECO_ANTIGO]')">+ [PRECO_ANTIGO]</button>
            <button class="btn-tag" onclick="insertTag('[DESCONTO]')">+ [DESCONTO]</button>
        </div>
        <div class="form-footer">
            <button class="btn-main" id="btnSave" onclick="savePrompt()">Salvar Prompt na Nuvem</button>
            <button class="btn-cancel" id="btnCancel" onclick="cancelEdit()">Cancelar</button>
        </div>
        <div class="saved-prompts" id="promptsListUI"></div>
    </div>

    <div class="filters">
        <input type="text" id="searchUI" placeholder="Pesquisar produto..." onkeyup="render()">
        <select id="discUI" onchange="render()">
            <option value="0">Ver Tudo</option>
            <option value="20">Descontos +20%</option>
            <option value="30">Descontos +30%</option>
        </select>
    </div>

    <div class="grid" id="gridUI"></div>
</div>

<div id="editorModal">
    <div class="editor-container">
        <div style="flex: 1; min-width: 250px;">
            <h3>Artes Dona Antônia</h3>
            <div style="margin-top:15px; display:grid; gap:10px;">
                <select id="edFormat" onchange="changeFormat()" style="padding:8px; border-radius:8px;">
                    <option value="square">Quadrado (Post)</option>
                    <option value="reels">Vertical (Stories)</option>
                </select>
                <input type="text" id="edTextInput" placeholder="Texto da arte..." style="padding:8px; border-radius:8px;">
                <button class="btn-act btn-p" onclick="addText()">+ Texto</button>
                
                <div id="textControls" style="display:none; padding:10px; background:#f8fafc; border-radius:8px; margin-top:10px;">
                    <label style="font-size:10px; font-weight:bold;">Tamanho / Cor / Fundo</label>
                    <div style="display:flex; gap:5px; margin-top:5px;">
                        <input type="number" id="edSize" value="30" style="width:50px;" onchange="updateSelectedText()">
                        <input type="color" id="edColor" value="#ffffff" onchange="updateSelectedText()">
                        <input type="color" id="edBgColor" value="#ef4444" onchange="updateSelectedText()">
                    </div>
                    <button class="btn-sml btn-del" style="margin-top:10px;" onclick="deleteSelectedText()">Excluir Texto</button>
                </div>
            </div>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button class="btn-main" onclick="downloadArt()">Baixar PNG</button>
                <button class="btn-cancel" style="display:block" onclick="closeEditor()">Fechar</button>
            </div>
        </div>
        <div class="editor-workspace">
            <div id="canvasContainer" class="format-square">
                <img id="editorBgImage" src="">
            </div>
        </div>
    </div>
</div>

<input type="file" id="fileIn" style="display:none" accept="image/*" onchange="optimizePng(event)">
<input type="file" id="editorFileIn" style="display:none" accept="image/*" onchange="loadEditorImage(event)">
<button class="fab" onclick="document.getElementById('fileIn').click()">📤</button>
<div id="toast">Pronto!</div>

<script>
    // --- CONFIGURAÇÃO E ESTADO ---
    const GITHUB = {
        token: localStorage.getItem('da_gh_token') || '',
        owner: localStorage.getItem('da_gh_user') || '',
        repo: localStorage.getItem('da_gh_repo') || '',
        path: 'prompts.json',
        sha: ''
    };

    const STATE = { prods: [], prompts: [], editingIdx: -1 };
    const LOGO = "../img/logoantonia5.png";

    // Preenche os campos de config se já existirem
    document.getElementById('ghToken').value = GITHUB.token;
    document.getElementById('ghUser').value = GITHUB.owner;
    document.getElementById('ghRepo').value = GITHUB.repo;

    // --- FUNÇÕES DE CONFIGURAÇÃO ---
    function saveGitHubConfig() {
        const token = document.getElementById('ghToken').value.trim();
        const user = document.getElementById('ghUser').value.trim();
        const repo = document.getElementById('ghRepo').value.trim();

        localStorage.setItem('da_gh_token', token);
        localStorage.setItem('da_gh_user', user);
        localStorage.setItem('da_gh_repo', repo);

        GITHUB.token = token; GITHUB.owner = user; GITHUB.repo = repo;
        showToast("Configurações salvas localmente!");
        init(); // Reinicia para tentar carregar os prompts
    }

    // --- COMUNICAÇÃO GITHUB ---
    const utf8_to_b64 = str => window.btoa(unescape(encodeURIComponent(str)));
    const b64_to_utf8 = str => decodeURIComponent(escape(window.atob(str)));

    async function syncFromGitHub() {
        if(!GITHUB.token || !GITHUB.owner || !GITHUB.repo) return;
        try {
            const url = `https://api.github.com/repos/${GITHUB.owner}/${GITHUB.repo}/contents/${GITHUB.path}`;
            const res = await fetch(url, { headers: { 'Authorization': `token ${GITHUB.token}` } });
            
            if(res.status === 404) { STATE.prompts = []; return; }
            if(!res.ok) throw new Error();

            const data = await res.json();
            GITHUB.sha = data.sha;
            STATE.prompts = JSON.parse(b64_to_utf8(data.content));
            render();
        } catch (e) { showToast("Erro ao sincronizar com GitHub."); }
    }

    async function syncToGitHub() {
        if(!GITHUB.token || !GITHUB.owner || !GITHUB.repo) return showToast("Configure o GitHub primeiro!");
        showToast("Sincronizando nuvem...");
        try {
            const url = `https://api.github.com/repos/${GITHUB.owner}/${GITHUB.repo}/contents/${GITHUB.path}`;
            const body = {
                message: "Dashboard Update",
                content: utf8_to_b64(JSON.stringify(STATE.prompts, null, 2))
            };
            if(GITHUB.sha) body.sha = GITHUB.sha;

            const res = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${GITHUB.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            GITHUB.sha = data.content.sha;
            showToast("Prompts salvos na nuvem!");
        } catch (e) { showToast("Erro ao salvar no GitHub."); }
    }

    // --- LÓGICA DE PROMPTS ---
    function insertTag(tag) {
        const area = document.getElementById('pText');
        const pos = area.selectionStart;
        area.value = area.value.slice(0, pos) + tag + area.value.slice(pos);
        area.focus();
    }

    async function savePrompt() {
        const name = document.getElementById('pName').value.trim();
        const text = document.getElementById('pText').value.trim();
        if(!name || !text) return;

        if(STATE.editingIdx > -1) STATE.prompts[STATE.editingIdx] = { name, text };
        else STATE.prompts.push({ name, text });

        cancelEdit();
        await syncToGitHub();
        render();
    }

    async function deletePrompt(idx) {
        if(confirm('Apagar da nuvem?')) {
            STATE.prompts.splice(idx, 1);
            await syncToGitHub();
            render();
        }
    }

    function startEdit(idx) {
        STATE.editingIdx = idx;
        const p = STATE.prompts[idx];
        document.getElementById('pName').value = p.name;
        document.getElementById('pText').value = p.text;
        document.getElementById('btnSave').innerText = "Atualizar na Nuvem";
        document.getElementById('btnCancel').style.display = "block";
    }

    function cancelEdit() {
        STATE.editingIdx = -1;
        document.getElementById('pName').value = ""; document.getElementById('pText').value = "";
        document.getElementById('btnSave').innerText = "Salvar Prompt na Nuvem";
        document.getElementById('btnCancel').style.display = "none";
    }

    // --- RENDER E PRODUTOS ---
    const fmt = v => Number(v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    const norm = s => s ? String(s).normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase() : "";

    function render() {
        document.getElementById('promptsListUI').innerHTML = STATE.prompts.map((p, i) => `
            <div class="saved-item">
                <h4>${p.name}</h4>
                <p>${p.text}</p>
                <div class="saved-actions">
                    <button class="btn-sml btn-edit" onclick="startEdit(${i})">Editar</button>
                    <button class="btn-sml btn-del" onclick="deletePrompt(${i})">Excluir</button>
                </div>
            </div>
        `).join('');

        const query = norm(document.getElementById('searchUI').value);
        const minD = parseInt(document.getElementById('discUI').value);
        const filtered = STATE.prods.filter(p => p.discountPercent >= minD && norm(p.name).includes(query));
        const opts = STATE.prompts.map((p, i) => `<option value="${i}">${p.name}</option>`).join('');

        document.getElementById('gridUI').innerHTML = filtered.map(p => `
            <div class="card">
                ${p.discountPercent > 0 ? `<div class="badge">-${p.discountPercent}%</div>` : ''}
                <div class="card-img-box"><img src="${p.img}" onerror="this.src='${LOGO}'"></div>
                <div class="card-title">${p.name}</div>
                <div><span class="price-new">${fmt(p.price)}</span></div>
                <div class="card-actions">
                    <select id="sel-${p.id}">${opts || '<option>Sem prompts</option>'}</select>
                    <button class="btn-act btn-p" onclick="copyPrompt('${p.id}')">Copiar Prompt</button>
                    <button class="btn-act btn-i" onclick="openEditorUpload()">Criar Arte</button>
                </div>
            </div>
        `).join('');
    }

    function copyPrompt(id) {
        const prod = STATE.prods.find(p => p.id === id);
        const selIdx = document.getElementById(`sel-${id}`).value;
        if(STATE.prompts.length === 0) return alert("Crie um prompt!");
        let final = STATE.prompts[selIdx].text.replace(/\[NOME\]/g, prod.name).replace(/\[PRECO\]/g, fmt(prod.price)).replace(/\[DESCONTO\]/g, prod.discountPercent + '%');
        navigator.clipboard.writeText(final);
        showToast("Copiado!");
    }

    // --- EDITOR DE IMAGEM (RESUMIDO) ---
    let selectedTextEl = null, isDragging = false, offsetX, offsetY;
    function openEditorUpload() { document.getElementById('editorFileIn').click(); }
    function loadEditorImage(e) {
        const reader = new FileReader(); reader.readAsDataURL(e.target.files[0]);
        reader.onload = ev => { 
            document.getElementById('editorBgImage').src = ev.target.result; 
            document.getElementById('editorModal').style.display = 'flex';
            document.querySelectorAll('.draggable-text').forEach(el => el.remove());
        };
    }
    function closeEditor() { document.getElementById('editorModal').style.display = 'none'; }
    function changeFormat() { document.getElementById('canvasContainer').className = document.getElementById('edFormat').value === 'square' ? 'format-square' : 'format-reels'; }
    
    function addText() {
        const div = document.createElement('div'); div.className = 'draggable-text';
        div.innerText = document.getElementById('edTextInput').value;
        div.style.cssText = "left:50px; top:50px; font-size:30px; color:#fff; background:#ef4444; font-weight:900;";
        div.onmousedown = e => { isDragging = true; selectedTextEl = div; offsetX = e.offsetX; offsetY = e.offsetY; 
            document.querySelectorAll('.draggable-text').forEach(t => t.classList.remove('active')); div.classList.add('active');
            document.getElementById('textControls').style.display = 'block';
        };
        document.getElementById('canvasContainer').appendChild(div);
    }

    document.onmousemove = e => { if(isDragging && selectedTextEl) { 
        const rect = document.getElementById('canvasContainer').getBoundingClientRect();
        selectedTextEl.style.left = (e.clientX - rect.left - offsetX) + 'px';
        selectedTextEl.style.top = (e.clientY - rect.top - offsetY) + 'px';
    }};
    document.onmouseup = () => isDragging = false;

    function updateSelectedText() {
        if(!selectedTextEl) return;
        selectedTextEl.style.fontSize = document.getElementById('edSize').value + 'px';
        selectedTextEl.style.color = document.getElementById('edColor').value;
        selectedTextEl.style.backgroundColor = document.getElementById('edBgColor').value;
    }
    function deleteSelectedText() { selectedTextEl.remove(); document.getElementById('textControls').style.display = 'none'; }

    function downloadArt() {
        showToast("Gerando PNG...");
        // Lógica simplificada de download
        const link = document.createElement('a'); link.download = 'arte.png';
        link.href = document.getElementById('editorBgImage').src; // Apenas para exemplo, ideal usar Canvas para os textos
        link.click();
    }

    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.className = "show"; setTimeout(() => t.className = "", 3000); }

    // Otimização de PNG Original mantida
    function optimizePng(e) {
        const reader = new FileReader(); reader.readAsDataURL(e.target.files[0]);
        reader.onload = ev => {
            const img = new Image(); img.src = ev.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                canvas.width = img.width; canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                const a = document.createElement('a'); a.href = canvas.toDataURL('image/png', 0.7); a.download = 'otimizado.png'; a.click();
            }
        }
    }

    // --- INICIALIZAÇÃO ---
    async function init() {
        await syncFromGitHub();
        try {
            const res = await fetch('/site/produtos.json').then(r => r.json());
            STATE.prods = res.filter(x => x.situacao !== "I").map(p => ({
                id: String(p.codigo || p.id),
                name: p.nome,
                price: parseFloat(p.preco) * 1.01,
                img: p.url_imagem || `/site/img/produtos/${p.codigo || p.id}.webp`,
                discountPercent: Math.floor(Math.random() * 30) // Exemplo de desconto
            }));
            render();
        } catch (e) { render(); }
    }
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
