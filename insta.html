<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estúdio Dona Antônia - Conexão Blindada</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #000; --accent: #ec4899; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); padding: 20px; }
        .panel { background: #1e293b; color: #38bdf8; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        .terminal { background: #000; padding: 10px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 11px; height: 180px; overflow-y: auto; color: #adbac7; line-height: 1.4; border: 1px solid #334155; }
        .terminal .err { color: #f85149; font-weight: bold; }
        .terminal .ok { color: #3fb950; font-weight: bold; }
        .config-box { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 5px; background: #fcfcfc; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main { background: var(--primary); color: #fff; width: 100%; font-size: 16px; margin-top: 15px; }
        .btn-main:disabled { background: #94a3b8; cursor: not-allowed; }
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 2px 4px rgb(0 0 0 / 0.05); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; background: #f1f5f9; }
    </style>
</head>
<body>

    <div class="panel">
        <h3 style="color:white; margin-bottom:10px;">📡 Console de Sincronização (Motor PIM v2)</h3>
        <div class="terminal" id="term">Aguardando inicialização do sistema...</div>
    </div>

    <div class="config-box">
        <h4>🔑 Credenciais do Repositório</h4>
        <div class="config-grid">
            <input type="password" id="ghToken" placeholder="GitHub Token">
            <input type="text" id="ghUser" placeholder="Usuário GitHub">
            <input type="text" id="ghRepo" placeholder="Repositório">
        </div>
        <button class="btn" style="background:#6366f1; color:white; margin-top:10px;" onclick="salvarConfig()">💾 Guardar e Validar Acesso</button>
    </div>

    <div class="config-box">
        <h4>📝 Gerador de Anúncio</h4>
        <input type="text" id="pName" placeholder="Nome da Campanha (Ex: Verão 2024)">
        <div style="margin-top:10px;">
            <label style="font-size: 12px; font-weight: bold; color: #64748b;">Anexar Foto de Referência:</label>
            <input type="file" id="pFile" accept="image/*" onchange="processarImagem(this)">
        </div>
        <img id="pImg" style="width:120px; height:120px; object-fit:cover; display:none; margin:15px 0; border-radius:8px; border: 2px solid #e2e8f0;">
        <textarea id="pText" rows="5" placeholder="Descreva o prompt ou use os seletores..."></textarea>
        <button class="btn btn-main" id="btnS" onclick="executarFluxoUpload()">🚀 SINCRONIZAR COM GITHUB</button>
    </div>

    <div id="grid"></div>

<script>
    let CONFIG = { token: '', user: '', repo: '', path: 'prompts.json', sha: '' };
    let promptList = [];
    let base64Temp = "";

    // LÓGICA DE CODIFICAÇÃO DO SISTEMA PIM (A Prova de Erros 422)
    const GitHubCodec = {
        encode: function(str) {
            const bytes = new TextEncoder().encode(str);
            let binString = '';
            for (let i = 0; i < bytes.length; i++) { binString += String.fromCharCode(bytes[i]); }
            return btoa(binString);
        },
        decode: function(base64) {
            const binString = atob(base64.replace(/\s/g, ''));
            const bytes = new Uint8Array(binString.length);
            for (let i = 0; i < binString.length; i++) { bytes[i] = binString.charCodeAt(i); }
            return new TextDecoder('utf-8').decode(bytes);
        }
    };

    function log(msg, type = '') {
        const t = document.getElementById('term');
        t.innerHTML += `<div class="${type === 'err' ? 'err' : (type === 'ok' ? 'ok' : '')}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        t.scrollTop = t.scrollHeight;
    }

    function salvarConfig() {
        CONFIG.token = document.getElementById('ghToken').value.trim();
        CONFIG.user = document.getElementById('ghUser').value.trim();
        CONFIG.repo = document.getElementById('ghRepo').value.trim();
        localStorage.setItem('dona_antonia_config', JSON.stringify(CONFIG));
        log("Configurações salvas localmente. Testando conexão...", "ok");
        validarConexao();
    }

    async function validarConexao() {
        try {
            const r = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}`, {
                headers: { 
                    'Authorization': `Bearer ${CONFIG.token}`,
                    'X-GitHub-Api-Version': '2022-11-28'
                }
            });
            if(r.ok) { 
                log("Conexão estabelecida com sucesso!", "ok"); 
                puxarDadosNuvem(); 
            } else { 
                log(`Falha na conexão (Erro ${r.status}). Verifique o Token e o nome do Repositório.`, "err"); 
            }
        } catch(e) { log("Erro de rede: " + e.message, "err"); }
    }

    async function puxarDadosNuvem() {
        try {
            const r = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                headers: { 'Authorization': `Bearer ${CONFIG.token}`, 'Cache-Control': 'no-store' }
            });
            if(r.ok) {
                const d = await r.json();
                CONFIG.sha = d.sha;
                promptList = JSON.parse(GitHubCodec.decode(d.content));
                renderizarCards();
                log("Banco de dados sincronizado com a nuvem.", "ok");
            }
        } catch(e) { log("Aviso: Arquivo de banco de dados ainda não existe na nuvem."); }
    }

    function processarImagem(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 500; canvas.height = 500;
                canvas.getContext('2d').drawImage(img, 0, 0, 500, 500);
                base64Temp = canvas.toDataURL('image/webp', 0.8);
                document.getElementById('pImg').src = base64Temp;
                document.getElementById('pImg').style.display = "block";
                log("Imagem processada e otimizada (WebP).");
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function executarFluxoUpload() {
        const name = document.getElementById('pName').value;
        const text = document.getElementById('pText').value;
        if(!name || !text) return log("Erro: Preencha o nome e o prompt.", "err");

        const btn = document.getElementById('btnS');
        btn.disabled = true;
        log("🚀 Iniciando ciclo de upload...");

        try {
            let urlFinalImagem = "";

            // 1. Upload da Imagem para pasta 'img_prompts/'
            if(base64Temp) {
                log("Enviando mídia para o repositório...");
                const fileName = `prompt_${Date.now()}.webp`;
                const rImg = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/img_prompts/${fileName}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${CONFIG.token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: `Upload Imagem: ${name}`, 
                        content: base64Temp.split(',')[1] 
                    })
                });
                if(!rImg.ok) throw new Error("Erro no upload da imagem.");
                const dImg = await rImg.json();
                urlFinalImagem = dImg.content.download_url;
                log("Mídia salva com sucesso!", "ok");
            }

            // 2. Atualizar o JSON (Pega o SHA mais recente para evitar Erro 422)
            log("Obtendo última versão do banco de dados...");
            await puxarDadosNuvem(); 

            promptList.unshift({ name, text, image: urlFinalImagem, date: new Date().toLocaleDateString() });

            log("Enviando atualização do banco de dados...");
            const rJson = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${CONFIG.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: `Novo Prompt: ${name}`,
                    content: GitHubCodec.encode(JSON.stringify(promptList, null, 2)),
                    sha: CONFIG.sha
                })
            });

            if(rJson.ok) {
                log("TUDO OK! Dados sincronizados com o GitHub.", "ok");
                document.getElementById('pName').value = "";
                document.getElementById('pText').value = "";
                document.getElementById('pImg').style.display = "none";
                base64Temp = "";
                renderizarCards();
            } else {
                const errorInfo = await rJson.json();
                log(`Erro 422/Rejeição: ${errorInfo.message}`, "err");
            }

        } catch(e) {
            log("FALHA CRÍTICA: " + e.message, "err");
        } finally {
            btn.disabled = false;
        }
    }

    function renderizarCards() {
        const grid = document.getElementById('grid');
        grid.innerHTML = promptList.map(p => `
            <div class="card">
                ${p.image ? `<img src="${p.image}">` : '<div style="height:200px; background:#f1f5f9; border-radius:8px; margin-bottom:10px; display:flex; align-items:center; justify-content:center; color:#94a3b8;">Sem imagem</div>'}
                <strong>${p.name}</strong>
                <p style="font-size:11px; color:#64748b; margin: 5px 0;">Data: ${p.date || '---'}</p>
                <p style="font-size:12px; color:#1e293b; background:#f8fafc; padding:8px; border-radius:5px; border:1px solid #e2e8f0;">${p.text}</p>
                <button class="btn" style="width:100%; margin-top:10px; font-size:12px; background:#f1f5f9;" onclick="navigator.clipboard.writeText('${p.text.replace(/'/g, "\\'")}'); log('Prompt copiado!')">📋 Copiar Prompt</button>
            </div>
        `).join('');
    }

    window.onload = () => {
        const saved = localStorage.getItem('dona_antonia_config');
        if(saved) {
            CONFIG = JSON.parse(saved);
            document.getElementById('ghToken').value = CONFIG.token;
            document.getElementById('ghUser').value = CONFIG.user;
            document.getElementById('ghRepo').value = CONFIG.repo;
            validarConexao();
        }
    };
</script>
</body>
</html>
