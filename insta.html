<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Studio: Gerador de Prompts</title>
    <style>
        /* Estilos CSS - Design Visual First limpo e direto */
        :root {
            --primary: #2b2b2b;
            --accent: #ff0055;
            --bg: #f4f4f9;
            --card-bg: #ffffff;
            --text: #333;
            --border: #e0e0e0;
            --success: #2ed573;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .studio-container {
            max-width: 1000px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            padding: 25px;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 24px;
            margin-bottom: 25px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .category-group {
            background: #fafafa;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 12px;
            text-transform: uppercase;
            color: #666;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background-color: #fff;
            font-size: 14px;
            box-sizing: border-box;
            cursor: pointer;
        }

        input[type="text"] {
            cursor: text;
        }

        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-generate {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn-generate:hover {
            background-color: #000;
        }

        .result-section {
            margin-top: 25px;
        }

        textarea {
            width: 100%;
            height: 220px;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 6px;
            background-color: #fff;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .btn-copy {
            width: 100%;
            padding: 12px;
            background-color: var(--success);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-copy:hover {
            background-color: #26b360;
        }
    </style>
</head>
<body>

    <div class="studio-container">
        <h1>Master Studio</h1>

        <div class="grid-layout">
            
            <!-- Grupo 1: Básico -->
            <div class="category-group">
                <label>Formato da Imagem</label>
                <select id="formato">
                    <option value="9:16">9:16 (Vertical/Reels)</option>
                    <option value="4:5">4:5 (Retrato/Feed)</option>
                    <option value="1:1">1:1 (Quadrado)</option>
                </select>

                <label>Quantidade de Produtos</label>
                <select id="qtd">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                </select>

                <label>Estilo Visual</label>
                <select id="estilo">
                    <!-- Estilos Originais -->
                    <option value="Candy Clean">Candy Clean</option>
                    <option value="Candy Pop">Candy Pop</option>
                    <option value="Natureza">Natureza</option>
                    <option value="Cidade">Cidade</option>
                    <option value="Loja">Loja</option>
                    <!-- Estilos Novos -->
                    <option value="Cyberpunk Futurista">Cyberpunk Futurista</option>
                    <option value="Minimalismo Escandinavo">Minimalismo Escandinavo</option>
                    <option value="Vintage Retrô Anos 80">Vintage Retrô Anos 80</option>
                    <option value="Surrealismo Pop">Surrealismo Pop</option>
                    <option value="Editorial de Alta Costura">Editorial de Moda / Alta Costura</option>
                </select>
            </div>

            <!-- Grupo 2: Ação e Cena -->
            <div class="category-group" style="grid-column: span 2;">
                <label>Cena / Ação Principal</label>
                <select id="cena">
                    <!-- Cenas Originais -->
                    <option value="Produto Flutuando ao centro grande">Produto Flutuando ao centro grande</option>
                    <option value="Uma mão segurando">Uma mão segurando</option>
                    <option value="Duas mãos segurando">Duas mãos segurando</option>
                    <option value="pessoa desfocada ao fundo segurando com braço estendido">Pessoa desfocada ao fundo segurando com braço estendido</option>
                    <option value="pessoa segurando o produto na altura do peito">Pessoa segurando o produto na altura do peito</option>
                    <option value="pessoa segurando com os braços pra cima e olhando pra cima mostrando o produto pra cima">Pessoa segurando com os braços pra cima e olhando pra cima</option>
                    <option value="produto dentro do carrinho de compras">Produto dentro do carrinho de compras</option>
                    <option value="produto dentro da cesta plástica de compra">Produto dentro da cesta plástica de compra</option>
                    <option value="produto em mesa ou bancada ou base">Produto em mesa ou bancada ou base</option>
                    <option value="produto encostado em parede ou alguma coisa">Produto encostado em parede ou alguma coisa</option>
                    <option value="produto no centro com fundo cheio de escritos relacionados ao produto">Produto no centro com fundo cheio de escritos relacionados ao produto</option>
                    <option value="produto ao centro com anotações sobre o produto ao redor feitas de forma aleatória manuscrita">Produto ao centro com anotações sobre o produto ao redor feitas de forma aleatória manuscrita</option>
                    <!-- Cenas Novas -->
                    <option value="produto imerso em água cristalina com bolhas de ar subindo">Produto imerso em água cristalina com bolhas</option>
                    <option value="produto em um pódio de pedra natural texturizada">Produto em um pódio de pedra natural</option>
                    <option value="produto quebrando a barreira do som com rastro de movimento (motion blur)">Produto em velocidade com rastro de movimento</option>
                    <option value="produto rodeado por elementos 3D geométricos flutuantes">Produto rodeado por geometria 3D flutuante</option>
                    <option value="produto emergindo de uma nuvem de fumaça colorida espessa">Produto emergindo de fumaça colorida</option>
                    <option value="produto levitando sobre uma base magnética futurista iluminada">Produto levitando em base magnética</option>
                </select>
            </div>

            <!-- Grupo 3: Fotografia -->
            <div class="category-group">
                <label>Posição da Câmera</label>
                <select id="camera">
                    <!-- Câmeras Originais -->
                    <option value="Ângulo frontal direto, perfeitamente alinhado (Eye-level)">Frontal Direto</option>
                    <option value="Ângulo de baixo para cima (Low Angle), dando sensação de grandeza">De baixo para cima (Low Angle)</option>
                    <option value="Ângulo de cima para baixo (High Angle), mostrando o produto de cima">De cima para baixo (High Angle)</option>
                    <option value="Plano detalhe macro (Close-up extremo), focando intensamente nas texturas">Macro / Close-up</option>
                    <option value="Visão isométrica, perspectiva geométrica e organizada">Isométrica</option>
                    <option value="Visão Top-Down (Plano Zenital), câmera exatamente a 90 graus apontando para o chão">Top-Down (Zenital)</option>
                    <!-- Câmeras Novas -->
                    <option value="Lente ultra grande angular (Fisheye), distorcendo as bordas de forma criativa">Lente Olho de Peixe (Fisheye)</option>
                    <option value="Plano holandês (Dutch Angle), câmera levemente inclinada para gerar dinamismo">Plano Holandês (Câmera Inclinada)</option>
                    <option value="Câmera em movimento rápido acompanhando o produto (Pan shot)">Câmera em movimento (Pan Shot)</option>
                    <option value="Câmera com profundidade de campo extrema (Depth of Field), fundo completamente borrado em bokeh">Profundidade de Campo Extrema (Bokeh)</option>
                </select>
            </div>

            <!-- Grupo 4: Luz -->
            <div class="category-group">
                <label>Iluminação</label>
                <select id="luz">
                    <!-- Luzes Originais -->
                    <option value="Luz de estúdio suave e difusa (Softbox), sem sombras duras">Estúdio Suave (Softbox)</option>
                    <option value="Luz natural do meio-dia, com sombras duras e marcadas">Sol do Meio-dia (Sombras Duras)</option>
                    <option value="Golden hour, luz de fim de tarde, tons quentes e alongados">Golden Hour (Fim de Tarde)</option>
                    <option value="Iluminação de estúdio dramática de alto contraste (Chiaroscuro)">Estúdio Dramático (Alto Contraste)</option>
                    <option value="Iluminação com flash frontal direto estourado, estilo fotográfico de moda anos 90">Flash Frontal Direto (Estilo Anos 90)</option>
                    <option value="Iluminação neon moderna e vibrante com reflexos coloridos">Neon Cibernético (Reflexos coloridos)</option>
                    <!-- Luzes Novas -->
                    <option value="Iluminação com gelatina de cor vermelha de um lado e azul do outro (Bicolor)">Iluminação Bicolor (Vermelho e Azul)</option>
                    <option value="Luz de palco com feixes volumétricos visíveis (God Rays) incidindo sobre o produto">Feixes de Luz Volumétricos (God Rays)</option>
                    <option value="Iluminação de anel circular (Ring Light) refletindo perfeitamente no produto">Ring Light (Círculo de Luz)</option>
                    <option value="Luz subaquática cáustica, com reflexos de água ondulando sobre o produto">Luz Subaquática (Reflexos Cáusticos)</option>
                    <option value="Luz de projeção de janela, criando sombras de persianas cortando o cenário">Sombras de Persiana (Window Blinds)</option>
                </select>
            </div>

            <!-- Grupo 5: Mixed Media e Preço -->
            <div class="category-group" style="grid-column: span 2;">
                <label>Balão de Preço (Deixe em branco se não quiser)</label>
                <input type="text" id="preco" placeholder="Ex: R$ 49,90">

                <label>Recursos Digitais / Efeitos Extras</label>
                <select id="efeitos">
                    <option value="Nenhum efeito extra, fotografia pura.">Nenhum (Fotografia Pura)</option>
                    <option value="Rabiscos em neon brilhante contornando dinamicamente o formato do produto.">Rabiscos em Neon Contornando</option>
                    <option value="Partículas de poeira mágica brilhante flutuando pelo ar.">Poeira Mágica Brilhante</option>
                    <option value="Efeito de Glitch Art sutil e interferência digital Cyberpunk nas bordas.">Glitch Art / Cyberpunk</option>
                    <option value="Filtro fotográfico vintage de câmera VHS com leve ruído e data no canto.">Filtro VHS Vintage</option>
                    <option value="Formas geométricas sólidas em cores vibrantes flutuando no fundo como colagem.">Colagem 3D Geométrica</option>
                </select>
            </div>

        </div>

        <button class="btn-generate" onclick="gerarPromptStudio()">Gerar Prompt</button>

        <div class="result-section">
            <textarea id="resultado" readonly>Seu prompt aparecerá aqui...</textarea>
            <button class="btn-copy" onclick="copiarPrompt()">
                📋 Copiar Prompt
            </button>
        </div>
    </div>

    <script>
        // Função educativa para entender os passos de programação:
        // Passo 1: Esta função é acionada ao clicar no botão "Gerar Prompt".
        function gerarPromptStudio() {
            
            // Passo 2: Capturamos os valores de todos os campos selecionados e digitados.
            const formato = document.getElementById('formato').value;
            const qtd = document.getElementById('qtd').value;
            const estilo = document.getElementById('estilo').value;
            const cena = document.getElementById('cena').value;
            const camera = document.getElementById('camera').value;
            const luz = document.getElementById('luz').value;
            const efeitos = document.getElementById('efeitos').value;
            const preco = document.getElementById('preco').value;

            // Passo 3: Criamos as frases base do nosso prompt de fotografia de alto padrão.
            const base = `Crie uma fotografia publicitária fotorrealista de alto padrão. Formato/Proporção da imagem: ${formato}.`;
            const descricao = `Quantidade de produtos na imagem: ${qtd}. Estilo visual geral: ${estilo}. Ação/Cena: ${cena}.`;
            const fotografia = `Posição da câmera: ${camera}. Iluminação: ${luz}. Efeitos adicionais da cena: ${efeitos}. Renderização em 8k, hiper-detalhado.`;

            // Passo 4: Lógica do Preço. 
            // Se o usuário digitou algo no campo 'preco', criamos uma string com a instrução do balão à mão.
            let instrucaoPreco = "";
            if (preco.trim() !== "") {
                instrucaoPreco = `[MIXED MEDIA - PREÇO]: Adicione um elemento artístico sobrepondo a foto. Desenhe um balão de fala ou balão de preço flutuando próximo ao produto. O balão deve ter um estilo desenhado à mão livre (doodle/sketch feito a caneta ou pincel). Dentro deste balão desenhado à mão, escreva com clareza o texto exato: "${preco}".`;
            }

            // Passo 5: A regra inquebrável para manter o seu produto idêntico à imagem anexada.
            const regraOuro = `[ATENÇÃO - INSTRUÇÃO CRÍTICA]: A imagem anexada é a referência absoluta. Você DEVE usar a imagem do produto anexado exatamente como ela é. A embalagem, o rótulo original e a proporção física exata do produto DEVEM ser estritamente preservados e mantidos INALTERADOS. Integre este exato produto na cena iluminando-o adequadamente de forma fotorrealista.`;

            // Passo 6: Juntamos todas as partes (concatenamos) usando quebras de linha (\n\n).
            const promptFinal = `${base}\n\n${descricao}\n\n${fotografia}\n\n${instrucaoPreco}\n\n${regraOuro}`;
            
            // Passo 7: Inserimos o texto final na caixa de texto da tela.
            document.getElementById('resultado').value = promptFinal.trim();
        }

        // Função para copiar o texto para a área de transferência do sistema operacional.
        function copiarPrompt() {
            const textarea = document.getElementById('resultado');
            
            if(textarea.value === "" || textarea.value === "Seu prompt aparecerá aqui...") {
                alert("Por favor, gere um prompt primeiro!");
                return;
            }

            textarea.select();
            textarea.setSelectionRange(0, 99999); 
            navigator.clipboard.writeText(textarea.value).then(() => {
                alert("Prompt copiado com sucesso!");
            }).catch(err => {
                alert("Erro ao copiar. Selecione o texto manualmente.");
            });
        }
    </script>
</body>
</html>
