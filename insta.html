<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Marketing - Dona Antônia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --border: #e2e8f0;
            --accent: #6366f1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: #0f172a; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }

        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
        .header h1 { font-weight: 900; font-size: 24px; }

        /* GESTÃO DE PROMPTS */
        .prompt-box { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .prompt-box h2 { font-size: 18px; font-weight: 800; margin-bottom: 15px; }
        
        .input-group { display: grid; gap: 10px; margin-bottom: 15px; }
        .input-group input, .input-group textarea { padding: 12px; border: 1px solid var(--border); border-radius: 8px; width: 100%; outline-color: var(--accent); }
        .input-group textarea { height: 80px; resize: vertical; }

        .tag-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        .btn-tag { padding: 6px 12px; background: #eef2ff; color: var(--accent); border: 1px solid #c7d2fe; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; }
        .btn-tag:hover { background: var(--accent); color: white; }

        .btn-main { padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; width: fit-content; }

        .saved-prompts { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
        .saved-item { background: #f1f5f9; padding: 8px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; border: 1px solid var(--border); }
        .btn-del { color: var(--danger); cursor: pointer; border: none; background: none; font-weight: 900; }

        /* FILTROS E PRODUTOS */
        .filters { display: flex; gap: 15px; margin-bottom: 20px; }
        .filters input { flex: 2; padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        .filters select { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 15px; position: relative; }
        .badge { position: absolute; top: 10px; right: 10px; background: var(--danger); color: white; padding: 4px 8px; border-radius: 6px; font-weight: 900; font-size: 11px; }
        .card-img-box { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .card-img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .card-title { font-weight: 700; font-size: 14px; margin-bottom: 10px; height: 34px; overflow: hidden; }
        .card-price { font-weight: 900; font-size: 18px; margin-bottom: 15px; }
        
        .card-actions { display: grid; gap: 8px; }
        .card-actions select { padding: 8px; border-radius: 6px; border: 1px solid var(--border); font-size: 12px; font-weight: 600; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-action { padding: 10px; border: none; border-radius: 8px; font-size: 11px; font-weight: 800; cursor: pointer; color: white; }
        .btn-p { background: var(--success); }
        .btn-i { background: var(--accent); }

        #toast { visibility: hidden; background: #333; color: white; text-align: center; border-radius: 50px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: 600; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Gerador de Prompts Gemini</h1>
    </div>

    <div class="prompt-box">
        <h2>1. Configure seus Prompts</h2>
        <div class="input-group">
            <input type="text" id="promptName" placeholder="Nome do Prompt (ex: Post Story)">
            <textarea id="promptText" placeholder="Digite o comando para o Gemini..."></textarea>
        </div>
        <div class="tag-row">
            <button class="btn-tag" onclick="addTag('[NOME]')">+ [NOME]</button>
            <button class="btn-tag" onclick="addTag('[PRECO]')">+ [PRECO]</button>
            <button class="btn-tag" onclick="addTag('[PRECO_ANTIGO]')">+ [PRECO_ANTIGO]</button>
            <button class="btn-tag" onclick="addTag('[DESCONTO]')">+ [DESCONTO]</button>
        </div>
        <button class="btn-main" onclick="savePrompt()">Salvar Prompt</button>

        <div class="saved-prompts" id="savedPromptsList"></div>
    </div>

    <div class="filters">
        <input type="text" id="searchInput" placeholder="Buscar produto..." onkeyup="render()">
        <select id="discountFilter" onchange="render()">
            <option value="0">Todos os descontos</option>
            <option value="20">Acima de 20%</option>
            <option value="30">Acima de 30%</option>
        </select>
    </div>

    <div class="grid" id="productGrid"></div>
</div>

<div id="toast">Copiado!</div>

<script>
    // --- LÓGICA DE DADOS (Copiada do seu arquivo original) ---
    const STATE = { prods: [], prompts: JSON.parse(localStorage.getItem('da_mkt_prompts')) || [] };
    
    function fmt(v) { return Number(v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
    function norm(s) { return s ? String(s).normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase() : ""; }
    function formatName(name) { if(!name) return ""; let words = name.toLowerCase().split(/\s+/); return words.map((w, index) => (w.length >= 4 || index === 0) ? w.charAt(0).toUpperCase() + w.slice(1) : w).join(' '); }
    
    function aplicarDescontos(products) {
        let now = new Date(); let eligibleForRandom = [];
        products.forEach(p => {
            p.discountPercent = 0; p.oldPrice = p.price;
            if (p.vencimento) {
                let partes = p.vencimento.split('/'); 
                if(partes.length === 3) {
                    let vDate = new Date(partes[2], partes[1] - 1, partes[0]); 
                    let diff = (vDate - now) / (1000 * 60 * 60 * 24);
                    if (diff >= 0 && diff <= 30) p.discountPercent = 35; 
                    else if (diff > 30 && diff <= 60) p.discountPercent = 30; 
                    else if (diff > 60 && diff <= 90) p.discountPercent = 25;
                }
            }
            if (p.discountPercent === 0) eligibleForRandom.push(p);
        });
        let seed = new Date(now.getFullYear(), now.getMonth(), now.getDate() - now.getDay()).getTime();
        function rnd(s) { let x = Math.sin(s++) * 10000; return x - Math.floor(x); }
        eligibleForRandom.sort((a, b) => rnd(seed + (parseInt(a.id.replace(/\D/g, '')) || 0)) - rnd(seed + (parseInt(b.id.replace(/\D/g, '')) || 0)));
        let r20 = 5, r15 = 5, r10 = 100; 
        eligibleForRandom.forEach(p => { if (r20 > 0) { p.discountPercent = 20; r20--; } else if (r15 > 0) { p.discountPercent = 15; r15--; } else if (r10 > 0) { p.discountPercent = 10; r10--; } });
        products.forEach(p => { if (p.discountPercent > 0) p.price = p.oldPrice * (1 - p.discountPercent / 100); });
    }

    // --- INTERFACE ---
    function addTag(tag) {
        const area = document.getElementById('promptText');
        const pos = area.selectionStart;
        area.value = area.value.slice(0, pos) + tag + area.value.slice(pos);
        area.focus();
    }

    function savePrompt() {
        const name = document.getElementById('promptName').value;
        const text = document.getElementById('promptText').value;
        if(!name || !text) return alert("Preencha o nome e o texto!");
        STATE.prompts.push({ name, text });
        localStorage.setItem('da_mkt_prompts', JSON.stringify(STATE.prompts));
        document.getElementById('promptName').value = "";
        document.getElementById('promptText').value = "";
        render();
    }

    function delPrompt(idx) {
        STATE.prompts.splice(idx, 1);
        localStorage.setItem('da_mkt_prompts', JSON.stringify(STATE.prompts));
        render();
    }

    // CÓPIA DE IMAGEM REAL (BLOBO BINÁRIO)
    async function copyImage(url) {
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            // A API de clipboard exige que a imagem seja do tipo PNG para colar em apps
            const item = new ClipboardItem({ [blob.type]: blob });
            await navigator.clipboard.write([item]);
            toast("Imagem copiada!");
        } catch (e) {
            console.error(e);
            alert("Erro ao copiar imagem. Isso pode ocorrer se o servidor não permitir CORS ou se não estiver usando HTTPS.");
        }
    }

    function copyPrompt(id) {
        const prod = STATE.prods.find(p => p.id === id);
        const selIdx = document.getElementById(`sel-${id}`).value;
        if(STATE.prompts.length === 0) return alert("Crie um prompt primeiro!");
        
        let template = STATE.prompts[selIdx].text;
        let final = template.replace(/\[NOME\]/g, prod.name)
                            .replace(/\[PRECO\]/g, fmt(prod.price))
                            .replace(/\[PRECO_ANTIGO\]/g, fmt(prod.oldPrice))
                            .replace(/\[DESCONTO\]/g, prod.discountPercent + '%');
        
        navigator.clipboard.writeText(final);
        toast("Texto do Prompt copiado!");
    }

    function toast(m) { const t = document.getElementById('toast'); t.innerText = m; t.className = "show"; setTimeout(() => t.className = "", 2000); }

    function render() {
        // Render lista de prompts
        const pList = document.getElementById('savedPromptsList');
        pList.innerHTML = STATE.prompts.map((p, i) => `<div class="saved-item">${p.name} <button class="btn-del" onclick="delPrompt(${i})">×</button></div>`).join('');

        // Render produtos
        const grid = document.getElementById('productGrid');
        const search = norm(document.getElementById('searchInput').value);
        const disc = parseInt(document.getElementById('discountFilter').value);

        const filtered = STATE.prods.filter(p => p.discountPercent >= disc && norm(p.name).includes(search));
        
        const promptOpts = STATE.prompts.map((p, i) => `<option value="${i}">${p.name}</option>`).join('');

        grid.innerHTML = filtered.map(p => `
            <div class="card">
                <div class="badge">-${p.discountPercent}%</div>
                <div class="card-img-box"><img src="${p.img}"></div>
                <div class="card-title">${p.name}</div>
                <div class="card-price">${fmt(p.price)}</div>
                <div class="card-actions">
                    <select id="sel-${p.id}">${promptOpts}</select>
                    <div class="btn-row">
                        <button class="btn-action btn-p" onclick="copyPrompt('${p.id}')">Copiar Prompt</button>
                        <button class="btn-action btn-i" onclick="copyImage('${p.img}')">Copiar Imagem</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function init() {
        try {
            // AJUSTE DE CAMINHO: Tente carregar do caminho absoluto do seu site
            const res = await fetch('/site/produtos.json').then(r => r.json());
            STATE.prods = res.filter(x => x.situacao !== "I" && parseInt(x.estoque || 0) > 0).map(p => ({
                id: String(p.codigo || p.id),
                name: formatName(p.nome),
                price: parseFloat(p.preco) * 1.01,
                img: p.url_imagem || `/site/img/produtos/${p.codigo || p.id}.webp`,
                vencimento: p.validade || p.vencimento || null
            }));
            aplicarDescontos(STATE.prods);
            render();
        } catch (e) { 
            console.error("Erro ao carregar JSON:", e);
            alert("Não foi possível carregar os produtos. Verifique se o arquivo /site/produtos.json existe e se você está rodando em um servidor (Live Server, XAMPP, etc).");
        }
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
