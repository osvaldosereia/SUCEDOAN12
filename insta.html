<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Prompts V2 - Dona Antônia</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --text-dark: #0f172a;
            --text-light: #64748b;
            --primary: #000000;
            --danger: #ef4444;
            --border-light: #e2e8f0;
            --success: #10b981;
            --accent: #6366f1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-dark); padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }

        .panel { background: var(--bg-card); padding: 25px; border-radius: 16px; border: 1px solid var(--border-light); margin-bottom: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .panel-title { font-weight: 900; font-size: 20px; margin-bottom: 20px; color: var(--primary); display: flex; align-items: center; gap: 10px; }

        /* FORMULÁRIO DE PROMPT */
        .prompt-form { display: grid; gap: 15px; }
        .prompt-form input, .prompt-form textarea { padding: 12px; border: 1px solid var(--border-light); border-radius: 8px; font-size: 14px; width: 100%; outline-color: var(--accent); }
        .prompt-form textarea { height: 100px; resize: vertical; }
        
        .tag-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .btn-tag { padding: 6px 12px; background: #e0e7ff; color: var(--accent); border: 1px solid #c7d2fe; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-tag:hover { background: var(--accent); color: white; }

        .btn-save { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; justify-self: start; }

        /* LISTA DE PROMPTS SALVOS */
        .saved-prompts { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 20px; }
        .prompt-card { background: #f8fafc; border: 1px solid var(--border-light); padding: 15px; border-radius: 12px; position: relative; }
        .prompt-card h4 { font-weight: 800; margin-bottom: 8px; font-size: 14px; }
        .prompt-card p { font-size: 12px; color: var(--text-light); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .btn-del-prompt { position: absolute; top: 10px; right: 10px; color: var(--danger); background: none; border: none; cursor: pointer; font-weight: 800; }

        /* FILTROS E GRID */
        .filters { display: flex; gap: 15px; margin-bottom: 25px; }
        .filters input { flex: 2; padding: 12px; border-radius: 8px; border: 1px solid var(--border-light); }
        .filters select { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border-light); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 16px; padding: 20px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .card-img-box { width: 100%; height: 180px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; background: #fff; border-radius: 12px; overflow: hidden; }
        .card-img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .card-title { font-weight: 700; font-size: 15px; height: 40px; overflow: hidden; margin-bottom: 10px; }
        .card-prices { margin-bottom: 15px; }
        .card-price-now { font-size: 20px; font-weight: 900; color: var(--text-dark); }
        .card-price-off { font-size: 13px; color: var(--text-light); text-decoration: line-through; }

        .card-actions { display: grid; gap: 10px; }
        .card-actions select { padding: 10px; border-radius: 8px; border: 1px solid var(--border-light); font-size: 13px; font-weight: 600; }
        
        .btn-group-copy { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-copy-p { background: var(--success); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 12px; }
        .btn-copy-i { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 12px; }

        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 50px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: 600; box-shadow: 0 10px 15px rgba(0,0,0,0.2); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div class="container">
        <div class="panel">
            <div class="panel-title">⚙️ Gerenciador de Prompts</div>
            <div class="prompt-form">
                <input type="text" id="pName" placeholder="Nome do Prompt (ex: Post para Facebook)">
                <div style="position: relative;">
                    <textarea id="pText" placeholder="Escreva o comando aqui..."></textarea>
                    <div class="tag-buttons">
                        <button class="btn-tag" onclick="insertTag('[NOME]')">+ [NOME]</button>
                        <button class="btn-tag" onclick="insertTag('[PRECO]')">+ [PRECO]</button>
                        <button class="btn-tag" onclick="insertTag('[PRECO_ANTIGO]')">+ [PRECO_ANTIGO]</button>
                        <button class="btn-tag" onclick="insertTag('[DESCONTO]')">+ [DESCONTO]</button>
                    </div>
                </div>
                <button class="btn-save" onclick="savePrompt()">Salvar Prompt</button>
            </div>

            <div class="saved-prompts" id="savedPromptsList">
                </div>
        </div>

        <div class="panel">
            <div class="panel-title">📦 Produtos em Oferta</div>
            <div class="filters">
                <input type="text" id="search" placeholder="Filtrar por nome..." onkeyup="renderProducts()">
                <select id="minDiscount" onchange="renderProducts()">
                    <option value="0">Qualquer Desconto</option>
                    <option value="20">Mínimo 20%</option>
                    <option value="30">Mínimo 30%</option>
                </select>
            </div>

            <div class="grid" id="productGrid">
                </div>
        </div>
    </div>

    <div id="toast">Copiado com sucesso!</div>

    <script>
        // ESTADO
        let allProducts = [];
        let prompts = JSON.parse(localStorage.getItem('da_prompts_v2')) || [
            { name: "Post Instagram", text: "Atue como copywriter. Crie uma legenda para o produto [NOME] que está por apenas [PRECO]. O valor anterior era [PRECO_ANTIGO]. Foque em urgência." }
        ];

        // AUXILIARES
        const fmt = v => Number(v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        const norm = s => s ? String(s).normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase() : "";

        // INSERIR TAG NO CURSOR
        function insertTag(tag) {
            const el = document.getElementById('pText');
            const start = el.selectionStart;
            const end = el.selectionEnd;
            const text = el.value;
            el.value = text.slice(0, start) + tag + text.slice(end);
            el.focus();
            el.setSelectionRange(start + tag.length, start + tag.length);
        }

        // SALVAR PROMPT
        function savePrompt() {
            const name = document.getElementById('pName').value;
            const text = document.getElementById('pText').value;
            if(!name || !text) return alert("Preencha nome e texto!");
            
            prompts.push({ name, text });
            localStorage.setItem('da_prompts_v2', JSON.stringify(prompts));
            document.getElementById('pName').value = "";
            document.getElementById('pText').value = "";
            renderSavedPrompts();
            renderProducts();
        }

        function deletePrompt(idx) {
            prompts.splice(idx, 1);
            localStorage.setItem('da_prompts_v2', JSON.stringify(prompts));
            renderSavedPrompts();
            renderProducts();
        }

        function renderSavedPrompts() {
            const list = document.getElementById('savedPromptsList');
            list.innerHTML = prompts.map((p, i) => `
                <div class="prompt-card">
                    <button class="btn-del-prompt" onclick="deletePrompt(${i})">×</button>
                    <h4>${p.name}</h4>
                    <p>${p.text}</p>
                </div>
            `).join('');
        }

        // CÓPIA DE IMAGEM (A MÁGICA)
        async function copyImage(imgUrl) {
            try {
                // Para copiar a imagem real, precisamos buscá-la como Blob
                const response = await fetch(imgUrl);
                const blob = await response.blob();
                
                // O Clipboard API exige que a imagem seja PNG para ser copiada em muitos sistemas
                // Se sua imagem for WebP ou JPG, este método costuma converter automaticamente no ClipboardItem
                const item = new ClipboardItem({ "image/png": blob });
                await navigator.clipboard.write([item]);
                showToast("Imagem copiada para o Clipboard!");
            } catch (err) {
                console.error(err);
                alert("Erro ao copiar imagem. Certifique-se que está usando HTTPS e que o servidor permite acesso (CORS).");
            }
        }

        // CÓPIA DE PROMPT
        function copyPrompt(prodId) {
            const prod = allProducts.find(p => p.id === prodId);
            const promptIdx = document.getElementById(`sel-${prodId}`).value;
            const template = prompts[promptIdx].text;

            let final = template.replace(/\[NOME\]/g, prod.name)
                                .replace(/\[PRECO\]/g, fmt(prod.price))
                                .replace(/\[PRECO_ANTIGO\]/g, fmt(prod.oldPrice))
                                .replace(/\[DESCONTO\]/g, prod.discountPercent + '%');

            navigator.clipboard.writeText(final).then(() => showToast("Prompt de texto copiado!"));
        }

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.className = "show";
            setTimeout(() => { t.className = t.className.replace("show", ""); }, 2500);
        }

        // LOGICA DE PRODUTOS (SIMPLIFICADA PARA O EXEMPLO)
        function renderProducts() {
            const grid = document.getElementById('productGrid');
            const q = norm(document.getElementById('search').value);
            const minD = parseInt(document.getElementById('minDiscount').value);

            const filtered = allProducts.filter(p => {
                return p.discountPercent >= minD && norm(p.name).includes(q);
            });

            grid.innerHTML = filtered.map(p => `
                <div class="card">
                    <div class="card-img-box">
                        <img id="img-${p.id}" src="${p.img}">
                    </div>
                    <div class="card-title">${p.name}</div>
                    <div class="card-prices">
                        <div class="card-price-off">${fmt(p.oldPrice)}</div>
                        <div class="card-price-now">${fmt(p.price)} <small style="color:var(--danger)">(-${p.discountPercent}%)</small></div>
                    </div>
                    <div class="card-actions">
                        <select id="sel-${p.id}">
                            ${prompts.map((pr, i) => `<option value="${i}">${pr.name}</option>`).join('')}
                        </select>
                        <div class="btn-group-copy">
                            <button class="btn-copy-p" onclick="copyPrompt('${p.id}')">Copiar Prompt</button>
                            <button class="btn-copy-i" onclick="copyImage('${p.img}')">Copiar Imagem</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // INICIALIZAÇÃO (Simulando a busca do seu produtos.json)
        async function init() {
            // Aqui você usaria o fetch real do seu produtos.json
            // Vou carregar alguns dados de exemplo baseados na lógica do seu site original
            allProducts = [
                { id: "92238569", name: "Produto Exemplo 1", price: 10.00, oldPrice: 20.00, discountPercent: 50, img: "https://via.placeholder.com/300" },
                { id: "83719006", name: "Produto Exemplo 2", price: 15.00, oldPrice: 25.00, discountPercent: 40, img: "https://via.placeholder.com/300" }
            ];
            
            // Tente carregar os produtos reais se o arquivo existir
            try {
                const res = await fetch('/site/produtos.json').then(r => r.json());
                // ... aplicar sua lógica de formatName e aplicarDescontos aqui ...
            } catch(e) {}

            renderSavedPrompts();
            renderProducts();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
