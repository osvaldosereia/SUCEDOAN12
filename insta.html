<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Prompts Publicitários 9:16</title>
    <style>
        /* Estilos CSS para uma interface limpa e moderna */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 30px;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #ff4757;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
        }
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 16px;
            background-color: #fff;
            appearance: none; /* Remove o estilo padrão do sistema operacional */
        }
        select:focus {
            outline: none;
            border-color: #ff4757;
            box-shadow: 0 0 0 2px rgba(255, 71, 87, 0.25);
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }
        button:hover {
            background-color: #ff6b81;
        }
        .result-box {
            margin-top: 25px;
        }
        .result-box label {
            color: #2ed573;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px dashed #2ed573;
            border-radius: 6px;
            background-color: #f1fef4;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Gerador de Prompts Criativos</h1>
        
        <div class="form-group">
            <label for="qtdProdutos">Quantidade de Produtos em destaque:</label>
            <select id="qtdProdutos">
                <option value="1 produto centralizado">1 produto</option>
                <option value="2 produtos lado a lado">2 produtos</option>
                <option value="3 produtos organizados de forma criativa">3 produtos</option>
                <option value="4 produtos em composição harmônica">4 produtos</option>
                <option value="uma variedade de 5 a 8 produtos misturados">5 a 8 produtos</option>
            </select>
        </div>

        <div class="form-group">
            <label for="acao">Ação e Interação Humana:</label>
            <select id="acao">
                <option value="segurado por uma mão feminina com unhas pintadas">Uma mão segurando</option>
                <option value="segurados por duas mãos femininas">Duas mãos segurando</option>
                <option value="dentro de uma cesta de supermercado colorida de plástico segurada por uma pessoa">Na cesta de supermercado</option>
                <option value="sendo retirados de dentro de uma caixa de papelão kraft por uma pessoa">Saindo da caixa de papelão</option>
                <option value="sendo levemente abertos por mãos cuidadosas">Produto sendo aberto</option>
            </select>
        </div>

        <div class="form-group">
            <label for="fundo">Estilo do Cenário/Fundo:</label>
            <select id="fundo">
                <option value="fundo sólido em cor rosa pastel candy">Sólido Rosa Pastel</option>
                <option value="fundo sólido em cor azul vibrante pop">Sólido Azul Vibrante</option>
                <option value="céu azul limpo e ensolarado ao ar livre">Céu Azul Limpo (Externo)</option>
                <option value="fundo de azulejos quadrados lilás estilo banheiro minimalista">Azulejos Lilás</option>
                <option value="fundo com padrões geométricos retro pop-art e bolinhas">Padrões Geométricos Pop</option>
                <option value="fundo com duas cores contrastantes divididas na diagonal">Duas cores (Diagonal)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="luz">Iluminação e Fotografia:</label>
            <select id="luz">
                <option value="luz solar dura, com sombras bem marcadas e contraste alto">Luz de Sol Dura (Sombras marcadas)</option>
                <option value="iluminação de estúdio suave, brilhante e uniforme">Luz de Estúdio Suave</option>
                <option value="iluminação com flash frontal forte estilo fotografia de moda dos anos 90">Flash Frontal Forte (Estilo 90s)</option>
            </select>
        </div>

        <button onclick="gerarPrompt()">Gerar Prompt Mágico</button>

        <div class="result-box">
            <label for="resultado">Seu Prompt Finalizado:</label>
            <textarea id="resultado" readonly>Configure as opções acima e clique em "Gerar Prompt".</textarea>
        </div>
    </div>

    <script>
        // Função principal chamada quando o botão é clicado
        function gerarPrompt() {
            // 1. Capturar os valores selecionados pelo usuário em cada menu suspenso
            const qtd = document.getElementById('qtdProdutos').value;
            const acao = document.getElementById('acao').value;
            const fundo = document.getElementById('fundo').value;
            const luz = document.getElementById('luz').value;

            // 2. Definir a estrutura base do prompt, incluindo o estilo da sua marca
            const introducao = "Fotografia publicitária ultrarrealista, estilo Mixed Media, combinando hiper-realismo com elementos de direção de arte pop, candy e minimalista. Proporção vertical 9:16.";
            
            // 3. Montar a frase principal combinando as variáveis capturadas
            const descricaoPrincipal = `A imagem deve focar em ${qtd}, que estão sendo ${acao}. O cenário possui um ${fundo}.`;
            
            // 4. Adicionar detalhes técnicos de fotografia
            const detalhesTecnicos = `Iluminação: ${luz}. Cores extremamente vibrantes, alta resolução, 8k, textura nítida, comercial de alto padrão para Instagram Reels. A embalagem do produto deve estar em branco (mockup) para posterior inserção da marca.`;

            // 5. Juntar todas as partes para formar o prompt final
            const promptFinal = `${introducao} ${descricaoPrincipal} ${detalhesTecnicos}`;

            // 6. Enviar o texto final para a caixa de texto (textarea) para o usuário copiar
            document.getElementById('resultado').value = promptFinal;
        }
    </script>
</body>
</html>
