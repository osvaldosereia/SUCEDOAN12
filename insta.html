<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estúdio Rápido: Gerador de Prompts</title>
    <style>
        /* Estética Classic Google (Material Design) e Mobile First */
        :root {
            --google-blue: #1a73e8;
            --google-blue-hover: #174ea6;
            --google-green: #1e8e3e;
            --google-green-hover: #188038;
            --background: #f8f9fa;
            --surface: #ffffff;
            --border: #dadce0;
            --text-main: #202124;
            --text-sec: #5f6368;
        }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--surface);
            border-radius: 8px;
            border: 1px solid var(--border);
            padding: 24px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: var(--text-main);
            font-size: 22px;
            font-weight: 400;
            margin-top: 0;
            margin-bottom: 24px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (min-width: 768px) {
            .grid-layout {
                grid-template-columns: repeat(2, 1fr);
            }
            .span-2 {
                grid-column: span 2;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            color: var(--text-sec);
            margin-bottom: 6px;
            font-weight: 500;
            text-transform: uppercase;
        }

        select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background-color: var(--surface);
            color: var(--text-main);
            font-size: 16px; 
            box-sizing: border-box;
            transition: border-color 0.2s;
            cursor: pointer;
        }

        select:focus, textarea:focus {
            outline: none;
            border: 2px solid var(--google-blue);
            padding: 11px;
        }

        textarea {
            height: 180px;
            resize: vertical;
            line-height: 1.5;
            margin-bottom: 16px;
            cursor: text;
        }

        button {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.25px;
            cursor: pointer;
            transition: background-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
            height: 48px;
        }

        .btn-primary {
            background-color: var(--google-blue);
            color: white;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
        }

        .btn-primary:hover {
            background-color: var(--google-blue-hover);
        }

        .btn-success {
            background-color: var(--google-green);
            color: white;
            margin-top: 10px;
        }

        .btn-success:hover {
            background-color: var(--google-green-hover);
        }

        .result-container {
            border-top: 1px solid var(--border);
            padding-top: 24px;
            margin-top: 24px;
        }

        /* Estilos para o Multiseletor de Elementos (Checkboxes transformados em botões visuais) */
        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        @media (min-width: 480px) {
            .checkbox-group {
                grid-template-columns: 1fr 1fr;
            }
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background-color: var(--surface);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            color: var(--text-main);
        }

        .checkbox-item:hover {
            background-color: #f1f3f4;
        }

        /* Esconde o quadradinho padrão do checkbox */
        .checkbox-item input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            accent-color: var(--google-blue); /* Pinta o checkbox de azul no Google Chrome/Edge */
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Estúdio Rápido 4.0</h1>

        <div class="grid-layout">
            
            <div class="form-group">
                <label>Quantidade de Produtos</label>
                <select id="qtd">
                    <option value="1 produto">1 produto</option>
                    <option value="2 produtos">2 produtos</option>
                    <option value="3 produtos">3 produtos</option>
                    <option value="4 produtos">4 produtos</option>
                    <option value="5 produtos">5 produtos</option>
                    <option value="6 produtos">6 produtos</option>
                    <option value="7 produtos">7 produtos</option>
                    <option value="8 produtos">8 produtos</option>
                </select>
            </div>

            <div class="form-group">
                <label>Cor Principal (Tom Candy)</label>
                <select id="corFundo">
                    <!-- Cores originais -->
                    <option value="Rosa Candy">Rosa Candy</option>
                    <option value="Azul Claro">Azul Claro</option>
                    <option value="Amarelo Pastel">Amarelo Pastel</option>
                    <option value="Lilás">Lilás</option>
                    <!-- 5 novas variações Candy solicitadas -->
                    <option value="Verde Menta (Mint Green)">Verde Menta</option>
                    <option value="Pêssego Suave (Peach)">Pêssego Suave</option>
                    <option value="Lavanda Claro (Soft Lavender)">Lavanda Claro</option>
                    <option value="Azul Turquesa Pastel">Azul Turquesa Pastel</option>
                    <option value="Amarelo Manteiga (Butter Yellow)">Amarelo Manteiga</option>
                    <!-- Neutro -->
                    <option value="Branco">Branco</option>
                </select>
            </div>

            <div class="form-group">
                <label>Estilo do Fundo</label>
                <select id="estiloFundo">
                    <option value="fundo totalmente liso e uniforme">Liso</option>
                    <option value="fundo com pattern (padrão geométrico) tom sobre tom muito discreto">Pattern Tom sobre Tom Discreto</option>
                    <option value="fundo preenchido com elementos desfocados relacionados ao produto">Elementos relacionados ao produto</option>
                </select>
            </div>

            <div class="form-group">
                <label>Posição da Câmera</label>
                <select id="camera">
                    <option value="câmera posicionada exatamente de frente para o produto (Eye-level)">De frente</option>
                    <option value="câmera posicionada a 45º de baixo para cima (Low Angle), dando imponência">45º de baixo pra cima</option>
                    <option value="câmera posicionada a 35º de cima para baixo (High Angle)">35º de cima pra baixo</option>
                    <option value="câmera posicionada a 90º de cima para baixo, visão totalmente aérea (Top-Down/Zenital)">90º de cima pra baixo (Aérea)</option>
                    <option value="câmera posicionada com ângulo de 25º para a lateral, mostrando perspectiva geométrica">25º pra lateral</option>
                </select>
            </div>

            <div class="form-group">
                <label>Foco e Distância</label>
                <select id="foco">
                    <option value="com super foco extremo no produto, destacando os mínimos detalhes">Super foco no produto</option>
                    <option value="focado nitidamente no produto, com leve desfoque no fundo">Focado no produto</option>
                    <option value="com a câmera a 1 metro de distância do produto">1 metro de distância</option>
                    <option value="com a câmera a 2 metros de distância do produto, mostrando mais do ambiente">2 metros de distância</option>
                </select>
            </div>

            <!-- Novo Multiseletor de Elementos da Cena -->
            <div class="form-group span-2">
                <label>Elementos da Cena (Selecione quantos desejar)</label>
                <div class="checkbox-group" id="elementos-container">
                    <label class="checkbox-item">
                        <input type="checkbox" value="presença de 1 ou 2 personagens interagindo na cena">
                        Personagem 1 ou 2
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="anotações manuscritas flutuantes sobre as características do produto">
                        Anotações sobre o produto
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="presença de elementos, texturas ou ingredientes diretamente relacionados ao produto">
                        Elementos relacionados ao produto
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="uma etiqueta de preço desenhada no estilo doodle anexada na cena">
                        Etiqueta de preço
                    </label>
                </div>
            </div>

        </div>

        <button class="btn-primary" onclick="gerarPromptSimplificado()">Gerar Prompt</button>

        <div class="result-container">
            <textarea id="resultado" readonly>Seu prompt simplificado aparecerá aqui...</textarea>
            <button class="btn-success" onclick="copiarPrompt()">📋 Copiar Prompt</button>
        </div>
    </div>

    <script>
        // Passo 1: Esta função principal captura os dados e monta a lógica do texto.
        function gerarPromptSimplificado() {
            
            // 1. Capturando os valores dos campos de seleção simples (dropdowns)
            const qtd = document.getElementById('qtd').value;
            const corFundo = document.getElementById('corFundo').value;
            const estiloFundo = document.getElementById('estiloFundo').value;
            const camera = document.getElementById('camera').value;
            const foco = document.getElementById('foco').value;

            // 2. Lógica do Multiseletor de Elementos
            // Aqui buscamos todos os checkboxes que o usuário marcou (checked)
            const checkboxes = document.querySelectorAll('#elementos-container input[type="checkbox"]:checked');
            let arrayElementos = [];
            
            // Passamos por cada checkbox marcado e guardamos o valor dele no nosso Array
            checkboxes.forEach(function(checkbox) {
                arrayElementos.push(checkbox.value);
            });

            // Se o usuário selecionou algo, juntamos as frases com vírgula. Se não, definimos como "cenário limpo".
            let textoElementos = "";
            if (arrayElementos.length > 0) {
                textoElementos = "A composição visual deve incluir: " + arrayElementos.join(", ") + ".";
            } else {
                textoElementos = "A composição visual deve ser limpa, sem elementos adicionais soltos na cena.";
            }

            // 3. Variáveis Fixas (As regras padrão que não mudam)
            const informacoesPadrao = "A imagem deve ter formato vertical 9:16. O estilo de direção de arte é Candy Pop clean e minimalista. Devem ser usados todos os recursos modernos de renderização para deixar a imagem ultra realista, com altíssima resolução e nitidez. Sempre use a melhor iluminação de estúdio para a cena, destacando as texturas.";
            
            // 4. Montando a descrição com as escolhas do usuário
            const descricaoCena = `Crie uma cena exibindo ${qtd}. O cenário apresenta cor predominante ${corFundo} com ${estiloFundo}. Perspectiva fotográfica: ${camera}, ${foco}. ${textoElementos}`;

            // 5. A Regra Inquebrável da Embalagem (A instrução crítica para a IA)
            const regraEmbalagem = "[ATENÇÃO - REGRA CRÍTICA]: A embalagem, o rótulo e a proporção do produto anexado DEVEM ser respeitadas integralmente e NÃO DEVEM ser alteradas. A IA deve focar em criar a fotografia e a composição ao redor, integrando o produto perfeitamente com iluminação realista.";

            // 6. Unindo todas as partes e enviando para a tela
            const promptFinal = `${informacoesPadrao}\n\n${descricaoCena}\n\n${regraEmbalagem}`;
            document.getElementById('resultado').value = promptFinal;
        }

        // Passo 2: Função para copiar o texto com segurança usando a API do navegador
        function copiarPrompt() {
            const textarea = document.getElementById('resultado');
            
            if(textarea.value === "" || textarea.value.includes("aparecerá aqui")) {
                alert("Por favor, clique em 'Gerar Prompt' primeiro!");
                return;
            }

            textarea.select();
            textarea.setSelectionRange(0, 99999); 
            navigator.clipboard.writeText(textarea.value).then(() => {
                alert("Prompt copiado com sucesso!");
            }).catch(err => {
                alert("Erro ao copiar. Selecione o texto manualmente.");
            });
        }
    </script>
</body>
</html>
