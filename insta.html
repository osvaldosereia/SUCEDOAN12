<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Prompts: Simplificado</title>
    <style>
        /* Estética Classic Google (Material Design) e Mobile First - Visual First */
        :root {
            --google-blue: #1a73e8;
            --google-blue-hover: #174ea6;
            --google-green: #1e8e3e;
            --google-green-hover: #188038;
            --background: #f8f9fa;
            --surface: #ffffff;
            --border: #dadce0;
            --text-main: #202124;
            --text-sec: #5f6368;
        }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px; /* Reduzido para ficar mais compacto */
            width: 100%;
            background: var(--surface);
            border-radius: 8px;
            border: 1px solid var(--border);
            padding: 24px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: var(--text-main);
            font-size: 22px;
            font-weight: 400;
            margin-top: 0;
            margin-bottom: 24px;
        }

        /* Mobile First: 1 Coluna por padrão */
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        /* Desktop: 2 Colunas para telas maiores */
        @media (min-width: 768px) {
            .grid-layout {
                grid-template-columns: repeat(2, 1fr);
            }
            .span-2 {
                grid-column: span 2;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            color: var(--text-sec);
            margin-bottom: 6px;
            font-weight: 500;
        }

        /* Estilo de inputs padrão Google */
        select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background-color: var(--surface);
            color: var(--text-main);
            font-size: 16px; 
            box-sizing: border-box;
            transition: border-color 0.2s;
            cursor: pointer;
        }

        select:focus, textarea:focus {
            outline: none;
            border: 2px solid var(--google-blue);
            padding: 11px;
        }

        textarea {
            height: 180px;
            resize: vertical;
            line-height: 1.5;
            margin-bottom: 16px;
            cursor: text;
        }

        /* Botões padrão Google */
        button {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.25px;
            cursor: pointer;
            transition: background-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
            height: 48px;
        }

        .btn-primary {
            background-color: var(--google-blue);
            color: white;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
        }

        .btn-primary:hover {
            background-color: var(--google-blue-hover);
            box-shadow: 0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
        }

        .btn-success {
            background-color: var(--google-green);
            color: white;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3);
        }

        .btn-success:hover {
            background-color: var(--google-green-hover);
            box-shadow: 0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
        }

        .result-container {
            border-top: 1px solid var(--border);
            padding-top: 24px;
            margin-top: 24px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Estúdio Rápido</h1>

        <div class="grid-layout">
            
            <div class="form-group">
                <label>Quantidade de Produtos</label>
                <select id="qtd">
                    <option value="1 produto">1 produto</option>
                    <option value="2 produtos">2 produtos</option>
                    <option value="3 produtos">3 produtos</option>
                    <option value="4 produtos">4 produtos</option>
                    <option value="5 produtos">5 produtos</option>
                    <option value="6 produtos">6 produtos</option>
                    <option value="7 produtos">7 produtos</option>
                    <option value="8 produtos">8 produtos</option>
                </select>
            </div>

            <div class="form-group">
                <label>Cor do Fundo Liso</label>
                <select id="fundo">
                    <option value="fundo liso em cor Rosa Candy">Rosa Candy (Liso)</option>
                    <option value="fundo liso em cor Azul Claro">Azul Claro (Liso)</option>
                    <option value="fundo liso em cor Amarelo Pastel">Amarelo Pastel (Liso)</option>
                    <option value="fundo liso em cor Lilás">Lilás (Liso)</option>
                    <option value="fundo liso Branco">Branco (Liso)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Foco / Distância</label>
                <select id="foco">
                    <option value="foco total e absoluto no produto em primeiro plano">Foco total no produto</option>
                    <option value="câmera a uma distância de 50cm do produto">Distância de 50cm</option>
                    <option value="câmera a uma distância de 1 metro do produto">Distância de 1 metro</option>
                </select>
            </div>

            <div class="form-group">
                <label>Acessórios / Extras</label>
                <select id="acessorios">
                    <option value="sem nenhum acessório adicional, cena completamente limpa">Nenhum</option>
                    <option value="com anotações manuscritas flutuantes sobre as características do produto">Com anotações sobre o produto</option>
                    <option value="com elementos naturais ou ingredientes diretamente relacionados ao produto">Elementos relacionados ao produto</option>
                    <option value="com a presença de até 3 personagens interagindo sutilmente na cena">Até 3 personagens</option>
                </select>
            </div>

            <div class="form-group span-2">
                <label>Cena Principal</label>
                <select id="cena">
                    <option value="uma mão segurando o produto em destaque">Mão segurando</option>
                    <option value="uma pessoa segurando o produto à frente, garantindo foco total no produto">Pessoa segurando à frente (foco total no produto)</option>
                    <option value="o produto centralizado e grande, com o fundo liso preenchido por anotações manuscritas com informações da embalagem">Produto ao centro grande (fundo com anotações)</option>
                    <option value="o produto acomodado dentro de um carrinho de compras moderno">Produto no carrinho de compras</option>
                    <option value="o produto acomodado dentro de uma cesta de compras de plástico">Produto na cesta de compras</option>
                </select>
            </div>

        </div>

        <button class="btn-primary" onclick="gerarPromptSimplificado()">Gerar Prompt</button>

        <div class="result-container">
            <textarea id="resultado" readonly>Seu prompt simplificado aparecerá aqui...</textarea>
            <button class="btn-success" onclick="copiarPrompt()">📋 Copiar Prompt</button>
        </div>
    </div>

    <script>
        // Passo 1: Esta função central recolhe as escolhas e monta o texto
        function gerarPromptSimplificado() {
            
            // Capturando os valores dos campos visíveis
            const qtd = document.getElementById('qtd').value;
            const fundo = document.getElementById('fundo').value;
            const foco = document.getElementById('foco').value;
            const acessorios = document.getElementById('acessorios').value;
            const cena = document.getElementById('cena').value;

            // Variáveis Fixas Ocultas (As regras que você definiu como padrão)
            const informacoesPadrao = "A imagem deve ter formato vertical 9:16. O estilo de direção de arte é Candy Pop clean e minimalista. Devem ser usados todos os recursos modernos de renderização para deixar a imagem ultra realista, com altíssima resolução e nitidez. Sempre use a melhor iluminação de estúdio para a cena, destacando as texturas.";
            
            // Montando a descrição da cena com as escolhas do usuário
            const descricaoCena = `Crie uma cena exibindo ${qtd}. O enquadramento possui ${foco}. A ação principal mostra ${cena}. O ambiente tem um ${fundo} e a composição conta com a seguinte adição: ${acessorios}.`;

            // A Regra Inquebrável da Embalagem
            const regraEmbalagem = "[ATENÇÃO - REGRA CRÍTICA]: A imagem anexada é a referência absoluta. A embalagem, o rótulo original e a proporção física exata do produto DEVEM ser estritamente respeitadas e NÃO DEVEM ser alteradas de forma alguma. A IA deve focar em criar a cena ao redor, integrando o produto perfeitamente.";

            // Unindo todas as partes para o prompt final
            const promptFinal = `${informacoesPadrao}\n\n${descricaoCena}\n\n${regraEmbalagem}`;
            
            // Inserindo na caixa de texto
            document.getElementById('resultado').value = promptFinal;
        }

        // Passo 2: Função para copiar o texto com um clique
        function copiarPrompt() {
            const textarea = document.getElementById('resultado');
            
            if(textarea.value === "" || textarea.value.includes("aparecerá aqui")) {
                alert("Por favor, clique em 'Gerar Prompt' primeiro!");
                return;
            }

            textarea.select();
            textarea.setSelectionRange(0, 99999); 
            navigator.clipboard.writeText(textarea.value).then(() => {
                alert("Prompt copiado com sucesso!");
            }).catch(err => {
                alert("Erro ao copiar. Selecione o texto manualmente.");
            });
        }
    </script>
</body>
</html>
